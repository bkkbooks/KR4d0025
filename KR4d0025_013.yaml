  text: 范文正公集卷第十三
  hash: sha256:8ea2d29f03ebfbbc8036fe238c7e64a9904df2d1c645710c663f397814177e14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_013-1a}
body:
  text: 尚書度支郎中充天章閣待制知陜州軍府事王公墓志銘孔子曰善人吾不得而見之矣噫先聖謂善人之難得也如此世有德之清行之方政之平斯不謂之善人乎余見之於子野王公矣公諱質字子野其先太原人曽髙占籍大名皇考諱徹以文行顯至左拾遺纍贈太師尚書令兼中書令魯國公王考諱祜雄文直道名重海內掌太祖誥命至兵部侍郎纍贈太師尚書令兼中書令晉國公考諱旭以公正果敢屢當藩寄為時之良二千石纍贈兵部尚書妣虞氏贈某郡君公禀嚴君之教幼而有文伯父文正公為真宗朝賢相重德大器人莫可動一日覽公之業喜甚作詩以奬之謂吾門未衰矣用文正廕補太常寺奉禮郎三遷至大理丞文正既薨公年尚未冠進所著文真宗嘉之召試學士院辭入優等賜進士及第名動京師嘗師事楊文公文公器之每謂朝中名公曰是子英妙加於人遠矣時翰林劉公筠風岸髙峻搢紳仰不得其門而進乃與禁中諸公共薦公之才敏天子命公校文于館中歷殿中省丞為博士於太常加集賢校理拜祠部外郎丁兵部憂服除以前官充職同判姑蘇郡以公心公言正二千石之政二千石初不平之終服其義而加禮焉還朝賜五品服章改度支外郎同判尚書刑部又判吏部南曹進司封外郎出領淮西郡部中十邑素多盜與訟號為難治公至斷獄必以情按吏必有禮橫者繩之弱者持之州人大服謂往之史君莫公若也蔡俗舊祠吳元濟公曰豈有逆醜而當廟食耶吾為州長不能正民之視聽俾民何從哉狄梁公李太尉皆唐之忠烈又德加蔡人胡為不祠命工徹元濟廟建二公之祠率吏民拜祭蔡人從之于今號為雙廟秩滿拜祠部郎中朝廷除公開封府推官除兄雍三司判官公日皆是要職吾兄弟同日除拜朝廷豈乏人哉乃堅請外補願留兄京師以奉家廟士大夫聞而賢之往守壽春郡朞月改合肥郡盜有殺其徒以并其財者吏擒之公令處死法寺議當貸死遂劾之公上疏曰盜以彊力而又殺人吏追而擒之非自露而悛者胡為而貸焉如法寺所論能害其類者皆無罪名民將競為盜盜巳而殺一夫其黨咸赦之盜可止乎疏上不報凡斷獄出入以下吏為首長官為從公曰吾不勝法吏矣上言請為之首朝廷從之左降監舒州靈仙觀後一年今資政殿學士昌黎韓公琦知審刑院議盜殺其徒非自首而悛惡者宜勿原之朝廷始頒示天下且知公前所斷獄不為失矣又今資政殿學士鄭公戩翰林學士葉公清臣皆論公竒才未大用而非辜坐黜豈朝廷之意耶詔起公知海陵郡代還除度支郎中荆湖北路轉運使時西陲宿兵財用為重諸道轉運使競進羡餘幾千萬蘄助軍之奬實瘡痍細民以為巳績公至而歎曰西兵天子不得巳而用之然須于財賦豈如是而迫耶吾不當為由是荆湖之民賴公少休焉㑹資政殿學士富公弼拜職尚帶史館修撰與公未嘗識靣聞其風義舉公以代修撰朝廷從而除之兼掌選事及韓富二公在樞府又交薦公清方為搢紳之冠天子俞其奏擢以本官充天章閣待制依前掌選事公再讓不允既而客有扣公曰銓衡至重利病多矣公無建明者何公曰綱紀盡在如權衡然但持者輒髙下其手爾何必易其器耶公居之歲時選士賴其平其間人物清濁公必辨之上前量有進抑振天官久墜之職也天子以西北數藩鎮皆須巨人乃擇近列而褒遣之公得嶺陜州州當四逹之會又用兵而來吏民疲苦公至則緩征賦薄迎勞屏凶寇拯孤弱人乃息肩幾一載而感疾以慶曆五年七月二十六日終于黃堂享年四十五靈柩歸東都州人哭送于道朝廷加賻公生相門而弗驕弗華以貧為寶文正作舍人時家甚虗嘗貸人金以贍昆弟過期不入輟所乘馬以償之公因閲家藏書而得其劵召家人示之曰此前人清風吾輩當奉而不墜冝祕藏之又得顔魯公為尚書時乞米于李大夫墨帖刻石以模之遍遺親友間其雅尚如此故終身不貪所至有冰蘗聲此公之秉德不亦清乎公充職館殿二十餘年同舍皆顯官公介然不動惟求外𥙷當國者非戚必舊公未嘗折顔色屈語論以合其意嘗有交遊以言事𬒳謫朝之貴人皆切齒公特率昆弟祖宴都門謫者拒之曰無為子之纍乎公曰吾願為黨人從而貶之光矣此公之執行不亦方乎公為數郡皆清心以思治行巳以率下必首崇學校而風化之人有犯法非害于物者必緩其獄未始深文焉求民之疾雖處幽不遺去民之梗雖負勢不避此仁人之政不亦平乎故每去一州則百姓號慟如赤子之慕慈母也公性純孝與家人道先君事必感激泣下故厚於宗族每拳拳焉憂樂同之弟素文正之子也自淮南外計改涇原經略使公食不甘寢不安曰弟有母老且疾吾無親憂因入對請代行既而弗許命其愛子規曰彼窮塞也得無危事汝可侍行而左右之以均吾憂又少弟端嘗不利于春官處徒勞者久之公為郎以歲課當遷願移厥恩召端一試朝廷許之賜端進士出身其友愛之心有如此者公不治生業惟畜書僅萬卷遠近從之兼通佛老微旨撰寶元總録一百卷皆聖賢窮理盡性之說公樂稱人之善必曰吾不及矣在士大夫非風義髙遠弗與之遊及其逝矣四方交友書問相吊云前年吳安道死今年王子野卒賢大夫之清者何其衰歟公娶周氏故禮部侍郎起之女封褒信縣君生子男三人曰毖將作監主簿曰復太廟室長女二人長適太常寺太祝范純仁次女尚幼余走塵土時公一接如舊以道義淡交者有年矣結二姓之好以親仁人余常期公以青雲之器大有立於國朝今不幸乃為公之墓銘銘曰嗚呼人之清者曰賢國得而治焉性之仁者曰壽民得以庇焉何子野之善人兮逝矣如川惟清方而平正兮居人之先在聲詩之有言兮胡不萬年忍送之于野兮葬之干泉徒切切於辭兮勒石之堅期子野之令名兮與白日而長然太常少卿直昭文館知廣州軍州事賈公墓志銘公諱昌齡字延年其先鎮陽人以仕䆠遷徙今為開封人也曾祖諱某唐末起家備嘗險阻屬文之外長於撰述以唐武宗而下至僖昭皆無實録乃以傳聞并諸家之說著唐年𥙷録六十五卷識者稱之居石晉朝知制誥至周為給事中史有本傳祖諱琰有才識宇量太宗在藩邸相得有素領開封尹辟為推官及即位擢拜正諫大夫樞密直學士期以輔相將討河東與大臣議將帥上曰非琰不可㑹寢疾不起上軫悼之憂形于色贈尚書左丞國史有傳父諱汾以氣義稱位不充量終于殿中丞公少孤太夫人愛之以待其成公天然好學甘於清苦時翰林李公宗諤有望於朝名實之士多出其門公依之有年以文行自立門下士咸推重之一上登進士第釋褐為饒州浮梁尉彼俗隂狡與人有怨往往食毒草而後鬪即時斃仆以誣其怨者公至必反覆省視自此被誣之人多昭雪焉秩滿除開封府功曹參軍在職修舉府中常推委之㑹太夫人寢疾公執藥餌不斯須去左右者數月以憂解官哀毁之過宗黨稱嗟服除為許州郾城主簿本郡牧與外計使皆以文學政事交薦于朝廷改大理丞宰蜀之江源縣人繁地狹積多田訟公曰聽訟之明曷若使無訟乎及正其疆條其弊以示於民自茲無爭焉時天下學校未興公修本邑孔子廟起學舍俾邑之秀民群居焉公旦暮往勸導之自此江源始有舉進士者邑人于今稱之皇上即位升殿中丞知宣州宣城縣未至有江淮制置使舉公監海州榷貨務疏逹利路商賈便之朝廷奬其勞改太常博士又遷屯田貟外郎既而三司使以公可通天下之利薦之領京師榷貨務三年稱職特除都官貟外郎賜五品服往倅泉州遠人賴之遷職方貟外郎俄拜屯田郎中知衛州㑹州長不利繼亡者數人人無敢往士大夫惜公之行或教以易其府署公曰吉凶人乎死生天乎於是弗易厥居而終亦無咎郡之共城有稻田以供尚食水利有餘而民不與焉公使歲溉之外與百姓共之天子以欽恤之懷憂及萬邦復先朝提點刑獄使兩省近臣交上封奏舉公充職朝廷從之命提點京西路刑獄事公性仁恕小大之獄必盡心以聽郡邑之幽遠使車所不至者躬親焉不事風威州縣九品必延見與語得其善則畫一以聞見其過則教之使悛雖職居按察而不忍摘人之惡搢紳稱其長者改度支郎中荆湖北路轉運使下車訪能吏徹冗官部中諸郡例以公用饋遺者一切不受西南夷人下溪州刺史彭仕羲隸于辰州而驕蹇狙詐嘗因入貢欣州官于登聞辭皆不實朝廷弗欲較之責吏而巳仕羲益橫求割近邊土民公遣吏直告之曰天子恩信及爾爾狡而無厭我當擇於衆族求其可代汝者請之于朝汝其圖之仕羲始知懼盟不復敢訟改知潭州潭荆湖之劇府人物繁㑹素為難治以公神明之照雖千百其訟無毫髮之隱吏服民愛歌于道路朝廷知公之重拜太常少卿直昭文館就鎮南海始登舟感疾召諸子授以治命神思不亂以康定元年八月二十三日不起公長厚之性資以明逹顚沛造次弗離中道寬而不懈直而不訐與人交久而能恭當官而行未嘗違其正士大夫無不愛其風度居家有節與親族同其有無常謂諸子曰吾家清白可傳何生業之為啓手足之日門中索然君子謂公之踐言矣娶三夫人高陽許氏中山劉氏封長安縣君廣平宋氏封某縣君生八男長曰寅有文學履業登進士第為絳州防禦推官與次子廉俱不幸早世次曰蕃開封府封丘縣主簿次曰常將作監主簿次曰當堂京岡並幼女五人長適大理寺丞李競次適廬州舒城縣主簿王宗慤次適河中府萬泉縣令高良佐次適孟州河隂縣主簿州學教授蓋沂一女尚幼以某年月日葬于鄭州新鄭縣抱章山之東南三夫人祔焉某既交而親從其孝子之請而作銘云邦之令人道醇德懿芝蘭之室瑚璉之器禀孝含忠播仁殖義位子一方未博其施弗遐厥壽蒼蒼曷意君子惜賢小人奪惠葬于鄭國卜云善地子産在焉魂兮相慰太子右衛率府率田公墓志銘古稱隂有德於人者必享厥祥大厥後易不云乎積善之家必有餘慶所謂不在其身在其子孫者信矣公諱紹方其先鴈門人曾高家于冀自耶律氏熾得石晉山後八郡又歲侵兩河聞王考諱某𬒳遷于盧龍署之以官復治産雲中而貨殖焉考諱某能幹父之蠱其家益顯娶王氏而生公公少稱才武抱氣重諾有燕趙之風義事耶律得親信左右常從而南牧帳下多掠獲漢家士民俾公尸之公默計之曰漢人吾曹也驅之如犬羊非有罪辜將孥戮于虜中乃縱之夜亡者千計此德於人多矣公亦自負謂大丈夫胡能老於異域哉考妣既葬吾其歸歟乃匿身草莽㑹夜則負斗而奔既逹朝廷真宗憫然嘉之𥙷職于三班以其勇果屢委軍甲捕外方寇所謂巡檢者至則盜息民得按堵公祥符中主邵之峽口寨時龍水郡蠻寇大擾戍兵屢履峽口溪洞亦乘聲嘯聚一日近寨圍而噪之公戒軍士曰我露其勇彼將整而難破不如示之怯士敢先動者吾以軍法從事衆皆肅然聽命既夜公自率驍果突而擊之斬十餘級蠻雖衆曾不能措手足大駭而奔自是終公之任不敢內寇州將害其功不以上聞公曰吾自虜還漢獲從王事足矣烏敢為功哉又嘗誨督諸子曰吾以漢有聖人之風故脫身以歸今教汝詩書趨聖人之道使汝輩有立吾將鼓歌以終天年豈病其不逹耶子況舉進士髙第又舉賢良方正天子親問當世治亂祥咎以對第一乃速進用四五年間掌西掖書命為陜西道置撫副使還朝敷奏稱㫖乃詔寵公以太子右衛率府率監瓊林苑金明池以便子養士大夫榮之天子以尚憂西陲命况龍圖閣直學士出領秦鳯路經略使公在疾經略屢求省侍有詔敦勉遣中人尚醫軫視公以慶曆五年乙酉孟秋月壬子不起享年七十有四上嗟惻之加賵賻焉經略纍章哀訴得告奉公之喪以某年月日葬于許州陽翟縣某原禮也公性剛直未嘗曲於人然明恕少怒嘗官于閩中有愛馬使一卒乘習遇危橋不下馬折足而斃公曰卒豈欲是耶不復以一言詰之人皆服其度公娶李氏贈福昌郡君前十五年而亡生八男經略即長子也次曰淵有詞業舉進士以兄廕𥙷試祕書省校書郎許州郾城主簿次曰沃濩幼亡次曰洵潁上主簿次曰浹登進士第唐州團練推官次曰洸太廟齊郎次曰泳皆業進士次小字寶哥尚幼三女長適海州東海令張震次適辰州理掾高燾次適鄂州咸寧令張子方皆以婦道稱于宗族某嘗與公㑹于丹陽見公氣貌話言剛而質毅而恭使人信而愛之又與經略之遊舊矣俾序而銘云公復其家去狄而華公教其嗣挺國之器厥後既隆又壽而終天子賵焉大夫弔焉非積德而胡然資政殿大學士禮部尚書贈太子太師諡忠獻范公墓志銘慶曆紀號之六載春正月丁亥資政殿大學士禮部尚書知河南府兼西京留守司范公以疾薨聞上悼之為不視朝制贈太子太師賵賻加等子孫遷官者五人有司議行諡曰忠獻以其年某月日葬于洛陽之某原某里附先塋也公諱雍字伯純其先太原人皇考諱某後唐初為校書郎帥孟公器之嘗辟居幕中後又從孟公入蜀霸業既成遂為國相久之一日告老蜀主寵以太子太保就第以疾終及公之貴纍贈太保王考諱某在蜀為刑部侍郎後歸朝終于左屯衛將軍纍贈太傅考諱某以太傳廕為供奉官終于合肥郡之監軍纍贈太師尚書令妣韓氏封安康郡太夫人追進京兆郡實生二子公處其季十歲而孤家甚貧太夫人遣公就學常質衣以為資公警悟過人挺然國器舉進士咸平三年春御前釋褐補洛陽主簿再調錢塘尉知巳薦公廉敏改筠州從事秩滿以績用除大理丞宰建之崇安縣遷殿中丞知端州還朝獻所著文二十卷進太常博士初公為洛陽主簿實典廩納而邑多權要公必先細民而後形勢時尚書張公詠道過洛陽聞其事乃紀公姓名署之于屏常指以示人曰識斯人否至是張公鎮淮陽致書于寇萊公道公之才復奏公為淮陽倅成命未行㑹萊公出守西洛辟公二留守司朝廷俞之張公曰奪我賢倅耶公自兹名重朝廷改田曹外郎主判三司開拆賜五品服天禧中河決滑臺齊魯承其弊朝廷遣兵數萬人塞其橫流千里之民皆奔走負薪芻邑官荷校以督其事民不堪命天子患之命丞相暨主計擇人以往僉以公為允除京東轉運副使至則度河之勢量工集材邑官皆釋之與民緩期不煩而濟河防既就進度支外郎河北轉運使列塞積兵計糧為大民租不能給須重其榖價募商以內之縣官苦其費公視德博間地惟沃饒菽粟易斂又河渠通于塞下大可致之乃輦諸州緡錢就以平糴方舟順流集于邊廩自是河朔財用周于供億朝廷患陜西兵食不足困于轉饋命公充本路轉運使賜三品服公至則先寬其民不使遠輸募人入粟塞下給以池鹽商嗜其息而農得以休上即位就遷兵部外郎召拜戶部副使尋改度支副使未幾拜工部郎中龍圖閣待制充陜西轉運使踰年召還提舉京百司㑹環原州屬羌叛起大為邊患遣公安撫乃見其酋長諭以恩威即時嚮順還朝拜右諫議大夫權三司使旋奉使契丹國以專對有體加龍圖閣直學士主司如故公好訪問善開納天下金榖之利病灼然居目中上知其才拜樞密副使歲餘丁太夫人憂制以給事中起復視事籍田禮畢遷禮部侍郎時玉清昭應宫災兩府簾對章獻太后泣曰先帝崇奉此宫一旦至此賴東北隅猶存一二小殿公揣知有復興之意因抗言曰先朝極土木而成此宫一夕為燼豈天意耶如因其所存復欲興之民將弗堪不如焚之之盡也諸公協其對章獻意解曰不復勞人矣上說翌日下詔以諭中外焉又嘗繪尚書四代圖進之以備中覽居密府六載參掌機務知無不為明道二年以戶部侍郎知陜州踰月移京兆府其年諸道旱蝗人復疾疫於關中為甚百姓轉于溝壑公先減廩祿復損民有餘以振之活數萬人每人躬自撫視至染癘氣卧疾者久徙鎮河陽暇日念國家禦戎之備率多㢮廢西羌狡狠必有窺邊之心恩不克威豈久安之勢乃感激上言而得入覲陳安邊六策上深加采納進吏部侍郎資政殿學士出守西京既而西戎果叛上咨歎之授公振武軍節度使鎮延安時守備未完屯戍尚寡公纍章乞師朝議小其寇不甚為意一日元昊驅衆十餘萬於延安城㑹大將石元孫領兵出境上城中守之才數百人公身𬒳甲胄復呼民登俾日夜嚴守遣使召統帥劉平于慶州平領軍來援合元孫兵與賊夜戰王師不利二帥陷殁城中大恐無可守之勢公曰延安西夏之咽喉也如將不守則關輔皆危今人力窮矣奈何郡南有嘉嶺山其神素靈乃望而禱之曰我死王事足矣生靈何辜為虜魚肉神享廟食于兹土其無意乎厥暮隂晦雨雪大下寇兵暴露不知所為乃晝夜引去延安遂完朝廷聞之封其神曰威顯公斯又至誠之感為不誣矣然二帥既殁纍公左遷戶部侍郎知安州延安吏民百數詣闕號訴謂城當陷而存民將殞而生皆公之力也天子惻然故一歲間起公吏部侍郎知河中府未行改京兆府且許朝覲上優遇之加資政殿學士赴鎮歲餘以撫安關輔之勞改尚書左丞進大學士俄而復守西京有群盜集于襄鄧浸淫汝洛間朝廷委公營之公夙夜乃事遣兵驅遏兼示恩貸故其寇歸者半戮者半民用樂業歲乃大登朝廷有詔褒之又言事者以西事而來收兵入冗宜遣使擇去以寬其費朝廷從之軍中往往偶語公密疏謂急而用之緩而棄之不可上乃止公保釐三歲拜禮部尚書時巳抱疾至終之日洛人悲焉公常志在𥙷益奏藁纍篋及其沈痾聞朝廷有事于田狩猶拜疏忠切以盡其心公性恭和有風鑒門下所舉多至貴顯為時名卿藏書僅萬卷惟小書五經則常提携左右不可一日無此與岷山處士龍昌期論易深逹微奧以昌期所著書奏御遂行於時公著明道集三十卷後集十卷彌綸集十卷雖高年貴位而造次不忘于學初娶魏氏追封巨鹿郡夫人再娶臧氏始封遂寧郡夫人改仁壽郡男六人長曰宗傑兵部員外郎直史館陜西轉運使三路制置解鹽使先公一年而亡次宗良宗衍並守將作監主簿次宗古皆早亡宗師宗賢今並太常寺太祝女十人一適眉州防禦使高繼宣三人在室六人早亡孫男六人子開子明並大理評事子儀太常寺奉禮郎子諒子奇子淵將作監主簿孫女七人曾孫女二人公約于身勞于國周旋四方始終一節又政惟慈恕不任威罰今二子六孫秀異簪紳豈隂德之在歟某素為公之所知又諸孤以公善狀求為之銘銘曰邦之偉人念德不怠勤勞王家四十七載入輔樞軸作為股肱皇猷克贊天眷是膺出臨藩宣允專節制蹈乎憂患濟以忠義政本乎仁行執乎恭夙興夜寐則善之從歲月靡靡終于壽紀典禮具舉神靈以喜葬于先塋舊柏青青子孫尚蕃承祭祀兮惟寧東染院使种君墓志銘君諱世衡字仲平國之勞臣也不幸云亡其子泣血請銘於豫豫嘗經略陜西知君最為詳懼遺其善不可不從而書之初康定元年春夏戎犯延安我師不利朝廷以堡障衆多有分兵之患其間遠不足守者即命罷之寇驕而貪益侵吾疆百姓被其毒君時為大理丞任鄜州從事建言延安東北二百里有故寬州請因其廢壘而興之以當寇衝左可致河東之粟右可固延安之勢北可圖銀夏之舊有是三利朝廷從之以君董役事君膽勇過人雖俯逼戎落曾不畏憚與兵民暴露數月且戰且城然處險無泉議不可守鑿地百有五十尺始至于石工徒拱手曰是不可井矣君曰過石而下將無泉耶爾攻其石屑而出之凡一畚償爾百金工復致其力過石數重泉果沛發飮甘而不耗萬人歡呼曰神乎雖虜兵重圍吾無困渴之患矣用是復作數井兵民馬牛皆大足自兹西陲堡障患無泉者悉倣此大蒙利焉既而朝廷署故寬州為青澗城授君內殿承制知城事復就遷供備庫副使旌其勞也塞下多屬羌向時漢官不能恩信羌皆持兩端君乃親入部落中勞問如家人意多所周給常自解佩帶與其酋豪可語者有得虜中事來告於我君方與客飲即取坐中金器以奬之屬羌愛服皆願效死青澗東北一舍而遠距無定河河之北有虜寨虜常濟河為患君屢使屬羌擊之往必破走前後取首級數百牛羊萬計未嘗勞士卒也故功多而費寡建營田二千頃歲取其利募商賈使通其貨或先貸之本速其流轉歲時間其息十倍乃建白凡城中芻糧錢幣暨軍須城守之具不煩外計一請自給使一子專視士卒之疾調其湯餌常戒以笞責期于必瘳士卒無不感泣今翰林承㫖王公堯臣安撫陜西言君治狀上恱降詔褒之曰邊臣若此朕復何憂二年就兼鄜延路駐泊兵馬都監制置本路糧草遷洛苑副使慶曆二年春豫按巡環州患屬羌之多而素不為用與夏戎濳連助為邊患乃召蕃官慕恩與諸族酋長僅八百人犒于麾下與之衣物繒綵以恱其意又采忠順者增銀帶馬紱以旌之然後諭以好惡立約束四俾之遵向然悍猾之性久失其馭非智者處之慮復為變時青澗既完人可循守乃請于朝願易君理環朝廷方以青澗倚君又延帥上言人重其去命豫更擇之豫謂夏戎日夜誘吾屬羌羌愛其類益以外向非斯人親之不能革其心朝廷始如其請君既至環安邊之利害大要在屬羌難制懼合夏戎為暴發之患又地瘠穀貴屯師為難聚糧則力屈損兵則勢危斯急病也君乃周行境內入屬羌聚落撫以恩意如青澗焉有牛家族首奴訛者屈疆自處未嘗出見官長聞君之聲始來郊迎君戒曰吾詰朝行勞爾族奴訛曰諾是夕大雪三尺左右曰此羌凶詐嘗與高使君繼嵩挑戰又所處險惡冰雪非可前君曰吾方與諸羌樹信其可失諸遂與士衆緣險而進奴訛初不之信復㑹大雪謂君必不來方坦卧帳中君巳至蹴而起之奴訛大驚曰我世居此山漢官無敢至者公了不疑我耶乃與族衆拜伏喧呼曰今而後惟父所使自是屬羌咸信於君有兀二族受夏戎僞署君遣人招之不聽即使慕恩出兵誅之死者半歸者半盡以其地暨牛羊賞諸有功其僣受僞署如兀二族者百餘悵咸股栗請命納其所得文劵𫀆帶由是羌屬無復敢二君戒諸族各置烽火夏戎時來抄掠則舉烽相告衆必介馬而待之破賊者數四涇原帥葛懷敏定川之敗戎馬入縱于渭豫領慶州蕃漢兵往扼邠城又召君分援涇原君即時而赴羌兵從者數千人屬羌為吾用自此始君曰羌兵既可用矣乃復教土人習弧矢以佐官軍吏民有請某事辭某事者君咸使之射從其中否而與奪之坐過失者亦用此得贖吏農工商無不樂射焉繇是緣邊諸城獨環不求增兵不煩益糧而武力自振夏戎聞屬羌不可誘土人皆善射烽火相望無日不備乃不復以環為意前後經略使交薦君之才能朝廷益知可倚明年遷東染院使充環慶路兵馬鈐轄仍領環州惟環西南占原州之疆有明珠滅臧康奴三種居屬羌之大素號疆梗在原為孽寖及于環撫之狠不我信伐之險不可入北有二川交通干夏戎朝廷患焉其二川之間有古細腰城復之可斷其交路又明年子為宣撫使乃諭君與原守蔣偕共幹其事君久悉利病即日起兵㑹偕于細腰使甲士晝夜築之夏戎固忌此城君遣人入虜中以計疑之兵遂不至又召明珠等三族酋長犒撫之俾以禦寇彼既出其不意又亡外援因而服從君之謀也君處細腰月餘逼以苦寒城成而疾作以慶曆五年正月七日甲子啓手足神志不亂享年六十一葬于京兆萬年縣之神和原君之先河南洛陽人也曾祖存啓河南壽安令祖仁詡京兆長安令贈太常博士父昭衍登進士第纍贈職方員外郎季父放字明逸初隱于終南山君少孤依之服勤左右以力學稱明逸道高德純太宗朝再詔以事親不起真宗復加聘禮起拜左司諫直昭文館纍遷尚書工部侍郎大中祥符五年君用工部廕得將作監主簿五遷至太子中舍初監秦州太平監以毋老求養又監京兆府渭橋倉卭州惠民監知涇之保定京兆之武功涇陽三邑在武功毁淫祠崇夫子廟以來學者在涇陽有里胥王知謙者姦利事露逃之逼郊禮乃出君曰送府則㑹恩益以長惡從所坐杖脊于縣庭而請待罪府君李公咨奏釋之自是豪黠莫不斂手其嫉惡如此又邑有三白渠比年浚疏用數邑力主者非其才而勞逸弗等功利日削君使勤墮齊其力故功倍貧富均其流故利廣至今民能言之歷通判鎮戎軍環鳯二州鳯之守王蒙正託章憲外姻以私干君復欲以賄汚君君正色不納蒙正大怒之乃使人諭王知謙訟君蒙正內為之助獄成流竇州上親政量移汝州君之弟世材以一官讓君乃除孟州司馬龍圖閣直學士李公紘雪于朝授衛尉丞主隨州榷酤又禮部尚書宋公綬工部侍郎狄公棐皆言君非辜改知䖍州贛縣君辭得監京兆軍資庫以同鄜交辟改簽署同州判官事又移鄜州因從軍延安乃有故寬州之請君少尚氣節昆弟有欲析其家者君推資産與之惟取季父圖書而巳蒞官能摘惡庇民青澗與環人皆畫君之像而享事之及終吏民暨屬羌酋長朝夕臨柩前者數日朝廷深惜之賜三子恩君娶劉氏封萬年縣君男八人長曰古文雅純篤養志不仕有叔祖明逸之風次曰診試將作監主簿曰詠同州澄城尉曰咨郊社齊郎曰諤三班奉職皆有立欣記誼三子尚幼一女適西頭供奉官田守政君在邊數年聚貨食教弧矢撫養士伍牢籠羌夷無賢不肖皆稱之又出奇以濟幾事嘗遣諜者入虜中凡半歲間而虜誅握兵用事者二三人諜者還言其謀得行㑹君巳沒又天子方懷來故其續不顯銘曰嗚呼种君出于賢門吾志必立吾力是陳寧以剛折果由直伸還自瘴海試于塞垣權以從事意其出人捍虜之患乂邊之民夙夜乃職星霜厥身生則有涯死宜不泯邊俗祀之子子孫孫天章閣待制滕君墓志銘君諱宗諒字子京大中祥符八年春與豫同登進士第始從之遊然未篤知其為人及君歷濰連泰三州從事在泰日豫為鹽官於郡下見君職事外孜孜聚書作文章愛賔客又與豫同護海堰之役遇大風至即夕潮上兵民驚逸吏皆蒼惶不能止君獨神色不變緩談其利害衆意乃定豫始知君必非常之才而心愛焉君去海陵得召試學士院改大理寺丞知太平州當塗縣移知邵武軍邵武縣遷殿中丞還臺㑹禁中災下御史府窮究君與祕書丞劉越並上疏論災異明非人之所能為朝廷貸其獄時明肅太后晚年未還政間君又與越嘗有鯁議暨明肅厭代朝廷擢當時敢言者越既卒贈右司諫君拜左正言遷左司諫俄以言得罪換祠部員外郎知信州又監鄱陽郡榷酤就九華山以葬先君既而起通判江寧府丁太夫人憂服除知湖州賜五品服西戎犯塞邊牧難其人朝廷進君刑部員外郎直集賢院知涇州就賜金紫及葛懷敏敗績于定川寇兵大入諸郡震駭君以城中乏兵呼農民數千皆戎服登城州人始安又以金繒募敢捷之士晝夜探伺知寇遠近及其形勢君手操簡檄關白諸郡日二三次諸郡莫不感服豫時為環慶路經略部署聞懷敏之敗引蕃漢兵為三道以助涇原之虛時定川事後隂翳僅十日士皆沮怯君咸用牛酒迎勞霈然霑足士衆莫不增氣又涇州土兵多沒于定川君悉籍其姓名列于佛寺哭而祭之復撫其妻孥各從其欲無一失所者豫目此數事乃知君果非常之才始請君自代朝廷命韓公琦與豫充陜西四路馬步軍都部署經略安撫招討使復命君守本官充天章閣待制環慶路經略安撫招討使兼知慶州君奏言今既置四路經略安撫招討使而諸路經略亦帶招討之號稱呼無别非統制所宜請去招討二字朝廷以其知體詔從之君去涇之日其戰卒妻孥數百口環其亭館而號送之觀者為之流涕君至慶處置戎事甚得機要邊人咸稱之㑹御史梁堅奏劾君用度不節至本路費庫錢十六萬緡及遣中使檢察乃君受署之始諸部屬羌之長千餘人皆來謁見悉遺勞之其費僅三千緡蓋故事也堅以諸軍月給并而言之誣其數爾豫時待罪政府嘗力辨之堅既死臺諫官執堅之說猶以為言朝廷不得巳坐君前守回中日饋遺往來踰制降一官仍充天章閣待制知􅉑州又移知嶽州君知命樂職庶務畢葺遷知蘇州未踰月人歌其能政俄感疾以某年月日薨于郡之黃堂享年五十七天子加賵賻禮進一子官嗚呼豫實知君之才而嘗薦之于朝及聞其終泣而誄之惜其才有餘而命不足不得盡其術于生民諸子奉君之喪以某年月日葬于池州青陽縣九華山金龜原而乞銘於豫忍復讓哉君河南人也曾祖裔贈將作少監祖嶼不仕父感雅州軍事推官纍贈尚書屯田郎中母刁氏渤海縣太君追封仙遊縣太君君娶李氏封同安縣君子四人希仲以方略進前渭州軍事推官希魯登進士第希德舉進士希雅尚幼並守將作監主簿女二人長適池州軍事推官王栩次適進士劉君軻君少孤性至孝居母喪以哀毁屢病廬墓側踰年手植松柏數萬株生平好學為文長於奏議尤工古律詩積書數千卷以遺子孫中外宗族無不盡其歡心其育人之孤急人之難多矣君政尚寬易孜孜風化在玉山霅上回中嶽陽四郡並建學校紫微王舍人琪翰林張諫議方平太常尹博士源弟起居舍人洙次為之記重興嶽陽樓刻唐賢今人詩歌于其上豫又為之記君樂於為善士大夫亦樂其善而願書之也可不謂之君子乎銘曰嗟嗟子京天植其才精爽高出誠意一開抗職諫曹辨論弗摧主略邊方智謀橫來嗟嗟子京為臣不易名以召毁才以速纍江海不還鬼神何意君昔有言愛彼九華書契以降干戈弗加樹之松楸蔽于雲霞君今巳矣復藏于此魂其依歟神其樂只壽夭窮通一歸乎至理試祕書省校書郎知耀州華原縣事張君墓志銘孔子門人七十子之徒天下皆知其賢焉或為邑宰或為家臣或不願仕蓋顯於諸侯者寡矣然則七十子之徒孔子語而未嘗及怨何哉君子之道充乎巳加乎人窮與逹外也彼戰國豪士不由孔子之門者則有脫賤貧逐貴高弗奪弗厭滅身覆宗而不悔何哉不循聖人之道挾數以進求行其欲得與失重也吾乃知夫由孔子之道者雖困窮以死不害其為賢矣君諱問字道卿陳留人也天聖七年秋廣文館開封府所薦士有與主試官親嫌者别試太常寺豫始在祕閣命往尸之得君策論有漢儒風采乃薦以高等明年不利于春官退居景陵郡研經講道弦歌終日遠近學者多歸之既而獻文論百首應茂才異等科第一人召㑹丁家難不赴寶元初西羌犯延安君慨然有憂邊之意述平戎策以進慶曆初故禮部尚書范公雍言君著萬機濟理書十篇皆國之太議朝廷召試學士院初命試將作監主簿未調而歸搢紳惜其不稱時豫經略陜西因表薦之除試祕書省校書郎知耀州華原縣決滯訟數十吏民服其明屬西陲積兵民苦於遠輸俗吏急之以奉上官民率多流亡君獨與民緩期使得措其手足復流亡者千餘戶陜西都轉運使吳公遵路孫公沔皆以善狀上聞宣撫副使田公況復稱薦之又本道經略使鄭公戩顧京兆屬邑有不治者必遣君治之以慰其民鄜延路經略使龐公籍思廣議論之助權署君幕中仍主州庠以教育人材纍表請改官未報㑹樞密直學士梁公適來代龐奏君以本官監延州軍資庫詔從之未幾寢疾以慶曆六年十一月三日終于延安之官舍享年五十二以某年某月某日葬于某鄉里曾祖洪隱德不仕祖令釗開封府太康縣主簿父允河中府觀察推官毋夫人宋氏君娶歐陽氏生一子曰徽登進士第鎮安軍節度推官知延州甘泉縣二女長適安州安陸縣主簿朱師德次適進士方琪君力于學志于道直言直躬自信而不惑有孔子門人之業而不挾戰國豪士之數雖命與道違又何愧哉其子遠來乞銘故書之曰君子之道耻於弗立立而無所施命也君子之命患於弗知知而無可奈何天也張君其斯人之徒歟吾思其孔子之門則當旌其人而不暇哀其人故昭以銘云太子中舍致仕上官君墓志銘君諱融字仲川其先蜀人也曾祖諱琛不仕祖諱遜贈禮部侍郎父諱佖兵部員外郎京東轉運使贈光祿少卿妣袁氏彭城縣太君君幼專詞學秀出流輩天聖二年秋廣文館舉進士公卿大夫之子咸在焉君中第一人明年春禮部較天下之才君别試于太常寺又首薦之由是名動京師士大夫願識其面未第間丁光祿憂朝廷録光祿之後賜君同學究出身服除授信州貴溪縣主簿君不辭小官而恪其職今樞密直學士蔣希魯故龍圖閣直學士吳安道時並任江南東路轉運使聯章薦君就遷蔡州平興縣令吳移使淮南奏掌真州鹽倉又故龍圖閣直學士假希逸與時賢七人舉君于朝旋以疾聞除太子中舍致仕居于曹南郡以慶曆三年三月五日不起年四十有九君始娶任氏再娶辛氏封金城縣君子二人長曰延賞郊社齊郎次曰延德君之弟太子中舍隆與其孤以皇祐三年四月六日葬君于濟隂縣沛郡鄉崇儒里請銘於豫豫天禧初為譙之從事光祿公方典是郡君時侍行而豫始識君見君文雅有議論不敢以子弟器之後數年與君㑹于京師與之遊皆當世異才以文學風義相許豫益愛焉君既祿仕而大夫之賢者多薦之斯可謂之聞人矣惜乎命之不修弗克樹勳於時可永歎焉或者曰儒生多薄命天豈不與善也余謂不然君子之為善也必享其吉有窮且天者世皆重而傷之雖一二人猶以為多焉小人之為不善也必罹其凶其禍且死者世皆忽而忘之雖千百人若無焉如仲川之亡可謂重而傷之者矣故作銘云惟人之才而無命兮猶物之秀而不實品彚紛其自然兮非化工之能一仲川之亡兮可奈何如川之去兮無還波彭殤至此兮孰少孰多君子之思兮徒為乎悲歌太子中舍致仕范府君墓志銘府君諱仲溫字伯玉四代祖諱某幽州人也唐末為處州麗水縣丞中原亂離遂家于蘇臺曾祖諱某事錢氏為中吳軍節度判官贈太保祖諱某以神童𥙷官終于祕書監贈太傅考諱某歸皇朝歷真定府武信軍掌書記贈太師兼中書令府君即太師仲子也生于京師幼孤還蘇臺與諸從兄弟居服勤素業孝悌于門中景祐二年以某遇乾元節恩例補試將作監主簿赴調除越州新昌尉以誠接物民用知勸在邑三年盜不及境外計舉監杭州餘杭縣市征能寬其利商旅便之三載以績聞按察使洎牧守咸有表薦除寧海軍節度推官知台州黃巖縣慶曆七年海潮大至壞州城人皆逃散沒溺者甚衆府君教民為桴晝夜救之全活數千人既而上官知其所存請董衆以治城府君雅喜利人長於慮事衆議築土為城用甓以傳之府君獨不然謂人築且勞又捍水之衝甓何能久乃集民纍土以牛數百蹂之堅而後增至于城復表以長石玄相銜枕勢莫得動其城八門皆設之閘遇水暴至則障之衆伏其善台人遂安時又歲饑州命邑官率富人出榖俾輕其價以助窮民而窮民乏資無以得榖府君諭之曰汝糴之十不若與之二三則富人易辦而貧人易及衆皆恱從饑者獲濟焉永嘉郡禁盜十四人獄具皆當極法外臺請府君慮問府君原盜之情而重其行法固請覆奏朝廷悉恕其死黃巖大邑民數萬戶訟爭盈庭府君專尚仁愛多以理遣至有犯徒刑而情非巨蠧者府君必為解其仇訟而決平之民自愛服制置按察等使交章薦之府君秩滿還家與鄉舊游曰吾樂矣何用官為遂請老朝廷嘉之遷太子中舍致仕皇祐初某來守錢塘與府君議置上田十頃於里中以歲給宗族雖至貧者不復有寒餒之憂府君退居四年賔親盈門以東臯所入日為雞黍之具故貧而常樂顧鄰里鄉黨有急難則竭力以濟之皇祐二年九月十三日以疾不起享年六十有六中外宗親莫不過哀里人無老少皆涕下其遺愛感人如是之深娶丁氏夫人男五人長曰純義守將作監主簿四子尚幼女四人長適進士李㳂次適進士沈充二女在室以其年十一月十三日葬于吳縣天平山三讓原嗟夫某從事四方與府君别動逾千里及餘杭得請一獲其願相㑹未幾而有死生之訣泣血灑毫不能成文銘曰嗚呼先公五子其三早亡惟兄與我為家棟梁兄又逝焉我獨徨徨諸稚在前未知否臧我其教之俾從義方積善不誣厥後其昌范文正公集卷第十三
