  text: 范文正公集卷第十九
  hash: sha256:0ee45c1f09698a6fd85eaf0802feb3d1658dba59a1b181795f5cf0f0aa666249
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_019-1a}
body:
  text: 陳乞邠州狀右臣聞臣之事君也貴先勞而後祿朝之命官也患重內而輕外重內輕外何以收藩翰之功先勞後祿所以勵搢紳之志臣雖無似輒慕前修臣昨在朝日曾與韓琦同進陜西攻守䇿又覩手詔云今用何人鎮彼西方又去年秋曾有聖㫖令韓琦與臣牙換往邊上照管臣遂面奏乞罷參知政事知陜西一郡兼㳂邊安撫使乞不轉官及不帶招討部署之名尋蒙聖恩差充陜西宣撫使又以契丹舉兵西征元昊在河東接近復差臣兼河東宣撫使臣自至河東體量得邊上利害各巳奏陳今余靖自北既回必見契丹無南牧之意臣久住州軍亦慮煩擾欲過陜西即又宣撫使所行諸軍須望特支恩澤緣南郊均賜之後陜西府庫巳虛或更行特支又須費十數萬貫如不往陜西則前所上攻守之䇿復成空言伏望聖慈依臣前來面奏罷參知政事并安撫使只差臣於邠涇間知一州帶㳂邊安撫使乞不轉官仍不帶招討部署之名如此則不銷更散特支自可就近處置邊事臣此直誠並守前奏俟三二年間邊事寧息攻守有備儻聖恩未移用臣不晚庶朝廷無內重外輕之失臣亦有先勞後祿之效進退始終良得其宜臣無任云云陳乞鄧州狀右臣聞理之安危固當殊體官之廢置孰可冒居竊念臣昨厠台司日瞻宸扆親承睿詔俯念邊防思得邇臣往分重寄臣既獲聞命因敢請行遽將宣慰之恩來安屯戍之旅臣以戎情未測備預當嚴願領一藩兼按四路欲將臣與韓琦所上邊䇿躬親施行尚蒙朝廷付兹職任臣自到豳土已逾半年復以前䇿奏陳庶逃尸素朝廷以彼戎欵順方用柔懷不欲修威恐成生事臣之所上必可寢停今又覩朝㫖據鄜延路奏所定疆界並巳了當仰保安軍鎮戎軍榷務通行博易者事或寧靜理當改更其陜西邊事自有逐路經略使處置惟此四路安撫司今後别無事務欲乞朝廷指揮廢罷臣則宿患肺疾每至秋冬發動若當國有急難之時臣不敢自求便安且當勠力今朝廷宣示西事巳定况邠州元係武臣知州伏望聖慈恕臣之無功察臣之多病許從善地就訪良醫於河中府同州或京西襄鄧之間就移一知州取便路赴任示君親之至仁從臣子之所望實繄聖造得飬天年臣無任瞻天望聖云云與李宗易向約堪任清要狀准御史臺牒准慶曆八年五月十四日勑節文於內外升朝官曾任通判成資以上人內堪任清要任使者各同罪保舉二名並須歷任無公私過犯及不是見任兩府并自巳親情方得奏舉或雖公罪杖以下情理輕亦許論薦者右謹具如前臣伏見知絳州職方貟外郎向約生相輔之家而能專儒學謹官業廉貧苦節愼靜寡過臣前知潤州日約為通判備見操守後來纍次為郡皆有理績推舉甚衆未䝉奬擢知光化軍屯田貟外郎李宗易天禧三年進士第九人及第素負詞雅居常清愼有靜理之才無躁進之跡今在鄰屬稔聞治狀人憂其去吏不敢苛此二人者久於揚歷各有行實並堪充清要任使如朝廷擢用後犯入已贓臣甘當同罪即不是見任兩府并自巳親情歷任並無私罪內有公罪者亦係杖巳下情理不重謹具狀奏聞伏候勑㫖舉張諷李厚充青州職官狀伏奉勑命就差知青州兼安撫使巳到任訖今具合奏辟官二貟如後一前御史臺主簿張諷文學懿瞻履行純雅未升科進的有才稱欲乞朝廷采於清議推以異恩特賜召試授一出身差簽署青州觀察判官㕔公事新注下正官王嘉祥即今未到乞勘㑹京東路節鎮别除一處一鄧州南陽縣主簿李厚進士出身素有文行涉道且深到任巳成一考見權鄧州職官欲乞朝廷特除權青州兩使推官兼管句安撫司機宜文字節度推官近新到任乞移側近州郡如難得闕即乞許令安撫司差權見闕官處句當所貴不住俸給况本路見闕官數貟右謹具如前臣受國寄任日憂曠闕或得此二人助其不逮庶無敗事如朝廷擢任後犯入已贓及不如舉狀臣並甘當同罪謹具狀奏聞伏候勑㫖薦李覯并録進禮論等狀右臣聞古之明王坐以待旦旁求俊乂蓋將盡天下之才成天下之務故為臣者以舉善為忠亦將竭知人之明副待旦之意也臣親逢聖旦嘗忝輔臣輒慕前修之為少答非常之遇臣伏見建昌軍草澤李覯前應制科首被召試有司失之遂退而隱竭力飬親不復干祿鄉曲俊異從而師之善講論六經辨博明逹釋然見聖人之㫖著書立言有孟軻楊雄之風義實無愧於天下之士而朝廷未賜采收識者嗟惜可謂遺逸者矣臣竊見往年處州草澤周啓明攻於詞藻又江寧府草澤張元用及近年益州草澤龍昌期並老於經術此三人者皆蒙朝廷特除京官以示奬勸臣觀李覯於經術文章實能兼富今草澤中未見其比非獨臣知此人朝廷士大夫亦多知之臣今取到本人所業禮論七篇明堂定制圖序一篇平土書三篇易論十三篇共二十四篇為十卷謹繕寫上進伏望聖慈當乙夜之勤一賜御覽則知斯人之才之學非常儒也其人以母老不願仕官伏乞朝廷優賜就除一官許令侍飬亦可光其道業榮於閭里以明聖人在上下無遺才若不如舉狀臣甘重受朝典謹具狀奏聞伏候勑㫖進故朱宷所撰春秋文字及乞推恩與弟置狀右臣伏見故祕書丞集賢校理朱宷幼有俊材服膺儒術研精道訓務究本源越自經庠擢升文館力學方起美志未伸不幸夭喪深可嗟悼寀春秋之學為士林所稱有唐陸淳始傳此義學者以為春秋之道久隱而近乃出焉寀苦心探賾多所發揮其所著春秋指歸等若干卷謹繕寫上進乞下兩制詳定如實可收采則乞宣付崇文院又念其人家道貧窶妻息孤窮有親弟置亦習儒業未登祿仕伏望聖慈特霑一命况寀曾任府界提點偶緣病罷别無過犯中前監察御史梁堅蔡禀等亡後亦蒙録用子孫體例頗同不為僥幸以彰聖朝旌録儒學使其孤幼不墜丘壑亦天地之造也干冒宸嚴臣云云陳乞潁亳一郡狀右臣輒陳危悃上黷高聰逖仰雷霆不任淵谷切念臣涉道至淺賦財本下爰從孤宦首被聖知自謂得君未嘗避事險易一志周旋四方今守東齊方靣亦重救災禦寇敢不盡心而年高氣衰日增疾恙去冬巳來頓成羸老精神減耗形體尫弱事多遣忘力不支持其青州常程公事巳牒通判職官發遣其安撫一路九州軍兵馬公事繁多至於郡縣利害鄉川寇盜皆禀本司指縱自臣抱病句管不前上無以分宵旰之憂下無以逃尸素之誚惟是奏報文字臣則竭心勉率亦多稽緩揣巳量力實不自安伏望聖慈於潁亳二州就差臣一處所貴間慢少事可以養疾庶安朽質少保殘年仰祈洪造之私惟誓丹衷之報臣無任云云論西京事冝劄子臣近親奉德音以孔道輔曾言遷都西洛臣謂未可也國家太平豈可有遷都之議但西洛帝王之宅負關河之固邊方不寧則可退守然彼空虛巳久絶無儲積急難之時將何以備冝以將有朝陵之名漸營廪食陜西有餘可運而下東路有餘可運而上數年之間庶幾有備太平則居東京通濟之地以便天下急難則居西洛險固之宅以守中原易曰天險不可升地險山川丘陵王公設險以守其國此之謂也先王修德以服遠人然安不忘危故不敢去兵以恃德也陛下內惟修德使天下不聞其過外亦設險使四夷不敢生心此長世之䇿也伏望聖慈未煩下議且留聖意可俟臣口對不備謹再具狀奏聞論復併縣劄子臣伏覩赦書節文西京河陽管界諸縣近經併廢頗聞人民不便並特令依舊臣去年秋才入中書蒙聖慈差中使催臣言事臣首陳七事內一事為天下民困由吏役煩重如西京在後漢時三十七萬戶置二十縣唐㑹昌中十七萬戶置十九縣今有五萬六千戶尚置十九縣是戶口十分去七而縣額如舊吏役不減安得百姓不困哉後漢光武詔天下併減四百餘縣此治世之規可舉為法臣請先於西京減併縣分以省吏役奉聖㫖下范雍并本路轉運使密切相度聞奏尋據范雍夏安期等奏相度西京縣邑衆多人戶差役頻併今來減縣邑為鎮實亦利便除山險空逈地里濶遠及陵寢所安難為廢罷外乞併作十三縣委得允當别無妨礙尋䝉朝廷依奉降勑施行訖約計減役人一千五六百戶巳放歸農官貟亦巳省罷訖竊聞後來有臣僚上言或稱縣尉檢覆地遠且逐縣界分俱不及百里如南方縣分有三二百里者亦只一貟縣尉以此方之甚不遙遠或稱却費軍人守把其守把軍人即非旋有招置並是本府宣毅兵士在本府中亦須請受或稱酒稅虧額今體問得逐鎮比舊日却有增盈其所上言皆非害民之事況無實狀只是坊郭物力之人恐産業間慢或逐縣公人中有巢穴巳成不願更改者因兹妄說不便扇搖人情致臣僚誤有採聞形于奏牘朝廷未深窮究便以為然改巳行之命特作霈恩而不知一千五六百戶免役之家重加勞擾殊非霈恩之意只是坊郭物力之人縣邑狡猾之吏遂其志願僥幸歡呼必有作感聖恩道場以惑朝聽者其鄉川之民弃農就役復為愁苦是害其本而徇其未也且光武之朝詔下併四百縣何號令之行無敢沮者今朝廷止併六縣而號令巳出敢有沮言是國家命令不行於外恩澤不逮於民矣國政如此則天下無事可行皆欲守因循之弊弊不可救亂所由生且西京在漢時三十七萬戶置二十縣今五萬六千戶置十九縣其吏役勞擾亦甚明白非隱昧之事臣為近輔請行此令者蓋欲蘇息窮民且非利巳緣親奉德音并降中使促令論列時事非臣輒有改易况典故甚明非出自􅎍臆如上言不當乞朝廷直行黜罷不銷重擾生民而沮此一議若轉運使等定奪不當亦乞朝廷駮下不當事件特行勘問明示責降自然利害分别中外無疑臣本上言之人如不黜罷其元定奪之官又不勘問却將重擾生民之事作恩宥施行於體不便不知令諸縣仍舊惠及何人臣為朝廷惜此一舉使天下無復有省役息民之聖伏望聖慈指揮西京未得追擾放役之人别候朝廷指揮更年歲間利害既明謗議自息所以懇懇上言者忝為輔臣知利害不能執守則國家之惠必不能行生民之弊亦不能去儻朝廷以臣僚上言為是以臣所言為非即乞依臣所奏早加勘劾速行降黜臣即方敢伏罪不復論列取進止乞修京城劄子臣危言孤立久荷聖知當此旰􅉴之憂豈可循默自守雖言而無取亦以盡臣子之心臣先於景祐三年五月𥘉在開封府曾進劄子言西洛帝王之宅絶無儲蓄乞聖慈以將有朝陵為名使東道有餘則運而西上西道有餘則運而東下數年之間庶幾有備太平則居東京舟車輻湊之地以便天下急難則守西洛山河之宅以保中原當時臣言西洛可營者以備急難也今北事既動營洛巳晚臣今别有愚見請一二以陳之臣竊聞修建北京以禦大敵以臣料之可張虛聲未可為倚何哉河朔地平去邊千里胡馬豪健晝夜兼馳不十數日可及澶淵陛下乘輿一動千乘萬騎非數日可辦倉卒之間胡馬已近欲進北京其可及乎此未可一也又承平巳久人不知戰聞寇大至羣情憂恐陛下引憂恐之師進涉危地或有驚潰在瓜牙之臣誰能制之此未可二也又北京四靣盡平絶無險扼之地儻乘輿安然到彼而胡馬旁過直趨河南於澶淵四向乘凍而渡京師無備將何以支宗廟社稷宫禁府庫皇宗戚里之屬千官百辟之家六軍萬民血屬盡在無金城湯池可倚無堅甲利兵可禦陛下行在河朔心存京師豈無回顧之大憂乎此未可三也假使大河未凍寇不得渡而直圍守澶淵聲言向闕以割地㑹盟為請當此之時京師無備胡塵俯逼陛下能堅守不動而拒其請乎唐明皇時祿山為亂舊將哥舒翰引四十萬兵屯守潼關請不出戰且以困賊楊國忠促令討賊戰大敗遂陷長安今京師無備寇或南牧朝廷必促河朔諸將出兵截戰萬一不勝則有天寶之患朝廷將安往乎昔煬帝盤逰淮甸違遠關中唐祖據之隋室遂傾明皇出幸西蜀非肅宗立于朔方天下豈復為唐矣德宗欲幸益部李晟纍表乞且幸山南以係人心乃知朝廷萬邦之根本今陜西河北聚天下之重兵如京師搖動違遠重兵則姦雄奮飛禍患四起臣聞天有九關帝居九重是王者法天設險以安萬國也易曰天險不可升地險山川丘陵王公設險以守其國正在今日矣臣請陛下速修東京高城深池軍民百萬足以為九重之備乘輿不出則聖人坐鎮四海而無順動之勞鑾輿或出則大臣居守九重而無回顧之憂矣彼或謀曰邊城堅牢不可卒攻京師坦平而可深犯我若修完京師使不可犯則是伐彼之謀而沮南牧之志矣寇入之淺則邊壘巳堅寇入之深則都城巳固彼請割地我可弗許也彼請决戰我可勿出也進不能為患退不能急歸然後困而撓之返則追之縱有抄掠可邀可奪彼衰我振未必不大勝也此陛下保社稷安四海之全䇿矣或曰京師王者之居高城深池恐失其體臣聞後唐末契丹以四十萬衆送石高祖入朝而京城無備閔宗遂亡石晉時叛臣張彥澤引契丹犯闕而京城無備少主乃陷此皆無備而亡何言其體哉臣但憂國家之患而不暇顧其體也若以修完城隍為失體不猶愈於播遷之禍哉朝廷大臣百辟必曉此事但懼議者謂其失體而不敢言臣任在西陲非當清問而輒言此事誠罪人也然臣子之心豈敢忘君親之憂况臣素來愚拙惟知報國而不知其受謗矣昔奉春君負販之夫勸高祖都關中而張良贊之翌日命駕臣叨預近列而輒建言比之奉春之僣未甚為過至於西洛帝王之宅太祖營修蓋意在子孫表裹山河接應東京之事勢連屬關陜之形勝又河陽據大川之險當河朔河東㑹要為西洛之北門又長安自古興王之都天下勝地皆願朝廷留意常委才某重臣預為大備天下幸甚干犯聖威臣無任云云又臣近覩邸報有北使到闕遠近稱慶及見逐處關報事宜却言西北兩界各大點集比疑北使之來未甚誠實以四十年之恩信無故動搖恐非有限之貨能足無厭之心此可大為之防盟誓不足倚也戎情翻覆自古非一臣竊覩朝廷未修東京而先修北都臣謂東京根本也北都枝葉也雖先朝曾有北都之行當時有宿將舊兵嘗經大敵然猶上下憂疑盤桓而進今太平巳久人情易動又無宿將舊兵不可不過慮也臣見邊上將佐軍旅耻言不武爭乞效命及其臨敵十無一勇臣恐駕前諸班武士務誇膽勇有誤陛下昔漢樊噲對上曰臣願得十萬衆橫行胸奴中季布叱曰噲可斬也昔胸奴圍高帝於平城漢兵三十二萬噲時為上將軍不能解圍今言以十萬橫行是靣謾也今陛下自顧左右將軍有如樊噲者乎臣昨上言請修京城冝持重而不動者蓋為此也若將巡幸北都臣謂有可慮之事者五願陛下思之臣三四年來聞人所傳契丹造舟安輪遇陸可載遇川可濟如南牧而來於滄德之間先渡黃河取鄆濮而襲我京城陛下虛往北京而寇入東路此可慮之一也又宗廟社稷皇宫戚里千官百辟六軍萬民之家盡在京師而城池無備寇或大至將何保守此可慮之二也若巡幸北京六軍盡出回顧京師億萬之中或有姦凶竊發為亂陛下之心能安於外乎此可慮之三也假使鑾輿未出寇逼澶淵聲言向闕有割地之請既京師無備朝廷能拒其請乎此可慮之四也又胡馬之來必數十萬其河朔之兵當須持重如京城無備畏彼深入必促重兵與之决戰萬一有哥舒之敗則社稷為憂此可慮之五也願陛下必修京城可禦大患况天子之城古有九重之號未聞以不嚴不固而為國體也能嚴且固則上自宗廟社稷下及百萬之衆可安堵矣陛下乘輿不煩順動矣雖寇入東路不得而襲矣彼扣澶淵有割地之請可拒而弗許矣彼求决戰可戒諸將持重而勿出矣彼知京師有備大軍持重則南牧之志不得而縱足以伐其謀矣而復鋭則避之困則擾之夜則驚之去則躡之因其隙而圖焉皆須京師大固然後能行其䇿近代戎狄為京師之禍者數四矣不可不大為之防易曰王公設險以守其國此先聖之訓非臣之所能言也惟聖鑒裁之乞召還王洙及就遷職任事劄子臣聞國家求治莫先於擢才臣之納忠無重於舉善臣竊見工部貟外郎直龍圖閣新差知徐州王洙文詞精贍學術通博國朝典故無不練逹搢紳之中未見其比以唐之虞世南先朝之杜鎬方之不甚過也臣在中書日洙曾求知越州時章得象以下並言朝廷每有典禮之疑則問此人必見本末豈當許就外任遂不行所請尋以撰成國朝會要一百五十卷蒙恩進直龍圖閣依舊天章閣待講仍賜金紫以旌稽古之能也後以赴進奏院筵㑹乃在京諸司常例得從一日之休徒以橫議中傷例譴居外三經赦宥未蒙召還恐非聖朝棄瑕采善之意臣近見此人來知襄州復能精勤政治庶務修舉清簡和恕吏民樂康乃知其才內外可用自任工部貟外郎巳及六考不求磨勘直龍圖閣亦又四年未曾遷改伏望聖慈不以人之小纍而廢其大善如朝廷采鴻儒碩學以備詢訪則斯人之選為中外所服矧有懿文可以發明議論潤色訓謨欲乞特賜召還儀表臺閣儻朝廷意切生民重其外𥙷則乞就遷近職别領大藩使搢紳之列知稽古有勸為善弗掩實聖政之端也臣嘗叨近輔知無不言况襄鄧鄰封稔聞善治或不如舉狀臣受上書詐不實之罪如朝廷擢用後犯入巳贓臣甘當同罪取進止范文正公集卷第十九
