front:
  text: 范文正公集卷第十五
  hash: sha256:2323cccf9e2fa711cff4358251e01e71a0d3af09f94a93fe9b41c1b4feae4e59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_015-1a}
body:
  text: 代胡侍郎乞朝見表臣某言今月日奉勑就差臣知杭州仍放朝辭取便路發赴本任者祗膺寵命伏積震兢臣某中謝竊以寧海鉅邦生聚十萬牧守之重豈臣克堪矧爲晝繡之行再領宵衣之寄始終極幸進退甚榮臣方理輕裝即趨便道敢有再三之瀆庶傾萬一之誠竊念臣才不逮人遭逢有素束帶從事四十餘年荷三朝之奬知歷二省之清要職叅仙殿位亞秋卿禄賞𬒳于子孫名級顯於中外報國無狀殺身何成今復還父母之郷邦逼桑榆之晷刻解冠告老決在此行久事朝廷乍越江海無復瞻望咫尺對􅏡清光雖小人之心固多懷土而疲馬之志寜莫戀軒臣欲於京城就兩浙舟船載家赴任伏望聖慈暫許臣入謝雲天少叙平生之感退歸郷里永爲萬足之心頼君父之推恩庻人臣之畢願干冐宸極臣無任云云睦州謝上表臣某言臣昨奉勑差知睦州軍州事巳到任交割勾當者獻言罪大輙効命於鴻毛宥過恩寛逈廻光於白日事君無遠爲郡甚榮臣某中謝恭惟皇帝陛下天德清明海度淵黙撫群龍而宅吉念六馬而懷驚臨軒以來仄席不暇思啓心沃心之道奨危言危行之臣萬㝢咸歡九門無壅臣腐儒多昧立誠本孤謂古人之道可行謂明主之恩必報而况首膺聖選擢預諫司時招折足之憂介立犯顔之地當念𥙷過豈堪循黙昨聞中宫揺動外議喧騰以禁庭德教之尊非小故可廢以宗廟祭祀之主非大過不移初傳入道之言則臣遽上封章乞寢誕告次聞降妃之說則臣相率伏閤冀回上心議方變更言亦翻覆臣非不知逆龍鱗者掇韲粉之患忤天威者負雷霆之誅理或當言死無所避蓋以前古廢后之朝未嘗致福漢武帝以巫蠱事起遽廢陳后宫中殺戮三百餘人後及巫蠱之災延及儲貳至宣帝時有霍光妻者殺許后而立其女霍氏之釁遽爲赤族又成帝廢許后呪詛之罪乃立飛鷰姊妹妬甚於前六宫嗣息盡爲屠害至哀帝時理之即皆自殺西漢之祚由此傾㣲魏文帝寵立郭妃譛殺甄后𬒳髪塞口而葬終有反報之殃後周以虜庭不典累后爲尼危辱之朝不復可法唐髙宗以王皇后無子而廢武昭儀有子而立旣而摧毀宗室成竊號之妖是皆寵衰則易揺寵深則易立後來之禍一一不善臣慮及幾㣲詞乃切直乞存皇后位號安於别宫暫絶朝請選有年德夫人數貟朝夕勸導左右輔翼俟其遷悔復于宫闈杜中外覬望之心全聖明終始之德且黔首億萬戴陛下如天皇族千百倚陛下如山莫不雖休勿休日愼一日外采納於五諫内彌縫於萬機而況有犯無隱人臣之常靣折庭諍國朝之盛有闕即𥙷何用不臧然後上下同心致君親如堯舜中外有道躋民俗於羲皇將安可久之基必杜未然之釁上方虚受下敢曲從旣竭一心豈逃三黜伏蒙陛下皇明委照洪覆兼包贖以嚴誅授以優寄郡部雖小風土未殊靜臨水木之華甘處江湖之上但以肺疾緜舊藥術鮮功喘息奔衝精意牢落惟頼高明之鍳不投遐遠之方抱疾于兹爲醫尚可苟天命之勿損實聖造之無窮樂道忘憂雅對江山之助含忠履潔敢移金石之心仰戴生成臣無任云云蘇州謝就除禮部貟外郎充天章閣待制表臣某言伏䝉聖恩特授臣前件官充職者渙渥自天震惶無地改中臺之華序進内閣之清班盡出髙明殊登祕近臣中謝竊念臣發自顔巷賔于舜門一第爲榮四方無效爰自書林預選桂籍升華耻汩没以懐安或感激而論事惟慕古人之節詎希英主之知伏惟皇帝陛下禀帝堯之聰明加漢高之豁逹坦聖懐而虚受期鴻化以咸孚念三聖之艱難而成丕業求七人之蹇諤以𥙷大猷臣獨愧非才首當清問危言多犯孤立自持斧鉞居前雷霆在上敢避樞機之禍終乖藥石之良陛下日月垂光江海敦量恕其萬死假之一麾望已絶於青雲咎未更於鴻霈俄易藩宣之寄寧分旰􅉴之憂忽降綸章荐加寵數而况闢圖書之府切處於深嚴踐雲龍之庭當備于顧問非名儒而不稱豈曲士之能堪矧簉清曹仍居舊治輝榮大集志願何求敢不内守朴忠外修景行進退惟道尊聖賢視履之方始終一心副君父育材之造臣無任云云饒州謝上表臣某言昨奉制命落天章閣待制守本官差知饒州巳到任禮上訖狂愚之誠進多冐死仁聖之造退亦推恩守土非輕報天無所臣中謝竊念臣出自畎畒階于搢紳驟升天閣之㳺親委王畿之政臣至孤難立屢請弗諧眷寵旣隆𥙷報宜異必將危墜猶或建明處事未精發言多率智者千慮而有失愚臣一心而豈周情雖匪他罪實由巳然而有犯無隱惟上則知許國忘家亦臣自信伏䝉皇帝陛下惟天爲量無大不容與日垂光何㣲弗照止削内朝之職仍分外𥙷之符當死而生自勞以逸君恩彌重臣命愈輕敢不動靜三思始終一志此而爲郡陳優優布政之方必也入朝增蹇蹇匪躬之節庻從師訓無負天心瞻望闕庭臣無任潤州謝上表臣某言奉勑移知潤州巳赴禮上者幽遠之誠未嘗聞逹高明之鍳俄復照臨臣中謝伏念臣起家孤平蒙上奨拔置於清近之列授以浩穰之權聖惟知人臣則辱命徒竭誠而報國弗鉗口以安身言渉大臣議當深典可無退省抑有所聞汲黯漢之直臣甞䟽公孫之短裴度唐之名相亦陳元稹之非斯實忠良豈無䜛毁臣聞孔子曰天下有道政不在大夫前代國家或進退群臣聽決大事若出於君上則中外自無朋黨左右皆爲腹心若委於臣下則威福集於私門禍釁積於王室故三桓興而魯弊六卿作而晉分徃古興亡鮮莫由此孔子之論昭昭不誣是以君道宜疆臣道宜弱四瀆雖大不可受百川之歸五星雖明不可代太陽之照臣按太易之義坤者柔順之卦臣之象也而有履霜堅氷之防以其隂不可長也豐者光大之卦君之象也而有日中見斗之戒以其明不可㣲也臣考兹前訓慮於未萌當危言危行之秋有寖昌䆮㣲之說謂大臣乆次在進退而得宜謂王者萬機必躬親而無倦揔擥綱柄博延俊髦議治亂之本根求祖宗之故事政慘舒而自我物榮悴而如天人心不在於權門時諭盡歸於公道朝廷惟一宗廟乃長臣之所言殊未盡意重煩上聽再貶遠方削天閣之班資奪神州之寄任重江險惡盡室顚危人皆爲之寒心臣獨安於苦節蕭望之口陳災異蓋無負於本朝公子牟身處江湖徒不忘於魏闕未知死所敢望生還伏䝉陛下九日垂光八風廻力察臣有犬馬之志恕臣無塵露之勞特出聖衷稍遷便郡茁如行葦保於勿踐之仁鑑若鳴桐脫彼在焚之患敢不長懷霜㓗至効葵傾進則持堅正之方冐雷霆而不變退則守恬虚之趣淪草澤以忘憂上副聖知下逃群責臣無任云云延州謝上表臣某言伏望勑命就差臣兼知延州軍州事巳到任交割管勾訖討伐之秋委寄方重豈繄懦品可副聖憂臣中謝竊以延水極邊東夏雄屏控黠虜之衝要歷大臣之鎮臨范廷召出師於塞門向敏中移節於京兆斯爲劇任曷在匪人況經侵軼之虞彌藉緝綏之政宿兵旣盛爲地可知臣職貳統戎志存殄㓂所冝盡瘁敢昧請行自薦老成固慙於漢將誓平此賊詎擬於唐賢伏䝉皇帝陛下曲徇微忠亟頒成命寛其無狀用之弗疑臣夙夜敢寧奔馳罔暇刻時莅事翌日興師庻牽制於戎心仍掩襲於邊路大軍巳出中使聿臨不謂孱謀偶符睿筭所期克勝少慰焦勞重念百姓屢驚體當招撫五兵久戢務在訓齊如治亂繩必期於耐事先除害馬亦假於行權仰頼聖威即紓邊患臣無任云云謝降官知耀州表臣某言䝉恩降授臣尚書戸部貟外郎依前充龍圖閣直學士知耀州者實負大尤尚從寛宥雲天之覆頂踵何酬臣中謝竊念臣才本迃踈識非機敏屢由狂率自取貶放朝廷以邊有擾動是使愚使過之秋㣲臣以國有急難當忘家忘身之報自膺寄委罔敢遜避而力小任重智小謀大勞心巳竭處事逾乖苟利國家不恤典憲宜及於禍以貽厥羞伏蒙皇帝陛下日月照㣲天地包廣謂千慮之智猶有一失萬物之材固無全用軫兹孤弱播于生造削其官足使明大戒存其職足使思後圖臣敢不更勵疲駑愈加修省庻陳纎芥之効上荅高明之私臣無任云云耀州謝上表臣某言伏奉制命降授戸部貟外郎依前充職知耀州巳到任禮上訖雷霆之威足加死責天地之造曲致生全臣中謝竊念臣運偶文明世專儒素靡學孫吳之法聇道相文之事國家以西陲搔動之際起臣貶所特加奨用臣自知甚明豈堪其任但國家之急不敢不行自兼守延安莫遑寢食城寨未謹兵馬未精日有事宜處置不暇而復虞内應之患發於邊城或反間之言行於中國百憂具在數月于兹而方修完諸栅訓齊六將相山川利器械爲將來之大備不幸昨者高延德來自賊庭求通中國之好其僣僞之稱即未削去臣以朝廷方命入討豈以未順之欵送于闕下此不可一也或送于闕下請朝廷處置又恐荅以詔㫖則降禮大甚若屏而不荅則阻絶來意此不可二也兼慮詐爲欵好以殆諸路之兵苟輕信而納之賊爲得計此不可三也又寳元三年正月八日曾有宣旨今後賊界差人齎到文字如依前僣僞立便發遣出界不得收接臣所以却令高延德廻去仍諭與本人湏候禮意遜順方可聞于朝廷亦巳一靣宻奏臣又别奉朝㫖依臣所奏留鄜延一路未加討伐容臣示以恩意歲時之間或可招納臣方令韓周守在邊上探伺彼或有進奉之意即遣深入曉諭適㑹高延德到來堅請使介同行況奉朝㫖許臣示以恩意乃遣韓周等送高延德過界以系其意或未禀承則於臣爲耻於朝廷無損及韓周等廻且言初入界時見迎接之人叩頭爲賀無何前行兩程便聞任福等有山外之敗去人沮氣無以爲辭賊乃益驕勢使然矣其廻來文字臣始不敢開封便欲進上都鈐轄張亢懇言曾有朝㫖若得外界章表湏先開視及僣僞文字應有辭渉悖慢者並湏隨處焚毁勿使騰布臣相度事機誠合如此章表尚令先開況是與臣文字遂同張亢開封視之見其挾山外事後辭頗驕易亦有怨尤與賀九言齎來文字意度頗同非戎狄之能言皆漢家叛人所爲枝葉之辭也恐上黷聖聰或傳聞于外爲輕薄輩增飾而談有損無益臣尋便焚毁只存書後所求通好之言及韓周等别有劄到邀求數事並巳納赴樞宻院今於涇原路取得寳元二年七月十四日聖㫖劄子一道並如張亢之言其所來文字果合焚毁則臣前之措置皆應得朝廷處分唐相李德𥙿與將帥王宰書爲㳺奕將收得劉稹章表悖慢無禮不便毁除令向後得賊中文字所在焚之亦與今來意合其劄到數事内一事如臣所諭取單于可汗故事欲稱兀卒以避中朝之號此大事稍順餘皆可與損益儻朝廷欲雪邊將之耻當振皇威大加討伐亦繫朝廷熟議必持重緩圖之或朝廷欲息生民之弊屈一介之使重論利害苟能聽服亦天下之幸也臣前所措置於此二道並未有妨然以臣之愚處兹寄任豈得無咎何敢自欺伏蒙皇帝陛下至仁廣度不欲彰臣子之惡特因此量行薄責斯天之造也臣之幸也臣敢不夙夜思省進退揚厲犬馬有志曾未施爲日月無私尚兹臨照臣無任云云乞小郡表臣某言臣聞先民有言曰陳力就列不能者止臣下之通規也進人以禮君親之盛德也臣仰逢明聖俯念拙艱撫此病軀敢期生造臣中謝竊念臣前在饒州日因學行氣而有差失遽得眩轉之疾對賔客忽倒不知人事尋醫救得退自後久坐則頭運多務則心煩昨在延安數曾發動戎事方急雖死難言及降罷之後猶乞專領邊城蓋欲竭心豈敢避事無何赴任耀州以炎熱之期歷渉山險舊疾遂作近日頗加頭目昏沉食物減少舉動無力勉彊稍難見於永興軍請醫官㸔治次其本州公事權交割通判發遣臣賦性本蒙處心至狹國家擢於清要有遇事輙發之尤寄以重難無思患預防之智言必取悔舉則敗官未踰數年實經三黜頻招物議屢黷宸聰費天力之主張由臣命之竒蹇矧念抱病何可貪榮處於善藩已多優幸帶玆近職深未遑寧伏望皇帝陛下推至仁之恩施曲成之化念其理歷出自遭逢特發聖衷不循朝例以臣學士之職改一庻官或且在當郡或於隨郢均汝之間守一小州庻獲安静尚圖痊瘉雖貪冐㣲禄詎逃病者之譏而遜避清班少緩有司之責儻形骸未頓藥餌有功則當再就驅馳上酬亭育臣無任云云代胡侍郎奏乞餘杭州學名額表竊以三代右文四郊立學尊嚴師道教育賢材𬒳服禮樂之風凖繩仁義之行功磨國噐標率人倫式致用於薦紳乃助成於聲教俊造以之冨盛基業由是緜昌至于唐家中外建學文物之盛三代比隆國家徇鐸敷文舞干布化四方庠序比之而興萬國英翹拳拳以勸臣伏見餘杭郡素爲善地蔚有秀民宜恢正始之風丕變輕揚之俗前知州李詔在任日重修宣聖廟建置學舎數十厦靣勢顯敞允爲儒宫足容絃誦之流逈處雲山之勝臣自出守此郡延見諸生據衆狀舉請曾到御前進士楊希堂領文㑹有二十餘人日課藝業其來不巳所益居多臣欲乞朝廷依天雄軍江寜府特賜州學名額用明勸導庻獲修長歲時不隳方俗可厚顔閔德行遠侔洙泗之間唐虞文章廣及江湖之上臣無任祈天俟命激切屏營之至范文正公集卷第十五
