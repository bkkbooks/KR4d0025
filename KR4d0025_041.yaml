body:
  text: 朝廷優崇古者一代帝王之興必尊禮昔賢以奬勸風俗文正公之勳德其在宋時固宜優禮至于皇元歲命郡守致祭省部諸司每有優恤范氏子孫之文於此見大朝之盛治所以培植風俗教化之意逺矣然則仕於是邦者盍亦體朝庭之意而加之優禮蓋所以為風俗教化之楷範而豈私於范氏置功德寺中書門下牒蘇州白雲寺右諫議大夫參知政事范仲淹劄子奏蘇州天平山有白雲泉南有寺寺中有刺史白居易詠白雲泉詩明古寺也臣本家松楸實在其側常令此寺照管准先降條貫應寺院及五十間巳上至乾元節並得賜額上件古寺屋宇巳應得條貫伏望特賜一名額取進止牒奉敕宜賜白雲寺為額牒至准敕故牒慶曆四年四月二十五日牒右諫議大夫參知政事范右諫議大夫參知政事賈刑部尚書平章事晏工部尚書平章事章觀察推官夏有章權節度推宫汪仲權節度掌書記蔡抗殿中丞通判軍州事朱夀隆著作郎直集賢院知軍州事呂溱原武鄭方平篆臨安錢德範書山門住持僧擇梧立皇祐元年夏四月初一日當寺講僧遇明建置祠堂浙西提舉司申照㑹說友蒙恩守吳懼無補報竊見先賢文正范公本郡人也道德文章功名事業載在國史實為我朝第一流人物身沒之後近二百年凡公過化之地無不尸而祝之獨本府未有專祠附庸學宫而巳其於崇祀勵賢見謂缺典郡雖窘乏而事關風化曷敢弗力乃卜范氏義莊之東義宅隟土鳩工度豺為屋六十楹以奉公祠仍撥沒官田土拘收租米充春秋二祀之費其祠密邇學道書院春秋二祀太守率其屬親涖及遇月朔則山長率諸生往拜焉先擇公之後賢者一人為掌祠若郡計稍舒别圖收教其子弟并以附于書院巳㳙九月十一日立木候成舍采奉安外所合具申朝省照會仍乞劄下本府照應伏候指揮省劄照得知平江府潛提舉申先賢文正范公本郡人也獨未有專祠今卜范氏義莊義宅之東隟土為屋六十楹以奉公祠仍撥沒官田畝拘收租米充春秋二祀之費巳㳙日立木候成奉安外申乞劄下本府照應合議行下右劄付平江府照應仍具所撥田畝數目尚書省准此咸淳十九年九月日與免科糴提領浙西和糴所據吳縣申具致范令公義莊田八百九十七畝每畝勸米三斗計米二百九十二石一斗呈奉台判范文正公義莊乃風化之所關與免科糴仍帖報兩縣收冊拘錢須至行遣右今帖吳縣勸糴官仰照所判速便拘收范令公青冊并糴本錢具狀一併差人解發赴所支納不得違滯嘉熙四年閏月日帖吳縣勸糴官提領浙西和糴所據長洲縣申具范令公義莊田二千二百七十一畝三角每畝勸米三斗計米六百八十一石五斗二升呈奉台判范文正公義莊乃風化之所關與免科糴仍帖報兩縣收册拘錢須至行遣右今帖長洲縣勸糴官仰照所判速便拘收范今公青冊并糴本錢具狀一併差人解發赴所支納不得違滯嘉熙四年閏月日帖長洲縣勸糴官祠設教諭省府范文正公祠照㑹本祠見闕訓導小學教諭一員今帖請李前職夢文充本祠教諭請照應日下供職具遵禀狀申至元十三年閏月日帖帖中書省劄差充平江府儒學教授兼學道書院山長提督范祠袁中書省劄差充平江府儒學副教授兼學道書院山長提督范祠石江浙等處行中書省據范士貴狀告年壯無疾係先賢范文正公嫡孫見充平江路學職兼管本族義莊義學勾當即目在天平山住坐先世文正公捨宅為路學作養人材置買義莊田養贍宗族及創義學以教子孫有墳山梯巳田地並隸本路屬縣亡宋時及歸附後俱蒙軫念先賢後代本處官司㑹驗舊例除納稅石外一切差役科折並行蠲免後因吳縣及長洲縣司吏朦朧科折糯苗士貴狀告本縣次經夲路俱蒙受理行下合屬改正止納一色造粳又於至元十十年六月內有各鄉里正人等欲將義莊與民田一例科助役米遂經本道宣慰司并按察司陳告蒙追索本路文卷撿照得范文正公置買上項田土初非私已正欲永逺養贍宗族子孫義所難及自前至今既不曽設著科役難同民田一例施行牒本路行下合屬除免間再具狀經行中書省陳告蒙受理行下本路照勘是實依上蠲免毋得科率違錯總府除巳遍榜合屬外又於二十年三月內經省府陳告給蠲免文據奉省府鈞㫖送浙西道宣慰司照勘依例施行母得違錯奉此蒙宣慰司照勘是實劄付本路行下合屬依例施行除免一應科役就便出給文憑付士貴收執照驗外近欽奉聖㫖節該在籍秀才做買賣納商稅種田納地稅其餘一切雜泛差役並行蠲免所在官司常加存恤仍禁約使臣人等毋得於廟學安下非理搔擾欽此凡是儒人既例蒙存恤蠲免況本家裔忝先賢世居吳郡先文正置立義莊義學以教養宗族凡冠婚喪葬咸有所助迄今三百年流傳不朽人皆慕之本處官司尚以義關風化每歲舉行祀典實與其他儒戶不同但士貴雖巳經行省陳告行下合屬蠲免止是本路備舉出給文憑付士貴收執切慮歲月深逺官吏更易仍不准行雷例科率搔擾告乞出給公憑事得此省府除巳行下平江路依例除免本戶雜泛差役外合行出給者右付范士貴收執准此為范士貴告科擾事至元二十七年月日江浙等處行中書省近據平江路申准本路總管董嘉議關伏見先賢范文正公世家吳郡勳德事業著在青史以地建學撥田養士實其創始吳士德之其三世祖父墳墓俱在本路管下皆封太師國公曾賜忠烈廟額每歲夲路致祭甚䖍置立義莊義學至今三百餘年規模如故若加旌表實為砥礪風俗之本移准江南浙西道肅政廉訪分司牒如准所言允當申乞照詳得此移咨中書省照詳去後今准回咨送據禮部呈照得至元三十一年四月准集賢院關備國子監呈范士貴狀告先賢范文正公六世孫提管本族義莊義學養贍宗族垂三百年世守弗墜歸附以來蒙官司軫念先賢之後除納稅石外依例與免差役後因司縣官吏更替不常其間不無動搖雖蒙江浙行省行下合屬欽依聖㫖事意蠲免一切差役及出給公據付士貴收執有長洲縣司吏仍復以和買為由攪擾不安終未有都省存恤明文司縣得以玩視告乞優加存恤施行本監參詳范文正公以文武全材實為當時之名相置買田宅養贍宗族足為後世之良規三百年來子孫猶在若加存恤實為聖元仁政伏乞照依先降聖旨除商稅地稅其餘一切雜泛禁止相應得此本院議得范文正公古之名相置買義田子孫世守不墜如准國子監所擬實為相應准此本部議得范文正公前代名臣置田贍族垂教後世不為無𥙷如准集賢院所擬移咨行省照勘如委係范文正公親族欽依聖旨除免雜泛相應具呈都省照詳去訖今奉前因本部議得宋相范文正公致君澤民之術具載方冊所設義莊義學資給宗人教育後裔至今規模不墜其於世教不為無補宜咨行省禁治諸人無得煩擾所司常加優恤外據旌表一節既有忠烈廟額似難别議具呈照詳得此都省咨請依上施行准此省府劄付平江路總管府依上禁治令所司常加優恤外合行出榜禁治諸人毋得煩擾所有榜文須議出給者右榜曉諭諸人通知大德年月日泰州據前安慶路儒學正朱景新謹呈切見西溪范文正公祠堂係是宋時天聖年間文正公監西溪鎮買納鹽倉之日因見瀕海田土𬒳海水侵鹹有妨耕種乃相度此地宜創捍海堰以救護良田遂作程度計料文書申覆上司逹知朝省就任遷范監倉知興化縣監督人夫創築捍海堰於西溪之東計長一百四十六里零六丈六尺其髙一丈其闊二丈為則用磚包砌截海水於外護良田於內自後海陵興化鹽城等縣田土皆得種蒔不特百姓有糧及諸鹽場亦賴以培養剪燒氣力者今三百餘年矣亡宋年時鄉人告於官而立文正公祠堂於西溪以報范公之德巳經年深至歸附後毁廢祠堂大德四年間前任海陵縣丞白將仕等收買屋料興復起蓋祠堂重新裝塑賢像彼時蒙海陵縣曽出榜文禁約諸人毋得沮壞祠堂一節今為年深前榜不在一等不畏公法之人在祠堂毀壞墻壁蹇潑糞草地上掘取泥土多端侵損即日再行修整若不呈乞出給榜文付祠堂張掛省諭諸人毋得似前沮壞誠恐日漸毁壞前代名賢遺迹不便據此合行具呈右泰州西溪書院禁約據前真州儒學學録朱景新狀呈切見泰州西溪范文正公書院昔因通泰兩州之地東臨大海每遇風濤大作直抵城下人𬒳其苦亡宋天聖間公監西溪鹽倉之日遂築捍海堰橫截潮水自後鹽農俱受其賜為此立祠於西溪歲時致祭積有年矣自歸附後廟貌頽圯逮今未整若不重為修理恐負上司美意今欲興工慮有一等不知禮法之人攪擾沮壞未便乞出榜禁約施行得此使州合行出榜如有違犯之人仰指名告官取問是實痛行斷罪所有榜文須至出給者大德五年二月日右泰州榜文中書省准河南省咨言泰州海陵縣西溪鎮前宋范文正公仲淹所建書院在焉當其還朝民為立祠以報其德經二百餘年至元歸附學遂廢弛大德間姜國英以巳財重建祠宇乞令本儒主領相應中書送禮部議既經夲道廉訪司體察舊有祠堂委係前賢合設書院宜從所請延祐二年月日朝廷優崇終
