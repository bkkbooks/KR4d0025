  text: 范文正公尺牘卷下
  hash: sha256:d6d5be033453901cade48392a01b9052642604e0ae1918839ef245a2517909e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_029-1a}
body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校交游與晏尚書伏自春初至項城因使人回草草上謝由頴淮而下越兹重江四月幾望至於桐廬回首大亳忽數千里日思奏記夐於無階恭惟蕃宣之居鈞體惟寧赫赫之瞻日以增重某罪有餘責尚叨一麾敢不盡心以求疾苦二浙之俗躁而無剛豪者如虎示之以文弱者如鼠存之以仁吞奪之害稍稍而息迺延見諸生以博以約非某所能蓋師門之禮訓也又郡之山川接于新定誰謂幽遐滿目竒勝衢歙二水合于城隅一濁一清衢江濁歙江清如濟如河百里而東遂爲浙江漁釣相望鳬鶩交下有嚴子陵之釣石方干之隱茅又群峯四來翠盈軒窻東北曰烏龍崔嵬如岱西南曰馬目秀狀如嵩白雲徘徊終日不去巖泉一支潺湲齋中春之晝秋之夕旣淸且幽大得隱者之樂惟恐逢恩一日移去且有章阮二從事俱富文能琴夙宵爲會迭唱交和忘其形體鄭聲之娛斯實未暇徃徃林僧野客惠然投詩其爲郡之樂有如此者於君親之恩知已之賜宜何報焉今有郡齋歌詩一軸拜獻庶明前言之不誣爾干瀆台嚴伏增戰懼尚逺門下伏惟尊崇爲國自重某啓伏惟叅政尚書台候起居萬福某伏自恩改蘇首捧鈞翰屬董役海上至還郡中災困之氓其室十萬疾苦紛沓夙夜營救智小謀大厥心惶惶久而未濟上答斯晩死罪死罪早以桐廬鄙述之仰黷台光伏蒙尚書不以隆墀之高而應諸遠壑不以隆鐘之大而納兹纎筵謂宣父聖師甞稱弟子之善邴吉眞相或矜小吏之狂緩其嚴誅寵以鈞什霈江海之宏潤被虹蜺之垂光夫何猥孱當此褒賜某謂葛覃芣苢微物也託于周召則不朽矣又蒙以新著神御殿頌㳺渦賦靑社州學記示於謏聞俾閱大範孰量童觀之明得預宗廟之美但當金口木舌以駕說至道之萬一爾如覘大禮閱廣樂豈能形容於造次哉遥瞻台屏伏惟尊崇爲國自重卑情不任榮懼感戴激切之至某再拜叅政尚書恭惟台候起居萬福某十七日至京諸公並未敢請見蒙賜誨言敢不佩戴瞻仰恩館伏惟爲國自重卑情祝頌之至與邵餗先生十月日右司諫祕閣校理知蘇州范某謹奉短書于先生邵公足下某今春與張侍御過丹陽約詣先生見維舟水邊聞先生歸山所謂其室則邇其人甚逺惘然愧薄宦之不高矣曁抵桐廬郡郡有嚴陵鈞臺思其人詠其風毅然知肥遯之可尚矣能使貪夫廉懦夫立則是有大功於名敎也搆堂而祠之又爲之記聊以辨嚴子之心决千古之疑又念非託之以奇則不足傳之後世今先生篆高四海或能枉神筆於片石則嚴子之風復千百年未泯其高尚之爲敎也亦大矣哉謹遣郡校奉此恭俟雅命諫院郭舎人某再拜舍人遞中得兄金玉之問情致雅遠如見古人恭惟遷諫司奉衮職忘雷霆之恐以報主蹈湯火之急以救時端人之言固有中矣某謂志於道者皆欲殺身成君及其少屏則信起獨善之又嘉江山滿前風月有舊眞賞之際使人愉然曾不知通塞之如何耶惟兄自重勿至相念王狀元某再拜狀元正言學士郵中得來敎喜可知也某四月半到郡重江亂山目不可際懷想朋戚寧莫依依而水石琴書日有雅味時得佳客相與詠歌古人謂道可樂者今夫信然惟閤下居喪食貧聚數百指前望高遠宜無動懷善愛善愛與石曼卿某再拜去冬以擕家之計駐羸東郊朋來相歡積飲傷肺頼此閑處可以偃息書問盈机修答蓋稀足下亦復懶發絶無惠問非求存慰欲知起居之好爾近詩一軸寄于足下與滕正言逹于諸公必笑我也與曹都官某再拜伏念天涯之遠聲應自接使介一至手筆爛然金石其辭雪霜見志斯足以使吾道拳拳矣其後進之狂者無明哲以保身交游之恩尚不爲輕况君父之知死而當報曁守桐廬郡大爲拙者之福朝廷念其無他移守姑蘇以祖禰之邦别乞一郡乃得四明以計司言蘇有水災俄命仍舊鄙陋之才未飽世務惟日夜謹事與衆協力庶幾萬一可濟耳願兄歸闕道出此郡接舊又所得將多至望惟以道自愛慰此善頌孫元規待制吾兄某伏自東南之役不復奏記于諸公誠以乆勞之人且欲宴息爾吾兄由簡在之知登于淸近薦紳畢賀吾道相榮首枉華音足慰素望何青雲之上亦莫我遺感抃感抃肺疾未愈頼此幽棲江山照人本無望以此爲多未拜覩間伏覬爲國自愛孫明復某啓正初奉邀東門之别翌日大寒未起舟人輙移足下之來固不可見至桐廬聞足下失意愕乎其且憂矣足下直方而孤非求榮之人甞言二代未葬勉身以進也天與其時一何吝歟此交友之情大鬱鬱然及得足下河朔二書且依天章公猶免屈於不知已者甚善甚善某至新定江山淸絕落魄以歌自謂得計及來姑蘇却修人事斯亦勞矣今在海上部役開決積水俟寒而罷足下未甞遊浙中或能枉駕與吳中講貫經籍教育人材是亦先生之爲政買山之圖其在中矣以來者衆未易他謀也之武公綽二君子皆持服在此冬景向嚴萬萬自愛滕子京某再拜遞中捧來記云出省後兩賜榮問一未甞至請䆒之執事入侍清光退奉慈聖可謂美矣某肺疾尚留酒量大減水邊林下略能清吟聊書一軸上寄并簡呈諫院門館諸公善知我之素爾李泰伯某白秀才李君在鄱陽勞惠訪㝷以改郡不敢奉邀今潤州初建郡學可能屈節教授又慮遠來難爲將家蘇州掌學胡瑗祕校見明堂圖亦甚奉仰或能挈家必有經畫請先示音爲幸保愛保愛某頓首秀才仁弟别來傾渴無巳想至仙鄉拜慶外無恙此中佳山水府學中有三十餘人講貫與監郡諸官議無如請先生之來必不奉誤誠於禮中大有請益處至願至願此地比丹陽又似閒暇可以卜居請一來講說因以圖之誠衆望也兒子在蘇州足下可能早來今冬欲行鄉飲俟先生講求也某白中間辱敎承巳拜恩命雖德業雅遠未稱人望而朝廷奬善鴻漸于時惟聦明精至曉之深矣未相會間千萬自愛自愛某巳受敕改青州見理舟行次希善侍加愛張文定某再拜端明安道諫議專使至特辱緘問以示恩意喜慰無量兼承居易以道處順而樂眞賢者養浩之宜矣某此中差煩亦且勉力未披覩間萬萬自重頒惠醇醖感刻感刻公人云到湖州陸行歸府别無以致慶州酥五斤封記全乞檢至韋老昨日鄧州同來宛丘因且在彼勾當深懼入川今得晏公辟在許田知録甚得所也極清健可愛運使錢刑部巳起韓學士應未到見提憲望致意或要此中物希示及陳水部某啓兒子歸知山陽禮上有少違和某亦爲風氣發動不得馳染人來特辱眞誨承體候安好至慰至慰彼此當路守任疲于煩撓惟勉旃自愛謝安定屯田范某謹齋意西嚮復書于先生安定公執事某自筮仕之初聞先生在諸侯幕中高風遠度巳與人異能禦彊族又甞正大夫見東夷人之禮國朝稱之自是籍籍有淸議於四方咸曰斯人立天子之庭其風義如何哉司命不仁乃病于先生胷中之奇屈盤虹蜺然猶不忘國家天下屢有抗奏天子嘉其意進以爲郞先生謂生平所存不得著行事而以言受爵非吾之心復卷而懷焉君子謂之有道某甞與先生接而見貽之書意愛甚隆非某之可堪也某早以孤賤荷國家不次之遇夙夜不遑思所以報故竭其誠心自謂無隱爾非有出入於人也今被罪而來尚有民人是亦爲政豈敢怠哉餘則閲書思道希古人萬一將無用於今則庶幾不忝下大夫之後而巳尚阻竒論惟善奉天倪爲禱屯田長者某攝行尹事日捧執事濮陽之書以因於聽決未遑修報旣出江表杳如天外近改丹徒又併獲雅間豈君子之心不改易棄而然也某念入朝巳來思報人主言事太急貶放非一然僕觀大過之象患守常經九二以陽處隂越位救時則王室有棟隆之吉九三以陽處陽固位安時則天下有棟橈之凶非如艮止之時思不出位者也吾儒之職去先王之經則茫乎無從矣又豈暇學人之巧失其故歩但惟精惟一死生以之閤下以良相之門瑚璉命器與國同其休戚自當觀群賢以經大運無孜孜一夫以隘其守焉甚善甚善未拜會間千萬保愛睢陽戚寺丞某啓知宰寺丞昨軒車之來誠喜奉見以困匱之日致禮不逮未能忘情徒自愧耳洎于回轅又失拜餞自至琴署諒敦清適有孫復秀才者一志干學方之古人不知歲寒何以爲褐非我長者其能濟乎擬請伊三五日暫詣門館惟明公與丁侯裁之造次造次慚悚慚悚小兒藥巳服兩日未應乞與差人問伊久服得否以何爲候又恐此藥宣取多則不勝其羸某再拜寺丞久違淸素之範頗增鄙吝之懷京塵多端驛音鮮寓慙悚慙悚伏想監守之外動履惟寧其如縻才識者奉惜某在館供職無所爲効嵇曰知巳東行所寄物必巳分明交付亦乞示諭貴眷各計萬福凝寒倍加保衛别期光寵虞縣中舎不及上狀望言達某白人來領書問知孝履無恙端居不易秋望如何許相次見訪更不云云惟多愛爲祝某再拜寺丞久闕致誠頗多渴義庠序之會漸有倫次見講春秋聽衆四十人試㑹亦僅三十人矣公之志也敢不恭乎今張兄貟外素爲交遊亦張知判之同年蓋丁憂累重不堪其憂前日清河云隨後便來故專投刺長者之性不能矯取惟執事禮之部夫將廻勞頓不易乞保重是望知府大卿某再拜知府大卿仁兄近辱眞誨伏承下車兖海起居休泰吾兄長厚仁政東魯民淳比之越上可偃息矣未期披會惟冀自重以符瞻禱某累患腹肚不早上記至悚至悚東道稍稔晩田㣲旱穀價向春亦應不下二浙淮南俱旱惟蘇湖有望而亦有旱處東山惟冦盗可虞常索用心與南中不侔鄭下今日得書甚安元規改徐州辭之不允他有餘力徐可治矣自家三人聚於杭越今俱來京東人事何定却時得通問也李倅希伸意不及書蔡欽聖殿丞某啓近辱手筆承動止安固示諭賢叔學士被楊儀牽累衆知無他昨日聞有袁州之命何至於此蓋衆被重譴然也人事難可擬議惟君子知命委時則可致遠而無悶他或歸許下般家即專差人賫書去如即遣人來挈家則望書中再三致意勉之未離京間不敢致書難爲辭也悉之悉之多愛某啓昨日至許下行次領眞誨承動止無恙兼示及省牓兒子與李教授謝家弟兄王七俱過省親識中得失相半更三五日必見春牓也漸遠風音黯黯爲戀惟多愛多愛工部同年某啓至西洛見蔡郞得工部同年書承在闕下起居康寜三二年中不易爲懷必能知命自遣雖有交親無益於事同年聦明渉道不淺且隨緣就一差遣却學道養性所得必多某謫宦中未甞動念此公之所諒今雖叨竊過量其風波恐畏無異當年頼朝廷寛厚未至顚覆樂天守道亦如鄱陽日未相見間萬萬自愛工部同年近日况味如何須是以道自樂榮利無窮千古困人章郇公非不稱意今柰之何兒息未辦事又無中饋大可傷痛傷痛巳差人去致祭明參復然以此不如知足樂道浮榮豈足道哉宅眷郎娘各計安毎每瞻渴瞻渴王源叔並知此中事更不煩云加愛加愛南陽著作某白辱手筆並悉雅意所留兵士巳於四月三日奏訖未有指揮前請聖節因勾當到州不至必修造了可來相會也多愛多愛知郡職方某諮上知郡職方特辱緘誨備見用心救濟甚善甚善一則朝廷重人性命二則恐姧惡軰誘而聚盗須頼州長焦勞使民感惠則無他慮也照悉照悉漸有暑候保重保重明賛善請他來要見青社的有饑民自四向鄉下萃來自春亦不得知也某再拜職方知郡仁兄遠辱誨音過形恩意承巳禮上實慰瞻言某雖屬謫宦幸得善地聽決之外琴籍在焉無見念也盛暑希保重邢推官巳替如寄家彼中乞照燭切少煩躁損氣傷神益爲災矣然人事多端其實由命天假手於人爾奉憂之心公必悉之其如參差無以爲力柰何柰何窮逹榮辱人事分别至終豈復異哉惟信道養性浩然大同斯爲得矣貴眷上下各安齋郞應未出官多愛多愛麞羓二箇紅薑四罐子聊表信意安撫内翰某再拜安撫内翰伏惟清重勞頓克臻萬福某昨日誥敕到降戸外帶職知耀州方當急難豈忍安逸今有謝表本并劄子藁上呈無他恐將來未免邊任不如便且在塞上所貴葺整不斷絕也猶恐不濟柰何罷去至秋冬危時又却臨邊何以處置此所以憂官榮即素無心豈以高下爲意乞諒之諒之翰長學士某再拜翰長學士伏惟起居萬福昨張去惑著作來捧眞誨備荷勤意欲其委順保全不宜擇處也某非不思之寒儒之家世守廉素恐門戶一變有勃入勃出之禍况邊上乏人且勉於從事或稍寧息或得將帥即有丘園之請以全苦節養生俟死此其志也俞㫖一下䰟神來復久而無營知非他望明公諒之近以北事渴見賢者今聞彦國之耗不復言之亦甚減憂未拜奉聞惟乞自重某再拜翰長學士伏惟起居萬楅近乹州袐丞至此言十三殿丞過備知風㫖某守邊如式但關輔之民被虐無際國本如此孰爲固之環慶籬落稍有倫序願得外計以救瘡痍或朝廷疑其欲觧邊務則尚可兼之經略皆得施行但去都部署招討之名耳爲國活民以植根本又不敢陳乞恐廟堂不悉其志復聞北事巳萌不勝憂蔡推官甚渴伊分減心力只爲舉辟二人巳許一貟不敢更煩朝議或且就一陜幕必祝計使請伊况知已甚多應不久次少年從事但輸忠力且勿以資級爲意即遠大也安撫大保某諮上安撫太保遠勞書問深荷意愛至節别膺寵異未言㑹間惟希保重示及並悉雅意甚善甚善凡有事務只請手字所貴易得還荅亦便於事也示及即日過郡不更多云寒澁道中多愛李節推某白近領手筆知十一月離穰下今想在道中寒雪奉親至是不易更令此畨人去以備乏使千萬勉旃善愛善愛通理虞部某啓近辱書示承動止安康咫尺未由奉謁徒深渴想長安近有書來甚樂彼也初寒自愛爲祝仲儀待制某啓昨日使臣回巳奉手削賢姪自陜來速於拜覲不敢駐留庶事必可上聞蔣得甚處希早示及保重保重某啓前日遣急足齎書并酒去必未達昨日邸報有人奉攻閻親不言再有責降不知何人之爲也臺刻頗深豈渉親黨或須理會亦當欵曲勿令悖戾昨來謝章有事觸權貴力排姦邪之語此必招怨濟箇甚事事所云投鼠傷器此實詣理而無害也愚曾落職南行當時滿朝見怒惟責已樂道未始動懷君子皆有通塞孔孟不能逃况吾輩耶寛中自愛自愛某於閤下爲罪人但長者深察本心乃敢奉勉悚悵悚恨專此不宣七郎去欲南中置少屋業耳禮制中更不遷居也走知之矣昔年持服欲歸姑蘇卜葬見其風俗太薄因思曾高本北人子孫幸預縉紳宜構堂乃改卜于洛思遠圖也吳中松楸有數房照管又與奏官似兩不失志仲儀以謂如何雖立賢無妨間傑之謂也中人則不能逃其俗其聞見然矣文鑒大師某頓首僕於僧萬千中得師之雅心期他年作金石遊師豈知我耶而遠書加勤願保清懿以副所懷某啓在饒日一殿侍來領問却令代還者奉書以道接千萬僧得師之意不知達否李道士聶支使來又得書并詩與有文者觀莫不賞其難得尚未知師之經術儒行然詩意幽遠如山中人巳可見其清矣某赴越上不似謫宦味多幸多幸未良聚間保愛保愛惠酒并藥劑多荷急足行未有奉答在維城間出入數年清吉得不有江湖之興否與朱校理某啓領問知雅意十六日𬒳㫖赴闕至二十二日與韓公同上五章爲邊事未寧防秋在近乞且留任必得俞旨入則功遠而未濟後有邊患咎歸何人軍民億萬生死一戰得爲小事耶俟其平定歸朝未晩如某則多病健忘無益於事如得一閑郡時復研慮陳述補益之事猶庶幾萬一或處急流顚沛可待識者當憫之矣柰何柰何翰長必巳安好近巳有書石先生芒角太高常宜寛之孫必巳回致意致意當時奉賛汝隂之請令一任淸滿足爲基址曾勸他余就洪守石就汶倅俱不聽直至惹禍亦勸力就小郡守不然須得一藩尋亦被桂王中諸事難爲今穰下活心閑耳靜幸事與田元均正月十八日某啓至郟縣見王助教領元均龍圖所賜教墨并誌文三夲不任感刻且承得請終制非大孝之節不奪孰能堅立持於雷霆之際耶仰服仰服端居蕭索惟道可依日扣聖門所得多矣某此去南陽亦且讀書渉道貴深退即自樂非升沉之可揺也拜見未期萬萬加愛與尹師魯七月十四日某啓熱中得回問知漢東尤甚然西洛上京皆苦熱宣下開井救暍者此可知矣三兩日來因雨微凉彼亦然矣折支巳差人許州般取到即走報不易不易請見錢者猶煎熬不足蓋日給外月月有橫費處家家如之邠酒四瓶近寄來請收檢鄧醖巳竭候新者送去合得花蛇散空心可日一服甚有功恐疑之和方寄上希多愛多愛不宣新牧舊識候到即有書去兼是棊侣也先託致意與季寺丞四月二十七日某頓首季寺丞行曾奉手削遞中亦領來教承動止休勝某此中無事兒子病未得全愈亦漸退減田元均書來專送上近得楊州書甚問師魯亦巳報他貧且安也暑中且得未動亦佳惟君子爲能樂道正在此日矣加愛加愛不宣右文正范公帖得之文定胡公家以刻于桂林郡齋栻聞君子言有教動有法其於文正公見之矣觀此帖雖一時書帖之間亦足以扶世教而垂後法非盛德者其能然乎敢敬誌之以詔來世淳煕三年元日廣漢郡張栻書右范文正公與其兄弟之書其言近而易知今之仕者得其說而謹守之亦足以檢身而及物矣然所謂自未甞營私者必若公之先天下之憂而憂後天下之樂而樂事上遇人一以自信不擇利害而趍舎然後足以充其名而其所論親僚友以絕壅蔽之萌禁防以杜姦私之漸者引而伸之亦非獨效一官者所當知也年新安朱熹書范文正公尺牘卷下先文正公尺牘舊刋于郡庠歲久漫漶今重命工鋟梓刋置家塾之歲寒堂期與子孫世傳之至元再元丁丑正月甲子日八世孫文英百拜謹識
