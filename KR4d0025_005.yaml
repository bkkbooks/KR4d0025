body:
  text: 易義乾上乾下內外中正聖人之德位乎天之時也德內也位外也九二君之德九五君之位成德于其內充位于其外聖人之德居乎誠而不遷有時舍之義故曰見龍在田德昭于中故曰利見大人天下文明君德也聖人之位行乎道而不息有時乘之義故曰飛龍在天位正於上故曰利見大人乃位乎天德於是乎位矣或者泥於六位之序止以五為君曾不思始畫八卦三陽為乾君之象也豈俟於五乎三隂為坤臣之象也豈俟於四乎震為長子豈俟重其卦而始見於長子乎明夫乾君之象既重其卦則有內外之分九二居乎內德也九五居乎外位也餘爻則從其進退安危之會而言之非必自下而上次而成之也如卦言六龍而九三不言龍而言君子蓋龍無乘剛之義則以君子言之隨義而發非必執六龍之象也故曰易無體而聖人之言豈凝滯於斯乎咸隂進而陽降兌隂卦艮陽卦上下交感之時也與泰卦近焉泰卦天地交而萬物通咸卦天地感而萬物化生然則泰卦三隂進于上三陽降于下極於交而泰矣故曰萬物通咸卦隂進而未盡逹也陽降而未盡下也下卦猶有二隂上卦猶有二陽感而未至於泰矣故曰萬物生而猶未通也聖人感人心而天下和平是感之無窮而能至乎泰者也感而不至其道乃消故至騰口薄可知也恆陽動隂順剛上柔下震陽也剛動于上巽隂也柔順于下上下各得其常之時也天尊地卑道之常矣君處上臣處下理之常矣上陽卦天與君之道也下隂卦地與臣之道也男在外女在內義之常矣震為長男巽為長女天地君臣男女各得其正常莫大焉諸卦多以有應為吉此卦六爻皆應而爻無元吉者何也夫吉於應者相求以濟之時也常者上下各得其所之時矣故以剛柔皆應為常而不以獲應為吉是以士之常也在於巳不在於人諸侯之常也在於政不在於鄰天子之常也在於道不在於權故曰聖人久於其道而天下化成堯舜為仁終身而巳矣其知常也哉遁隂進陽退二隂進之於內四陽退之於外柔佞入而剛正出君子遁去之時也夫柔勝於剛則小人制君子矣辱可逃乎柔未勝剛則君子辱可遠也未見制於小人焉此卦二隂而四陽柔未勝剛小人始浸而長也君子知吉之先辨禍之萌思遠其時也可不遁乎故遁之為義尚乎遠也是以最在內者有遁尾之危最在外者有肥遁之利子曰知幾其神始可與言遁也巳矣大壯剛以震而隂摧內剛外震二隂剝焉君子威而小人黜政令剛嚴之時也陽於隂為大也陽進隂退大者壯而小者喪矣夫雷在天上萬物以震威行天下萬邦以恐天地之壯見乎雷聖人之壯見乎威壯而不節於天下暴矣壯其喪矣是以君子非禮弗履以保其壯也故九二九四以陽居隂體剛而處巽乃復獲乎貞吉餘爻皆不克全其壯也巳晉順而上行奉于文明坤順也離明也君子嘉遇顯進之時也夫上無文明賢斯遁矣今文明麗于上君子可不進乎其進也柔順內融內卦坤也有柔順之義則上不拒其逼矣故曰晝日三接也英華外著外卦文明有英華之德則衆不疑其行矣故曰君子以自昭明德蓋明出地上如日之升君子當其象也豈復昧哉其伊尹之時歟明夷隂上明下其義病矣火入地中其光翕矣蔽賢傷善之時也夫文明在上則賢者遂進文明在下則善人用傷其商之末世耶君子用晦然後免於其難然則文王其不用晦乎何以嘗幽之耶文王蓋有國焉德加於人晦之難也故以文明入于難終以柔順而出矣箕子雖無政焉而最近於暗故自辱其身以晦其道然後乃夜睽禮義不接而男女睽君臣不接而上下睽情類不接而萬物睽夫然則天地萬物之理從何而亨乎故睽之時義不可久也必變而通之合睽以成其化天地睽也而隂陽合焉其體睽其義合晝夜睽也而日月交焉男女睽也而禮義成焉上下睽也而君臣會焉萬物睽也而情類聚焉夫未合之時體乖志疑動虞蹇難求援而濟者也故其爻皆以有援免至于上九睽極而通則説弧遇雨羣疑亡也蹇止於險中險難在前未可進之時也觀其名與屯卦近焉屯亦難也然則屯巳動乎險中難可圖也蹇猶止乎險中難未可犯也惟二為王臣得位應五君在險中而與巳應始可匪躬而往焉餘皆往蹇而弗濟君子藏器於身待時而動其庶幾乎解動乎險外出險散否之時也小人為險君子乃否小人既退君子乃振故六五象曰君子有解小人退也是故天地否散雷雨並興聖賢否散慶施遂行武王發粟散財其有解之時也矣損山澤通氣艮為山兌為澤其潤上行取下資上之時也夫陽實也隂虛也下卦二陽上卦二隂取陽資隂以實益虛者也虛者反實則實者反虛矣然則下者上之本本固則邦寧今務於取下乃傷其本矣危之道也損之有時民猶説也兌為説損之無時澤將竭焉兌為澤故曰川竭必山崩此之象也無他下涸而上枯也百姓不足君孰與足其斯之謂歟益剛來而助柔損有餘而補不足上卦陽多故曰有餘下卦陽少故曰不足自上惠下之時也天道下濟品物咸亨聖人下濟萬國咸寧益之為道大矣哉然則益上曰損損上曰益者何也夫益上則損下損下則傷其本也是故謂之損損上則益下益下則固其本也是故謂之益本斯固矣幹斯茂矣源斯深矣流斯長矣下之益上則利有竭焉上之益下則因其利而利之何竭之有焉是故木以動也上木下動涉大川而無患雷風與也上風下雷興萬物而無疆明益之道何往而不利哉夫一隂處高而羣陽代之以大制小以正黜邪之時也時皆剛正柔佞豈得而據乎夫君子道微之時法令常密而或失之者何也內有小人也小人道微之時法令常顯而無忌者何也內皆君子也此卦一柔而乘五剛危可知矣五剛而決一隂易可知矣故揚于王庭而不忌賞罰明行之際歟舜舉八元而去四凶此其時矣萃澤處於地兊為澤坤為地其流集矣上説下順其義親矣物情和聚之時也上以説臨下下以順奉上上下莫不聚乎天地亨而萬物以類聚大人亨而天下以義聚觀其所聚而天地萬物之情可見矣彖言剛中而應者取其上下相應以成萃聚之義而巳若夫萃天下者豈私其應哉必也以虛受人然後能萃其天下故九五以大人之位而匪孚者以其應之於一不能盡天下之誠惜哉無私則至矣升地中生木其道上行君子位以德升之時也夫高以下為基木始生於地中其舉遠矣聖人日躋其德而至于大寶賢者日崇其業而至于公圭以順而升物不距矣故爻無凶咎初則大吉二則有喜三則無疑四則用亨五則貞吉惟上六極而猶升則為冥昧若能知其消息猶可為利故曰冥升利于不息之貞困水在澤下澤方竭焉其道不加於物君子困窮之時也夫水者浸於外而後施於物今伏於其內何施之有是則川澤竭而伏其流君子困而隱其道困於險而不改其説坎險也兌説也其惟君子乎能固窮而樂道哉苟不安其困欲尚口而去之窮斯甚矣知此時者卷而懷之極然後反其困必亨故曰困亨夫子之於陳蔡也豈其憂乎井木為泉之底井道治而其施外彰君子居德遷惠之時也夫井居其地而不可改其泉之出也無所不利君子居於德而不可移其惠之遷也無所不仁唯井也施之而不窮存之而不溢惟德也常施於人而不見其虧獨善於身而不見其餘故曰井德之地不其然乎革水火相薄變在其中聖人行權革易之時也夫澤有水則得其宜今澤有火是反其常矣天下無道聖人革之以反常之權然而反常之權天下何由而從之以其內文明而外説也內卦文明外卦兌説以此之文明易彼之昏亂以天下之説易四海之怨以至仁易不仁以有道易無道此所以反常而天下聽矣其湯武之作耶苟道德不去雖湯武日生當為天下之助何反常之有焉鼎以木順火鼎始用焉聖人開基立器之時也夫天下無道聖人革之天下既革而制作興制作興而立成器立成器而鼎莫先焉故取鼎為義表時之新也湯武正位然後改正朔變服章更器用以新天下之務其此之時歟故曰革去故而鼎取新聖人之新為天下也夫何盛焉莫盛乎享上帝而養聖賢也享上帝而天下順養聖賢而天下治不亦盛乎震雷相從而興威動萬物內外皆震君子心身戒懼之時也萬物震其道通焉君子震其德崇焉君子之懼於心也思慮必愼其始則百志弗違於道懼於身也進退不履於違則百行弗罹于禍故初九震來而致福愼於始也六二震來而喪貝履於危也六二乘剛夫震者長子之道也長子有威驚遠而懼邇然後能主宗廟之器而祭祀不輟也夫艮山相當而各止其所內外不相與六爻皆無應上下靜止之時也天地動而萬物生日月動而晝夜成聖賢動而天下亨今其止者君子理不可動之時也故此卦無元亨貞之德者以其道不行焉然止之為道必因時而存之若夫時不可進斯止矣高不可亢斯止矣位不可侵斯止矣欲不可縱斯止矣止得其時何咎之有故曰時止則止時行則行動靜不失其時其道光明非君子其孰能與於此乎漸山止生木日益其高君子漸進之時也夫內止而不躁外巽而不爭以斯而進不亦漸乎長女得位乎其外故曰女歸吉然則女生而知其嫁也必漸而及時然後有歸焉君子學而知其仕也必漸而成德然後有位焉故升高必自下陟遐必自邇乾陽漸進而至于在天坤隂漸進而至于堅氷天地不能踰而況於人乎苟內不止而躁外不巽而爭則失漸之道犯時之忌豈正邦之有焉豐文明以動無往不亨王道開大之時也夫雷電之至隱者彰而否者亨聖賢之造困者通而幽者顯於是制乎禮以序天下之倫作乎樂以興天下之和物物昌而無不大也是以謂之豐然則日之動也下離日也上震動也豐于正中焉文明之動也豐于皇極焉過乎正中日斯昊矣過乎皇極文明虧矣故曰宜日中進於大而戒於盈也丕哉旅火麗山而不久其處君子羇旅之時也君子羇旅之時處無其位何能與物大通然則內止而不動于心外明而弗迷其往以斯適旅故得小亨而貞吉夫旅人之志卑則自辱高則見嫉能執其中可謂智矣是故初瑣瑣而四不快者以其處二體之下卑以自辱者也三焚次而上焚巢者以其據二體之上高而見嫉者也二懷資而五譽命者柔而不失其中者也君子旅之時也道其然乎巽風從至而物莫之違上下皆順命令宣行之時也夫上下弗順雖令不從今上下皆順故可申命而行事也若夫巽之為德其失也偽非君子體之則入乎柔邪之道矣觀其名雖近於謙焉然則謙之為體內剛而外柔謙卦坤外艮內坤柔而艮剛也降於禮而不降於德者也是以享君子有終巽之為體內外皆柔可以行權未可以終義惟五以中正而志行乃得小亨利有攸往利見大人是故謙之六爻皆無凶咎巽之六爻則美惡半矣兊澤重潤而上下皆兊君子推恩敷惠之時也夫説萬物者莫説乎澤今復重之民説而無疆者也勸天下者莫大乎推恩而敷惠則順乎天應乎人而王道亨不然者反此若夫威以先民民重其勞威以犯難民重其死故周文為臺而人謂神靈者忘其勞也楚子下令而人如挾纊者忘其死也然則説之為德其失也侫上下皆説之時必內存其剛正然後免佞之情故曰説以利貞帝王好尚論老子曰我無為而民自化我好靜而民自正我無欲而民自富我無事而民自朴此則述古之風以警多事之時也三代以還異於太古王天下者身先教化使民聳善故禮曰人君謹其所好惡君好之則民從之孔子曰上好禮則民莫敢不恭上好義則民莫敢不服上好信則民莫敢不用情由此言之聖帝明王豈得無好在其正而巳堯設敢諫鼓建進善旌舜好問而成至化禹拜昌言而立大功湯五聘伊尹文王躬迎吕望周公握髮吐哺以待白屋之士鄭武公好賢而詩雅歌之燕昭王築臺募士而智者歸之斯聖賢好尚如是之急也桀紂好利欲不好諫諍而天下亡秦好兵刑不好仁義而天下歸漢隋煬帝好逸豫不好恭儉而天下歸唐使桀紂好諫諍秦好仁義隋煬帝好恭儉豈有喪亂之禍哉選任賢能論王者得賢傑而天下治失賢傑而天下亂張良陳平之徒秦失之亡漢得之興房杜魏禇之徒隋失之亡唐得之興故曰得士者昌失士者亡書曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人其勤求人材如是之急也然則求之之道不可一端臯陶贊禹曰亦行有九德言人性行有九德以考真為則可知乃言曰載采采載行采事也稱其人有德必言其所行某事某事以為驗禹曰何臯陶曰寬而栗性寬洪而能莊栗柔而立和柔而能立事願而恭慤願而恭恪亂而謹亂治也有治而能謹擾而毅擾順也致果為毅直而溫行正直而氣溫和簡而廉性簡大而有廉隅剛而塞剛斷而實塞強而義無所屈撓動必合義彰厥有常吉哉彰明吉善也明九德之常以擇人而官之則政之善孔子之門人目以四科一曰德行謂顔淵閔子騫也顔淵聞一知十二曰政事冉有季路也三曰言語宰我子貢也子貢使於諸國而不辱君命也四曰文學子遊子夏也經緯天地曰文禮樂典章之謂也遊夏能述之者也此所謂求人之道非一端也又書之説命篇曰旁求俊乂列于庶位是朝廷庶位惟俊乂是求唐太宗曰天下英雄落吾彀中語曰邦有道則智邦無道則愚智則可與治國家安天下愚則可與避怨惡而全一身故聖人以俊乂為得不以柔訥為行如以柔訥為行而寵之則四海英雄無望於時矣使英雄失望於時則秦失張陳隋失房杜豈不誤天下之計哉近名論老子曰名與身孰親言人知愛名不如愛其身之親也莊子曰為善無近名言為善近名人將嫉之非全身之道也此皆道家之訓使人薄於名而保其真斯人之徒非爵祿可加賞罰可動豈為國家之用哉我先王以名為教使天下自勸湯解網文王葬枯骨天下諸侯聞而歸之是三代人君巳因名而重也太公直釣以邀文王夷齊餓死于西山仲尼聘七十國以求行道是聖賢之流無不涉乎名也孔子作春秋即名教之書也善者褒之不善者貶之使後世君臣愛令名而勸畏惡名而愼矣夫子曰疾沒世而名不稱易曰善不積不足以成名然則為善近名豈無偽邪臣請辨之孟子曰堯舜性之也性本仁名三王身之也躬行仁義五霸假之也假仁義而求名後之諸侯逆天暴物殺人盜國不復愛其名者也人臣亦然有性本忠孝者上也行忠孝者次也假忠孝而求名者又次也至若簡賢附勢反道敗德弒父叛君惟欲是從不復愛其名者下也人不愛名則雖有刑法干戈不可止其惡也武王克商式商容之閭釋箕子之囚封比干之墓是聖人敦奬名教以激勸天下如取道家之言不使近名則豈復有忠臣烈士為國家之用哉推委臣下論天生兆人得王乃定萬機百度不可獨當內立公卿大夫士外設公侯伯子男先擇材以處之次推公以委之然則委以人臣之職不委以人君之權臣請辨之夫執特典禮修舉政教均和法令調理風俗內養萬民外撫四夷師表百僚經緯百事此宰輔之職也練兵戎謹城壁修万略威夷狄此將帥之職也肅朝廷之儀觸縉紳之邪此御史府之職也治繁劇制豪猾此京尹之職也至於金榖刑法各有攸司之職矣撫民人宣風化均徭役平賦斂此刺史縣令之職也是皆人臣之職不可不委之也若乃區别邪正進退左右操榮辱之柄制英雄之命此人主之權也不可盡委於下矣何以明之論語孔子曰天下有道政不在大夫注云制之由君也晉委三卿趙文子韓宣子魏獻子延陵季子曰晉國之政歸此三家矣後果分晉為三國漢高祖招納羣英有將將之權而取天下至于子孫不知祖宗之謀而獨委霍光又獨委王鳳至于王莾皆有大禍西漢遂傾焉後漢光武親用二十八將而取天下後之子孫不知祖宗之謀而獨委后族至于宦官故姦雄競起以去惡為名東漢遂傾焉魏委司馬晉委劉𥙿其禍亦然唐太宗駕馭英雄取天下致太平至高宗朝李義府以立后之功獨見委用陷害忠良天下憤怨明皇𥘉用姚崇宋璟為相而天下大治推心委之遂成故事及李林甫代其任仍復委之林甫姧邪能中傷善人朝廷無敢言得失者於是明皇不聞諫諍自謂宰相得人泰然無為矣言路巳絶故至祿山犯關嚮闕而眀皇不知一旦喪亂天下瓦解唐德遂衰初以推委而天下治終以推委而天下亂何弊之然哉當推委之際擢十人上從其九是九分之恩出於下矣如此則數年之間左右前後皆權臣之黨也若黜辱十人上從其九是九分之威出於下矣如此則數年之間中外遠近無敢忤權臣者故下之情不逹而上之勢孤矣此明皇之失為後代之鑒王者將收其權必先采人采人為難豈無其要孔子之辨門人標以四科一曰德行二曰政事三曰言語四曰文學以四科辨之思過半矣然則朝廷清要之位覬覦者衆必審賢以與之賢傑之才讒嫉者衆必先時以辨之是故先王孜孜求賢以備選用且千官百辟豈能獨選必委之於輔弼矣惟清要之職雄劇之任不可輕授於人僉諧之外更加親選聖帝明王常精意於求賢不勞慮於臨事精意求賢則日聰明而自廣勞心臨事則日叢脞而自困宜乎屏煩細而廣詢訪其深於正道有憂天下之心可備輔相者記之其精於經術通聖人之旨可備顧問者記之其敢言正色有端士之操可備諫諍者記之其能言方略有烈士之風可備將帥者記之如斯之人精而求之熟而觀之然後置清要之職授雄劇之任使人人竭力爭為腹心於是乎得以操榮辱之柄制英雄之命庶務委于下而柄歸于上始可以言無為矣猶復置御史大夫中丞使搢紳無敢慢者置諍臣七人使言路無敢蔽者置門下封駮司使制勑無得誤者此又推委無為之中而不廢其防不失其權者矣若留意逸豫不孜孜於求賢親選之時無賢可用則進退賞罰復歸於下雖有爵祿不足為上之恩雖有誅罰不足為上之威矣上攻守二策狀臣某言竊觀西事以來每議攻守未見適中或曰必行進討以期平定臣謂諸路進討則兵分將寡氣不完盛絶漠風沙迷失南北饋運輜重動有鈔掠賊之巢穴敻阻河外非有奇將不能遠襲至若寇常併兵求擾一路每有朝旨令入界牽制其如將帥方略非有素定茫然輕進不知所圖但求虛弱之處以剽竊為功既不能大振兵威故不能少分賊勢此進討牽制之無效也或曰宜用守䇿來則禦之去則勿逐臣觀今之守邉多非土兵不樂久戍又無營田必煩遠饋久戍則軍情以殆遠饋則民力將竭歲月綿遠恐生他患此守禦之未利也臣荷國重寄曾無寸勞夙夜營營冀有所補而才識迂昧終無發明今采於邉人而成末議固不敢望其必行在朝廷以衆論參之擇其可否如無所取乞賜寢罷今具下項攻守之議依聖旨指揮交付梁適齎回赴闕者議攻臣謂進討未利則又何攻臣切見延安之西慶州之東有賊界百餘里侵入漢地中有金湯白豹後橋三寨阻延慶二州徑過道路使兵勢不接䇿應迂遠自來雖曾攻取無招降之恩據守之謀漢兵才回邊患如舊臣謂西賊更有大舉朝廷必令牽制則可攻之地其在於此可用步兵三萬騎兵五千鄜延路步兵一萬二千騎兵三千涇原路步兵九千騎兵一千環慶自選馬步一萬八千軍外畨兵更可得七八千人軍行入界當先布號令生降者賞殺降者斬得精強者賞害老幼婦女者斬拒者併兵以戮之服者厚利以安之遁者勿追疑有質也居者勿遷俾安土也乃大為城寨以據其地如舊城巳險因而增修非守地則别擇要害之處以錢召帶甲之兵熟戶強壯兼其土役昨奉朝旨令修緣邉城寨臣以民方穡事將係官間雜錢并勸令近上人戶以顧夫錢散與助功兵士充食錢其帶甲兵士翕然情願諸寨並巳畢功俟城寨堅完當留土兵以守之方諸舊寨必倍其數使范全趙明以按撫之范全今為騏驥副使慶州北都巡檢趙明今為東頭供奉官柔遠寨蕃部巡檢必嚴其戒曰賊大至則明斥候召援兵金湯東去德靖寨四十里西去東谷寨八十里西南去柔遠八十里白豹西去柔遠五十里南至慶州一百五十里堅壁淸野以困之小至則扼險設伏以待之居常高估入中及置營田以助之如此則可分彼賊勢振此兵威通得延慶兩路軍馬易於應援所用主兵官員使勇決身先者居其前王信狄青劉拯劉貽孫張建侯范全可用䇿應者居其次任守臣王逹王遇張宗武談嘉震王文恩王文使臣中可當一隊者參於前後張信王遇張忠郭逵張懷寶有心力幹事者營立城寨周美張璨劉兼濟李緯張繼勳楊麟臣觀後漢假紀明以騎五千步萬人車三千兩錢五十四億三冬二夏大破諸羌又觀唐馬燧造戰車行則載甲兵止則為營陳或塞險以遏奔衝臣以此路山坡大車難進當用小車二千兩銀絹錢二十萬以賞有功將吏及歸降畨部并就糴芻粟亦稍足用其環州之西鎮戎之東復有胡蘆泉一帶畨部與明珠滅臧相接阻環州鎮戎徑過道路明珠滅臧之居北接賊疆多懷觀望又延州南安去故綏州四十里在銀夏川囗今延州兵馬東渡黃河北入嵐石却西渡黃河倒來麟州䇿應蓋以故綏州一帶賊界阻斷徑過道路巳上三處內麟府一路臣不曾到彼乞下夲處訪問及畫圖即可見山川道路次第如取下一處城寨平定則更圖一處為據守之䇿比之朝去暮還此稍為便臣謹議議守臣觀西戎居絶漠之外長河之北倚遠而險未易可取建官置兵不用祿食每舉衆犯邉一毫之物皆出其下風集雲散未嘗聚養中國則不然遠戍之兵久而不代負星霜之苦懷鄉國之望又日給廪食月給庫緡春冬之衣銀鞋饋輸滿道千里不絶國用民力日以屈乏軍情愁怨須務姑息此中原積兵之憂異於夷狄也臣謂戎虜縱降塞垣須守當務經遠古豈無謀臣觀漢趙充國興屯田大獲地利遂破先零魏武於征伐之中分帶甲之士隨宜墾闢故下不甚勞大功克舉數年之中所在積粟倉廪皆滿唐置屯田天寶八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸侯以其利而利之使食其土之毛實役其人氓之力故賦稅無轉徙之勞徭役無怨曠之嘆臣昨在延州見知青澗城种世衡言欲於本處漸興田利今聞僅獲萬石臣觀今之邉寨皆可使弓手土兵以守之因置營田據畝定課兵獲餘羡中糶於官人樂其勤公收其利則轉輸之患久可息矣且使其兵徙家塞下重田利習地勢父母妻子而堅其守比之東兵不樂田利不習地勢復無懷戀者功相遠矣少田處許蕃部進納荒田以遷資酬奬或量給價直儻朝廷許行此道則委臣舉擇官員約古之義進今之宜行於邊陲庶幾守愈久而備愈充雖戎狄時為邉患不能困我中國此臣所以言假土兵弓手之力以置屯田為守之利也然臣觀前漢高帝之盛臣有蕭張決勝千里下有百戰之師以四十萬之衆困于平城乃約胸奴和親至高后文景代代如之不絶其好胸奴屢變往往犯塞殺戮吏民不勝其酷至於書問傲慢下視中國而人主以生民之故屈巳含容不為之動孝文即位將軍陳武請議征討以一封疆孝文曰兵凶器也難克所願動亦耗病謂百姓遠方何今胸奴內侵軍吏無功邉民父子荷兵日久朕動心痛傷何日忘之未能消距願且堅邉設候結和通使休寧北陲為功多矣且無議兵故百姓無內外之徭得息肩於田畝天下富實雞鳴犬吠煙火萬里可謂和樂者乎司馬遷以文帝能和樂天下協於大樂故著于律書為後代法臣謂國家用攻則宜取其近而兵勢不危用守則必圖其久而民力不匱然後取文帝和樂之德無孝武哀痛之悔則天下幸甚天下幸甚臣謹議答竊議漢高祖以黃金四萬付陳平而不問其出入時陳平未有功也唐高祖將斬李靖而恕之時李靖未有功也是前代帝王先布之以恩後責之以效也我太祖嘗謂近臣曰安邉御衆須是得人心優恤其家厚其爵祿多與公用錢及屬州課利使之回圖特免稅算聽其召募驍勇以為爪牙苟財用豐盈必能集事朕雖減後宫之數極於儉約以備邊費亦無辭也命將帥李漢超等十三人分守西北諸州家族在京者撫之甚厚凡軍中事悉許便宜每來入朝必召對命坐賜與優厚撫而遣之由是邉臣率富於財得以養士用間洞見蕃夷情狀每戎狄入冦必能先知預為之備設伏掩擊多致克捷二十年間無西北之憂故兵力雄盛武功蓋世由此而致也今滕宗諒為一路經略安撫使兼兵馬都部署以公用錢回圖管設使命將校并蕃部酋豪或贈遺官員遊士而梁堅彈奏滕使過錢十六萬貫有數不明及置獄研窮才用三千餘貫復有所歸無分毫入巳是未見貪吏之狀也宣撫田舍人朝之端人也至慶州目擊軍民蕃部等借留滕侯遮壅于道足下何得謂之豺狼主上仁聖不深罪宗諒張亢二人仍降詔誕告邉臣依祖宗故事使回圖公用一如平日中憲不知內朝有此詔命聞羣口橫議遂伏閣請加責二人以正憲律既下法寺則宗諒合贖銅而不當去官是前斷巳坐亢罪將公用錢并酒散與軍人當更追一官又朝廷既巳降記貸之亦難反汗足下責我保庇此人固不敢避自古文法常害邉功今天子仁聖有西北之憂孜孜求人以捍大患帥臣用度小過不害邉事居輔弼者固當竭力辨明恐誤朝廷機事為天下之憂豈暇私於二人哉昔胸奴辱漢使者蓋不一也唐賢使于賊庭不辱命者如韓愈李回皆成大名近邵良佐使于元昊回日改官賜服色報其勞也良佐懼不可再去滿朝縉紳無一士請行朝廷召張子奭驛而至又選王正倫副之皆敢行不懼既不懼矣觀其辨論學術可為之使乃遣將命暨還得元昊書疏頗順於前願去號稱臣又能減數節事體且沙漠窮絶入不測之地既能忘生又不辱命朝廷擢進兩資不可待以常調也戎狄素貪利未厭心兵擾絶塞此戎狄之常態非子奭之過也今之士大夫高談時政皆謂不能拔人限以資級使才者多滯而朝廷乏賢及見殊命越一等則囂然聚議以為過優何薄之甚耶楊文公寫真讃楊公以武夷之靈降于我宋在太宗朝以神童𬒳召三命至著作佐郎直集賢院在真宗朝荐當清近終翰林學士工部侍郎公以斯文為巳任繇是東封西祀之儀修史修書之局皆歸大手為皇家之盛典當時臺閣英遊蓋多出於師門矣而命世之才其位不充故天下知公之文而未知其道也昔王文正公居宰府僅二十年未嘗見愛惡之心天下謂之大雅寇萊公當國真宗有澶淵之幸而能左右天子如山不動却戎狄保宗社天下謂之大忠樞密扶風馬公慷慨立朝有犯無隱天下謂之至直此三君子者一代之偉人也公與三君子深相交許情如金石則公之道其正可知矣然端言方行回邪忌之故嘗避權臣之禍歸陽翟山再起會真宗不豫中外為憂萊公將奮大計正前星於北辰引太陽於少海公預宏議就高文間弗克行既終而今上知之乃下詔追悼贈禮部尚書諡曰文今覩公之真而為讃云嗚呼楊公兩朝清風盛乎斯文直哉厥躬端者我遊邪者我仇霖雨不作日月其流仰止遺真雍雍哲人吾不知乎為之仙為之神范文正公集卷第五
