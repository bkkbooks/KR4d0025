body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校上時相議制舉書天聖八年五月日其位某再拜上書于昭文相公閣下某昨者伏蒙聖恩優賜差任蓋鈞造之際靡不獲所退省踈拙且驚且懼況唐虞舊域風俗淳儉獄無積訟亭鮮過客棲遲偃仰何以報國然嘗試思之似有所輔敢不冒黷而言之夫善國者莫先育材育材之方莫先勸學勸學之要莫尚宗經宗經則道大道大則才大才大則功大蓋聖人法度之言存乎書安危之幾存乎易得失之鑒存乎詩是非之辨存乎春秋天下之制存乎禮萬物之情存乎樂故俊哲之人入乎六經則能服法度之言察安危之幾陳得失之鑒析是非之辨明天下之制盡萬物之情使斯人之徒輔成王道復何求哉至於扣諸子獵群史所以觀異同質成敗非求道於斯也有能理其書而不深其旨者雖朴愚之心未可與適道然必顧瞻禮義執守規矩不猶愈於學非而博者乎今文庠不振師道久缺為學者不根乎經籍從政者罕議乎教化故文章柔靡風俗巧偽選用之際常患才難某聞前代盛衰與文消息觀虞夏之純則可見王道之正觀南朝之麗則知國風之衰惟聖人質文相救變而無窮前代之季不能自救則有來者起而救之是故文章以薄則為君子之憂風俗其壞則為來者之資今朝廷思救其弊興復制科不獨振舉滯淹詢訪得失有以勸天下之學育天下之才是將復小為大抑薄歸厚之時也斯文丕變在此一舉然恐朝廷命試之際謂所舉之士皆能熟經籍之大義知王霸之要略則反屏而弗問或將訪以不急之務雜以非聖之書辨二十八將之功勳陳七十二賢之德行如此之類何所輔益蓋欲伺其所未至誤其所常習不以教育為意而以去留為功若如所量恐非朝廷勸學育才之道也何哉國家勸學育材必求為我器用輔我風教設使皆明經籍之旨並練王霸之術問十得十亦朝廷教育之本意也況文有精粗理有優劣明試之下得失尚多何患去留之難乎今或伺其所未至誤其所嘗習則天下賢俊莫知所守將博習非聖旁攻異端聖人之門無復啓發逮于後舉差之益逺如此則制科之設足以誤多士之心不足以救斯人之弊恭惟前聖之文之道昭昭乎為神器於天下得之者昌失之者亡後世聖人開學校設科等率賢俊以趨之各使盡其心就其器將以共理于天下故書曰咸有一德斯之謂矣願相府為此一舉儻昌言于兩制如能命試之際先之以六經次之以正史該之以方略濟之以時務使天下賢俊翕然修經濟之業以教化為心趨聖人之門成王佐之器十數年間異人傑士必穆穆于王庭矣何患俊又不充風化不興乎救文之弊自相公之造也當有吉甫輩頌君之德吾相之功登于金石永于天地者矣四海幸甚千載幸甚干犯台嚴無任僣越戰汗之至某再拜與歐靜書七月十二日高平范某謹復書于伯起足下近滕從事子京編李唐制誥之文成三十卷各於文首序其所以而善惡昭焉足下命為唐典以僕觀之似所未安典之名其道甚大夫子刪書斷自唐虞巳下今之存者五十九篇惟堯舜二篇為典謂二帝之道可為百代常行之則其次夏商之書則有訓誥誓命之文皆隨事名篇無復為典以其或非帝道則未足為百代常行之典乃知聖人筆削之際優劣存焉如詩有國風雅頌之别也李唐之世三百年治亂相半如貞觀開元有霸王之略每下詔命多有警䇿失之者蓋亦有矣如則天中宗昏亂之朝誅害宗室戮辱忠良制書之下欺天蔽民人到于今冤之儻亦以典為名躋于唐虞之列不亦助欺天之醜乎是聖狂不分治亂一致百代之下堯舜何足尚桀紂何足愧也僕不忍天下君子將切齒於子京乃請以統制之名易之而足下大為不可貽書見尤僕謂制者天子命令之文無他優劣庶幾不損大義爾足下謂册制之類有七何特以制名焉七者之名有則有矣然近代以來暨于今朝王言之司謂之兩制是制之一名統諸詔命又有待制承制之官皆承奉王言之義也又令詔誥宣勑聖旨之類違者皆得違制之坐亦足見制之一名而統諸命令也故以統制為名以明備載其文不復優劣觀其文者使自求之而治亂之源在矣足下又謂吕不韋輩著春秋賈誼之徒著書文中子著六經而無譏其僣者非也蓋春秋以時記事而為名也優劣不在乎春秋二字而有凡例變例之文書者載言之名而優劣不在乎書之一字而有典謨誓命之殊詩者言志之名而優劣不在乎詩之一字而有國風雅頌之議諸儒擬春秋詩書之名蓋不在乎優劣之地也未有亂典謨訓誥國風雅頌之名者足下若以唐之制書咸可為典則唐人之詩咸可為頌乎足下又謂唐有六典杜佑著通典以此二書為證亦未也六典者唐之官局可為令式尊之為典者亦唐人一時自髙爾又通典之書敘六代沿革禮樂制度復折中而論其可者以為典要尚庶幾乎矧二書之作非經聖人筆削又何足仰為大範哉足下博識之士當於六經之中專師聖人之意後之諸儒異端伯起不足繁以自取或足下必以統制為非則請别為其目典之為名孰敢聞命某再拜與周騤推官書六月十五日同年弟范某再拜奉書于周兄去年秋滕子京集李唐制書得一千首歐伯起請目之曰唐典僕始末閲其本而酌以重輕請避堯舜二典曰有唐統制伯起以書見讓謂典為是謂制為非僕亦辨而言焉而伯起不釋今復貽書云中有册文十五或因其舊名可曰有唐册制僕前書云必以統制為非則請别為之目以典為名孰敢聞命伯起謂典謨訓誥其來逺矣夫子因其舊史優劣不存焉僕謂舊史之文亦不苟作聖人筆削經史皆因其舊可者從而明之其不可者從而正之未嘗無登降之意也是故言易則因先王之卦從而讃之有聖人有后有君子之辭焉刋詩則因前人之作從而次之有國風雅頌之倫焉修春秋則因舊史之文從而明之有褒貶之例焉書亦史也從而序之豈獨因其舊篇無優劣之意僕謂典謨訓誥之文或因其舊而次之亦聖人之優劣也伯起謂夏有政典周有六典僕謂政典者果夏書耶虞書耶夏或有之何不列之于書或見刪於聖人此又不足稱矣周之六典者周禮云天官掌建邦之六典乃周之法度書于典册非記言之例也夫子刪書之際六典不預焉伯起又謂有漢典魏典晉典梁典僕謂此四典者必文人苟作或佞之於前或失之於後非其正史君子不取也自堯舜而後歷代之史無以典為名者何哉蓋尊避堯舜為萬世之師使後之明王有所稽仰豈丘明班馬之流咸不到伯起之心邪伯起又謂元結有皇謨柳宗元有平淮夷雅元枊唐人也而深於文不曰典而曰謨不曰頌而曰雅二君誠不佞歟伯起非唐人也反為佞乎以其册制特謂之典豈有優劣之心乎如有優劣之心則不當以錯綜治亂之文躋于三代之上炳堯舜之光明如無優劣之心唐三百年册制之文一旦易其名則何以哉進退無所據而序引滋繁枝葉之云不復詳釋豈莠言亂正學非而博者乎將固有所激而極其理要乎周兄積學于書得道于心覽聖人之旨如日星之昭昭願質其疑使來者不敢竊亂於斯文甚善甚善不宣某再拜與唐處士書十二月日髙平范某謹再拜致書于處士唐君蓋聞聖人之作琴也鼓天地之和而和天下琴之道大乎哉秦作之後禮樂失馭于嗟乎琴散久矣後之傳者妙指美聲巧以相尚喪其大矜其細人以藝觀焉皇宋文明之運宜建大雅東宫故諭德崔公其人也得琴之道志於斯樂於斯垂五十年清靜平和性與琴會著琴箋而自然之義在矣某嘗遊於門下一日請曰琴何為是公曰清厲而靜和潤而逺某拜而退思而釋曰清厲而弗靜其失也躁和潤而弗逺其失也佞弗躁弗佞然後君子其中和之道歟一日又請曰今之能琴誰可與先生和者曰唐處士可矣某拜而退美而歌曰有人焉有人焉且將師其一二屬逺仕千里未獲所存今復選于上京崔公既沒琴不在於君乎君將憐其意授之一二使得操堯舜之音逰羲黃之域其賜也豈不大哉又先王之琴傳傳而無窮上聖之風存乎盛時其旨也豈不逺矣誠不敢助南薰之詩以為天下富壽庶幾宣三樂之情以美生平而可乎某狂愚之咎亦冀捨旃不宣某再拜答趙元昊書正月日具位某謹修誠意奉書于夏國大王伏以先大王歸嚮朝廷心如金石我真宗皇帝命為同姓待以骨肉之親封為夏王履此山河之大旌旗車服降天子一等恩信隆厚始終如一齊桓晉文之盛無以過此朝聘之使往來如家牛馬駝羊之産金銀繒帛之貨交受其利不可勝紀塞垣之下逾三十年有耕無戰禾黍雲合甲胄塵委養生葬死各終天年使蕃漢之民為堯舜之俗此真宗皇帝之至化亦先大王之大功也自先大王薨背今皇震悼纍日嘻吁遣使行吊賻之禮以大王嗣守其國爵命崇重一如先大王昨者大王以本國衆多之情推立大位誠不獲讓理有未安而遣行人告于天子又遣行人歸其旌節朝廷中外莫不驚憤請收行人戮於都市皇帝詔曰非不能以四海之力支其一方念先帝歲寒之本意故夏王忠順之大功豈一朝之失而驟絶之乃不殺而還假有本國諸蕃之長抗禮於大王而能含容之若此乎省𥘉念終天子何負於大王哉二年以來疆事紛起耕者廢耒織者廢杼邊界蕭然豈獨漢民之勞弊耶使戰守之人日夜豺虎競為吞噬死傷相枕哭泣相聞仁人為之流涕智士為之扼腕天子遣某經度西事而命之曰有征無戰不殺非辜王者之兵也汝往欽哉某拜手稽首敢不夙夜于懷至邊之日見諸將帥多務小功不為大略甚未副天子之意某與大王雖未嘗髙會嚮者同事朝廷於天子則父母也於大王則兄弟也豈有孝於父母而欲害于兄弟哉可不為大王一二而陳之傳曰名不正則言不順言不順則事不成大王世居西土衣冠語言皆從本國之俗何獨名稱與中朝天子侔擬名豈正而言豈順乎如衆情莫奪亦有漢唐故事單于可汗皆本國極尊之稱具在方册某料大王必以契丹為比故自謂可行且契丹自石晉朝有援立之功時巳稱帝今大王世受天子建國封王之恩如諸蕃中有叛朝廷者大王當為霸主率諸侯以伐之則世世有功王王不絶乃欲擬契丹之稱究其體勢昭然不同徒使瘡痍萬民拒朝廷之禮傷天地之仁易曰天地之大德曰生聖人之大寶曰位何以守位曰仁是以天地養萬物故其道不窮聖人養萬民故其位不傾又傳曰國家以仁獲之以仁守之者百世昔在唐末天下恟恟群雄咆哮日尋干戈血我生靈腥我天地滅我禮樂絶我稼穡皇天震怒罰其不仁五代王侯覆亡相續老氏曰樂殺人者不可如志於天下誠不誣矣後唐顯宗祈于上天曰願早生聖人以救天下是年我太祖皇帝應祈而生及歷試諸難中外欣戴不血一刃受禪于周廣南江南荆湖西川有九江萬里之阻一舉而下豈非應天順人之至乎由是罷諸侯之兵革五代之暴垂八十年天下無禍亂之憂太宗皇帝聖文神武表正萬邦吳越納疆井晉就縛真宗皇帝奉天體道清淨無為與契丹通好受先大王貢禮自兹四海熙然同春今皇帝坐朝至晏從諫如流有忤雷霆雖死必赦故四海之心望如父母此所謂以仁獲之以仁守之百世之朝也某料大王建議之初人有離間妄言邊城無備士心不齊長驅而來所嚮必下今以強人猛馬奔衝漢地二年于兹漢之兵民固有血戰而死者無一城一將願歸大王者此可見聖宋仁及天下邦本不搖之驗也與夫間者之説無乃異乎今天下久平人人泰然不習戰鬪不熟紀律劉平之徒忠敢而進不顧衆寡自取其困餘則或勝或負殺傷俱多大王國人必以獲劉平為賀昔鄭人侵蔡獲司馬公子燮鄭人皆喜惟子産曰小國無文治而有武功禍莫大焉而後鄭國之禍皆如子産之言今邊上訓練漸精恩威以立有功必賞敗事必誅將帥而下大知紀律莫不各思奮力效命爭議進兵如其不然何時可了今招討司統兵四十萬約五路入界著其律曰生降者賞殺降者斬獲精強者賞害老幼婦女者斬遇堅必戰遇險必奪可取則取可城則城縱未能入賀蘭之居彼之兵民降者死者所失多矣是大王自禍其民官軍之勢不獲而巳也某又念皇帝有征無戰不殺非辜之訓夙夜于懷雖師帥之行君命有所不受奈何鋒刃之交相傷必衆且蕃兵戰死非有罪也忠於大王耳漢兵戰死非有罪也忠於天子耳使忠孝之人肝腦塗地積纍怨魄為妖為災大王其可忽諸朝廷以王者無外有生之民皆為赤子何蕃漢之限哉何勝負之言哉某與招討太尉夏公經略密學韓公嘗議其事莫若通問於大王計而決之重人命也其美利甚衆大王如能以愛民為意禮下朝廷復其王爵承先大王之志天下孰不稱其賢哉一也如衆多之情三讓不獲前所謂漢唐故事如單于可汗之稱尚有可稽於本國語言為便復不失其尊大二也但臣貢上國存中外之體不召天下之怨不速天下之兵使蕃漢邊人復見康樂無死傷相枕哭泣相聞之醜三也又大王之國府用或闕朝廷每歲必有物帛之厚賜為大王助四也又從來入貢使人止稱蕃吏之職以避中朝之尊按漢諸侯王相皆出真拜又吳越王錢氏有承制補官故事功髙者受朝廷之命亦足隆大王之體五也昨有邊臣上言乞招致蕃部首領某亦巳請罷大王告諭諸蕃首領不須去父母之邦但回意中朝則太平之樂遐邇同之六也國家以四海之廣豈無遺才有在大王之國者朝廷不戮其家安全如故宜善事主以報國士之知惟同心嚮順自不失其富貴而宗族之人必更優恤七也又馬牛駝羊之産金銀繒帛之貨有無交易各得其所八也大王從之則上下同其美利生民之患幾乎息矣不從則上下失其美利生民之患何時而息哉某今日之言非獨利於大王蓋以奉君親之訓救生民之患合天地之仁而巳乎惟大王擇焉不宣某再拜答安撫王內翰書某咨目上安撫內翰學士某處事踈略忤朝廷意既去職任而尚懷國家之憂如卞生獻璧不知其止足雖可刖而壁猶自貴奈何有昏眩之疾舉止少力不堪王事豈當預聞賢大夫之末議閣下此行采西北士庶之言欲下情之無壅又詢及猥陋某敢不罄其所見誠無取焉昨者西戎僣中朝之號四海憤怒雖困天下義當討伐今貴稱兀卒以避中朝取漢唐故事如單于可汗之類此理頗順其餘須索尚有議論與奪或失此機會卒無休兵之期如更有沮敗則用何道却行招納國威愈屈為禍轉深儻朝廷欲雪邊將之耻必加討伐苟得良帥如漢之段紀明唐之李靖誠可行焉其下如今朝曹瑋之材尚堪委以大事不然則重為國家羞昔秦漢威加四夷限長城勒燕山困弊中國終成大悔至如西晉之衰羣胡亂華五代以來屢有侵侮纍朝欲刷太耻終無成功真宗皇帝取漢文之䇿結和通使休寧北陲為天下景福四十年矣今按史記律書有漢文之議言髙旨逺可謂明主矣致天下和樂通于律吕故馬遷著于八書有旨哉其備邊之議雖復納好固不可懈也陜西沿邊二千里州軍城寨以兵勢分守皆不得巳賊每全軍而來此則以寡擊衆必將發竒謀出死力然後可禦也不必大決勝負但觀釁而攻使來不厚獲去不全勝縱邊患未息而無長驅之害亦足為禦邊之策奈何將佐之中少精方略或因門地巧於結託以取虗名或出軍班昧於韜鈐以致敗事須鑒覆轍速於更張宜於沿邊及諸處使臣軍貟中搜訪智勇之人如資地至淺勳勞未著即使權領職任令手下各有兵甲俟其有立即時進擢庶可用之才早補將帥之乏如弓箭手殿侍姚貴劉廷光輩可觀其效又涇原地平少險竒兵難用傷殘之後人心憂怯將來賊之入寇恐多由此路須益兵五萬大為之防不然或有所不支乘虗而進關中一擾衆必大潰天下有危事矣惟閣下以衆説參取為國家圗之不宣某再拜上吕相公書某啓仲秋漸涼伏惟相公台候萬福某奉命此行至重至憂初欲道中上記以未到邊隅無可述者或有屑屑之見奏牘具焉𥘉至長安見九江太尉首傳台旨頗言開釋尋來鄜延路巡按北視金明之役止數日復還延安極邊之情指掌可見金明一邑舊寨三十六人馬數萬一旦蕩去後來招安到蕃部三百來戶不足為用又塞門寨圍逼十旬諸將逗留無敢救者軍民數千一時覆沒及廢承平南安長寧白草四寨棄為虜境延安之北東西僅四百里藩籬殆盡近修金明聊支一路將修寬州以禦東北非多屯軍馬亦不能守必須建軍其利害具於奏中所奏劄子方永興軍繫署今有圗子先具呈上今延安兵馬二萬六千患訓練未精將帥無謀問以數路賊來勢何策以待皆不知所為但言出兵而巳此不可不為憂也或得其人精練士卒山川險惡據以待寇俟有斬獲乘勝深入賊勢一破鳥散窮沙復舊漢疆宜有日矣如未克勝賊勢不衰縱入討除豈肯逃散或天有風雨之變人在山川之險糧盡路窮進退有患此宜愼重之秋也自延州至金明四十里一河屈曲涉者十三度此言山川之惡也或遇風雨不敵自困某今與延安當職議定約束急於訓練俟其精強可禦可伐亦令録奏乞朝廷特賜威命則邊鄙可定廟堂無憂别路兵馬少處臨時制置不必倣此又張龍圗吏道精強但親年八十寓於他郡復言不練兵律延安重鎮數郡仰賴若不主戎政所失則大假待制西人所望明鎬亦細知邊事惟相府裁之某惶恐再拜又十一月四日具位某謹東望再拜上書于昭文僕射相公閣下竊以文武之道一而文武之用異然則經天下定禍亂同歸于治者也傳曰天下安注意相天下危注意將斯則將相之設文武之殊久矣後世多故中外不恬二道相髙二權相軋至有大將軍而居三司之上蓋時不得巳也五代衰亂專上武力諸侯握兵外重內輕血肉生靈王室如綴此武之弊也皇朝罷節侯署文吏以大救其弊立太平之基既而四夷咸賔忘戰日久內外武帥無復以方略為言惟文法錢榖之吏馳騁于郡國以尅民進身為事業不復有四方之志一旦戎狄叛常爰及征討朝廷渴用將帥大患乏人此文之弊也前則劉平陷沒范資政去官次則韓琦與某二于元帥不能成績以罪失職復以夏陳分處二道期于平定近以師老罷去而更張之三委文帥一無武功得不為和門之笑且議耶今歸之四路復皆用儒彼謂相輔大臣朋獎文吏他日四路之中一不任事則豈止於笑當尤而怒之用儒無功勢必移于武帥彼或專而失謀又敗國事況急而用之必驕且怨重權厚賞不足猒其心外寇未平而萌內患此前代之可鑒故裴度淮西之行不落韓洪都統蓋為此也某不避近名之嫌有表陳讓願相公與兩府大臣因而圗之如鄜延環慶二帥一路以文一路以武涇原秦鳳二帥亦如之使諸將帥髙者得色下者增氣如寡䇿略則擇俊乂為之參佐仍使鄜延環慶二路如舊通其軍政涇原秦鳯亦如舊制則謀可相濟兵可相援矣今王仲寶是環慶部署兼管鄜延兵馬許懷德是鄜延部署兼管環慶兵馬涇原秦鳯副都部署於今亦然惟新命都部署則未有處分固不煩更改詔勑惟續降宣旨以兼之乃舊制也既文武參用二路兼資均其事任同其休戚足以息今日之謗議平他時之驕怨使文武之道協和為一何憂乎邊患矣某復慮朝廷以逐路部署為經略招討之二謂之參用則此使權雜伍于下不足為重僅之虗設或以文換武謂之參用則前日換者人皆以儒視之或以新帥難動則某願避此路以待武帥請主外計仍領安撫舊名亦足救生民之困弊復可按邊陲之利病咸得聞于朝廷不為輕矣區區之意附記注梁學士逹于台聽愁道塗雨雪之阻故復拜此不任懇切憂惶之至不宣某再拜又六月日具位范某謹齋沐上書于昭文僕射相公某近者伏奉制命就除邠州觀察使祗膺睿渥且榮且憂三上讓章未獲俞旨竊念某幼孤且賤始求五斗祿為飬親計怔忪進退懼不可得今朝廷以方靣之重受兹寵異為某之福可謂大矣豈敢忽千鍾之重哉蓋聞福者禍之所伏故循墻而走思以避之何則居諸將諸軍之上責人死效而自以無功受國重賞於巳安乎其他利害具在封奏復有大懼不敢聞于天聽而敢陳之於相府今西北聳動在北為大雖遣使修好或可暫弭奈何積年之謀一朝而發以數十萬之賄便能充無猒之心息舉國之衆乎必先困我而終於用兵萬一某輩移帥朔方居大使節度之下見利而舉則加以擅興之誅持重而謀則誣以逗留之咎堅城深池之內自擁其精甲救危赴難之際而授以羸兵利害不得言進退不得專大敵在前重兵在後當此之時儒臣文吏何以措手足於其間哉劉平之勇猶不克濟此相公之所鑒也是則繫國家之安危生民之性命某豈可不自量力而輒當之逺慮近憂先聖之明訓何敢苟寵祿之福忘喪敗之禍耶某謂朝廷用儒之要莫若異其品流隆其委注衆皆望風稟畏以濟邊事比夫改為武帥與之參用功相萬也某謂相公弼諧於內在天下安危之事不得而讓也某輩奔走於外經畫百事亦不得而讓也某今日避此命者豈偷安之人哉誠有所存爾為國家先重其身而安其心賴相公坐籌於內某輩竭力於外內外協一奉安宗廟社稷以報君親以庇生靈豈小節之謂乎恭惟相公與二府大臣同憂天下之時必能恕狂者之多言采愚者之一得某胸中甚白無愧於日月無隱於廊廟惟相公神明其照某豈得而昧之干冒台嚴卑情無任危切之至不宣某惶恐再拜上樞密尚書書某啓云云伏惟樞密尚書台候起居萬福某奔走道塗疲困巳甚加應答文移中夕不寐無暇撰修謝啓伏增惶懼某久在江外職業無可惟望廢退以遂麋鹿之趣而朝廷過聽越次寄任拳拳負荷不能無憂今至延安北入金明視城壘之役且欲深見邊事戎馬之後原野蕭條金明北百里之間元有塞門栲栳二寨并李士彬下蕃部寨三十六所悉巳蕩去盡沒蕃境人不敢詣又此間隨川取路夾以峻山暑雨之期湍走大石秋冬之流屈曲如繞一舍之程渡涉十數山川之惡諸處鮮並兵馬出入所宜愼重又將帥無謀不務訓練坐困糧道惟請益兵兵聚城中無舍可泊人馬暴露時苦寒凛庫緡空虗不議營搆守禦之術寂寥無聞張龍圗言纍陳乞只願領郡求免軍馬之務諸將何稟焉某巳有奏章乞别選人段待制西人所望無出右者明鎬亦知邊事頗見疚心如僉議未諧即某不敢避儒生之算豈能決成但一方之憂未有當者此夙夜切切不得巳也秋霖弗止禾穗未收斯民之心在憂如割近分擘延安兵馬作六將教習由鄜州之始其於利害奏牘具焉某卵翼門下雖竭心力常懼貽知巳之羞此所以罄其短拙而不知朝廷可否之意惟待罪而巳尚逺台座云云與省主葉內翰書某頓首竊惟皇上念天下之計至大至重思得良大夫主之故窹寐閣下之賢復有此拜而人莫得間之憂國者可不相慶然天下之計其難久矣自李唐中微天下多事諸節度各聚州兵據征賦以自支故有尾大不掉之釁起矣此非唐之本謀但四方縱橫撲滅不暇故因其有功而分裂之蓋不得巳也皇朝開造天下特革其弊重兵聚于京師至于諸節度之兵亦皆贍于度支誠長世之䇿也然祖宗之初約天下之入以周其用則倍有餘矣而八九十年間朝廷全盛用度日滋增兵頗廣吏貟加冗府庫之災土木之蠧夷狄之貪水旱之患又先王食貨之政霸王之略變通之術不得行於君子而常柅於群吏則天下之計宜其難矣某出於孤平感遇非淺亦嘗靣陳君天下之計而應和者寡故不得行及其居外固當不復為言今閣下再領大計必欲盡心為國家逺圖是君子可行之時非羣吏之可柅也某欲筆削于左右請公自行之則慮搢紳多言謂閣下力革前數君子之為以結上意又欲言于朝廷俟當閣下主議之亦懼獲晚節躁言之謗以故遲遲而莫能發但愧致身有餘報國無狀爾願閣下熟念天下長久之計考前賢至當之論則必變而通之非俟某之云云也殘暑惟自重為禱不宣某上又某啓近辱真誨答以報之自信之心弗改于舊此金石其誠對明神而無愧天下識者所以重道卿之髙正為此矣然國之安危存亡繫于其人正人安則王室隆正人危則天下憂故君子安其身而後動易其心而後語所以身安而國家可保豈特厚于巳耶漢李膺之徒黑白太明而禁錮戮辱雖一身潔清千古不昧奈何邪正相激速天下之禍漢室亦從而亡之僕以為與國同憂之人宜弗為也如與國存亡則有視死於鴻毛者豈特輕其巳耶今上睿聖至仁惟股肱協德則堯舜同功天下為壽前者數君子感遇激發而髙議直指不恤怨謗及羣毁交作一一斥去雖自信於心未足為耻使太上用忠之意謂吾道無可信者此不為重乎道卿能不鑒此宜其與國同憂無專尚名節而忘邦家之大則天下幸甚幸甚不宣某頓首上吕相公并呈中丞咨目知蘇州時某咨目再拜上僕射相公伏蒙回賜鈞翰又訪以疏導積水之事何巖廊之上而意及畎畝是伊尹耻一物不獲之心也天下幸甚某連蹇之人常欲省事及觀民患不忍自安去年姑蘇之水踰秋不退計司議之於上窮俗語之於下某為民之長豈敢曲沮焉然初未甚曉惑於羣説及按而視之究而思之則了然可照今得一二以陳焉願垂鈞造審而勿倦則浮議自破斯民之福也姑蘇四郊略平窊而為湖者十之二三西南之澤尤大謂之太湖納數郡之水湖東一派濬入于河謂之松江積雨之時湖溢而江壅橫沒諸邑雖北壓楊子江而東抵巨浸河渠至多堙塞巳久莫能分其勢矣惟松江退落漫流始下或一歲大水久而未耗來年暑雨復為沴焉人必荐飢可不經畫今疏導者不惟使東南入于松江又使西北入干楊子之與海也其利在此夫水之為物蓄而停之何為而不害決而流之何為而不利或曰江水已髙不納此流某謂不然江海所以為百谷王者以其善下之豈獨不下於此邪江流或髙則必滔滔旁來豈復姑蘇之有乎矧今開畎之處下流不息亦明驗矣或曰日有潮來水安得下某謂不然大江長淮無不潮也來之時刻少而退之時刻多故大江長淮會天下之水畢能歸于海也或曰沙因潮至數年復塞豈人力之可支某謂不然新導之河必設諸閘常時扄之禦其來潮沙不能塞也每春理其閘外工減數倍矣旱歲亦扄之駐水溉田可救熯涸之災潦歲則啓之疏積水之患或謂開畎之役重勞民力某謂不然東南之田所植惟稻大水一至秋無他望災沴之後必有疾疫乘其羸十不救一謂之天災實由飢耳如能使民以時導逹溝瀆保其稼穡俾百姓不飢而死曷為其勞哉民勤而生不亦愈於惰而死者乎或謂力役之際大費軍食某謂不然姑蘇歲納苗米三十四萬斛官私之糴又不下數百萬斛去秋蠲放者三十萬官私之糴無復有焉如豐穰之歲春役萬人人食三升一月而罷用米九千石耳荒歉之歲日以五升召民為役因而賑濟一月而罷用米萬五千石耳量此之出較彼之入孰為費軍食哉或謂陂澤之田動成渺瀰導川而無益也某謂不然吳中之田非水不殖減之使淺則可播種非必決而涸之然患或謂開畎之役重勞民力某謂不然東南之田所植惟稻大水一至秋無他望災沴之後必有疾疫乘其羸十不救一謂之天災實由飢耳如能使民以時導逹溝瀆保其稼穡俾百姓不飢而死曷為其勞哉民勤而生不亦愈於惰而死者乎或謂力役之際大費軍食某謂不然姑蘇歲納苗米三十四萬斛官私之糴又不下數百萬斛去秋蠲放者三十萬官私之糴無復有焉如豐穰之歲春役萬人人食三升一月而罷用米九千石耳荒歉之歲日以五升召民為役因而賑濟一月而罷用米萬五千石耳量此之出較彼之入孰為費軍食哉或謂陂澤之田動成渺瀰導川而無益也某謂不然吳中之田非水不殖減之使淺則可播種非必決而涸之然患或謂開畎之役重勞民力某謂不然東南之田所植惟稻大水一至秋無他望災沴之後必有疾疫乘其羸十不救一謂之天災實由飢耳如能使民以時導逹溝瀆保其稼穡俾百姓不飢而死曷為其勞哉民勤而生不亦愈於惰而死者乎或謂力役之際大費軍食某謂不然姑蘇歲納苗米三十四萬斛官私之糴又不下數百萬斛去秋蠲放者三十萬官私之糴無復有焉如豐穰之歲春役萬人人食三升一月而罷用米九千石耳荒歉之歲日以五升召民為役因而賑濟一月而罷用米萬五千石耳量此之出較彼之入孰為費軍食哉或謂陂澤之田動成渺瀰導川而無益也某謂不然吳中之田非水不殖減之使淺則可播種非必決而涸之然後為功也昨開五河泄去積水今歲平和秋望七八積而未去者猶有二三未能播殖復請增理數道以分其流使不停壅縱遇大水其去必速而無來歲之患矣又松江一曲號曰盤龍港父老傳云出水尤利如總數道而開之災必大減蘇秀間有秋之半利巳大矣畎澮之事職在郡縣不時開導刺史縣令之職也然今之世有所興作橫議先至非朝廷主之則無功而有毁守土之人恐無建事之意矣蘇常湖秀膏腴千里國之倉庾也浙漕之任及數郡之守宜擇精心盡力之吏不可以尋常資格而授恐功利不至重為朝廷之憂且失東南之利也某巳具此聞于相府仰惟中丞有憂天下之心為亦留意於此焉干冒威重卑情不任惶懼之至范文正公集卷第九
