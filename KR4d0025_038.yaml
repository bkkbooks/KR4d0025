body:
  text: 言行拾遺事録卷第二公用人多取氣節闊略細故如孫威敏滕逹道之徒皆深所厚者為帥府辟置多謫藉未牽叙人或以問公公曰人之有材能無瑕類者自應用於宰相惟實有可用不幸陷於過失者不因事起之則遂為廢人世咸多公此意凡軍伍以雜犯降黜者皆改刺龍騎軍石林燕語韓魏公章得象在中書時方天下多弊事且有西鄙之患每與希文彥國以文字至兩府章公輒閉目不答彥國憤惋欲悖之希文惜大體不許也魏公别録公常言史稱諸葛亮能用度外人用人者莫不欲盡天下之材當思近巳之好惡而自不知也能用度外人然後能周大事沈括筆談公與韓魏公召為樞密副使天下聞之士大夫皆酌酒相賀曰上用韓某范某非惟社稷幸乃天下生民之幸公知開封府明敏通决照事若神每上殿奏事多陳治亂以開人主歷詆大臣不法者長編慶曆二年仁宗以涇原傷夷欲令范某與文潞公對易遣內侍王懷德喻㫖公謝曰涇原地重臣恐不足以獨當願與韓琦同經略涇原並駐涇州琦兼秦鳯臣兼環慶一則夷夏相安事不亟易二則涇原有警臣與韓琦可合秦鳯環慶之兵掎角而進若秦鳯環慶有警亦可以率涇原之師以相應援三則通修環州鎮戎諸寨藉此兩路事力必能速有成功四則臣與韓琦日夜建議選練兵士漸復橫山以斷賊臂不數年間可期平定願詔龐籍兼領環慶以成首尾之勢秦州委文彥博慶州用滕宗諒總之孫沔亦可辦集渭州一武臣足矣朝廷皆從其請實録公言㳂邊逐寨雖有險固只有三二百人何以施為又城池中多無井水若不量事勢但令堅守徒陷一城軍民性命自挫軍威無益邊事其在環慶路相度二十三寨內有美泥虐泥大拔城等小寨但只量兵士差百十人把截道路如探得賊馬大假入冦便令歸側近大城寨內一處防守所貴不致枉陷軍民人心遂安奏議慶曆二年南郊赦書應因公事受到諸處行軍司馬副使司士文學參軍仰逐處並具到任月日負犯因依分析聞奏候到令刑部子細勘㑹元犯因依申奏委中書門下别取進止者公因奏言懷才抱藝之人一落散地終身不齒獸窮則變人窮則詐古人之所愼也况今邊事未寧尤宜使過欲乞朝廷催促逐處依赦文分析聞奏乞差近上臣寮就中書定奪元犯情理分作等第又委長吏密切體量上件人或有材質或有節行亦具申奏所貴負犯之人各期自新不懷幽憤唐張說薦負犯之人充將帥之用其表云活人於死者必舍生而報恩榮人於辱者必盡節而雪聇古猶今也乞朝廷留意實録元昊冦鎮戎軍葛懷敏入保定川寨涇原鈴轄曹英又敗於寨之東北隅懷敏所部人奔駭懷敏為衆所擁幾躁踐死輿至瓮城乃蘇賊遂圍城懷敏與諸將謀赴鎮戎軍賊斷其歸路與諸將皆遇害賊遂長驅至渭州初懷敏之除鄜延也范仲淹言其不知兵而又怯懦不可用遂徙涇原卒敗事東都事略張亢築清塞百勝中候建寧鎮川五寨而麟府之路始通亢復奏以所通特一徑請更築並邊諸柵以安河外議未下㑹契丹渝盟徙知瀛州遷果州團練使夏人與契丹戰河外范公宣撫河東因奏使亢知代州就令揔前議增築事不閲月諸寨成蕃漢歸者數千戶歲减戍卒萬人張亢夲傳公薦舉處士有徐復履尚高潔衍卦氣之法公過潤州問復以衍卦占之今夷無動乎復為占西邊用兵日月無少差又有郭京者好言兵公數薦之由是二人同召東都事略張俞上言謂今能詭制北虜散其隂謀使與叛醜疑二有結國家之心間誘西凉羣夷勿與賊結則虜首可得而天下定矣范仲淹以諌爭而遭擯斥若外狥物望內惟邦夲宜委重抦而授之苟能行此是謂失之東隅收之桑榆也吕夷簡甚重其言張俞傳公以西賊攻塞門寨其寨城池未備兵甲又少部署司不與救應寨主高延德為賊所擒後放歸漢界遂配逺方公言漢家將率有數人陷在賊庭俱是苦戰力屈為賊所擒即非背叛如朝廷貸高延德𬒳以寬恩仍與近邊任使使陷蕃將率聞之必願昊賊歸順望再見其家或即懷本朝之恩不助賊計如朝廷責其不死來者逺竄其陷蕃將率更無歸路必懷怨望其中或有助賊為孽其患不細昔漢中行說傳公主入胸奴說不欲行怨漢乃教單于大為漢患此人情之可見也乞朝廷留意康定元年九月辛未公以任福等出師攻賊白豹城破之冬十一月又出師出歸娘谷與夏人戰大敗之西夏夲末公以孫明復居泰山之陽著春秋尊王發微得經之本義為多學者皆以弟子事之公言其道德經術宜在朝廷召拜國子監直講東都事略韓魏公與公在兵間最久名重一時人心歸之朝廷倚以為重故天下稱為韓范初京師歲遣戍兵脆懦不習勞苦賊常輕之目曰東軍而土兵徑悍善戰琦奏增土兵以抗賊而稍减屯戍內實京師又以籠竿城據衝要乞建為德順軍以蔽蕭關鳴沙之道又建請於鄜延渭三州各以土兵三萬為一軍軍雖别屯而耳目相通為一視虜所不備互出搗之破其和市屠其種落因以招橫山之人度橫山墮則平夏兵素弱必不能支我下視興靈穴中兔耳章既上遂與范公定謀益堅而元昊知不可敵斂兵不敢近塞矣東都事略石水川之失利韓魏公降知秦州公亦以擅答元昊書降知耀州王堯臣言此兩人天下之選其忠義智勇名動夷狄不宜以小故置之明年葛懷敏敗涇邠以東皆閉壘自守公自將慶州兵捍賊賊始引去仁宗思其言乃以魏公與公為招討使堯臣曰陛下復用韓某范某幸甚然將不中御兵法也願許以便宜從事仁宗以為然從之九朝通略仁宗嘗語張士遜曰人言仲淹嘗欲乞廢朕朕但未見其章疏耳士遜曰陛下既未見其章疏不可以空言加罪望陛下訪之積十數請仁宗曰竟未之見也然為朕言之多矣士遜力為辨其不然仁宗意乃解其後士遜歸老啓國于鄧范公適守鄧州士遜還鄉范公置酒高㑹明日士遜復置㑹揮金甚盛時人榮之張鄧公傳韓魏公曰呂申公以進賢自佐恩歸於巳時士皆出其門獨范公歐公尹公旋收旋失之終不受其籠絡也魏公别録原州屬羌明珠滅臧二族兵數萬與元昊隔絶鄰道公聞涇原欲􅊞討之公奏言二族道險不可攻前日高繼嵩已嘗喪師平時猶懷反側今討之必與賊為表裏南入原州西擾鎮戎東侵環州邊患未艾也宜因元昊别路大入之際即并兵北取細腰蘆泉為堡鄣以斷賊路則二族自安矣而環州鎮戎等處徑道通徹可以忘憂矣後二歲遂築細腰葫蘆諸寨屬羌歸服長編慶曆五年三月歐陽公上疏言公與杜公富公不當罷其略曰昔年范仲淹初以忠言讜論聞於中外天下賢士爭相稱慕當時奸臣誣以朋黨尤難辨明近日陛下擢此數人並在兩府察其臨事可以辨也此四人者可謂公正之賢今范仲淹四路之任亦不輕矣願陛下拒絶羣謗委信不疑使盡其所為猶有禆𥙷長編慶曆四年八月辛卯初命參政賈昌朝領天下農田范仲淹領刑法事有利害其悉條上初公建議請以三司司農審官流內銓三班院國子監太常刑院審刑大理羣牧殿前馬步軍司各委輔臣兼判臣願自領兵賦之職如其無𥙷請先黜降章得象等皆以為不可久之乃降是命九朝通略慶曆元年春正月朝廷既用韓琦所畫攻䇿先戒師期知延州范仲淹言正月內起兵塞外雨雪大寒暴露僵仆使賊乘之所傷必衆賊界春暖則馬瘦人飢其勢易制及可擾其耕種之務縱出師無大獲亦不至有他虞又言鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷存此一路令諸將勒兵嚴備賊至則擊未行討伐容臣示以恩信歲時之間或可招納苟歲月無效遂舉重兵取綏宥二州擇其要害而據之屯兵營田作持久之計如此則茶山橫山蕃漢人戶可以招降則是去西賊之一臂也戊午詔從仲淹所請宋朝通鑑公在延州言鄜延路入界北諸路最逺若先修復城寨即是逺圗乞遣使命令臣督諸將出兵先修復廢寨别置戍守既通近蕃界彼或點集人馬朝夕便知大至則閉壘以待隙小至則扼險以制勝公前後凡六奏卒城永平等十二寨蕃漢之民相踵復業宋朝通鑑慶曆間江淮歲漕不給京師乏軍儲樞密副使范仲淹言國子博士許可元獨倚辦遂擢元淮江兩浙荆湖制置發運判官元日以六路七十二州之粟不能足京師吾不信也至則命瀕江州縣留三月糧悉發之逺近以次相𥙷引千餘艘轉漕而西未幾京師足食長編諫官歐陽修言韓琦范仲淹久在陜西備諳邊事是朝廷親信委任之人况二臣材識不類常人其所見所言之事不同常式言事者陛下最宜加意訪問使其盡陳西邊事宜合如何處置余靖亦奏言范仲淹號為最曉邊事實録給事中參知政事王舉正為禮部侍郎知許州初諫官歐陽修余靖蔡襄咸言范仲淹有宰輔材不宜局在兵府願以仲淹代之上從其請遂以范仲淹為參知政事仲淹曰執政可由諫官而得乎固辭不拜公在陜西戒約諸寨若是賊馬大假入來更不得出兵迎賊鬪敵但且堅守一靣供報部署司并䇿應官貟候逐處軍馬到來方得設謀掩殺如輕易出兵致有輸折其本處官貟並行軍法既而准樞密院劄子若賊寇深入應外城寨除留定防守城池外並須領兵先據險要覔便攻擊如敢以防守為名端坐不出具狀申奏乞行軍法奉聖㫖依奏公言自古用兵本無常勢非可畫一而制也相度夲路諸寨之兵多者千人少者五七百人或三二百人只令防守城池尚慮不足若有蕃賊入冦其寨主監押等縱有勇敢往往見小利便出兵與之追逐如西賊以羸兵誘致離寨稍逺别出精兵斷其歸路寨中無兵即見危陷假有一將在外去州或逺應援未至如遇賊衆大至多選精鋭并攻一處謂之奪險非有驍將血戰勢不能支若外兵先敗則州城之兵望風挫氣必難為用臣謂應變之機拘以條貫非其利也其所降指揮不敢行下奏議西賊寇鎮戎軍官軍不利公牒知原州景泰等令六頭項下軍馬㑹合相度㨂選精兵三二千人夜擊蕃寨探候山外賊馬回時即多出竒兵夜間或侵曉伏截衝擊收救人民仍戒約不得脫剝𬒳虜人户人物公又恐諸將貪功一向急去追􅊞𬒳西賊設伏兵更落姦便又牒景泰等火急多差人搜山探候如探得西賊先有伏兵即便就高駐劄别選敢死之士多作頭項先去掩擊只以收救人民不得貪小功小利再有踈虞以副朝廷之意公又到邠州略示兵勢又出榜永興軍諸州以安關中人心奏議陜西新刺保捷兵士多將本家贍軍田土并已分物業典賣破貨公言上件兵士並是鄉民若向去稍似年高披帶不得即須揀放歸農如今來破貨了莊産將來無可歸投便見失所遂出遍榜曉示諸州軍應新刺保捷兵士如今後乞將夲家贍軍田土已分物業典賣破貨者不得施行其典賣人嚴行斷遣如將來殘患不堪征役及有年高不任披帶放令歸農者即給與巳分莊田養種并劄與逐處令指揮諸縣依此出榜常切覺察施行奏議皇祐元年春上御便殿訪近臣以備禦之䇿權三司使葉淸臣對日今輔翊之臣抱忠義之深者莫如富弼為社稷之固者莫如范仲淹又曰諳古今故事者莫如夏竦議論之敏者莫如鄭戩方靣人才方重有紀律者莫如韓琦臨大事能斷者莫如田况剛果無顧避者莫如劉渙宏逺有方略者莫如孫沔至於帥領偏禆貴能坐運籌策不必親當矢石王德用素有威名范仲淹素練軍政龐籍久經邊任皆其選也長編言行拾遺事録卷第二
