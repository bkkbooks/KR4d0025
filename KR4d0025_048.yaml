body:
  text: 文正忠宣父子諸公道德充積於中著於勳業見于文章其片言隻字皆有裨於治道世教非若世之文士徒枝詞琢句務為工而巳故今於諸公之文雖有數語亦必記録使人知范氏之不朽者蓋在於穆叔之所謂立言而非宣子之所謂世祿云與中書論責劉琦事忠宣公今日忽聞詔命以臺官劉琦等言多失實事輒近名擅去官曹規喧朝聽各落御史降充監當者聞命之際中外震驚蓋人臣以率職為忠人君以納諫為美是以仁宗開言路優容諍臣執政不敢任情小人不能害政以致太平日久億兆乂寧先帝容納直言未嘗變色是時呂誨等與純仁為御史亦嘗擅納告身皆蒙慰諭主上思紹先烈而因二三執政不能以道致君教化或失其後先刑賞或乖於輕重中書藏其本末但致外議喧騰凡居言責之臣敢不即時論奏既許風聞言事即是過失得陳而柄臣遂捃托其罪主上將何所賴且參政以文學自負議論得君專任巳能不曉時事而又性類率易輕信難回舉意發言自謂中理欲求並切忘其舊學捨堯舜知人安民之道講五伯富國之術尚法令則稱啇鞅言財利則背孟軻鄙老成為因循之徒棄公論為流俗之語異巳者指為不肖合意者即謂賢能所以薦薜向為周才指呂誨為無用主上無從諌之美時政有揠苗之憂曾相公年高不退廉節道虧但欲見容雷同苟且舊好拘文守法今則一切依隨趙參政心知其非而辭辨不及凡事不能力救徒聞退有後言此皆朝廷大臣所為安得政令無失按此篇亦見言行録中但彼以為上神宗而此以為與中書兼詞語亦多不同故重出之論王覿不當責疏忠宣公陛下臨御以來未嘗嚴責諌臣一旦行之恐傷仁化又慮來者或多各一一竄逐浸失朝廷淸淨之體所有先降貶責王覿文字臣未敢簽書若陛下決以臣言無取乞謫臣𥙷外臣雖一身斥逺若遂決朝廷大疑則是猶有所補不辜柬拔則死之日猶生之年王氏語録序忠宣公先生名伋字孔章希逸子其號也自唐中葉世司天文能先見藝祖祚曆之象者先生之世祖也族居京師有年矣以議金雞曆出江西故先生為江西人明經取青紫佐雍熙者先生之志也不幸試南宫偶遺乃藴所學以紹箕裘交逰中有以功名勉之者則曰植黨蔽賢象數巳著吾人苟獲漏網亦幸矣未幾王介甫出焉朝野咸服其明嘗病卜相之術雖可與醫同試見效然於人事不加損益醫與營居送死雖皆為通世之術然禍福詭誕非若卜相者之有稽驗因考諸左傳著書五篇折衷隂陽使與儒家不相角立曉迷釋惑俞為有力異乎太史公所謂流者逺矣又有醫書二十四卷行于世此又可以見先生之博物也一日葉叔亮集其語録以示丹陽叟嘉其純正不爽時譽出處之節無愧古人因援筆以書左界焉叟謂誰范其姓純仁名堯夫字先生故人也議太廟增室事云書曰七世之廟可以觀德則禮記謂天子七廟三昭三穆與太祖之廟而七也蓋七世㝎於廟數之中不緣所事之人所謂有天下者事七世云者特因廣數以經禮言之也國朝自禧祖而下至仁宗始備七世故英宗祔廟則延順祖神宗祔廟則遷翼祖三昭三穆合於典禮今來太行皇帝於神宗父子也如禮官所議更增一室則廟中當有八世四昭三穆考於典禮未有合者况唐文宗即位則遷肅宗以敬宗為一世故事不逺在後無違將來大行皇帝祔廟當以神宗為昭上遷宣祖以合古三昭三穆之義恭獻公議南郊合祭云南郊合祭天地不見於經神宗皇帝考援古誼詔罷合祭元豐六年止祀昊天上帝於圎丘唯是北郊先帝未及躬行然詔㫖明甚所宜遵守者也又言春為陽故以正月迎於東郊秋為隂故以七月迎於西郊聖人有作莫之能改也今使迎春則在西郊而用秋之時迎秋則在東郊而用春之時樵夫野叟猶怪以駭而况於鬼神乎天之與人非有異也今應祭方澤也而合於圎丘用夏至也而用冬至益何以異此合祭肇於漢末其言不經朝廷近制考之方䇿告之宗廟行之天地布之天下以憲萬世或委聖言而從不經不可也龍圖苑純粹論西事當改圖云元祐六年九月奏准樞密院劄子夏國既失恭順又復巳絶恩必須輕忿日以擾邊為計更須别圗方略元祐以來朝廷之所以御夏人處邊畫者莫非以禮義為本以恩信為先一切容貸期于息兵然六七年間戍兵之卒未嘗减罷金榖之費未嘗省羡備禦之計未嘗簡㢮耳且彼所求我必與之不知真足以厭其所欲不為它日之患乎夫要害之地濟無厭之求虧國體勢墮賊計謀養虎開端不可不謹臣願並以元頒詔書從事如其偃蹇置而不問戒飭吏嚴備如昔希㓛造事固所不可護邊待敵宜無甚難以區區內亂之小羌尚能與中國久抗乎以歲月决可竟事在朝廷不惑而已又論熙延與夏國所畫封疆事云臣聞熙延兩路與夏國所畫封疆至今未决外議謂朝廷務在息兵失于欲速故强寇要索日益滋彰雖聖朝懷來四夷固為上策若邊臣不究利害但務委隨則國體事機不無虧失自二聖臨御之始夏人來朝繼秉常訃至乾順自立使者係道往返五六賈販貿易隨巳豐富雖修甚恭蓋亦為自資之計耳朝廷即遣使往加封冊欲速之意為賊所窺果聞侮慢使人不即稱謝興兵入寇延渭破殘反覆不恭宜在殊絶後日復有所請但可只委邊臣謂之要約示以間暇使之望望然惟恐拒而不納則輕重之權在我事既審决邊臣始以謝罪請盟之狀聞于朝廷然後明詔中外貸彼既往之罪聽其乞盟之請歸吾陷賊之人賜汝既許之地如是則朝廷之體豈不甚尊而制寇之䇿豈不甚簡歟昨不為此計聞其有請即許造朝使人既至朝廷酬對寧不知皆廟堂謀臣之言乎是顧接太重許可太輕既許以陷虜之衆易新造之壘人有品色多寡之異地有形執遠邇之差約當素明謀當素㝎皆著于書然後受人割地交相付與則彼尚何所能為乎今謀約不素明定彼以疲殘百餘人塞責而來我乃不復較問亟以四壘付之四壘即付即以平轍熙延二境始議畫疆顧不晚乎先巳然者固不可追今可為者審究徐圖尚未晚也如聞夏賊於塞門金城之城重有邀求又聲言與西鄰為合從之謀將以重我外議謂朝廷不以為重而輕棄之信如是則欲速巳甚矣朝廷所以謂金城塞門為不可棄者非以兩孤壘之為利也謂其形勢險阻足以藩籬邊􅗲土田沃壤足以贍給邊兵也故不在賜給之限今乃欲局目前之小休棄形勢之要地舍數千戶已耕之土斷數百里斥候之衝屏蔽無餘出門過敵道路梗澀運餉艱虞孤壘僅存我將安用詔旨不與之地徒虗名耳彼乃愈益猖狂邊患滋甚固宜朝廷之改圗也聞梁乙逋用事之久元祐二年三寇涇原而漢兵十一將拱手城中不出一騎使席卷而歸後乃悉得前後所積歲賜金帛每語人曰嵬名家人管國事有此功否我之所以連年點兵者欲使朝廷憚我而為國人求罷兵耳昔元昊叛時雖數遣人求和而故為悖慢難從之議朝廷既不從則語衆曰我求罷兵而南朝不許用此以歸怨激衆衆戰咸力乙逋今乃效之今朝廷既議貶絶宜作邊帥草檄以淺近易曉之言具道乙逋無厭犯順之詳朝廷用兵于不得巳之意令諸路多作木印棄于賊疆不惟可以伐狃衆怨之謀又足以激怒其衆使知禍自梁氏始庶有衆怨親叛之理朝㫖但欲使近邊之人不能著業臣巳謂未足繫彼國之要害使一國之衆奔命不暇而莫知所備斯可矣欲如是當令諸路帥臣公心叶力謀議相關一路將有所舉則諸路陽為點集出兵之勢以留對境之備則實出路分賊無併兵拒敵之患諸路更守迭出則彼所備者勢分而力勞矣又自來諸路多招納降人自元豐以來諸路所納不為不多若謂可以耗彼力戰之人則夏賊舉必數十萬豈招降之可耗也若謂可以助戰緣降人出入將帥豈敢全然倚仗計口給食坐耗邊榖借有地土可給亦妨占弓箭手請射之田其間仍多姦細緩急漢界有所舉動則猝然逸去致漏機事有害無益將求漢兵迭出宜悉止絶以清久弊朝廷如果令諸路互出鋭兵撓賊當密戒諸路帥臣每有所舉不用過為祕密略使兵聲先出勢若大舉使彼衆得以逺避我鋒然後出偏師以信其聲則其誰敢當要使數百里野無得耕之土衆無休息之期而巳又申嚴博易之法以絶市貨則困賊之䇿在其中矣是不待多殺而為利也又乞修明元頒戰守約束云國之所以前坐制西夏者誠由連城北帥並統重兵利害相同左右相援首尾相副聲勢相接心一而力同氣逺而勢重如一身之有手足上下交相為用而無有偏廢此我之所長而彼之所畏者也昔寶元康㝎用武之時先臣仲淹嘗統兵往援鄰道破元昊長驅深入之謀救涇原屢衄可憂之患見於巳試理勢灼然朝廷後來參定戰守紂束頒降諸路實用其䇿非因徐禧計議邊事輕有改張遵行之初自罹其害蓋兵家張耀聲勢左牽右制古所不廢固未聞兵寡兵乏不假聲援而能獨勝者也今邊事未平虜情難測伏望朝廷深賜詳度撿㑹臣前奏及元頒戰守約束再如修明又奏答訪問所問邊防機事云准詔諸路探報自秉常身死梁氏族人侵擅國事遂致諸部酋豪往往不服變亂交攻日相屠害若有投來西人仰相度可否收留仍更切厚與賞物募人逺探目今邊情向去利害縷細詳䆒措置聞奏臣除巳依朝名施行外伏詳詔旨所問邊防機事而繫中外安危之本者如臣之愚顧何足以語此臣早膺使任久在邊􅗲採托審料在朝廷正宜安不妄動用觀成敗之變息兵止殺重農務本太平之迹始於今日尚何此䇿之議哉彼之部酋若有以梁氏之禍來告者若請兵于朝者若據地而願附者若挺身以降者朝廷使邊臣諭之曰若主不幸爾乃臣子當盡死節之義善為若主討賊而巳尚何來告耶何但欲脫身而內附耶我之邊兵方備他盜不為爾捕寇也臣觀戎狄之性以種族為貴賤故部酋之死其後世之繼􅊞者雖雛稚之子亦足以服老長之衆秉常父子有國綿久國人歸心今諸路諜者之言雖曰秉常之死不明梁氏之族侵擅國事若謂遂能滅李氏之宗而有其國則臣未之信也蓋一國之衆豈無豪傑推李氏族子以主其國者乎豈遂甘心為梁氏子臣屬乎又奏乞那差將兵云紹聖二年呂大忠乞赴闕願早降指揮始朝廷劄下熙河范純粹預行措置建汝遮堡有如修建定逺城之類機便行以乘伺間隙修建之時即趂時併功興役伏奉指揮昨修㝎遠城下除本路將兵盡數調發照應防托外更蒙朝廷指揮下秦鳯路那將兵三二萬於通渭寨側近擇利駐劄照應萬一西賊犯境於夲路將兵共力枝梧及下涇原環慶路各於本差定兵將頒及萬人巳上沿邊擇利駐劄大張聲勢使賊疑懼不敢併於一路作過將來萬一遂舉汝遮之役除本路兵馬斟量調發防托外乞朝廷預降指揮下秦鳯涇原環慶路經略司各令密切依昨來修定逺城例差那將兵預作准備候見夲司關報即於逐處沿邊駐劄照應貼黃稱仍乞下逐路帥臣别以他事為名密切為備雖弟子官屬並不得預聞庶無漏落又奏蕃官李忠傑等事云准樞密院劄子蕃官包順包誠李忠傑趙懷義趙永夀許時暫赴闕臣赴任之𥘉准朝旨體探招納邈川河南人戶等蓋自范育在夲路日曽有遣納趙嗣忠之議又种誼還自京師昌言𬒳旨招納緣日有阿里骨般次買賣向者謀議不容不知今醇忠之子𬒳召恐多猜疑於臣所放機事有害兼懷義永夀資才無可取未敢遣赴闕并免與功多蕃官别有形迹及李忠傑見體量將入界捉來首領却送過天都等事臣輒從宜將行出文字節去李忠傑趙懷義趙永夀姓名止將包順包誠差使臣押伴赴闕其包順包誠今來朝見如欲示旌勸只乞賜與金帛願留官爵差遣以責來效及乞不以邈川河南情僞詢訪逐人恐有漏泄詔阿里骨見差般次赴闕進貢所有前後經營青唐指揮更不施行李忠傑三人别聽朝旨其體量李忠傑事狀如無顯迹即不得少有枝蔓漏落致使危疑不安又奏牽制西夏事云牽制之要當於平日先探知彼界人戶團聚虗實之所遇事决䇿前去指其巢穴攻其必救則解圍制寇不致虗發緣諸路帥司所出牽制之兵止於一路而賊之大衆勢必十倍既衆寡不敵則牽制兵馬所行分須與賊兵聲勢相逺彼犯我東我出彼西進退之際不相逢迎庶無取困之慮今熙河秦鳳路地如犬牙兼秦鳳一路止有雞川兩寨之地係有邊面受敵之處若西賊舉衆欲秦鳳兩寨須經由看都川淺井川羅和市一帶山谷分頭南來此外更無他路如此則賊兵未至秦鳳巳先逼近本路通逺軍通渭寨一帶邊靣地形道路披圗可見除通逺軍蕃漢兩將人馬自須戒嚴以防侵軼不惟難以內自空虗引兵它出外所有熙河蘭岷等處漢兵蕃馬雖是可用緣本路對境惟東北天都山南牟㑹打繩川銼子一帶方是西界人戶團聚住坐之所指此而進即行兵之路却須自看都川淺井川羅和市或石硤子等處結陳前去乃在賊兵歸路之外聲勢甚逼彼雖巳犯秦鳳若探知本路兵行不逺必是引衆而還遂出我師之後即見我之歸路立見梗絶甚非安全之計蓋本路在夏國西南極盡之處除天都等處路與賊迫近不可經畫外捨天都而西即全無人戶住坐如蘭州正北屢經漢兵討蕩具見的實决雖無利可乘恐徒有塞命之名枉致勞弊以此推較蓋諸路地形逺近不同而夏人團聚居止䟱密有異故攻取便利理難一體本司今相度除賊寇河東鄜延環慶如探得天都一帶别無大假人馬㑹聚本路可以出兵牽制外如西賊併兵寇犯秦鳳路即本路兵馬止可於白城谷災竿堡左右照應相度賊勢覔便攻擊或㑹合秦鳳之兵共力掩殺如此則兩路兵勢相合賊必不敢為深入持久之計所貴不失機便伏緣今降朝㫖㝎夲路不許策應只令牽制有此利害深慮緩急申請不及伏乞朝廷更賜詳酌指撝貼黃熙秦路兩既相鄰接則形勢一同今秦鳯之於熙河既不可牽制只可䇿應即熙河之於秦鳳利害不殊並乞驗㑹本路前後所供對境圗籍即見逐地名道路形勢利害牽制䇿應之法中間久廢因臣在環慶纍曾論列方蒙朝㫖下諸路頒行臣等曾預先探知西界人戶團聚之所後因賊犯鎮戎係在涇原西北與環慶相去三百餘里臣曾搗虗破賊於曲六律掌俘馘甚多遂解鎮戎之圍比其歸護巢穴則我師還塞方才一日僅免阻扼轉戰之患是時若賊勢稍相附近即歸師難保伏乞朝廷更賜照察又奏分兵守汝遮云樞密院撿會巳降朝㫖下熙河蘭岷路乘機㑹修築汝遮去訖近節次據本司奏乞修展蘭州西城及㝎西㝎逺城雖巳各降指揮依奏三處所用功役萬數不少慮夲路於修建汝遮有所窺避將來以此為名致失機㑹昨者本以三處城圍全闕增展或見今人馬暴露或緩急矢石交通無計保民日憂招冦念汝遮大役既須候可乘之機則廂兵數千不當廢他壘之用兼汝遮役所地里非遙候其進築有期立可移兵前去愚慮偶爾及此於理合具奏心實無他事屬兩便臣所以且以修築蘭川㝎西定逺為名分擘役兵前去使衆人明見逐處興作庶解夏人之疑比至汝遮有機可乘則役兵皆在鄰近委實安便又奏蕃官改姓云契勘本路蕃官自來有因歸順或立戰功朝廷特賜姓名以示旌寵如嵬名山為趙懷順朱令唆為朱保忠是也後有蕃官無故自陳乞改姓名經略司不止遏據狀申解省部亦無問難遂改作漢姓如乙格為白守忠兀乞為羅信是也亦有不曾陳乞衷私擅自改作漢姓如盧唆之子為周俊明是也見今更有蕃官扳援陳乞無故自便衷私撰改漢姓竊詳古者賜姓氏者皆朝廷所以酬功德别忠勤也今反使夷狄醜類無故自易姓名混雜華人若年歲稍逺則夲源汨亂無由考究漢蕃弗辨非所以尊中國而别異類也欲乞諸路蕃族除係朝廷特旌寵賜與姓名外即不許陳乞改作漢姓有今日不因朝廷賜姓之人並行追改各依舊如允所奏只乞作朝廷訪聞立法行下又論交移生口事云樞密院言環慶路將兵與夏人戰俘馘老幼婦女范純粹選留仍揭榜喻其親族以舊掠漢人對易其引導者人賞以絹三匹十歲巳下二匹交換生口若施之於講和罷兵之時則名體俱順無所不可緣夏國方爾悖慢興師盜邊在朝廷宜明示棄絶戒諸路邊臣整兵聽命或間出竒兵使其應敵不暇或擾彼農事使其地不得耕或反間用權或旁行招納必使彼衆勞厭人意動搖則其凶酋必使改輒然後邊釁可期於止息也若於此時便議將生口與之交換即恐體勢不重有害事機廉訪聞得西界凡是捉虜到漢界人口並一一赴衙頭呈納多是於近裏去虜監防羈管今來本路所獲老小人口止是橫山一帶人戶縱有逐家骨肉丁壯願遵朝命亦何緣於近裏取得羈管之人前來交易以此推之恐徒有輕動必無實利又論洽平兵馬與今不同元祐三年癸亥詔以治平臣僚所上互進方略授逐路帥臣講求困賊之䇿切詳治平年兵馬數目以至將佐頭項遣應次第即與目今全然不同臣仰悉朝㫖大意而巳使西賊於逐路山界各有所畏分兵待敵不敢併兵一路則我計方行邊機難以預㝎貴在臨時處决即先事無可預陳所有准備西賊互有酬賽防庇邊民一節即不異見今備寇之策又奏乞訪問州縣闕食去處云臣訪聞得夲路州縣民間甚有闕食去處及逃過主客人戶數目不少蓋緣纍年不熟又自軍興以後調發顧卒凋弊為甚而保結團教之法方此推行兼民間以邊事未平妄意私憂加之向春闕食遂此流散深慮關陜根本益致殘弊所繫不輕如蒙施行只乞作朝廷訪聞內賜指揮又奏乞勞賞曰珍昔年雖有鄰路牽制應援之法多是兵將官不務公心不以鄰路𬒳冦為巳職或量以少少軍馬或故為迃逺備禮塞命遂致永樂之禍臣自領漕關中至忝今任纍纍論列三年間方蒙朝廷㝎議再立牽援之制昨來九月𥘉五日晚得涇原路報賊公牒臣於是特遣委曲珍巳下點兵束裝翌日長驅出境外三百餘里大破賊巢賊衆到漢界三數日解而去者珍之功也今來受指揮臣並未敢輒以語人欲望聖慈只遣近下使臣依涇原例就慶州勞問出界將官曲珍巳下支押賜合得銀合茶藥見朝廷勸賞不忘功之意在朝廷無所增費而於本路士氣足以激勵稍厭人情不為小補遺文終
