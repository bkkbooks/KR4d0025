front:
  text: 范文正公别集第一
  hash: sha256:4f1769647ff58dc20eff4f09cc074549d14ab7dcb2ccaa3bad4d1bef3003dfbc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_022-1a}
body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校古詩寄石學士家有清白志所寶甑中塵休去無生涯老來猶苦辛一麾了婚嫁萬事蠹精神與君嘗大言定作青山鄰蹭蹬未携手得無羞故人江樓寄希元上人淸言一以遙默默江樓上安得如白雲無心兩相忘酬和黃太博古籍東南美蔚蔚幕中議懿行希聖賢高文粲遊賜伊余髮巳秃偶繼立朝士何以宣王政甘為時所棄酌以廣州泉不易伯夷志直哉心如絃安慮道邊斃竊嘗力於古秉筆庶幾至孰為未聞逹聊以道幽祕夫君鏘以名尤為世之器贈我百餘言升堂出而示土木朽且陋黼黻謬增賁母鹽煩刻畫返朴吾所愧華勛愛士心蓬壺延才地何人薦於子當彼得言位吐以胸中竒落落金玉繼九虗髙可遊凌厲垂天翅吾將退而隱尚得榮其視滕子京以真籙相示因以贈之泰山采芝人吏隱清淮濵金函祕寶籙奉之如高真謂子有仙志興言一相示叩頭鳴天鼓玉書粲然異白雲引輕素朱絲聞靈篇題云天寶歲傳於任鳯仙兵火換九州于兹三百年非有靈物持此書安得全緑字起龍蛇丹文掛星斗六甲當奉行百神乃奔走密密天上語忽忽人間有與君置青山解冠松桂間服此上清籙上清庶可攀無為塵土中草草凋朱顔送徐登山人重君愛詩書孜孜不知老白髮未理生惟談聖人道愛君妙山水所得是神氣尺素寫林巒邈有千里意今日江南行孤雲無繫程直指九華峰去掃先君塋却來華陽川與我溪上盟行歌紫芝秀坐嘯清風生練真變金骨飄飄朝玉京結成物外遊忘此天下情匣劒靈劒經年匣決雲誰為高報人如有道何認問吹毛南園南園萬樹花極目春芳麗林下老成人相招植松桂行歌行歌春滿路坐歌春滿園花前人自樂桃李豈須言明月明月照前墀朱絃奏流水清風如未回敢望無雲起南樓南樓百尺餘清夜微埃歇天會詩人情遺此高高月送陳瓌秀才遊金陵君有江南行為君歌以喜龍盤山萬曲練靜江千里江山不可空台星照吳中相國隴西公時鎮金陵古來主謝地今有周召風而間楊誥與鄭戬萬丈光相映煌煌聚宰府金陵一何盛此去知巳賢雅客情無邊白雲起江樹明月逐江船雲月共徘徊優哉如逰仙歸來笑春風白日登青天過方處士舊隱某景祐𥘉典桐廬郡有七里瀨子陵之釣臺在而乃以從事章岷往搆堂而祠之召㑹稽僧悅躬圗其像於堂洎移守姑蘇道出其下登臨徘徊見東嶽絶碧白雲徐生云方干處士之舊隱遂訪焉其家子孫尚多儒服有楷者新䇿名而歸因留一十八言又圖處士像於嚴堂之東壁楷請刋詩于其左詩見前集送歐伯起天與神交忽解携一溪風月更同誰自慙蕭灑如猿鶴却向周郎怨别離九日欲賦前賢九日詩茱茰相鬪一枝枝可憐宋玉情無限爭似陶濳醉不知緑鬢愛隨風景變黃華能與歲寒期登髙逈處狂多少笑殺襄陽拍手兒送虎丘長老暫向天台參衆真虎丘風月遠隨身瓊臺肯便長棲去無限人間未度人寄潤州龐籍北固高樓海氣寒史君應此憑欄干春山雨後青無限借與淮南洗眼看送湛公歸四明講席滿靣南風指四明山長水曲不勝情自言此去雲林下惟講華嚴報太平和龐醇之見寄北樓千尺午猶寒冉冉飛塵不可干橫望滄𬈑了無際貴人休向畫圖看依韻和胡使君書事都督再臨橫海鎮集仙遙輟內朝班清風又振東南美好夢多親咫尺顔坐嘯樓臺凌皓月行春鼓吹入青山太平天子尊耆舊八十王祥未賜間贈吳秀才萬戶侯家幾葉孫弟兄紅斾獨烏巾携琴又入廬山去誰信朱門有逸人依韻和龐殿院見寄二十年前巳定交而今鵬鷃各逍遙但能賈傅親前席何必蕭生意本朝直節羡君如指佞孤根憐我異凌霄凌霄花名生且有托莫將富貴移平昔彼此清心髮半凋依韻和魏介之同逰玉仙壇雲壇共上百神清碧塢紅霞相照明幽草欲迷丹井處亂峯依舊白雲生亭亭翠纛高杉矗險險狂雷落石轟待得九霄鸞鶴馭玉書應改地仙名本傳云玉作遼地仙也依韻和介之未開菊本非桃李色佳節敢先開席上無言晚霜前幸未摧芳心應有待真賞直須催願上金樽壽何傷蝶不來依韻酬池州錢綺翁天涯彼此勿冲冲內樂何須位更崇白髮監州身各健青山繞郭景多同日高窗外眠方起月到樽前宴未終况在江南佳麗地重陽猶見牡丹紅鄱陽牡丹有四時開者寄題溪口廣慈院越中山水絶纎塵溪口風光步步新若得㑹稽藏拙去白雲深處亦行春范文正公别集卷第一
