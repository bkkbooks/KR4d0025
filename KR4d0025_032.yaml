front:
  text: 范文正公政府奏議下
  hash: sha256:12178d518947619542a7e4aa48e20ca81ef7499d54cb63b13c69f3b295cc14c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_032-1a}
body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校邊事奏陜西河北攻守等䇿臣蒙聖恩非次奬擢待罪兩府日夜憂迫恐負陛下委用之意臣等誠無所長但塞下初還粗知邊事不敢有隱臣等聞三代以還皆有戎狄之患以至侵陵中國被于渭洛齊晉逐之於前秦漢驅之於後中原始清人倫乃叙逮于西晉之弱群胡猾夏天寶之末石晉之際中國不幸皆罹其害自周世宗北征之後雖疆土未復夷夏稍分我祖宗奕世修僃大庇生民今西北二方復相交搆夾困中國元昊率先叛命兵犯延安次犯鎮戍殺傷軍民曾無虛歲中國之兵討伐未利而北虜舉十萬衆謂元昊是舅甥之邦責中國不當稱兵此交搆之跡更何疑哉國家以生民之故增物帛以續盟好彼既獲利方肯旋師今乘西夏通順之議又欲主盟邀功自尊大元昊屢戰勝且倚北戎事勢雖求通順實欲息肩亦如比戎大獲厚利候其物力稍豐可以舉衆則必長驅深入有吞并關輔之志何以知之昨定川之戰我師不利彼作僞詔誘脅邊人欲定關中其謀不細蓋漢多叛人陷於窮漠衣食嗜好皆不如意必以符堅劉元海元魏故事日夜游說元昊使其非獨元昊志在侵漢實漢之叛人日夜為賊之謀也朝廷若從其通順則北戎邀功自為主盟下視中國要求無厭多方困我而終於用兵矣若拒絶其意則元昊今秋必復大舉北虜亦必遣使問我拒絶元昊之故或便稱兵塞外張勢脅我國家至時寧不疑懼必於陜西選將抽兵移于河北未戰而西陲巳虛元昊乘虛而來必得志於關輔此二虜交搆之勢何以禦之臣等思度是和與不和俱為大患然則為今之謀者莫若擇師練兵處置邊事日夜計略為用武之䇿以和好為權宜以戰守為實事彼知我有謀有僃不敢輕舉則盟約可久矣如不我知輕負􅉀約我則乘彼之驕可困可擊未必能為中國患也臣等請畫一言之一和䇿臣觀西戎蓄禍積有歲年德明在時已聞僣擬元昊方壯遂肆凶驕外倚北戎內凌中國屢戰屢勝未嘗挫衄而乃輒求通順實圖休息所獲者大利所屈者虛稱然猶干請多端姦謀未測國家以生靈為念不可不納如唐高祖太宗應天順人百戰百勝猶屈於突厥當戎王始亡為之舉哀廢朝三日遣百寮詣館弔其來使其屈禮之甚也又太宗騎六騎於渭上見頡利與語復親與之􅉀頡利既退左右勸擊之太宗謂我擊彼敗懼而修德後患必深乃周旋俯就使之驕怠一旦遣李靖擒之威振四極此盛王之謀也陛下如唐高祖太宗隆禮敦信以盟好為權宜選將練兵以攻守為實事彼不背盟我則撫納無倦彼將負德我則攻守皆宜如此則結好之䇿未有失也二陜西守䇿元昊自來通順之時歲受恩賜朝廷撫納甚厚未嘗有失尚猶時擾邊境殺戮將吏暨叛命以來纍次大舉曾無沮敗乃求通順實蓄隂謀非屈伏之志也朝廷若以權宜許之更當嚴西久屯大兵供費殫竭減兵則守僃不足不減則物巳困臣等請緣邊城寨愈加繕完使戎虜之心無所窺伺又久守之計須用土兵各諳山川多習戰鬪比之東兵戰守功倍然緣邊次邊土兵數少分守不足更當於要便城寨招置土兵若近裏土兵願改隸邊寨者即遷其家而團集之況昨來慶州創起大順城欲置振武保捷兵兩指揮仍於永興華耀土兵中召其願守塞者而應募甚衆何則關內諸州土兵多在邊上或得代歸營而數月之間復出遠戍豈徒星霜之苦極傷骨肉之恩征夫不保其家離婦頗多犯法人情不免久則怨起如得併遷其家於緣邊住營更免出軍父母妻子樂於完聚戰則相救守則相安或謂若土兵携家居干塞下則全分請給其實尤多不然土兵月給差少又素號精強使之戍邊於東兵數復可減然於逐路漸為增益二年巳來方能整習固非一朝可驟改也又陜西新㓨保捷土兵其中尫弱不堪戰陳者宜沙汰之使歸于田畝既省軍費復增農力然後東兵三分中一分屯邊以助土兵之勢一分移入次邊或屯關輔以息餽餉之困一分歸京師以嚴禁衛之防彼如納欵未變則東兵三分中更可減退又緣邊無稅之地所招弓箭手必使聚居險要每一兩指揮共修一堡以完其家與城寨相應彼戎小至則使屬戶蕃兵暨弓箭手與諸寨土兵共力禦捍彼戎大舉則二旬之前必聞舉集我之次邊軍馬盡可勾呼駐於堅城以待敵之進退緣邊山岅重復被之重兵必循大川而行先求疾速俟其得勝使我師沮而不出方敢散兵虜掠過越險阻更無顧慮我若持重不戰則彼之重兵行川路中糧草無所給牛羊無所獲不數日人馬困弊彼之重兵更不敢越險又未能決勝必不得巳而散兵虜掠我於山谷村落中伏精鋭以待之彼散掠之兵輕而寡弱可擊可逐使散無所掠聚不得戰欲長驅深入我則使諸將出奇以躡其後欲全師以歸我則使諸城出兵以乘其弊彼將進而有禍不三兩舉勢必敗亡此守䇿之要也三陜西攻䇿元昊巢穴實在河外河外之兵懦而罕戰惟橫山一帶蕃部東至麟府西至原渭二千餘里人馬精徑慣習戰鬪與漢界相附每大舉入冦必為前鋒故四戎以山界蕃部為強兵漢家以山界屬戶及弓箭為善戰以此觀之各以邊人為強理固明矣所以秦漢驅逐西戎必先得山界彼則遠遁然後以河為限冦不深入儻元昊歸欵則請假和䇿以待之如未通順或順而翻覆則有可攻之䇿非窮兵黷武角勝於絶漠之外也臣等嘗計陜西四路之兵總數幾三十萬非不多也然各分守城寨故每歲戰兵大率不過二萬餘人坐食芻糧不敢動舉歲歲設備常如冦至不知賊人之謀果犯何路賊界則不然種落散居衣食自給忽爾點集併攻一路故犬羊之衆動號十餘萬人以我分散之兵拒彼專一之勢衆寡不敵遂及放敗且彼為客當勞而返逸我為主當逸而返勞我若復用此計彼勞我逸則取勝必矣臣等請於鄜延環慶涇原路各選將佐三五人使臣一二十人步兵二萬騎兵三千以為三軍以新定陳法訓練歲餘候其精勇然後觀賊之隙使三軍掠於橫山更進兵降者納質厚賞各令安土拒者併兵急擊必破其族假若鄜延一軍先出賊必大舉來應我則退守邊寨或據險要不與大戰不越旬日彼自困彼勢將潰歸則我環慶之軍復出焉彼若再圖點集來拒王師則又有涇原之師乘間而入使賊奔命不暇部落携怨則我兵勢自振如宥州綏州金湯白豹折薑等寨皆可就而城之其山界蕃部去元昊且遠求援不及又我以堅城據之以精兵臨之彼既樂其土復逼以威必須歸附以圖安全三五年間山界可以盡取此春秋時吳用三師破楚之策也元昊若失橫山之勢可謂斷其右臂矣矧漢唐之舊疆豈今日之生事也四河北備策臣等於陜西緣邊頗究利害所陳三䇿必可施用而國家禦戎之計在北為大臣等敢不經心且北戎久強在後唐日以兵四十萬送石高祖至洛陽立為天子而還遂與石晉為父子之邦邀求無厭晉不能支一旦釁起長驅南牧直抵京師虜石少主及當時公卿盡室而去幽燕遂陷為中原千古之耻尚未能雪國家以生靈之故與之結和將休兵養民有所待也及天下無事人人懷安不復有征戰之議前年北虜驟變詭謀稱兵燕薊有背盟之變割地之請國家倉卒無僃難於用兵遂增重賂以續前好彼既獲利方肯旋師今乘元昊通順之議又欲邀主盟之功其勢愈重茍不大為之備禍未可量臣等固請朝廷力行七事以防大患一密為經略二再議兵屯三專於選將四急於教戰五訓練義勇六修京師外城七密定討伐之謀一密為經略者自河朔罷兵以來幾四十年州郡因循武事廢弛凡謀興葺則罪其引惹昨朝廷選差轉運使蓋欲革去舊弊預為之防然既有本職則日為冗事所嬰未暇周慮請選有材識近臣假以都轉運使之名暫往經畫使親視邊壘精究利害凡邊計未僃者皆條上而更置之不出半年歸奏闕下更令中書樞密院子細詢訪熟議經久之計若虜情驟變則我有以待之矣二再議兵屯者自來真定府定州高陽關分為三路其所轄兵馬未甚整齊乃有一州兵馬却屬兩路之處又未曉本路將來於何處控扼合用重兵若干又甚處只宜固守合屯兵若干及三路互相應援次第須差近臣往彼密為經略方可預定法制臨時不至差失或事宜未動亦當相度兵馬合那減於何處駐泊使就芻糧以省邊費庶免先自匱乏至用兵之日重困生民三專於選將者委樞密院於閣門祗候使臣巳上選人三班院使臣中選人殿前馬步軍司於軍旅中選人或有智略或有材武堪邊上試用者逐旋進呈據選到人數以籍記之候本路有闕則從而差授如此則三二年間得人多矣四急於教戰者於陜西四路抽取曾押戰隊使臣十數人更授以新議八陳之法遣往河北閲習諸軍使各知奇正循環之術應敵無窮五訓練義勇者今河北所籍義勇雖約唐之府兵法制三時農務一時教戰然未建府衛之官而法制不行號令不一須别選知州知縣縣令可治兵者并增置將校使人人各知軍中之法應敵可用斯則強兵制勝之本矣六修京師外城者後唐無備契丹一舉直陷洛陽石晉無僃契丹一舉直陷京師故契丹之心于今驕慢必謂邊城堅而難攻京師坦而無備一朝稱兵必謀深入我以京師無備必促河朔重兵與之力戰戰或不勝則胡馬益驕更無顧慮直叩澶淵張犯闕之勢至時遣使邀我欲以大河為界我既無備將何以禦從之不可拒之必難又振逼京師何以為計若京城堅完則戒河朔重兵不與之戰彼不能戰則無乘勢之氣欲謀深入則前有堅城後有重兵必將沮而自退退而不整則邀之可也是則修京城者非徒禦冦誠以伐深入之謀也漢惠帝時起六里內男女城長安二年而畢唐明皇時城長安九十日畢考法於古擇利于今京城之修蓋無疑矣然須二年成之則民不勞苦人不驚駭矣七密定討伐之謀者彼幽燕數州人本漢俗思漢之意子係不忘太宗皇帝既克河東乘勝北討數州吏民望風請命惟幽州未破我軍虛驚班師以來歲月綿遠如天限其北無復輕議一昨盟好巳搖安保其往當訓兵養馬密為方略以待其變未變則我不先舉變則我有後圖指彼數州決其收復使彼思漢之俗復為吾民成太宗皇帝赫怒之志雪石晉千古之耻則陛下之功如天如日著於無窮矣奏陜西河北畫一利害事陜西八事一相度緣邊城寨未堅牢處更加修完二陜西諸州土兵內招願守寨者移為邊兵三新刺保捷土兵內有尫弱不堪戰陳者減放歸農四移減東兵入次邊州軍駐泊以就糧草有事宜則勾赴邊上五緣邊弓箭手逐一兩指揮各築堡子居住六逐路差人密切先相度下山川要害可控扼處并可伏兵之處七逐路各選將佐三五人使臣一二十人步兵二萬騎兵三千以備攻戰八相度下橫山一帶要害之地如進兵攻討則據險修寨以奪其地就降其衆河北五事一遣才臣權領河北轉運使密令經度邊事二再議河北三路合屯兵去處三委樞密院於閣門祗候以上選人三班院於使臣中選人逐十日或一月具選人數進呈四於陜西抽揀戰隊使臣十數人授以新議八陳之法教習諸軍五河北州縣專選知州知縣縣令可以治兵者教習義勇并增置將校奏元昊求和所爭疆界乞更不問臣竊觀史籍見前代帝王與戎狄結和通好禮意甚重非志不高而力不足也蓋懼邊事不息困耗生民用兵久之必生他變而為社稷之憂如漢高帝唐太宗身經百戰大服天下不敢黷武而屈事戎狄者正為此也及其國力強盛將帥得人則長驅破虜以雪天下之耻今北虜西戎合謀并力夾困中原西兵數年未能平定近方遣使往復以議通順而延州塞門并河東豐州之地舊有屬戶居之則為我利自元昊驅掠西去遂為隙地中國利害不繫於此今衆議須欲復得塞門以全疆土借如祖宗朝北陷易州西失靈夏及其和好皆略而不言耻以前失之醜而求無用之地也今西戎吝不足與爭但名體巳順餘可假借以成和好然後重議邊事退移兵馬減省糧草須我生民勤我稼穡選將練士使國富民強以待四夷之變此帝王有道之術社稷無窮之富也如欲與戎狄理曲直決勝負以耗兆民以危天下語之則易行之實難臣備位二府當思安危大計不敢避人謗議上下其說纍陛下包荒之德以重增宵旰之憂臣不勝􅈤迫惶恐之至奏為陜西西路入中糧草及支移二稅臣竊見陜西四路各屯重兵所入中糧草又無定數並支却京師錢帛久而行之府庫須竭又支移關輔二稅往邊上送納道路險阻百姓勞費亦巳凋弊至於轉運司經畫財利應副邊上每年亦無定額縱使元昊納欵未能頓解邊兵悠久何以支濟自來朝廷巳差逐路經略兼計置糧草即未責事任伏望聖慈指揮更選差朝臣四人充陜西四路經略計置判官專管本路稅賦課利及圖回營田等事仍令三司將逐路軍馬并見在糧草數目約度今後每年各計入中若干石於京師支給見錢比舊日十分中減下三分各令陜西轉運司約度逐路稅賦課利數目外每年各令支助錢帛若干既糧草錢帛皆是定額自然各務省節須揀精鋭養贍及將蕃部弓箭手相兼使用不更占冗兵既㳂邊入中有數必自那移軍馬入次邊及近裏州軍駐劄其四路經略計置判官便當知州差遣與本路經略使及知州軍等如能依此減省入中萬數及圖回財用不至虧誤即加奬擢此軍國之大計乞聖慈留意奏論陜西兵馬利害臣竊知陜西禁軍廂軍不下二十萬衆防秋在近必須養育訓練以期成功在乎豐以衣食使壯其力積以金帛示有厚賞牛酒以悅之律罰以威之如此則兵有鬪志將以增氣雖二十萬衆合為一心有守必堅有戰必強平冦之期臣可卜也若飢不足其食寒不足其衣出無壯力入無厚賞軍有退志將必喪氣雖二十萬衆或有二心守則不堅戰則不強平冦之期未可卜也於弓箭手民兵肯戰守之時事須賞勸所用金帛誠須大備今陜西百姓巳虛三軍未振或聞三說之法可以備邊以臣所見今榷貨務商客才有一百來名縱許於陜西河東路以三說入中即緣商客未多且可少助糧草而巳若金銀錢帛則歲時之內必難充足臣所以請放行向南鹽客使客旅入納糧草并金銀錢帛數更有逐處富實之家不為商旅者必須以利勸之臣請逐處勸誘入納上件物色一件納及得萬數除給與向南末鹽交鈔外更與恩澤一萬貫者與上佐官三萬貫者京官致仕如曾應舉到省與本科出身除家便官願班行安排或不就差遣者亦聽所貴防秋之期頗有邊備乞朝廷速為大計使百姓樂輸三軍樂戰則夷狄不利中外無憂山海之利何足以吝國家安危之計在聖心英斷天下幸甚奏陜西主帥帶押蕃落使臣竊見環慶路熟戶蕃部約及二萬人內只蕃官一千餘人各有請受每人惟有料錢亦無月糧衣賜所費少於養贍長行兵士皆能辛苦熟於戰鬪如撫馭之間恩威得所大可防托邊界減得兵馬今來環州种世衡原州蔣偕撫馭蕃部最有畏愛緩急可以呼集使喚欲乞朝廷先授此二人兼管轄蕃部使所貴激勸邊臣於熟戶用心專加統領緩急使喚漸可減得戍兵萬數其四路主帥亦令依舊時節度並帶蕃部使奏乞宣諭大臣定河東捍禦䇿臣竊見契丹遣使來朝廷言欲西征今邊上探報皆稱契丹大發兵馬討伐呆家族并夾山部落及稱亦與元昊兵馬相殺又報元昊亦巳點集左廂軍馬既是二國舉動大兵必有大事以臣料之夾山等蕃部小族豈二國盡舉大兵攻討此可疑一也又元昊自來惟倚契丹侵凌中原今無大故何敢便與契丹相絶而舉兵相持此可疑二也自古聖賢議論皆稱夷狄無信今朝廷便欲倚憑此可疑三也前來契丹邀中國進納物帛欲屈伏朝廷元昊僣號擾邊屢擒將帥如盟信可保何至此今日之舉又可疑四也河東地震數年占書亦主城陷今二國之兵萃於彼方此又大可疑五也又邊上探得契丹遣使二道至南山寧化軍岢嵐軍後面覷步谷口道路此又大疑六也設或二國不守盟信卒然奔衝以數十萬衆乘不備而來河東軍馬不多名將極少衆寡不敵誰敢決戰此大可憂一也契丹素善攻城今探得點集床子弩并炮手皆攻城之具與昔時不同況元昊界無城可攻如却入漢界併攻三兩城破而屠之則其餘城乘風可下此大可憂二也萬一此度却未奔衝以取中國之信使安於疑為後舉之䇿此大可憂三也今乞聖慈顧問大臣如契丹可以保信必不入冦亦不與元昊連衝則乞今日同署一奏納於御前使中外安靜不更憂疑他日或誤大事責有所歸如大臣不敢保信則乞指揮大臣今日更不歸㕔便畫禦捍之䇿抽何路軍馬用何人將帥添若干錢帛據何處要害如此定策猶恐後時不能當二虜之勢或更因循度日直候大冦入境然後為謀則河東一傾危逼宗社臣待罪兩府義當極論不敢有隱繫聖斷處之奏乞拒契丹所請絶元昊和約臣竊見契丹來書謀事在邀功勢將構難還答之際尤宜愼重一書中言元昊於中國名體未順特為朝廷行征討其邀功之意又大於前若許他此舉將來何以禮報此一難也一書中次言請朝廷絶元昊竊觀元昊所上書削號稱臣名體頗順雖未為誠信茍遣人來納誓書朝廷何辭拒之元昊昨來納欵尚不肯言契丹指蹤朝廷豈可言契丹之意以拒其和如無名而拒則我自失信而從契丹之請此二難也一元昊於契丹從來未聞有不臣之狀或實於他邊界曾有相傷况是三二百戶彼亦自可問罪何故便要朝廷絶元昊進貢若朝廷因而從之苟元昊不日却謝過於契丹又納其請則與元昊依舊相連我與元昊怨隙轉大朝廷一失其守長四夷輕中國之心此三難也一契丹今來逼朝廷絶元昊之欵我若不敢違拒而據從之將來契丹却稱元昊巳謝過設盟更不討伐却逼朝廷與元昊通和是朝廷巳失所守豈能更抗契丹之辭此四難也一朝廷若以契丹之故阻絶元昊大信一失將來却以何辭與他和約縱巧能設辭元昊豈肯以前來所許屈伏於朝廷必乘我之失大有呼索此五難也一元昊或納誓書既不可阻今契丹所請或即阻之誠朝廷之所重也然契丹元昊本來連謀今日之情未可憑信臣請朝廷建禦捍之謀以待一虜不必求二虜真僞之情邊事如此恐誤大計不敢不言奏為契丹請絶元昊進貢利害臣竊見契丹來書稱朝廷曾請契丹止遏元昊今聞名體未順遂舉兵討伐又請朝廷絶元昊進貢契丹安肯為朝廷特舉大兵以討元昊此不可信一也若自與元昊有隙必行討伐其人使即合堅請阻絶元昊何却只問楊守素往來次第是無必討之意此不可信二也余靖等今有見虜主親信須指揮夏州令楊守素入南朝勾當必是動有關報今來虜使却言北朝並不知子細此不可信三也萬一契丹必有深隙須行討伐必堅要阻絶元昊豈暇問於南朝名體順不順顯是契丹虛稱為朝廷西征駐重兵於雲朔如元昊以誓書未立入冦河東亦足相為聲援得至則享厚利如元昊更不入冦納誓書于朝廷則契丹自為因行討伐使元昊入貢以此為功而駐兵雲朔以邀重報是契丹進退有利而俱為我害也臣謂朝廷今日答書則易將報必難而專於致賂欲滿虜志則契丹大兵豈肯虛舉而善退願朝廷熟慮此是先且大議備邊之策然後遣使往來使虜知我有備無必勝之理則亦可以遏其邀功求報之心縱背盟好亦有以待之少減生靈之禍奏乞將邊任官貟三年滿日乞特轉一資臣等竊見陜西河東㳂邊州軍城寨主兵武臣并都監巡撿寨主監押等自來與諸處武臣班行一例五年磨勘既勞逸不均又遷轉無别是致各圖優穩不就邊任以此將佐而下常患乏人况戰守之地責其死節苟循常規將何以勸臣等欲乞朝廷别立條制應陜西河東㳂邉州軍滿三周年者並與特轉一資不隔磨勘所貴邊上例各得人為經久之備奏乞重定戰功賞格臣等竊見用兵以來戰陳行賞逐處起請所見各異或謂須要首級或謂當録陳前得力之人至於使臣軍貟並不許手下人所獲分數亦與士卒一般校功是以人無適從最害邊事臣等欲乞朝廷將元定賞格并諸處起請條貫重行定奪頒下諸路所貴軍中知信第賞無差臣范仲淹臣韓琦奏乞編録緣邊部署司條貫宣勑事臣等竊聞朝廷已議差官删定天聖編勑所有諸路㳂邊部署司前後承受宣勑條貫不少當用兵之際再合參詳兼慮諸處多有漏落臣等欲乞朝廷指揮諸路㳂邊部署司令具録前後宣勑條貫候到亦令相度編録如一司一務編勑之例須下逐處各令遵守臣范仲淹臣韓琦奏乞差新轉京官人充㳂邊知縣事臣等竊見陜西河東河北㳂邊次邊州軍當用兵備冦之際逐縣令長尤要得人自來除合差京朝官外其餘並從銓司擬注别無選擇之法臣等欲乞特降指揮今後陜西河東河北㳂邊次邊州軍三千戶巳上縣令貟闕並差奏舉磨勘新轉京官人充填與當西川差遣所貴邊遠之地人受其賜亦使才俊之流諳練邊事他日選用不乏人臣范仲淹臣韓琦奏乞免關中支移二稅却乞於次邊入中斛㪷臣竊見陜西數年以來科率百端民力大困州縣督責不能存濟兵間最為民患者是支移稅賦轉般斛㪷赴延州保安軍山坡險惡一路食物草料常時踴貴人戶往彼輸納比别路所貴三倍比本處州縣送納所費五倍害民若此實非久計臣等欲乞朝廷指揮都轉運司體量關輔今來灾旱民力困乏如邊儲有備其二稅與免支移并邊上入中斛㪷大段價高出却京師見錢銀絹萬數浩瀚亦令相度權於次邊州軍入中所貴減得官中貴價既次邊有備則每遇事宜稍慢可以退那軍馬於次邊就食糧草既稍蘇民瘵又不誤軍期如此守邊庶為得䇿奏乞許陜西四路經略司回易錢帛臣等竊以西陲用兵以來㳂邊所費錢帛萬數浩瀚官司屈乏未能充用其鄜延等四路帥臣雖有管本路糧草之名然轉運司終是本職故不敢專行計置若不委之經度即邊計常是不足臣等欲乞特降指揮下鄜延環慶涇原秦鳳路經略使司應本路州軍所管錢帛並許選差除廉幹使臣公人等任便回易其收到利錢明入省帳收附所有勾當人等如能大段回易得利息委本司具數保明聞奏特與相度酬賞所貴有助軍費少紓民力奏策試方略等人各與緣邊差遣事臣等竊見河北陜西河東自來策試方略并南省特奏名受恩澤人或未該放選及不理選限者雖程試之下隅不及等或曉習邊事經歷艱苦或鄉曲有譽年未衰退若只假以虛名實恐多有遺滯况㳂邊次邊小處判司簿尉并鎮寨中務場常是闕官或於近裏差官往彼勾當到本處却闕官員甚有廢事臣等欲乞特降指揮下河北陜西河東轉運司應本路䇿試方略并南省特奏名人得雜出身試銜齊郎等未該放選及長司馬士文學助教等並不理選限者如願入邊遠即相度年未衰老有心力行止勾當得事之人具保明申奏與注陜西㳂邊次邊小處判司簿尉內監榷新置酒稅等場務者只與驛劵更不支本官料錢臣范仲淹臣韓琦奏乞減武臣充提刑及令樞密院三班選人進呈今西北二方交困中原驍盛如此國家禦捍實在三邊不惟戰將乏人其知州知軍并駐泊都監大寨寨主常要有心力人勾當方可主兵馬安緝蕃部嚴治城寨體探事機今來諸路提點刑獄多占却心力使臣或邊上倉卒要人終是怯懼不堪任使欲乞特降聖㫖諸路提點刑獄除川廣福建路依舊差文臣武職相兼外其餘路分只令文資勾當却留武職揀選少壯有精神者並與三路邊上差遣令慣習邊事或年甲雖高素有心力未至衰老者亦可充邊上知州軍駐泊都監勾當頗濟事務如無精神心力則是不材之人豈堪為按察之官澄淸部下因此便可退入間慢差使庶免取笑四方仍乞委樞密院除選揀上項提點刑獄使臣外更常切於武臣中選人及令三班院亦常選人逐月一度具選到人姓名聞奏引見與㳂邊次邊差遣所貴邊上多得有精神心力之人既久於其事則漸增膽勇緩急可用此乃養育將材禦備戎冦之要也至於川廣荆湖近蠻之處亦乞重選知州軍都巡檢等以鎮撫邊界存活生民奏乞揀選往邊上屯駐兵士臣竊見去年以來自京差撥禁軍往陜西邊上屯戍內有諸處鄉軍顧到經販之人并向南諸處廂軍揀上添填逐指揮內有小弱怯懦之人道路指笑及到邊上不堪披帶教閲虛破禁軍諸般請受支賜今來又差發兵士五千人往秦州添屯并續有諸軍發往邊上替換欲乞指揮下殿前馬步軍司應在京及畿內諸軍今來并向去合起發往邊上兵士並須逐指揮依次勾來本司子細揀選下小弱不堪披帶之人更不令發往邊上其揀下小弱人數內元係在京諸司庫務并外路廂軍如却願歸本處舊指揮者並令送還內有身材比舊等樣小三兩指却少壯得力者即不得揀下所有年老病患之人即等第與剩貟安排其逐指揮人貟年老疾患不得力者亦便揀選别與安排却於本指揮向下人員十將內揀選得功并武藝高強人升一兩資權管勾當候轉貟日依本資施行如本指揮人員十將內無可選揀即於以次指揮內選揀令權管補填勾當所貴在路便有幹了軍貟部轄各得齊整不至依前作過其所差兵士本營在外州軍府者即委逐處長吏都監監押依此揀選起發仍乞指揮諸路部署司將去年秋後差到屯駐駐泊并今後差到兵士並依此揀選施行訖逐旋開坐聞奏所定武藝高強須以弓弩别定斗力及射親格式奏乞揀㳂邊年高病患軍貟臣等竊見用兵之處諸軍內若有指揮使貟寮得力則不唯訓練齊整兼臨陳之時各能將領其下士卒方肯用命若人員不甚得力則向下兵士例各驕墯不受指蹤多致退敗顯是軍氣強弱繫於將校今來邊上諸軍人員甚有年老病患全不得力之人兼更有見闕人數不少若不早行選擇則恐將來依前誤事臣等欲乞朝廷於都知押班及近上內臣內選差諳歷邊事者三貟內二貟往陜西路一貟往河東路計會逐處經略部署司勾集管下屯駐駐泊就糧諸軍人貟司共揀選如內有年高腳手沉重并疾患尫弱不堪披帶及愚戅全無精神不能部轄者並開坐申奏內屯駐駐泊人貟一面發遣赴闕别與安排所有就糧指揮人貟即更於逐人名下各令指射願管廂軍去處聞奏仍勒在本營聽候朝㫖候揀選畢即據指揮見闕人數便於諸軍十將以上揀選嘗有功勞者并武藝高強得力之人升一兩資給帖權管候將來轉貟却依本資叙遷所貴將校得人士卒增氣臣范仲淹臣韓琦奏乞於散直等處揀有武勇心力人臣竊知散直并下班殿侍內甚有經歷喫得辛苦之人可以邊上使喚乞特降指揮下殿前司於散直下班殿侍內揀選或有心力並具姓名聞奏當議再行揀選內曾有過犯人如武勇出倫亦别具姓名聞奏本班人貟不得抑遏漏落當行勘斷其揀到人數别分等第內上等人及識文字者差在闕人員處權管勾當三周年無過犯得力者令逐處保明奏取㫖使與轉三班差遣權管與依轉貟例遞遷安排有功勞者特行升擢大段勝於年老轉貟之人有誤戰敵緣西北事大常須先選人在軍中使喚以備邊事薦舉奏為薦胡瑗李覯充學官臣聞臣之至忠莫先於舉士君之盛德莫大於求賢泰通之朝豈敢隱默臣竊見前密州觀察推官胡瑗志窮墳典力行禮義見在湖州郡學教授聚徒百餘人不惟講論經㫖著撰詞業而常教以孝弟習以禮法人人嚮善閭里歎伏此實助陛下之聲教為一代美事伏望聖慈特加恩奬升之太學可為師法又建昌軍應茂才異等李覯丘園之秀實負文學著平土書明堂圖鴻儒碩學見之欽愛講貫六經莫不贍通求於多士頗出倫輩搜賢之日可遺於草澤無補風化伏望聖慈特令敦遣延於庠序仍索所著文字進呈則見非常儒之學取進止奏邊上得力材武將佐等第姓名事臣等在邊上體量得材武可用將佐人數如後第一等涇原路部署狄靑有度量勇果能識機變鄜延部署王信忠勇敢戰身先士卒環慶路權鈐轄知環州种世衡足機略善撫馭得蕃漢人情環慶路鈐轄范全武力過人臨戰有勇第二等鄜延路都監周美諳練邊情及有武勇其人纍有功勞欲乞特加遙郡刺史知保州安軍劉拯有機智膽勇性亦沉審奏鳳路都監謝雲行勇力有機今之驍將延州西路巡撿使葛宗古弓馬精強復有膽勇其人近聞本路有賊私事發斷遣日乞别取聖㫖鄜延路都監談嘉震勇而有知戰守可用涇原路都監黃士寧剛而有勇可當一隊鄜延路鈐轄任守信能訓練有機智涇原路都監許遷訓練嚴整能得衆情秦鳳路鈐轄安俊勇而有辨倉卒可使環慶路都監張建侯知書戢下可當軍陳鄜延路都監張宗武精於訓練可僃偏禆數內劉拯張建侯張宗武雖曾改轉一資比諸將未至優異臣等今同罪舉保此三人巳各轉兩資及移易差遣再奏乞蔣偕轉官知原州臣等竊見涇原路西北有鎮戎軍并山外城寨及東北有原州最逼賊界又原州管下有明珠滅藏康奴等蕃部常與西賊相連作過最為強惡若原州一面鎮靜則本路只禦捍西北一路易為兵力所以原州須要用心官員在彼昨來臣某為覩朝廷降勑差北作坊副使蔣偕知涇州遂乞與本人轉一正使改知原州照管上項一面蕃部尋奉勑就差知原州即不蒙改轉官資緣本人自祕書丞制置青白鹽使相次該磨勘又差遣合入提點刑獄兼是准詔勑舉換右職即與近下差遣祕書丞自乞換右職人不同況涇州是近裏節鎮原州是極邊小郡比為藉其才幹非有過犯虛降却本人差遣兼本官到任巳過半年州界蕃族别無騷動伏望聖慈特與轉一正使依舊本路駐泊都監知原州臣范仲淹臣韓琦兼在環慶州界點集添得蕃部一萬八千餘人奏舉雷蕳夫充邊上通判臣等竊見祕書省校書郎僉書泰州觀察判官㕔公事雷蕳夫昨蒙朝廷敦遣起於草澤佐幕以來僃見通敏求之多士得為異才欲乞聖慈特加奬擢與轉一官就差充邊郡通判庶觀能效可進榮階若不如所舉臣等甘當同罪臣范仲淹臣韓琦奏舉姚嗣宗充學官臣等竊見環州軍事判官監慶州糧料院姚嗣宗䇿試方略考在優等效官邊郡不違險阻文筆竒峭有古人風格兼通經術冝置國庠欲乞聖慈特受一學官候通前任成四考日與轉原官若不如舉狀臣等甘當同罪臣范仲淹臣韓琦奏馬懷德乞轉閣門祗候青澗城都監臣等竊見延州青澗城兵馬監押侍禁馬懷德曾為透漏蕃賊降差監當本路體量得前人有武勇心力却奏留在邊上使喚自後掩殺蕃賊破蕩族帳纍度得功只是轉一資酬奬其人實堪充將佐部領軍馬禦捍邊方兼种世衡曾乞納所轉官資却與本人升擢伏乞聖慈特與轉閣門祗候充延州青澗城都監臣范仲淹臣韓琦奏乞酬奬張信臣等竊見環慶教押軍陳奉職張信自殿侍在邊上纍次與西賊鬪敵前在延州趙瑜等手下作前隊殺退蕃賊得趙瑜等銀碗衣服後來趙瑜等並轉三資張信即未曾酬奬其人氣豪膽勇武力過人為一時之猛士在指使中少見其比欲乞朝廷特與改轉一侍禁送种世衡手下管押軍隊分擘與禁軍一兩指揮專切教習獨作一隊為竒兵使喚必能身先士卒以立勝功臣范仲淹臣韓琦奏乞差宣撫副使臣奉勑差充陜西路宣撫使續奉朝㫖體量於次邊入中糧草事臣既蒙朝廷重寄須體量逐處將帥勇弱官吏能否那移軍馬并相度錢穀利害求訪民間疾苦照管緣邊蕃部料度冦情經畫勝勢以分朝廷萬一之憂非臣之愚可能獨幹衆務臣昨日入對乞聖慈更選臣寮一員與臣同往每事議而後行庶少差失伏乞早降指揮兼臣巳奏乞免罷御筵錫賫雖添差一員不至勞費再奏乞召試前所舉館職王益柔章岷蘇舜欽等臣昨在樞密院日舉文行有名之士十人堪充館閣職事乞取聲稱著聞者先次召試自臣過中書後商量謂所舉人多不可一齊召試欲候其中更有淸望官舉者即先次施行今所舉人內殿中丞王益柔巳有杜衍先曾舉奏太常丞章岷又有王堯臣蔣鏜舉奏大理評事蘇舜欽亦有王拱辰舉奏此三人並有清望官舉薦又見巳到京及待闕未赴任欲乞降聖㫖便與一試仍乞指揮學士院各試文論二首足以觀其才識不令更試詩賦恐詞藝小巧無補大猷况朝廷擢才之際寧使滯淹不同尋常陳乞之人更延資考奏殿直王貴等臣有隨行指使右班殿直王貴殿前指揮使出職在邊上三年有餘右班殿直徐正殿前指揮使出職在邊上二年半各好人材弓馬纍度隨軍出入勾當兵馬須得幹辦三班奉職郭慶宗曾經戰鬪得功及有心計緩急使喚得力上件三人並堪邊上任使欲乞朝廷各轉一資充㳂邊寨主監押如未有員闕即目令隨行指使候到邊上遇有闕處即具奏差取進止奏杜曾張沔臣竊聞朝廷欲差杜曾判大理寺張沔河北路轉運使杜曾詳明法令必能稱職張沔廉謹精勤搢紳所許錢穀重難實所諳練兼本官自可三司副使發運使之任緣河朔屯師右武之地當選人經營一面為用兵之備伏望聖慈委大臣再加銓擇庶免頗有改更杜曾自梓州遠回又河北轉運使自有今來留住判寺是在京重難職任乞與别議恩澤張沔自到陜府纍有人舉奏乞别與差遣奏舉張去惑許元臣竊覩國家用兵以來急於財利雖百姓大困更難刻剝三軍不足又須經營莫若求通敏之才省枉費之用庶幾下不生怨上不乏須臣竊見殿中丞監在京榷貨務許元才力精幹逹於時務伏望聖慈指揮取索榷貨務勾當過有勞績特與超轉一官差充江淮制置發運判官必能減省冗費疏通利源不害生民胥助軍國又臣切見寧州通州著作佐郎張去惑素有時材不避艱苦昨慶州修大順城建事之初日有冦至人情畏懼却求中輟遂差張去惑往彼勸諭將佐晝夜興功衆乃同心方能集事兼於寧州專管修城或創修山城功料浩浣並以了畢防城戰具皆精辦臣昨同罪舉本人乞改一官充陜西轉運判官巳奉朝㫖依奏候有闕即差今來陜西省罷轉運判官其張去惑自合别與差遣伏望聖慈差監在京榷貨務替許元勾當臣所舉此二人若不能辦濟臣甘失舉之罪奏杜𣏌等充館職臣聞書曰先王坐以待旦旁求俊乂蓋天下治亂繫之於人得人則治失人則亂故先王盡心焉臣伏覩朝廷兩府任人多擢於兩制詞臣必由於館殿是館殿為育材之要府豈宜賢俊不充至于衰索唐太宗置文館延天下賢良文學之士令更宿直聽朝之暇引入內殿講論政事至夜久方罷今館閣臣寮率多清貧僑居桂玉之地皆求省府諸司職任或聞在館供職者惟三兩人甚未稱陛下長養群材之意臣切見虞部貟外郎杜𣏌太常丞章岷祕書丞尹源祕書丞張掞殿中丞王益柔殿中丞吕士昌大理寺丞蘇舜欽大理寺丞楚建中環州軍事判官姚嗣宗國子監直講孫復或文詞雅遠可潤皇猷或經述精通能發聖藴伏望聖慈委中書相度其間聲實巳著者乞不限資任先次召試各補館職或有未協公議者乞加詢采更候悉其才行即賜施行今後館閣臣寮供職經二年不就諸司職任者乞特與恩例差遣庶令英俊之遊日玩典籍不親米鹽之務專修經緯之業長育人材無尚於此臣竊聞太宗皇帝慕唐文皇之英風特建祕閣與三館並崇聽朝之餘時或遊幸此祖宗盛事不為不重今館閣供職貟數至少臣方敢上言所舉雖多皆搢紳有聞之士更在朝廷取擇臣謂天下至大聖人其難之綱紀或隳雖治必亂俊哲所聚雖危必安今邊鄙尚虞旰􅉴未暇正宜廣搜時彥大修王度以固其本之時也惟聖慈留意奏乞將所舉許元張去惑下三司相度任使臣近與宰臣上殿因議財用不足蒙賜德音謂宜選諸路轉運使臣尋面對云轉運司得平和之人則可得刻剝之人則百姓受弊尋奉聖㫖民惟邦本不可侵擾臣退而思之以江淮制置發運司為財賦之要地最宜得人使二員互換上京所轄諸州不暇巡歷臣切見監在京榷貨務內殿中丞許元智識通敏可幹財賦復能愛民不為侵刻遂舉充江淮制置發運判官又著作佐郎通判寧州張去惑昨在邊陲實經煩使遂舉監在京榷貨務替許元此二人臣曾舉充陜西轉運判官巳奉聖㫖依奏候有闕日與差既是轉運判官資地今來舉充上件職任未至過越切見朝臣宋緘陳執禮為因王欽若妻并宋綬妻陳乞在京監當有臺臣上言不當巳奉聖㫖改差臣在樞密院日所舉許元張去惑勾當錢穀雖與前人陳乞事體不同亦慮三司别有長才可舉伏望聖慈指揮三司副使相度此二人之才如不堪上件任使即别舉朝臣庶協公議奏雪滕宗諒張亢臣昨日面奏滕宗諒事當天威震怒之際臣言不能盡又章得象等不知彼中事理虛實皆不敢向前惟臣知從初子細又只獨自陳說顯涉黨庇宗諒雖巳行勘鞫必能辨明虛實然有未逹之情須至上煩聖聽今具畫一如後一梁堅元奏滕宗諒於涇州賤買人戶牛驢犒設軍士臣切見去年葛懷敏軍敗之後向西州軍官貟驚憂計無所出涇州無兵賊馬巳到渭州只是一百二十里滕宗諒起遣人戶強壯數千人入城防守其時兵威巳沮又木冰寒苦約十日軍情愁慘得滕宗諒管設環慶路節次䇿應軍馬四頭項一萬五千餘人酒食柴薪並足衆心大喜當倉卒之時有此才力雖未有大功顯是急難可用之人所以舉知慶州緣其時賊馬逼近收買牛驢犒軍從有虧價情亦可恕一梁堅奏滕宗諒在邠州聲樂數日樂人弟子得銀楪子三二十片者臣與韓琦到邠州筵會一日其時衆官射弓各將射中楪子散與過弓箭軍人及妓樂即非宗諒所散與人而罪歸於滕宗諒又云士卒怨嗟況邊上筵會是常當直軍人更畨祗候因何得其日便有怨嗟一梁堅奏稱滕宗諒到任後使錢十六萬貫其間有數萬貫不明今來中使體量却稱只是使過三千貫入公用巳有十五萬貫是加誣錢數料是諸軍請受在十六萬貫之內豈可諸軍請受亦作宗諒使過臣在慶州日亦借隨軍庫錢回易得利息二萬餘貫充隨軍公用支使外却納足官本今來宗諒所用錢數物料必亦是借官本回易所得將充公用一環慶一路四州二十六寨將佐數十人兵馬五萬自宗諒勾當已及八九箇月並無曠闕邊將軍民亦無詞訟處置蕃部軍馬公事又無不了若不才之人豈能當此一路一邊上主帥若不仗朝廷威勢何以彈壓將佐軍民使人出死力禦捍強敵宗諒是都部署經略使一旦逐之如一小吏後來主帥豈敢便宜行事亦無以立威人皆知其自不可保且將帥樹威者是國家爪牙之威也須假借勢力方能集事一防秋是時主帥未有顯過而奪其事任將令下獄若遇賊兵冦境未知令何人卒然處置此路又差王元權之况王元在河東沮法巳曾責降今且在邊上備貟豈可便當一路委寄恐更誤事一宗諒舊日疏散及好榮進所以招人謗議易為取信一臺諫官風聞未實朝廷即便施行臣目擊非虛而未蒙朝廷聽納臣若是誑妄之人不當用在兩府既有目覩之事豈可危人自安誤陛下賞罰兼西北未寧見搜求稍可邊上任用之人即加奬擢豈宜逐旋破壞使邊臣憂惕不敢作事雖國家威令不可不行須候見得實情方可黜辱臣欲乞朝廷指揮宗諒且在任勾當委范宗傑在邠州一面勘鞫干連人并將巳取到慶州錢帛文帳磨勘如宗諒顯有欺隱入巳及乖違大過即勾宗諒勘鞫如無乖違大過又無欺隱入已即差人取問分析緣由入急遞聞奏别取進止所有張亢亦奉聖㫖令便勘鞫臣體量得張亢不能重愼為事率易昨在渭州亦無大段過犯乞委范宗傑一就勘鞫干連人依勘滕宗諒事行遣聞奏仍乞以臣此奏宣示臺諌官候勘得滕宗諒張亢却有大段乖違過犯及欺隱入已仰臺諫官便是彈劾臣甘與二人同行貶黜臣所以極言者蓋陛下委寄邊臣使一向外禦而無外憂之禍則邊上諸路人人用心不至解體有誤大事再奏辨滕宗諒張亢臣聞議論太切必取犯顔之誅保任不明豈逃纍已之坐彛典斯在具寮式瞻臣自邊陲誤膺奬擢授任不次遇事必陳切見故監察御史梁堅彈奏滕宗諒於慶州用過官錢十六萬貫有數萬貫不明必是侵欺入巳及邠州宴㑹并涇州犒設諸軍乖越不公至聖慈赫怒便欲罷去臣緣在彼目擊雖似過當别無切害不曾有一兵一民詞訟至於處置邊事亦無疏虞臣遂進諫乞聖慈差官勘逐具與辨明未銷挫辱恐誤朝廷賞罰又有上言張亢驕僣不公臣亦乞根勘辨明或無深過如有大假乖越侵欺入已臣甘同受貶黜臣所以激切而言者非滕宗諒張亢勢力能使臣如此竭力也蓋為國家邊上將帥中未有曾立大功可以威衆者且遣儒臣以經略部署之名重之又借以生殺之權使彈壓諸軍禦捍大冦不使知其乏人也若一旦以小過動搖則諸軍皆知帥臣非朝廷腹心之人不足可畏則是國家失此機事自去爪牙之威矣唐末藩鎮多殺害逐去節度使於軍中自立帥臣而當時不能治者由帥臣望輕易於搖動之故也今燕度勘到滕宗諒慶州一界所用錢數分明並無侵欺其毀却涇州前任公用磨勘到干連人只稱有送官貟等錢物亦不顯入已又是元彈奏狀外事件所有張亢借公用錢買物事未發前巳還納訖又因移任借却公用銀却留錢物准還皆無欺隱之情其餘罪狀多未托實其干連人黨盛寒之月久在禁繫皆是非辜若令燕度勘問二人既事非確實必難伏辨或逼令認罪又是陛下近臣不可辱於獄吏或至録問有辭即須差官再勘其合干人黨轉不聊生兼邊上臣寮見此深文謂朝廷待將帥少恩於支過公用錢內搜求罪戾欲陷邊臣且寨下州郡風沙甚惡觸目愁人非公用豐濃何以度日豈同他處臣寮優游安穩坐享榮祿陛下深居九重當須察此物情知其艱苦豈可使獄吏為功而勞臣抱怨臣欲乞聖慈據燕度奏到事節特降朝㫖差使臣二人賫去取問滕宗諒張亢如實是巳犯便仰承認當議量情親斷如别有緣由亦具分析聞奏候到見得别無枉抑便可取㫖斷遣如有異同即乞朝廷别選官勘鞫免致冤滯其干連人且乞指揮放出知在臣則巳有不合保此二人罪狀乞聖慈先次貶黜免令臣包羞於朝受人指笑儻聖慈念臣不避艱辛尚留驅使即於河東河北陜西乞𥙷一郡臣得經畫邊事一一奏論或補二輔近州臣得為朝廷建置府兵作諸郡之式以輔安京師臣之此請出於至誠願陛下不奪不疑況臣久為外官不知輔弼之體本是粗材柢堪犬馬之用若令臣待罪兩府必辱君命且畏人言臣無任祈天望聖請命激切屏營之至再奏雪張亢臣昨日見樞密院進呈張亢所奏曾將公用錢回易到利息買馬及交鈔乞與呈索之人自甘伏罪乞不追䆒遊索之人取㫖下燕度結案聞奏臣伏覩編勑指揮若將公使錢回易到别物公用但不入已更不坐罪其張亢所奏二事若未有發露乃是自首縱巳發露亦不入巳合該上項編勑指揮臣昨與韓琦在涇州同使公用錢曾為慶州簽判祕書丞馬倩身三本人家貧親老與錢一百貫文又涇州保定知縣大理寺丞劉襲禮丁父憂家貧起發不得與錢一百貫文又􅉑州推官監環州入中陳叔度丁父憂家貧無依與錢五十貫文又進士黃通來涇州相看與錢五十貫文並是一面將公使庫錢回易到利息相兼使用即不曾親使著係省官錢自來邊上有公使錢處為有前項條貫及有回易利息但不入巳各是從便使用今來若依編勑施行則張亢自首與逰索人錢不曾入已又是燕度元勘外事節朝廷自可指揮不須却送入案兼恐追尋元逰索之人或在遠方何時結絶若不用上件編勑指揮則臣與韓琦亦有上件與人錢物罪狀須至自劾昔人有言曰法者聖人為天下畫一不以貴賤親疏而輕重也伏望聖㫖送樞密院依詳編勑及將臣與韓琦用錢事狀并張亢所奏二事一處定斷以正典刑奏辨陳留移橋臣前日與章得象以下親奉德音謂近知左右臣寮恐上不能主張不敢盡心言事今後不得更事形迹避涉朋黨須是論列必無所疑臣等千載遭逢得陛下聖言及此不勝慶幸不勝慶幸臣日夜發憤願盡其心以副陛下待輔弼之意雖犯雷霆豈敢回避今切見審刑大理寺奏斷王堯臣巳下公案內有情理不圎刑名未審之處如便降勑恐外議紛紜傳播天下臣忝參預大政豈當緘默負陛下前日之訓為天下罪人今略指陳事節奏陳如後一陳留橋是真宗皇帝親詔為損舟船遂遣使經度而遷之前來姚仲孫在三司日杜衍乞移此橋仲孫不行王拱辰知開封府日又乞移之拱辰亦是不行昨又令催綱使臣乞移此橋本府前來官貟只差一主簿相度便具申奏朝廷不知先朝有詔失於論詳遂許移之三司為去年新曾添修今又破材料遂奏乞差官相度乃是舉職今却以不應奏而奏坐罪惟聖慈深察方可見情一據案申照勘得三司手分巳先撿尋移橋文字於初九日納在王堯臣處要行遣申奏次日方見王𬈑為本人自陳留替回堯臣遂先發言問當移橋利害𬈑方對答即非因王𬈑請託而後行也望聖慈察此一節一經曰貴貴為其近於君也貴老為其近於親也又堂高則陛高蓋言重公卿者所以尊天子也今三司使主天下大計在天子股肱之列有大罪則陛下自行貶廢不可使法吏以小過而辱之投鼠忌器正在此矣陛下縱有輕近臣之意不可外示於人何哉近臣輕則減天子之重矣今法寺坐堯臣杖七十公罪其過至小伏望聖慈特遣中使傳宣安撫釋放贖法便令入謝以存國體群臣幸甚幸甚一王𬈑得替賃盧家宅子稱每月饒減得房錢一貫文其人巳移辰州通判只是暫時守官即非久住宅子之時又未曾言請託橋事量人情只是為王𬈑曾在本縣守官遂欲借宅子與住其王𬈑尚不肯須用錢賃居只饒減得錢一貫文今因王礪奏王𬈑受盧家請託入獄之後須至虛有招認豈可一兩貫錢便使得一貟外郎請託此事兼案內照勘得因堯臣問及遂說利害又無不移橋之言豈是請託之情今獨追官勒停衆議未允望聖慈深察可見其情或與罰銅監當亦減得外邊怨謗又免本人頻來理雪紊煩朝廷一陳榮古定奪橋事據案帳上開說所損舟船五十五隻內五十隻因風并相磕撞致損只有五隻因橋致損又根䆒得元乞移橋狀內所說損却人命及陷沒財物並是虛誑所以榮古定奪更不移橋今來雖依王礪所奏移歸舊處一則違先朝詔命二則未及月餘巳聞新橋不利損却舟船撞折橋柱及水勢稍惡重船過往不易若再差人體量必是先朝不錯移改以此知陳榮古所定未必不當雖三度取狀不全招認罪名蓋有此情理須至分疏本因公事别無私曲今法寺坐為私罪伏望聖慈特與改作公罪免令過後頻來理雪一愼越是三司判官本案管移橋公事既聞差王礪重行定奪遂令人探問移與不移今來勘得别無情弊伏望聖慈特與改作公罪庶免非辜一王礪與堯臣祖同姓名素不相喜因此定奪遂誣奏乞勘三司情弊又奏愼越是堯臣所舉必有姧謀今有勘劾别無情弊亦無奸謀王礪親自定奪此是當以實言且非風聞之失也右前件王堯臣罪名乞特出聖意差中使傳宣放罪令依舊起居并乞特降聖㫖王𬈑免追官罰銅與監當陳榮古愼越並與改作公罪如此施行則衆情稍安群議自息王礪初奏王堯臣必有情弊及有奸謀滿朝公卿憂堯臣禍有不測賴陛下仁聖特與辨明不陷深文群臣又近奉德音令不避嫌疑而况陛下越次擢用敢不盡心助陛下之明德臣至誠激切絲髮不隱望天鑒照臨奏為劉滬董士廉修永洛城乞委魚周詢等勘鞫涇原路走馬承受趙正奏內殿崇班劉滬著作佐郎董士廉被狄靑枷送司理院次竊緣此二人元稟四路都部署節制往修永洛城即非是二人擅興及四路罷後本路部署司抽下軍馬其人即合依禀罷修不合堅執拒抗臣料其情蓋本人在彼相殺得功降下周回蕃部又已下手修築城寨懼見中輟之後本路責其經畫不當故以死拒抗一面興修意望成功亦求免罪始末可見非有他意况劉滬是㳂邊有名將佐最有戰功國家且須愛惜不可輕棄恐狄青因怒輒行軍法則邊上將佐必皆銜怨謂國家負此有勞之臣人人解體誰肯竭力邊事其董士廉是朝廷京官即非將佐亦將一例枷勘蓋狄青粗人未知朝廷事理萬一二人被戮逐家骨肉必來訴之闕下亦更多有臣寮上言紊煩聖聽雖知將帥行得軍法即非用兵進退之際有違節制自是因爭利害致犯帥威昔陳湯矯詔命以破虜王濬違節制以下吳皆釋罪封侯以勸將列伏望聖慈特遣中使乘驛往彼委魚周詢周惟德取勘劉滬所犯因依情罪聞奏仍送邠州拘管聽候朝㫖一則惜得二人不致因公被戮二則惜得狄靑尹洙免被二家骨肉稱冤致訟儻允臣所奏事可兩全彰陛下保庇邊將之恩使武臣效死以報聖慈奏葛宗古臣竊知延州西路都巡撿使葛宗古為侵用公使錢入已奏案巳上朝廷臣昨奏陳邊上得力將佐葛宗古實在其數今恐審刑大理寺斷入極典縱蒙朝廷寬貸亦須降充近下班行必然挫屈更無勇戰之氣臣伏覩刑統節文諸監臨主守以官物私自貸人及貸之者無文記以盜論有文記准盜論立判案減二等即充公𪠘及用公廨物若出付市易而私用者各減一等坐之議曰即充公廨謂以官物回充公廨今朝廷支賜臣寮公使錢既巳支付逐處更不係省帳拘管不收出剩亦無磨勘其公使錢顯是回充公廨之物私用者自有上項正條兼元無條貫今將私用公使錢入巳為監主自盜之法只是法寺近例斷遣不敢從輕遂至入罪切慮今後有公使錢處官貟因循之間為人捃拾多陷除名死罪之坐誠為法之一弊公朝固當正之伏望聖慈宣喚新判大理寺杜曾令上殿指陳侵用公使錢正條付中書參酌免有枉濫其葛宗古弓馬精强復有膽勇在鄜延路中最為驍果今來朝廷選將之際此人實恐難得乞從正條定罪然後議其末減雜奏奏乞罷參知政事知邊郡臣近與韓琦上言陜西邊畫略陳八事須朝廷遣使便宜處置方可辦集又近覩手詔下問合用何人鎮彼西方兩府巳奏見選人進呈次今西人議和變詐難信成與不成大須防將來之患臣久居邊塞下誠無寸功如言鎮彼西方保於無事則臣不敢當但稍知邊情願在驅䇿雖無竒效可平大患惟期夙夜經畫措置兵馬財賦及指蹤諸將同心協力以禦深入之虞今防秋事近恐失於後時願聖慈早賜指揮罷臣參知政事知邊上一郡帶安撫之名足以照管邊事乞更不帶招討部署職任奏乞互換巡邊臣等奉聖㫖商量互換往陜西邊上照管臣等今商量欲乞今秋差臣韓琦先往邊上勾當候將來春初即臣仲淹却往替換所有逐人舊例御筵并錫賚等並乞免取進止奏乞免參知政事錫賚臣蒙恩擢授參知政事今日入朝竊知例有錫賚緣臣昨拜樞密副使巳蒙恩賜虛薄之才涓勞未立不可再有貪冒貽譏縉紳伏望聖慈特賜寢罷庶寬憂懼實賴照臨奏乞免錫賚臣今月二十三日蒙聖恩差到中使賜臣銀絹者伏念臣偶以非才誤膺柬拔備位樞府僅方踰月改參大政不可復賚今早巳具奏陳乞賜罷回聖澤庶安愚悃謹具奏聞奏避蔡禀嫌臣一女子嫁得監察御史蔡禀之弟今來禀為糾彈之官臣在政府恐有妨礙須合上言乞聖慈特降指揮取進止奏乞在京并諸道醫學教授生徒臣觀周禮有醫師掌醫之政令歲終考其醫事以制其祿是先王以醫事為大著于典册我祖宗朝置天下醫學博士亦其意也即未曾教授生徒今京師生人百萬醫者千數率多道聽不經師授其誤傷人命者日日有之臣欲乞出自聖意特降勑命委宣徽院選能講說醫書三五人為醫師於武成王廟講說素問難經等文字召京城習醫生徒聽學并教脉候及修合藥餌其針灸亦别立科教授經三年後方可選試高第者入翰林院充學生祗應仍指揮今後不由師學不得入翰林院如在外面私習得醫道精通有近上朝臣三人奏舉者亦送武成王廟比試更委宣徽院覆試取醫道精深高等者方得入翰林院祗應如內中及諸宮院使不經官學百姓醫人有功效者只與支賜如祗應十年以上纍有效者即與助教或殿侍三司軍大將安排即不得入翰林院所有諸道州府巳有醫學博士亦令逐處習生徒并各選官專管仍指揮轉運使提點刑獄轉運判官所到點撿其學醫生徒候念得兩部醫書精熟即與免戶下諸般差配如祗應州府纍有功效者即保明聞奏與助教安排所貴天下醫道各有原流不致枉人性命所濟甚廣為聖人美利之一也奏乞選河北州縣官貟臣謹按唐初內開十六衛以聚戎臣外開折衝果毅府五百七十四以屯兵伍使三時農務一時習武無事則武臣居內以奉宿衛有事則武臣居外以統軍旅自武德至開元百三十年天下府兵無逆亂者及開元末倚安忘危仍廢府兵天下遂亂其後兵伍皆市井徒驕蹇怨叛終喪唐室國家今於河北點得義勇鄉兵二十萬亦如唐之有府兵也然所置官屬及揀點法制即與唐末類且逐處官非其人不能以恩撫綏以威制服臣恐一旦倉卒不為國家之用既教以弓矢馭之失道則冦亂之資巳先成矣今河北州縣部內各管義勇其長吏中才可馭衆或智可防亂或威懾衆望者有幾人哉臣料按察使奏黜者不過老昧貪猥之人存留者不過勤謹畏懼之士其馭衆防亂恩威得所者必未多也由此觀之是陛下河北二十萬之衆未有統領而無所倚賴也今北戎方盛河朔千里無陜西關山之險又官軍數少難當大敵或更增置官軍即財力巳困無以供億如此則陛下將何為必安之計不可不思也豈易百十貟官吏為難而不以統二十萬兵伍為重然固家恐北戎之疑必未欲多置兵伍臣請且選逐處州縣長吏須命一二才臣專往河北與轉運使安撫使令行按察逐處知州知縣縣令內有才智不長非可統理兵衆者雖無過犯並等第列名聞奏內近成資者差人承替未近成資者與移諸路州縣却將諸處舉到知州知縣縣令人內揀選有材幹者先差往河北填替仍授以訓兵之要其知州並别授宣命專管勾義勇兵甲公事知縣並帶都監監押其縣令中有願換班行充知縣兼監押者並聽亦乞於武臣中選堪知縣者前去如此則得人稍多必能統領教習使行軍陳之序金鼓之節賞罰之約緩急遣就統領可戰可守不誤大事又良吏撫馭恩威得所雖有飢饉不為冦亂其河東路即乞續次依此施行此國家大計非臣之敢輕言也奏乞召募兵士捉殺張海等賊人事臣竊見鄧州奏賊人張海等一行巳及六十餘人各騎鞍馬有弓弩器械驚劫縣鎮恣取金帛強掠士女不懼朝廷凶虐如此百姓𬒳害不堪其憂臣恐逐處窮民見其豪盛各生健羡聚成徒黨脅取州縣事勢漸次張大不早殄滅必生它患漢唐之末皆因群盜而天下大亂朝廷豈得安然伏乞聖慈來日便差中使計會殿前馬步軍司於七百料錢巳下軍分內召募情願捉殺強賊人貟兵士三百五人須是勇壯喫得辛苦或曾經使喚之人限一兩日內引見面賜盤纒錢并冬寒綿衣及大與逐月添支選差有心路使臣部押與謝雲行同去分布掩殺不以遠近粘趂直候捉殺靜盡即等第優與酬奬奏乞指揮管設捉賊兵士近奉聖㫖召募到兵士三百人又於三班院取到使臣部領前去金商州捉殺賊徒雖蒙支賜綿絹及傳宣戒訖切緣彼中賊徒方盛劫取財物虜掠士女烹宰牛羊恣行意氣致諸處軍民中強惡之人往往生心其差去兵士支賜不多又是七百已下料錢每日計得錢二十餘文在路只供得火隊柴薪鹽醋斂掠或遇天寒路遠不免飢凍豈有勇氣向前力戰更恐差去使臣無别心計不能撫恤為宣命緊切連夜拖拽更致怨憤逃走入賊中其患愈大欲乞特降聖㫖更選差近上有心力使臣一貟星夜前去同共部押逐程宿處官破柴薪鹽醋不令斂掠仍密切别降指揮下捉賊兵馬到有賊地分州軍只作長吏意度逐人辦肉一斤麵一斤酒一升管設所有使臣軍員别破酒食如遇大假雨雪兵士單寒向前不得即更令製造紬綿被襖支散所貴各得飽暖則有勇氣可以擒賊亦上感聖恩不致怨叛仍令差去使臣常切體量兵士內有結構逃走或出怨言扇搖軍衆者明立照證處斬訖奏臣在邊上體當軍情須是如此恩威兩立才能使喚方保無事今來兵士不多易為豐足大都防於未萌若待叛怨之後旋行招撫則深損國威亦不懷感賊大之後所費無窮其餘處捉賊兵士到有賊地分州軍亦令依此體量施行候賊平日各歸地分自然不更管設乞垂聖斷奏乞發兵往荆南捉賊荆門軍奏賊人張海等巳到彼中人數漸多荆湖少兵大可憂慮似此一路殺人放火驚劫郡縣朝廷若只行遣文書將何以濟空發使命前去别無兵馬彼中賊無所畏取便屯結一路州郡無兵之援何以守禦伏望特出聖意於在京發兵三千人作三節起發如賊巳銷滅即以上件兵士於荆南府潭州分屯以鎮遠方如尚猖獗聞京師兵來則一路州郡望風增氣賊勢自然窮蹙易為翦除不成大患奏乞差人部送吳遵路家屬知永興軍兼經略安撫使龍圖閣直學士吳遵路身亡緣本家只有一子全未歷事家眷幼碎兼陜府界賊盜頗多伏望聖慈指揮下陜西轉運司多差公人兵士津置仍選官一員部送至京及指揮逐州多差人防送免致踈虞取進止范文正公政府奏議卷下
