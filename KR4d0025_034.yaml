body:
  text: 范文正公鄱陽遺事錄序漢孝宣帝常曰與我共治者其惟良二千石乎天下之廣郡有太守能用良稱者幾人哉且鄱陽禹貢楊州之域春秋時爲楚東境後属吳史記言昭王十二年吳伐楚取番盖其事也秦并天下曰番陽縣属九江漢更爲鄱陽縣係豫章後漢建安十五年吳大帝時張昭等議以豫章上廣人夥請分置廬陵番陽二郡𥘉治部故城後徙呉芮即今之所治也梁天監中置吴州陳廢爲郡隋平陳罷郡爲饒州大業仍爲郡唐武德四年平江左乃復置州則饒之爲州殆四五百年矣推諸牧守無慮近千人然摭於㕔壁記自開寳八年僞唐歸朝有鐵林軍主張仁忠權知焉迄元祐壬申朝奉大夫鄒軻凡六十有八人而比閱州圗經序賢牧内史者止吳周魴晉虞溥隋梁文謙柳荘梁陸襄唐馬植李復七人焉求之州圃間有吳虞梁柳陸馬李七公與顔魯公并文正公畫像以千百歳而守者近千人而其著於圖記繪像者陸虞二内史梁周二太守柳儀同馬常侍李刺史顔范二公九人云二千石之良不幾於難有耶余倅於饒見魯公雪程小娘𬒳冦事特道其始末而圗其像以附文正公之祠堂是賢太守不可得而多也噫鄱陽之守近千人著於圖記繪像九人而公之德尤不泯饒人爲之立祠班春堂天慶觀州學之講堂凡三所繇景祐距此僅六十載香火不絶牲牢日盛較以千人間流澤之逺惠愛之𬒳獨公一人而巳矣然公之遺風餘美實浹於物毎於民之去思又豈止夫祠堂而巳乎公視政日所以制作修剏之跡㳺賞吟詠之舊莫不敬而念之余因采其所敬念者命曰范公鄱陽遺事録非敢􅗲名於世庻其垂話于後而不事於召棠之歌詠也且公始通判河中府徙宛丘壓延慶杭越蘇潤青頴邠耀鄧永興一十二郡純猷茂蹟燦在國史家集奏議間何假於是歟如公所至有恩鄧慶二州民與属羗畫像而生祠之御篆以褒賢碑額青史傳載四方千載固巳聞之矣竊疑饒之遺事或有所未聞者安得而弃乎紹聖乙亥六月丁卯天台陳貽範序
