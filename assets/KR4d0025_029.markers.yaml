  - {type: variant, offset: 0, length: 531, content: 范文正公尺牘卷下後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校交游與晏尚書伏自春初至項城因使人回草草上謝由頴淮而下越兹重江四月幾望至於桐廬回首大亳忽數千里日思奏記夐於無階恭惟蕃宣之居鈞體惟寧赫赫之瞻日以增重某罪有餘責尚叨一麾敢不盡心以求疾苦二浙之俗躁而無剛豪者如虎示之以文弱者如鼠存之以仁吞奪之害稍稍而息迺延見諸生以博以約非某所能蓋師門之禮訓也又郡之山川接于新定誰謂幽遐滿目竒勝衢歙二水合于城隅一濁一清衢江濁歙江清如濟如河百里而東遂爲浙江漁釣相望鳬鶩交下有嚴子陵之釣石方干之隱茅又群峯四來翠盈軒窻東北曰烏龍崔嵬如岱西南曰馬目秀狀如嵩白雲徘徊終日不去巖泉一支潺湲齋中春之晝秋之夕旣淸且幽大得隱者之樂惟恐逢恩一日移去且有章阮二從事俱富文能琴夙宵爲會迭唱交和忘其形體鄭聲之娛斯實未暇徃徃林僧野客惠然投詩其爲郡之樂有如此者於君親之恩知已之賜宜何報焉今有郡齋歌詩一軸拜獻庶明前言之不誣爾干瀆台嚴伏增戰懼尚逺門下伏惟尊崇爲國自重某啓伏惟叅政尚書台候起居萬福某伏自恩改蘇首捧鈞翰屬董役海上至還郡中災困之氓其室十萬疾苦紛沓夙夜營救智小謀大厥心惶惶久而未濟上答斯晩死罪死罪早以桐廬鄙述之仰黷台光伏蒙尚書不以隆墀之高而應諸遠壑不以隆鐘之大而納兹纎筵謂宣父, WYG: ''}
