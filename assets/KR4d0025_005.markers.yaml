  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_005-1a01}
  - {type: variant, offset: 0, length: 1216, content: 范文正公集卷第五易義乾上乾下内外中正聖人之德位乎天之時也德内也位外也九二君之德九五君之位成德于其内充位于其外聖人之德居乎誠而不遷有時舎之義故曰見龍在田德昭于中故曰利見大人天下文明君德也聖人之位行乎道而不息有時乘之義故曰飛龍在天位正於上故曰利見大人乃位乎天德於是乎位矣或者泥於六位之序止以五爲君曾不思始畫八卦三陽爲乾君之象也豈俟於五乎三隂爲坤臣之象也豈俟於四乎震爲長子豈俟重其卦而始見於長子乎明夫乾君之象旣重其卦則有内外之分九二居乎内德也九五居乎外位也餘爻則從其進退安危之會而言之非必自下而上次而成之也如卦言六龍而九三不言龍而言君子蓋龍無乘剛之義則以君子言之隨義而發非必執六龍之象也故曰易無體而聖人之言豈凝滯於斯乎咸隂進而陽降兌隂卦艮陽卦上下交感之時也與㤗卦近焉泰卦天地交而萬物通咸卦天地感而萬物化生然則泰卦三隂進于上三陽降于下極於交而泰矣故曰萬物通咸卦隂進而未盡逹也陽降而未盡下也下卦猶有二隂上卦猶有二陽感而未至於泰矣故曰萬物生而猶未通也聖人感人心而天下和平是感之無窮而能至乎泰者也感而不至其道乃消故至騰口薄可知也恒陽動隂順剛上柔下震陽也剛動于上巽隂也柔順于下上下各得其常之時也天尊地卑道之常矣君處上臣處下理之常矣上陽卦天與君之道也下隂卦地與臣之道也男在外女在内義之常矣震爲長男巽爲長女天地君臣男女各得其正常莫大焉諸卦多以有應爲吉此卦六爻皆應而爻無元吉者何也夫吉於應者相求以濟之時也常者上下各得其所之時矣故以剛柔皆應爲常而不以獲應爲吉是以士之常也在於巳不在於人諸侯之常也在於政不在於鄰天子之常也在於道不在於權故曰聖人乆於其道而天下化成堯舜爲仁終身而巳矣其知常也哉遯隂進陽退二隂進之於内四陽退之於外柔佞入而剛正出君子遯去之時也夫柔勝於剛則小人制君子矣辱可逃乎柔未勝剛則君子辱可遠也未見制於小人焉此卦二隂而四陽柔未勝剛小人始浸而長也君子知吉之先辨禍之萌思遠其時也可不遯乎故遯之爲義尚乎遠也是以最在内者有遯尾之危最在外者有肥遯之利子曰知幾其神始可與言遯也巳矣大壯剛以震而隂摧内剛外震二隂剥焉君子威而小人黜政令剛嚴之時也陽於隂爲大也陽進隂退大者壯而小者喪矣夫雷在天上萬物以震威行天下萬邦以恐天地之壯見乎雷聖人之壯見乎威壯而不節於天下暴矣壯其喪矣是以君子非禮弗履以保其壯也故九二九四以陽居隂體剛而處巽乃復獲乎貞吉餘爻皆不克全其壯也巳晉順而上行奉于文明坤順也離明也君子嘉遇顯進之時也夫上無文明賢斯遁矣今文明麗于上君子可不進乎其進也柔順内融内卦坤也有柔順之義則上不拒其逼矣故曰晝日三接也英華外著外卦文明有英華之德則衆不疑其行矣故曰君子以自昭明德蓋明出地上如日之升君子當其象也豈復昧哉其伊尹之時歟明夷隂上明下其義病矣火入地中其光翕矣蔽賢傷善之時也夫文明在上則賢者遂進文明在下則善人用傷其商之末世耶君子用晦然後免於其難然則文王其不用晦乎何以甞幽之耶文王蓋有國焉德加於人晦之難也故以文明入于難終以柔順而岀矣箕子雖無政焉而最近於闇故自辱其身以晦其道然後乃, WYG: ''}
