  - {type: variant, offset: 621, length: 1145, content: 李舜臣家得公墨跡慮其湮沒命工勒石以傳永久泰和乙丑春休日宣武将軍行主簿都騎尉王國器立石長山書事孫弘多詐涴齊人玉石由來各自分汲黯有靈吾可問此山曽見范希文至元七年秋七月二十有四日汶水節斎陳祐按部過此故題進義副尉長山縣主簿崔仲元立石謁文正公祠堂詩長白何岧嶤下有讀書室人云小范老於此度辰夕蕭蕭翳荆榛落落臨泉石拳拳往拜瞻赫赫如相及維宋慶曆間多士麟鳳集孰爲天下憂一䟽丹心白中朝元有人西夏諒難國力言師出凶深慮手滑失炳幾先見明韓富有慚德柰何時相陋欲碎和氏壁向非仁廟知千載血應碧至今忠義氣高壓萬仞壁所以行業隆要自清苦積功臣何代無名爲富貴役視公乎昔懐霄壤邈相隔但能一善兼亦足百歳塞遺容掲日星未覺関塞黒長歌景行詩風林撼秋色右延祐四年三月廿又七日翰林學士資善大夫知制誥同脩國史張飬浩偕龐提領拜謁祠下文正范公祠吳潜仁誼功忠一片心兵間招弄更精神當時老上龍庭種豈信江南有此人長山溪畔蓼莪青想見當年念母情顧我遠㳺營底事擡頭重感老先生長山青陽縣東二十里文正范仲淹幼鞫于朱氏讀書其地紹定二年縣令丁木立祠朝請大夫丁黼記池州青陽文正祠理齋楊少愚繤註范墉饒州書記歸逕池之青陽謁長山朱文翰留謝歸之越三月公生端拱巳丑歳也說名登第於祥符乙卯歸姓於天聖丁卯文翰任淄州長史亦嘗徃長白山𥘉仕廣德軍云便迎母家書卑池州朱延之范太師戶置田青陽活朱氏孤遺獨墓碑爲忠宣公諱耳七子母聖善凱風吹棘薪蒯聵書世子文姜絶不親詩亡春秋作寜以諱失真人之大倫五克諧信義仁吾身所由出同岀先吾身循此而孝弟道與堯舜均異姓聿居三友妻上君臣事母豈殊父母或從乎人從人良有由夫命志莫伸所以謝夫人寄生天麒麟覃恩復歸宗善乎處天倫春秋明時中大經所經綸敢借魯衛書重爲范氏陳澧州路安鄉縣太平興國觀文正公讀書堂東原申屠駧致祭祝詞維元統三年歳次乙亥六月辛丑朔越十有六日丙寅後學東原申屠駧廵歷至澧州路安鄕縣詣太平興國觀先師文正范公之讀書堂謹以三牲酒饌雜果盤𬞞敬祭而昭告曰惟公有出將入相之才則見諸事業有致君澤民之志則見乎文章捍海濤而築巨堰恤宗族而爲義荘駧也昔嘗拜公之像於興化今復拜公之像于安鄕盖非羡公之自寒㣲而至通顯乃特慕公之秉方正而備賢良也尚饗與祭官敦武校尉澧州路安郷縣逹魯花赤兼勸農事馬合謀承事郎澧州路安鄕縣尹兼勸農事吕袁友進義校尉澧州路安郷縣主簿夏思德縣尉楊宋照略案牘鄧天祐将仕郎吉安路儒學教授致仕羅勉道安鄉縣學敎諭張巖儒生李恒周泰劉浚劉南昌青陽賔常德等處榷茶提舉司司吏魯思明祝辭維大元至正七年歳次丁亥八月辛未朔越二十有一日辛卯奉議大夫奉元路耀州知州兼管本州諸軍奥魯勸農事東平申屠駧謹以潔牲清酌㝠楮凈香致祭于文正范公而昭以告曰公昔嘗寵知於耀駧今亦忝知于耀駧也黽勉焉惟前賢之是希庻幾乎逭後人之所誚謹告與祭官雲南省臨安路建水州儒學正杸栩蹇仲義陜西省奉元路耀州同官縣儒學敎諭韓城程好問讀祝儒生汴梁李鼎詩頌, WYG: ''}
