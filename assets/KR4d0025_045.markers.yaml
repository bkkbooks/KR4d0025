  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_045-1a01}
  - {type: variant, offset: 0, length: 624, content: 諸賢詩頌廣德司理詩孫莘老維待狴犴下枉直情必通太守異趣舎挺然不曲從有事爭論之粉屏記其終官小俸禄薄家居率窮空賣馬以自給徒歩氣彌充㳺百花洲盤礴文正祠下以生存華屋處零落歸山丘爲韵賦十詩黃魯直其一憶昔昭陵日傾心用老成功歸仁祖廟政得一書生其二羊生但著鞭勿哭西州民故有不亡者南山相與存其三慶州自不惡籍甚載聲華忠義可無憾公今有世家其四公歸未百年鶴巢荒古屋我吟殄瘁詩悲風韻高木其五傷心祠下亭在時公燕處臨水不相猜江鷗㑹人語其六公有一杯酒與人同醉醒遺民能記憶欲語涕飄零其七委徑問謡俗高丘省伷作昔㳺非苟然今花幾開落其八在昔實方枘成功見圎機九原尚友心白首要同歸其九人去洲渚在春囘花草班清談值淵對發興如江山其十落日㗸城壁祠東更一㳺悲來惜酒少安得董糟丘次韻其一夏均倪父神文秉周禮廟樂奏九成當時䕫一足不待魯諸生其二嘖嘖雀噪屋愔愔蛛網門我來九頓首生氣凛如存其三堂堂古遺直心嚴䫉無華人見不嫵媚何以娱大家其四樸䔩復樸䔩何以棟我屋風雨莫輕摇南山無老木其五有酒當自醑有室莫共處古今一丘貉何能坐飛語其六夢囘四賢篇長風吹人醒嗟哉不我見淚與秋露零其七百代無幾人九原何可作不必温御史觧令君膽落其八寳元乃多故公時捴戎機胸中百萬兵要取橫山歸其九公歸今幾時遺懿何班班公議要難没言波可懐山其十我心不可䂓滔滔誰與㳺向來秉大雅心復成一丘懷范樓中奉大夫致仕楊用道初載希文此屈盤天衢一旦遂高摶古人直許到䕫契當世猶能並富韓事與陶朱均日煥名彰長白倚天寒何但東坡爲流涕遺編我讀亦汍瀾故寜海軍刺史楊中奉才學與蘇黃不相上下近, WYG: ''}
