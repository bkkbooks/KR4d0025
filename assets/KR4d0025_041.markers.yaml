  - {type: variant, offset: 2267, length: 877, content: 係范文正公親族欽依聖旨除免雜泛相應具呈都省照詳去訖今奉前因本部議得宋相范文正公致君澤民之術具載方冊所設義莊義學資給宗人教育後裔至今規模不墜其於世教不爲無補宜咨行省禁治諸人無得煩擾所司常加優恤外據旌表一節旣有忠烈廟額似難别議具呈照詳得此都省咨請依上施行准此省府劄付平江路總管府依上禁治令所司常加優恤外合行出榜禁治諸人毋得煩擾所有榜文須議出給者右榜曉諭諸人通知大德年月日泰州據前安慶路儒學正朱景新謹呈切見西溪范文正公祠堂係是宋時天聖年間文正公監西溪鎭買納鹽倉之日因見瀕海田土𬒳海水侵鹹有妨耕種乃相度此地宜剙捍海堰以救護良田遂作程度計料文書申覆上司逹知朝省就任遷范監倉知興化縣監督人夫剙築捍海堰於西溪之東計長一百四十六里零六丈六尺其髙一丈其闊二丈爲則用磚包砌截海水於外護良田於内自後海陵興化鹽城等縣田土皆得種蒔不特百姓有糧及諸鹽塲亦頼以培養剪燒氣力者今三百餘年矣亡宋年時鄉人告於官而立文正公祠堂於西溪以報范公之德巳經年深至歸附後毁廢祠堂大德四年間前任海陵縣丞白將仕等收買屋料興復起蓋祠堂重新裝塑賢像彼時蒙海陵縣曽出榜文禁約諸人毋得沮壞祠堂一節今爲年深前榜不在一等不畏公法之人在祠堂毀壞墻壁蹇潑糞草地上掘取泥土多端侵損即日再行修整若不呈乞出給榜文付祠堂張掛省諭諸人毋得似前沮壞誠恐日漸毁壞前代名賢遺迹不便據此合行具呈右泰州西溪書院禁約據前眞州儒學學錄朱景新狀呈切見泰州西溪范文正公書院昔因通泰兩州之地東臨大海每遇風濤大作直抵城下人𬒳其苦亡宋天聖間公監西溪塩倉之日遂築捍海堰橫截潮水自後塩農俱受其賜爲此立祠於西溪歳時致祭積有年矣自歸附後廟貌頽圯迨今未整若不重爲脩理恐負上司美意今欲興工慮有一等不知禮法之人攪擾沮壞未便乞出榜禁約施行得此使州合行出榜如有違犯之人仰指名告官取問是實痛行㫁罪所有榜文湏至出給者大德五年二月日右泰州榜文中書省准河南省咨言泰州海陵縣西溪鎮前宋范文正公仲淹所建書院在焉當其還朝民爲立祠以報其德經二百餘年至元歸附學遂廢弛大德間姜國英以巳財重建祠宇乞令本儒主領相應中書送禮部議旣經夲道㢘訪司體察舊有祠堂委係前賢合設書院宜從所請延祐二年月日朝廷優崇終, WYG: ''}
