  - {type: variant, offset: 0, length: 2266, content: 朝廷優崇古者一代帝王之興必尊禮昔賢以奬勸風俗文正公之勲德其在宋時固宜優禮至于皇元歲命郡守致祭省部諸司毎有優恤范氏子孫之文於此見大朝之盛治所以培植風俗教化之意逺矣然則仕於是邦者盍亦體朝庭之意而加之優禮蓋所以爲風俗教化之楷範而豈私於范氏置功德寺中書門下牒蘇州白雲寺右諫議大夫叅知政事范仲淹劄子奏蘇州天平山有白雲泉南有寺寺中有刺史白居易詠白雲泉詩明古寺也臣本家松楸實在其側常令此寺照管准先降條貫應寺院及五十間巳上至乾元節並得賜額上件古寺屋宇巳應得條貫伏望特賜一名額取進止牒奉敕宜賜白雲寺爲額牒至准敕故牒慶曆四年四月二十五日牒右諫議大夫叅知政事范右諫議大夫叅知政事賈刑部尚書平章事晏工部尚書平章事章觀察推官夏有章權節度推宫汪仲權節度掌書記蔡抗殿中丞通判軍州事朱夀隆著作郎直集賢院知軍州事呂溱原武鄭方平篆臨安錢德範書山門住持僧擇梧立皇祐元年夏四月初一日當寺講僧遇明建置祠堂浙西提舉司申照㑹說友蒙恩守吳懼無補報竊見先賢文正范公本郡人也道德文章功名事業載在國史實爲我朝第一流人物身没之後近二百年凡公過化之地無不尸而祝之獨本府未有專祠附庸學宫而巳其於崇祀勵賢見謂缺典郡雖窘乏而事關風化曷敢弗力乃卜范氏義莊之東義宅隟土鳩工度犲爲屋六十楹以奉公祠仍撥没官田土拘收租米充春秋二祀之費其祠宻邇學道書院春秋二祀太守率其屬親涖及遇月朔則山長率諸生徃拜焉先擇公之後賢者一人爲掌祠若郡計稍舒别圖收教其子弟并以附于書院巳㳙九月十一日立木候成舎采奉安外所合具申朝省照會仍乞劄下本府照應伏候指揮省劄照得知平江府潛提舉申先賢文正范公本郡人也獨未有專祠今卜范氏義莊義宅之東隟土爲屋六十楹以奉公祠仍撥没官田畆拘收租米充春秋二祀之費巳㳙日立木候成奉安外申乞劄下本府照應合議行下右劄付平江府照應仍具所撥田畆數目尚書省准此咸淳十九年九月日與免科糴提領浙西和糴所據吳縣申具致范令公義莊田八百九十七畆每畆勸米三斗計米二百九十二石一斗呈奉台判范文正公義莊廼風化之所關與免科糴仍帖報兩縣收冊拘錢須至行遣右今帖吳縣勸糴官仰照所判速便拘收范令公青冊并糴本錢具狀一併差人解發赴所支納不得違滯嘉熈四年閏月日帖呉縣勸糴官提領浙西和糴所據長洲縣申具范令公義莊田二千二百七十一畆三角每畆勸米三斗計米六百八十一石五斗二升呈奉台判范文正公義莊廼風化之所關與免科糴仍帖報兩縣收册拘錢須至行遣右今帖長洲縣勸糴官仰照所判速便拘收范今公青冊并糴本錢具狀一併差人解發赴所支納不得違滯嘉熈四年閏月日帖長洲縣勸糴官祠設教諭省府范文正公祠照㑹本祠見闕訓導小學敎諭一員今帖請李前職夢文充本祠教諭請照應日下供職具遵禀狀申至元十三年閏月日帖帖中書省劄差充平江府儒學教授兼學道書院山長提督范祠袁中書省劄差充平江府儒學副教授兼學道書院山長提督范祠石江浙等處行中書省據范士貴狀告年壯無疾係先賢范文正公嫡孫見充平江路學職兼管本族義莊義學勾當即目在天平山住坐先世文正公捨宅爲路學作養人材置買義莊田養贍宗族及剙義學以教子孫有墳山梯巳田地並隷本路屬縣亡宋時及歸附後俱蒙軫念先賢後代本處官司㑹騐舊例除納稅石外一切差役科折並行蠲免後因吳縣及長洲縣司吏朦朧科折糯苗士貴狀吿本縣次經夲路俱蒙受理行下合屬改正止納一色造粳又於至元十十年六月内有各鄕里正人等欲將義莊與民田一例科助役米遂經本道宣慰司并按察司陳告蒙追索本路文卷撿照得范文正公置買上項田土初非私已正欲永逺養贍宗族子孫義所難及自前至今旣不曽設著科役難同民田一例施行牒本路行下合屬除免間再具狀經行中書省陳告蒙受理行下本路照勘是實依上蠲免毋得科率違錯總府除巳遍榜合屬外又於二十年三月内經省府陳告給蠲免文據奉省府鈞㫖送浙西道宣慰司照勘依例施行母得違錯奉此蒙宣慰司照勘是實劄付本路行下合屬依例施行除免一應科役就便出給文憑付士貴收執照驗外近欽奉聖㫖節該在籍秀才做買賣納商稅種田納地稅其餘一切雜泛差役並行蠲免所在官司常加存恤仍禁約使臣人等毋得於廟學安下非理搔擾欽此凡是儒人旣例蒙存恤蠲免況本家裔忝先賢世居呉郡先文正置立義莊義學以教養宗族凡冠婚䘮葬咸有所助迄今三百年流傳不朽人皆慕之本處官司尚以義關風化每歲舉行祀典實與其他儒戶不同但士貴雖巳經行省陳吿行下合屬蠲免止是本路備舉出給文憑付士貴收執切慮歲月深逺官吏更易仍不准行雷例科率搔擾吿乞出給公憑事得此省府除巳行下平江路依例除免本戸雜泛差役外合行出給者右付范士貴收執准此爲范士貴吿科擾事至元二十七年月日江浙等處行中書省近據平江路申准本路總管董嘉議關伏見先賢范文正公世家吳郡勲德事業著在青史以地建學撥田養士實其剙始吳士德之其三世祖父墳墓俱在本路管下皆封太師國公曾賜忠烈廟額每歲夲路致祭甚䖍置立義莊義學至今三百餘年規模如故若加旌表實爲砥礪風俗之本移准江南浙西道肅政廉訪分司牒如准所言允當申乞照詳得此移咨中書省照詳去後今准回咨送據禮部呈照得至元三十一年四月准集賢院關備國子監呈范士貴狀吿先賢范文正公六世孫提管本族義莊義學養贍宗族垂三百年世守弗墜歸附以來蒙官司軫念先賢之後除納稅石外依例與免差役後因司縣官吏更替不常其間不無動摇雖蒙江浙行省行下合屬欽依聖㫖事意蠲免一切差役及出給公據付士貴收執有長洲縣司吏仍復以和買爲由攪擾不安終未有都省存恤明文司縣得以玩視吿乞優加存恤施行本監㕘詳范文正公以文武全材實爲當時之名相置買田宅養贍宗族足爲後世之良規三百年來子孫猶在若加存恤實爲聖元仁政伏乞照依先降聖旨除商稅地稅其餘一切雜泛禁止相應得此本院議得范文正公古之名相置買義田子孫世守不墜如准國子監所擬實爲相應准此本部議得范文正公前代名臣置田贍族垂教後世不爲無𥙷如准集賢院所擬移咨行省照勘如, WYG: ''}
