  - {type: variant, offset: 5560, length: 0, content: '', WYG: 欽定四庫全書范文正集巻五宋范仲淹撰義易義乾上乾下内外中正聖人之徳位乎天之時也徳内也位外也九二君之徳九五君之位成徳于其内充位于其外聖人之徳居乎誠而不遷有時舍之義故曰見龍在田徳昭于中故曰利見大人天下文明君德也聖人之位行乎道而不息有時乘之義故曰飛龍在天位正於上故曰利見大人乃位乎天徳於是乎位矣或者泥於六位之序止以五為君曽不思始畫八卦三陽為乾君之象也豈俟於五乎三陰為坤臣之象也豈俟於四乎震為長子豈俟重其卦而始見於長子乎明夫乾君之象既重其卦則有内外之分九二居乎内徳也九五居乎外位也餘爻則從其進退安危之會而言之非必自下而上次而成之也如卦言六龍而九三不言龍而言君子蓋龍無乘剛之義則以君子言之隨義而發非必執六龍之象也故曰易無體而聖人之言豈凝滯於斯乎咸陰進而陽降兌陰卦艮陽卦上下交感之時也與泰卦近焉泰卦天地交而萬物通咸卦天地感而萬物化生然則泰卦三陰進于上三陽降于下極於交而泰矣故曰萬物通咸卦陰進而未盡達也陽降而未盡下也下卦猶有二陰上卦猶有二陽感而未至於泰矣故曰萬物生而猶未通也聖人感人心而天下和平是感之無窮而能至乎泰者也感而不至其道乃消故至騰口薄可知也恒陽動陰順剛上柔下震陽也剛動于上巽陰也柔順于下上下各得其常之時也天尊地卑道之常矣君處上臣處下理之常矣上陽卦天與君之道也下陰卦地與臣之道也男在外女在内義之常矣震為長男巽為長女天地君臣男女各得其正常莫大焉諸卦多以有應為吉此卦六爻皆應而爻無元吉者何也夫吉於應者相求以濟之時也常者上下各得其所之時矣故以剛柔皆應為常而不以獲應為吉是以士之常也在於已不在於人諸侯之常也在於政不在於隣天子之常也在於道不在於權故曰聖人久於其道而天下化成堯舜為仁終身而已矣其知常也哉遯陰進陽退二陰進之于内四陽退之于外柔佞入而剛正出君子遯去之時也夫柔勝於剛則小人制君子矣辱可逃乎柔未勝剛則君子辱可逺也未見制於小人焉此卦二陰而四陽柔未勝剛小人始浸而長也君子知吉之先辨禍之萌思逺其時也可不遯乎故遯之為義尚乎逺也是以最在内者有遯尾之危最在外者有肥遯之利子曰知幾其神始可與言遯也已矣大壯剛以震而陰摧内剛外震二陰剝焉君子威而小人黜政令剛嚴之時也陽於陰為大也陽進陰退大者壯而小者喪矣夫雷在天上萬物以震威行天下萬邦以恐天地之壯見乎雷聖人之壯見乎威壯而不節於天下暴矣壯其喪矣是以君子非禮弗履以保其壯也故九二九四以陽居陰體剛而處巽乃復獲乎貞吉餘爻皆不克全其壯也已晉順而上行奉于文明坤順也離明也君子嘉遇顯進之時也夫上無文明賢斯遁矣今文明麗于上君子可不進乎其進也柔順内融内卦坤也有柔順之義則上不拒其逼矣故曰晝日三接也英華外著外卦文明有英華之徳則衆不疑其行矣故曰君子以自昭明徳蓋明出地上如日之升君子當其象也豈復昧哉其伊尹之時歟明夷陰上明下其義病矣火入地中其光翕矣蔽賢傷善之時也夫文明在上則賢者遂進文明在下則善人用傷其商之末世耶君子用晦然後免於其難然則文王其不用晦乎何以嘗幽之耶文王蓋有國焉徳加於人晦之難也故以文明入于難終以柔順而出矣箕子雖無政焉而最近於闇故自辱其身以晦其道然後乃免故文明在下難哉聖賢其猶病諸變斯時者惟九三乎得其大首其湯武之事歟家人陽正於外謂五也陰正於内其二也陰陽正而男女得位君子理家之時也明乎其内禮則著焉内卦明也順乎其外孝悌形焉外卦順也禮則著而家道正孝悌形而家道成成必正也正必成也聖人將成其國必正其家一人之家正然後天下之家正天下之家正然後孝悌大興焉何不定之有故曰刑于寡妻以御于家邦然則正家者貴閑其初也故初九有悔閑得其道乃首得悔亡至于九五王假有家則天下化成故勿恤而吉也睽火炎澤潤其性不同炎從上潤從下其道違而不接物情睽異之時也陰陽不接而天地睽日月不接而晝}
