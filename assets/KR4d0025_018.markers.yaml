  - {type: variant, offset: 4095, length: 204, content: 賀胡侍郎致政狀伏審侍郎進清崇之爵諧髙尚之風耆德尊隆睿恩深厚榮映之下慶仰居多恭以侍郎誠明自天進退由道宣三德於夙夜𬒳四紀於龍光赫有華名宻多隂施艱難險阻盡力乎三朝富貴崇髙致身乎五福而乃起逹人之觀引大夫之年聦明不衰止足自處國家興廉讓之節䟽渙汗之仁寵數優賢休聲載路耀錦南國邑子榮太守之歸掛冠東門都人藹大夫之歎爲儒及此其樂何涯伏惟上爲聖朝倍報崇重舜好清問方體貌於宿賢國有老成尚彌縫於顯道某乆荷鈞縁卑情無任榮觀景仰抃躍之至, WYG: ''}
