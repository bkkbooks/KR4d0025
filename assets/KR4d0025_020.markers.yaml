  - {type: variant, offset: 0, length: 3994, content: 范文正公集卷第二十老人星賦明星有爛萬壽無疆萬壽之靈三辰之英其出也表君之瑞其大也助月之明但仰祥光莫辨皤然之象方資睿筭斯垂耄矣之名皇家以大洽雍熈咸臻仁壽感垂象之丕變彰御圖之可久爰假號於耆年寔歸羙於元后南郊享處能無鼓缶之歌銀漢經時誰是遊河之友觀夫落落位正熒熒影孤應春秋之候出丙丁之隅視合璧之祥兮未異顧連珠之瑞兮若無象兹黃髪永我鴻圖想天上之宵征寜悲鍾漏顧人間之夕景豈恨桑榆是何上象著明昌時合偶歷數自延於人主名實何慙於國叟月輪遥覩安車之意寜無天駟傍瞻失馬之嗟何有此蓋君著明德天陳瑞星㑹兹鼎盛薦乃椿齡增芳華於信史協休羙於祥經毎覩運行如縱心於黄道無差躔次疑尚齒於青冥足使歷象者考祥占天者改觀掛碧空而的的度清宵而爛爛非時不見如四皓之避秦有道必居若二踈之在漢大矣哉名尊五福位列三光發天文之炳煥符帝德之悠長北闕前瞻獨呈祥於有爛南山俯映共獻壽於無疆士有仰而賦曰天之象兮示勸君之位兮善建實賛天靈之數允叶華封之願又何必周王之夢九而嵩嶽之呼萬者也老子猶龍賦元聖之道通變如此昔老氏以觀妙虚極棲眞渾元握道樞而不測譬龍德而彌尊孰可伺珠長存慈儉之寳全疑在沼不離清浄之源宣尼之啓述嘉言發揮至聖謂此眞宗之德若彼時乘之性毎去不祥之器劒化同歸常開衆妙之門魚登比盛莫不遺情寵辱放志希夷振淳風而騰驤有便樂上善而游泳無疑所謂性相近也故可則而象之知雄守雌宛訝存身之際絶聖弃智潜疑勿用之時至哲難偕元功莫極知止而過亢何有善行而在田可則彼飛昇於天路此逍遥於聖域流沙西去曾無戰野之虞紫氣東來寔有召雲之德豈不以神龍之舉也其變不窮聖人之道也無幽不通一則致霖雨於天下一則宣教化於區中背僞歸眞豈逐葉公之好長生久視寧資豢氏之功不然又安得深述杳㝠盛稱逹變忘機而沉梭是擬著經而負圖可見宋纎比聖堪爲折角之流尹喜依仁自得攀髯之便大道卷舒非龍何如言豹隱者胡能比矣稱虎變者近可方諸我名躋四大之間五靈斯㑹我道配二儀之際三友非踈故能作大匠之宗師闡無爲之妙㫖惟尊道而貴德自反古而復始比於或躍之靈蕩蕩乎其聖如此蒙以養正賦君子能以蒙養其正蒙者處晦而弗曜正者居中而弗羣守晦蒙而靡失養中正而可分處下韜光允謂含章之士居上弃智斯爲抱一之君聖人以設彼易文授諸君子考其在蒙之象得此養正之理渾兮若濁下民無得而稱焉闇然而彰聖功亦在其中矣是以不伐其善罔耀其能惟樸素而是守又濬哲而曷矜故知我者謂我愚不可及不知我者謂我智不足稱務實去華育德之方斯在反聽收視養恬之義相應故得悔吝不生純和自履隱其明而若昩保其終而如始至賢者孟子在養素而弗違亞聖者顔生性如愚而有以是知蒙正相養聖賢是崇欲求乎不失其正必在乎受之以蒙石藴玉而外質蚌含珠而内融天地何言育物之功濳用龍蛇處蟄存身之道不窮其或謀畫爲先聰明白廣不務淳淳而處毎思察察而徃則彼蒙也喪乎其眞此正也失其所養曷若我知白守黒老氏之教寧忘用晦而明箕子之風不爽至矣哉正之在斯養亦宜其藴道德而不衒豈禍福之能隨志士體之而脩身素履無失聖人執之而行化赤子焉知廼有脩辭立誠窮理盡性常黙黙以存志將乾乾而希聖庻幾進退之間保君子之中正禮義爲器賦崇禮明義斯以爲器禮義交舉聖賢是崇旣覩化人之要爰彰爲噐之功脩之於身豈晚成而是慮體之於政見日用之無窮前典可稽格言斯啓假其噐而宣其教尊其義而貴其禮本於太一寧因雕琢之勞見無不爲豈定方圓之體不速而成與世作程于以致滿而不溢于以知用之則行見者之謂智述者之謂明合二羙以同歸皆能致用列五常而共乆何患易盈是以化彼邦家器兹禮義其羙也混而爲一其設也分而爲二助政教而可大貫古今而不墜宣尼始問於周史雅契求新晉文首定於襄王允符先利豈不以爲君之柄也非禮何持立人之道也惟義是資居上而不我遐棄化下而何莫由斯有之則安在傾欹而莫覩聞而能徙信用捨以從宜是知彼器也利乃生民此器也歸諸君子蓋用之而可資故喻之而有以察其無體可忘尚象之言執以衛身詎有假人之耻念兹在兹無爲而爲但守執虚之戒難忘持滿之規安上治民寧使乎小人乘矣見危致命豈惟乎長子主之今國家稽古不忘宣風遐𬒳其禮也同二儀之節其義也正四方之志覆萬國而無疆通大道之不器今樂猶古樂賦民庻同樂今古何異古之樂兮所以化人今之樂兮亦以和民在上下之咸樂豈今昔之殊倫何後何先俱可諧於雅頌一彼一此皆能感於人神原夫惟孟子之謨猷激齊王之思慮惠民之道將進述樂之言斯著以謂昔時搏拊實用洽於羣情此日鏗鏘亦足康於兆庻蓋在乎君臣交㤗民物兹豐和氣旣充於天下德華遂振於域中寔萬邦之所共諒百世之攸同聽此笙鏞曷異聞韶之羙顧兹匏土宛存擊壤之風孰是孰非爰究爰度且何傷於異制但無求於獨樂移風易俗豈惟前聖之所能春誦夏絃寧止古人之有作若乃均和其用調審其音上以象一人之德下以恱萬國之心旣順時而設教孰尊古而卑今六律再推自契伶倫之管五聲未泯何慙虞舜之琴其或政尚滋章民猶勞苦樂雖遵於前代化未暢於率土曷若我咸臻仁壽共樂鍾鼓八風時叙命䕫而不在當年萬舞日新教胄而何湏徃古若然則不假求舊惟聞導和其制也雖因時而少異其音也蓋理心而靡他播兹治世之音無遠弗届較彼先王之樂相去幾何今國家大樂方隆休聲遐𬒳曾不惑於鄭衛自能和於天地舉今古而酌中與英莖而豈異省試自誠而明謂之性賦誠發爲德彰彼天性聖人生禀正命動由至誠發聖德而非習本天性以惟明生而神靈實降五行之秀發於事業克宣三代之英稽中庸之有云仰上聖之莫越性以誠著德由明發其誠也感于乹坤其明也配乎日月我生旣異初郁郁而有融我性在斯終存存而不竭上智不移無爲而爲藴𬒳精醇之志發爲濬哲之資文王之德之純旣由天啓周公之才之美亦自生知故得冠乎人倫立乎聖域所以見至矣之性所以成自然之識究其本也蓋鍾純粹之精及其顯焉乃著文明之德豈不以自誠而明者生而非常自明而誠者學而有方生而德者實兹睿聖學而及者惟彼賢良顔生則自明而臻謂賢人而可擬夫子則自誠而至與天道而彌彰若然則誠之道也旣如此明之道也又如彼蓋殊途而同致亦相湏而成理發乎仁義遂使跋而及之著乎聖神所謂誠則明矣且夫明乃誠之表誠乃明之先存乎誠而正性旣立貫乎明而盛德廼宣有感必通始料乎在心爲志不求而得終知乎受命于天大矣哉考彼格言見兹元聖施爲可覩於君德動靜必遵於天命由至誠而逹至明是爲聖人之性金在鎔賦金在良冶求鑄成器天生至寳時貴良金在鎔之姿可覩從革之用將臨熠耀騰精乍躍洪鑪之内縱橫成器當隨哲匠之心觀其大冶旣陳滿籝斯在俄融融而委質忽曄曄而揚彩英華旣發雙南之價彌高鼓鑄未停百錬之功可待况乎六府㑹昌我禀其剛九牧納貢我稱其良因烈火而變化逐懿範而圎方如令區别妍媸願爲軒鑑儻使削平禍亂請就干將國之寳也有如此者欲致用於君子故假手於良冶時將禁害夏王之鼎可成君或好賢越相之容必寫是知金非工而弗用工非金而曷求觀此鎔金之義得乎爲政之謀君諭冶焉自得化人之旨民爲金也克明從上之由彼以披沙見尋藏山是務一則求之而未顯一則棄之而弗顧曷若動而愈出旣踊躍以求伸用之則行必周流而可鑄羡夫五行之粹三品之英昔麗水而隱晦今躍冶而光亨流形而不縮不盈出乎其類尚象而無小無大動則有成士有鍜錬誠明範圍仁義俟明君之大用感良金而自試居聖人天地之鑪亦庶幾於國器臨川羡魚賦嘉魚可致何羡之有彼何人斯在水之湄謂嘉魚之美矣臨長川而羡之瞻之在前殊有忘筌之意求之不得寜無結網之思徒觀其紋浪不驚錦鱗咸遂或在藻以安性或戯荷而從類但見嬉㳺固難馴致當自適於清流若有待於芳餌在淵㳺泳疑莊叟之夢來依岸噞喁訝平子之書至潑潑晴波在彼中河可以登庖爲籩豆之爼可以昇鼎俟鹽梅之和顧絲緡而則不俯漪漣而柰何凝睇依依控鯉之方安得含情黙黙思鱸之興何多惜矣空拳眷乎頒首止疚懐而肆目自朶頥而爽口幾悔恨於庖無徒諷詠於南有心乎愛矣愧踈破浪之能敏以求之懼速憑河之咎烹鮮尚賖謀之未嘉弗經營於綱網空顧慕於鱨魦非逹士之識矣其愚人之意耶胡不爲施罟之功豈勞彈鋏胡不學投竿之術自取盈車又何必其志營營其圖瑣瑣徘徊乎水澤之畔快悵於泉源之左亦由射雉之子即亡矢以胡爲待兎之人非設罝而奚可然則有爲者必先其器所羡者何止於魚器則可爲詎見力不足者魚或空羡又豈得而食諸在臨事而求巳將觸類而起予五餌不陳釣四夷而莫至三綱不緝羅兆民而則踈至如居人之常爲邦之彦欲髙位而是蹈當崇德而無倦脩天爵而人爵從之何煩徤羡水車賦如歳大旱汝爲霖雨器以象制水以輪濟假一轂汲引之利爲萬頃生成之惠揚清激濁誠運轉而有時救患分災幸周旋於當世有以見天假之年而王無罪歲者也當其東作云布西成以期何密雲不雨兮若焚若灼而大田多稼兮如渴如饑耒耜之功旣至倉箱之望將危豈無陂池抱甕之行曷濟亦有溝洫挈瓶之利胡爲乃有智者樂水而起予梓人治材而和汝謂一漑之可洽俾百兩之斯舉固無傷於濡軌軋軋臨川初有認於埋輪翹翹在渚是車也匪疾匪徐彼水也突如來如補畎畒之不足損谿壑之有餘渤潏騰波忽若刺山之泉湧潺湲去浪漸如澄江之練舒詎見瓶嬴那慙綆短流洋洋兮乍若膏潤苗忻忻兮初如律暖載脂載牽幾通鄭國之渠弗馳弗驅自觧成湯之旱動將勢旋發與機會旣引重之象著亦救焚之功大河水浼浼得我而不滯不凝原田莓莓用我而無災無害仁常汲下智復鈎深于以見因民之利于以見洗物之心若夫大禹之年應資治水必也髙宗之世亦命爲霖至如賢人在輔德施周普五日一風十日一雨則斯車也吾猶不取用天下心爲心賦人主當用天下心矣至明在上無遠弗賔得天下爲心之要示聖王克巳之仁政必順民蕩蕩洽大同之化禮皆從俗熈熈無不獲之人當其治國牧民代天作主敷至治於四海遂羣生於九土以爲肆予一人之意則國必顛危伸爾萬邦之懐則人將鼓舞於是審民之好惡察政之否臧有疾苦必爲之去有災害必爲之防苟誠意從乎億姓則風化行乎八荒如天聽卑兮惟大若水善下兮孰當彼懼煩苛我則崇簡易之道彼患窮夭我則脩富壽之方夫如是則愛將衆同樂與人共德澤浹于民庻仁聲播于雅頌通天下之志靡靡而風從盡萬物之情忻忻而日用豈不以虗巳之謂道適道之謂權下有所欲吾何可専一應萬而誠至寡治衆而功宣堯舜則舎巳從人同底于道桀紂則以人從欲自絶於天必也重乎安危明夫用捨弗凝滯於物我可并包於夷夏賾老氏之旨無欲者觀道妙於域中稽夫子之文虗受者感人和於天下若然則其化也廣其旨也深不以巳欲爲欲而以衆心爲心逹彼群情侔天地之化育洞夫民隱配日月之照臨方今穆穆虗懐巍巍恭巳視以四目而明乎中外聽以四聦而逹乎遠邇噫何以致聖功之然哉從民心而巳矣范文正公集卷第二十, WYG: ''}
