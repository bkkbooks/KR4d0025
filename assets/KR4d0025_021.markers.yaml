  - {type: variant, offset: 138, length: 277, content: 事贈呉秀才依韻和龐殿院見寄依韻和魏介之同逰玉仙壇依韻和介之未開菊依韻酬池州錢綺翁寄題溪口廣慈院第二卷堯舜率天下以仁賦君以民爲體賦六官賦鑄劔㦸爲農器賦任官惟賢材賦從諫如流賦聖人大寳曰位賦賢不家食賦窮神知化賦乾爲金賦王者無外賦第三卷易兼三材賦淡交若水賦飬老乞言賦得地千里不如一賢賦體仁足以長人賦陽禮教讓賦天驥呈才賦稼穡惟寳賦天道益謙賦聖人抱一爲天下式賦政在順民心賦水火不相入而相資賦第四卷十六羅漢因果識見頌序竇諫議録上張侍郎上大名府主王侍郎啓賦林衡鑑序賀胡侍郎致仕知杭州謝兩地啓移蘇州謝兩府謝夏太尉謝賀王啓論西事劄子道服賛釣臺詩送饒州董愽士送徐允升歸九華遺文, WYG: ''}
