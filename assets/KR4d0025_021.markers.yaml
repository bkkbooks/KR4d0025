  - {type: variant, offset: 0, length: 0, content: '', WYG: 賦老人星賦明星有爛萬壽無疆萬壽之靈三辰之英其出也表君之瑞其大也助月之明但仰祥光莫辨皤然之象方資睿算斯埀耄矣之名皇家以大洽雍熈咸臻仁壽感埀象之丕變彰御圖之可乆爰假號於耆年實歸美於元后南郊享處能無鼔缶之歌銀漢經時誰是遊河之友觀夫落落位正熒熒影孤應春秋之候出丙丁之隅視合璧之祥兮未異顧連珠之瑞兮若無象兹黄髮永我鴻圖想天上之宵征寕悲鐘漏顧人間之夕景豈恨桑榆是何上象著明昌時合偶厯數自延於人主名實何慙於國叟月輪遥覩安車之意寕無天駟旁瞻失馬之嗟何有此蓋君著明徳天陳瑞星㑹兹鼎盛薦乃椿齡増芳華於信史協休美於祥經每覩運行如縱心於黄道無差躔次疑尚齒於青㝠足使厯象者考祥占天者改觀掛碧空而的的度清宵而爛爛非時不見如四晧之避秦有道必居若二疏之在漢大矣哉名尊五福位列三光發天文之炳煥符帝徳之悠長北闕前瞻獨呈祥於有爛南山俯映共獻壽於無疆士有仰而賦曰天之象兮示勸君之位兮善建實贊天靈之數允叶華封之願又何必周王之夢九與嵩嶽之呼萬者也老子猶龍賦元聖之徳通變如此昔老氏以觀妙虚極棲真渾元握道樞而不測譬龍徳而彌尊孰可伺珠長存慈儉之寳全疑在沼不離清淨之源宣尼之啟述嘉言發揮至聖謂此真宗之徳若彼時乘之性每去不祥之器劍化同歸常開衆妙之門魚登比盛莫不遺情寵辱放志希夷振淳風而騰驤有便樂上善而游泳無疑所謂性相近也故可則而象之知雄守雌宛訝存身之際絶聖弃智潛疑勿用之時至哲難偕元功莫極知止而過亢何有善行而在田可則彼飛昇於天路此逍遥於聖域流沙西去曽無戰野之虞紫氣東來實有召雲之徳豈不以神龍之舉也其變不窮聖人之道也無幽不通一則致霖雨於天下一則宣教化於區中背偽歸真豈逐葉公之好長生乆視寕資豢氏之功不然又安得深述杳㝠盛稱逹變忘機而沈梭是擬著經而負圖可見宋纎比聖堪為折角之流尹喜依仁自得攀髯之便大道巻舒非龍何如言豹隱者胡能比矣稱虎變者近可方諸我名躋四大之間五靈斯㑹我道配二儀之際三友非疎故能作大匠之宗師闡無為之妙㫖惟尊道而貴徳自反古而復始比於或躍之靈蕩蕩乎其聖如此䝉以養正賦君子能以䝉養其正䝉者處晦而弗曜正者居中而弗羣守晦䝉而靡失養中正而可分處下韜光允謂含章之士居上弃智斯為抱一之君聖人以設彼易文授諸君子考其在䝉之象得此養正之理渾兮若濁下民無得而稱焉闇然而彰聖功亦在其中矣是以不伐其善㒺耀其能惟樸素而是守又濬哲而曷矜故知我者謂我愚不可及不知我者謂我智不足稱務實去華育徳之方斯在反聴收視養恬之義相應故得悔吝不生純和自履隱其明而若昩保其終而如始至賢者孟子在養素而弗違亞聖者顔生信如愚而有以是知䝉正相養聖賢是崇欲求乎不失其正必在乎受之以䝉石藴玉而外質蚌含珠而内融天地何言育物之功潛用龍蛇處蟄存身之道不窮其或謀畫為先聰明自廣不務淳淳而處每思察察而徃則彼䝉也喪乎其真此正也失其所養曷若我知白守黒老氏之教寕忘用晦而明箕子之風不爽至矣哉正之在斯養亦冝其藴道徳而不􅃷豈禍福之能隨志士體之而修身素履無失聖人執之而行化赤子焉知迺有修辭立誠窮理盡性常黙黙以存志将乾乾而希聖庶幾進退之間保君子之中正禮義為器賦崇禮明義斯以為器禮義交舉聖賢是崇既覩化人之要爰彰為器之功修之於身豈晩成而是慮體之於政見日用之無窮前典可稽格言斯啟假其器而宣其教尊其義而貴其禮本於太一寕因雕琢之勞見無不為豈定方圓之體不速而成與世作程于以致滿而不溢于以知用之則行見者之謂智述者之謂明合二美以同歸皆能致用列五常而共乆何患易盈是以化彼邦家器兹禮義其美也混而為一其設也分而為二助政教而可大貫古今而不墜宣尼始問於周史雅契求新晋文首定於襄王允符先利豈不以為君之柄也非禮何持立人之道也惟義是資居上而不我遐棄化下而何莫由斯有之則安在傾敧而莫覩聞而能徙信用捨以從宜是知彼器也利乃生民此器也歸諸君子蓋用之而可資故喻之而有以察其無體可忘尚象之言執以衛身詎有假人之恥念兹在兹無為而為但守執虚之戒難忘持滿之規安上治民寕使乎小人乘矣見危致命豈惟乎長子主之今國家稽古不忘宣風遐被其禮也同二儀之節其義也正四方之志覆萬國而無疆通大道之不器今樂猶古樂賦民庶同樂今古何異古之樂兮所以化民今之樂兮亦以和民在上下之咸樂豈今昔之殊倫何後何先俱可諧於雅頌一彼一此皆能感於人神原夫惟孟子之謨猷激齊王之思慮恵民之道将進述樂之言斯著以謂昔時摶拊實用洽於羣情此日鏗鏘亦足康於兆庶蓋在乎君臣交泰民物兹豐和氣既充於天下徳華遂振於域中實萬邦之所共諒百世之攸同聴此笙鏞曷異聞韶之美顧兹匏土宛存撃壤之風孰是孰非爰究爰度且何傷於異制但無求於獨樂移風易俗豈惟前聖之所能春誦夏絃寕止古人之有作若乃均和其用調審其音上以象一人之徳下以悦萬國之心既順時而設教孰尊古而卑今六律冄推自契伶倫之管五聲未泯何慙虞舜之琴其或政尚滋章民猶勞苦樂雖遵於前代化未暢於率土曷若我咸臻仁壽共樂鐘鼓八風時叙命虁而不在當年萬舞日新教胄而何須徃古若然則不暇求舊惟聞導和其制也雖因時而少異其音也蓋理心而靡他播兹治世之音無逺弗屆較彼先王之樂相去幾何今國家大樂方隆休聲遐被曽不惑於鄭衛自能和於天地舉今古而酌中與英莖而豈異省試自誠而明謂之性賦誠發為徳彰彼天性聖人生禀正命動由至誠發聖徳而非習本天性以惟明生而神靈實降五行之秀發於事業克宣三代之英稽中庸之有云仰上聖之莫越性以誠著徳由明發其誠也感於乾坤其明也配乎日月我生既異初郁郁而有融我性在斯終存存而不竭上智不移無為而為藴彼精醇之志發為濬哲之資文王之徳之純既由天啟周公之才之美亦自生知故得冠乎人倫立乎聖域所以見至矣之性所以成自然之誠究其本也蓋鍾純粹之精及其顯焉乃著文明之徳豈不以自誠而明者生而非常自明而誠者學而有方生而徳者實兹睿聖學而及者惟彼賢良顔生則自明而臻謂賢人而可擬夫子則自誠而至與天道而彌彰若然則誠之道也既如此明之道也又如彼蓋殊途而同致亦相須而成理發乎仁義遂使跂而及之著乎聖神所謂誠則明矣且夫明乃誠之表誠乃明之先存乎誠而正性既立貫乎明而盛徳乃宣有感必通始料乎在心為志不求而得終知乎受命于天大矣哉考彼格言見兹元聖施為可覩於君徳動靜必遵於天命由至誠而逹至明是為聖人之性金在鎔賦金在良冶求鑄成器天生至寳時貴良金在鎔之姿可覩從革之用将臨熠耀騰精乍躍洪鑪之内縱横成器當隨哲匠之心觀其大冶既陳滿籯斯在俄融融而委質忽煜煜而揚彩英華既發雙南之價彌高鼓鑄未停百鍊之功可待况乎六府㑹昌我禀其剛九牧納貢我稱其良因烈火而變化逐懿範而圓方如令區别妍􅑦願為軒鑑儻使削平禍亂請就干将國之寳也有如此者欲致用於君子故假手於良冶時将禁害夏王之鼎可成君或好賢越相之容必冩是知金非工而不用工非金而曷求觀此鎔金之義得乎為政之謀君諭冶焉自得化人之㫖民為金也克明從上之由彼以披沙見尋藏山是務一則求之而未顯一則棄之而弗顧曷若動而愈出既踴躍以求伸用之則行必周流而可鑄羡夫五行之粹三品之英昔麗水而隱晦今躍冶而光亨流形而不縮不盈出乎其類尚象而無小無大動則有成士有鍛鍊誠明範圍仁義俟明君之大用感良金而自試居聖人天地之鑪亦庻幾於國器臨川羡魚賦嘉魚可致何羡之有彼何人斯在水之湄謂嘉魚之美矣臨長川而羡之瞻之在前殊有忘筌之意求之不得寕無結網之思徒觀其紋浪不驚錦鱗咸遂或在藻以安性或戲荷而從類但見嬉游固難馴致常自適於清流若有待於芳餌在淵游泳疑荘叟之夢來依岸噞喁訝平子之書至潑潑晴波在彼中河可以登庖為籩豆之俎可以昇鼎俟鹽梅之和顧絲緡而則不俯漪漣而奈何凝睇依依控鯉之方安得含情黙黙思鱸之興何多惜矣空拳眷乎頒首止疚懐而肆目自朶頥而爽口幾悔恨於包無徒諷詠於南有心乎愛矣愧疎破浪之能敏以求之懼速馮河之咎謀之未喜烹鮮尚賖弗經營於綱網空顧慕於鱨魦非逹士之識矣其愚人之意耶胡不為施罟之功豈勞彈鋏胡不學投竿之術自取盈車又何必其志營營其圖瑣瑣徘徊乎水澤之畔怏悵於泉源之左亦由射雉之子即亡矢以胡為待兔之人非設罝而奚可然則有為者必先其器所羡者何止於魚器則可為詎見力不足者魚或空羡又豈得而食諸在臨事而求已将觸類而起予五餌不陳釣四夷而莫至三綱不緝羅兆民而則疎至如居人之常為邦之彦欲高位而是蹈當崇徳而無倦修天爵而人爵從之何煩健羡水車賦如嵗大旱汝為霖雨器以象制水以輪濟假一轂汲引之利為萬頃生成之恵揚清激濁誠運轉而有時救患分災幸周旋於當世有以見天假之年而王無罪嵗者也當其東作云布西成以期何密雲不雨兮若焚若灼而大田多稼兮如渇如飢耒耜之功既至倉箱之望将危豈無陂池抱甕之行曷濟亦有溝洫挈瓶之利胡為乃有智者樂水而起予梓人治材而和汝謂一溉之可洽俾百兩之斯舉因無傷於濡軌軋軋臨川初有認於埋輪翹翹在渚是車也匪疾匪徐彼水也突如來如補􅅵畝之不足損溪壑之有餘渤潏騰波忽若刺山之泉湧潺湲去浪漸如澄江之練舒詎見瓶羸那慙綆短流洋洋兮乍若膏潤苖忻忻兮初如律暖載脂載牽幾通鄭國之渠弗馳弗驅自解成湯之旱動将勢旋發與機㑹既引重之象著亦救焚之功大河水浼浼得我而不滯不凝原田每每用我而無災無害仁常汲下智復鈎深于以見因民之利于以見洗物之心若夫大禹之年應資治水必也高宗之世亦命為霖至如賢人在輔徳施周普五日一風十日一雨則斯車也吾猶不取用天下心為心賦人主當用天下心矣至明在上無逺弗賔得天下為心之要示聖王克已之仁政必順民蕩蕩洽大同之化禮皆從俗熙熙無不獲之人當其治國牧民代天作主敷至治於四海遂羣生於九土以為肆予一人之意則國必顛危伸爾萬邦之懐則人将鼓舞於是審民之好惡察政之否臧有疾苦必為之去有災害必為之防苟誠意從乎億姓則風化行乎八荒如天聴卑兮惟大若水善下兮孰當彼懼煩苛我則崇簡易之道彼患窮夭我則修富壽之方夫如是則愛将衆同樂與人共徳澤浹于民庻仁聲播于雅頌通天下之志靡靡而風從盡萬物之情忻忻而日用豈不以虚已之謂道適道之謂權下有所欲吾何可專一應萬而誠至寡治衆而功宣堯舜則舍已從人同底于道桀紂則以人從欲自絶於天必也重乎安危明夫用捨弗凝滯於物我可并包於夷夏賾老氏之㫖無欲者觀妙道於域中稽夫子之文虚受者感人和於天下若然則其化也廣其㫖也深不以已欲為欲而以衆心為心逹彼羣情侔天地之化育洞夫民隱配日月之照臨方今穆穆虛懐巍巍恭已視以四目而明乎中外聴以四聰而逹乎逺邇噫何以致聖功之然哉從民心而已矣}
