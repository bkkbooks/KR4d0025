  - {type: variant, offset: 112, length: 3195, content: 人者人傑也時雖未盡了則巳私識之矣嘉祐二年始舉進士至京師則范公没旣塟而墓碑出讀之至流涕曰吾得其爲人蓋十有五年而不一見其靣豈非命也歟是歳登第始見知于歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相尭夫又六年始見其叔彛叟京師又十一年遂與其季德孺同僚于徐皆一見如舊且以公之遺藁見屬爲叙又十三年乃克爲之嗚呼公之功德蓋不待文而顯其文亦不待叙而傳然不敢辭者自以八歲知敬愛公今四十七年矣彼三傑者皆得從之㳺而公獨不識以爲平生之恨若獲挂名其文字中以自託於門下士之末豈非疇昔之願也哉古之君子知伊尹太公管仲樂毅之流其王覇之畧皆定於畎畆中非仕而後學者也淮隂侯見高皇帝于漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主筞曹操孫權䂓取劉璋因蜀之資以争天下終身不易其言此豈囗傳耳受嘗試爲之而僥倖其或成者哉公在天聖中居大夫人憂巳有憂天下致太平之意故爲萬言書以遺宰相天下傳誦至用爲將擢爲執政考其平生所爲無出此書者今其集二十卷爲詩賦二百六十八爲文一百六十五其於仁義禮樂忠信孝悌蓋如飢渇之於飲食欲湏臾忘而不可得如火之熱如水之濕蓋其天性有不得不然者雖弄翰戯語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非有言也德之發於囗者也又曰我戰則克祭則受福非能戰也德之見於怒者也元祐四年四月二十一日龍圖閣學士朝奉郎新知杭州軍州事蘇軾叙范文正公集目録後學時兆文校正後學黄姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校第一卷古賦明堂賦秋香亭賦靈烏賦古詩謝黃惣太慱見示文集四民詩寄題孫氏碧鮮亭贈張先生明月謡上漢謡清風謡書海陵滕從事文㑹堂上都行送張伯玉鳴琴駲鷗詠古鑑贈樊秀才贈碁者歳寒堂三題贈都下隱者第二卷古詩和人遊嵩山十二題聽真上人琴歌和僧長吉湖居五題酬葉道卿學士見寄和章岷從事鬪茶歌和葛閎寺丞接花歌天平山白雲泉留題常熟頂山僧居江上漁者送蔡挺代父之蜀鄱陽酬泉州曹使君見寄和謝希深學士見寄廬山瀑布滕子京魏介之二同年相訪丹陽郡送劉牧推官之兖州和楊畋孤琴詠絳州園池晉祠泉訪陜郊魏踈處士中元夜百花洲作覽秀亭詩祠風師酬提刑趙學士見貽依韻和安陸孫司諫見寄依韻鄉尉黃通依韻和襄陽王源叔龍圖見寄依韻答賈黯監丞賀雪依韻答提刑張太愽嘗新醖寄題峴山羊公祠堂送河東提刑張太愽依韻和提刑太愽嘉雪送謝景初延評宰餘姚閱古堂詩第三卷律詩睢陽學舎書懐詠史五首次韻和劉䕫判官對雪河朔吟和黃揔太愽上知郡杜少卿過太清宫寄餘杭全安石叚少連二從事送江南運使張傳度支堯廟西溪見牡丹寄秦州幕明化基寺丞鵰鶚在秋天觀獵鸚鵡歸鴈青郊射陽湖舟中寄歐靜秀才和韓布殿丞三首送識上人逰金山寺野色雜詠四首書事呈韓布殿丞西溪書事得李四宗易書歐伯起相訪寄贈林逋處士酬滕子京同年贈餘杭唐異處士和沈書記同訪林處士諸曁道中作題翠峯院與人約訪林處士阻雨因寄寄西湖林處士越上聞子規送李紘殿院赴闕送邢昻處士南逰送丁司理赴明州送鄞江竇尉送常熟錢尉試筆送真元二上人歸呉中寄題許州錢相公信羙亭送何白節推宰晉原二首送刁紡戸掾太常下第憶杭州西湖寄林處士依韻酬母湜推官送石曼卿送何渉秀才八月十四夜月送吳安道學士知崇州謫守睦州作赴桐廬郡淮上遇風三首送韓瀆殿院出守岳陽出守桐廬道中十絶蕭洒桐廬郡十絶新定感興五首遊烏龍山寺江干閑望和章岷推官同登承天寺竹閣齋中偶書留題江秀才舊居依韻酬周騤太愽同年依韻答胡侍郎見寄桐廬郡齋書事留題方干處士舊居第四卷律詩依韻酬章推官見贈蘇州十詠依韻奉酬晏尚書見贈又用前韻謝晏尚書以近著示及陳質殿丞挽歌詞送僧文光依韻酬府判龎醇之見贈依韻酬呉安道學士見贈依韻呉春卿二首應制賞花釣魚過餘杭白塔寺西湖筵上贈胡侍郎江城對月送向綜國博通判桂州芝山寺昇上人碧雲軒郡齋即事同年魏介之㑹上作依韻酬黃灝秀才贈鍾道士道士程用之爲余傳神因題送魏介之江西提點遊廬山作瀑布贈廣宣大師移丹陽郡先遊茅山作贈茅山張道者京囗即事懐慶朔堂依韻酬葉道卿中秋對月二首贈葉少卿依韻答梁堅運判見寄城大順廻道中作依韻和延安龐龍圖桞湖和延安龐龍圖寄岳陽滕同年與張燾太愽行忻代間因話江山作過長安醉别資政鄭侍郎依韻酬光化李簡夫屯田依韻酬太傅張相公見贈依韻酬益利鈐轄馬端左藏依韻酬邠州通判王稷太博依韻酬李光化見寄寄安素高處士酬李光化見寄二首依韻酬李光化叙懷和李光化秋詠四首送黃灝員外和幷州大資政鄭侍郎秋晩書事和提刑趙學士探梅三絶和太傅鄧公歸遊武當見寄即席呈太傅相公紀送太傅相公歸闕依韻和提刑張太傅寄梅又和賞梅依韻答王源叔憶百花洲見寄獻百花洲圖上陳州晏相公依韻答青州冨資政見寄依韻答并州鄭大資見寄過陳州上晏相公和運使舎人觀潮二首依韻和蘇州蔣密學依韻和孫之翰對雪依韻和并州鄭宣徽見寄二首依韻答蔣密學見寄依韻和同年朱兵部王賔客交贈之什登表海樓石子澗二首依韻答韓侍御謝栁太愽惠鶴知府孫學士見示和終南監