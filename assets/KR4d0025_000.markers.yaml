  - {type: variant, offset: 0, length: 111, content: 范文正公集叙慶曆三年軾始緫角入鄕校士有自京師來者以魯人石守道所作慶曆聖德詩示鄕先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何爲其不可先生竒軾言盡以告之且曰韓范富歐陽此, WYG: ''}
