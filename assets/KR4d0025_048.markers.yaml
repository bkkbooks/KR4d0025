  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4d0025_krp_048-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_048-1a01}
  - {type: variant, offset: 0, length: 1181, content: 遺文文正忠宣父子諸公道德充積於中著於勲業見于文章其片言隻字皆有裨於治道世教非若世之文士徒枝詞琢句務爲工而巳故今於諸公之文雖有數語亦必記録使人知范氏之不朽者盖在於穆叔之所謂立言而非宣子之所謂世禄云與中書論責劉琦事忠宣公今日忽聞詔命以臺官劉琦等言多失實事輙近名擅去官曹䂓喧朝聽各落御史降充監當者聞命之際中外震驚盖人臣以率職爲忠人君以納諫爲美是以仁宗開言路優容諍臣執政不敢任情小人不能害政以致太平日久億兆乂寕先帝容納直言未嘗變色是時呂誨等與純仁爲御史亦嘗擅納告身皆蒙慰諭主上思紹先烈而因二三執政不能以道致君敎化或失其後先刑賞或乖於輕重中書蔵其本末但致外議喧騰凡居言責之臣敢不即時論奏旣許風聞言事即是過失得陳而柄臣遂捃摭其罪主上將何所頼且叅政以文學自負議論得君專任巳能不曉時事而又性類率易輕信難囘舉意發言自謂中理欲求並切忘其舊學捨堯舜知人安民之道講五伯富國之術尚法令則稱啇鞅言財利則背孟軻鄙老成爲因循之徒棄公論爲流俗之語異巳者指爲不肖合意者即謂賢能所以薦薜向爲周才指呂誨爲無用主上無從諌之美時政有揠苗之憂曾相公年高不退㢘節道虧但欲見容雷同苟且舊好拘文守法今則一切依隨趙叅政心知其非而辤辯不及凡事不能力救徒聞退有後言此皆朝廷大臣所爲安得政令無失按此篇亦見言行録中但彼以爲上神宗而此以爲與中書兼詞語亦多不同故重出之論王覿不當責䟽忠宣公陛下臨御以來未嘗嚴責諌臣一旦行之恐傷仁化又慮來者或多各一一竄逐浸失朝廷淸淨之體所有先降貶責王覿文字臣未敢簽書若陛下決以臣言無取乞謫臣𥙷外臣雖一身斥逺若遂決朝廷大疑則是猶有所補不辜柬㧞則死之日猶生之年王氏語録序忠宣公先生名伋字孔章希逸子其號也自唐中葉世司天文能先見藝祖祚曆之象者先生之世祖也族居京師有年矣以議金鷄曆出江西故先生爲江西人明經取青紫佐雍熈者先生之志也不幸試南宫偶遺乃藴所學以紹箕裘交逰中有以功名勉之者則曰植黨蔽賢象數巳著吾人苟獲漏網亦幸矣未幾王介甫出焉朝野咸服其明嘗病卜相之術雖可與醫同試見效然於人事不加損益醫與營居送死雖皆爲通世之術然禍福詭誕非若卜相者之有稽驗因考諸左傳著書五篇折衷隂陽使與儒家不相角立曉迷釋惑俞爲有力異乎太史公所謂流者逺矣又有醫書二十四卷行于世此又可以見先生之博物也一日葉叔亮集其語録以示丹陽叟嘉其純正不爽時譽出處之節無愧古人因援筆以書左界焉叟謂誰范其姓純仁名堯夫字先生故人也議太廟增室事云書曰七世之廟可以觀德則禮記謂天子七廟三昭三穆與太祖之廟而七也盖七世㝎於廟數之中不縁所事之人所謂有天下者事七世云者特因廣數以經禮言之也國朝自禧祖而下至仁宗始備七世故英宗祔廟則延順祖神宗祔廟則遷翼祖三昭三穆合於典禮今來太行皇帝於神宗父子也如禮官所議更增一室則廟中當有八世四昭三穆考於典禮未有合者况唐文宗即位則遷肅宗以敬宗爲一世故事不逺在後無違將來大行皇帝祔廟當以神宗爲昭上遷宣祖以合古三昭三穆之義恭獻公議南郊合祭云南郊合祭天, WYG: ''}
