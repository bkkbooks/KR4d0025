  - {type: variant, offset: 1180, length: 5022, content: 不見於經神宗皇帝攷援古誼詔罷合祭元豊六年止祀昊天上帝於圎丘唯是北郊先帝未及躬行然詔㫖明甚所宜遵守者也又言春爲陽故以正月迎於東郊秋爲隂故以七月迎於西郊聖人有作莫之能改也今使迎春則在西郊而用秋之時迎秋則在東郊而用春之時樵夫野叟猶恠以駭而况於鬼神乎天之與人非有異也今應祭方澤也而合於圎丘用夏至也而用冬至益何以異此合祭肇於漢末其言不經朝廷近制考之方䇿告之宗廟行之天地布之天下以憲萬世或委聖言而從不經不可也龍圖苑純粹論西事當改圖云元祐六年九月奏准樞宻院劄子夏國旣失恭順又復巳絶恩必湏輕忿日以擾邊爲計更湏别圗方略元祐以來朝廷之所以御夏人處邊畫者莫非以禮義爲本以恩信爲先一切容貸期于息兵然六七年間戍兵之卒未嘗减罷金榖之費未嘗省羡備禦之計未嘗簡㢮耳且彼所求我必與之不知真足以厭其所欲不爲它日之患乎夫要害之地濟無厭之求虧國體勢堕賊計謀養虎開端不可不謹臣願並以元頒詔書從事如其偃蹇置而不問戒飭吏嚴備如昔希㓛造事固所不可護邊待敵宜無甚難以區區内亂之小羗尚能與中國久抗乎以歳月决可竟事在朝廷不惑而已又論熈延與夏國所畫封疆事云臣聞熈延兩路與夏國所畫封疆至今未决外議謂朝廷務在息兵失于欲速故强㓂要索日益滋彰雖聖朝懐來四夷固爲上策若邊臣不究利害但務委随則國體事機不無虧失自二聖臨御之始夏人來朝繼秉常訃至乹順自立使者係道徃返五六賈販貿易随巳豊富雖脩甚恭盖亦爲自資之計耳朝廷即遣使徃加封冊欲速之意爲賊所窺果聞侮慢使人不即稱謝興兵入㓂延渭破殘反覆不恭宜在殊絶後日復有所請但可只委邊臣謂之要約示以閑暇使之望望然惟恐拒而不納則輕重之權在我事旣審决邊臣始以謝罪請盟之狀聞于朝廷然後明詔中外貸彼旣徃之罪聽其乞盟之請歸吾䧟賊之人賜汝旣許之地如是則朝廷之體豈不甚尊而制㓂之䇿豈不甚簡歟昨不爲此計聞其有請卽許造朝使人旣至朝廷酬對寕不知皆廟堂謀臣之言乎是顧接太重許可太輕旣許以䧟虜之衆易新造之壘人有品色多寡之異地有形執遠邇之差約當素明謀當素㝎皆著于書然後受人割地交相付與則彼尚何所能爲乎今謀約不素明定彼以疲殘百餘人塞責而來我乃不復較問亟以四壘付之四壘即付即以平轍熈延二境始議畫疆顧不晚乎先巳然者固不可追今可爲者審究徐圖尚未晚也如聞夏賊於塞門金城之城重有邀求又聲言與西鄰爲合從之謀將以重我外議謂朝廷不以爲重而輕棄之信如是則欲速巳甚矣朝廷所以謂金城塞門爲不可棄者非以兩孤壘之爲利也謂其形勢險阻足以藩籬邊􅗲土田沃壤足以贍給邊兵也故不在賜給之限今乃欲局目前之小休棄形勢之要地舎數千戸已耕之土㫁數百里斥候之衝屏蔽無餘出門過敵道路梗澁運餉艱虞孤壘僅存我將安用詔旨不與之地徒虗名耳彼乃愈益猖狂邊患滋甚固宜朝廷之改圗也聞梁乙逋用事之久元祐二年三㓂涇原而漢兵十一將拱手城中不出一騎使席卷而歸後乃悉得前後所積歳賜金帛每語人曰嵬名家人管國事有此功否我之所以連年點兵者欲使朝廷憚我而爲國人求罷兵耳昔元昊叛時雖數遣人求和而故爲悖慢難從之議朝廷旣不從則語衆曰我求罷兵而南朝不許用此以歸怨激衆衆戰咸力乙逋今乃効之今朝廷旣議貶絶宜作邊帥草檄以淺近易曉之言具道乙逋無厭犯順之詳朝廷用兵于不得巳之意令諸路多作木印棄于賊疆不惟可以伐狃衆怨之謀又足以激怒其衆使知禍自梁氏始庶有衆怨親叛之理朝㫖但欲使近邊之人不能著業臣巳謂未足繫彼國之要害使一國之衆奔命不暇而莫知所俻斯可矣欲如是當令諸路帥臣公心叶力謀議相関一路將有所舉則諸路陽爲點集出兵之勢以留對境之備則實出路分賊無併兵拒敵之患諸路更守迭出則彼所備者勢分而力勞矣又自來諸路多招納降人自元豐以來諸路所納不爲不多若謂可以耗彼力戰之人則夏賊舉必數十萬豈招降之可耗也若謂可以助戰縁降人出入將帥豈敢全然倚仗計口給食坐耗邊榖借有地土可給亦妨占弓箭手請射之田其間仍多姦細緩急漢界有所舉動則猝然逸去致漏機事有害無益將求漢兵迭出宜悉止絶以清久弊朝廷如果令諸路互岀銳兵撓賊當宻戒諸路帥臣每有所舉不用過爲祕宻略使兵聲先出勢若大舉使彼衆得以逺避我鋒然後出偏師以信其聲則其誰敢當要使數百里野無得耕之土衆無休息之期而巳又申嚴博易之法以絶市貨則困賊之䇿在其中矣是不待多殺而爲利也又乞脩明元頒戰守約束云國之所以前坐制西夏者誠由連城北帥並統重兵利害相同左右相援首尾相副聲勢相接心一而力同氣逺而勢重如一身之有手足上下交相爲用而無有偏廢此我之所長而彼之所畏者也昔寳元康㝎用武之時先臣仲淹嘗統兵徃援隣道破元昊長驅深入之謀救涇原屢衂可憂之患見於巳試理勢灼然朝廷後來叅定戰守紂束頒降諸路實用其䇿非因徐禧計議邊事輕有改張遵行之初自罹其害盖兵家張耀聲勢左牽右制古所不廢固未聞兵寡兵乏不假聲援而能獨勝者也今邊事未平虜情難測伏望朝廷深賜詳度撿㑹臣前奏及元頒戰守約束再如脩明又奏荅訪問所問邊防機事云准詔諸路探報自秉常身死梁氏族人侵擅國事遂致諸部酋豪徃徃不服變亂交攻日相屠害若有投來西人仰相度可否收留仍更切厚與賞物募人逺探目今邊情向去利害縷細詳䆒措置聞奏臣除巳依朝名施行外伏詳詔旨所問邊防機事而繫中外安危之本者如臣之愚顧何足以語此臣早膺使任久在邊􅗲採摭審料在朝廷正宜安不妄動用觀成敗之變息兵止殺重農務本太平之迹始於今日尚何此䇿之議哉彼之部酋若有以梁氏之禍來告者若請兵于朝者若㨿地而願附者若挺身以降者朝廷使邊臣諭之曰若主不幸爾乃臣子當盡死節之義善爲若主討賊而巳尚何來告耶何但欲脫身而内附耶我之邊兵方備他盗不爲爾捕㓂也臣觀戎狄之性以種族爲貴賤故部酋之死其後世之繼􅊞者雖雛稚之子亦足以服老長之衆秉常父子有國緜久國人歸心今諸路諜者之言雖曰秉常之死不明梁氏之族侵擅國事若謂遂能㓕李氏之宗而有其國則臣未之信也盖一國之衆豈無豪傑推李氏族子以主其國者乎豈遂甘心爲梁氏子臣属乎又奏乞那差將兵云紹聖二年呂大忠乞赴闕願早降指揮始朝廷劄下熈河范純粹預行措置建汝遮堡有如脩建定逺城之類機便行以乘伺間隙脩建之時即趂時併功興役伏奉指揮昨脩㝎遠城下除本路將兵盡數調發照應防托外更蒙朝廷指揮下秦鳯路那將兵三二萬於通渭砦側近擇利駐劄照應萬一西賊犯境於夲路將兵共力枝梧及下涇原環慶路各於本差定兵將頒及萬人巳上沿邊擇利駐劄大張聲勢使賊疑懼不敢併於一路作過將來萬一遂舉汝遮之役除本路兵馬斟量調發防托外乞朝廷預降指揮下秦鳯涇原環慶路經略司各令宻切依昨來脩定逺城例差那將兵預作准俻候見夲司関報即於逐處沿邊駐劄照應貼黄稱仍乞下逐路帥臣别以他事爲名宻切爲備雖弟子官属並不得預聞庶無漏落又奏蕃官李忠傑等事云准樞宻院劄子蕃官包順包誠李忠傑趙懐義趙永夀許時暫赴闕臣赴任之𥘉准朝旨體探招納邈川河南人戸等盖自范育在夲路日曽有遣納趙嗣忠之議又种誼還自京師昌言𬒳旨招納縁日有阿里骨般次買賣向者謀議不容不知今醇忠之子𬒳召恐多猜疑於臣所放機事有害兼懐義永夀資才無可取未敢遣赴闕并免與功多蕃官别有形迹及李忠傑見體量將入界捉來首領却送過天都等事臣輙從宜將行出文字節去李忠傑趙懐義趙永夀姓名止將包順包誠差使臣押伴赴闕其包順包誠今來朝見如欲示旌勸只乞賜與金帛願留官爵差遣以責來效及乞不以邈川河南情僞詢訪逐人恐有漏泄詔阿里骨見差般次赴闕進貢所有前後經營青唐指揮更不施行李忠傑三人别聽朝旨其體量李忠傑事狀如無顯迹即不得少有枝蔓漏落致使危疑不安又奏牽制西夏事云牽制之要當於平日先探知彼界人戸團聚虗實之所遇事决䇿前去指其巢穴攻其必救則解圍制㓂不致虗發縁諸路帥司所出牽制之兵止於一路而賊之大衆勢必十倍旣衆寡不敵則牽制兵馬所行分須與賊兵聲勢相逺彼犯我東我岀彼西進退之際不相逢迎庶無取困之慮今熈河秦鳳路地如犬牙兼秦鳳一路止有雞川兩寨之地係有邊面受敵之處若西賊舉衆欲秦鳳兩寨須經由看都川淺井川羅和市一帶山谷分頭南來此外更無他路如此則賊兵未至秦鳳巳先逼近本路通逺軍通渭砦一帶邊靣地形道路披圗可見除通逺軍蕃漢兩將人馬自須戒嚴以防侵軼不惟難以内自空虗引兵它岀外所有熈河蘭岷等處漢兵蕃馬雖是可用縁本路對境惟東北天都山南牟㑹打繩川剉子一帶方是西界人戸團聚住坐之所指此而進即行兵之路却須自看都川淺井川羅和市或石硤子等處結陣前去乃在賊兵歸路之外聲勢甚逼彼雖巳犯秦鳳若探知本路兵行不逺必是引衆而還遂出我師之後即見我之歸路立見梗絕甚非安全之計盖本路在夏國西南極盡之處除天都等處路與賊迫近不可經畫外捨天都而西即全無人戸住坐如蘭州正北屢經漢兵討蕩具見的實决雖無利可乘恐徒有塞命之名枉致勞弊以此推較盖諸路地形逺近不同而夏人團聚居止䟱宻有異故攻取便利理難一體本司今相度除賊㓂河東鄜延環慶如探得天都一帶别無大叚人馬㑹聚本路可以出兵牽制外如西賊併兵㓂犯秦鳳路即本路兵馬止可於白城谷災竿堡左右照應相度賊勢覔便攻擊或㑹合秦鳳之兵共力掩殺如此則兩路兵勢相合賊必不敢爲深入持久之計所貴不失機便伏縁今降朝㫖㝎夲路不許策應只令牽制有此利害深慮緩急申請不及伏乞朝廷更賜詳酌指撝貼黃熈秦路兩旣相隣接則形勢一同今秦鳯之於熈河旣不可牽制只可䇿應即熈河之於秦鳳利害不殊並乞驗㑹本路前後所供對境圗籍即見逐地名道路形勢利害牽制䇿應之法中間乆廢因臣在環慶累曾論列方蒙朝㫖下諸路頒行臣等曾預先探知西界人戸團聚之所後因賊犯鎮戎係在涇原西北與環慶相去三百餘里臣曾搗虗破賊於曲六律掌俘馘甚多遂解鎮戎之圍比其歸護巢穴則我師還塞方纔一日僅免阻扼轉戰之患是時若賊勢稍相附近即歸師難保伏乞朝廷更賜照察又奏分兵守汝遮云樞宻院撿會巳降朝㫖下熈河蘭岷路乗機㑹脩築汝遮去訖近節次據本司奏乞脩展蘭州西城及㝎西㝎逺城雖巳各降指揮依奏三處所用功役萬數不少慮夲路於脩建汝遮有所窺避將來以此爲名致失機㑹昨者本以三處城圍全闕增展或見今人馬暴露或緩急矢石交通無計保民日憂招冦念汝遮大役旣須候可乘之機則廂兵數千不當廢他壘之用兼汝遮役所地里非遥候其進築有期立可移兵前去愚慮偶尔及此於理合具奏心實無他事属兩便臣所以且以脩築蘭川㝎西定逺爲名分擘役兵前去使衆人明見逐處興作庶解夏人之疑比至汝遮有機可乘則役兵皆在隣近委實安便又奏蕃官改姓云契勘本路蕃官自來有因歸順或立戰功朝廷特賜姓名以示旌寵如嵬名山爲趙懐順朱令唆爲朱保忠是也後有蕃官無故自陳乞改姓名經畧司不止遏㨿狀申解省部亦無問難遂改作漢姓如乙格爲白守忠兀乞爲羅信是也亦有不曾陳乞衷私擅自改作漢姓如盧唆之子爲周俊明是也見今更有蕃官扳援陳乞無故自便衷私撰改漢姓竊詳古者賜姓氏者皆朝廷所以酬功德别忠勤也今反使夷狄醜類無故自易姓名混襍華人若年歳稍逺則夲源汨亂無由考究漢蕃弗辨非所以尊中國而别異類也欲乞諸路蕃族除係朝廷特旌寵賜與姓名外即不許陳乞改作漢姓有今日不因朝廷賜姓之人並行追改各依舊如允所奏只乞作朝廷訪聞立法行下又論交移生口事云樞宻院言環慶路將兵與夏人戰俘馘老幼婦女范純粹選留仍揭榜喻其親族以舊掠漢人對易其引導者人賞以絹三匹十歲巳下二匹交換生口若施之於講和罷兵之時則名體俱順無所不可縁夏國方爾悖慢興師盗邊在朝廷宜明示棄絶戒諸路邊臣整兵聽命或間岀竒兵使其應敵不暇或擾彼農事使其地不得耕或反間用權或旁行招納必使彼衆勞厭人意動摇則其凶酋必使改輙然後邊釁可期於止息也若於此時便議將生口與之交換即恐體勢不重有害事機㢘訪聞得西界凡是捉虜到漢界人口並一一赴衙頭呈納多是於近裏去虜監防覊管今來本路所獲老小人口止是橫山一帶人戶縱有逐家骨肉丁壯願遵朝命亦何縁於近裏取得覊管之人前來交易以此推之恐徒有輕動必無實利又論洽平兵馬與今不同元祐三年癸亥詔以治平臣僚所上互進方略授逐路帥臣講求困賊之䇿切詳治平年兵馬數目以至將佐頭項遣應次第即與目今全然不同臣仰悉朝㫖大意而巳使西賊於逐路山界各有所畏分兵待敵不敢併兵一路則我計方行邊機難以預㝎貴在臨時處决即先事無可預陳所有准備西賊互有酬賽防庇邊民一節即不異見今俻㓂之策又奏乞訪問州縣闕食去處云臣訪聞得夲路州縣民間甚有闕食去處及逃過主客人戶數目不少盖縁累年不熟又自軍興以後調發顧卒凋弊爲甚而保結團敎之法方此推行兼民間以邊事未平妄意私憂加之向春闕食遂此流散深慮関陜根本益致殘弊所繫不輕如蒙施行只乞作朝廷訪聞内賜指揮又奏乞勞賞曰珎昔年雖有隣路牽制應援之法多是兵將官不務公心不以隣路𬒳冦爲巳職或量以少少軍馬或故爲迃逺備禮塞命遂致永樂之禍臣自領漕関中至忝今任累累論列三年間方蒙朝廷㝎議再立牽援之制昨來九月𥘉五日晚得涇原路報賊公牒臣於是特遣委曲珎巳下點兵束裝翌日長驅出境外三百餘里大破賊巢賊衆到漢界三數日觧而去者珎之功也今來受指揮臣並未敢輙以語人欲望聖慈只遣近下使臣依涇原例就慶州勞問出界將官曲珎巳下支押賜合得銀合茶藥見朝廷勸賞不忘功之意在朝廷無所增費而於本路士氣足以激勵稍厭人情不爲小補遺文終, WYG: ''}
