  - {type: variant, offset: 0, length: 1, content: 文, WYG: ''}
  - {type: variant, offset: 2, length: 232, content: 公尺牘目録卷上家書中舎十六帖忠宣公一呫九國愽一帖中書二子三監簿四太祝二帖朱氏十五帖指使魏佑一帖卷中與韓魏公共三十一帖卷下交游晏尚書三帖邵餗先生一帖諌院郭舎人一帖王狀元一帖石曼卿一帖曹都官一帖孫元䂓一帖孫明復一帖滕子京一帖李太白四帖張文定二帖陳水部一帖謝屯田二帖戚寺丞四帖知府太卿二帖蔡欽聖二帖工部同年二帖南陽著作一帖知郡職方三帖安撫内翰一帖翰長學士二帖安撫太保三帖李節推一帖通理虞部一帖仲儀待制三帖文鑒大師一帖朱校理一帖田元均一帖尹師魯二帖季寺丞一帖文正公尺牘目録, WYG: ''}
