  - {type: variant, offset: 1805, length: 3771, content: 儀刑乎仁壽之域嘯歌乎逍遥之墟浩氣載盈仁聲允塞然而三輔之隩適賀帶安庻邦之懐未忘高仰佇見日圍迅命星駕嚴歸兎苑風移愛甘棠而益茂龍池天近著温樹之重芳浹麗澤於百靈藹英聲於億載如某者藝踈芳潤行愧直清蜉蝣之術未充蝘蜓之嘲奚解依經敏學耻讀非聖之書約史徇名勉附青雲之士實偶登三之盛獲從旅百之先洽呦呦之鳴誤膺於宸選循婉婉之書謬厠於賔榮詎興沈後之嗟尚兾騰夷之遇伏遇留守侍郎燕金募秀蔡屣延才鐸宣百世之文旌集四方之善遠者近者鼓之舞之某顒若望風惠然入國六經之教郁郁成文三月之韶洋洋在耳而况某將趨列鎮實附宏都弗違鷄犬之音宻奉馬牛之境小國之仰大國亹亹誠敦先知之覺後知循循豈倦竊效封人之請顧觀魏相之威雖才異唐英未入晉公之幕而時同漢秀庶登梁孝之園如此則慕孤飛之雲或爲霖而有助效百年之榦幸構厦以無遺跡預洪鈞惠聞凾夏某卑情無任俟恩激切知歸之至上大名府主王侍郎啓某啓聞樂府宏開金石有發揮之望靈臺峻立風雲無隱晦之姿延群奏以咸宣俯多祥而益辯其况當具瞻之際凝真覽之明激揚駕說之音妍醜思皇之俊咸歌樂育熟議宻藏恭惟知府侍郎聲盈天湍道潤金壁儼神鋒而不耀藴寳器以難名禀自誠之德之純賦將聖之才之美明明詔下諸侯修北海之書穆穆賔來天子得平津之䇿自是蹈揚仙室遷歷帝闈青簡婉㣲謹周孔之垂法王書雅奥含虞夏之遺風故能輔翊天家叅脩皇極沃心必符於舜好論思豈止於曹隨萬化景彰諸華砥定一穴是問属慱陽之有憂六府旣瞻異延平之不懼宻辭岩座遜請藩庭周人詎有於流言魯哲曾無於愠色今則屏臨三輔岳鎭萬封輟妙筭於廟中抗雅歌於閫外束兵之伍樂壽域以何長含哺之氓賞春臺之不足佇見下從僉論上迪宸謀金堤啓途黃樞正神明百揆舞蹈萬邦如某者善遠芝蘭言踈黼黻靜忘位大明禮樂不貽唐相之慚盡飬聖賢更廣周文之意窺圃顧玉器之未成進異括囊愧金聲之不振景高山而詎至騰夷路以何稽幸以亨㑹景炎賁搜寒俊方領矩歩入拜侍郎之庭載纚垂纓出預將軍之幕當瓜期之未及猶蓬累之斯行伏遇侍郎啓闢聖門儀形俊域實斯文之東道乃吾黨之南車是興請見之辭稍露盍歸之志雖拳拳希聖曾無日月之階而肅肅之賢當有神仙之歎庻乎韓宣此日得言在魯之文吉甫異時願上維嵩之頌兾親黃閣永戴洪鈞下情無任賦林衡鑑序人之心也發而爲聲聲之出也形而爲言聲成文而音宣言成文而詩作聖人稽四始之正筆而爲經考五聲之和鼓以爲樂是故言依聲而成象詩依樂以宣心感于人神穆乎風俗昭昭六義賦實在焉及乎大醇旣醨旁流斯激風雅條散故態屢遷律呂􅎃分新聲間作而士衡名之體物聊舉於一端子雲語以雕蟲蓋尊其六籍降及近世尤尚斯文律體之興盛于唐室貽于代者雅有存焉可歌可謡以條以貫或祖述王道或褒賛國風或研究物情或䂓戒人事煥然可警鏘乎在聞國家取士之科縁於此道九等斯辨寸長必收其如好高者鄙而弗攻幾有肴而不食務近者攻而弗至若以莛而撞鍾作者幾稀有司大患雖炎炎其火玉石可分而滔滔者流涇渭難見曷嘗求備且務廣收故進者豈盡其才而退者愈惑於命臨川者鮮克結網入林者謂可無虞士斯不勤文何以至撰述者旣昧於向趣題品者復異其好尚繩墨不進曲直終非仲淹少逰文塲嘗禀詞律惜其未獲竊以成名近因餘閑載加研玩頗見規格敢告友朋其於句讀聲病有今禮部之式焉别析二十門以分其體埶叙昔人之事者謂之叙事頌聖人之德者謂之頌德書聖賢之勲者謂之紀功陳邦國之體者謂之賛序縁古人之意者謂之縁情明虗無之理者謂之明道發揮源流者謂之祖述啇㩁指義者謂之論理指其物而咏者詠物述其理而詠者謂之述詠類可以廣者謂之引類事非有隱者謂之指事究精㣲者謂之析㣲取比象者謂之體物强名之體者謂之假象兼舉其義者謂之旁喻叙其事而體者謂之叙體緫其數而述者謂之緫數兼明二物者謂之雙關詞有不覊者謂之變態區而辯之律體大備然古今之作莫能盡見復當旅次無所撿索聊取其可舉者類之于門門各有序盍詳其指古不足者以今人之作者附焉略百餘首以示一隅使自求之思過半矣雖不能貽人之巧亦庻幾辯惑之端命之曰賦林衡鑑謂可權人之輕重辨巳之妍媸也所舉之賦多在唐人豈貴耳而賤目哉庻乎文人之作由有唐而復两漢由两漢而復三代斯文也旣格乎雅頌之致斯樂也亦逹乎韶夏之和臣子之心豈徒然耳若國家千載特見取人易方登孝廉舉方正聘以伊尹之道䇿以仲舒之文求制禮作樂之才尚經天緯地之業於斯述也委而不論亦吾道之志歟時天聖五年正月日高平范仲淹序賀胡侍郎致仕伏審侍郎進清崇之爵諧高尚之風耆德尊隆睿恩深厚榮映之下慶仰居多恭以侍郎誠明自天進退由道宣三德於夙夜𬒳四紀於龍光赫有華名宻多隂施囏難險阻盡力乎三朝富貴崇高致身乎五福而乃起逹人之觀引大夫之年聦明不衰止足自處國家興廉讓之節䟽渙汗之仁寵數優賢休聲載路耀錦南國邑子榮太守之歸掛冠東門都人藹丈夫之歎爲儒及此其樂何涯伏惟上爲聖朝倍保崇重舜好清問方體貌於宿賢國有老成尚彌縫於顯道某久荷鈞録卑情無任榮觀景仰之至知杭州謝兩地啓某啓三月二十一日敕差知杭州軍州事東南得請夙夕趍程地重寄優感深愧集竊念某生禀迂拙進當盛明述不臻於聖門跡久塵於榮路領出師之重任曾莫有功叅論道之近司亦惟無狀清光旋遠晦昧所宜爰假㑹藩即從便道過于桑梓見故老以相榮䖏兹江湖與嘉魚而共樂允爲天幸岀自陶成玆蓋集賢相公權衡以誠神明其照俾蒲柳之㣲質𬒳霖雨之大私惟寅奉於官箴庶欽崇於鈞造感懼激切依歸之至移蘇州謝兩府罪布四方大不可掩寵分千騎得之若驚仰雷霆之霽威加霖雨而蒙潤報君何道殺身有宜竊念某生於唐虞學於鄒魯一簞之樂素伏於丘園四庫之逰濫升於臺閣而自踐揚諌列對越清光允出遭逢誠當感槩事君無隱必罄狂夫之言渉道未深終乖智者之慮俟竄居於楚澤尚假守於桐廬風俗未殊足張條教江山爲助寜慕笑歌鶴在隂而亦鳴魚相忘而還樂優㳺吏隱謝絶人倫豈謂蒙而克亨幽而致顯屢改劇藩之寄莫非名部之行宗族相榮搢紳改觀此蓋相公仁鈞大播量澤兼包示噩噩之公朝存坦坦之言路道玆優渥屈彼典彛茂揚天子之休純彼幽人之吉某敢不黽勉王事窹寐政經佩黃裳之文庶揚於易教詠朱繩之直無忝於詩人上酬乃聖之知旁荅具瞻之造過此以徃不知所裁謝夏太尉某蒙恩授前件官者金石之言方形於清舉絲綸之命遽𬒳於鴻私深惟山野之材曷副英豪之薦斯盖某官棟梁王室篁皷天聲痛么麽之戎夷敢䖍劉於封鄙是求參賛將肆殄夷謂某經術粗通可以識國家之體謂某愚衷素慤可以盡兵民之心奏逹九清增輝多士敢不竭其素藴輔之至誠震耀我國威張皇我帝筭晉公之幕力希唐士之謀能虞帝之庭誓獻有苗之俘馘英儀所激狂言不誣謝賀正啓某啓伏以青祇布職珠緯窮天授歳律以端時建斗杓而首序賀牘未馳於便置繁文遽枉於圜封荷勤懇之相先輙佩蔵而無斁履兹令且倍納殊休論西事劄子臣聞兵家之用在先觀虗實之勢實則避之虗則攻之今縁邊城寨有五七分之備而關中之備無三二分若吳賊知我虗實必先脅邊城不出戰則深入乘關中之虗小城可破大城可圍或東阻潼關隔兩川貢賦縁邊懦將不能堅守則朝廷不得高枕矣爲今之計莫若且嚴邊城使之久可守實関内使無虗可乘西則邠州鳯翔爲環慶儀渭之聲援北則同州河中府扼鄜延之要害東則陜府華州㩀黄河潼関之險中則永興爲都㑹之府各須屯兵三二萬人若㓂至使邊城清野不與大戰関中稍實豈敢深入復命五路脩攻取之備張其軍聲分彼賊勢使弓馬之勁無所施牛羊之貨無所集三二年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上策也又聞邊臣多請五路入討臣竊計之恐未可以輕舉也太宗朝以宿將精兵北伐西討艱難歳月終未收復縁大軍之行粮車甲乘動彌百里虜騎輕捷邀撃前後乘風揚砂一日數出進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也况今承平歳久中原無宿將精兵一旦興深入之謀係難制之虜臣以謂國之安危未可知也然則唐漢之時能拓疆萬里者盖當時授任與今不同旣委之以兵又與之稅賦而不求速效故飬猛士延謀客日練月計以待其隙進不俟朝廷之命退不関有司之責觀變乘勝如李牧之守邊可謂善破虜矣惟陛下深計而緩圖之道服賛平海書記許兄製道服所以清其意而潔其身也同年范仲淹請爲賛云道家者流衣裳楚楚君子服之逍遥是與虗白之室可以居處華胥之庭可以歩武豈無青紫寵爲辱主豈無狐狢驕爲禍府重此數師畏彼如虎旌陽之孫無忝於祖釣臺詩漢包六合罔英豪一箇㝠鴻惜羽毛世祖功臣三十六雲臺爭似釣臺高送饒州董博士諱淵黠鹿鳴燕之後舉送詩畨國英豪富魯儒同時舉送起鄉閭文章耻學楊雄賦議論羞談賈誼書喜得明珠三十六恨遺壯士二千餘送君直上青霄去行看歸乘駟馬車送徐允升歸九華重君樂詩書孜孜不知老白髪未治生惟設聖人道愛君妙山水所得是神氣尺素冩林巒邈有千里意念日江南行孤雲無繫程直指九華峯去掃先君塋却來華陽川邀我溪上盟行歌紫芝秀坐嘯清風生鍊真變金骨飄飄朝玉京結成物外㳺忘此天下情鄱陽在江左號古郡昔之爲守者固多以賢稱者僅九人而傑出於九賢之中又止唐之顔魯公本朝之范文正公可謂難得也巳二公名氏在史官大節在天下至於文章散落人間雖茟端㳺戲之餘而典雅純實可以經世而出治垂乆而行遠蓋其所飬得天地之正氣故文亦如之然是邦實二公舊治獨無墨本而間見於他處誠闕典也翊攝乏此來首訪而得之鳩工􅍢板以傳不朽斯人之眷眷二公雖不繫於文集之有無然使學士大夫家有其書如潮人之於退之柳人之於子厚因書以致其師仰敬慕之意不猶愈於甘棠之思乎乹道丁亥五月旣望邵武俞翊謹識番陽郡齋州學有文正范公文集奏議歳乆板多澷滅殆不可讀判府太中先生甞謂此郡太守名德如日月之照終古不泯者在唐則顔魯公本朝則范文正公文正之集士大夫過郡者莫不欲見其可不整治乎於是委属寮以舊京本丹陽集參校且捐公帑刋補之又得詩文三十七篇爲遺集附于後其間尚有舛誤更俟後之君訪善本訂正焉淳熈丙午十二月日郡從事北海綦煥謹識朝奉郎通判饒州軍州兼管内勸農營田事宋鈞朝請大夫知饒州軍州兼管内勸農營田事趙旧樴嘉定壬申仲夏重修范文正公别集卷第四, WYG: ''}
