  - {type: variant, offset: 0, length: 1813, content: 范文正公别集卷第四十六羅漢因果識見頌序余嘗覽釋教大藏經究諸善之理見諸佛菩薩施廣大慈悲力啓利益方便門自天地山河細及昆蟲草木種種善諭開悟迷徒柰何業結障蔽深高著惡昧善者多見性識心者少故佛佛留訓祖祖垂言以濟羣生以成大願所以隨函類衆聖之詮揔爲大藏凡四百八十函計五千四十八卷録而記之俾無流墜余慶歷初任知政事時西虜背惠侵擾邊隅勞師困民以殄兇醜聖人愛民䘏士命余宣撫河東㳂邊居民將士塗中寓宿保德水谷之傳舎偶於堂簷罅間得故經一卷名曰因果識見頌其字皆古隷書乃藏經所未録而世所希聞者也余頗異之啓軸而觀乃十六國大阿羅漢爲摩拏羅多等誦佛說因果識見悟本成佛大法之頌也一尊七頌揔一百一十二頌皆直指死生之源深陳心性之法開定慧其明之宗除煩惱障毒之苦濟生戒殺誘善祛邪立漸法序四等功德說頓教陳不二法門分頓漸雖殊合利鈍無異使羣魔三惡不起於心萬法諸縁同歸於善余一句一嘆一頌一悟以至卷終胷臆豁然頓覺世縁大有所悟儻非世尊以六通萬行圎明慧鑒之聖則無以至此方知塵世之中有無邊聖法大藏之内有遺落寳文謹於府州承天寺命僧歸依别録藏之厥後示諸講說髙僧通證耆逹皆未見聞莫不欽信後於戊子歳有江陵老僧慧喆見訪因話此頌諸聖祕密世所希聞喆傳之於武陵僧普煥處寳之三十餘年未逢别本余因求副本正其舛駮以示善知故直序其事以紀其因時戊子仲春高平范仲淹序竇諫議録竇禹鈞范陽人爲左諫議大夫致仕諸子進士登第義風家法爲一時標表馮道贈禹鈞詩云燕山竇十郎教子以義方靈椿一株老仙桂五枝芳人多傳誦禹鈞生五子長曰儀次曰儼侃偁僖儀至禮部尚書儼禮部侍郎皆爲翰林學士侃左補闕偁左諫議大夫叅知政事僖起居郎初父禹鈞家甚豐年三十無子夜夢亡祖亡父聚謂之曰汝早修行縁汝無子又壽算不永禹鈞唯諾禹鈞爲人素長者先家有僕者盗用過房廊錢二百千僕慮事覺有一女年十二三自冩劵繫於臂上云永賣此女與本宅償所負錢自是遠逃禹鈞見女子劵甚哀憐之即時焚劵收留此女祝付妻曰飬育此女及事日當求良匹嫁之及女笄以二百千擇良匹得所歸後舊僕聞之歸感泣訴以前罪禹鈞不問由是父子圖禹鈞像日夕供飬晨興祝壽公嘗因元夕徃延慶寺燒香像前忽於後殿堦側拾得銀二百兩金三十兩遂持歸明旦侵晨詣寺守候失物主須臾見一人泣涕至公問所因其人具以實告曰父犯刑至大辟徧懇至親貸得金銀若干將贖父罪昨暮以一相知置酒酒昏忽失去今父罪巳不復贖矣公驗其實遂與同歸以舊物還之加以惻憫復有贈賂其同宗及外姻甚多貧困者有䘮不能自舉公爲出金塟之由公塟者凡二十七䘮親戚故舊孤遺有女未能嫁者公爲出金嫁之由公嫁者孤女凡二十八人故舊相知與公有一日之雅遇其窘困則必擇其子弟可委以財者隨多寡貸以金帛俾之興販自後由公而活族者數十家以至四方賢士頼公舉火者不可勝數公毎量歳之所入除伏臘供給外皆以濟人之急家惟素儉器無金玉之飾室無衣帛之妾於宅南搆一書院四十間聚書數千卷禮文行之儒延置師席凡四方孤寒之士貧無供須者公咸爲出之無問識不識有志於學者聽其自至故其子見聞益博凡四方之士由公之門登貴顯者前後接踵來拜公之門必命左右扶公坐受其禮及公之亡蒙恩深者有持心䘮三年以報其遺德先是公之亡祖亡父夢中告以無子及壽數不永後十年復夢其亡祖亡父告之曰汝三十年前實無子分又壽促我嘗告汝今汝自數年以來名掛天曹隂府以汝有隂德延筭三紀賜五子各榮顯仍以福壽而終死後當留洞天充真人位言訖復祝禹鈞曰隂陽之理大抵不異善惡之報或發於見世或報於來世天網恢恢踈而不漏此無疑也禹鈞愈積隂功年八十二沐浴别親戚談咲而卒五子八孫皆貴顯於朝廷後之稱教子者必曰燕山竇十郎云某祖與竇公故人祖嘗録於書册以示子孫爲法惜其不傳天下故録以示好善者庶見隂陽報應之理使惡者知所戒焉叅知政事范某述上張侍郎某啓聞漢相出守遽彰集鳯之仁蜀客寓言適起攀鴻之志是則感深者惠來而熟間希遠者景附以誠宜矧嘗赫赫之瞻敢昧菁菁之樂恭惟留守侍郎崇宣古道茂冠人彛濬雅量於玉淵耀華勲於金册經緯抗魯雲之作論思傾丹石之衷仁助南薫下觧吾民之愠道侔東易旁洗庻物之心繇是仙貫日升天姿晝接皇墳帝典奉國府之諮詢周紀漢綱振憲司之風議臺霜載厲心水彌清故得穆穆顧懐師師属望叅萬㣲之景業升九序之康歌象先以清淨加人元崇以應變成務梓人之政大斵於周邦金鑑之功景鏘於唐室翊宣帝問欽叙疇倫羲鼎載羔旣觀於烹飬魯巵在廟俄鍳於歆盈不盡君子之餘廼起逹人之觀劇言黼扆牢讓台衡天章開均逸之慈國論仰知榮之躅今則倚毗載重名教荐登鳴玉北門寔奉觀書之座分珪南闕崇司受籙之都彌重國威益嚴廟寄蕭侯関内鬰隆炎漢之基旦相陜東雅布崇周之化一人爲之安撫四國爲之承流莫不凝飬粹靈惠綏美俗東陽之扇動揖清風武昌之楼靜延明, WYG: ''}
