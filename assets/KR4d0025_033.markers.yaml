  - {type: variant, offset: 586, length: 16602, content: 於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害爲趨捨凡有所爲必盡其方曰爲之自我者當如是其成與否有不在我者雖聖賢不能必吾豈苟哉公爲政所至民多立祠畫像其行巳臨事自山林處士里閭田野之人外至夷狄莫不知其名字而樂道其事仕至參知政事謚文正道德博洽日文經天緯地日文内外賔服日正有文集二十卷别集五卷蘇軾作序政府論事三卷奏議十七卷韓琦作序娶李氏參政昌齡女也公有四子長曰純佑歷守將作監主簿自㓜讀書爲文章籍籍可稱甞侍公城馬鋪寨率兵馳據其地西戎兵衆大至且戰且督不數日而成其城一路恃以爲安次曰純仁字堯夫皇祐元年進士相哲宗謚忠宣御書世濟忠直之碑高宗朝贈太師追封許國公次曰純禮字彛叟仕至尚書右丞次曰純粹字德孺仕至龍圖閣學士戸部侍郎知河南府太宗皇帝端拱二年巳丑秋八月丁丑公生於徐州節度掌書記官舎按公神道碑及國史皆云年六十四薨于皇祐四年也淳化元年庚寅丁父太師憂年二歲太中祥苻元年戊申年二十歲按公譔鄠郊友人王鎬墓表云君之父賛善公衮慷慨有英氣善爲唐律詩歷著作通判㑹太守不法憤而辱之失官居長安中與豪士遊縱飲浩歌有嵇阮之風人特駭之公不安其高復起家就禄得請監終南山上清太平宫從吏隱也時祥苻紀號之初戴某薄遊至止及公之門因與君交相與嘯詠於鄠杜之間二年巳酉年二十一歲讀書長白山醴泉寺是歲改科舉取士按言行録載涑水記聞曰范公少冐朱姓舉學究甞同衆客見姜諫議遵遵素以剛嚴著名與人不欵曲衆客退獨留范公引入中堂謂其夫人曰朱學究年雖少竒士也他日不惟爲顯官當立盛名於世叅坐置酒待之如骨肉人莫測其何以知之也三年庚戌年二十二讀書長白山按東軒筆録公與劉某同在長白山醴泉寺僧舎讀書日作粥一器分爲四塊早暮取二塊斷虀數莖入少鹽以㗖之如此者三年四年辛亥年二十三詢知世家感泣去之南都入學舎掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦按家録云公以朱氏兄弟浪費不節數勸止之朱兄弟不樂曰我自用朱氏錢何預汝事公聞此疑駭有告者曰公乃姑蘇范氏子也太夫人携公適朱氏公感憤自立决欲自樹立門戸佩琴劒徑趨南都謝夫人亟使人追之既及公語之故期十年登第來迎親七年甲寅年二十六有睢陽學舎書懷詩在南都學舎家録云真宗謁太清宫幸亳駕次南京皆徃觀之獨公不岀或以問公公曰異日見之未晩留守有子居學見公食粥及不出觀駕歸告其父以公厨食饋公既而悉巳敗矣留守子曰大人聞公清苦故遺以食物而不下筯得非以相凂爲罪乎公謝曰非不感厚意蓋食粥安之巳久今遽享盛饌後日豈能㗖此粥乎又按遺事云公處南都學舎晝夜苦學五年未嘗解衣就枕夜或昏怠輙以水沃靣徃徃饘粥不充日􅉴始食八年乙卯甲第九十七名試置天下如置器賦君子以恐懼修省詩順時知㣲何先論登第後有詩云長白一寒儒名登二紀餘百花春滿路三月雨隨車鼓吹迎前道煙霞指舊廬郷人莫相羡教子讀詩書調廣德軍司理參軍按張唐英撰公傳云祥苻八年登進士第朱說者是也又按汪藻撰祠堂記云公以進士釋褐爲廣德軍司理參軍日抱具獄與太守争是非守數以盛怒臨之公不爲屈歸必記其徃復辯論之語于屏上比去字無所容貧止一馬鬻馬徒歩而歸非明於所養者能如是乎獄官有亭以公名之者舊矣公旣登仕版始迎其母以養初廣德人未知學公得名士三人爲之師於是郡人之擢進士苐者相繼于時天禧元年丁巳年二十九遷文林郎權集慶軍按九域志亳州也節度推官始復范姓其表略云名非覇越乘舟偶效於陶朱志在投秦入境遂稱於張禄用事最爲親切二年戊午年三十歲爲譙郡從事亳州也祭龍圖楊給事文曰余歲三十兮從事于譙獨棲難安兮孤桓易揺公方監郡兮風采翹翹一顧而厚兮甚乎神交又太子中舎上官融墓銘云余天禧中爲譙之從事秋八月進皇儲資聖頌三年巳未年三十一除祕書省校書郎四年庚申年三十二是歲校書芸省守官集慶五年辛酉年三十三監泰州西溪鎮鹽倉有西溪見牡丹詩西溪書事按皇朝類苑云初吕文靖甞官于此手植牡丹有詩刻後公復題一絶後人以二公詩故題詠極多而花亦爲人重護以朱欄歳乆益茂爲西陵竒觀仁宗皇帝乾興元年壬戌年三十四歳按文集冬十二月有上張知白右丞書稱文林郎試祕書省校書郎權集慶軍推官監泰州西溪鎮鹽倉仁宗皇帝天聖元年癸亥年三十五公在西溪上言冦凖𬒳誣事除興化令時富鄭公弱冠來謁公識其逺大力教載而激勸之故其祭文略云昔弱初冠識公海陵顧我譽我謂必有成我稔公德知巳服膺自是相知莫我公比一氣殊息同心異體始未聞道公實告之未知學文公實教之肇復制舉我憚大科公實激之旣舉而仕政則未諭公實飾之徙楚州粮料院二年甲子年三十六遷大理寺丞子純佑生三年乙丑年三十七夏四月二十日上書請救文弊復武舉重三館之選賞直諫之臣及革賞延之弊四年丙寅年三十八丁母夫人憂有書與發運使張綸言復海堰之利按李燾通鑑長編泰州海堰乆廢不治歳患海濤冐民田疇公言于發運副使張綸請修復之綸遂奏以公知興化縣總其役難者謂濤患不息則積潦必爲灾綸曰濤之患十九而潦之患十一獲多亡少豈不可乎役遂興會大雨雪驚濤洶湧役夫散走旋濘而死者百餘人衆讙言曰堰不可成復詔遣中使按視將罷之又詔淮南轉運使胡令儀同公度其可否令儀力主公議而公尋以憂去綸表請身自督役踰年堰成民至今享其利又按記聞通泰海州皆濵海舊日潮水皆至城下田土斥鹵不可稼穡文正公監西溪鹽倉建白于朝請築捍海堤於三州之境長數百里以衛民田朝廷從之以公爲興化令掌斯役發通泰楚海四州民夫治之旣成民享其利興化之民徃徃以范爲姓五年丁卯年三十九夏六月丁亥子純仁生時公寓南京應天府按公言行録云時晏丞相殊爲留守遂請公掌府學公常宿學中訓督學者皆有法度勤勞恭謹以身先之由是四方從學者輻湊其後以文學有聲名於場屋朝廷者多其所教也是年有上執政書略云蓋聞忠孝者天下之大本也其孝不逮忠可忘乎所以冐哀上書言國家事不以一心之戚而忘天下之憂請擇郡守舉縣令斥㳺惰去冗僣遴選舉敦教育養將材保直臣斥侫臣使朝廷無過生靈無怨以杜姦雄凡萬餘言東軒筆録云公在睢陽掌學有孫秀才者索遊上謁公贈錢一千明年孫生復謁公又贈一千因問何爲汲汲於道路孫生戚然動色曰母老無以養若日得百錢則甘㫖足矣公曰吾觀子辭氣非乞客二年㒒㒒所得幾何而廢學多矣吾今補子爲學職月可得三千以供養子能安於學乎孫生大喜於是授以春秋而孫生䔍學不舎晝夜行復脩謹公甚愛之明年公去睢陽孫亦辭歸後十年間泰山下有孫明復先生以春秋教授學者道德高邁朝廷召至乃昔日索遊孫秀才也有送李紘殿院赴闕詩按九域志南京應天府睢陽郡六年戊辰年四十歲上書言朝政得失民間利病宰相王曾見而偉之時晏殊在樞府薦一士爲舘職曾諭之曰公知范仲淹舎而他薦乎晏公遂以狀舉公其略云臣伏以先聖御朝群才効用惟小大之畢力叶天人之統和凡有位於中朝願薦能於丹扆不虞進越用廣詢求臣伏見大理寺丞范仲淹爲學精勤屬文典雅略分吏局亦著清聲前曾任泰州興化縣興海堰之利昨因服制退處睢陽日於府學之中觀書肄業敦勸徒衆講習藝文不出戶庭獨守貧素儒者之行實有可稱云云欲望試其詞學獎以職名庻參多士之林允洽崇丘之詠是歲服除冬十二月甲子以公爲祕閣校理晏丞相殊之薦也又文集有南京府學生朱從道名述有南京書院題名記又奏乞王洙充南京講書狀七年乙巳年四十一歲按長編是年十一月癸亥冬至上率百官上皇太后壽于會慶殿乃御天安殿受朝公上䟽言天子有事親之道無爲臣之理有南靣之位無北靣之儀若奉親于内以行家人禮可也今顧與百官同列虧君體損主威不可爲後世法䟽入不報東坡志林云先君奉詔脩太常因革禮求之故府朝政案牘具在考其始末無諌止之事而有巳行之明驗質之於文忠公公曰范公實諫而卒不從墓碑誤也當以案牘爲正今按涑水記聞亦但云奏以爲不可而不言見從與否則蘇公所記疑若可信但諸書皆云冬至而蘇公獨云朝正則誤也晏公所薦公爲舘職聞之大懼召公詰以狂率邀名且將累朝薦者公正色抗言曰某縁屬公舉每懼不稱爲知巳羞不意今日反以忠直獲罪門下殊不能答公退又作書遺殊申理前奏不少屈殊卒媿謝焉又奏䟽請皇太后還政亦不報遂乞補外尋出爲河中府通判八年庚午年四十二歲按長編上䟽論職田不可罷其略曰真宗初賜職田實遵古制盖大賚於多士俾無蠧於生民無厭之徒或冐典憲由濫官之咎非職田之過若從而廢罷則吏困於廉收而均給則民受其弊天下幕職州縣官三班使臣俸禄㣲薄全藉職田濟贍其無職田處持㢘之人例皆貧窘曩時士貟尚少凡得一任必五六年方有交替到闕即日差除復便請給當時條例未宻士寡廉隅雖無職田自可優足今物貴與昔不同替罷之後守選待闕動踰二年宦吏衣食不足廉者復濁何以致化天下受弊必如臣言乞深加詳軫不以一時之論廢經逺之制天下幸甚上䟽論士人寄貫開封府上䟽論太后復辟其略云陛下擁扶聖躬聽斷大政日月持久今皇帝春秋巳盛睿哲明聖握乾綱而歸坤紐非黃裳之吉象也豈若保慶壽於長樂卷收大權還上真主以享天下之養䟽入不報是歲三月三司言方建太一宫等處乞下陜西市材詔可公在河中府上言昭應壽寧天戒不逺今復侈土木破民産非所以順人心合天意也宜罷修宫觀减定常歲市木之數蠲除積負以彰聖治夏四月轉殿中丞五月有上時相議制舉書六月十五日有與周騤推官書七月十二日有與歐靜書上䟽言減郡邑以平差役其略云天下郡縣至宻吏役至繁奪其農時遺彼地利是以邊廪或窘民財未豐臣觀漢光武朝併合四百餘縣吏職減損十置其一今欲去煩苛之便致富壽之俗當施此令以寛兆民如河中府倚郭二縣惟河東縣主戶四千不至逼迫河西縣主戶一千九百内八百餘戶屬鄉村本縣尚差公吏三百四十人内一百九十五人於鄕村差到縁鄉村中等戶只有一百三十戶更於已下抽差是使堪役之家無所休息以臣管見其河西縣宜併入河東及大名府縣分極多甚可省去或謂縣邑之中有榷酤關征之利臣謂所廢之縣止可爲鎮而坊市仍舊所貴吏役稍減農時不奪地利無遺民財可阜也有上資政晏侍郎書十二月與唐處士書邵氏聞見録云富鄭公初遊塲屋穆修伯長謂之曰進士不足以盡子之才當以大科名世公果禮部試下時太師公官耀州公西歸次陜范文正公遣人追公曰有㫖以大科取士可亟還公復還見文正辭以未嘗爲此學文正曰巳同諸公薦君矣久爲君闢一室皆大科文字可徃就舘時晏元獻公判南京公以大理寺丞丁憂權西監一日晏謂范曰吾一女及笄仗君爲我擇壻范曰監中有二舉子富臯張爲善皆有文行他日皆至卿輔並可壻也晏曰然則孰優范曰冨脩謹張踈俊晏曰唯即取富臯爲壻後改名即富公弼也爲善後亦更名方平云按登科記天聖八年富弼中制科然按國史范文正公是時當在陳州薦舉求婿之事未詳九年辛未年四十三歲春三月辛巳子純禮生公遷太常博士移通判陳州上䟽乞將磨勘轉官恩澤移贈考妣其略曰臣自蒙恩改授京官到今七年不敢僥求磨勘今爲遷奉在邇未曾封贈父母竊念臣襁褓之中巳丁何怙鞠養在母慈愛過人䘏臣㓜孤憫臣多病夜扣星象食斷葷血踰二十載至于其終又臣遊學之初違離者久率嘗殞血幾至䘮明而臣仕未及榮親巳不逮旣育之恩則重罔極之報曾無今欲將磨勘轉官恩澤乞先移贈考妣所貴安厝之日得及追榮臣在壯年序進未晩伏望特降曲成之造用覃廣愛之風奏致仕分司官乞與折支全俸狀明道元年壬申年四十四歲在宛丘聞京師多不關有司而署官賞者乃附驛奏䟽甚懇至願以唐中宗朝上官婕妤賀婁氏賣墨敕斜封官爲戒又屢上䟽言内降之弊引韋后爲戒二年癸酉年四十五歲是年三月甲子太后崩帝始親政裁抑僥倖中外大恱時公爲陳州通判太常博士四月公𬒳召赴闕除右司諫公初聞遺誥以楊太妃爲皇太后參决國事亟上䟽言太后母號也未嘗因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無母后之助也時巳刪去參决等語然太后之號訖不改止罷其冊命而已時太后旣崩言者多追斥垂簾時事公言於上曰太后受遺先帝保佑聖躬十餘年矣宜掩其小故以全其大德上大感悟五月降詔曰大行皇太后保佑冲人十有二年恩勤至矣而言者罔識大體務詆訐一時之事非所以慰朕孝思也其垂簾日詔命中外母輙以言行公之言也六月同審刑院大理寺詳定天下當配隷罪人刑名秋七月甲子以公同管勾國子監是歲以江淮京東災傷公奏請遣使廵行未報公請間曰宫掖中半日不食當何如今數路艱食安可置而不䘏八月甲申遂命公安撫江淮所至開倉廩賑乏絶禁淫祀奏蠲廬舒折役茶江東丁口塩錢饑民有食烏昩草者擷草進御請示六宫貴戚以戒侈心又陳救弊八事上嘉納之又薦知崇州吳遵路爲郡得古人風乞以遵路救災事跡頒諸州并付史舘十二月奏請天下諸郡縣弓手七週年者聽歸農從之時郭皇后廢率諫官御史伏閤諫先是美人尚氏於上前有侵皇后語后不勝忿批其頰上自起救之誤批上頰上大怒内侍閻文應因與上謀廢后且勸上以爪㾗示執政上乃示宰臣吕夷簡且告之故夷簡以前罷相故怨后而范諷方與夷簡相結乘間言后九年無子當廢夷簡賛其言上意未决外人籍籍頗有聞者公因對極言不可且曰宜早息此議不可聞於外也居久之乃定議廢后夷簡先敕有司無得受臺諫章䟽詔稱皇后以無子願入道特封凈妃玉京冲妙仙師賜名清悟别居長寧宫臺諫章䟽果不得入公即中丞孔道輔率知諌院孫祖德等詣垂拱殿門伏奏皇后不當廢願賜對以盡其言守殿門者闔扉不爲通道輔撫銅環大呼曰皇后𬒳廢柰何不聽臺諫入言尋有詔宰相召臺諫諭以當廢狀道輔等悉詣中書語夷簡曰人臣之於帝后猶子事父母也父母不和固宜諫止柰何順父出母乎夷簡曰廢后自有故事道輔及公曰公不過引漢光武勸上耳是乃光武失德何足法也自餘廢后皆前世昬君所爲上堯舜之資而公顧勸之效昬君所爲可乎夷簡不能荅拱立曰諸君更自見上力陳之道輔與公等遂退將以明日留百官揖宰相廷爭而夷簡即奏䑓諫伏閤請對非太平之美事遂詔出道輔知㤗州公知睦州祖德等罰金詔諫官御史自今母得相率請對於是御史楊偕請與道輔等俱貶御史郭勸復言廢后及不許請對之說爲非是河陽簽判富弼亦言朝廷一舉而二失縱不能復后宜還范仲淹以來言路䟽入不報景祐元年甲戌年四十六是歲春正月出守睦州有睦州謝上表及出守睦州詩赴桐廬淮上遇風三首出守桐廬道中十絶公在桐廬與晏尙書書略云罪有餘責尚叨一麾敢不盡心以求疾苦二浙之俗躁而無剛豪者如虎示之以文弱者如䑕示之以仁吞奪之害稍稍而息乃延見諸生以愽以約非某所能盖師門之禮訓也又云郡之山川滿目竒勝且有章阮二從事俱富文能琴夙宵爲㑹交迭唱和爲郡之樂有如此者於君親之恩知巳之賜宜何報焉在郡有瀟洒桐廬郡十絶新定感興五首遊烏龍山寺詩桐廬郡齋書事一首依韻酬周騤太傅同年詩建嚴先生祠堂復其子孫四家而奉祠焉又圖唐處士方十像于堂之東壁夏六月壬申徒蘇州蘇爲公鄕郡地濵震澤田多水患募遊手䟽五河導積水入海有上吕相公并呈中丞諮目言水利事秋八月徙明州轉運使上言公治水有緒願留以畢其役九月詔復知蘇州有與曹都官書與孫明復書略云某至新定江山清絶自謂得計及來姑蘇却修人事斯亦勞矣今在海上部役開决積水俟寒而罷之足下未嘗遊浙或能柱駕與呉中講貫經籍教育人材是亦先生之爲政買山之圖其在中矣以來者衆未易他謀也與晏尚書書云某自睦改蘇首捧鈞翰屬董役海上至還郡中災困之氓其室十萬疾苦紛沓夙夜營救智小謀大厥心惶惶久而未濟在郡有蘇州十詠用韻謝晏尚書近著示及詩又有奉酬晏尚書見寄詩天平山白雲泉詩題常熟頂山上方院僧居詩二年乙亥年四十七歲是年公在蘇州奏請立郡學先是公得南園之地既卜築而將居焉隂陽家謂必踵生公卿公曰吾家有其貴孰若天下之士咸教育于此貴將無巳焉遂即地建學既成或以爲太廣公曰吾恐異時患其隘耳元祐四年公之子純禮出自奉常制置江淮六路漕事持節過鄉郡即學拜公像覩學之敝復請于朝新而廣之吳學至今甲于東南五月八日有朝賢送定惠大師詩序八月有祭謝賔客文冬十月除尚書禮部貟外郎天章閣待制有謝表見文集召還判國子監時朝廷更定雅樂詔求知音公薦白衣胡瑗對崇政殿授校書郎公進除吏部貟外郎權知開封府公自還朝論事益急宰相隂使人諷公待制侍臣非口舌任也公曰論思正侍臣事余敢不勉宰相知不可誘乃命知開封府欲撓以繁劇使不暇他議亦幸其有失即罷去公决事如神京邑肅然稱治都下謡曰朝廷無憂有范君京師無事有希文十二月郭皇后暴薨中外疑内侍閻文應置毒公劾奏其事即不食悉以家事屬其長子曰吾不勝必死之上卒聽其言竄文應嶺南㝷死于道三年丙子年四十八歲春正月公上太宗尹京日所判案牘遂命崇政殿說書賈昌朝王宗道同編次三月應制賞花釣魚詩夏五月戊寅朔公論建都事其略謂洛陽險固而汴爲四戰之地西洛帝王之宅絶無儲備宜以將有朝陵爲名漸營廪食陜西有餘可運而下東路有餘可運而上數年之間庻幾有備太平則居東京通濟之地以便天下急難則居西洛險固之宅以守中原陛下内惟修德使天下不聞其過外亦設險使四夷不敢生心此長世之策也上嘗以遷都事訪諸夷簡夷簡謂公迂濶務名無實公聞之又上四論以獻一曰帝王好尚二曰選賢任能三曰近名四日推委大抵譏指時政又爲百官圖以獻因指其遷進遲速次序曰某爲超遷某爲左遷如是爲公如是爲私意在丞相又言漢成帝信張禹不疑舅家故有王莾之亂臣恐今日朝廷亦有張禹壞陛下家法以大爲小以易爲難以未成爲巳成以急務爲閑務者不可不早辯夷簡大怒以公語辯於上前日訴公越職言事薦引朋黨離間君臣公亦交章辯析辭益切遂罷黜落職知饒州時朝士畏宰相無敢過公者獨龍圖閣直學士李紘集賢校理王質出郊餞飲之時質以病在吿扶病祖宴都門獨留語累夕大臣謂之曰子有疾可辭何爲自䧟朋黨質曰范公天下賢者質何敢忘之若得爲其黨人公之賜質厚矣聞者爲之縮頸公旣貶諫官御史莫敢言祕書丞集賢校理余靖上言謂公所言事在陛下母子夫婦之間猶以合典禮故加優奨今坐刺譏大臣重加譴謫倘其言未恊聖慮在陛下聽不聽耳安可以爲罪乎陛下自專政以來三逐言事者恐非太平之政也請速改前命靖遂落職監均州酒稅太子中允舘閣校勘尹洙言臣常以范仲淹直諒不回義兼師友自其𬒳罪朝中多云臣亦𬒳薦論范某既以朋黨得罪臣固當從坐况余靖素與范某分踈猶以朋黨洙爲崇信軍節度掌書記監郢州酒稅舘閣校勘歐陽脩移書責右司諌高若訥曰范希文平生剛正好學通古今班行中無與比者其立朝有本末天下所共知今以言事觸宰相得罪足下既不能爲辯其非辜又畏有識者之責巳遂隨而詆之以爲當黜是可怪也今皇帝即位以來進用諫臣容納言論足下幸生此時遇納諫之聖主如此猶不敢一言何也前日又聞御史臺牓朝堂戒百官不得越識言事是可言者惟諫臣爾若足下又遂不言是天下無得言者也足下在其位而不言便當去之無妨他人之堪其任者也春秋之法責賢者備今脩區區猶望足下之能一言不忍便絶足下而以不賢者責若猶以希文不賢而當逐則予今所言如此乃是朋邪之人爾願足下直携此書于朝使正予罪而誅之亦諫臣之一効也若訥得書忿乃言范某貶職之後臣諸處察訪端由參驗所聞與勑牓中意頗同固不敢妄有營救今歐陽脩移書詆臣言范某平生剛直好學通古今班行中無與比者責臣不能辯其非辜猶能以靣目見士大夫出入朝中稱諫官及謂臣不復知人間有羞耻事仍言今日天子與宰臣以迕意逐賢人責臣不言臣謂賢臣者國家恃以爲治也若陛下以迕意逐之臣合諫宰相以迕意逐之臣合爭臣愚以范某頃以論事切直亟加遷用今兹狂言自取譴辱豈得謂之非辜恐中外聞之謂天子以迕意逐賢人所損不細請令有司召脩戒諭脩坐罪貶爲夷陵令西京留守推官仙遊蔡㐮作四賢一不肖詩傳于時四賢指公靖洙脩不肖指若訥也是時契丹使至宻市以歸張中庸使虜過幽州見燕山舘中巳有書永叔書于壁者秋八月饒州有謝上表略曰守土非輕報天無所臣出自畎畆階于縉紳驟陞天閣之遊親委王畿之政至孤難立屢請弗諧卷寵既渥𥙷報宜異必將危墜猶或建明情雖匪他罪實由巳然而有犯無隱惟上則知許國忘家亦臣自信此時爲郡陳優優布政之方必也立朝增蹇蹇匪躬之節公又遷建饒之郡學饒之山水大率秀㧞公識其形勝曰妙果院一塔高峙當城之東南屹起千餘尺城之下枕瞰數湖水脉連秀於是名之曰文筆峰硯池學既建而生徒浸盛由公遷指學基而興建也且曰二十歲後當有魁天下者逮治平乙巳彭汝礪果第一人及苐公沈幾逺識如此有題芝山院詩云偶臨西閣坐五老夕陽關之句五老峰有亭饒人踏青而至必曰范公五老亭又饒有九賢堂自開寳迄紹聖郡守六十八人而在九賢之序者公一人而巳饒人爲立祠頒春堂天慶觀州學之講堂凡三所由景祐距此六十載牲牢日盛凡禱晴雨及州官之到罷皆致禮焉講堂毎上丁具禮祝有滕公夫人刁氏墓誌銘有靈烏賦和謝希深學士見寄詩在郡有依韻酬黃灝秀才詩鄱陽酬泉州曹使君見寄詩郡齋即事詩云三出專城鬢似絲蓋公先歷睦蘇二郡也四年丁丑年四十九歲十二月壬辰公徙知潤州上論執政令移近地故也先是京師地震直史舘葉清臣上䟽因言公與余靖以言事𬒳黜天下之人齚舌不敢議朝政者行將二年願陛下深自咎責詳延忠直敢言之士庻幾明威降鑒而善應來集也書奏數日公等皆得近徙公旣徙潤州䜛者恐其復用遽誣以事語入上怒亟命置之嶺南叅政陳琳辯其不然公訖得免自公貶而朋黨之論起朝士牽連出語及公者皆指爲黨人琳獨爲上開說上意解乃巳有潤州謝上表移丹陽郡先遊茅山詩京口即事詩滕子京魏介之二同年相訪丹陽郡詩寳元元年戊寅年五十歲春正月十三日赴潤州道由彭澤謁狄梁公廟慨慕名節爲之作記立碑至郡謁甘露寺李衛公祠以其湫隘遷于南樓并以本傳刻之祠下與李泰伯書云今潤州初建郡學可能屈節教授又慮逺來難爲將家蘇州掌學胡瑗秘閣校理見明堂圖亦甚奉仰或能挈家必有經畫請先示音爲幸與胡安定屯田書略云近改丹徒併獲雅問豈君之心不易改棄而然耶其念入朝以來思報人主言事太急貶放非一然㒒觀大過之象患守常經九二以陽處隂越位救時則王室有棟隆之吉九三以陽處陽固位安時則天下有棟撓之凶非如艮止之時思不出位者也吾儒之職去先王之經則茫乎無從矣又豈暇學人之巧失其故歩但惟精惟一死生以之冬十一月徙知越州按公文集有刻唐祖先生墓誌於賀監祠堂序題曰寳元元年知越州范某序係元年知越州長編却稱二年三月丁未當考是冬元昊僣號元昊性㐫鷙猜忌通漢文字嘗諫父德明母臣中國德明曰吾族三十年衣錦綺此聖宋天子恩不可負也元昊曰英雄之生當覇王耳何錦綺爲明道元年德明死朝廷遂命元昊襲父爵元昊雖嘗奉貢然居國中益僣侈景祐元年春始冦邊犯府州秋七月又冦環慶因下詔約束之元昊既悉有夏銀綏靜宥靈塩㑹勝甘凉瓜肅之地仍居興州阻河依賀蘭山爲固始大補僞官創十六司以統衆務又置十八監軍司委酋豪分統其衆緫十五萬又選豪族善弓馬三千人迭直僞號六班直至是用其黨楊守素之謀築壇受冊僣號始受英武興法建禮仁孝皇帝國稱大夏改天授禮法延祚元年點兵蓬子山遣使奉表來告僣號納旌節敕告鄆州通判富弼請斬其使尋詔削元昊官爵除屬籍絶互市牓㳂邊有能擒元昊除定難節度使康定元年巳卯公年五十一歲在越有諸曁道中詩越上聞子規詩春二月有兵部侍郎胡公墓誌銘有贈兵部尚書田公墓誌銘有題翠峰院詩有與李泰伯書其略云此地比丹陽又似閑暇可以卜居請一來講說因而圖之誠衆望也兒子在蘇州今年欲行郷飲酒俟先生講求也公在越有淸白堂記六月有祭胡侍郎文又有祭蔡侍郎文三年庚辰年五十二歲春二月有胡公夫人陳氏墓誌銘節度掌書記沈君墓誌銘三月公復天章閣待制知永興軍用陜西安撫使韓琦之言也未至永興又改陜西都轉運使五月甲戌西方用兵公上䟽言守邊城實關中之計近邊城砦有五七分之備而關中之備無二三分者昊賊深入乘關中之虚或東阻潼關隔兩川貢賦則朝廷不得安枕矣爲今之計莫若且嚴戒邊城使持久可守實關内使無虗可乘若冦至使邊城清野不與大戰關中稍實豈敢深入既不得大戰又不能深入二三年間彼自困弱此上䇿也又聞邊臣多請五路入討臣恐未可輕舉太宗朝以宿將精兵而西討艱難終未收復况今承平歲久無宿將精兵一旦興深入之謀臣謂國之安危未可知也惟陛下緩而圖之七月巳卯公除龍圖閣直學土與韓琦並爲陜西經略安撫副使同管勾都部署司事𥘉公與吕夷簡有隙及議加職夷簡請超遷之上恱以夷簡爲長者既而公入謝上諭公使釋前憾公頓首曰臣向所論蓋國事於夷簡何憾也八月庚戌兼知延州有延州謝上表先是詔分邊兵部署領萬人鈐轄領五千人都監領三千人有冦則官卑者先出公曰不量賊衆寡而岀戰以官爲先後取敗之道也乃分州兵爲六將將三千人分部教之量賊衆寡使更出禦賊賊不敢犯既而諸路皆取法焉賊相戒曰無以延州爲意今小范老子腹中有數萬甲兵不比大范老子可欺也大范盖指雍也是歳横渠先生張載來謁勸讀中庸吕與叔作橫渠先生行狀云康定用兵時先生方年十八慨然以功名自許上書謁范文正公公知其逺器欲成就之反責之曰儒者自有名教何事於兵因勸讀中庸即是年也築青澗城復承平永平廢砦神道碑云公爲將務持重不急近功小利於延州築青澗城墾營田復承平永平廢寨属羗歸業者數萬戸有舉張問孫明復狀乞修京城二劄子慶曆元年辛巳年五十三歳朝命以正月出兵討元昊公上䟽其略云正月起兵塞外雨雪大寒暴露僵仆我師可憂萬一有失噬臍何及春深漸暖方賊馬瘦人饑其勢易制此得天時之便又可以擾其耕作且元昊謂國家太平忘戰邊城無備是以桀驁今邊鄙漸飾賊至則爭願許臣稍以恩信示之或可招納不然臣恐情意阻絶偃兵無期若用臣等歳月無効徐圖舉兵先取綏宥㩀其要害屯兵營田爲持久之計則橫山人戶挈族來歸拓疆禦冦莫此之利上用其議於是公固守鄜延有荅趙元昊書是年元昊遣塞門寨主高延慶還延州令見公約和公不聞之朝廷乃自爲書遺元昊諭以禍福二月元昊冦渭州始朝廷既從陜西都部署司所上攻守䇿經略安撫判官尹洙以正月丙子至延州與公謀岀兵越三日公徐言巳得㫖聽兵勿出洙留延州幾兩旬公堅持不可辛丑洙還至慶州乃知任福等敗績賊侵劉璠堡未退因遣權環慶路都監劉政將銳卒數千來援未至賊引去夏竦㝷劾奏洙擅發兵降通判濠州始韓周等持公書入西界逆者禮意殊善行兩日聞山外諸將敗亡周等抵夏州留四十餘日元昊俾其親信野利旺榮爲書報公别遣使與周俱還且言不敢以聞兀卒書辭益慢公對使者焚其書而潜録副本以聞書凡二十六𥿄其不可以聞者二十𥿄公悉焚之餘又略刪改書既逹大臣皆謂公不當輙與元昊通書又不當輙焚其報宋庠因言於上謂公可斬杜衍謂公本志蓋忠朝廷欲招納叛羗爾何可深罪夷簡亦徐助衍言知諫院孫沔又上䟽爲公辯上悟乃薄其責夏四月癸未公以陜西經略副使兼知延州龍圖閣直學士戶部郎中降爲戶部貟外郎知耀州職如故有謝降官知耀州表及耀州謝上表五月壬申公徙知慶州兼管勾環慶路都部署司事初元昊反隂誘屬羌爲助環慶酋長六伯人約與賊爲郷導後雖首露猶懐去就公至部即奏行邊以詔書犒賞諸羌閱其人馬立條約明賞罰諸羌受命恱服始爲漢用九月辛酉公復戶部郎中十月公以龍圖閣直學士戶部郎中管勾環慶路部署司事兼知慶州爲左司郎中是月梁適自陜西還公附奏攻守二議是歲有舉滑州節度判官歐陽脩充經略安撫司掌書記狀又舉天雄軍通判張方平充經略安撫司掌書記狀是歲築大順城神道碑云於慶州城大順以㨿要害又城細腰胡盧於是明珠滅臧等大族皆去賊爲中國用又曰其城大順也一旦引兵出將不知所嚮軍至柔逺始號令告其地處所徃築城至於版築之用大小畢具而軍中初不知賊以三萬騎來爭公戒諸將戰而敗走者追勿過河巳而賊果走追者不渡而河外果有伏賊失計乃引去於是諸將服公爲不可及有兵部尚書蔡公墓誌銘太常少卿賈公墓誌銘舉丘良孫應制科狀二年壬午年五十四歲三月癸丑公請給樞宻院空名宣及宣徽院頭子各百道以備賞功從之廵邊至環州州屬羌隂連虜爲患邊上公謂种世衡素得屬羌心而青澗城巳堅固乃奏世衡知環州以鎮撫之詔從其請四月癸亥除鄜州管内觀察使辭不受其讓表略云觀察使班待制下臣守邊數年羌胡頗親愛臣呼臣爲龍圖老子今改觀察使則與諸族首領名號相亂恐爲賊所輕且無功不應更增厚禄辭甚切表三上乃命復爲龍圖閣直學士左司郎中有謝守舊官表傳宣候將來邊事稍寧詔卿用在兩地非出擬亦非臣僚奏舉特出朕意宣諭卿知兼令宻舉臣僚代邊任奏聞先差入内内侍省高班陳舜封至傳宣又差入内西頭供奉官麥知㣲至傳宣㫖撫問賜鳳茶一合有上吕相公三書十月辛亥以公爲樞宻直學士右諌議大夫鄜延路都部署經略安撫招討使有讓表元昊冦邊葛懐敏戰死賊大掠至潘原關中震恐公自將兵由邠涇援之知賊巳出塞乃還上始聞㝎川事按圖謂左右曰若仲淹出援吾無慮矣奏至上大喜曰吾固知仲淹可用亟加軄進官公以西帥久無功宻䟽乞賜貶降以謝邊陲辭不受命不聽十一月復置陜西四路都部署經略安撫兼㳂邊招討使命公及韓琦龎籍分領之公與琦開府涇州而徙文彦博帥秦滕宗諒帥慶皆從公之請也十二月壬戌詔韓琦范仲淹龎籍巳帶四路都招討使其諸路招討使副並罷從知慶州滕宗諒請也有舉滕宗諒狀是歳有書環州馬嶺鎮夫子廟碑隂乃正月書也三年癸未年五十五歲正月辛卯詔陜西㳂邊招討使韓琦范仲淹龎籍凡軍期申覆不及皆便宜從事用安撫使王堯臣議也上親擢公與富韓諸賢而黜夏竦國子監直講石介作慶暦聖德詩以美之指夏竦爲大姦公聞之不樂蓋恐其召禍於後日也二月乙卯公與韓琦上䟽言元昊如大言過望爲不改僣號之請則有不可許者三如卑詞厚禮從兀卒之稱亦有大可防者三神道碑云公待將吏必使畏法而愛巳所得賜賚皆以上意分賜諸將使自爲謝諸蕃質子縱其出入無一人逃者蕃酋來見者召之卧内屏人徹衛與語不疑公居三歲士勇邊實恩信大洽乃决䇿謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣按名臣傳曰公與韓琦叶謀必欲收復靈夏橫山之地邊上謡曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽元昊大懼遂稱臣四月甲辰公與韓琦並除樞宻副使皆以西事未寧凡五辭不許而後就道有除樞宻副使召赴闕陳讓五表有與朱校理書云十六日𬒳㫖赴闕至二十五日與韓公同上五章爲邊事未寧防秋在近乞且留任必得俞允入則功逺而未濟後有邊患咎歸何人軍民億萬生死一戰得爲小事耶諫官歐陽脩言公與韓琦久在陜西備諳邊事才識不類常人宜時御便殿訪問使其盡陳西邊事宜合如何措置是歳自春至夏不雨上言六事其略云臣親聞德音謂屢有灾異當脩德以及民并詔臣等謹省刑法此實見聖人憂畏之心合於天意今條奏數事一降詔罪巳二遣使决獄三詔州縣賑䘏四存養陣亡之家五邊民𬒳戎狄驅虜者量支官物贖還六已該赦除放欠負官司不得催理諫官歐陽脩余靖蔡襄咸言公有宰輔才不宜局在兵府願罷王舉正以公代之舉正亦自求罷上從其請六月丁丑除參知政事固辭不拜甲申以公爲陜西宣撫使公旣辭參政願與韓琦迭出行邊上因付以西事而公又言河東亦當爲俻任師中常守并州上即命使河東兩人留京師苐先移文兩路公又請近臣同使毎事議而後行詔命田况爲副使按公尺牘載與中舎家書略云某近蒙恩擢貳樞府此盖祖宗之慶下及家世累讓不允今月二日巳簽署勾當至十二日蒙恩改參大政尋靣陳利害巳得㫖依讓且在西府相次必出廵邊諸骨肉各安吉互相戒約勿煩州縣如輙興詞訟必奏乞深行請指揮兒姪知委八月丁未公自樞密副使右諫議大夫復除參知政事知諫院蔡襄言已差公宣撫陜西又除參政未有尋邊之日切以西賊遣使入朝其言驕慢必無可從之理原其狡心本無欲和之意朝廷既罷遣之其勢必湏用兵邊將雖多莫如朝廷輟柄臣以臨之又謂柄臣之中莫如公自行望於西人未行之前早遣廵邊無使後時以失大計先是公與任師中分路宣撫踰月皆未行韓琦言賊恐乘忿盗邊當速遣某河東臣方壯年可備奔走師中宿舊大臣毋勞徃乃詔琦宣撫陜西師中卒不行九月庚辰命同修中書時政記有述竇諌議隂德録祭石曼卿學士文祭吳龍圖文上擢任公與韓琦富弼毎進見必以太平責之數令條奏當世之務公語人曰上用我至矣然事有後先且革弊於久安非朝夕可能也上再賜手詔督促曰比以中外人望不次用卿等今琦暫徃陜西仲淹弼與宰臣章得象盡心國事毋或有所顧避其當世急務有可建明者悉爲朕陳之既又開天章閣召對賜坐給筆劄使䟽于前公與弼皆皇恐避席退而列奏十事一曰明黜陟二曰抑僥倖三曰精貢舉四曰擇官長五曰均公田六曰厚農桑七曰修武備八曰减徭役九曰覃恩信十曰重命令上方信嚮公等悉用公說當著爲令者皆以諸事畫一次第頒下獨府兵輔臣共以爲不可而止十月丙午詔中外有陳叙勞績或訴雪罪狀中書批送有司者謂之送殺更不施行自宜令主判官詳其可行者别奏聽裁行公之奏也是歲刼盗張海橫行數路剽刼淮南將過高郵知軍眺仲約度不能禦諭富民出金帛牛酒使人迎勞盗恱徑去不爲暴事聞朝廷大怒樞副富弼議欲誅仲約公時爲參政欲宥之爭於上前弼曰盗賊公行守臣不能戰不能守而使民醵錢遺之法所當誅也聞高郵之民疾之欲食其肉不可釋也公曰郡縣兵械足以戰守遇賊不禦而又賂之此法所當誅也今高郵無兵與械雖仲約之義當勉力戰守然事有可恕戮之恐非法意也小民之情醵出錢物而得免於殺掠或喜之而云欲食其肉傳者過也上釋然從之仲約由此免死既而弼愠甚謂公曰方今患法不舉舉法而多方沮之何以整衆公宻告之曰祖宗以來未甞輕殺一臣下此盛德之事柰何欲輕壞之且吾與公在此同僚之間同心者有幾雖上意亦未知所定而輕導人主以誅戮臣下他日手滑雖吾軰亦未敢自保也弼終不以爲然其後兩人不安于朝相繼出使弼還自河北及國門不許入未測上意比夜彷徨不能寐遶床嘆曰范六丈聖人也又遺事亦載此事但云淮南盗王倫與此不同又載公與富公爭於上前之語曰冦至無俻若守臣死之則民盡塗炭今吏雖不死節而民之完者數萬家誠國家實事所存不細乃與有俻而縱賊者倒行誅罰恐非陛下寧失不經之意退至政事堂昌言曰朝廷異時以四方無事不肯爲郡縣設備吏敢以治城隍閱兵卒爲請者以狂妄坐之一旦事生不虞吾軰不自引咎專以死責外臣誠有愧於青史也按言行錄載遺事曰公爲參政與韓富二樞並命銳意天下之事患諸路監司不才更用杜𣏌張昷之軰公取班簿視不才監司毎見一人姓名一筆勾之以次更易冨公素以丈事公謂公曰范六丈公則是一筆焉知一家哭矣公曰一家哭何如一路哭耶遂爲罷之四年甲申年五十六歲四月上與執政論及朋黨事公對曰方以類聚物以群分自古以來邪正在朝未嘗不各爲一黨不可禁也在聖上鑒辨之耳誠使君子相朋爲善其於國家何害五月壬戌朔公與韓琦對於崇政殿上四䇿一曰和二曰守三曰戰四曰備請朝廷力行七事一宻爲經略二再議兵屯三專於遣將四急於教戰五訓練義勇六修京師外城七宻定討伐之謀是日公與琦指陳於上前數刻乃罷六月公與琦又奏陜西八事河北五事巳而公又奏今防秋事近願賜罷臣參政知邊上一郡帶安撫之名足以照管邊事乞更不帯招討都部署職任遂以公爲陜西河東宣撫使先是公嘗言契丹元昊事可疑者六可憂者三始公以忤呂夷簡放逐數年士大夫持二人曲直交指爲黨及陜西用兵天子以公士望所屬拔用護邊及夷簡罷召還倚以爲治中外屬望公亦感激眷遇以天下爲巳任遂與富弼日夜謀慮興致太平然規模濶大論者以爲難行及按察使多所舉劾人心不自安任子恩薄磨勘法宻僥倖者不便於是謗毁浸盛而朋黨之論滋不可解然公與弼等所議不變先是石介奏記於弼責以伊周之事夏竦怨介斥巳又欲因是傾弼等乃使女奴隂習介書久之習成遂改伊周曰伊霍而僞作介爲弼撰廢立詔草飛語上聞上雖不信而公與弼恐懼不敢自安于朝皆請出按西北邊未許適有邊奏公因固請行乃有是命𥘉公之出也過鄭州因見吕夷簡問何事遽出公對以暫徃經撫兩路事畢即還夷簡曰君此行正蹈危機豈復再入又龍川志云范公以參知政事出使吕公巳老居鄭范公徃見之吕公欣然相與語終日問曰何爲亟去朝廷范公言欲經制西事耳吕公曰經制西事莫如在朝廷之爲便范公爲之愕然公遂去自公出使讒者益深而王益柔者亦公所薦王拱辰因其作傲歌事劾奏之力言其罪當誅盖欲因益柔以累公也時賈昌朝隂主拱辰等議及輔臣進白琦獨言益柔少年狂語何足深治天下大事固不少近臣同國休戚置此不言而攻一王益柔此其意有所在不特爲傲歌事可見也上悟乃寛之夏六月有上吕相公書八月辛卯命公領刑法事賈昌朝頒天下農田有利害其悉條上之初公援唐故事請以輔臣分緫其務雖甞降勑然其後弗果行有上吕相公書冬十月丙申命公提舉三舘秘閣寫書籍上䟽乞罷政事知邠州詔不許十一月四日又有上吕相公書有舉許渤簽署陜府判官事狀十二月公議築古細腰城檄知環州种世衡與知原州蔣偕共幹其事又檄偕築大蠱堡是歲有陳乞邠州狀十二月有祭吕相公文祭陳相公文有舉張伯玉應制科狀五年乙酉年五十七歲正月乙酉公自右諫議大夫參知政事除資政殿學士知邠州兼陜西四路縁邊安撫使可賜推誠保德功臣有謝授邠州表邠州謝上表有祭韓少傅文二月癸卯公請以新建細腰城隷原州從之有邠州建學記有論復併縣劄子閠五月有祭環州种染院文八月有祭陜府王待制文自公與韓琦出使䜛者益甚兩人在朝所施爲亦稍沮止獨杜衍左右之上頗惑焉公愈不自安因奏乞罷政事上欲聽其請章得象謂公素有虚名今一請遽罷恐天下謂陛下輕黜賢臣不若且賜不允若即有謝表則是挾詐要君乃可罷也上從之公果捧表謝上愈信得象言於是富弼自河北還將及國門右正言錢明逸希得象等意言弼過又言公去年受命宣撫河東陜西聞有詔戒勵朋黨心懼彰露稱疾乞醫纔見朝廷别無行遣遂拜章乞罷政事知邠州欲固巳位以弭人言欺詐之迹甚明乞早廢黜以安天下之心使姦詐不敢效尤忠實得以自立明逸䟽奏即降詔罷公及弼并鎻學士院草制罷衍十一月詔以邊事寧息盗賊衰止罷公陜西四路安撫使并罷富弼安撫其實䜛者謂石介謀亂弼將舉一路兵應之故也公先引疾求解邊任遂改知鄧州有陳乞鄧州表是月乙未轉給事中資政殿學士知鄧州謝轉給事中知鄧州表鄧州謝上表六年丙戌年五十八歲秋七月丙戌子純粹生公在鄧是年鄧人賈内翰黯以狀元及苐歸郷謁公願受教公曰君不憂不顯惟不欺二字可終身行之内翰不忘其言毎語人曰吾得於范公者平生用之不盡也二月有祭謝希深舎人文九月十五日作岳陽樓記中有先天下之憂而憂後天下之樂而樂之句蓋公平日允蹈之言也有依韻酬荅邠州通判王稷詩依韻酬太傅張相公見贈詩依韻酬李光化見寄詩依韻荅王源政憶百花洲詩中元夜百花洲詩覧秀亭詩合提刑張太傳甞新醖詩喜雪詩資政殿學士謚忠獻范公雍墓誌銘依韻和安陸孫司諫詩送河東提刑張太博詩种世衡墓誌銘七年丁亥年五十九歲公在鄧二月有祭龍圖楊給事文有祭尹師魯舎人文按尺牘載與韓魏公書略云師魯去赴均州時巳覺疾作至均寢食或進或退僅百餘日得提刑司文字舁疾來鄧以存殁見托至五日而啓手足苦痛苦痛至終不亂初相見時却且着灸不談後事疾勢漸危遂中夜詣驛㸔他告伊云足下平生節行用心待與韓公歐陽公各做文字垂于不朽他舉手叩頭又告伊云待與諸公分俸贍家不令失所他舉手云渭州有二兒子即就枕更不他語來日與趙學士㸔他云夜來示諭並記得巳相别矣顧家人云我自了當不復管汝略無憂戚又兩日猶能扶行忽索灌漱訖憑案而化衆人無不悲泣無不欽服其明也别趙學士云不怛化别韓倅云少年樹德别賈狀元云亦無鬼神亦無煩惱尋常於兒女多愛不謂能了了如此又云巳去安州蘇之翰處作行狀待送永叔作墓誌某不敢作恐知當年事不備故也却待作文集序明公可與他作墓表也十一月有祭故相太傳李侍中文有乞召還王洙及就遷職任事劄子八年戊子年六十歲春正月丙寅徙知荆南府鄧人愛之遮使者請留公亦願留從其請也有謝依舊知鄧州表公守鄧凡三歲求知杭州二月有十六羅漢因果識見頌序皇祐元年巳丑年六十一歲正月乙卯公知杭州有杭州謝上表公守杭日林逋隱孤山公過其廬贈詩曰巢由不願仕堯舜豈遺人風俗因君厚文章到老醇其激賞如此與人約訪林處士阻兩見寄詩和沈書記同訪林處士詩時孫甫爲兩淛轉運公以大臣或便宜行事孫曰范公貴人也吾屈於此不得不伸於彼由是一切繩以法而常以監司自處范公遇之無倦色公遇范公不少下退而未甞不稱其賢也按文集天竺山日觀大師塔記云皇祐元年余至錢塘正月帝御便殿訪近臣以俻禦之䇿權三司使葉清臣言詔問輔弼之能今爲社稷之固者莫如公又謂公深練軍政公在杭有過餘杭白塔寺詩西湖筵上贈胡侍郎詩和僧湖居五絶和運使舎人觀潮二首和蘇州蔣宻學詩并謝賜鳳茶表和蘇之翰對雪詩和并州鄭宣徽見寄二首秋七月癸卯除尚書禮部侍郎舉張昪自代云伏見工部郎中集賢殿修撰知潤州張昪筮仕以來清介自立精思劇論有憂天下之心純誠直道無讓古人之節朝野推服臣所不如乞回臣所授以允公論十月庚申朔有祭葉翰林文置義莊于蘇州按言行録云公在杭子弟以公有退志乘間請治弟洛陽樹園圃以爲逸老之地公曰人茍有道義之樂形骸可外况居室乎吾今年踰六十生且無幾乃謀治苐樹園圃顧何待而居乎吾之所患在位高而艱退不患退而無居也且西都士大夫園林相望爲主人者莫得常遊而誰獨障吾㳺者豈必有諸巳而後爲樂耶俸賜之餘宜以賙宗族若曹遵吾言毋以爲慮又按程氏遺書云橫渠張先生言有欲爲公買緑野堂公不肯曰在唐如晉公者誰可尊也一旦取其物而有之如何得安寧使耕壞及他人有之巳則不可取也二年庚寅年六十二歲春有叚君墓表兵部貟外郎王君墓表公在杭轉尚書戸部侍郎依前職任有謝表按沈存中筆談云皇祐二年吳中大饑殍殣枕路是時公領浙西發粟募民存餉爲術甚備吳民喜競渡好爲佛事乃縱民競渡太守日出宴于湖上自春至夏居民空巷出遊又召諸寺主首諭以饑歲工價至賤可大興土木於是諸寺主作鼎興又新倉厫吏舎日役千夫監司奏劾杭州不恤荒政嬉遊不節及公私興造傷耗民力公乃自條叙所以宴遊興造皆欲以有餘之財以惠貧者貿易飲食工技服力之人仰食於公私者日毋慮數萬人荒政之施莫此爲大是歲兩浙惟杭州晏然民不流徙皆公之惠也歲饑發司農之粟募民興利近歲遂著爲令既巳恤饑因之以成就民利此先王之羙澤也八月建昌軍草澤李覯撰明堂圖議公奏之授試太學助教覯能研精經訓㑹同大義按而視之可以興制今朝廷行此盛禮千載一辰斯人之學上契聖作謹具録以進庻討論之際有所𥙷助詔送兩制㸔詳稱其學業優博有舉李宗昜向約堪任清要狀有乞召杜衍等俻明堂老更表進故朱寀所撰春秋文字狀冬十一月有兄中舎墓銘三年辛卯年六十三歲是歲公以戶部侍郎知青州充淄濰等州安撫使有貴州謝上表正月八日有續家譜序按尺牘載與韓魏公書云某上巳日方至青社繼富公之後庻事有倫守之弗墜但歲饑物貴河朔流民尚在村落因湏救濟又按言行録載東齋記事云公鎮青社㑹河朔艱食青之輿賦博州置納塲青民大患輦置之苦公戒民納價毎斗三鍰納鈔與之以書與博守遣官輓金詣愽坐倉以倍價招之賫巨牓數道介其境則張之且戒曰郡不假廩寄僧舎可也至則貿者山積不五日遂足而愽斛亦衍斛金尚餘數千緡按等差給還之青民因立像祠焉有舉彭乘自代狀舉張諷李厚充青州職官狀正月有祭杜待制文三月有太子中舎上官君墓銘有陳乞頴亳一郡狀冬十有一月戊申有寫黃素伯夷頌寄京西轉運蘇才翁文潞公杜祁公富鄭公等一時名人題䟦上書言古者内置大夫士助天子司察天下之政外置岳牧方伯刺史觀察使採訪使統領諸侯守宰以分理之今轉運按察使古之岳牧方伯知州知縣古之諸侯守宰之任也與陛下共理天下者爲守宰最要耳比年以來不知擇選一切以例除之以一縣觀一州一州觀一路一路觀天下率皆如此其間縱有良吏百無一二使天下賦稅不得均獄訟不得平水旱不得救盗賊不得除民既無吿訴必生愁怨救之之術莫若守宰得人若守脩政舉則天下自無事矣四年壬辰年六十四春正月戊午徙知頴州夏五月二十日至徐州薨先是公在青未盈歲以疾徙知頴州詔自青州徙行于徐州有遺表歴官推誠保德功臣資政殿學士金紫光禄大夫尚書戸部侍郎護軍汝南郡開國公食邑二千三百戸食實封六百戶贈兵部尙書謚文正累贈太師中書令兼尚書令追封楚國公十二月壬申葬于河南洛陽縣尹樊里之萬安山下初公病上嘗遣使賜藥存問既卒嗟悼者久之輟朝一日以其遺表無所請遣使就問其家所欲既葬上親篆其碑曰褒賢之碑勑賜西京褒賢顯忠禪寺蘇州天平山白雲禪寺奉公香火賜忠烈廟額爲政忠厚所至有恩邠慶二州之民與屬羌皆畫像立生祠及其卒也羌酋人數百爲舉哀佛寺哭之如父三日而去宣和五年慶帥宇文虚中奏請賜忠烈廟額慶陽平江府凡一十九處成都府學以上並有公祠朝㫖所在監司郡守學官歲時詣祭祀欽宗皇帝靖康元年丙午二月壬寅詔褒贈近世名臣故任資政殿學士贈太師追封楚國公謚文正范某可特追封魏國公范文正公年譜, WYG: ''}
