  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_033-1a01}
  - {type: variant, offset: 0, length: 591, content: 范文正公年譜後學時兆文校正後學黄姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校公昔逺祖博士范滂爲清詔使裔孫履氷爲唐丞相鸞臺鳳閣平章事世居河内四世祖上柱國隋懿宗朝咸通二年任幽州良郷主簿誥書猶存至十一年遷處州麗水縣丞一支渡江中原亂離不克歸子孫遂爲中吳人曾祖夢齡任吳越中呉節度判官宋贈太師徐國公祖賛時仕吳越九歲童子出身終祕書監宋贈太師唐國公父墉從錢俶歸宋任武寧軍節度掌書記武寧軍即徐州封太師周國公文正公即書記第三子也諱仲淹字希文端拱二年已丑八月癸酉二日丁丑以辛丑時生二歲而孤母夫人謝氏貧無依再適淄州長山朱氏亦以朱爲姓名說上長白山僧舎脩學醴泉寺内有祠後居南都郡庠五年大通六經之㫖爲文章論說必本於仁義孝弟忠信祥苻八年年二十七歳舉進士禮部選第一遂中乙科初任廣德軍司理後迎侍母夫人至姑蘇欲還范姓而族人有難之者公堅請云止欲歸本姓他無所覬始許焉至天禧元年爲亳州節度推官始奏復范姓其後名益大位益顯嘗語諸子弟曰吾吳中宗族甚衆於吾固有親踈然以吾祖宗視之則均是子孫固無親踈也吾安得不䘏其饑寒哉且自祖宗來積德百餘年而始發於吾得至大官若獨享富貴而不䘏宗族異日何以見祖宗於地下亦何以入家廟乎故恩例俸賜甞均族人盡以俸餘買田於蘇州號曰義莊贍飬宗族無間親踈日有食歲有衣嫁娶凶葬咸有贍給公爲人外和内剛樂善汎愛䘮母時尚貧終身非賔客食不重肉臨財樂施意豁如也及退而視其私妻子僅給衣食其於富貴貧賤毁譽歡戚不一動其心而慨然有, WYG: ''}
