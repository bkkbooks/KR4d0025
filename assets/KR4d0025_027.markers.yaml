  - {type: variant, offset: 1209, length: 3646, content: 書知彼平善三嫂必巳安好也諸兒子長進在此如常十九郞雖未復舊亦漸減退餘各修學南陽清簡極好養性幸甚幸甚浙中諸親各安不知舉主幾人更在愼末防微如今易得謗議但固窮而前不銷預圖須過得惟省儉是妙乞保重某再拜中舍三哥前時純仁去不及冩書今日錢主簿來領書知尊候安和不委六哥屯田所患進退憂心憂心須是多灸仍服好藥方可圖安請切切勸他恐氣血極微則灸亦不及也純仁等勿令飲酒大底已被酒成狂疾餘者宜戒之戒之置田起屋事巳令純仁上聞時寒乞保重某再拜昨日屈德來領書知爲季家孩兒病却總未來亦曾思寒食上墳三月半葬事須合照管亦當奔波却去即費力也事畢却請早來到熱時轉難爲今令魏祐押職田錢并影堂材植去及帶匠人惟石碇未知彼中易得否必然便可了當仍請三月半葬事夜作水陸齋一會别書牌子供養自家祖宗先亡并陳家墳塋切近亦召伯陽到寺排供養及六屯田家祖先並同其餘合供養神明並依水陸本法也更有合支用處並令魏祐應副更知諸親属歲荒不易旋糴米二十石去請便俵散其逐月供米者却不銷得杜大家曽供米否亦每月與一石酒亦送去隨米支送知尊候巳安更請倍加將息將息愼勿動臟腑也二屯田不及書口誦將此呈他陳家是兩世外家因水陸之會又墳塋隣並供養不妨陳長官必巳行更不寫書某再拜節推三哥得書知尊候萬福兼知九姐出適深喜深喜得李郞書甚有事業不知在彼或巳省覲馬袐丞亦有書來鄉中多不熟地卑使然或囬換得數頃高田常熟者則婚嫁有所指望特於天平墳頭立一碑誌請㝷訪祖宗文字及於他人處訪問且於諸房更求先伐官吿文書并三哥自傳聞事亦旋旋抄來或聞祖先元是藍田人不知記否此一事切在心尋去訪十二姑亦必有記得事保重保重某再拜節推三哥近領親教伏承起居萬福兼知巳納二壻尤增慶喜津送不易必是有債也候稍那得即去奉助寛心寛心在此幼累如常只是十九郞久病巳減八九猶未復舊二郞三郞並勤修學日立功課彼中兒男切須令苦學勿使因循須候有事業成人方與恩澤文字兼今後不亂奏人逐房各巳有恩澤須是有事業可以入官方與奏薦也請吿諭之未由拜覲乞加保重某再拜中舍三哥夜來王興至得書知尊候巳安甚解憂心却聞杜大病亡苦痛苦痛不幸不幸所支錢與了當䘮事甚是甚是孤幼如何安存更請多方用心苦苦莊契恐又出限餘錢且據數稅却自家置少義田不可却令漏稅所退絹巳換得好者今將去聞夏稅倚閣如戶等該得即將絹賣來納田契稅錢如不該得即且納稅田契確實用多少錢請細劄取來今令人去候所印契便與了却付去人來酷熱乞保重保重某再拜急足囘領書承起居萬福骨肉並安此中如常且勉力爲之過毀過譽無以防也知蘇湖水患柰何柰何三兩日來稍晴彼中還晴否晩稻雖可種亦須水退方能施功見使命自江南來一例大水饒州市中行船睦州樓居猶不能免向去民力必困憂心憂心純義以下並修學純禮又受正字媿幸媿幸酷暑乞保重保重某再拜監簿三哥近已有書去純佑到領得急足囘來書並知動止又承在明州權邑骨肉並安在此如常遇發兵次不及云云乞保重七新婦親情請聞于鄭資政宅上他妷女也今年郊天且奏常州四哥老兄弟中别無人又長善與忠宣公純仁書來知家中平善我病多日近來減退不用憂也六伯巳下三郞四郎朱十二郞各傳語李監簿累得書當時特舉薦受恩澤不是䕃人今須奏去理會乞特注官也鄭資政書來云今年奏李七郞作李通名字所以却奏聶舅今田居安去本房問如鄭資政不曾奏李通或奏不得即改聶升熟狀作奏妻姪李通仍速報來南郊恩例但勘下曆子未要請出先筭欠多少馬價并來年聖節進奉並當進官庫准備外更有鄭資政諸大官先借過錢物要還他純仁程試長進更學書札不具吾報張祕丞傳語頻得書三郞不得慢易勤學勤學李八九秀才照管王秀才計安與九國博九國博與純仁着分㭊事易所謂憂悔吝者存乎介是也雖纎微亦能使人憂悔今更有文字發遣祁正歸尉氏及屈德歸州恐偶然作過入府又索分㭊也請曉之白魚十五斤漢江所出請檢收七哥更不敢留與中舍二子三監簿四太祝三郞四郞諸骨肉必安吉莊上如何各宜節儉頻照管西山墳塋不知十叔受得甚處官汝等但小心有鄕曲之譽可以理民可以守廉者方敢奏薦須陪渉鄕中有行止人九師計安五嫂房下并諸親一一伸意各相照燭照燭不具叔押報三郞官人昨得書知在官平善此中亦如常只是純佑未全安汝守官處小心不得欺事與同官和睦多禮有事即與同官議莫與公人商量莫縱鄕親來部下興販自家且一向清心做官莫營私利汝看老叔自來如何還曾營私否自家好家門各爲好事以光祖宗頻寄書來言彼動靜將息不具叔押報新婦孩兒各安吉十叔房下如何弟兄還漸識好惡否與朱氏秀才三哥久不得信計想平善刑部誌文巳撰得請星夜差人先賫去上石亦可及得其間增減簽出處子細塡入仍請與呂君秀才商量所示及行狀必呂公之筆大好詳備仰之仰之某相次受外任差遣必徑去與足下同送五娘兒徃杜宅近屯田移得知廣濟軍五娘子衣裝不要典賣永城莊巳丁寧王郞他或要得十四郞將來且依王宅姐姐處足下則須有修學處也寛心寛心某正月末必出京或徃永城亦須早去凝寒好將息五學究並乞伸懇不及書人囘子細示及下處並起居宅上井五哥大郞宅中骨肉劉師姨計安某頓首秀才三哥自别並不領書札曾因石十人力行有書必然可達八貟外五學究大郞宅上各計安吉不及一一修染賢子莊上如何還有歸着否韓貟外歸來未在此甚好修學見有講席并文會久望不至未知厥由亦甚憂彼中十四郞長進切好看承杜宅五娘子王郞在陳州曾相見否因人無恡示字好將息將息若欲來修學請進奏院遞中惠書相報即因便人去相接某蒙恩改郡今月十七日至丹陽禮上一行平善六嬸神櫬且安瓜洲寺中悲感悲感七哥骨肉上下各計安甚時來得相見骨肉聚會此最幸也幸也山東九郞得解在京願伊有成有成書言翁翁葬事只要就長山候見議之嚴評事石道正法華各伸意許家弟兄多在京乍到不及云云將息將息七哥官人大郞來領書知公外安寧甚慰思渴此中無事只𬒳純佑久病未安不住請醫人調理心悶可知大郞來此旣不修學又無事與他勾當必難久住異姓恩澤卒難得便次陳乞兼山東復州並未曾奏得想悉之也親事不易且勉旃勉旃近有書與許運判問彼中動靜居官臨滿直須小心廉㓗稍有點汚則晩年饑寒可憂也更防兒男不識好惡多愛多愛三郞秀才前日專到寧陵奉謁不遇爲某暫來南京便欲與賢同送五娘子徃廣濟杜宅星夜候賢歸千萬千萬諸事候却囘勾當且如今了却此事兼要奉見商量向去次弟千萬星夜速來切切今專差人去不宣某咨上三哥秀才三哥秀才自别傾渴傾渴雅况何如永城莊田曁寧陵家計作何擘畫八叔員外五哥應相助也大郞宅上安吉王郞家應徃陳州襄邑卜居亦甚相近還照管得否足下夲約來此修學還遂志否如果起得但見本府進奏官即知在此公人客旅便次八九程可逹更宜從長呂秀才託伸意或起離未得即師問呂君亦可日新衰門如此寧不憂懼永城誌文立碣亦可向西屢見也秋凉希多愛多愛四郞看恤伊早令讀書因人千萬示信不宣某咨于朱姪秀才台座某啓自别累得書知動止清勝又審向秋召試前賀前賀門戸再起獨在吾仁京師交遊愼於高議不同當言責之地也且温習文字清心潔行以自樹立平生之稱當見大節不必竊論曲直取小名招大悔矣希多愛多愛不宣某上直講三哥之右宅眷賢弟各計安京師少徃還凡見利處便須思患老夫屢經風波惟能忍窮故得免禍孫先生蔡十四見希致懇爲他在宮邸不欲發書悉之悉之時請惠字以慰傾企傾企見子亦漸安某上大參到郡必受知也惟勤學奉公勿憂前路愼無好書札有文性勿小其志也如長者出麾豈不能安一弟使專於學耶或來修學亦好一如在陳州時常有學徒三五人日有功課凝寒多愛多愛不宣某上集賢學士王郞房下倍加存恤勿以婦人之言漸生離隔此人家之常患也吳郞在此巳轉殿省純佑尚未安純仁得解猶未歸賢弟計安請寛心將息雖清貧但身安爲重家間苦淡士之常也省去冗口可矣足下或未能發得書請賢弟寫書相報相報請多着灸看道書見壽而康者問其所以則有所得矣某啓近遞中得書備悉雅意朝請外杜門著書何大於此此中亦如常但有答書之苦時或有相干作碑誌由某不受潤筆引惹故也或是相知不能違阻今有故胡少卿家來求作碑巳勉強撰得恐更被人寫壞三哥無事時與寫取并篆額可也秋冷多愛多愛不宣某白學士仁姪裏面有不是處便與改正空缺處更消息凡言公處請與只空㝡先一箇其後公字莫不銷空否請相度時希惠字以慰傾企承㫖應時相見弟兄俱與致意無事不欲奉書也吾知青春試期在近少岀入勤筆硯勿預議論且繼續衰構力微不足以助國家之急相勉苟有心襟待之非晩某􅖴久不致懇得兒子書知體理爽和云曾詣問卽不見賔客或聞神思驚悸近日調攝漸安否屢曾咨聞以足下起發衰門宜愛重以副先德之心何致多疾極奉憂得萬萬自愛不宣某致干學士族家之右某到忻代病嗽醫藥過凉傷及下臟淋痔併作日夜苦楚于今稍間而未止逺承誨問爲慰極多所議南郊異姓之恩巳發却多日爲妻舅聶升十口日有溝壑之憂且逐急處行也吾仁青春巳在館殿三五年間必有異恩於一第不足爲憂此必然之說相國下車頼長者博文多識可日奉談燕多愛多愛不宣某上潁倅學士三姪貴眷郎娘各萬福切寛中自愛人生憂多樂少惟自適爲好此間踈懶成性日在池塘或至歡醉亦依舊行氣不廢且遣疾耳滕七有事方得蘇臺好處爲伊增喜遽聞哀訃苦事苦事同年中又失一相愛者悲涕悲涕巳差人去照管南京王倅同年希伸意報着提刑司體量不知如何與指使魏佑偃師七郞抛却母必是大段不易西京莊課并梨錢内且速那錢十貫去如得工夫即暫到偃師看伊要知次第彼中如無存濟即開春教來此修學如且要守墳持孝即待支莊課供贍一切取伊穩便莊上多覔下桑栽開春便令人勾當栽植尹家宅上計平善到彼巳支料錢兩貫去正月起請傳語尹家兄弟不及寫書將此呈他無妨汝到陽翟了早囘寒冷不易范文正公尺牘卷上, WYG: ''}
