  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_027-1a01}
  - {type: variant, offset: 0, length: 1216, content: 范文正公尺牘卷上後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校家書與中舍某拜上三哥監簿伏惟尊體起居萬福某近蒙制恩擢貳樞府此蓋祖宗之慶下及家世累讓不允今月二日巳簽署勾當至十二日蒙恩改參大政尋面陳利害巳得旨依讓且在西府相次必岀巡邊不知甚日入京相見小三郎巳就聖節奏得試監簿諸骨肉各安吉相次專差人去存問也互相戒約勿煩州縣如輙興詞訟必奏乞深行請三哥指揮兒姪知委保重保重某再拜中舍三哥今日得張祠部書言二十九日曾相看三哥來見精神不耗其日晩喫粥數匙并下藥兩服必然是實縁三哥此病因被二壻煩惱遂成咽塞更多酒傷着脾胃復可喫食致此吐逆今旣病深又憂家及顧兒女轉更生氣何由得安但請思之千古聖賢不能免生死不能管後事一身從無中來却歸無中去誰是親踈誰能主宰旣無奈何即放心逍遥任委來徃如此斷了旣心氣漸順五臟亦和藥方有效食方有味也只如安樂人忽有憂事便喫食不下何况久病更憂生死更憂身後乃在大怖中飮食安得可下請寛心將息將息今送關都官服火丹砂并橘皮散去切宜服之服之某再拜中舎三哥近想尊候萬福此中如常六屯田宅上哀苦切與照燭又有襄邑李殿直家是馬太博家表親言被火災後饑寒所逼更無所歸人在患難中又須與救今許伊且徃蘇州居住一子讀書可教小兒學在此逐月支錢一貫就彼課米月支一石或親戚官貟令教小兒亦可養三五口也如子弟不調或在襄邑作過逃來即發遣他去恐相負累請子細相度保重保重某拜聞中舎三哥急足還領書承尊候巳安只是少力宜調飲食不得喫濕麵脾惡濕亦少喫羮湯宜食焦餅蒸餅軟飯道書云宜食輕乾物蓋益脾也今送米三石酒十缾去每事寛心在此公田不損盡將置義田請選好者典買取更託陳六一哥用心此事難成而易因循切切屯田言須是開春請更相度相度某再拜人囘領書知尊候萬福水災人疫奈何奈何家中用术入井中或水甕中浸之充日用其水辟瘟以竹籃子盛之以篾釣却貴不沉也但傳與人甚妙所置田如何若置得一莊須是高田則久遠易爲照管若在木瀆側近則只典買田段亦得影堂在此巳買好木事造只三小間但貴堅久也彼中有屋賣時請商量要修起一位宅上作式様亦須看木色要得堅牢純義堅要歸如未來即送州學恐歇却則又無成時寒保重保重某再拜中舍三哥昨晚見與小監簿書知體候不安不知因何也但氣海着灸三百壯即安某在南陽灸得五百至今得力水災無可柰何杭州只是衝注别無積水請省憂在此須得分數公田可以接助但寛心將息秋凉減骨肉來此更削去人力即漸累輕易爲過也乞保重保重或來此就醫亦好朱七漸安累曾危困要知之某再拜中舍三哥得書知尊候巳安脾氣曾傷宜加意將息也某風氣已退有一二分見用藥不止即無所妨請不憂醫人看候皆言客風在表耳所言冗僕巳去惟船子留三兩人勾當其船子若日有所資又不宜破貨也秋氣漸凉乞保重保重某再拜中舍三哥昨日領書承常州四哥監簿六哥屯田併亡伏增悲苦痛切之至奈何奈何切勸二屯田少哭泣進粥食不易不易純仁才到今却令七郞與純禮同去致祭在此亦齋祭次諸不及言乞保重保重七郎便令到常州請遣人同去恐常州房頭不易時待支俸錢兩貫去常州二子名并弟幾與劄來某再拜節推三哥伏想起居萬福近得運使李同, WYG: ''}
