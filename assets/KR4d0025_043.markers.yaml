  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_043-1a01}
  - {type: variant, offset: 0, length: 2169, content: 祭文富鄭公維年月日貝銜富某謹遣左教練使陳節詣徐州以清酌庶羞之奠恭祭于故資政殿學士戶部侍郎范公六丈之靈嗚呼公乎天之生公實將濟此下民乎功乎未宣何遽奪之而不踐其𥘉乎天乎忍爲是而不自信之甚乎不然何賦公道大德具而罔克終其施乎某愚不文而不能盡揚公之懿聊書其槪以寓其悲公幼孤無依零丁自生徒歩逰學至于成名奔走銓選益困于行僅改一秩卿寺之丞有宗公晏薦公文章典校圗籍舘閣之光獻后誕節姦謀請皇下率百辟北靣奉觴公聞駭走出䟽于囊雖示民孝君入臣行願得元宰外行故常帝首宗之内宴是將衆爲公慓公膽益張于時非公大節幾忘並悟獻姦遄逋于外獻旣徃矣諌垣召拜夙夜蹇蹇益用不怠帝怒椒掖講從廢殛公率諸僚御史協力伏閤而諌氣直寰域坐是謫去中外失色累易郡璽召尹上京尹職非志志安朝廷連柱柄臣又竄南征忠亮信特天下皆傾有夏不軌西鄙用兵遽召起公來撫方城大將失律関陜震驚延是孤危賊謂巳物命者必辭公獨請之人惜公去公馬星馳居未席暖賊遁而歸賊措無所羽書見詒公比尊君不欲中報手爲荅書禍福以告旣驛以聞上覽而喜耆明賛云可附于史昧者詆媒嫉其出已胡然守邊宜賜以死常憂邇臣勉徇所啟徙公内藩物論麻起俄建帥旗揔護諸將帝心思賢天下是訪擢貳樞筦復叅政釣二府交入萬㣲日新不設機械不作崖岸坦坦一心惟道之踐讒間得行孤立誰辨因其岀撫遂留豳方穰下得請旋易于杭又易青社曽未盈歲恙起不測又求潁水及徐不行記友以死嗚呼公止於是而巳乎昔某𥘉冠識公海陵顧我譽我謂必有成我稔公德亦巳服膺自是相知莫我公比一氣殊息同心異體始未聞道公實告之未知學文公實教之肇復荆舉我憚大科公實激之旣舉而仕政則未諭公實飭之公在内史我陪宻幄得同四輔之儀公撫陜西我撫河北又分三靣之寄公旣罷去我亦随逝從古罪人以于魑魅公我明時咸得善地自此蠱孽毀訾如沸必寘其死以快其志公云聖賢鮮不如是出䖏以道俯仰無愧彼姦伊何其若天意我聞公說釋然以寜旣而呶呶果不復行於是相朂以忠相勸以義報主之心死而後巳嗚呼哀哉公今死矣忠義已矣萬不仰一齎恨多矣世無哲人吾道窮矣我雖苟活與死均矣嗚呼哀哉師友僚類殆三十年一日棄我悲何可存我守蔡印外薨彭門我去無所公來巳魂我慟幾絶公聞不聞走使持奠作文叙冤嗚呼哀哉尚饗歐陽文忠公月日廬陵歐陽脩謹以清酌庶羞之奠致祭于故資政殿學士尚書戶部侍郎范文正公之靈曰嗚呼公乎學古居今持方入圎丘軻之艱其道則然公曰彼惡公爲好訐公曰彼善公爲樹朋公所勇爲公則躁進公有退讓公爲近名䜛人之言其何可聽先事而斥羣譏衆排有事而思雖仇謂材毀不吾傷譽不吾喜進退有儀夷行險止嗚呼公乎舉世之善誰非公徒䜛人實多公志不舒善不勝惡豈其然乎成難毀易理又然歟嗚呼公乎欲壊其棟先摧桷榱傾巢破鷇披折傍枝害一損百人誰不罹誰爲黨論是不仁哉嗚呼公乎易名謚行君子之榮生也何毁沒也何稱好死惡生殆非人情豈其生有所嫉而死無所爭自公云亡謗不待辨愈久愈明由今可見始屈終伸公其無恨冩懐平生寓此薄奠舒王嗚呼我公一世之師由𥘉迄終名節無疵明肅之盛身危志殖瑶華失位又随以斥治功亟聞尹帝之都閉姦興良稚子歌呼赫赫之家萬首俯趨獨繩其私以走江湖士爭留公蹈禍不憟有危其辭謁與俱出風俗之衰駭正怡邪蹇蹇我𥘉人以疑嗟力行不囘慕者興起儒先酋酋以節相侈公之在貶愈勇爲忠稽前引古誼不營躬外更三州施有餘澤如釃河江以灌㝷尺宿贓自解不以刑加猾盜涵仁終老無邪講藝弦歌慕來千里溝川障澤田桑有喜戎孽猘狂敢齮我疆鑄印刻符公屏一方取將於伍後常名顯收士至佐維邦之彦聲之所加虜不敢瀕以其餘威走敵完鄰昔也如至瘡痍滿道藥之飬之内外完好旣其無爲飲酒笑歌百城晏眠吏士委蛇上嘉曰材以副樞宻稽首辭讓至于六七遂叅宰相釐我典常扶賢賛傑亂冗除荒官吏於朝士變於鄕百治目修偷墮勉彊彼閼不遂歸傾帝測卒屏于外身屯道塞謂宜苟老尚有以爲神乎孰忍使至於斯盖公之才猶不盡世肆其經綸公孰與計自公之貴廐庫逾空夷其色辭傲訐以容化于妾婦不靡珠玉翼翼公子弊綈惡粟閔死憐窮惟是之奢孤女以嫁男成厥家孰堙于深孰鍥乎厚其傳甚詳以法永久碩人今亡邦國之憂矧鄙不肖辱公知尤承凶萬里不徃而留涕哭馳辭以賛醪羞韓忠獻公維某年某月某朔某日具官某謹以清酌庶羞之奠致祭于資政范公之靈嗚呼哀哉上天生公固爲吾宋以堯舜佐吾君兮旣忘身而忠國以成康期吾俗兮又竭思而仁衆升賛樞宰孰云不用殿摭藩服孰云不重何太平之䇿噤而不得施兮委經綸於一夢此一人所震嗟而天下之所深痛豈止乎平生之交得計音而長慟嗚呼哀哉㒒始立朝接公尚䟱道同氣合千里相符忝帥於西乃與公俱協心畢力誓翦兇渠義切王室情均友于雖千艱而萬險仗忠信而如無㒒之望公公驥㒒駑十駕未逮敢擬齊驅人胡不辯遂連公呼自顧無有愧常汗珠繄公是託終履夷途叛羗來附一節同趨與公並命參翊萬樞凡有大事爲國逺圗爭而後巳歡言如初指之爲黨果如是乎道卒與于時戾謂公迂而僕愚相縁補外謗毀﨑嶇感公之知謂死不渝嗚呼哀哉定之去青不遐驛置自公之東信問時至愛顧益深交朋莫二蠅頭細書以時爲寄珠貝累幅氣嚴法備自云矍鑠以將厚意謂公康寜曰保純粹忽以疾聞求醫徃視瞿然遣使候公監寐㑹公得潁肩輿赴治尚煩公荅親筆數字意公少痊粗以爲慰方具書藥詣公所憇得元䂓報云公永逝讀之駭然手足具廢氣塡滿膺食不知味惟公事君之大端固始終而一致有生即有死兮雖聖智其安避所惜者國家待賢而後乂天胡不仁而不愸遺嗚呼哀哉公之所存履䕫蹈卨高文竒謀大忠偉節充塞宇宙照曜日月前不愧于古人後可師于來哲固有良史直書海内公說亘億萬世不可磨滅此爲天而爲壽兮信識者之能别豈於一奠之間可盡公之德烈惟是㝠然而思黙然而悲此生未殞曾無巳時公乎公乎知乎不知祭文終, WYG: 述}
