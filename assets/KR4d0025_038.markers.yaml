  - {type: variant, offset: 2241, length: 1636, content: 聞於中外天下賢士爭相稱慕當時奸臣誣以朋黨尤難辯明近日陛下擢此數人並在兩府察其臨事可以辯也此四人者可謂公正之賢今范仲淹四路之任亦不輕矣願陛下拒絕羣謗委信不疑使盡其所爲猶有禆𥙷長編慶曆四年八月辛卯初命叅政賈昌朝領天下農田范仲淹領刑法事有利害其悉條上初公建議請以三司司農審官流内銓三班院國子監太常刑院審刑大理羣牧殿前馬歩軍司各委輔臣兼判臣願自領兵賦之軄如其無𥙷請先黜降章得象等皆以爲不可久之乃降是命九朝通畧慶曆元年春正月朝廷旣用韓琦所畫攻䇿先戒師期知延州范仲淹言正月内起兵塞外雨雪大寒暴露僵仆使賊乘之所傷必衆賊界春煖則馬痩人飢其勢易制及可擾其耕種之務縱岀師無大獲亦不至有他虞又言鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷存此一路令諸將勒兵嚴俻賊至則擊未行討伐容臣示以恩信歳時之間或可招納苟歲月無效遂舉重兵取綏宥二州擇其要害而㨿之屯兵營田作持久之計如此則茶山橫山蕃漢人戸可以招降則是去西賊之一臂也戊午詔從仲淹所請宋朝通鑑公在延州言鄜延路入界北諸路最逺若先脩復城寨即是逺圗乞遣使命令臣督諸將出兵先脩復廢砦别置戍守旣通近蕃界彼或點集人馬朝夕便知大至則閉壘以待隙小至則扼險以制勝公前後凡六奏卒城永平等十二寨蕃漢之民相踵復業宋朝通鑑慶曆間江淮歳漕不給京師乏軍儲樞宻副使范仲淹言國子博士許可元獨倚辦遂擢元淮江兩浙荆湖制置發運判官元日以六路七十二州之粟不能足京師吾不信也至則命瀕江州縣留三月粮悉發之逺近以次相𥙷引千餘艘轉漕而西未幾京師足食長編諫官歐陽脩言韓琦范仲淹久在陜西備諳邊事是朝廷親信委任之人况二臣材識不類常人其所見所言之事不同常式言事者陛下最宜加意訪問使其盡陳西邊事宜合如何䖏置余靖亦奏言范仲淹號爲最曉邊事實録給事中叅知政事王舉正爲禮部侍郎知許州初諫官歐陽脩余靖蔡襄咸言范仲淹有宰輔材不宜局在兵府願以仲淹代之上從其請遂以范仲淹爲叅知政事仲淹曰執政可由諫官而得乎固辭不拜公在陜西戒約諸寨若是賊馬大叚入來更不得出兵迎賊闘敵但且堅守一靣供報部署司并䇿應官貟候逐處軍馬到來方得設謀掩殺如輕易出兵致有輸折其本處官貟並行軍法旣而准樞宻院劄子若賊㓂深入應外城砦除留定防守城池外並須領兵先㨿險要覔便攻擊如敢以防守爲名端坐不出具狀申奏乞行軍法奉聖㫖依奏公言自古用兵本無常勢非可畫一而制也相度夲路諸砦之兵多者千人少者五七百人或三二百人只令防守城池尚慮不足若有蕃賊入冦其寨主監押等縱有勇敢徃徃見小利便出兵與之追逐如西賊以羸兵誘致離砦稍逺别出精兵㫁其歸路砦中無兵即見危䧟假有一將在外去州或逺應援未至如遇賊衆大至多選精銳并攻一處謂之奪險非有驍將血戰勢不能支若外兵先敗則州城之兵望風挫氣必難爲用臣謂應變之機拘以條貫非其利也其所降指揮不敢行下奏議西賊㓂鎭戎軍官軍不利公牒知原州景泰等令六頭項下軍馬㑹合相度㨂選精兵三二千人夜擊蕃砦探候山外賊馬廻時即多出竒兵夜間或侵曉伏截衝擊收救人民仍戒約不得脫剥𬒳虜人户人物公又恐諸將貪功一向急去追􅊞𬒳西賊設伏兵更落姦便又牒景泰等火急多差人捜山探候如探得西賊先有伏兵即便就高駐劄别選敢死之士多作頭項先去掩擊只以收救人民不得貪小功小利再有踈虞以副朝廷之意公又到邠州略示兵勢又出榜永興軍諸州以安関中人心奏議陜西新刺保捷兵士多將本家贍軍田土并已分物業典賣破貨公言上件兵士並是鄕民若向去稍似年高披帶不得即須揀放歸農如今來破貨了莊産將來無可歸投便見失所遂出遍榜曉示諸州軍應新刺保捷兵士如今後乞將夲家贍軍田土已分物業典賣破貨者不得施行其典賣人嚴行㫁遣如將來殘患不堪征役及有年高不任披帶放令歸農者即給與巳分莊田養種并劄與逐䖏令指揮諸縣依此出榜常切覺察施行奏議皇祐元年春上御便殿訪近臣以俻禦之䇿權三司使葉淸臣對日今輔翊之臣抱忠義之深者莫如富弼爲社稷之固者莫如范仲淹又曰諳古今故事者莫如夏竦議論之敏者莫如鄭戩方靣人才方重有紀律者莫如韓琦臨大事能斷者莫如田况剛果無顧避者莫如劉渙宏逺有方畧者莫如孫沔至於帥領偏禆貴能坐運籌策不必親當矢石王德用素有威名范仲淹素練軍政龐籍久經邊任皆其選也長編言行拾遺事録卷第二, WYG: ''}
