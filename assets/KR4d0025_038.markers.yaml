  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_038-1a01}
  - {type: variant, offset: 0, length: 2240, content: 言行拾遺事録卷第二公用人多取氣節闊略細故如孫威敏滕逹道之徒皆深所厚者爲帥府辟置多謫藉未牽叙人或以問公公曰人之有材能無瑕類者自應用於宰相惟實有可用不幸䧟於過失者不因事起之則遂爲廢人世咸多公此意凡軍伍以雜犯降黜者皆改刺龍騎軍石林燕語韓魏公章得象在中書時方天下多弊事且有西鄙之患毎與希文彦國以文字至兩府章公輙閉目不荅彦國憤惋欲悖之希文惜大體不許也魏公别録公常言史稱諸葛亮能用度外人用人者莫不欲盡天下之材當思近巳之好惡而自不知也能用度外人然後能周大事沈括筆談公與韓魏公召爲樞宻副使天下聞之士大夫皆酌酒相賀曰上用韓某范某非惟社稷幸乃天下生民之幸公知開封府明敏通决照事若神毎上殿奏事多陳治亂以開人主歷詆大臣不法者長編慶曆二年仁宗以涇原傷夷欲令范某與文潞公對易遣内侍王懐德喻㫖公謝曰涇原地重臣恐不足以獨當願與韓琦同經略涇原並駐涇州琦兼秦鳯臣兼環慶一則夷夏相安事不亟易二則涇原有警臣與韓琦可合秦鳯環慶之兵掎角而進若秦鳯環慶有警亦可以率涇原之師以相應援三則通脩環州鎮戎諸砦藉此兩路事力必能速有成功四則臣與韓琦日夜建議選練兵士漸復橫山以㫁賊臂不數年間可期平定願詔龐籍兼領環慶以成首尾之勢秦州委文彦博慶州用滕宗諒總之孫沔亦可辦集渭州一武臣足矣朝廷皆從其請實録公言㳂邊逐寨雖有險固只有三二百人何以施爲又城池中多無井水若不量事勢但令堅守徒䧟一城軍民性命自挫軍威無益邊事其在環慶路相度二十三寨内有美泥虐泥大抜城等小砦但只量兵士差百十人把截道路如探得賊馬大叚入冦便令歸側近大城砦内一處防守所貴不致枉䧟軍民人心遂安奏議慶曆二年南郊赦書應因公事受到諸處行軍司馬副使司士文學叅軍仰逐處並具到任月日負犯因依分析聞奏候到令刑部子細勘㑹元犯因依申奏委中書門下别取進止者公因奏言懐才抱藝之人一落散地終身不齒獸窮則變人窮則詐古人之所愼也况今邊事未寜尤宜使過欲乞朝廷催促逐處依赦文分析聞奏乞差近上臣寮就中書定奪元犯情理分作等第又委長吏宻切體量上件人或有材質或有節行亦具申奏所貴負犯之人各期自新不懐幽憤唐張說薦負犯之人充將帥之用其表云活人於死者必舎生而報恩榮人於辱者必盡節而雪聇古猶今也乞朝廷留意實録元昊冦鎭戎軍葛懐敏入保定川砦涇原鈴轄曹英又敗於砦之東北隅懐敏所部人奔駭懐敏爲衆所擁幾躁踐死輿至瓮城乃蘇賊遂圍城懐敏與諸將謀赴鎭戎軍賊㫁其歸路與諸將皆遇害賊遂長驅至渭州初懷敏之除鄜延也范仲淹言其不知兵而又怯懦不可用遂徙涇原卒敗事東都事畧張亢築清塞百勝中候建寜鎭川五砦而麟府之路始通亢復奏以所通特一逕請更築並邊諸柵以安河外議未下㑹契丹渝盟徙知瀛州遷果州團練使夏人與契丹戰河外范公宣撫河東因奏使亢知代州就令揔前議增築事不閱月諸砦成蕃漢歸者數千戸歲减戍卒萬人張亢夲傳公薦舉處士有徐復履尚高潔衍卦氣之法公過潤州問復以衍卦占之今夷無動乎復爲占西邊用兵日月無少差又有郭京者好言兵公數薦之由是二人同召東都事畧張俞上言謂今能詭制北虜散其隂謀使與叛醜疑貳有結國家之心間誘西凉羣夷勿與賊結則虜首可得而天下定矣范仲淹以諌爭而遭擯斥若外狥物望内惟邦夲宜委重抦而授之苟能行此是謂失之東隅收之桒榆也吕夷簡甚重其言張俞傳公以西賊攻塞門砦其寨城池未備兵甲又少部署司不與救應砦主高延德爲賊所擒後放歸漢界遂配逺方公言漢家將率有數人䧟在賊庭俱是苦戰力屈爲賊所擒即非背叛如朝廷貸高延德𬒳以寛恩仍與近邊任使使䧟蕃將率聞之必願昊賊歸順望再見其家或即懐本朝之恩不助賊計如朝廷責其不死來者逺竄其䧟蕃將率更無歸路必懐怨望其中或有助賊爲孽其患不細昔漢中行說傳公主入匈奴說不欲行怨漢乃教單于大爲漢患此人情之可見也乞朝廷留意康定元年九月辛未公以任福等出師攻賊白豹城破之冬十一月又岀師出歸娘谷與夏人戰大敗之西夏夲末公以孫明復居泰山之陽著春秋尊王發㣲得經之本義爲多學者皆以弟子事之公言其道德經術宜在朝廷召拜國子監直講東都事畧韓魏公與公在兵間最乆名重一時人心歸之朝廷倚以爲重故天下稱爲韓范初京師歲遣戍兵脆懦不習勞苦賊常輕之目曰東軍而土兵勁悍善戰琦奏增土兵以抗賊而稍减屯戍内實京師又以籠竿城㨿衝要乞建爲德順軍以蔽蕭關鳴沙之道又建請於鄜延渭三州各以土兵三萬爲一軍軍雖别屯而耳目相通爲一視虜所不俻互岀擣之破其和市屠其種落因以招橫山之人度橫山墮則平夏兵素弱必不能支我下視興靈穴中兔耳章旣上遂與范公定謀益堅而元昊知不可敵歛兵不敢近塞矣東都事畧石水川之失利韓魏公降知秦州公亦以擅荅元昊書降知耀州王堯臣言此兩人天下之選其忠義智勇名動夷狄不宜以小故置之明年葛懐敏敗涇邠以東皆閉壘自守公自將慶州兵捍賊賊始引去仁宗思其言乃以魏公與公爲招討使堯臣曰陛下復用韓某范某幸甚然將不中御兵法也願許以便宜從事仁宗以爲然從之九朝通畧仁宗嘗語張士遜曰人言仲淹嘗欲乞廢朕朕但未見其章䟽耳士遜曰陛下旣未見其章䟽不可以空言加罪望陛下訪之積十數請仁宗曰竟未之見也然爲朕言之多矣士遜力爲辯其不然仁宗意乃觧其後士遜歸老啟國于鄧范公適守鄧州士遜還鄕范公置酒高㑹明日士遜復置㑹揮金甚盛時人榮之張鄧公傳韓魏公曰呂申公以進賢自佐恩歸於巳時士皆岀其門獨范公歐公尹公旋收旋失之終不受其籠絡也魏公别録原州属羌明珠滅臧二族兵數萬與元昊隔絶隣道公聞涇原欲􅊞討之公奏言二族道險不可攻前日高繼嵩已嘗䘮師平時猶懐反側今討之必與賊爲表裏南入原州西擾鎭戎東侵環州邊患未艾也宜因元昊别路大入之際即并兵北取細腰蘆泉爲堡鄣以㫁賊路則二族自安矣而環州鎭戎等處徑道通徹可以忘憂矣後二歳遂築細腰葫蘆諸砦属羗歸服長編慶曆五年三月歐陽公上䟽言公與杜公富公不當罷其略曰昔年范仲淹初以忠言讜, WYG: ''}
