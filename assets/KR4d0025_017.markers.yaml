  - {type: variant, offset: 2461, length: 0, content: '', WYG: 遺表臣聞生必盡忠乃臣節之常守没猶有戀蓋主恩之難忘輒忍須臾之期少舒迫切之懇痛靡自覺辭皆不倫伏念臣生而遂孤少乃從學游心儒術決知聖道之可行結綬仕塗不信賤官之能屈纔脱中銓之冗遽參麗正之榮恥為倖人竊論國體昨自明肅厭代之後陛下奮權之初首承徳音占預諫列念昔執巻惟虞無位之可行况今得君安敢惜身而少避間斥江湖之逺旋塵待從之班大忤貴權幾成廢放屬羌臣之負險顧将列以難裁乃副帥權仍峻使任亦嘗周旋戰備指目地形力援定川之師始期遇敵誓復横山之壤亟逼講和雖㣲必取之功多弭未然之患預中樞之密勿曽不獲辭參大政之幾㣲益難勝責自念驟膺於寵遇固當勉副於倚毗然而事乆敝則人憚於更張功未驗則俗稱於迂闊以進賢援能為樹黨以敦本抑末為近名洎忝二華之行愈増百種之謗上繋天聴終辨衆讒因懇避於鈞衡爰就班於符竹一違近署五易名城雖聖恩曲示於便安奈神道常惡其盈滿請麾上潁蓋遭拙疹之未平息鞍東徐益覺靈醫之不效唯積疴之見困非晩嵗之能支神不在形氣将去幹㝠㝠幽壤倐為長徃之期穆穆清光永絶再瞻之望肝膽摧落精魄飛揚然臣起于諸生歴此華貫雨露澤於數世圭組煥於一門有如臣焉足為榮矣當瞑目以無憾尚貪生而有云蓋念所惜者盛時所眷者明主雖性命之際已能自通然君臣之間豈易忘報但無怛化以竭遺忠敢憚陳於緒言庶無負於沒齒伏望陛下調和六氣㑹聚百祥上承天心下徇人欲明慎刑賞而使之必當精審號令而期於必行尊崇賢良裁抑僥倖制治於未亂納民於大中如此則不獨㣲臣甘從於異物庶令率土永寖於淳風言逐涕零命隨疏殞臣無任惶懼戰惕之至}
