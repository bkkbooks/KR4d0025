  - {type: variant, offset: 0, length: 125, content: 言行拾遺事録卷第一公丁母憂寓居南都晏丞相殊請掌府學公常宿學中訓督有法度勤勞恭謹以身先之夜課諸生讀書寢食皆立時刻徃徃潜至齋舎詗之見有先寢者詰之其人紿云適疲倦暫就枕耳問未寢之時觀何書其人妄對則取書問之不能對罸之岀題使諸生作賦必先自爲之欲知其難易及所當用意, WYG: ''}
