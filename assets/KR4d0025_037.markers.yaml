  - {type: variant, offset: 126, length: 3650, content: 使學者凖以爲法由是四方從學者輻輳宋人以文學有聲名於塲屋朝廷者多其所教也公在淄州長白山僧舎今醴泉寺讀書一夕見白䑕入穴中探之乃銀一甕遂宻掩覆後公貴顯寺僧修造遣人欲求於公但以空書復之初僧怏然失所望及開緘使於某䖏取此蔵僧如公言果得白銀一甕今人徃徃談此事公遣子堯夫到姑蘇般麥五伯斛堯夫時尚少旣還舟次丹陽見石曼卿問寄此久何如曼卿曰兩月矣三䘮在淺土欲塟之而北歸無可謀者堯夫以所載舟麥付之單騎自長蘆捷徑而歸到家拜起侍立久之文正曰東吳見故舊乎曰曼卿爲三䘮未舉留滯丹陽時無郭元振莫可告者文正曰何不以麥舟與之堯夫曰已付之矣公以朱氏長育有恩常思厚報之及貴用南郊所加恩乞贈朱氏父太常博士曁朱氏諸兄弟皆公爲塟之歲别爲饗祭朱氏子弟以公䕃得補官者三人公旣貴常以儉約率家人且戒諸子曰吾貧時與汝母飬吾親汝母躬執㸑而吾親甘㫖未嘗充也今而得厚禄欲以飬親親不在矣汝母又巳蚤世吾所恨者忍令若曹享富貴之樂也公子純仁娶婦將歸或傅婦以羅爲帷幔公聞之不恱曰羅綺豈帷幔之物耶吾家素清儉安得亂吾家法敢持歸吾家當火於庭公遇夜就寢即自計一日食飲奉飬之費及所爲之事果自奉之費與所爲之事相稱則鼾鼻熟寐或不然則終夕不能安眠明日必求所以稱之者公自政府岀歸焚黃捜外庫惟有絹三千疋令掌吏録親戚及閭里知舊自大及小散之皆盡曰宗族鄕黨見我生長㓜學壯仕爲我助喜我何以報之哉公與南都朱某相善朱且病公視之謂公曰某常遇異人得變水銀爲白金術吾子㓜不足傳今以傳君遂以其方并藥贈公公不納强之乃受未嘗啓封後其子寀長公教之義均子弟及宷登弟乃以所封藥并其術還之公爲人作銘文未嘗受遺後作范忠獻銘其子欲以金帛謝拒之乃獻以所畜書畫公悉不收獨留道德經而還戒之曰此先君所蔵世之所寳某竊以爲宗家惜之毋爲人得也公以晏元献薦入舘終身以門生事之後雖名位相亞亦不敢少變慶曆末晏公守宛丘文正過南陽道過特留歡飲數日其書題門狀猶稱門生將别投詩云曾入黃扉陪國論却來絳帳受師資之句聞者皆歎伏有守饒州日有書生甚貧自言平生未嘗一飽時盛行歐陽率更書薦福寺碑墨本直千錢爲具𥿄墨打千本使售于京師𥿄墨巳具一夕雷擊碎其碑時語曰有客打碑來薦福無人騎鶴上楊州東坡作窮措大詩曰一夕雷轟薦福碑向使不撃碎書生享用其有窮乎於此益知吉慶避者非吉慶避之其福德淺薄自不能與吉慶會也讃曰淑慝以類吉凶在人譬如儀鳯不棲棘荆虺蝪之窟豈産珠珎冰雪凝沍寒谷不春一氣所感當識其因韓魏公客有郭注者行年五十未有室家公以待兒與之未及門而注死公爲吏部貟外郎出守時及官歷二府以至于薨凡十年不增一人未嘗易也公言幕府賔客可爲巳師者乃辟之雖朋友亦不可辟蓋爲我敬之爲師則心懐尊奉每事取法於我有益耳公守越戸曹孫居中卒子幼家貧公助之俸錢百緡治巨舟差老衙校送歸作一絶句戒其吏曰関津但以吾詩示之詩云十口相將泛巨川來時暖熱去凄然関津若要知名姓㝎是孤兒寡婦船公守邠州暇日帥僚属登樓置酒未舉觴見衰絰數人乃營理䘮具者公亟令詢之乃寄居士人卒於邠州將岀殯近郊賵歛棺槨皆未具憮然即徹宴席厚賙給之使畢其事坐客感歎有泣下者公守杭州蘇鱗爲属縣廵檢城中兵官徃徃獲薦書獨鱗在外邑未見收録因公事入府献詩曰近水樓臺先得月向陽花木易逢春公過淮境遇風賦詩云一棹危於葉傍觀亦損神他時在平地無忽險中人雖弄翰戲語卒然而作其濟險固得之心未嘗忘也公守桐廬郡始於釣臺建嚴先生祠自爲記以示南豊李泰伯泰伯讀之三嘆起而言曰某妄意輙改易一字公矍然扣之曰雲山江水之語於義甚大於詞甚博而德字承之乃似碌碌擬換作風字如何公凝坐頷首殆欲下拜公守饒州創慶朔堂旣去以詩寄魏介曰慶朔堂前花自栽便移官去未曾開年年長有别離恨只托春風管幹來舊州治有石刻公與韓魏公爲經略安撫招討副使約公進兵公曰當自謹守以觀其變未可輕兵深入尹洙歎曰公於此乃不及韓公也韓公嘗云大凡用兵當先置勝敗於度外今公乃區區過慎此所以不及韓公也公曰大軍一動萬命所懸而乃置於度外某未見其可魏公舉兵入界次好水以全師䧟沒魏公遽還至半途陣亡父兄妻子數千人號於馬首皆持故衣𥿄錢招魂哭曰汝昔從招討出征今招討歸而汝死汝魂識能從招討歸乎哀慟聲動天地魏公悲憤掩泣駐馬不能前者數刻公聞而歎曰當是時難置勝敗於度外也公尹京日有内侍怙勢作威傾動中外公抗䟽列其罪䟽上家所蔵書有言兵者悉焚之仍戒其子曰我上䟽言斥君側小人必得罪以死我旣死汝軰勿復仕䆠但於墳側教授爲業䟽奏嘉納其言罷黜内侍公知慶州兼經略招討使未幾賊兵三萬叩城公麾兵血戰賊奔西北遂戒諸将無追奔旣而果有㐲兵又奪爲大順城久之世衡不利於定川公晝夜爲領兵援初関輔人心揺動及見公耀兵號令嚴兵威震戎落人心遂安相賀曰邊上自有龍圗公爲長城吾屬何憂公與吕申公論人物申公曰吾見人多矣無有節行者公曰天下固有人但相公不知耳若以此意待天下士宜乎節行者之不至也公言息盗賊誅奸雄浩然無憂乃所以爲身謀若未能如是雖州里不可保七尺之軀無所容於天地之間矣公在慶曆中議弛茶塩之禁及减商稅公以爲不可茶塩商稅之入但分减商賈之利耳行之商賈未甚有害也今國用未减歲入不可闕旣不取於山澤及商賈湏取之於農與其害農孰若取之於商賈今爲計莫若先省國用有餘當先寛賦役然後及商賈弛禁非所當先也其議遂寢公爲參知政事日兖州守梁適乞以廂兵代廂戸又裁减人數是時章得象爲宰相執政欲從梁適之請獨公云此事與㝷常利害不同而此人可减吾軰雖行他人必復之㝷有中書劄子令差足人數當時天下無賢不肖莫不稱之公爲參知政事日歐陽脩余靖蔡襄王素爲諌官時謂之四諌四人力引石介執政從之公獨曰介剛正天下所聞然性亦好異使爲諫官必以難行之事責人君必行少咈其意則引𥚑折檻叩頭流血無所不爲主上富春秋無失德朝廷政事亦自脩舉安用如此諫官也諸公服其言而罷公與韓魏公富彦國慶曆中同在西府上前爭事議論各别下殿各不失和氣如未嘗爭也當時相善三人如推車子盖其心主於車可行而巳不爲巳也慶曆初上厭西兵之乆岀而民弊亟用公與富鄭公韓魏公而三人者遂欲盡革衆事以脩紀綱而小人權倖皆不恱獨公與相佐佑而公尤抑絶僥倖凡内降與㤙澤者一切不與毎積至十數則連封而靣還之或詰責其人至漸恨涕泣而去上嘗諭諫官歐陽脩曰外人知杜衍封還内降耶吾居禁中有求㤙澤者毎以杜衍不可告之而止者多於所封還也其助我多矣此外人及杜衍皆不知也然公與三人者卒皆以此罷去公與相國韓公爲西帥狄武襄青隷其節下爲人器度深逺咸竒之曰此國器也公嘗以左氏春秋授狄武襄曰熟此可以㫁大事將不知古今乃匹夫之勇青於是晩節益喜書史旣明見時事成敗尤好節義公與韓公杜公多知本朝故實善决大事初邊將議欲大舉以撃夏人雖韓公亦以爲可舉公爭以爲不可大臣至有欲以沮軍事罪公然兵後果不得岀契丹與夏人爭銀瓮族大戰黃河外而鴈門麟府皆警公安撫河東欲以兵從公以爲契丹必不來兵不可妄岀公怒以語侵公公不爲恨後契丹卒不來二公皆世俗指公朋黨者其論議之際盖如此及三人者將罷去公獨以爲不可遂亦罷公知開封府獻百官圗指宰相差除不公而隂薦韓忠獻公億可用文正旣貶仁宗以諭公公曰若仲淹舉臣以公則臣之拙直陛下所知舉臣以私則臣委質以來未嘗交托於人遂除參知政事公與韓琦自陜而來朝石守道作慶曆聖德詩忠邪太眀白道中得之公撫股謂韓公曰爲此恠鬼軰壊之也韓公曰天下事不可如此必壊其後果然公慶暦中與富弼韓琦杜術章得象賈昌朝晏殊同時執政吕夷簡罷相夏竦罷樞宻使歐陽脩余靖王素蔡襄並爲諌官徂徠先生喜曰此盛事也歌頌吾職其可巳乎乃作慶曆聖德詩其略曰衆賢之進如茅斯㧞大姦之去如距斯脫衆賢謂衍等大奸斥竦也詩且出泰山先生見之日子禍始於此矣先生不自安求出通判濮州吳遵路丁母䘮廬墓側𬞞食終制旣歿家無長物公分俸賙其家錢尚書遹爲洪州職官縁事過鄱陽見彭器資值月朔有衣冠數十軰來見彭公設拜各人進問起居而退錢在書齋中窺見甚訝之因問公此軰何人公曰皆鄉里後進子弟也錢曰今他䖏後進必居於位或與先生並行何以有此彭公曰昔范希文自京尹謪守是邦其爲政以名教厚風俗敦尚風義爲先州人仰慕咸傾嚮之遂以弟自任而不敢忽久之不變也此大賢臨政之効可以爲法公知慶州日有人以碑銘托公者公爲譔𫐠夤縁及一貴人隂事一夜夢貴人吿曰某此事實有之然未有人知者今因公之文暴露矣願公易之公夢中謝曰隱公此事則某人當受惡名公實有此我非誣人者不可改也貴人即以語公曰公若不改當奪公子公曰死生命也未幾次子純仁病旣而又夢貴人曰公子我豈能奪今告公爲我改之公子安矣卒不改公之剛正是可見也公爲江淮體量安撫所至賑乏絶又陳八事其四日國家重兵悉在京師而軍食仰於度支則所飬之兵不可不精也禁軍代囘五十以上不任披帶者降於畿内及陳許等䖏近下禁軍一卒之費歳不下百千萬人則百萬緡矣至七十歳乃放停且人方五十之時或有郷園骨肉懐土之情猶樂舊里及七十後郷園改易骨肉淪謝羸老者歸復何托是未停之前大蠧國計廢之之後復傷物情咸平中㨂郷兵人無歸望號怨之聲動於四野祥符中選退冗兵無歸之人大至失所此近事之鍳也請下殿前軍馬司禁軍選不堪披帶者與本郷州軍别立就糧指揮至彼有田園骨肉者許之歸農則羸老之人亦不至失所矣神文時慶曆淮南有王倫者嘯聚其黨頗擾郡縣承平日久守令或有棄城而岀者請論如法公叅預大政爭以爲不可今淮南郡縣徒有名耳其城壁非如邊塞難責城守神文睿德寛仁故棄城者得以减死論旣退鄭公忽謂文正公曰六丈當欲作佛耶范公曰主上富於春秋吾軰輔導當以德若使人主輕於殺人則吾軰亦不得容矣鄭公歎伏言行拾遺事録卷第一, WYG: ''}
