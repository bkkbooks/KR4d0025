  - {type: variant, offset: 5708, length: 605, content: 遺表臣聞生必盡忠乃臣節之常守没猶有戀蓋主恩之難忘輙忍須臾之期少舒迫切之懇痛靡自覺辭皆不倫伏念臣生而遂孤少乃從學㳺心儒術決知聖道之可行結綬仕塗不信賤官之能屈纔脫中銓之冗遽參麗正之榮耻爲倖人竊論國體昨自明肅厭代之後陛下奮權之初首承德音占預諌列念昔執卷惟虞無位之可行況今得君安敢惜身而少避間斥江湖之遠旋塵侍從之班大忤貴權幾成廢放屬羗臣之負險顧將列以難裁乃副帥權仍峻使任亦嘗周旋戰備指目地形力援定川之師始期遇敵誓復橫山之壤亟逼講和雖㣲必取之功多弭未然之患預中樞之宻勿曾不獲辭叅大政之幾㣲益難勝責自念驟膺於寵遇固當勉副於倚毗然而事久弊則人憚於更張功未驗則俗稱於迂闊以進賢援能爲樹黨以敦本抑末爲近名洎忝二華之行愈增百種之謗上繫天聽終辨衆纔因懇避於釣衡爰就班於符竹一違近署五易名城雖聖恩曲示於便安柰神道常惡其盈滿請麾上穎蓋遭拙疹之未平息鞍東徐益覺靈醫之不効唯積疹之見困非晚歲之能支神不在形氣將去幹冥冥幽壤倐爲長徃之期穆穆清光永絶再瞻之望肝膽摧落精魄飛揚然臣起于諸生歷此華貫雨露澤於數世圭組煥於一門有如臣焉足爲榮矣當瞑目以無憾尚貪生而有云蓋念所惜者盛時所眷者明主雖性命之際巳能自通然君臣之間豈易忘報但無怛化以竭遺忠敢憚陳於緒言庻無負於没齒伏望陛下調和六氣㑹聚百祥上承天心下徇人欲明愼刑賞而使之必當精審號令而期於必行尊崇賢良裁抑僥倖制治於未亂納民於大中如此則不獨㣲臣甘從於異物庻令率土永寖於淳風言逐涕零命隨䟽殞臣無任惶懼戰惕之至, WYG: ''}
