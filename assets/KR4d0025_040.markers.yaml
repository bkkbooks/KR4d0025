  - {type: variant, offset: 0, length: 150, content: 言行拾遺事錄卷第四此以下係監簿忠宣諸公遺事忠宣遺事極多其巳見於言行録行狀者兹不復載宣仁寢疾宰輔入問后留忠宣曰卿父仲淹可謂忠臣在章獻朝勸后盡母道在仁宗朝勸帝盡子道卿當似之言行録諌受金帶康㝎間元昊冦邊韓魏公領四路招討駐延安忽夜有人携七首至卧内遽褰帷帳魏公起坐問誰何曰某來殺諌議某不忍願得諌議金帶足矣遂取帶, WYG: ''}
