  - {type: variant, offset: 142, length: 4916, content: 出明日魏公亦不治此事俄有守陴卒報城上得金帶乃納之時范兄純佑在延安謂韓魏公曰不治此事爲得體盖行之則沮國威今乃受其帶是堕賊計中矣魏公握其手再三歎服曰非琦所及也談叢文正長子監簿純佑幼有智略在洛與富彦國家子㳺富氏引塟陳設從塟器用甚盛觀者如堵器用盖錫造者監簿在側取一器擘而示衆曰此錫器爾等謂何物耶富氏子大怒以爲咲巳監簿徐謂曰尓何所見吾正恐愚民致疑害尓先塋爾富子歎服時始十餘歳過庭録赴官只三檐忠宣公孫直方初仕平恩主簿啟行拜辭叔翁右丞平居寡言端坐如木偶人終日未嘗移足至於塵印跡無倦意家中不見喜愠之色至是問姪主簿曰爾行擔幾檐主簿是時新娶寔應之曰有十檐右丞曰爾初仕巳如此若久䆠何我昔赴遂州守時只有三檐罷官仍舊不惟緩急易於去就亦免張外醜也過庭録忠宣公元祐間當國一時科舉取人多得豪傑之士忠宣公亦病夫公卿家子弟或不知書言於朝乃於有無出身人衘位上帶左右字以分優劣忠宣公之意非有它也盖欲公卿子弟知向學故爲是以奨勸焉趙挺之奏議哲宗親政呂汲公欲遷殿中侍御史楊畏爲諌議大夫忠宣曰天子諫官當用正人楊畏不可用汲公方約畏爲助謂忠宣曰豈以楊畏嘗言公耶忠宣曰不知也盖上初召忠宣畏嘗有言上不行忠宣故不知也忠宣因乞罷政上不許後楊畏首叛汲公凡可以害汲公者無所不至聞見録忠宣貶永州命下公欣然而徃毎諸子怨章惇忠宣必怒止之江行赴貶所舟覆扶忠宣出衣盡濕顧諸子曰此豈章惇爲之哉至永州公之諸子聞韓維少師謫均州其子告惇以少師執政日與司馬公議論多不合得免行欲以忠宣與司馬公議役法不同爲言求歸白公公曰吾用君實薦以至宰相同朝論事不合即可汝軰以爲今日之言不可也有愧而生者不若無愧而死諸子遂止聞見録公疾革精識不亂諸子侍側口占遺表凡八事命門生李之儀次第之諸子以其所言皆朝廷大事且防後患以公口占畫一􅌳申頴昌府用府印寄軍資庫及將塟之儀又作行狀論公平生立朝行巳大節蔡京用事小人附㑹言公之子正平等撰造中使至永州傳宣聖語以爲遺表非公意也正平與之儀皆下御史獄捶楚甚苦正平之儀欲誣服其傳宣中使獨不服曰舊制凡傳聖語受本於御前請寳印出注籍於内東門遣使受聖語籍中使從其家得永州傳宣聖語本有御寳如所言又驗内東門受聖語籍亦同又下頴昌府取􅌳納遺表八事皆實獄遂解正平猶覊管象州之儀覊管太平州正平之家死於嶺外者十餘人獨正平遇赦得歸不出仕終身爲選人蔡京者紹聖𥘉爲戸部尚書欲結后戚向氏故奏展向氏墳寺事下開封府正平爲縣尉徃按視其地曰向氏寺地歩巳足民田不可奪府以其言聞哲宗怒京贖銅二十斤京由此恨正平故欲誣殺之嗚呼使忠宣公無恙相上皇於𥘉載天下豈復有今日之禍公旣病不能朝上皇始命相曰曾布與蔡京云聞見録治平二年以范純仁爲殿中侍御史呂大防爲監察御史裏行近制御史有闕則命翰林學士御史中丞迭舉二人而上自擇取一人爲之至是闕兩貟舉者未上内岀純仁大防姓名而命之實録熈寜元年司馬光登對上曰召還韓維如何光曰韓維陳薦忠厚方正者也吕誨與傅堯俞范純仁呂大防皆忠直之臣也願陛下常識其名熈寜中公知諌院言侍從官實古九卿聀是宜朝夕論思同國休戚今只主判司存或有時政得失惟能退有後言願降詔督責凡朝廷闕失並須陳列其所上章䟽付政府銓㝎量加賞罸上與執政議之以爲當然丙辰詔曰侍從官貟今視朕過失與朝廷政事之闕無有巨細各具章極言無隱長編忠宣嘗言薛向不可爲發運使或致民心别生事變上曰今令發運使兼制置六路財賦務在均適有無何由乃致百姓人情怨駭純仁曰人主不當言利但當務農桑節用而巳上曰欲務農桑如何措置純仁曰但當脩風教上曰有風教而無政事如何人肯務農桑純仁曰當擇守令上曰以何法擇守令曰當令近臣薦舉上曰朕即位以來屢勑近臣舉士然初不知所舉之當否欲知所舉之當否當以何術曰當責執政長編蘇轍旣再具劄子上固不恱李清臣鄧伯温又先媒孽之及靣論上益怒遂責轍曰人臣言事何所害但卿昨奏謂機事不可宣于外請祕而不出今乃對衆開陳且以漢武帝上比先帝引論甚失當轍復曰漢武帝明主也上曰卿所奏稱漢武帝外事四夷内興宮室立塩鐡榷酤均輸之法其意謂武帝窮兵黷武末年下衰痛之詔此豈明主乎轍恐動趨下殿待罪上聲甚厲范純仁獨進曰史稱武帝雄才大略爲漢七制之主轍果以比先帝非謗陛下親政之𥘉進退大臣當以禮不宜如此急暴上怒稍霽輙退舉笏謝純仁曰公佛地位人也長編熈寜中朝廷有生老病死苦之語時王荆公改新法自爲生事曾魯公以年老依違其間富韓公稱病不出唐質肅與荆公爭按問欲舉理直不勝疽發背死趙清獻唯聲苦時忠宣爲諫官皆劾之言荆公志在近功忘其舊學富公謀身過於謀國曾公趙公依違不㫁可否忠宣毎曰以王介甫比莾卓過矣但急於功利遂忘素守耳邵氏聞見録公攝帥成都程子將告歸别焉公曰願少留純仁將别子曰旣别矣何必復輿衛遂行公使人要於路曰願一見也旣見曰先生何以教我子曰公嘗言爲將帥當使士卒視巳如父母然後可用然乎公曰如何子曰公言是也然公爲政不若是何也公曰可得聞與子曰舊帥新亡而公張樂大饗將校於府門是教之視帥如父母乎曰亦疑其不可故使属官攝主之也子曰是尤不可也公與舊帥同僚也失同僚之義其過小属官於主帥其義重曰廢饗而頒之酒食如何曰無頒也武夫視酒食爲重事弗頒則必思其所以事帥之義乃因事而教也公曰若從先生言而不來則不聞矣其喜聞義如此程氏遺書徽宗即位之𥘉欽聖皇太后同聽政忠宣公自永州先以光禄卿分司南京鄧州居住盖二聖欲用公矣遣中使至永州賜茶藥宻諭曰皇帝與太皇太后甚知相公在先朝言事忠直今虗位以待相公不知目疾如何用何人醫治只爲左右有不是當人阻隔相公公頓首謝又曰太后問相公官家即位行事如何天下人何說公曰老臣與逺方之人惟知鼓舞聖德又曰天下有不便事但奏來公曰敢不奉詔又曰鄧州且去否公曰巳出望外如歸鄉里又曰離闕下日二聖再三言太后在宫中皇帝在藩邸甚知相公是直臣公感泣不巳俄復觀文殿大學士中太一宮使召赴闕供職而公病詔書有云豈惟尊德尚齒昭示寵優之光庶幾鯁論嘉謀日聞忠吿之語公捧詔泣曰上果用我矣目明全失風痺不随恩重命輕死有餘責上又遣中使賜銀合茶藥促公入覲仍宣渇見之意公曰老臣命薄虚蒙聖眷乞歸穎昌飬疾上不得巳許之每見輔臣問安否乃曰范純仁得一識靣足矣公復告老不允詔至公巳薨矣上與皇太后震悼出涕邵氏聞見録元祐元年呂大防范純仁言故御史中丞呂誨忠於先朝極陳讜論致忤時宰譴死外藩今其家貧甚諸子仕於常調請優加贈典録用諸子之才者以旌名臣之後詔誨特贈通議大夫男由庚與堂除合入差遣長編元祐元年詔著作郎范祖禹宣德郎㳺師雄朝請郎朱勃並令中書省記姓名以同知樞宻院事范純仁薦故也實録元祐八年八月丁卯呂大防范純仁蘇轍鄭雍韓忠彦劉奉世入崇慶殿後閣問太皇太后聖體太皇太后諭大防等曰今疾勢有加與相公等必不相見且善輔佐官家爲朝廷社稷𥘉大防等欲退太皇太后獨留純仁意欲有所属也上令大防巳下皆住太皇太后曰老身受神宗顧託同官家御殿聽㫁公事試言九年之間曾施私恩與高氏否大防對曰陛下以至公御天下何嘗以私㤙及外家太皇太后曰固然只爲至公一兒一女病且死皆不得見言訖泣下大防曰近聞聖體向安乞稍寛聖慮服藥太皇太后曰不然政欲對官家說破老身没後多有調戲官家者宜勿聽公等亦宜早求退令官家别用一畨人乃呼左右曰曾賜岀社飯否因謂大防曰公等各去喫一匙社飯明年時思量老身也長編忠宣公謫居永州客至必見之對設两榻多自稱老病不能久坐徑就枕亦授客一枕便與對卧數語之外徃徃鼻息如雷客待其覺有至終日不得交一談者能改齋漫録元祐元年蘇轍言今日廟堂之上司馬光未出只有呂公著一人忠朴可倚其餘皆姦邪備位者也伏望聖慈早進范純仁庻得賢者在位同心一德以輔聖政實録忠宣晚年益以天下自任尤留意人才或問其所儲蓄人才可爲今日用者荅曰陳瓘又問其次日陳瓘自好也言瓘可以獨當天下之重也宣和末人憂大厦之將傾或問㳺酢以濟世之人酢曰陳了翁其人也劉安世亦甞因瓘病勉以醫藥自輔云天下將有頼於公當加保飬以待用也長編范忠宣公再入相子正平博學能文行義甚高竟死選調朱勝非云二府表則之地不阿其親公在相凡薦引人才必以天下公議所薦士未嘗知公未嘗示恩意於人夲傳左正言朱光庭奏臣嘗論奸邪則指蔡確章惇韓縝爲之先論忠賢則以司馬光范純仁韓維爲之先去姦邪任忠賢唯先者爲急蔡確旣去乞以司馬光補其闕韓縝旣去乞以范純仁補其闕章惇旣去乞以韓維補其闕盖此天下大任唯天下大賢可以當之非張璪巳下備位之臣所堪任也朱公掞集公元豐八年爲左諫議大夫司馬光以公親嫌爲言惇曰臺諫所以紏繩執政之不法故事執政初除親戚及所舉之人見爲臺諌官者皆徙他官今皇帝幼冲太皇太后同聽萬機當動循故事不可違祖宗法光曰純仁祖禹作諫官誠協衆望不可以臣故防賢者進臣寜避位九朝通畧紹聖元年夏四月范純仁充觀文殿大學士知頴昌府上親臨政言者爭論垂簾時公乞依明道二年故事下詔禁約并録以進不從公數稱疾求罷最後出居慈孝寺再録詔以進且言今妄爲詆訐者旣多陛下從之則妨聖孝懲之則恐不忍不若以詔禁約庶得兩便訖不從純仁固求罷而有是命通鑑東都曹生言范右丞旣貴接親舊情禮如故他亦不改世未有也然體靣肥白潔澤豈其胸中亦以爲樂耶談叢元豐八年十月韓維言今聞巳召知慶州范純仁純仁父子世爲帥臣熟知虜情邊事伏望聖慈更促純仁入朝面賜詢問庶爲詳審十一月癸亥以京東轉運使范純粹知慶州代其兄純仁也長編司馬朴丞相光之兄里之孫也少䘮母育于外祖范忠宣公紹聖初黨議起父宏坐中書論辯得罪忠宣亦坐救黨人責永州目疾失明客至必令朴導以見時方七歳進揖應對如成人客皆驚歎以公遺恩𥙷官後死節於靖康之變事畧右丞純禮在政府宦者閻守忠恃寵勢傾廊廟一日至堂宣諭辭意甚傲諸公拱手而巳右丞作色叱曰老奴何敢爾守忠退歩連應曰守忠不敢在堂諸公皆爲寒心曰范君必不乆居此矣右丞盖自如也未巳虜使至選右丞舘伴虜使忽自中批出范某言犯御辭落職知許㝷乞宮祠去名臣傳元符三年秋巳亥范純禮爲龍圖閣直學士知開封府先是吳居厚尹京專任察視以刻深爲治純禮一切寛之或以爲言純禮曰寛猛相濟聖人之訓今處深刻之後若益以猛是以火濟火也方務去前政之苛猶慮未盡何寛之患耶元符三年夏四月是日曾布再對因言自蔡京復留中外人情無不惶惑及黜劉極收用葉濤范純禮王右軰人情方少安長編純禮以光禄卿召遷刑部侍郎給事中凡所封駁正名分紀綱皆國體之大者起居舎人張來先在病告中書省録黃不候叅假令供職純禮批勑謂來旣能供職豈不能朝見壊禮亂法所不當爲一時爲之聳動東都事畧公拜尚書右丞侍御史陳次升乞除罷言者並自内批不由三省進擬右相曾布力爭不能得乞降黜純禮徐進曰次升所陳不過防執政引用親黨及罷黜不附巳者耳言之者無罪聞之者足以戒何用深責之也夲傳呂惠卿告老徽宗以問執政執政請許之純禮謂惠卿前在二府位節鉞豈不存朝廷體貌雖其人不足留所重者國體也本傳户部侍郎寳文閣待制范純粹知延安府先是樞宻院聞趙卨死韓忠彦與王巖叟議所以代卨者惟純粹可及都堂聚議呂大防亦以爲莫如純粹他日樞宻院又言差純粹極當乞以恩意慰遣都堂又召純粹靣諭純粹猶不受命三省樞宻院言朝廷㤙意如此若固辭免朝廷何以使人欲限五日朝辭如不行則須與行遣純粹乞八月初赴任從之大防又曰延安雖去終恐心不安萬一厥母道病卒不如易之岩叟又與忠彦論不可易之理謂同列日塞上數十萬生靈性命繫一主帥惻隱此一人不若惻隱及數十萬人也大觀中又有虞仙姑者年八十餘狀貌如少艾行大洞法一日徽廟誦大洞經舉首見有仙官侍立者蔡京嘗具飯招仙姑見大猫指而問京曰識之否此章惇也意以諷京京大不樂徽宗又嘗問仙姑致太平之期荅曰當用賢臣上曰賢人謂誰荅曰范純粹也上以語京京曰此元祐臣僚使之遂逐於是士大夫爭言虞仙姑亦入元祐黨矣澠水燕談純粹元豐末爲陜西轉運判官當五路大舉後財用匱乏屢請於朝吳樞宻居厚時爲京東轉運使方以治鐡鼓鑄有寵即上羡餘三百萬緡以佐關輔神宗遂以賜范純粹得報愀然謂其属曰吾部雖窘豈忍受此膏血之餘耶力辤訖不納石林燕語章惇貶安置潭州上諭三省言惇之惡曾布方對范純禮曰惇如丁謂不爲過詞色甚厲布曰如此即須過海上大笑曰只教這下遂以雷州司戸處之純粹知慶州時夏人不庭純粹謂諸路策應舊制也自徐禧罷策應若虜兵大舉一路攻圍力有不勝而鄰路拱手坐觀其不抜者幸尓謂宜脩明戰守救援之法朝廷是之本傳元祐中神宗問罪夏人取其安强葭蘆浮圗朱脂四寨又取蘭州至是議分畫疆界趙卨在延州純粹在慶州以爲得之無益於中國純粹請以虜所䧟官吏丁夫歸朝廷以所削之地給賜之於是還以四砦而夏人服東都事畧純粹聰明下不能欺在京東時㑹蘇軾自登州召還與軾同建募役之議軾謂純粹講此事尤爲精詳侍郎爲帥端重有體間諜明功罪當恩威兼用邊人畏服焉本傳高遵𥙿攻靈州與劉昌祚爭功欲以軍法斬昌祚昌祚憤恚成疾轉運判官范純粹謂遵𥙿曰两軍不叶恐有他變力勸遵𥙿詣昌祚營問疾以和觧之遵𥙿不從後果敗長編言行拾遺事録卷第四, WYG: ''}
