  - {type: line-break, offset: 0, content: '', id: KR4d0025_SBCK_046-1a01}
  - {type: variant, offset: 0, length: 2335, content: 諸賢賛頌論䟽韓魏公遺事云魏公謂挺然忠義奮不顧身師魯之所存也身安國家可保明消息盈虗之理希文之所存也敢問二公曰立一節則師魯可也考其終身不免終亦無所濟若成就大事以濟天下則希文可也韓公與孫元規龍圖書云近方知希文留徐將治巳差下人致書藥詣徐及裁記爲慶逓中忽領來教且承希文疾遂不起聞之驚慟數日不能飮食忠正大賢天下属望平生素藴未得紓盡遂至于此深可哀哀痛痛所幸者到公治所後事得仁者盡力幹辦亦賢者之先識希文暝目無憾矣今專差人致奠如公未發告令一幹吏同辦之幸甚富鄭公稱之爲聖人石徂徠比之爲䕫卨張横渠謂才氣老成歐陽公撰公神道碑云自公坐呂公貶羣士大夫各持二公曲直呂公患之凢直公者皆指爲黨或坐竄逐及呂公復相公亦再起𬒳用於是二公驩然相得戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能正上旣賢公可大用故卒置群議而用之歐陽公手自記日脩學道三十年所得者平心無怨惡尓脩初以范希文事得罪於丞相坐黨人逺貶三峽流落累年比呂公罷相始𬒳進擢及後爲范公作神道碑言西事呂公擢用希文盛稱二公之賢能釋憾而共力於國家者希文子純仁大以爲不然刻石時輙削去一節云我父至死未嘗觧仇每歎曰我亦得罪於丞相者惟其言公所以信於後世也嘗聞范公平生自言無怨惡於一人兼其與呂公觧仇書見於范集中豈有父自言無怨惡於一人而其子不使觧仇於地下父子之性相逺如此邵氏聞見録曰歐陽作碑辯不可則自削去驩然勠力等語歐陽殊不樂謂蘇明允云范公碑爲其子弟擅於石夲改動碑中文字令人恨之歐陽公論小人讒沮范富諸賢云韓琦仲淹富弼等遇陛下聖明可謂難逢之㑹陛下有仲淹弼等亦可謂難得之臣陛下旣巳傾心待之仲淹等亦各思報臣謂事無不濟但顧行之如何耳况仲淹弼是陛下特出聖意自選之人𥘉用之時天下巳皆相賀然臣所慮者仲淹等所言必湏先絕僥倖因循姑息之事此等之事皆外招小人之怨怒而奸邪未去之人湏時有䜛沮若稍聽之則事不成矣臣謂當此行事之𥘉尤湏上下叶力凡小人怨怒仲淹等自以身當浮議陛下亦湏力拒待其久而漸定日見成功歐陽公論范公爲衆所推云韓琦與仲淹皆是國家委任之臣材識俱堪信用然仲淹於陜西軍民思信尤爲衆所推今若令仲淹外捍㓂兵而琦居中應副必能濟大事若陛下以新用仲淹責其展効則且令了此一事俟邊防稍定不兩三月可以還朝旣先弭於外庶可漸脩於缺政歐陽公論四賢不當罷䟽云杜衍韓琦范仲淹富弼天下皆知其可用之賢而不聞其有可罷之罪自古小人䜛害忠賢其說不逺欲廣䧟良善不過指為朋黨欲摇動大臣必湏誣以專權其故何也去一善人而衆善人尚在則未爲小人之利欲盖去之則善人少過難於一一求瑕唯指以爲朋黨則可以一時盡逐大臣不可以他事動摇惟有專權是人主之所惡故湏此說方可傾之臣料杜衍等四人各無大過而一時盡逐必有朋黨專權之說上惑聖慈臣請詳言之杜衍爲人清審而謹守規矩仲淹則恢廓自信而不疑韓琦則純正而質正富弼則明敏而果銳四人爲性旣各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹力爭而寛之仲淹謂契丹必攻河東請急脩邊俻富弼料九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水各城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤爲彰著陛下素巳知者此四人者可謂公正之賢也平日間居則相稱美之不暇爲國議事則公言廷爭而無私以此而言臣見杜衍等真得漢史所謂忠臣有不和之節而小人䜛爲朋黨誣矣陛下於千官百辟之中親選得此數人一旦罷去而使群邪相賀於内四夷相賀於外此臣所以爲陛下惜也蘇子美聞京尹范希文謫鄱陽尹十二師魯以黨人貶郢中歐陽永叔移書責諫官不論救而貶夷陵令因成此詩以寄且寛其逺邁也朝野蔚多士衮然良可羞伊人秉直節許國有深謀大議摇巖石危言犯采旒蒼黃出亰府憔悴謀南州引黨俄嗟尹移書遽竄歐安慙言得罪要避曲如鉤郢路幾來馬荆川還泝舟傷心衆山集舉目大江流逺動家公念師魯父作抆於東川深貽壽母憂歐陽永叔之母垂老橫身罹禍難當路積仇讐衛上寕無術亢宗非所優吾矣思正士莫賦畔牢愁蘇子美上文正公書云舜欽觀古之烈士受人一言一顧之重不計巳之能否事之重䡖隕命捐軀無問而不入或促其禍敗累於所知者多矣然史氏裨說皆掇之以稱述其事而警厲偷淺舜欽竊謂其勇敢敦氣節則有餘至于成就大詳趣道與權則不足矣故舜欽自少小迨於作官所爲不敢妄必審處巳之才能而傳㑹于道人雖不知自信甚䔍且久矣昨者朝廷以閣下才謀絶世負天下之重望倚之以究西事閣下開置幕府收䇿志慮英犖之士以自廣盖以兵者重器資群材以共舉一失其任則折衂報之而閣下誤有采聽將引猥瑣置於左右委言垂意發於顔色舜欽非不知依閣下之重可以取先價而自振起設臨機事不能有所建弼耻也有所建弼而不合於義不行焉亦耻也况於傾撓哉及是則不惟虧損閣下之望舜欽終身可廢無所容焉是以上犯盛德􅈤激避辭者盖在此也然舜欽雖至㝠愚内荷閣下之顧夙夜感慨思有所報昨聞閣下以張存不才自求守延州物喻喧然以閣下領經略之權自可徃來陜右進退在巳延州逼近賊鋒而能舎安逸以就危隘雖古人不逮也又或云閣下居長安統貳於人不能明白立功名將高舉逺去以自異此二除未必中閣下之度以舜欽觀之旣白張存則不得不自請但裁授之際有所未安何者以閣下爲經略則自陜西以至於邊徼斥候皆可處置在延則局于一州於他郡不接矣他郡不接或可不能仰制関中事則可慮也盖関中之俗大抵强捍豪忍又形勢險固出於天下方今盡取鄕民藉之爲兵得操弓矢以自肆習徃來道路與㓂賊不辨小人少思慮加之氣俗又得此利器幸而歳常豐父兄家老聚居可約束不幸小歉父兄不能保有其子弟必將人人依險以自快則其將柰何耶况煩細迫而驅之以向敵人頗失望有天下而失人以信後將何所恃焉昨者延安鎮戎殺害民畜不可勝紀死氣結戾不判必能變化隂陽之和今雖稍稔恐來年宿麥不登民必狼顧矣弱者流轉强者化而爲㓂賊則心腹自有疾矣閣下居延州雖能制昊賊之命係虜其種族逐之絶漠而遁亦何救関中之事耶故舜欽謂西羗不足憂於関中也近日竊聞隣郡數勝頗得馬畜屠其柵壘火其積聚朝廷即時越次以賞其勞使人得自有其所軍聲稍振士百其勇以舜欽觀之古之善禦戎者豈特是哉盖務訓撫吾民使安其, WYG: ''}
