  - {type: variant, offset: 996, length: 10133, content: 不以非義動扼其衝塞絶其互市閉之沙漠之外俟其隙且困則破散之晨鈔夕咨與競尺寸之地非大國之體也舜欽返慮將佐不知此事銳而少思狃豪髮之勝中其詭譎而所䘮必大盖兵家之法必以餌驕人而後取之况羗虜常以伏竒包衆勝中國當此之際閣下能部勒諸將分乘險阻不使習小利以爲功持重其體而死其奸謀不憚曠日而使之内潰此孫武所謂善之善者也况夫體幽靜則謀精而威氣張銳則令頓而墯閣下立謀而首令者也以身繫安危可不慎哉若能去延州之狹以自任撫関中之水以示信而又沉逺變動則何敵之敢亢耶懸料古人所難况舜欽淺識而欲上賛逺略然區區之誠腷臆于内萬冀一得以𥙷高明撫斷之餘特賜省閱幸甚幸甚窮邊寒苦乞加練護不任􅈤激之至又荅范資政書云道逺且阻不得上記以候起居家兄封到閏月所賜手教一通訓愛切至情義並隆懷感益深不言可喻舜欽昨得罪後都下沸騰未巳其謗皆出人情之外而徃徃信而傳之自念非逺引深潜則不能快讐者之意又以世居京師墳墓親戚所在四方茫然無所歸始者意欲重去不得巳遂沿南河且來吳中旣至則有江山之勝稻蟹之美兖州有田數頃郡中假囬車院以居之親友分俸伏臘似可給豈敢更求贏餘以足所欲日甚閒曠得縱觀書策及徃時箸述有未俻者皆得綴緝之治易頗有所得苦奥處無人商論乃知君子理身格物之道自有本也險難萌而不之見宜其悔焉况舜欽性䟽且拙䟽則多觸時忌不能防閑小人拙則臨事不敏無所施爲因此遂得退蔵盖亦自幸苟致之劇地責其功績徒自勞困而無補於時也衣食之勿止此而巳今得心安舒而身逸豫坐探聖人之道又無譏察而責望之何樂如是攝生事素亦留意今飲食起居皆自適内無營而外無勞斯莊生所謂遁天之刑者也歲餘來能飲冷而少病此其効歟舜欽旣廢于世本當於江湖之上與魚鳥麋鹿同樂不欲使聲問踪跡一至於人間因閣之教丁寜委析不得不具道所懷幸閔察焉又荅去冬捧䇿問條目甚俻深明幽患之故寘之坐右一食三誦嚴然如臨師保之前雖未能盡其要處而粗忘隕穫之苦專人至又承親筆伏審坐鎭之暇體力平𥙿且謂某窮道著書日與聖人語於堂奥晏然自居得易艮象時行時止而其道光明也此閣下敎之愛之之過實也夫適其時之動靜使其道之光明此大君子之行蔵屈申非罪戾人之所可爲也夲以不知時之可止而遂於行蹈此機穽今旣止而雖欲行莫可得也閣下前視卿輔之地不欲䖏謙讓引去偃息藩鎮以閑放自喜此正得時止之道也處此至靜益宜思念康世尊夲之術充於胸中因時而發大芘天下則其道卷舒而光明矣放廢者安有此理但守六五一爻之義而巳庶乎語言有序悔吝稍亡不貽知巳之所憂念耳閣下其察之又上范公書云五月日舜欽頓首獻書于參政諌議閣下舜欽伏觀自唐至于本朝賢者在下位天下想望傾属欺至公相聲名烜赫未有如閣下者自閣下作諌官天下之人引領數日望閣下入两府使天下𬒳其賜及閣下受譴天下之人識與不識皆歎息怒罵以謂宰相蔽君怙權不容賢者在朝將日衰弊無復太平之期當是時無此言者衆指以爲愚唯是險姦凶殱之人嫉閣下聲名岀入甚於讐㓂然駈於群議喑嗚伏毒不敢開口但日日窺伺閣下之失將以快意相决羗賊不庭西方用武策畫顛倒兵師敗沒衆謂非閣下之才不能了此事天子采閣下之議用閣下於延州果能使士卒奮厲逆㓂聞之不敢窺境有求和之請時堂上有沮䧟者議者欲食其肉舜欽嘗静思閣下功業未及天下而天下之人愛而美之非人之盡受惠也由閣下藴至誠以康濟斯民爲巳任故誠之感人如四時之氣皷動萬物逺近無不被也去年天子又采天下之議召閣下入政府天下之人踊躍詠歌若巳得之皆曰朝廷用人如此萬事何足慮日傾耳拭目望閣下之所爲未及半年時舜欽自山陽還臺巳聞道路傳云閣下因循姑息不肯建明大事時尚竊竊私語未敢公然言也舜欽始絶不之信必謂怨惡之人扇成此謗談者好竒易傳耳及至都下言者稍不復避人矣舜欽始疑之是何知於前而昬於此耶而又爲辯之曰治义疾者不可速責以效茍以捍劑暴藥攻之死生未可知也談者或然之巳而舜欽又當閣下之薦不復可與衆辯矣與之合倡實不忍爲但惻然愧羞喑不復言退而念慮終夕不能去懐乃知古之烈士爲知巳死者以此也舜欽又竊觀閣下所爲於時亦孜孜數有建白未堪爲曠是何毁之多也豈誠之少衰不銳於當年乎豈施設之事未合羣望乎豈以爲高世之名未見爲高世之事乎愚者不可曉但聞諭議之衆皆云教訓醫工更改磨勘復聀田定贖刑之類皆非當今至切之務警如倒懸者饋之以食大餧者飲之以槳徒益人之忿耳舜欽受閣下非常之知日思所報欲閣下之譽復加於當年念之無他術焉必取衆議而用之則皆厭然而服不復有所詆訾矣今輙條數事布於左右非出於淺見寡識盖得之羣言焉若閣下擇其一二上聞而行之於國實利人又甚樂故非刻薄僥一時之利今議稍喧矣閣下若更畏縮循嘿顧望而不爲則不唯國計漸墮亦恐禍患及身矣如此則使姦纎之人得以藉口而快意天下之人疑惑有名之人又天子不肯采議而用人是不爲來者之地閣下其念之今所建之事不合指極不過於免位則天下之責不及若不建事而無所爲天子將采天下責而免閣下若天子未免閣下安能肆然乆當天下之責乎必因事求免含胡而退則人無後望平生令名至此盡之矣夫建事而免絶異逺甚茍建而得行位自不免於朝廷之利甚大閣下之聲名復還不亦美乎所建之事不必某之所陳其術在衆論之長者閣下納而行之無憚其大且難矣嗚呼歳月有去而無囬功名難成而易墮此古人所以珎重寸隂而皇皇於立事也若蹉跌失時齎泊前志則抱恨萬世爲來者所咲戮無復自明亦巳痛哉亦可惜哉幸閣下留意焉又諌乞不責范孔二公䟽云孔道輔范仲淹剛直不撓致位臺諌後雖改他官不忘獻納二臣者非不知緘口坐得卿輔盖不敢負陛下委注之意而皆罹中傷竄謫而去使正臣奪氣鯁士咋舌目覩時弊口不敢論昔齊侯問叔向曰國家之患孰爲大對曰大臣持禄而不及諫小臣畏罪而不敢言下情不得上通此患之大者故漢文感女子之說而肉刑是除武帝聽三老之議而江充以族肉刑古法江充近臣女子老人愚耄䟽隔之至也豈以義之所在賤不可忽二君從之後世稱聖况國家班設爵位列陳豪英當責其公忠安可教之循黙賞之使諌尚恐不言罪其敢言孰肯獻納物情閑塞上位孤危軫念于茲可爲驚怛覬望陛下發德音寢前詔勤于采納下及芻蕘可以常守隆平保全近輔若詔牓未削欺罔旣成則不唯堂下逺於千里竊恐指鹿爲馬之事復見於今朝矣蔡君謨奏乞遣范公廵邊云聞巳差范仲淹宣撫陜西近又除恭知政事未有廵邊之日竊以西賊不朝其言驕慢必無可從之理范仲淹乆留邊郡威名在敵若早令經制事宜関中百姓有休息之期故邊將雖多莫如朝廷輟柄臣以臨之柄臣之中莫如仲淹自行望於西人未行之間早遣廵邊無使後時以失大計又論范出於韓之右又伏見陜西路招討使韓琦范仲淹各除樞宻副使並以西㓂未寕􅈤辭恩命朝廷再賜手詔督令赴闕臣竊私料琦等必再有陳論辭讓於未决之間而異同之說有三焉曰使琦仲淹皆來也曰一内一外也曰皆留在邊也臣竊謂仲淹作招討使羗戎旣畏其威名今在樞府正議兵謀其畏必甚况在陜西民旣倚頼在樞府必陳利病而行之所頼者愈大以物議言之二臣之忠勇其心一也若以才謀人望則仲淹出韓琦之右故仲淹宜來琦當留邊於理甚當其韓琦范仲淹伏乞朝廷不聽辭讓各授恩命段少連諌范仲淹不當責䟽云臣因義激心以聀獲譴天容地載蒙幸何深然理有所未伸情有所未逹欝悒之心不得不盡陳之道輔仲淹與臣等議皇后不宜廢是以羣詣殿閣上䟽而執政進說使臣等不獲面對道輔仲淹出守外郡臣等蒙罸中外皆以爲非陛下之意特宰執假天威以斷來者之說不報又上䟽曰臣伏準戒諭自今不得羣詣殿門請對且伏閣上䟽自有故事昔唐陽城王仲舒伏閣雪陸贄之枉崔元亮叩殿陛理宋申錫之冤今陛下未忍廢黜皇后而兩府列状議降爲妃諌官御史敢廢伏閣之事乎陛下深惟道輔仲淹等所言爲阿黨乎爲忠亮乎不報閻灝撰公真賛曰英英如神巖巖如山仁義道德盎於顔間大忠臯䕫元功方召以賛中樞以尊嚴廟佑我仁祖格于皇天是肅是䖍不傾不騫維慶有祠邦民瞻思慶山可夷兹堂巍巍元遺山賛曰文正范公在布衣爲名士在州縣爲能吏在邊境爲名将其材其量其忠一身而備數器在朝廷則又孔子所謂大臣者求之千百年間盖不一二見非但爲一代宗臣而巳丁酉四月獲拜公像於其孫圎䂀爲之賛云以將則視管樂爲不忝以相則方韓富爲有餘其忠可以支傾朝而寄末命其量可以際圓盖而蟠方輿朱衣玄冠佩玉舒徐見于丹青英風凛如古之所謂垂紳正笏不動聲氣而措天下如泰山之安者其表固如是歟呂中論文正公爲本朝人物第二云先儒論本朝人物以仲淹爲第一觀其所學必忠孝爲本其所志則先天下之憂而憂後天下之樂而樂其有所爲必盡其力曰爲之自我者當如是其成與否有不在我者雖聖賢不能必此諸葛武侯不計成敗利鈍之誠心也觀其論上壽之儀雖晏殊有不能曉寛仲約之誅雖富弼有所不能知而十事之規模雖張方平余靖之諸賢有所不能識仁宗晚年欲大用而范公巳即世矣豈天未欲平治天下歟呂中論韓范同心云元昊所以敢於慿陵者人皆以爲寳元康定積弱之故而不知其志已萌於德明與中國易馬之時元昊所以終於帖服者人皆知其一韓一范之功而不知其夷簡之功也盖當夷簡未入相之前張士遜在政府王􅎦在宻院夏竦在帥涇州范雍帥延州爲相則無補君務而不免韓琦政府飬病之譏夲兵則不習邊防而忘曩日曹瑋元昊必反之言爲帥則師無功而徒以堕虜人詐和之計當夷簡旣入相之後與仲淹釋憾於朝廷而協力於西事前日之蔽賢固可罪今日之𥙷過亦可書此仲淹所以樂爲之用也自夏竦未罷帥之前師惟不岀出則致敗㓂惟不來來則傷殘劉平之敗范雍奪節鉞任福之敗韓琦罷經略而竦爲四路統帥三歳擁握大師未嘗身履行陳自夏竦旣罷帥之後付秦鳳於韓琦付涇原於王沿付環慶於仲淹付鄜延於龎藉分爲四路各任經略聲勢相援此元昊不復有深入之謀也韓琦所上之攻守䇿其意則主於攻故不免有好水川之敗至於仲淹所上攻守策則言攻有利害守有安危攻宜築近邊城取其近而兵勢不危守宜開屯田用土兵圗其久而民力不匱是則攻不至於輕戰守不至於示弱而舒徐待其斃也然至於協謀以取靈夏之地則韓范同此心也惜乎志未遂而二公歸矣東萊先生治體論曰盖自李文靖抑四方言利害之奏所以積而爲慶曆元祐之緩勢自文正范公天章閣一䟽不盡行所以激而爲熈寜之急政吾觀范文正之於慶曆亦猶王安石之於熈寜也十事之奏實慶曆三年九月矣始於明黜陟重命令當時之言見用明黜陟之法則以十月壬戌行擇官長之法則以十月丙午行任子之法則以十一月丁亥行舘職之法以癸未行公田之法以壬戌行貢舉之法以明年三月行减繇伇之法以明年五月行其餘厚農桑覃恩信重命令皆悉用其說或著爲令行之未及一年而陳執中之徒巳不恱矣嗚呼使慶曆之法盡行則熈寕元祐之法不變使文正之言得用則安石之口可塞今文正之志不盡行於慶曆安石之學乃盡用於熈豐神宗銳然有爲之志不遇范仲淹而遇王安石世道升降之會治躰得失之機於是乎决矣楊龜山龍川志曰范文正公䔍於忠亮雖喜功名而不爲朋黨早歲排呂申公勇於立事其徒因之矯厲過直公亦不喜也自饒州還朝出領西事恐申公不爲之地無以成功乃爲書自咎觧仇而去故歐陽爲文正神道碑言二公晩年歡然相得由此故也後生不知皆咎歐陽公予見張公言之乃信朱文公言曰范文正公作成忠義之風本朝范質人謂其好宰相只是欠爲世宗一死耳如范質之徒却最敬馮道軰雖蘇子由議論亦未免此宋朝忠義之風却是自范文正作成起來也潘時舉范文正經理西事看得多是收拾人才李儒用載法語會元朱文公曰天地間氣第一流人物朱文公䟦范文正公與姪帖云右范文正公與其兄子之書也其言近而易知凡今之仕者得其說而敬之亦足以撿身而及物矣然公所自謂未嘗營私著必若公之先天下之憂而憂後天下之樂而樂然後爲能充其名實而其所論親僚友以銷壅蔽之萌明禁防以杜交私之漸者引而伸之又非獨効一官之守者所宜知也候官大夫陳君焞得公此帖刻寘坐隅以自警省熹盖三復焉而歎其指之逺而不可窮也敢竊識其說於左方庶幾覽者有以發焉年月日新安朱熹謹書朱文公論文正公振作士氣曰問夲朝如王沂公人品甚高晚年乃求復相何也曰便是前軰都不以此事爲非所以至范文正方厲㢘耻振作士氣曰如㓂萊公也因天書欲復相曰固是朱子語類又問先生前日曽論本朝惟范文正公振作士大夫之功爲多不知便范公䖏韓公受顧命䖏事亦能如韓公否曰看范公才氣亦須做得又曰祖宗以來名相如李文靖王文正諸公只恁地善亦不得至范文正時便大厲名節振作士氣故振作士大夫之功爲多問范文正作百官圗以獻其意如何曰他只說如此遷轉即是公如此遷轉即是私呂許公當國有無故躐等用人䖏故范公進此圗於仁宗因舉詩云誨爾序爵人主此事亦不可不知假如有人巳做侍御史宰相驟擢作侍從雖官品高然侍御史却緊要爲人主者便須知把他擢作待從如何不把做諌議大夫之類又論文正公觧仇事云近得周益公書論呂范觧仇事曰初范公在朝大臣多忌之及爲開封府又爲百官圖以獻因指其遷進遲速次序曰某爲超遷某爲左遷如是而爲公如是而爲私意頗在呂相呂不樂由是落軄岀知饒州未幾呂亦罷相後呂公再入元昊方犯邊乃以公經略西事公亦樂爲之用嘗奏記呂公云相公有汾陽之心之德仲淹無臨淮之才之力後歐陽公爲范公神道碑有歡然相得戮力平賊之語正謂是也公之子堯夫乃以爲不然遂刋去此語前書今集中亦不載疑亦堯夫所刪他如藂談所記說得更乖熹謂呂公方寸隱㣲雖不可測然其𥙷過之功使天下實𬒳其賜則有不可得而掩者范公平日胷襟豁逹毅然以天下國家爲巳任旣爲呂公而出豈復更有匿怨之意况公常自謂無惡於一人此言尤可驗忠宣固是賢者然其規模廣狹與乃翁不能無間意謂前日旣排申公今日若與之觧仇前後似不相應故諱言之却不知乃翁心事政不如此歐陽公聞其刋去碑中數語甚不樂也問後來正獻亦及識范公否曰正獻通判頴川時歐陽公爲守范公知青州過頴謁之因語正獻曰太博近朱者赤歐陽永叔在此宜頻近筆硯異時同薦三人則王荆公司馬溫公及正獻公也其知人如此又曰呂公所引如張方平王拱辰李淑之徒多非端士終是不樂范公張安道過失更多但以東坡父子懐其汲引之恩文字中十分說他好今人又好看蘇文所以例皆稱之介甫文字中有說他不好䖏人旣不好看看亦不信也又論范文正高䖏云呂申公斥逐范文正諸人至晚年復收用之范公亦竭盡底藴而爲之用這見文正高䖏忠宣辨歐陽公銘志事這便是不及文正又曰范文正傑出之才熹甞謂天生人才自是得用豈可厚誣天下以無人自是用不到耳且如一个范文正公自做秀才時便以天下爲己任無一事不理㑹過一旦仁宗大用之便做岀許多事業今則所謂負剛大之氣者且先一茟勾斷秤停到第四五等人氣宇厭厭布列臺諌如何得事成故熹向謂姓名未出而内外已知其非天下第一流矣道夫又論夷簡無相業云熹嘗說呂夷簡最是介無能底人今人却說他有相業何者善䖏置爲相正要以進退人才爲先使四夷聞之知所聳畏方其爲相其才德之大者如范文正諸公旣不用下而豪俊跅㢮之士石㬅卿諸人亦不能用其所引援皆是半間不界無狀之人弄得天下之事日入於昬亂及一旦不柰元昊何遂盡挨與范公文正若非范文正公則西方之事决定弄得郎當無如之何矣今人以他爲有相業深所未曉子蒙又論文正有好議論云徳粹以明州士人所寄書納先生因請問其書中所言先生曰渠言漢之名節魏晉之曠蕩隋唐之辭章皆懲其弊爲之不然此只是正理不明相衮将去遂成風俗熹問巳前皆衮纒成風俗本朝道學之盛豈是衮纒先生曰亦有其漸自范文正以來巳有好議論如山東有孫明復徂徠有石守道湖州有胡安定到後來遂有周子程子張子出故程子平生不敢忘此數公依舊尊他因說前軰如李泰伯門議論只說貴王賤伯張大其說欲以刼人之聽却是矯激然猶有以使人奮起今日湏要作和中将來只便委靡了如范文正公作子陵祠堂記云先生之志出乎日月之上光武之器包乎天地之外㣲先生不能成光武之大㣲光武豈能遂先生之高哉胡文定公父子極喜此語大抵前軰議論麄而大今日議論細而小不可不理會熹周此風俗如何可變曰如何可變只且自立可學又論文正公氣貌如何云苗劉之事今人多責之朱呂當時他也是自做未得古人定大難者不知是如何不知范文正㓂萊公人物生得如何氣貌是如何平日飲食言語是如何様底人今不復得親自看且得箇依俙様子看是如何地如今有志節擔當大事人亦湏有平濶廣大之意始得可學又論文正公精宻云富韓公召來只是要去語人云入見上坐亦不定豈能做事熹云韓公當仁廟再用時與韓魏公在政府十餘年皆無所建明不復如舊時曰此事看得極妙當記取又問使范文正公當此㝎不肯囘曰文正却不肯囘湏更精宻似前日又論文正公待士因論李泰伯曰當時國家治時節好所論皆勁正如此曽南豊携歐公書徃餘杭見范文正公文正云歐九得書令將錢與公今巳椿得甚處錢留公矣亦欲少欵適聞李先生來欲出郊迓之云云僩又答周益公論范碑曲折書云盖嘗竊謂吕公之心固非晚生所能窺度然當其用事之時舉措之不合衆心者盖亦多矣而又惡忠賢之異已必力排之使不得容於朝廷而後已是則一世之正人端士莫不惡之况范歐二公或以諷議爲官或以諫諍爲軄又安可置之而不論且論之而合於天下之公議則又豈可謂太過也哉逮其晚節知天下之公議不可以終拂亦以老病将歸而不復有所畏忌而慮失天下之事或終至危亂不可如何而彼衆賢之排去者或将起而後用則其罪必歸於我而并及吾之子孫是以寜損故怨以爲收之桑榆之計盖其慮患之意雖未必盡出於至公而其𥙷過之善天下實𬒳其賜則與世之遂非長惡力戰天下之公議以貽患於國家者相去逺矣至若范公之心則其正大光明固無宿怨而惓惓之義實在國家故承其善意旣起而樂爲之用其自訟之書所謂相公有汾陽之心之德某無臨淮之才之力者亦不可不謂之傾倒而無餘矣此書今不見集中恐亦以忠宣刋去而不傳也此最爲范公之盛德而他人之難者歐陽公亦識其意而特書之盖呂公前日之貶范公自爲可罪而今日之起范公自爲可書二者各記其實而美惡初不相掩則又可見歐公之心亦非淺之爲丈夫矣今讀所賜之書而求其㫖要則其言若曰呂公度量渾涵心術精深所以期於成務而其用人才德兼取不爲諸賢專取德望之偏故范歐諸公不足以知之又未知其諸子之賢而攻之有太過者後來范公雖爲之用然其集中歸重之語亦甚平平盖特州郡之常禮而實則終身未嘗觧仇也其後歐公乃悔前言之過又知其諸子之賢故因范碑托爲觧仇之語以見意而忠宣獨知其父之心是以直於碑中刋去其語雖以取怒於歐公而不憚也凡此曲折㫖意㣲宻必有不苟然者顧於愚見有所未安不敢不詳布其說以求是正伏惟恕其僣易而垂聽焉夫呂公之度量心術期以濟務則誠然矣然有度量則宜有以辨人才之邪正欲成天下之務則必從善去惡進賢退奸然後可以有濟今皆反之而使天下之勢日入於昬亂下而至於區區西夏一方之病非再起范公幾有不能定者則其前日之所爲又惡在其有度量心術而能成務也哉其用人也欲才德之兼取則亦信然矣然范歐諸賢非徒有德而短於才者其於用人盖亦兼收而並取雖以孫元規滕子亰之流恃才自肆不入䂓矩皆亦将護容飬以盡其能而未嘗有所廢弃則固非專用德而遺才矣如呂公所用如張李二宋姑論其才亦决非能優於二公者乃獨去此而取彼至於一時豪俊跅㢮之士窮而在下者不爲無人亦未聞其有以羅致而器使之也且其初觧相印而薦王随陳堯佐以自代則未知其所取者爲才也耶爲德也耶是亦不足以自解矣若謂范歐不足以知呂公之心又不料其子之賢而攻之太過則其所攻事皆有顯跡不可掩安得爲過且爲侍從諌諍之官爲國論事乃視宰相子弟之賢否以爲前却亦豈人臣之誼哉若曰范吕之仇初未嘗觧則范公旣以呂公而再逐及其起任西事而超進軄秩乃適在呂公三人之時若范公果有怨於呂公而不釋乃閔黙受此而無一語以自明其前日之志是乃内懐憤毒不能以理自勝而但以貪得美官之故俛而受其籠絡爲之駈使未知范公之心其肯爲此否也若曰歐公晚悔前言之失又知其諸子賢故因范碑以自解則是畏其諸子之賢而欲隂爲自托之計於是寜賣死友以結新交雖至以爲無有愧負幽明而不遑恤又不知歐公之心其忍爲此否也况其所書但記解仇之一事而未嘗并譽其他美則其斥逐忠賢之罪亦未免於所謂欲盖而彰者又何足以贖前言之過而媚其後人也哉若論忠宣之賢則雖未易輕議然觀其事業䂓模與文正之洪毅開豁終未有十分肖似處盖所謂可與立而未可與權者乃翁解仇之事度其心未必不深耻之但不敢出之於口耳故潜於墓碑刋去此事有若避諱然者歐公以此深不平之至屢見於書䟽非但墨荘所記而巳墨荘文正公五世孫况龍川楊龜山先生志之於此又以親聞張安道之言爲左驗張實呂黨尤足取信無疑也若曰范公果無此事而直爲歐陽所誣則爲忠宣者正當沬血飲泣貽書歐公具道所以然者以白其父之心跡而俟歐公之命以爲進退若終不合則引義告絶而更以属人或姑無刻石而待後世之君子以定其論其亦可也乃不出此而直於成文之中刋去數語不知此爲何等舉措若非實諱此事故隱忍寢黙而不敢誦言則曷爲其彼之明白而直爲此黯闇耶今不信范公出處文辭之實歐公丁寜反覆之論而但取於忠宣進退無據之所爲以爲有無之决則區區於此誠有不能識者若摭實而言之但曰呂公前日未免蔽賢之罪而其後日誠有補過之功范歐二公之心則其終始如青天白日無纎毫之可議若范公所謂平生無怨惡於一人者尤足以見其心量之廣大高明可爲百世之師表至於忠宣則見雖狹然亦不害其為守正則不費詞說而名正言順無復可疑矣論韓范諸公不苟同云諸公平居相稱若尚同也而議事則公言無私不害其爲同上前爭事若好異也而下殿則如未嘗爭不害其爲異仲淹欲宥滕宗諒杜公曰不可也非異仲淹也恐紊人主之操柄也富公欲罪晁仲約范公曰不可非異富公也恐導人主以嗜殺也韓公欲擊西夏杜公曰不當擊仲淹謂契丹必攻河東請修邊俻富弼料九事且言契丹必不來君實景仁以兄弟自號者也而鍾律之議終其身不相下韓范素號相得者也而城水洛之議互爭沫滬之是非是數公者其漢史所謂忠臣有不和之節而小人䜛爲朋黨可謂誣矣文論吕范交隙云且朋黨之倡其萠於范呂交隙之時乎謂申公爲小人耶爭宸妃誕育之功而䘮於成禮當宮庭避灾之頃而願望清光乃拜手䟽八事如正朝綱塞邪徑禁賄賂卞佞士直得大臣輔相之體而其大者釋仲淹之宿怨容孫沔之直言是未可以小人之訾也謂申公爲君子耶敕有司不受臺諌夷簡倡之戒百官越軄言事夷簡主之罷相之後宻表之頻奏内侍之隂結是失大臣淮退之義而其大者因私憾而預瑶華之議因北事而忌富弼之能是未純於君子也仲淹之比肩聯事豈能帖帖阿附而爲詭随之態乎方其姑蘇召還正愜公議待制之除俾伸素藴而處鈞衡之地者思有以䧟之以待臣噤其口以劇務撓其心然百官之圖四論之獻凛然生言者之氣大臣不堪遂以朋黨目之仲淹於是有鄱陽之行是行也李紘王質載酒徃餞而欲附黨以爲幸歐陽脩余靖尹洙抗䟽力爭而願同貶以爲榮仲淹何慊哉以至韓琦救蔡襄之詩程琳議黨人之誘若谷卞君子之類此皆營救仲淹也惜夷簡之黨勝仲淹之黨不勝至使受知薦主方尓從坐同年進士又相繼岀諸賢皆以朋黨逐矣至仲淹陜西召還稍愜公議日夜謀畫圖報主知然按察之令嚴磨勘之法宻未有愜僥倖之意小人不恱再以黨論之仲淹於是復爲陜西之行是行也身再去國䜛者益甚賈昌朝主王拱辰而逐益柔仲淹所薦也錢明逸論章得象而去富弼富弼仲淹所厚也陳執中因孫甫而去杜衍杜衍嘗爲仲淹言也邸獄之起朋黨作仇一網之打私徒相慶雖歐陽公以去國之身懐不自已抗䟽力言至謂羣邪相賀于内四夷相賀于外未嘗不忠于國者而大勢卒不可挽矣方仲淹始爲夷簡黨目之所斥諸賢尚有左祖及仲淹再爲夏竦黨論之所貶諸賢皆爲倒戈盖夏竦用心慘於夷簡此元瑜所以𥘉是仲淹而復希執中也然嘗反覆史傳切謂黨禍之作固小人之罪而希君子之風附君子之名不得盡其辝責故嘗妄爲之說曰黨論之始倡蔡襄賢不肖之詩激之也黨論之再作石介一䕫一契之詩激之也其後諸賢相繼斥逐又歐陽公邪正之論激之也何者負天下之令名非惟人情不堪造物亦不吾堪尔吾而以賢自處孰肯以不肖自名吾而以䕫契自許孰肯以大奸自辱吾而以公正自褒孰肯以邪曲自毀哉如必過爲别白私自尊尚則人而不仁疾之已甚攻乎異端斯害也已安得不重爲君子之禍孫復謂禍始於此仲淹謂恠鬼壊事韓琦亦謂天下事不可如此其亦有先見云耳唐自牛僧孺李宗閔對策至李德𥙿朱崖之貶一報一復凡四十二年而後息我仁宗在位四十二年待遇臣下恩亦至矣夫豈無藥石以碱砭之湯沐以櫛治之未幾雲開日岀所廢之人㝷即召用所罷之官随已復軄如范文正以忤申公而得貶其始也雖爲之下朋比之詔及西事之興不惟宥其過而且大用杜富歐余以邸獄而盡去始者所行之人雖盡廢黜而陳執中旣罷之後諸賢復召而或卑之鈞衡或列於論思氣類相感竟不至傷吾保泰之和諸賢何憾哉又論元昊所以臣服云盖自天聖中曹寳臣嘗語王􅎦曰君異日當柄用願留意邊防因以元昊桀捍語之時德明尚無恙也其言至寳元而驗寶元以來逆雛犯順忘食肉衣綺之恩肆猾夏亂華之虐懐敏福平以將自詭有先縠剛愎之態無充國老成之慮其勇而無謀不能辨事當時志者巳預占之矧如夏竦設心措慮但欲進擊一聞持重堅守之師則柄鑿矣自爲捴帥端坐長安四路軍政遥聽節制其誤國僨軍之罪自不能掩於張方平之一䟽由是好水之役任福不能嬰其鋒㝎川之役劉平不能遏其勢遣使至境范雍不能明其詐遣人納降士彬不能察其欺當其時也天子不得怡宰相不暇食百官不敢退安於私第中書置議事之㕔羣䇿集經略之幙韓公不肯䄂手於大事當决之時富公不肯結舌於虜使可斬之日小范老子胸中數萬甲兵略展布於代囬國事之頃請岀兵者有吕夷簡言官兵不如鄕兵者有田况身爲躰量使而知四路屯兵之數者有王尭臣王守忠監軍之命不行夏竦通唃厮囉蕃族之議復寢張奎鑄錢之請旣上歐陽脩通􅒩運擢啇賈之䇿復施我常有以破元昊而元昊終不請降於我也以鄜延一路觀之狄青擊之於保安許懷德破之於永平入金明則見困於周羙至延州則見摧於王信以涇原一路觀之虜㓂三川王珪敗之沮其兵虜在自豹任福克之制其兵以河東一路觀之在麟州則張元易旗幟以誤敵其衆大潰在府州則張旨築城陴以堅守其賊果遁至環慶一路所在自爲守俻相爲牽制者又非諸路之所能及青澗旣成則以种世衡懐瓌州属羗自是人精於射虜不敢近大順未城則以范純佑促慶州版築自是城寨截然虜不敢入一韓一范之謡屹然爲天兩柱蛇豕膽䘮犬羊屏息有以也夫於是議和之使至于境上者一至于范仲淹者再至于龐籍者亦再然猶未敢保其無他而輕許之也曁夫遣使納欵者一遣來奏事者四然後賜謺之使不得已而岀疆嗚呼羽􅊾交馳之間勉於支撑拯救之圖玉帛相㝷之後亦不廢慯厲憂虞之心擇武勇於陜西選武臣於諸路諄諄然綸綍之明揚以和好爲權宜以戰守爲實務鯁然搢紳之論奏募入粟以助邊岀内帑以助邊撙節三司用度之數盖其持危益深而防閑益宻救敗扶傷而經畫多未嘗窮追逺討以强兵而來懲去備無大勝亦無大負未嘗急征暴歛以豐財而量入爲岀不至有餘亦不至不足每觀夏竦范雍經略西事之日與韓琦范仲淹經略西事之日勝負利鈍大略可攷信守備亦惟其人而巳不然以䟦扈之元昊𥘉而帝中而男終而臣者又豈無所自耶劉漫塘先生論夲朝人物曰南渡前范文正公合居第一語録賛頌論䟽, WYG: ''}
