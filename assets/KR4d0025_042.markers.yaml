  - {type: variant, offset: 0, length: 404, content: 褒賢之碑宋仁宗皇帝篆額觀文殿學士光禄大夫行禮部尚書知河南府兼西京留守事畿内勸農使上柱國臣王舉正題宋推誠保德功臣資政殿學士金紫光禄大夫尚書戶部侍郎護軍汝南郡開國公食邑二千三伯戶食實封六伯戶贈兵部尚書謚文正公范公神道碑銘并序皇祐四年五月甲子資政殿學士尚書戶部侍郎汝南文正公薨于徐州以其年十有二月塟于河南尹樊里之萬安山下公諱仲淹字希文五代之際世家蘇州事吳越太宗皇帝時呉越獻其地公之皇考從錢俶朝京師後爲武寜軍掌書記以卒公生二歳而孤母夫人貧無依再適長山朱氏旣長知其世家感泣去之南都入學舎掃一室晝夜講誦其起居飮食人所不堪而公自刻益苦居五年大通六經之旨爲文章論說必本於仁義祥符八年舉進士禮部選第一遂中乙科爲廣德軍司理叅軍始歸迎其母以飬及公旣貴天子贈公曾祖蘇州粮料判官諱夢齡爲太保祖祕書監諱賛時爲太傳考諱鏞爲太師妣謝氏爲吳國夫人公少有大節其於富貴貧賤毀譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂, WYG: ''}
