  - {type: variant, offset: 405, length: 6295, content: 其事上遇人一以自信不擇利害爲趍捨其有所爲必盡其力曰爲之自我者當如是其成與否有不在我者雖聖賢不能必吾豈苟哉天聖中晏丞相薦公文學以大理寺丞爲祕閣校理以言忤章獻太后旨通判河中府陳州久之上記其忠召拜右司諫當太后臨朝聽政時以至日大㑹前殿上將率百官爲夀有司巳具公上䟽言天子無北靣且開後世弱人主以疆母號之漸其事遂巳又上䟽請還政天子不報及太后崩言事者希旨多非太后時事欲寖治之公獨以謂太后受托先帝保佑聖躬始終十年未見過失宜掩其小故以全其大德𥘉太后有遺命立楊太妃代爲太后公諫曰太后母號也自古無代立者繇是罷其冊命是歲大旱蝗奉使安撫東南使還㑹郭皇后廢率諌官御史伏閤爭不能得貶知睦州又徙蘇州歲餘即拜禮部貟外郎天章閣待制召還益論時政闕失而大臣權倖多忌惡之居數月以公知開封府開封素號難治公治有聲事日益簡暇則益取古今治亂安危爲上開說又爲百官圗以獻曰任人各以其材而百職脩堯舜之治不過此也因指其遷進遲速次序曰如此而可以爲公可以爲私亦不可以不察由是呂丞相怒至交論上前公求對辨語切坐落職知饒州徙潤州又徙越州而趙元昊反河西乃以公爲陜西經略安撫副使遷龍圖閣直學士是時新拜大將延州危公請自守鄜延捍賊乃知延州元昊遣人遺書以求和公以謂無事請和難信且書有僣號不可以聞乃自爲書告以逆順成敗之說甚辨坐擅復書奮一官知耀州未逾月徙知慶州旣而四路置帥以公爲環慶路經略安撫招討使兵馬都部署累遷諫議大夫樞宻直學士公爲將務持重不急近功小利於延州築素澗城墾營田復承平永平廢寨属羗歸業者數萬戸於慶州城大順以據要害奪賊地而耕之又城細腰胡盧於是明珠滅臧等大族皆去賊爲中國用自邊利乆堕至兵與將常不相識公始分延州兵爲六將訓練齊整諸路皆用以爲法公之所在賊不敢犯人或疑公見敵應變爲如何至其城大順也一旦引兵出諸將不知所向軍至柔逺始號令吿其地處使徃築城至於版築之用大小畢具而軍中初不知賊以騎三萬來爭公戒諸將戰而賊走追勿過河巳而賊果走追者不渡而河外果有伏賊旣失計乃引去於是諸將皆服公爲不可及公待將吏必使畏法而愛巳所得賜賚皆以上意分賜諸將使自爲謝諸蕃質子縱其出入無一人逃者蕃酋來見召之卧内屏人徹衛與語不疑公居三歳士勇邊實恩信大治乃决策謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣初西人籍爲卿兵者十數萬旣而黥以爲軍惟公所部但刺其手公去兵罷獨得復爲民其於兩路旣得熟羗爲用使以守邊因徙屯兵就食内地而紓西人饋輓之勞其所設施去而人德之與守其法不敢變者至今尤在慶暦三年春召爲樞宻副使五讓不許乃就道旣至數月以爲叅知政事每進見必以太平責之公歎曰上之用我者至矣然事有先後而革弊於久安非朝夕可也旣而上再賜手詔趣使條天下事又闓天章閣召見賜坐授以𥿄筆使䟽於前公惶恐避席始得而條列時所宜先者十數事上之其詔天下興學取士先德行不專文辭革磨勘例遷以别能否减任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥倖之人皆不便因相與騰口而嫉公者亦幸外有言喜爲之佐佑㑹邊奏有警公即請行乃以公爲河東陜西宣撫使至則上書願復守邊即拜資政殿學士知邠州兼陜西四路安撫使其知政事纔一歳而罷有司悉幸罷公前所施行而復其故言者遂以危事中之頼上察其忠不聽是時夏人巳稱臣公因以疾請鄧州守鄧三歲求知杭州又徙青州公益病又求知頴州肩卑至徐遂不起享年六十有四方公之病上賜藥存問旣薨輟朝一日以其遺表無所請使就問其家所欲爲贈以兵部尚書所以哀䘏之甚厚公爲人外和内剛樂善泛愛䘮其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其爲政所至民多立祠畫像其行巳臨事自搢紳處士里閭田野之人外至夷狄莫不知其名字而樂道其事者甚衆及其世次官爵誌于墓譜于家蔵于有司者皆不論著著其繫天下國家之大者亦公之志也歟銘曰范於吳越世實陪臣俶納山川及其士民范始來此中間幾息公奮自躬與時偕逢事有罪功言有違從豈公必能天子用公其難其勞一其初終夏童跳邊乘吏怠安帝命公徃問彼驕頑有不聽順鉏其穴根公居三年怯勇堕完見憐獸擾卒俾來臣夏人在廷其事方議帝趣公來以就予治公拜稽首茲惟難哉初匪其難其在終之群言營營卒壊于成匪惡其成惟公是傾不傾不危天子之明存有顯榮歿有贈謚蔵其子孫寵及後世惟百有位可勸無怠翰林學士尚書吏部郎中知制誥充史舘修撰歐陽修文翰林學士兼侍講尚書吏部郎中知制誥充史舘修撰王洙書墓誌銘富弼撰皇祐四年夏五月二十日甲子資政殿學士戶部侍郎范仲淹以疾薨于徐吏走驛馬以公䘮聞天子感慨不一御垂拱殿朝特贈兵部尚書太常考行謚文正録孤賻物悉用加等中外士大夫駭然相吊以泣至於岩􅊤處逸無不痛惜之其孤䕶帷幘還洛卜以是年十二月一日壬申塟于河南縣萬安山尹樊里先隴之側孤馳使來求銘將納于竁曰公之先始居河内後徙長安唐垂拱中履氷相則天以文章稱實公之逺祖也四代祖陏唐末爲幽州良鄉縣主簿遭亂奔二淛家於蘇之吳縣自爾遂爲吳人時中原多故王澤不能逮逺於是世食銭氏之禄蘇州粮料判官夢齡以才德雄江右即公之曽王父也判官生賛時幼聦警嘗舉神童任祕書監集春秋洎歷朝史爲資談録六十卷行於時祕監生墉博學善属文累佐諸王幙府端拱初隨錢俶納國終武寕軍節度掌書記公即掌記之第三子也朝廷以公貴用太保太傅太師追贈三代又擇徐許越呉四大國追封王妣陳氏妣陳氏謝氏爲太夫人公諱仲淹字希文不幸二歳而孤吳國太夫人以北歸之𥘉亡親戚故舊貧而無依再適長山朱氏公旣長未欲與朱氏子異姓懼傷吳國之心姑姓朱後從事於亳吳國命始奏而復焉公少舉進士祥符八年中第調廣德軍司理椽權集慶軍節度推官制置使舉監泰州西溪塩廪以勞進大理丞又舉知興化縣建州関隷以吳國老疾辞監楚州粮料院丁憂去官服除晏丞相以文學薦公于朝試可署祕閣校理時章獻皇太后臨政巳巳歳冬至上欲率百僚爲夀詔下草儀注搢紳失色相視雖切切口語而畏憚無一敢論者上又專欲躬孝德以勵天下而未遑餘恤公獨抗䟽曰人主北面是首顧居下矧爲后族强偪之階不可以爲法或宫中用是爲家人禮權而卒於正斯亦庶乎其可也䟽奏遂罷上夀儀然后頗不懌㝷岀爲河中府通判轉殿中丞謀塟吳國再請通判陳州遷太常博士聞京師多不関有司而署官賞者訪焉出於中㫖廼附驛奏䟽甚懇至願以上官賀婁事爲戒明年章獻后棄長樂擢爲右司諫属朝廷用章后遺令䇿太妃楊氏爲皇太后與政制出都下詾詾公上䟽極諫古者立太后所以尊親也不容冀幸於其間武武相躡一二而數况復稱制以取惑天下耶臣恐後世有以窺之者上悟第於后泣號而止公殫𥙷闕失無所阿忌貴倖仄目不欲久留諫職因江淮飢以才命公體量安撫雖别領走外亦懇懇不忘憂國途中上時弊十事皆政教之大者累月還朝適議廢郭后上書曰后者君稱以天子之配至尊故稱后后所以長飬隂教而母万國也故繫如此之重未宜以過失輕廢立且人孰無過陛下當靣諭后失放之别舘㨂妃嬪之老而仁者朝夕勸導俟其悔而復其宮則上有常尊而下無輕議矣書奏不納明日又率其属及群御史伏閤門論列如前日語上遣中貴人揮之令詣中書省宰相窘取漢唐廢后事爲解時吕夷簡爲相公曰陛下天資如堯舜公宜因而輔成之柰何欲以前世弊法累盛德耶中丞孔道輔名骨鯁亦扶公議論甚切直又明日晨率道輔將留百辟班揖宰相廷辨抵漏舎㑹降知睦州臺吏促上道在郡歳餘知蘇州朝廷知清議属公就拜禮部貟外郎天章閣待制召還有入内都知閻文應者專恣不恪事多矯旨以付外執政知而不敢違公聞知而不食將入辨謂若不勝必不與之俱生即以家事属長子明日盡條其罪惡聞於上上始知遽命竄文應嶺南㝷死于道公自還闕論事益急宰相隂使人諷公待制主侍從非口舌任也公曰論思者正侍臣之事予敢不勉宰相知不可誘乃命知開封府欲撓以劇煩而不暇他議亦幸其有失即罷去公處之罙月威斷如神吏縮手不敢侮其奸京邑肅然稱治于時官方無紀每對未嘗不爲上力陳治亂之道皆由用人得失此實宰相之職也天子日擁万幾非所宜專然不可以不察因取職局官品以類選次至於超遷序進附見其下爲圗以獻庶上易覽宰相益不恱嗾其黨短公於上前公亦連詆宰相坐是去閣職貶知饒州是日上封贈書論公以忠義獲譴極道所不可者皆當世英豪宰相指爲朋黨相繼謫去治饒未久徙潤又徙越寳元初羗人壓境叛間歳悉衆㓂延州大將戰沒関中警嚴於是還公舊職移知永興軍道授陜西都轉運使議者謂將漕之任不預戎事遂改充經略安撫副使仍遷龍圗閣直學士吏部貟外郎以寵之至部首按鄜延時延安始困兵火障戍掃地城外即㓂壤巋然孤壘人心危恐廢食待竄凡朝廷遣守皆以事避免旣遷延不時徃公遂留不行騎奏願兼領延州事以待㓂之復來上嘉而從之属亡戰日久兵無紀律猝有外警蕩然不支公於是大閱州兵得萬八千析爲六將分命禆佐訓飾不數月舉爲精銳士氣大振莫不思戰而㓂知我有備即引去朝廷推其畫諸路皆以爲法成青澗城復散亡属羗萬餘帳開營田數千頃以收軍實人視邊塞其完固如山立不可動謂宜討賊不可坐守老吾師朝廷下其議將從之公執猶以爲未無幾涇原師出敗于好水川天子由是益信公智謀過人逺甚前此賊以書署僣號遺公請和公不忍俾朝廷報賊乃自占荅黜其僣署爲陳逆順禍福立遣使者還未岀境聞好水川敗始悟賊書譎而非誠益自信立報爲是執政以公擅報罪當誅上知公其責止命削一官降知耀州幾月拜戶部郎中起知慶州㝷遷左司郎中本路經略安撫招討使兼兵馬都部署有馬砦者素爲賊衝然地與境相衝久不能城公至自領牙兵岀不意駐柔逺砦别遣蕃將取其地得之先命長子入據以率衆公亦親往勞士有頃賊三萬騎叩城下公麾兵血戰則遽北戒諸將勿追已而果有伏兵夜遁城旣立詔名大順徐又城細腰復胡盧等寨招明珠滅臧二强族各萬餘人及並環千餘帳内附自此環慶属羗悉爲吾用先是卒驕難使主將咸務姑息公築延慶諸城堡募民不足乃雜使禁旅盖素服公威惠勞苦雖且死不怨久之涇原師再䘮定川関轉復震而虞變生公知親率垓下兵連夜赴援且將邀賊歸路擊之㑹巳出塞遂班師因移其兵耀于関輔人心由是大定𥘉定川事聞上頗駭謂侍臣曰得范仲淹出援吾無憂矣數日公奏至上大喜懷其章示執政曰吾知范仲淹可用加樞宻直學士右諫議大夫時朝廷以戍卒屢衂議黥鄕人懼甚竄匿不願黥公改命但刺其手非校戰請農于家後罷兵獨環慶路郷軍得復爲民民德公至于今不忘朝廷㝷盡以西路委公置府於涇州授陜西四路經略安撫招討使方謀取横山故地漸復靈夏然後可以誅賊賊知亡無日懼不克當因遣使講和明年春召公爲樞宻副使凡五讓不從乃拜之輿議謂公有經綸之才不宜局於兵府是秋改參知政事上倚公右於諸臣公亦務盡所藴以圗報然天下久安則政必有弊者三王所不能免公將劘以歳月而人不知爲悠久之道也上方銳於求治間數命公條當世急務求公始末奉詔每辞以事大不可忽致於是露熏降手詔再遣内臣就政事堂督取開龍圗閣給𥿄扎令立䟽者各一日面詰者不可數退曰吾君求治如此之切其暇歳月待耶即以十䇿上之盖取士課吏減任子更衛兵擇守宰謹勑令厚農桑之類者又先時别上法度之說甚多皆所以抑邪侫振紀綱扶道經世一一可行上覽奏褒納益信公忠耿不爲身謀䘏也遽下二府促行論者漸齟齬不合作謗害事公知之如不聞持之益堅明年秋邊奏疑若有警者公慮帥臣恃和而懈因懇請按邊即命河東陜西宣撫使麟州向者亦𬒳㓂掠邈然在賊腹中本道帥病無供給奏欲棄之曰麟棄疆塲日蹙不可請復廢障使民耕于鄙於是得不棄又代郡西四州軍附邊有廢地尤廣著令禁不得耕郡縣以敵嫌不敢正視前歐陽修來使盡籍其利害請弛禁許人耕以輸可代轉輓之勞以帥議不協罷公至於其利大且亡所嫌者屢奏如脩議便後止耕岢嵐一境而塞粟已充矣公旣度陜以西羗好難保而邊計尚缺䟽手奏願觧政事復領四路以捴護諸將即除授資政殿學士知邠州兼陜西四路安撫使以疾請鄧州遷給事中三年又請淛郡因得厝先人之墓移杭州加禮部侍郎祀明堂復遷戶部又移青州兼東路安撫使幾歳病疾又請頴肩輿至彭門遂不起年六十四公爲學好明經術每道聖賢事業輙跂聳勉慕皆欲行之於己自始仕慨然有康濟之志凡所設施必本於仁義而將之以剛决未嘗爲人屈撓歷𥙷外職以嚴明馭吏使不得欺於是民皆受其賜立朝益務逕雅事有不安者極意論辯不畏權倖不蹙憂患故屢亦見用然每用必黜之黜則忻然而去人未始見其有悔色或唁之公曰我道則然苟尚未遂棄假百用百黜亦不悔噫如公乃韓愈所謂信道䔍而自知明者也在陜西尤爲宣力以儒者奉武事又邊備久廢忽而王師新敗剥䘮破漏而莾乎無所取濟公周施安集坐可守禦畜銳觀釁適圖進討㑹羗人復修貢朝廷始議息兵乃從其請於是不能成殄滅之功然其閱武練將可以震敵城要属雜羗可以扼㓂此後世能者未易其過也至於懇田阜財立法著信愛民全國體赫赫在人耳目皆可爲破賊之地者又可道哉其歷二府纔歳餘而罷若夫天下至重久安之弊至深而欲以一二歳臨之而望治雖愚者知其不可得况所奏議阻而不行者十八九行者又即改廢不用兹所以重主憂而生民未得安也宣撫之𥘉䜛者乗間鋒起盖以竒中造端飛語無所不及甚者必欲擠之以死而後巳頼上寛度明照知公無他始終保全獲歿牖下嗚呼道之難行也而至是乎憸人苟欲伸巳志而不志乎邦家此先民所以甘藜藿而蹈江海也公天性喜施與人有急必濟之不計家用有無旣顯門中如賤貧時家人不識富貴之樂每撫邊賜金銀甚而悉以遺將佐在杭盡以餘俸買田於蘇州號義莊以聚踈属而歛無新衣友人醵資以奉塟諸孤無所處官爲假屋韓城以居之遺表不干私澤此益見其始卒志於道不爲禄仕岀也作文章猶以傳道名世不爲空文有文集二十卷奏議十七卷兩府論事三卷娶李氏故參知政事昌齡之姪封金華縣君卒於鄱陽今舉而附焉四子純佑守將作監主簿少有氣節以疾廢于家純仁進士第光禄寺丞純禮太常寺太祝皆温厚而文識者曰范氏有子矣三女長適殿中丞蔡交次適封丘主簿賈蕃諸孫三長正臣守將作監主簿一男純粹一女二孫㓜銘曰公之世系源于陶唐晉㑹食范厥姓始彰睢痤蠡増滂寗雲質兹惟聞人間代而出或霸戓季所有何𫐠粤自得姓千五百年獨公挺生爲天下賢渉聖之餘掲厲泗㳂道尊德雄事公日繁人獲一善巳謂其難公實百之如無有然遭時得君位亦顯焉罹此䜛慝志莫究宣元元秊艱噫嘻乎天文正公傳張唐英范某字希文蘇州人武寕軍掌書記贈太師墉之子幼弧母適朱氏祥符八年登進士第曰朱說者是也累遷大理寺丞上相府書極陳天下之利害當時皆以王佐許之宰相晏殊薦其文召試秘閣校理上欲以冬至率百僚上太后夀抗䟽言不可遂罷岀通判河中府遷陳州屢上䟽言内降之弊引韋后爲戒章獻厭世擢爲右司諫言楊妃不當稱太后郭后不當廢降知睦州遷蘇州召爲禮部貟外郎天章閣待制論事益切執政忌之命知開封府欲處以煩劇而不暇他議某明敏通照决事如神京師謡曰朝廷無憂有范君京師無事有希文每上殿奏事多陳治亂以開悟人主歷詆人臣不法言者以某離間君臣落聀知饒州事司諫高若訥言貶黜太輕歐陽脩上書責之亦得罪余靖尹洙皆坐朋黨𬒳絀蔡襄作四賢一不肖詩以詳其事不肖指若訥也寳元初元昊叛上知其才兼文武復聀知永興軍道授陜西都轉運遷龍圖閣直學士時延安新𬒳圍朝廷擇帥皆畏不行某奏請兼領延安軍以待㓂至上嘉而從之閱兵得萬八千遷六將俾領之日夕訓練號為精兵焉賊聞之第戒曰無以延州爲意今小范老子腹中自有數萬兵甲不比大范老子可欺戎人呼知州爲老子大范謂范雍也城青澗開營田招属羗及請戒諸路養兵畜銳不宜輕動賊許以書請和某以元昊國之叛賊不可俾朝廷報賊乃自作書與陳逆順賊㝷䧟好水某益信報賊書爲是而執政以其擅報當誅上以爲閫外之事專之不足罪止移知耀州㝷起知慶州兼經略招討未幾賊兵三萬叩城某鏖兵血戰賊兵奔北遂戒諸將無逅奔旣而果有伏兵又奪賊馬砦爲大順城及築細腰復葫蘆等砦招明珠滅臧二强族萬餘人及命環州种世衡招千餘帳自是属羗皆爲用久之王師再䘮於定川某晝夜領兵赴援初関輔人心動摇及見某耀兵號令嚴明威震戎落人心遂安第相賀曰邊上自有龍圖公爲長城吾属何憂𥘉上聞定川之敗頗以関中爲憂曰若得某出援可無慮及聞某出師甚喜時議黥鄕軍某惟令刺其手及兵罷環慶路皆復得爲農上㝷以四路都招討委之開府於涇某與韓琦叶謀必欲收復靈夏橫山之地元昊大懼稱臣明年春召爲樞宻副使以鄭戩代之秋拜參知政事乃上取士課吏減子更衛兵擇守宰謹赦令厚農桑之策塞僥倖之塗開公正之路天下側耳以聽太平凢所措置十未行一而權勢者大惡之明年契丹與元昊爭銀甕旋而麟府奏警某自請岀爲河東陜西宣撫二虜聞之皆不敢動懇以邊事爲請以資政殿學士復緫四路之師開府邠州以疾請鄧州移杭州青州遷戶部侍郎又請汝隂至徐州而薨年六十四奏至上嗟悼泣下曰朕方將大用不謂其早死贈兵部尚書謚文正子純佑有才識以疾廢于家次純仁登進士第有父風今爲都官貟外郎褒賢集, WYG: ''}
