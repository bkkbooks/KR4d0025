  - {type: variant, offset: 4847, length: 0, content: '', WYG: 欽定四庫全書范文正别集巻四宋范仲淹撰序十六羅漢因果識見頌序余嘗覽釋敎大藏經究諸善之理見諸佛菩薩施廣大慈悲力啟利益方便門自天地山河細及昆蟲草木種種善諭開悟迷徒奈何業結障蔽深高著惡昧善者多見性誠心者少故佛佛留訓祖祖垂言以濟羣生以成大願所以隨函類衆聖之詮總為大藏凡四百八十函計五千四十八巻録而記之俾無流墜余慶厯初任知政事時西虜背惠侵擾邊隅勞師困民以殄兇醜聖人愛民恤士命余宣撫河東沿邊居民將士塗中寓宿保徳水谷之傳舍偶於堂簷罅間得故經一巻名曰因果識見頌其字皆古𨽻書乃藏經所未録而世所希聞者也余頗異之啟軸而觀乃十六國大阿羅漢為摩拏羅多等誦佛説因果識見悟本成佛大法之頌也一尊七頌總一百一十二頌皆直指死生之源深陳心性之法開定慧真明之宗除煩惱障毒之苦濟生戒殺誘善祛邪立漸法序四等功徳説頓敎陳不二法門分頓漸雖殊合利鈍無異使羣魔三惡不起於心萬法諸緣同歸於善余一句一歎一頌一悟以至巻終胷臆豁然頓覺世縁大有所悟儻非世尊以六通萬行圓明慧鑒之聖則無以至此方知塵世之中有無邊聖法大藏之内有遺落寶文謹於府州承天寺命僧歸依别録藏之厥後示諸講説高僧通證耆達皆未見聞莫不欽信後於戊子嵗有江陵老僧慧喆見訪因話此頌諸聖祕密世所希聞喆傳之於武陵僧普煥處寳之三十餘年未逢别本余因求副本正其舛駮以示善知故直序其事以紀其因時戊子仲春髙平范仲淹序賦林衡鑑序人之心也發而為聲聲之出也形而為言聲成文而音宣言成文而詩作聖人稽四始之正筆而為經考五聲之和鼔以為樂是故言依聲而成象詩依樂以宣心感干人神穆乎風俗昭昭六義賦實在焉及乎大醇即醨旁流斯激風雅條散故態屢遷律吕胍分新聲間作而士衡名之體物聊舉於一端子雲語以雕蟲蓋尊其六籍降及近世尤尚斯文律體之興盛于唐室貽于代者雅有存焉可歌可謡以條以貫或祖述王道或褒贊國風或研究物情或規戒人事煥然可警鏘乎在聞國家取士之科縁於此道九等斯辨寸長必收其如好高者鄙而弗攻幾有肴而不食務近者攻而弗至若以莛而撞鐘作者幾希有司大患雖炎炎其火玉石可分而滔滔者流涇渭難見曷嘗求備且務廣收故進者豈盡其才而退者愈惑於命臨川者鮮克結網入林者謂可無虞士斯不勤文何以至撰述者既昧於向趣題品者復異其好尚繩墨不進曲直終非仲淹少遊文場嘗禀詞律惜其未獲竊以成名近因餘閒載加研玩頗見規格敢告友朋其於句讀聲病有今禮部之式焉别析二十門以分其體勢叙昔人之事者謂之叙事頌聖人之徳者謂之頌徳書聖賢之勲者謂之紀功陳邦國之體者謂之贊序緣古人之意者謂之緣情明虚無之理者謂之明道發揮源流者謂之祖述商㩁指義者謂之論理指其物而咏者謂之詠物述其理而詠者謂之述詠類可以廣者謂之引類事非有隠者謂之指事究精微者謂之析微取比象者謂之體物强名之體者謂之假象兼舉其義者謂之旁喻叙其事而體者謂之叙體總其數而述者謂之總數兼明二物者謂之雙闗詞有不羈者謂之變態區而辯之律體大備然古今之作莫能盡見復當旅次無所檢索聊取其可舉者類之于門門各有序盍詳其指古不足者以今人之作者附焉畧百餘首以示一隅使自求之思過半矣雖不能貽人之巧亦庶幾辯惑之端命之曰賦林衡鑑謂可權人之輕重辨已之妍媸也所舉之賦多在唐人豈貴耳而賤目哉庶乎文人之作由有唐而復兩漢由兩漢而復三代斯文也既格乎雅頌之致斯樂也亦達乎韶夏之和臣子之心豈徒然耳若國家千載特見取人易方登孝廉舉方正聘以伊尹之道䇿以仲舒之文求制禮作樂之才尚經天緯地之業於斯述也委而不論亦吾道之志歟時天聖五年正月日}
