  - {type: variant, offset: 0, length: 11482, content: 年譜𥙷遺前譜所載公事多有闕遺今取其未載者見之逐年之下明道二年八月公時爲江淮安撫勘㑹真椘泗州有發運司轉般斛斗差撥綱運於三處装發粳米大小麥豌豆等共五十萬石救濟沂宻徐兖等州九月體量淮南州軍賖糴人民二麥并賖買亭民塩貨未有見錢支給并向春逐處缺乏軍儲亦無錢和糴奏乞借賜錢五十萬貫并疋帛香藥三五十萬下淮南軍州應副前項支贍又體問得諸軍州自來和糴當農民出糶𬒳行人抑壓價例收糴不前直候冬深斛斗巳入商賈之家方始添價丗糴是以大叚虗費官錢又不濟得農民奏乞許農民作保申乞先請價錢限一月内入納免𬒳經販人隔截農民不得抑勒令請領十月奏爲蘇常秀潤旱蝗乞依吳遵路所奏權罷配糴斛斗又自江寧府乘逓馬到潤州起發椘州等處斛斗徃廬壽登萊等州時江淮州軍有因疾疫死亡人口種蒔不敷田叚甚多公牒逐官依灾傷一例體量放减并孤貧老㓜不濟人戸多無田苗除減放外移稅數不多者虚煩催科無可送納即與全放十一月牒江淮灾傷州軍應實因灾傷逃移抛下稅産巳曾申報州縣後來雖是未差官撿覆今却歸業者並放免稅賦及有已曾歸業爲官中令納稅存濟不得又逃移者亦許歸業依此減放稅科十二月奏乞免放舒廬等州折役茶又㸔詳江寧府上元縣等處所管主客戶口逓年送納塩錢即不曾請塩食用其客戸塩錢數不多欲乞朝廷特與除放景祐元年正月薦丁鈞鄧資徐執中衛齊盧革李碩張弁並公㢘文雅爲衆所稱堪充京官如擢用後犯入已贓甘當同罪時黎德潤無辜獄死公奏乞訪求本家骨肉量與支賜令其收瘞仍乞指揮令後命官使臣犯公罪流以下贓罪徒以下並不禁繫許責保出外聽勑康㝎元年正月十二日牒環慶路今後如有報到賊馬深入鄜延路更請相度一靣部領軍馬入賊界攻討要害城寨湏管大叚殺獲分張賊勢不得只在界首及打虜些少族帳便爲䇿應之名若環慶有賊馬亦令鄜延路分擘諸頭出軍馬深入賊界攻討十五日陜府申稅戶朱大成等八百九戶各於送納秋稅不前抛下稅額全家迯走公牒陜府指揮逐縣郷村拘管上件逃移人戶屋業生産不得燒燬斫伐其逃移人口即與倚閣去年秋稅招誘歸業免致逃移毀却業産將來歸業不得即大叚虧失省稅所有諸州軍人戶慮恐亦有似此逃移并牒逐州亦請相度安恤樞宻院劄子奉聖㫖西界首領約遇没兀等二人部領蕃賊七百餘人在塞門寨駐泊其部署司爲何不差人馬掩殺公言延州去塞門寨並無人煙又行川路之中一水屈曲五七十處渉渡恐傷兵士脚手周廻又無舊日熟戶縱得此寨其勢孤絶亦恐難爲駐兵以此不如訓練兵士候春煖可以渉水或輕兵掩襲或大軍攻賊縱𬒳棄去自家兵士不致有損二月八日奏上延州熟戶見今饑餓若春深無田可耕别思作過或虜刼漢戶北入橫山則延州東界大有憂事乞興脩廢寨御前劄子付夏靖仰一靣與范仲淹計㑹啇量但應機乘便可以出師即同謀進取又聖旨令范仲淹於鄜州與夏竦韓琦商議邊事十二日奏乞相度禁放青塩利害事十四日公有䟽奏荅朝旨論攻討西賊利害十七日奏張建侯狄青等與西賊戰于保安軍有功乞重加錫賜公嘗舉歐陽公充本路掌書記尋詔除館閣不赴任十七日公上言竊見著作佐郎通判天雄軍張方平富於文學後有才用乞朝廷改除充本司掌書記取進止是月二十四日牒張亢修豐秣城及萬安寨又牒朱吉任守信种世衡高良夫相度東路承平南安兩寨如久逺可守即進兵前去修復是月二十五日又奏乞修廢寨三月初一日牒青澗城种世衡永平寨郭延珎等接此春煖耕農之時速勘㑹上件驚移熟戶蕃部如内有未敢歸業依舊耕種即便相度鄰近有無官司空閑地土或逺年迯田權撥與耕種如無牛具者官與量借錢收買常切安存無令失所初二日又奏那兵馬五萬防托秦州時知保安軍王信西路巡檢狄青自來入陣勇猛公恐其爲賊所誘二十八日奏乞指揮二人令持重不湏身自闘敵四月五日差周羙楊麟陳永圖等修復萬安寨豐林城甘泉城巳畢公又相度將興修承平南安新寨等十一日牒种世衡郭延珎等㨿的是見闕乏糧草蕃部相度逐戶口數目毎十口巳上官中量支借貸糧粟各一石十口巳下各借五斗仍常切照管安存無令失所六月奏乞指揮逐路將諸軍弓弩手教習短兵又乞㨂選武士充節級七月十五日舉孫沔田况充經略判官又舉胡翼之充本司催驅公事八月一日舉劉牧錢中孚等十七人充陜西差遣時延州金明寨招到殘破蕃部三百二十八戶雖給與田土無力耕種缺少粮食公奏體量延州西北𬒳西賊破蕩兼知延州張存母年八十寄泊他郡人子之心宜不獲安伏乞别選人知延州如未選得間即令臣知延州所貴依得約束訓練兵馬十八日公牒延州通判大理寺丞高良夫將本寨見管熟戸蕃部等毎家十口巳下各支斛斗二石其十口已上支三石公廵邊到延州㨿左侍禁王聦状陳弟王繼元差在塞門寨權兵軍監押𬒳蕃賊打破寨門相殺身死二十日爲奏聞朝廷乞特賜獎録以勸死節之士初鄜州至延州一百六十里元是三程於新店牢山各有舘驛後减廢九月公與轉運使明鎬廵歷自鄜州至延州兩程遇晴明皆昏黃後方到驛程太逺山坂至多及廵歷回來却值泥雨崖路險滑三十餘度涉河自甘泉縣早發至晩只到得皇甫店去鄜州尚更兩鋪所有隨行軍馬巳各疲乏便無喫食湏用回買其軍馬既不到驛即無支請草料去處兼是山居無可收買遂牒延州將牢山新店舘驛量行脩𥙷及存留甘泉新置驛毎有過徃使命軍馬或遇晴明直中路甘泉縣即支給一日口食糧草或遇雨雪并山河水漲即於新店牢山勘請止宿十六日奏乞放免張亢斬軍不當罪名是月奉聖㫖節文令公宻切厚支與金帛召募敢死之士深入賊境探候等事公言臣在延州差韓周張宗永賫送文字直到昊賊處二人不期爲臣所累皆竄逺方今雖奉聖旨令臣募人入賊界以何靣目更可使人伏乞勾還韓周張宗永量加恩澤十月初一日廵檢李惟希下兵士王羲等四人作閙扇揺軍人公到延州㨿司理院勘到並斷送葛懐敏軍前要斬初五日公牒朱觀將領兵軍計㑹王逹朱吉王守琪張宗武自鄜州西北入德静寨進兵討掠族帳又牒葛懷敏將帶周英鄭從政部領兵馬離延州徃保安軍逼逐蕃賊仍差劉政充先鋒取路深入破蕩部署初九日又奏乞逐路部署巳下出入進退處置軍馬公事並聽經略安撫都部署司諸使處分時西賊大將剛浪唆兵馬㝡爲強勁在夏州東彌陀洞居止又次東七十里有鐡冶務即是賊界出鐵製造兵噐之處去河東麟府界黃河西約七八十里可出麟府并石隰州兵馬與隰州兵馬與延州兵馬㑹合掩襲以分賊勢惟朱觀久在麟州知得次第巳曾宻議奏乞令朱觀計㑹河東軍馬以幹此事鄜州曹司馬勲張式黃貴减尅兵士請受公言當此軍期之際兵士多是饑寒逃亡若更减尅轉難存濟遂牒鄜州將馬勲等三人對諸軍處斬又奏脩城及般運糧草工役辛苦地又惡寒日有逃亡乞毎月支醬菜錢是月十二日公上言陜西軍州自西事以來應副軍期科率百出如官貟得人稍能均濟或知寛猛則不致於殘民其不得人處政在胥吏因其急速得恣貪暴既属軍期民無所訴臣自膺寄任奏薦頗多乞朝廷深加照察知非請托其所奏之人多是僥倖優稳之處永祝辭免不來赴任朝廷遂一夫之私情忘百姓之深患滿目疾苦將何以濟伏望聖慈特賜愛軫應陜西所奏官貟曾經免者除别有擢用外却乞盡底催發前來赴任十七日公具諸將所獲生口鞍馬畜産噐械并首級具聞于朝十八日保安軍奏乞早降宣命下本路轉運使司并經略安撫使副火急於近裏州軍人戶秋稅内科撥赴本軍公體量得延州至保安軍山路一百五十餘里昨因西賊侵擾焼却人戶田土則各迯散㳂路不住有蕃賊出來打刼若令近裏州軍人戶就保安軍輸納轉見苛虐於民不便公遂擘畫只將鄜延兩路界近保安軍送納公將部將任福打破白豹城蕩四十餘里狄青黃世寧到盧子平捉到西賊婦女朱觀打破洪州一十餘寨并族帳二十餘處二十八日奏乞不禁青塩二十九日奏乞朝廷念及邊逺之人率多無告特告朝㫖應舉充縣令人限一季内並與移陜西路如在㳂邊州軍即便乞與除職官知縣如人數不足即乞委清望官於三舉巳上進士有行止文學者具事狀連坐各薦一兩人不致闕官辦集邊事是歲十一月虎翼軍第九指揮王瓊奪長行于興斫到人頭作自巳功劄上名字申奏宣轉充下名正指揮使後于興告訴問訖招伏公書斷云奪戎士死戰之功誤朝廷重賞之意其王瓊集軍貟等處斬又奏乞建故寛州爲青澗城十三日奏狄青黃世寧頗勇氣乞早加獎用十六日奏張繼勲破賊於歸娘谷乞賜酬獎十七日時陜西軍州毎年夏稅支移在邊上送納民疲於役公又上言乞令於陜西近裏州軍送納則惜得百姓時自京起發兵馬來陜西邊上州軍駐劄訪知押軍使臣内有懦弱生踈不能鈴轄致兵士在路作過攪擾縣鎮十九日公牒鄜同華州河中府如軍馬經過相度使臣稍有生踈不能鈴轄便請那差都監監押一貟或差得力使臣支與驛劵同共管押逐州交割不得縱令不著次第及攪擾縣鎮施行十一月差張建侯與狄青黃世寧劉政在保安軍差鄭從政在萬安鎮又牒鄜州令張宗武徃敷政縣且令探侯如近邊寨無備則便行討擊二十六日奏舉种世衡知環州十二月初二日乞陞擢滕宗諒差赴陜西必可濟辦邊事時清邊弩手新到州司不敢依例給錢公言㳂邊苦寒之地所有晉州清邊弩手指揮人貟兵士巳到延州例各單寒闕少衣装初四日遂牒延州一例支給十二月十二日奏乞朝廷特降指揮下京西陜西嚴切鈴束如有兇惡即行軍法十六日牒同州抽差北縣分弓手二千人并牒河中府抽差弓手一千人並差使臣押送鄜城縣駐劄把隘防托又牒耀州郡兵士兩指揮赴坊州防托時關中諸郡支移百姓苗稅配納糧草徃邊上州軍送納惟鄜延一路㝡是辛苦縻費數倍蓋是山陵道路不可通大車只是小車并驢子般運或遇晴明則一月程僅可徃還或值雨雪艱難寸進至有離家四五十日褁纒乾糧並盡却更那人歸取盤纒今延州稈草毎束一百七十文其闕中百姓秋稅入邊上送納毎束稈草只折三十文若㩀在市價頗甚虧民公相度得鄜州鄜城縣後魏時爲鄜城郡隋爲僖州南至同州河中府各是四程北至鄜州兩程至延州五程物價稍賤奏乞朝廷建鄜州爲軍令建營房倉厫廨舎所有同華河中府以來州軍近下等第苗稅只於此處送納且减得一半惡路至春却那减鄜延軍馬於此處屯泊就得賤價粮草稍减得百姓勞弊辛苦亦且近便徃復十二月二十八日奏乞暫出延州賞給熟戶蕃部首領給與文帖并散茶綵内有功勞異於衆者等第支給襖子腰帶係蕃部廵檢者給與紅纓交椅仍與别立約束令逓相鈴轄准備點集時聖㫖令公與梁適商量邊機事公奏乞指揮涇原路招安明珠滅蔵二族時邊上臣僚陳乞買馬纔得宣頭便令人於熟戶及百姓公人之家覷歩收買其差去人接便起動熟戶取奉虧價强買邊上新舊官貟各稱准宣買馬無時了絶徃徃一道宣頭應帶數疋公乞朝廷降指揮將買馬宣頭並乞勾收繳納慶曆元年是歳春正月公在延州朝廷既用韓琦等所畫攻䇿先戒師期公言正月内起兵塞外雨雪大寒暴露僵仆使賊乗之必有所傷願朝廷存此一路未行討伐容臣示以恩信或可招納戊午詔從公所請時公前凡六奏卒城承平等十二寨蕃漢之民相踵復業二月四日奏乞於諸寨置榷塲用疋帛等博買熟戶將到青塩只於慶環二州添起一倍價錢出賣收得一色見錢糴買糧草及支諸軍請受大段减得近理見錢應副邊上三月任福等既敗朝議因欲悉罷諸路行營之號明示招納使賊驕怠仍宻收兵深入討擊詔范仲俺体量士氣勇怯公言任福巳下皆邊上有名之將尚不能料賊今之所選徃徃不及更令深入禍未可量於是行營之號卒不罷兵亦不復出四月徙知慶州兼管勾環慶路部署司事初元昊隂誘属羗爲助環慶酋長六百人約與賊爲鄉道後雖首露猶懷去就公至部即奏行邊以詔書犒賞諸羗閱其人馬立條約諸差受命恱服自是始爲漢用初曹瑋於環慶添置六寨差田敏部轄軍馬在彼防托至今熟戶倚此城寨四月公奏乞聖慈以曹瑋田敏前後戰功并建寨托邊之利特加贈典其直下子孫量行恩澤以奬勸邊士六月陜西體量使王堯臣言范仲淹韓琦皆天下選其忠義智勇名動夷狄不宜以小故置散地先是一月聖㫖令擘畫牽制西賊不令徃河東作過公牒夲路主兵官貟盡底部領戰兵徃沿邊入界牽制併擘畫合行事件指揮逐路主兵官貟施行十月初五日將所行事件畫一具奏十一月二十一日舉劉貽孫及葛宗古二十六日乞將以所授左司郎中一官回授种世衡與轉諸司使知環州是月梁適自陜西還公附奏攻守二議是月奉聖㫖體量鈴轄都監十二月初七日奏乞改移張明郝緒慶曆二年時蕃部廵檢趙明勾招到賊界僞署團練使訛乞并手下蕃官等共二十三戶公㝎奪賞賜銀椀頭巾角茶交椅銀帶錦襖等物那與繫官房舎居住正月初二日公奏乞爲蕃官訛乞等補官十一日到環州管設蕃官支與銀綵等物與立約束蕃部喜躍二十九日再舉种世衡知環州時牒各寨逐月一度勾集蕃官管設又恐公用錢物使用不足又牒環州簽判隂諒臣徃逐寨標撥官地種蒔𬞞菜貨賣并諸蕃部贓罰添助公用去訖所貴不破省錢是月公到邠州排揀新兵據人戸王招瑋等陳告稱官中脩營占却園林地土拆了屋舎乞估計合支價錢公牒委邠州請依上項條貫支給逐人價錢及除放随地錢稅後邠州准轉運司牒勾收巳支價錢公言雖准都轉運司指揮令將空閑官地兊還既無官地即合回申都轉運司豈得故違條貫並不回申便却例行催納巳支價錢侵害人戸勾到本州元行典級王益等取勘招伏上項有違條貫情罪於杖一百上斷遣差人押送本州收管所有上件人戶地土價錢却牒邠州依條支遣二月四日太子中舎通判延州高良夫奏乞下陜西四路令銷兵士防托州軍一依范仲淹擘畫先定下守城人數於近裏州軍輪差弓箭手充數次邊州軍弓箭手却輪差在極邊城寨奉聖㫖且令邠寜環慶路諸都部署司相度又無妨礙且利害疾速聞奏公言相度所差弓手並是人戶三丁内破一丁充役若是撥於極邊州軍屯戍縁邊上食物踊貴亦少營舎官中請受至薄難裏纒必於本家骨肉處頻有呼索動是數百里本家更破一名徃來供送即是一戶三丁之内二丁防邊徒使破壞家産伏乞朝廷更請相度二月奏言延州䧟破前年西賊圍閉之時山城未曾脩築㣲有墻壘未能禦捍惟劉平星夜前來救濟得延州不至䧟破此實劉平忠勇之力今來子弟復在邊任其跡孤危未能雪耻竊聞劉平尚在恐邊臣有所憎愛别造飛語乞朝廷倍賜照管又言計用章無不順之意乞與叙用初五日有㸔詳趙珣所奏畫一奏䟽時樞宻院劄付經略司諸將在外者若賊冦大至並湏領兵覔便攻擊二十五日公言將有勇怯師有衆寡用兵無常勢非可畫一而制者也乞朝廷指揮逐路主帥近雖降此指揮仰更體量將之强弱敵之衆寡地勢險易天時明晦臨事處分以保民安邊事爲重庻少敗事其樞宻院指揮未敢施行三月七日奏陜西不可行用鐡錢四月令李丕諒宋良移風川寨於烽火䑓山上㝷令弓箭手兵士等寅夜興工山上只築女墻四靣削壁近下低處築城圍入水泉續又牒本州通判太常博士范祥與李丕諒等同相度新脩寨城巳了見分擘街巷脩蓋軍營倉草場廨署及城上置敵樓般運糧儲兵甲入新寨二十八日奏舉髙端髙良夫楊畋寜州状申稱於五月五日申時以後忽降猛雨風雹雷電有大霹靂一聲於草塲火發燒却稈草四千餘束轉運司令觀察推官劉銑置院取勘公言逐處異物蟄藏之處多致雷火合依邊勑指揮只令陪納入官若更湏令根勘官吏不切防慎罪狀却慮今後沿邊倉塲作過要得負累官貟爲害轉大願乞朝廷特賜釋免二十四日奏舉焦遂卿李顯張忠張信等乞與轉官二十九日體量得環州界肅逺馬領㝎邊安和安塞等寨軍馬糧草人戶不少並各城墻低下濠塹淺狹未得牢固遂牒環州立便刷那廂軍兵士脩築開淘六月初六日石昌鎮申梁家族蕃官屈都等并小遇族蕃官薛娘等爲讐其梁家族點集一千餘人騎待報讐相殺公又差指揮使郭慶宗齎銀椀綵絹走馬徃夲鎮體量各且和斷之閠九月初九日慶州北路都廵檢司狀申探得昊賊親領八萬人騎奔徃鎮戎軍去遂牒寧州通判張去惑著作暫徃邠州計㑹點檢城上防城戰具家事安排整齊如聞西賊大入漢界即起遣郷村人戶入州其人戶多是少得柴草不願入城即官中擘畫揀損稈草支借十九日諸處申探到西界點集蕃賊馬大段緊急公差焦遂卿种世衡等點集蕃兵防托所有老小牛羊並發遣入寨城廻避其候㸔族帳田苗蕃部即令於高險上空處權時就藏避其入寨城人口並依先降條貫支與口食并鞍馬草料牛羊即令於側放牧如遇閉圍三五日間亦借與稈草淮涇原路經略招討司牒今月十日夜一更時准副使葛懐敏公文及鎮戎軍號帋申蕃賊不知數目奔充圍遶三川㝎川寨公牒張建侯䇿應探事軍人張遇分析状稱今月二十二日早辰到鎮戎軍西南蓮花堡德勝堡見自家軍馬與蕃賊相殺又見向太保劉太保手下軍馬被蕃賊殺散所有自家軍馬總在㝎川寨與蕃賊相殺公令鈴轄李丕諒領軍馬於二十日起發計㑹張建侯同徃原州㑹合䇿應十月二十八日入内内侍省西頭供奉官王懐德齎降御前劄子問當欲移卿徃涇原路爲本路近經賊馬抄掠藉招緝與文彦博對換公乞依舊領環慶路軄任同涇原路經略並於涇州駐劄與韓琦日夜聚首三二年間可期平㝎時渭州鎮軍戎寨主職田有毎歲獲千餘貫延州慶州諸寨多無軄田十月廿八日奏乞均㝎諸寨官貟職田十一月初六日公上言涇原土兵有在慶州者慶州土兵有在涇原路者山川道路既不諳練又是邊上土兵請受㣲薄抛離本營褁纒不易公欲朝廷指揮逐處土兵各令撥歸本路使喚公私俱便是月復置陜西四路都部署經略安撫兼治邊招討使命韓公與公及龎公分領之公與韓公開府涇州而徙文彦博帥秦宗諒帥慶皆從公之請也甲申以處士孫復爲國子監直講從公與富公之薦也十二月西賊入山外打并原州打虜公牒知原州景奏與當路鈴轄李丕諒等六人部領軍馬計會節次向前於鎮戎軍以來㑹合出竒伏截山外回來賊馬收救人民公又到邠州示以兵勢出榜永興軍諸州以安衆心又與都監張肇部領諸兵馬於初三日發離邠州取長武路徃涇州䇿應慶曆三年正月辛卯詔陜西沿邊招討使韓琦凡軍期中覆不及者皆便宜從事宣命指揮召募沿邊少壯人爲護塞指揮公言其不便二月巳卯保安軍狀申鄜延經略司牒報西人請和公上言有不可許者三有不可防者三三月甲午上令内侍宣諭韓琦范仲淹等候邊上稍寧當用卿等在兩地又令琦等宻奏可代處邊任者琦等言元昊雖約和誠僞未可知願盡力塞下不敢擬他人爲代四月庚申諫官蔡㐮言伏見陜西路招討使范仲淹韓琦各除樞宻院副使並以西冦未寧懇辭乞朝廷不聽辭讓各授恩命二十四日公起發徃邠州提舉并就近勾抽乾耀州新兵請知州通判内一貟押赴一依宣命指揮重行揀選并排連人貟及指畫閱教次第并商量定奪盖造營房五月江淮歲漕不給亰師乏軍儲發運非人公言國子博士許元可獨倚辦辛未擢元江淮兩浙荆湖制置發運判官亰師足食辛卯公與韓公又言臣等切以天下郡邑牧宰爲重得其人則致化失其人則召亂推擇之際不可不謹雖曾詔臣寮各舉所知或舉主非賢則多謬薦臣等欲乞聖慈特降詔書令中書樞宻院臣僚各於朝臣中薦堪充舉主者三人候奏到姓名即逐人各賜勑一道若將來顯有善政其舉主當議旌賞若贓汙不理苛刻害民並與同罪所貴生民受賜冦盗自息從之十月初五日用張昷之爲河北都轉運按察使王素爲淮南都轉運按察使沈邈爲亰東轉運按察使從公與富公之言也慶暦四年二月切見審官三班院并銓曹自祖宗以來條貫極多乞選差臣僚就審官三班院并銓曹取索前後條例與主判官貟同共㸔詳重行刪㝎畫一聞奏付中書樞宻院叅酌進呈别降勑命各令編成例䇿施行是時公意欲復古勸學數言興學校本行實詔近臣議於是宋祈王拱臣張方平歐陽脩曾公亮王洙孫甫劉湜等合奏謹叅考衆說擇其便於今者莫若使士皆土著而教之於學校則學者脩飾矣先䇿論則文辭者留心於治亂矣蕳程式則閱博者得以聘矣問以大義則執經者不專於記誦矣乙亥詔州縣皆立學五月壬戌朔公與韓琦並對於崇政殿上四䇿六月十二日舉元積中管勾機宜文字七月丙戌詔諸路轉運使副提點刑獄察所部知州軍知縣縣令有治狀者以名聞議旌擢之其或不如所舉令御史䑓劾奏並坐不實之罪從公奏請也十三日舉葛宗古楊麟充閤門祗候是月勘㑹河東邊上所闕弓弩并衣甲噐械刀槍等自來從京支撥多是沿路損失枉費脚乘般載邊事不逮二十七日公上言伏乞朝廷指揮下河東轉運司取要便出産炭鉄州軍置都作院舉差官貟專監其人匠於本路諸州軍揀選抽差八月辛卯命叅知政事賈昌朝領天下農田公領刑法事有利害其悉條上初四日昊賊差使臣一道姓金不得名徃北界契丹處去不知事意公慮兩國計㑹與謀十五日奏乞那撥陜西兵三萬來赴江東乞朝廷更不遷延十三日舉張子奭張燾張去惑蘇舜元陳榮古堪充刑獄錢榖重難任使十五日舉夏安期充河東轉運使又舉向約乞差知陜西河東煩難大郡十六日又舉張子奭等五人赴河東任使初諸州軍縣毎五年一造城郭等第簿公體量得河東陜西自西事以來甚有人戸因差配破却家産州縣不能矜恤減放苐候五年造簿方行定奪必是破盡家産多爲失所之人十八日奏言八月岀榜曉示逐處人戸并劄與逐州軍及都轉運司及三年便造簿重定等第其因差配破落更不候三年便於簿内注鑒减下其有即今淪落應役不得者即與免放先是除宣撫韓琦到邊上散却特支後至是巳是一年不曽支付二十一日公奏臣今徃陜西河東宣撫其沿邊駐泊諸州軍及就戰兵并人貟兵士欲乞朝廷等第各賜特支九月公在并州見都轉運司指揮諸州軍塲務更不得收納大鐡錢要得止絶欺弊纔方行下文字便有百姓經并州告訴各是交易到大鐡錢無處使用公遂出榜并州街市且令依舊行用㨿嵐州申本州九月一日支料錢并銀鞋錢二百萬准運司上項指揮㝷行告示其軍人側各高聲言道官中支賜與我因何却不得行用其轉運司牒本州更不敢施行公又恐諸處軍民疑惑發下榜示逐處曉示軍民其官鑄大鐡錢並依舊行使時河東諸軍州剙新收刈白草降下萬數不少逐處官吏不能體量利害例各差兵士或探斫不前即便逃走公人等即出錢官買或於人戶係稅草地内強行採打引惹争競即令逐處搔擾公出榜曉示諸軍州自榜到日以前抛下兵士公人收刈白草數目並與放免體量得逐處賊盗多是逃軍兼近南郊恐成羣黨驚刼人戸州縣不能禁止指揮河東州軍令逐處出榜招召今日以前逃走廂禁軍人與限一月許於官司首身更不問罪並令依舊收管十六日西夏楊守素赴闕公奏乞所有封冊之禮湏候西北收兵只行於體稍便乞朝廷再三詳審二十日樞宻院劄子奉㫖令公就近差人知麟州公與明鎬商量舉閤門祗候張繼勲是月出榜曉示諸州軍應坊郭郷村人戸今日巳前帶即配賣物色或包二稅移逃者並令與放罪各令歸業其元欠二稅並與除免仍劄都轉運司公到憲州體量憲州城池窄小奏乞増修十月九日余靖奏乞劄付河東令彼處差人佯作葺豐州所貴契丹不敢占㨿奉聖㫖令公相度公言豐州至河東一百二十餘里並無人烟道路不通今來難便去管興脩初麟州無酒務不榷酒利寛假邊民自慶曆二年十二月榷起酒利公恐居民貧困出榜并劄與麟州令百姓依舊任便開沽十日公到麟州體量二州四靣邊疆並無城寨防護人戸不敢復業遂與明鎬商量申奏乞脩復城寨是月發遣散移徃府州與土田耕種十三日奏乞收贖麟府䧟破蕃界熟戸百姓依舊住坐耕作出得糧草方可却减下正兵大叚省得國家錢帛是月體量得火山嵜嵐保德軍三處各屯兵馬所入軍儲皆是商旅人戸將銅錢接糴北界斛斗入倉中糶每日計出却銅錢數百貫過徃北界毎歳計置河東銅錢不日將盡此邊防之大弊也十九日奏乞朝廷支絹五萬疋送下河東轉運司俵與嵜嵐等三處博糴軍儲急止銅錢出界之弊二十七日張亢奏准經略司牒嵜嵐軍等處有閑地萬頃乞先於要路安置堡子兩三箇然後將上件地土擘畫奉聖㫖令公相度公恐置堡子代州與北界相接引惹言語只令作社戸名目三五十家靠險居住高築牆院防備盗賊十一月初五日知原州蔣偕狀申細腰城修築巳完湏藉土兵守禦公劄與涇原路土兵充細腰城就糧振武蕃落指揮十二月經畧司管勾何渉有母在蜀中迎侍不得切於孝養初一日公舉渉充益梓路通判以便奉親俾全孝道時蔣偕出兵至佛空平燒蕩族帳种世衡領環州蕃漢兵燒蕩大小羊族帳十四日奏乞酬獎諸將功勞是月劄付陜府㨿諸縣逃官田地勒令地分鄰人空納租錢者并見欠見錢數並與除放劄付與河東轉運司將麟府等州色役公人支與係官閑田仍免送二稅時契丹與元昊戰不利奉聖㫖指揮令公體探北界事宜公言自古兵家毎有挫䘐恐其下離叛即别舉事圖其復振以攝衆心今契丹西征無功愧見其下或謀起事欲振兵威此朝廷不可不防是月明鎬奏募民請射禁地奉聖㫖令公詳明鎬所奏相度經久利害聞奏臣僚又奏焦太師來天池打量事又奉聖㫖令公計㑹相度穩審從長指揮又奏相度到開耕禁地利害事十六日公自麟府路回到嵜嵐軍次日有鈴轄孟元并嵜嵐軍使米元湷來言有萬勝指揮兵顔和吿稱有本指揮軍人結集背叛司理院勘得本人不着次第多欠人債所告只聞人說並無照㨿欲領顔和赴營處斬公尋指揮令與逐官更子細勘鞫實情如委實誣吿亦且决配况未曾刑害著被告之人恐今後更不敢告事至十八日孟元等來言審勘得别無實情更不敢枝􅟵追究公又奏訪問得萬勝指揮招到雜色人多有邊上巳滿三年其間輕狂之人不柰辛苦或亂出語扇揺人衆於邊上不便乞早降指揮差替十九日奉聖㫖差入内供官衛克勤押賜醫藥至公處并傳宣命公探候北界事宜及邊上設備者公言見各訓練選竒兵備戦敵以分朝廷萬一之憂二十日西賊點集壯人壯馬徃環州界公劄經略司起發軍馬赴乾興寨駐劄防托及令環元州多方安撫前來蕃部蕃官二十三日奏言切見太常博士趙拯秘書丞劉奕馮浩殿中丞范寛之馬仲甫徐執中杜樞太子中允王復太子中舎王孝和大理寺丞張謨並有才稱宜處要務俾臨邊事可濟軍期伏乞望朝廷速差上件官充陜西河東大郡通判貼黃自來兩府臣僚無同罪舉官條例臣岀使應所舉過官貟恐朝廷未賜施行如任用後犯正入巳賊臣並行同罪慶曆五年正月十四日奏撥細腰城属環州二十七日河東轉運司申諸縣尚顯等陳狀爲老小殘疾及年六十巳上至七十年老除外别無人丁見今單身乞放免公劄下磁州疾速體量尚顯等如有人戸可以指射充替即依條貫施行如别無人戸指射即與免放施行二月劄下并代等路經略司東都轉運司遍行指揮逐處疾速出榜曉示諸義勇軍習學弓弩是月翰林學士呉育爲諫議大夫育𥘉尹開封府時公在政府因白事數與公有迕既而公出安撫河東有奏請多爲當國者所沮育取可行者固執行之三月十八日西賊部領三千餘人打刼篳篥城等四月十四日公奏乞下部署司㨂選得力將佐嚴行禁約至時與漢兵㑹免致䟽虞四月三日新邊壕外檉柵至葫蘆河一帶稱有西賊人馬約二萬餘人劄寨及逐川内各有烟火五里至七里蕃漢人戸一例驚移及差人探問却稱來放牧牛羊其驚移蕃漢人戸㝷却歸復本處住坐公言昨徃河西體問得鄜州路前來𬒳西賊破蕩之時其𥘉西賊用謀亦是如此其人戸爲前來無事便各安心更不驚移遂遭虜殺今來亦恐如打鄜州時設此計謀遂牒涇原路經略司今後如得知西賊點集人馬即將蕃漢人戸多差人起遣回避不得慢緩免致驅虜𥘉四日奏留蔣偕知原州新降宣命應係弓手兵士年及五十巳上或疾病久逺不堪醫治者許本戸人填替如本戸無人即許召人充替施行公十七日奏言似此篤疾癈疾之類非可詐僞者爲年未五十巳上有碍上項宣命諸處不敢替放官中前來許顧人承替之時内有事力之家即可雇人其下等苐無錢顧人多是恐脅家間骨肉令典賣莊田雇人深屬不便乞指揮轉運司㸔驗如委實是䔍疾廢疾之類並依諸軍類更不問年甲便與㨂停歸農不湏要家人并顧人充替又令疾苦之人各歸田園所以不致失所五月歐陽脩上䟽伏見杜衍韓琦范仲淹富弼等皆是陛下素委任之臣一旦相繼而罷天下士皆素知其可用之賢而不聞其可罷之罪陛下於千官百辟之中親選得此數人一旦罷去而使羣邪相賀於内四夷相賀於外此臣所以爲陛下惜也十五日奏乞指揮麟府二州勘㑹歸業蕃漢人戸約量人口數目支與貸粮乞更賜指揮與逐戸買牛具錢本選差朝臣一貟照管撫恤各令安歸復業閏五月涇原部署司所奏抽减年深上京東兵那官部押赴近裏永興等處駐劄候今秋管押歸營次奉聖㫖令公相度公相度上件兵士巳各年深過滿又知别路並减那歸營秋間縱有事宜亦難勾回邊上恐逓相扇揺别有言詞尋涇原路差使臣管押歸營二十四日具狀申奏六月十四日奏諸軍頭失墜𥙷署文帖免勒充長行只於舊職名上降一等所貴兵級安心十七日舉劉貽孫知鎮戎軍二十九日舉譚嘉震知德順軍時慶州東路巡檢竹昺公勒膽勇狄青許遷等皆推許此人可用舉昺充慶州駐泊都監八月十三日聞朝廷差國子博士高良夫徃延州計會夏國差人定立疆界又㩀高良夫申商量立界未定其西界楊守素回宥州取覆曩霄去公言夏國一靣稱大叚點集軍馬待與契丹相殺一靣却與漢家争些小疆界臣謂契丹元昊除是天亡時則有戰争不顧利害如顧利害則無戰争之理或二蕃連謀窺伺中原則今後契丹先起事端候朝廷抽减陜西軍馬徃河北然後元昊入寇則陜西四路皆可憂虞乞朝廷察此情狀不可信慿大爲之備免致臨時敗事再録與韓琦所上攻守䇿録呈乞賜親覧是月與韓魏公奉舉李顯授閣閤祗候二十三日禁秦州博易奏體量得秦州自來客旅收買川貨物帛等入蕃博易劵馬入官中賣兼販蕃馬回訖百姓所買馬錢亦收買匹帛入蕃興販今來若將秦州界西蕃博買一例止絶必是一路蕃情怨望兼大叚隔却興販劵馬及阻節客旅興販川貨則一路粮草少人入中必是誤事伏乞朝廷下秦州依舊降條貫施行二十九日舉李顯充邠州都監九月舉張肇知寧州公以河西麟府田野空荒城市窮困使河東一路供饋粮草錢帛未有休期若置一榷務一則招誘蕃部牛羊鞍馬行貨供河東一路官稅要用二則麟府路收得客旅稅錢大叚出得貨利就近供軍三則止絶得私下與外界交易免犯令初四日奏乞於麟州剏置榷塲二十日西界送石元孫歸漢配全州編管公言素不與元孫相識亦不知本人善惡臣在延州但聞劉平石元孫部領軍馬救護延州同戰拒賊日夜血戰兵少食盡力屈𬒳擒即不曾退走亦非不戰而降但有不死於王事之罪又累該大赦却有救存延州之勞縱不堪任用亦且免其戮辱少加存恤當授一南班近下名目於近州安置使䧟蕃將校等聞之未絶向漢之心不怨朝廷不助夷狄此禦戎之一䇿也十一月十一日准樞宻院劄子節文臣僚劄子秦鳳路部署巳下自來各破親兵逐月支破添支錢乞今後所差親兵揀選知武藝慣熟人數不得替換逐月更支破添支錢候廵邊及駐劄出戰時即乞一例量支盤纒錢三百文所貴均平免有虗破官錢奉聖㫖令陜西四路安撫司相度公相度若是㨂却知武藝慣熟人數久占左逐官手不得替換却恐不切閱習因兹生䟽有誤使喚巳牒秦鳳路都部署司㩀部署手親兵輪差替換依其餘路分更不逐月支添支錢十二月二十一日山外德順軍界靖邊隆德寨壕外各有新招弓箭手共八百餘人請射地土耕種脩築堡子把截并逐家老小在彼居住自來累遭虜掠公牒涇原路安撫司各令將老小人口等般入壕裏居住只量留少壯人在壕外堡子安泊防守管勾耕種若遇大叚賊馬難以禦捍亦湏入壕裏回避免枉遭虜掠按舊年譜竄閻文應嶺南尋死于道此㩀富鄭公所作墓誌按閻文應景祐二年十二月辛亥落入内都知以昭宣使領嘉州防禦使爲泰州鈐轄後兩日改鄆州鈐轄百官表同景祐四年四月乙丑文應徙潞州鈐轄百官表同寳元二年九月癸卯文應卒此㩀百官表贈邠州觀察使此㩀實録未嘗有竄嶺南指揮及死于道事迹不知鄭公何㩀也今姑從鄭公墓誌竢考范文正公年譜補遺, WYG: 吾}
