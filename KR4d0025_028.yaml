  text: 范文正公尺牘卷中
  hash: sha256:468ab8f3e68e8ac747e08d440c45f0e11fb706b16346c848774e2c4a7db4504f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_028-1a}
body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓又同校十六世孫惟元同校與韓魏公某頓首再拜遞中并黃通來疊降真誨以多故修答後時至悚至悚近惟起居萬福師魯去赴均州時巳覺疾作至均寢食或進或退僅百餘日得提刑司文字舁疾來鄧以存沒見託至五日而啓手足苦痛苦痛至終不亂初相見時却且著灸不談後事疾勢漸危遂中夜詣驛看他告伊云足下平生節行用心待與韓公歐陽公各做文字垂于不朽他舉手叩頭又告伊云待與諸公分俸贍家不令失所他又舉手云渭州有二兒子即就枕更不他語來日與趙學士看他云夜來示諭並記得巳相别矣顧家人則云我自了當不復管汝略無憂戚又兩日猶能扶行忽索灌漱訖憑案而化衆人無不悲泣無不欽服其明也别趙學士云不怛化别韓倅云少年樹德别賈狀元云亦無鬼神亦無煩惱官貟又問以家事答云參以人事則不樂也終更無言莊老釋氏齊死生之説師魯盡得之奇異奇異尋常見他於兒女多愛不謂能了了如此初九日夜四更有事十日晚殯於西禪送終之禮甚備官貟舉人無不至者家且寄此候秋涼歸洛巳去安州之翰處作行狀待送永叔作墓志某不敢作恐知他當年事不備故也却待作文集序此中士人多收得他文字明公可與他作墓表也看他永訣時實無不足意今録衆人祭文挽詩上呈草草某再拜伏蒙特賜手教以之翰所撰師魯行狀未精更須修改然後送永叔作志足見大君子金石其心使死者全名生者服義敢不欽佩風旨益盡其意然始以之翰知師魯最深又少與之遊盡見其行事故衆謂之翰宜書其善狀及觀尹材所辦亦不可忽故録之於後庶幾明公與永叔詳之自可增損今明公欲之翰修定而後作志巳致書之翰必更盡心衆謂之翰醇儒本無他腸但思之未精筆力未至爾明公以為如何幸恕而寬之某再拜資政侍郎近遞中發狀必巳上呈李學士應亦到府昨日得邸報知仲儀為人攻之不巳至于奪職奈何奈何雖本無害善之心緣而及此多愧多愧然事非醜惡法外行之不久當須辨明書去必多勉之今有進士潘起才筆俊健言行溫粹長安有戶籍今去就鄉薦有投獻必賜垂覽得失即繫他程試也殘暑乞自重自重某再拜資政侍郎仁兄近辱回教承起居萬福前日得長葛李宅書六郎有事何門衰之若此苦事苦事伊又受却恩澤諸弟必不敢當某罷參并邊任未曾奏人今却欲奏七郎不知允否更乞裁之元祕丞巳得請必便般家來也鄙拙得他為助盛暑伏惟自重某啓兩捧真問恭承台候萬福旱天酷暑加迎送不暇想煩襟靈邠郡數日來亦甚熱但夜深則涼有休息也李大相過昨晚巳發堅留不住保安申報冦戎甚不律巳移文延安只指定地界牒與宥州不可令人去必起戰鬪也不知聽從否亦巳奏訖河朔亦有侵疆之説不知是否自重自重某再拜近復手啓言蔣偕事必巳通呈今有環慶替回虎翼三人早行被強賊劫奪衣物斫傷甚困重問之言賊著褐衫作陜西人語此中少劫路賊衆疑同行神虎一指揮歸營恐其中有作過者今差指使黨武詣府試與指揮緝逐情甚凶惡乞照之家屬一兩日必到府勿令住也在路久矣元祕丞正旦可來否四向文字亦漸多州署中有涼廳一位可以待他某啓黨武回領鈞誨承台候萬福捕冦事曲煩聰聽鎮戎事宜巳奉報今却稍欵不知何謀也又來秦亭打却蕃部今日報到三千餘人騎入來此昭然無可倚信今秋必又大作如何如何亦已具奏訖昨日有旨體量安俊亦巳回奏如前安可儀𢤱試之也並乞密之元袐丞適巳到郡文字漸多甚賴他也知牙痛未巳請用硫黃好者為末揩之疼即止或是風壅即用搜風藥宣過乞自重自重某再拜資政侍郎十兄伏自違遠門墻以道塗之勞久踈上記伏想台候萬福某巳至穰下度日無客公事絶稀甚間適也不謂勞生亦有此遇明公久於衝要嚴君非晚更望勉之因風無吝枉教夫人體候萬福諸郎君英秀並安邠人回草草某啓遞中纍辱榮問承經武外起居休寧云承有微恙尋已平復人之生也分天地之和不調則其氣不平氣不平則疾作此理之必然矣今人於十二時中寢食之外皆徇外事無一時調氣治身安得而不為疾耶請那十日之功看素問一遍則知人之生可貴也氣須甚平也和自此養疾自此去矣愛重愛重素問奇書其精妙處三五篇恐非醫者所能言也書序云三墳言大道也此必三墳之書宜少服藥專於惜氣養和此大槩養生之説也道書云積氣成真是也惟節愼補氣咽津之術可行之餘皆迃怪貪慕神仙心未灰而意必亂宜無信矣兒子致疾由此也近却肯服藥有差望耳亦未醒某再拜稚圭觀察三日前遞中奉書倉卒不周前時寵示第三文字極切當頗為孤生之助幸甚某第二削有壯歲雄才之説乞矜恕蓋無可説劄子中云緣别路巳有不辭免者渭州巳謝延第四削而心巳不固來相勸也某多病獨願一貶量力實不可當或有威罰死生惟命幸無傷軫某再拜稚圭太傅近遞中捧教至荷勤重之旨不任悚仄邸報云某有恩命改職增秩貧儒至此誠為光寵奈何朝廷本欲吾輩來了邊事今涇原全師敗殁鄰道無應援之效而特進爵天下豈無深議耶又今將佐不思報國惟望僥恩吾輩頻時進改豈能伏其心何言責他實效候文字到須以此削章乞朝廷裁酌今日聞閣下復舊職改大諫職可復矣官莫須陳讓使諸將知吾輩無僥幸之意當此之際如得朝廷責怒則吾輩可以責將佐之功矣某昨赴邠州設禦捍之勢實懼自巳路分內放過冦馬入撓關中其責如何誠以避罪豈足為功以邀渥澤也惶恐惶恐冦謀漸熾皆由將帥無謀入賊策中吾輩須日夜營營以備將來時乞數字苦寒愛重為祝某啓今月二十九日受勑往涇州當時上狀次日邸報與明公並領此命又一日有旨不允前讓亦巳拜受訖一削甚激切以廉察之讓屢煩天聽不敢再瀆但愧將佐何以責率悚仄悚仄今早離慶州更三程至涇明公應不候文龍圖到亦知巳過永興某却遣人齎往河府接必是未達師魯近有書去願夙駕為會春事巳迫乞留意留意運判入奏只且帶常程邊事别有一削俟面聞恐遞中踈失某上西人將至群議復作或不知將略不顧民力惟高論於朝不管成敗如楊國忠逼哥舒翰速戰而陷長安如盧攜不許黃巢節制而亂天下須慮禍之速也或俯仰從衆苟安一時不管稔禍長惡則患之深也西事之責在公與走或各上文字則慮微有不同便為人攻擊無以取信或隨衆上下他日誰咎願公思之或奏乞密議數日又恐衆疑或假元均往來三兩次議定後同上文字先假以通和兼未必能合一面畫取橫山䇿舉可用之將仍速教新陳法日夜為謀彼便通順必亦不久早來略陳事端衆必不曉不信明公試為詳酌某再拜承寵示科場文字中瑕病不勝降服大是大是非公精識取笑天下初兩制定上巳一二十度修寫犯他衆怒思慮太過凝滯久之及公指之一一中病如廣南等小處須令轉運司相度有介潔之士無明師不肯就群居者有親老家貧日營衣食者故開此門也開封國學取行實止可嚴其保恐難察也却未敢寫敕須更議之幸甚幸甚某啓遞中捧台誨至荷勤切河東今歲俱罷支移邊上糧草中糴自辦西北勒兵久之于今未戰亦報和解次幸其不來來則可憂處多憲州岢嵐城小而低矢石可交火山孤絶城中無水今冬無事來春須力修川原控扼處所濟來路極多舊聞麟州當移兼曾上言及往視之知前言之失始謂無民今問得當時西賊急攻府州謂麟可自下而不甚虜掠百姓屬戶皆東渡多免今存八分在河內旅寄惟俟修城寨即來復業本州巳抄到一千四百戶續陳奏次乞留意再造此方自重自重宣撫河東日見岢嵐軍米光濬知軍勾當幹集杜公曾舉尋卒妻子無歸今依親戚居靑州其子得殿侍左班養母未得此中又無指使闕曾申腳色狀來今上呈如有指使安排處乞留意某再拜資政諌議某至豳兩曾上狀遞中一次領鈞誨又兵子來復枉真筆不任慰喜竊承起居安寧樂於偃息甚善甚善某居此甚宜但西戎今秋不聞大舉且運歲取之物早時同上章近又録本奏陳為向去之備不報過此無所為已乞罷使名改蒲同襄鄧一郡必有俞旨孤平蹇剝所得巳多須求便安以全衰晚未期再會日加引領惟自重加餐是望某再拜資政諫議近走介自浙中回復枉鈞翰伏承起居萬福府當衝會久煩重德天將授任必拂亂之增益所能爾蒙詰以念念其退之非蓋年向衰晚風波屢涉不自知止禍亦未涯此誠懼於中矣瞻望風采伏惟倍加自重某啓自至南陽兩捧鈞誨遞中一次上記必達聰覽涉夏以來起居何似每想松柏之情金石之論則心醉神騖坐越千里翹望翹望某孤平有素因備國家粗使得預班列今庶事逾涯復得善郡每自循揣曷報上恩愧幸愧幸公與彥國靑春壯圖宜精意遠略行復大用乞自重自重某啓近專人來辱教周密巳遣走介上狀拜謝孔官人至又枉鈞翰不任感慰首冬以來起居何似天平大鎮風物中和巨公處之誠養賢之所也未期會遇至於翹想之極謹奉此起居某再拜中間伏承有真定之命以甘陵未平不敢郵中奉書恐有遺墜其瞻渴之誠斯須不去恭想鎮臨多睱神志安和某近改荆南尋乞留鄧俞音巳下盡室獲安實至幸也春物方盛伏惟宴喜外倍保崇重祝望祝望某再拜真定資政給事近遞中奉教伏承鎮安北道初勞心慮風化既孚足為恬養河朔數郡被水今春如何惟明公早正柄坐可福斯人也暑中乞加自重某河朔災沴非常大煩憂軫也麥苗不立向去如何此中亦有北來流民見行救濟多過隨郢去某巳陳乞再任或移浙中一郡雖於國無濟但一方州庶事由巳吏民可安自且恬泰吾道進退無固必也惟保得明公彥國與此老無攀緣進取之階可不愧於天下又自省寒士遭逢至此得選善藩以自處何以報國厚恩感切感切尹師魯家甚不失所近永叔寄到師魯墓志詞意高妙固可傳於來代然後書事實處亦恐不滿人意請明公更指出少修之永叔書意不許人改也然他人為之雖備却恐其文不傳於後或有未盡事請明公於墓表中書之亦不遺其美又不可太高恐為人攻剝則反有損師魯之名也乞審之人事如此台候與貴屬並萬福真定名藩生身在彼自識别以來却未得一到諒多勝賞也此中如常夏田豐稔所轄金均房相去各五七百里山川險隔自冬至春三州各有小小結構幸而告敗豈刑殺不能勝其驕耶此一弊如何可救使得久安憂思西冦天誅此又與而不取之時也橫山一帶正可行前䇿衰老不敢言明公雄望誠可建白但慮不從耳可惜可惜某頓首再拜資政稚圭給事至節逺蒙回問研誦未巳新正先辱榮誨不任愧荷明公天稟忠義進退以吾道所以伏膺也今鎮靜北面練兵養民是亦為政矣君子之道如陽春白日於照臨生育之意豈擇其小大之限哉但天下中外望在明公爾惟自重以副瞻祝某再拜大資給事近奉鈞問伏承起居萬福兼審寵拜益增喜抃某自春入夏久在道途餘杭酷熱多在江樓因病月餘以故久不奏記日負愧仄及領教筆但感金石之意未相遺也銘著銘著某亦叨恩命何功可稱矧兹衰晚未知所報惶恐惶恐惟祝正人早歸柄任以副天下之心吾道之望乞自重自重某拜來示諭在鎮三期必朝夕有命惟安仁樂道無所陳請此為高也如今便乞間郡必不以為誠或言避權亦不見信但委順靜處為妙天下自有公議未大用間亦處處有仁義可行言拙亦不出度內也貴愛並計萬福頒惠磁器多品不勝珍荷留到致仕時使用必傳上九老圖也近老者多罷去也巳森森不遑也呵呵某頓首再拜大資侍郎專人來蒙賜教極荷恩意之厚自顧衰晚何足當大君子之高義至幸至愧恭審起居安勝此社稷生靈之望會有施設也河朔久困今春少雨後來聞已雱霈應有稔意此中𧖟麥大獲秋稼亦盛甚釋憂懼可偃息以從事矣兼時有餘暇可以溫習筆硯曾示閲古堂記將呈與孫之翰不曾取得命作詩敢再乞記一本并諸公詩俟即賦之又頒示北嶽碑真雄文健筆高古相稱為不朽矣欽服欽服門仞尚遠日增企望伏冀倍加自重以膺大拜真禱真禱某再拜大資侍郎專人復至蒙賜教并示中山新作有以見大君子存誠風教未嘗空言惟感服欽慕老而不知其止謹觀閲古堂詩并記仰歎無巳又窺諸公所賦何以措手然旨命丁寧亦勉率成篇并自寫上呈所謂將勤補拙更乞斤斧免貽衆誚幸望幸望諭及師魯序且得無大過風雅字唐賢多用梁肅作李翰集序云陳子昻以風雅革浮侈張燕公以宏茂廣波瀾又李貽孫序歐陽詹集公宜其掌代文柄以變風雅為古道亦更明白又相見無一言處改作無一言及後事亦似曉白的是不言後事直至某先言二三事他心安而不憂其後它方叩頭云公言巳盡矣明日舁疾而來却無一言是相知之深不睱言也此外必更有未當處但先喻及不同永叔寧作數千字紜紛不肯輒改也呵呵未曾敢寫出别處其間言永叔從而振之又莫見寫否實是紜紛不肯北望雄府惟祝自重以福四海閲古之作蓋出古人也豈勝仰服俟息肩則勉力賦詩今且和得近賜高什不避見笑蓋仰答厚意慙荷慙荷某再拜大資侍郎在餘杭捧閲首賜教過垂周厚私念去人必至麾下以改郡邁行未遑修謝及山陽遇回介併受鈞翰及示奇章感歎榮抃為生平美事甚幸甚幸退省虛陋曷稱重奬惟思砥礪名節以副知已惶恐惶恐某上巳日方至青社繼富公之後庶事有倫守之弗墜但歲飢物貴河朔流民尚在村落因須救濟數日間入城者六七千人無非飢窮其來未巳二麥須稔方可復蘇四向亦有冦盜齊博間稍熾三兩日來時有雨澤但未霑足亦有望也憂責非輕豈衰老可當受國重恩不忍辭避拜遇未卜日深瞻望仰祝大拜為天下福吾道之至願謹奉此上謝某頓首再拜大資侍郎伏惟純德至誠天下倚望神靈所護起居其寧某居此憧憧之地固巳少暇復歲時以來家多憂苦以故闕於奏記徒念念於知巳惶悚惶悚惟天意在公早正鈞軸天下之幸吾道為光也不任區區之願某頓首再拜觀文侍郎恭惟台候萬福中間人回蒙賜教備荷恩意閲古堂詩仰副來命不敢不勉過辱褒許且愧且懼明公拜命初以賢輔留滯不敢修賀先賜榮問復稽裁謝為安撫提轉相繼而來後又腹疾作遂成懶慢亦恃公見愛之深必未譴咎皇恐皇恐今歲早寒關塞應甚伏冀倍加自重以副具瞻之情謹此某皇恐再拜觀文侍郎某病中捧書過賜憂軫勤厚之意何以勝戴即今尚未痊差扶病上道赴潁州益遠風問但深瞻戀之劇初暑伏惟為國倍加自重至禱至禱某再拜資政諫議伏想鎮臨大屏頥養至和與神道遊誠將物感正人之望日重休某衰晚之期休息甚稱田園未立告老猶稽此可愧於人也然念念其退不作妄動事為知已之羞拜會未期萬萬自重某再拜資政稚圭給事向蒙遞中垂教以公移鎮必迃回川路未便修報問忽有專人遠致鈞翰伏讀再四若奉符采兼示先公太師并司封諸志感歎辭義足以風化搢紳光大門閥不任拳拳伏膺之至披對未期惟日引領伏冀倍加自重以副天下之望范文正公尺牘卷中
