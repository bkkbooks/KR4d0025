front:
  text: 范文正公政府奏議目録卷上
  hash: sha256:f6e291e42753f0bcb7d8bb80bdeed33bc05241c4e7fcc787f49a1adf85db3681
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_030-1a}
body:
  text: 治體荅手詔條陳十事再進前所陳十事奏乞下審官院等處應官貟陳拆定奪進呈奏乞定奪在京百官差遣等第奏乞差官看詳投進利見文字奏乞救濟陜西飢民奏乞罷陜西近裏州軍營田奏乞擇臣僚令舉差知州通判奏乞將先減省諸州公用錢却令依舊奏乞差官陜西祈雨等事奏爲灾異後合行踈决刑獄等六事荅手詔五事奏乞重定三班審官院流内銓條貫奏議尹洙轉官續奏乞於職官令録中舉充京官知縣奏爲赦後乞除放祖宗朝欠負奏乞指揮國子監保奏武學生及令經略部署司講說兵書奏爲置官專管毎年上供并軍須雜物奏乞兩府兼判再奏乞兩府兼判奏乞令兩府詳議百官起請條貫如何經久即令施行等事奏議葬荆王奏議許懐德等差遣奏重定臣僚奏薦子弟親戚恩澤奏重定職田頃畝奏重定臣僚轉官及差遣體例奏乞於陜西河東㳂邊行贖法奏灾異後合行四事奏贖法等三事卷下邊事奏陜西河北攻守等䇿一和䇿二陜西守䇿三陜西攻䇿四河北備策奏陜西河畫一利害陜西八事河北五事奏元昊求和所爭疆界乞更不問奏爲陜西四路入中糧草及支移二稅奏論陜西兵馬利害奏乞陜西主帥帶押蕃落使奏乞宣諭大臣定河東捍禦䇿奏乞拒契丹請元昊和約奏爲契丹請絶元昊進貢利害奏乞將邊任官貟三年滿日乞特轉一資奏乞重定轉功賞格奏乞編録㳂邊部署司條貫宣勑奏乞差新轉京官人充㳂邊知縣奏乞免關中支移二稅却乞於次邊入中斛㪷奏乞許陜西四路經畧司囘易錢帛奏䇿試方畧等人各與㳂邊差遣奏乞減武臣充提刑及令樞宻院三班選人進呈奏乞㨂選徃邊上屯駐兵士奏乞㨂㳂邊年髙病患軍員奏乞於散直等處㨂有武勇心力人薦舉奏爲薦胡瑗李覯充學官奏邊上得力材武將佐第等姓名再奏乞蔣偕轉官知原州奏乞舉雷蕳夫充邊上通判奏舉姚嗣宗充學官奏馬懐德乞轉閤門祗候青澗城都監奏乞酬奨張信奏乞差宣撫副使再奏乞召試前所舉館職王益柔章岷蘇舜欽奏殿直王貴等奏杜曾張沔奏乞張去惑許元奏杜𣏌等充館職奏乞将所舉許元張去惑下三司相度任使雪滕宗諒張亢再奏雪張亢奏辯陳㽞移橋奏爲劉滬董士廉修永洛城乞委魚周詢等勘輷奏葛宗古雜奏奏乞罷參知政事知邊郡奏乞互換廵邊奏乞免參知政事錫賚再奏乞免錫賚奏避蔡禀嫌奏乞選差河北州縣官貟奏乞在京并諸道直醫學奏乞召募兵士捉煞張海等賊人奏乞指揮管設捉煞賊兵士奏乞發兵徃荆南捉賊奏乞差人部送吳遵路家属范文正公政府奏議目録終
