body:
  text: 論帝王好尚論老子曰我無為而民自化我好静而民自正我無欲而民自富我無事而民自樸此則述古之風以警多事之時也三代以還異於太古王天下者身先教化使民從善故禮曰人君謹其所好惡君好之則民從之孔子曰上好禮則民莫敢不恭上好義則民莫敢不服上好信則民莫敢不用情由此言之聖帝明王豈得無好在其正而已堯設敢諌鼓建進善旌舜好問而成至化禹拜昌言而立大功湯五聘伊尹文王恭迎吕望周公握髪吐哺以待白屋之士鄭武公好賢而詩雅歌之燕昭王築臺募士而智者歸之斯聖賢好尚如是之急也桀紂好利欲不好諌諍而天下亡秦好兵刑不好仁義而天下歸漢隋煬帝好逸豫不好恭儉而天下歸唐使桀紂好諌諍秦好仁義隋煬帝好恭儉豈有畏亂之禍哉選任賢能論王者得賢傑而天下治失賢傑而天下亂張良陳平之徒秦失之亡漢得之興房杜魏褚之徒隋失之亡唐得之興故曰得士者昌失士者亡書曰先王昧爽丕顯坐以待旦旁求俊彦啟迪後人其勤求人材如是之急也然則求之之道不可一端臯陶􅐌禹曰亦行有九徳言人性行有九徳以考真偽則可知乃言曰載采采載行采事也稱其人有事徳必言其所行某事某為騐禹曰何臯陶曰寛而栗性寛洪而能莊栗柔而立和柔而能立事愿而恭慤愿而恭恪亂而謹亂治也有治而能謹擾而毅擾順也致果為毅直而温行正直而氣温和簡而亷性簡大而有亷隅剛而塞剛斷而實塞彊而義無所屈撓動必合義彰厥有常吉哉彰明吉善也明九徳之常以擇人而官之則政之善孔子之門人目以四科一曰徳行謂顔淵閔子騫也顔淵聞一知十二曰政事冉有季路也三曰言語宰我子貢也子貢使於諸國而不辱君命也四曰文學子游子夏也經緯天地曰文禮樂典章之謂也游夏能述之者也此所謂求人之道非一端也又書之説命篇曰旁求俊乂列于庶位是朝廷庶位惟俊乂是求唐太宗曰天下英雄落吾彀中語曰邦有道則智邦無道則愚智則可與治國家安天下愚則可與避怨惡而全一身故聖人以俊乂為得不以柔訥為行如以柔訥為行而寵之則四海英雄無望於時矣使英雄失望於時則秦失張陳隋失房杜豈不悮天下之計㢤近名論老子曰名與身孰親言人知愛名不如愛其身之親也莊子曰為善無近名言為善近名人將嫉之非全身之道也此皆道家之訓使人薄於名而保其真斯人之徒非爵祿可加賞罰可動豈為國家之用㢤我先王以名為教使天下自勸湯解網文王葬枯骨天下諸侯聞而歸之是三代人君已因名而重也太公直釣以邀文王夷齊饑死于西山仲尼聘七十國以求行道是聖賢之流無不涉乎名也孔子作春秋即名教之書也善者褒之不善者貶之使後世君臣愛令名而勸畏惡名而慎矣夫子曰疾沒世而名不稱易曰善不積不足以成名然則為善近名豈無偽邪臣請辯之孟子曰堯舜性之也性本仁義三王身之也躬行仁義五霸假之也假仁義而求名後之諸侯逆天暴物殺人盜國不復愛其名者也人臣亦然有性本忠孝者上也行忠孝者次也假忠孝而求名者又次也至若簡賢附勢反道敗徳弑父叛君惟欲是從不復愛其名者下也人不愛名則雖有刑法干戈不可止其惡也武王克商式商容之閭釋箕子之囚封比干之墓是聖人敦奬名教以激勸天下如取道家之言不使近名則豈復有忠臣烈士為國家之用哉推委臣下論天生兆人得王乃定萬幾百度不可獨當内立公卿大夫士外設公侯伯子男先擇材以處之次推公以委之然則委以人臣之職不委以人君之權臣請辯之夫執持典禮脩舉政教均和法令調理風俗内養萬民外撫四夷師表百僚經緯百事此宰輔之職也練兵戎謹城壁脩方畧威夷狄此將帥之職也肅朝廷之儀觸搢紳之邪此御史府之職也治繁劇制豪猾此京尹之職也至於金榖刑法各有攸司之職矣撫民人宣風化均徭役平賦斂此刺史縣令之職也此皆人臣之職不可不委之也若乃區别邪正進退左右操榮辱之柄制英雄之命此人主之權也不可盡委於下矣何以明之論語孔子曰天下有道政不在大夫注云制之由君也晉委三卿趙文子韓宣子魏獻子延陵季子曰晉國之政歸此三家矣後果分晉為三國漢髙祖招納羣英有將將之權而取天下至于子孫不知祖宗之謀而獨委霍光又獨委王鳯至于王莽皆有大禍西漢遂傾焉後漢光武親用二十八將而取天下後之子孫不知祖宗之謀而獨委后族至于宦官故姦雄競起以去惡為名東漢遂傾焉魏委司馬晉委劉裕其禍亦然唐太宗駕馭英雄取天下致太平至髙宗朝李義府以立后之功獨見委用陷害忠良天下憤怨明皇初用姚崇宋璟為相而天下大治推心委之遂成故事及李林甫代其任仍復委之林甫姧邪能中傷善人朝廷無敢言得失者於是明皇不聞諌諍自謂宰相得人泰然無為矣言路已絶故至祿山犯闗嚮闕而明皇不知一旦喪亂天下瓦解唐徳遂衰初以推委而天下治終以推委而天下亂何弊之然哉當推委之際擢十人上從其九是九分之恩出於下矣如此則數年之間左右前後皆權臣之黨也若黜辱十人上從其九是九分之威出於下矣如此則數年之間中外逺近無敢忤權臣者故下之情不達而上之勢孤矣此明皇之失為後代之鑒王者將收其權必先采人采人為難豈無其要孔子之辨門人標以四科一曰徳行二曰政事三曰言語曰曰文學以四科辨之思過半矣然則朝廷清要之位覬覦者衆必審賢以與之賢傑之材讒嫉者衆必先時以辨之是故先王孜孜求賢以備選用且千官百辟豈能獨選必委之於輔弼矣惟清要之職雄劇之任不可輕授於人僉諧之外更加親選聖帝明王常精意於求賢不勞慮於臨事精意求賢則日聰明而自廣勞心臨事則日叢脞而自困宜乎屏煩細而廣詢訪其深於正道有憂天下之心可備輔相者記之其精於經術通聖人之旨可備顧問者記之其敢言正色有端士之操可備諌諍者記之其能言方畧有烈士之風可備將帥者記之如斯之人精而求之熟而觀之然後寘清要之職授雄劇之任使人人竭力争為腹心於是乎得以操榮辱之柄制英雄之命庶務委于下而柄歸于上始可以言無為矣猶復置御史大夫中丞使搢紳無敢慢者置諍臣七人使言路無敢蔽者置門下封駮司使制勅無得悞者此又推委無為之中而不廢其防不失其權者矣若留意逸豫不孜孜於求賢親選之時無賢可用則進退賞罰復歸於下雖有爵祿不足為上之恩雖有誅罰不足為上之威矣議上攻守二策狀臣某言竊觀西事以來每議攻守未見適中或曰必行進討以期平定臣謂諸路進討則兵分將寡氣不完盛絶漠風沙迷失南北饋運輜重動有鈔掠賊之巢穴夐阻河外非有竒將不能逺襲至若寇常併兵來擾一路每有朝旨令入界牽制其如將帥方畧非有素定茫然輕進不知所圖但求虚弱之處以剽竊為功既不能大振兵威故不能少分賊勢此進討牽制之無效也或曰宜用守策來則禦之去則勿逐臣觀今之守邊多非土兵不樂久戍又無營田必煩逺饋久戍則軍情危殆逺饋則民力將竭嵗月緜久恐生他患此守禦之未利也臣荷國重寄曽無寸勞夙夜營營冀有所補而才識迂昧終無發明今采於邊人而成末議固不敢望其必行在朝廷以衆論參之擇其可否如無所取乞賜寢罷今具下項攻守之議依聖旨指揮交付梁適齎迴赴闕者議攻臣謂進討未利則又何攻臣竊見延安之西慶州之東有賊界百餘里侵入漢地中有金湯白豹後橋三寨阻延慶二州徑過道路使兵勢不接策應迂逺自來雖曽攻取無招降之意據守之謀漢兵纔迴邊患如舊臣謂西賊更有大舉朝廷必令牽制則可攻之地其在於此可用步兵三萬騎兵五千鄜延路步兵一萬二千騎兵一三千涇原路步兵九千騎兵千環慶自選馬步一萬八千軍外畨兵更可得七八千人軍行入界當先布號令生降者賞殺降者斬得精强者賞害老㓜婦女者斬拒者併兵以戮之服者厚利以安之遁者勿追疑有質也居者勿遷俾安土也乃大為城寨以據其地如舊城巳險因而増脩非守地則别擇要害之處以錢召帶甲之兵熟户强壯兼其土役昨奉朝旨令脩緣邊城寨臣以民方穡事將係官閒雜錢并勸令近上人户以顧夫錢散與助功兵士充食錢其帶甲兵士翕然情願諸寨並已畢功俟城寨堅完當留土兵以守之方諸舊寨必倍其數使范全趙明以按撫之范全今為騏驥副使慶州北部巡檢趙明今為東頭供奉官柔逺寨蕃部巡檢必嚴其戒曰賊大至則明斥候召援兵金湯東去徳靖寨四十里西去東谷寨八十里西南去柔逺八十里白豹西去柔逺五十里南至慶州一百五十里堅壁清野以困之小至則扼險設伏以待之居常髙估入中及置營田以助之如此則可分彼賊勢振此兵威通得延慶兩路軍馬易於應援所用主兵官員使勇決身先者居其前王信狄青劉拯劉貽孫張建侯范全可用策應者居其次任守信王達王遇張宗武譚嘉震王文恩王文使臣中可當一隊者參於前後張信王遇張忠郭逵張懷寳有心力幹事者營立城寨周美張璨劉兼濟李緯張繼勲楊麟臣觀後漢段紀明以騎五千步萬人車三千兩錢五十四億三冬二夏大破諸羌又觀唐馬燧造戰車行則載甲兵止則為營陣或塞險以遏奔衝臣以此路山坡大車難進當用小車二千兩銀絹錢二十萬以賞有功將吏及歸降畨部并就糴芻粟亦稍足用其環州之西鎮戎之東復有胡蘆泉一帶蕃部與明珠滅臧相接阻環州鎮戎徑過道路明珠滅臧之居北接賊疆多懷觀望又延州南安去故綏州四十里在銀夏川口今延州兵馬東渡黃河北入嵐石却西渡黃河倒來麟州策應蓋以故綏州一帶賊界阻斷徑過道路已上三處内麟府一路臣不曽到彼乞下本處訪問及畫圖即可見山川道路次第如取下一處城寨平定則更圖一處為據守之策比之朝去暮還此為稍便臣謹議議守臣觀西戎居絶漠之外長河之北倚逺而險未易可取建官置兵不用祿食每舉衆犯邊一毫之物皆出其下風集雲散未嘗聚養中國則不然逺戍之兵久而不代負星霜之苦懷鄉國之望又日給廪食月給庫緍春冬之衣銀鞋饋輸滿道千里不絶國用民力日以屈乏軍情愁怨須務姑息此中原積兵之憂異於夷狄也臣謂戎虜縱降塞垣鎮守當務經逺古豈無謀臣觀漢趙充國興屯田大獲地利遂破先零魏武於征伐之中分帶甲之士隨宜墾闢故下不甚勞大功克舉數年之中所在積粟倉廪皆滿唐置屯田天寳八年河西收二十六萬石隴西收四十四萬石孫武曰分建諸侯以其利而利之使食其土之毛實役其人氓之力故賦税無轉徙之勞徭役無怨曠之歎臣昨在延州見知青澗城种世衡言欲於本處漸興田利今聞僅獲萬石臣觀今之邊寨皆可使弓手土兵以守之因置營田據畝定課兵獲餘羡中糶於官人樂其勤公收其利則轉輸之患久可息矣且使其兵徙家塞下重田利習地勢顧父母妻子而堅其守比之東兵不樂田利不習地勢復無懷戀者功相逺矣少田處許蕃部進納荒田以遷資酬奬或量給價直儻朝廷許行此道則委臣舉擇官員約古之義酌今之宜行於邊陲庶幾守愈久而備愈充雖戎狄時為邊患不能困我中國此臣所以言假土兵弓手之力以置屯田為守之利也然臣觀前漢髙帝之盛臣有蕭張決勝千里下有百戰之師以四十萬之衆困于平城乃約匈奴和親至髙后文景代代如之不絶其好匈奴屢變往往犯塞殺戮吏民不勝其酷至於書問傲慢下視中國而人主以生民之故屈已含容不為之動孝文即位將軍陳武請議征討以一封疆孝文曰兵凶器也難克所願動亦耗病謂百姓逺方何今匈奴内侵軍吏無功邊民父子荷兵日久朕動心痛傷何日忘之未能消距願且堅邊設候結和通使休寧北陲為功多矣且無議兵故百姓無内外之徭得息肩於田畝天下富實鷄鳴犬吠烟火萬里可謂和樂者乎司馬遷以文帝能和樂天下協於大樂故著于律書為後代法臣謂國家用攻則宜取其近而兵勢不危用守則必圖其久而民力不匱然後取文帝和樂之徳無孝武痛哀之悔則天下幸甚天下幸甚臣謹議答竊議漢髙祖以黃金四萬付陳平而不問其出入時陳平未有功也唐髙祖將斬李靖而恕之時李靖未有功也是前代帝王先布之以恩後責之以效也我太祖嘗謂近臣曰安邊御衆須是得人心優惜其家厚其爵祿多與公用錢及屬州課利使之迴圖特免税算聽其召募驍勇以為爪牙苟財用豐盈必能集事雖朕減後宫之數極於儉約以備邊費亦無辭也命將帥李漢超等十三人分守西北諸州家族在京者撫之甚厚凡軍中事悉許便宜每來入朝必召對命坐賜與優厚撫而遣之由是邊臣悉富於財得以養士用間洞見畨夷情状每戎狄入寇必能先知預為之備設伏掩擊多致克㨗二十年間無西北之憂故兵力雄盛武功蓋世由此而致也今滕宗諒為一路經畧安撫使兼兵馬都部署以公用錢迴圖管設使命將校并蕃部酋豪或贈遺官員游士而梁堅彈奏滕使過錢十六萬貫有數萬不明及置獄研窮纔用三千餘貫復有所歸無分毫入已是未見貪吏之狀也宣撫田舍人朝之端人也至慶州目擊軍民蕃部等借留滕侯遮壅于道足下何得謂之豺狼主上仁聖不深罪宗諒張亢二人仍降詔誕告邊臣依祖宗故事使迴圖公用一如平日中憲不知内朝有此詔命聞羣口橫議遂伏閤請加責二人以正憲律既下法寺則宗諒合贖銅而不當去官是前斷已坐亢罪將公用錢并酒散與軍人當更追一官又朝廷既已降詔貸之亦難反汗足下責我保庇此人固不敢避自古文法常害邊功今天子仁聖有西北之憂孜孜求人以捍大患帥臣用度小過不害邊事居輔弼者固當竭力辨明恐誤朝廷機事為天下之憂豈暇私於二人哉昔匈奴辱漢使者蓋不一也唐賢使于賊庭不辱命者如韓愈李回皆成大名近邵良佐使于元昊迴日改官賜服色報其勞也良佐懼不可再去滿朝搢紳無一士請行朝廷召張子奭乘驛而至又選王正倫副之皆敢行不懼既不懼矣觀其辨論學術可為之使乃遣將命暨還得元昊書疏頗順於前願去號稱臣又能減數節事體且沙漠窮絶入不測之地既能㤀生又不辱命朝廷擢進兩資不可待以常調也戎狄素貪利未厭心兵擾絶塞此戎狄之常態非子奭之過也今之士大夫髙談時政皆謂不能拔人限以資級使才者多滯而朝廷乏賢及見殊命越一等則囂然聚議以為過優何薄之甚耶讚楊文公冩真讚楊公以武夷之靈降于我宋在太宗朝以神童被召三命至著作佐郎直集賢院在真宗朝薦當清近終翰林學士工部侍郎公以斯文為已任由是東封西祀之儀脩史脩書之局皆歸大手為皇家之盛典當時臺閣英游蓋多出於師門矣而命世之才其位不充故天下知公之文而未知其道也昔王文正公居宰輔僅二十年未嘗見愛惡之心天下謂之大雅宼萊公當國真宗有澶淵之幸而能左右天子如山不動却戎狄保宗社天下謂之大忠樞密扶風馬公慷慨立朝有犯無隠天下謂之至直此三君子者一代之偉人也公與三君子深相交許情如金石則公之道其正可知矣然端言方行回邪忌之故嘗避權臣之禍歸陽翟山再起會真宗不豫中外為憂萊公將奮大計正前星於北辰引太陽於少海公預宏議就髙文間弗克行既終而今上知之乃下詔追悼贈禮部尚書諡曰文今覩公之真而為讚云嗚呼楊公兩朝清風盛乎斯文直哉厥躬端者我遊邪者我仇霖雨不作日月其流仰止遺真雍雍哲人吾不知乎為之仙為之神范文正集巻五欽定四庫全書范文正集巻六宋范仲淹撰頌
