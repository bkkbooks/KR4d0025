front:
  text: 夜睽禮義不接而男女睽君臣不接而上下睽情類不接而萬物睽夫然則天地萬物之理從何而亨乎故睽之時義不可久也必變而通之合睽以成其化天地睽也而陰陽合焉其禮睽其義合晝夜睽也而日月交焉男女睽也而禮義成焉上下睽也而君臣會焉萬物睽也而情類聚焉夫未合之時體乖志疑動虞蹇難求援而濟者也故其爻皆以有援免至于上九睽極而通則説弧遇雨羣疑亡也蹇止於險中險難在前未可進之時也觀其名與屯卦近焉屯亦難也然則屯已動乎險中難可圖也􅏝猶止乎險中難未可犯也惟二為王臣得位應五君在險中而與已應始可匪躬而徃焉餘皆徃􅏝而弗濟君子藏器於身待時而動其庶幾乎解動乎險外出險散否之時也小人為險君子乃否小人既退君子乃振故六五象曰君子有解小人退也是故天地否散雷雨並興聖賢否散慶施遂行武王發粟散財其有解之時也矣損山澤通氣艮為山兑為澤其潤上行取下資上之時也夫陽實也陰虚也下卦二陽上卦二陰取陽資陰以實益虚者也虚者反實則實者反虚矣然則下者上之本本固則邦寧今務於取下乃傷其本矣危之道也損之有時民猶説也兑為説損之無時澤將竭焉兑為澤故曰川竭必山崩此之象也無他下涸而上枯也百姓不足君孰與足其斯之謂歟益剛來而助柔損有餘而補不足上卦陽多故曰有餘下卦陽少故曰不足自上恵下之時也天道下濟品物咸亨聖人下濟萬國咸寧益之為道大矣哉然則益上曰損損上曰益者何也夫益上則損下損下則傷其本也是故謂之損損上則益下益下則固其本也是故謂之益本斯固矣榦斯茂矣源斯深矣流斯長矣下之益上則利有竭焉上之益下則因其利而利之何竭之有焉是故木以動也上木下動涉大川而無患雷風與也上風下雷興萬物而無疆明益之道何徃而不利哉夬一陰處髙而羣陽伐之以大制小以正黜邪之時也時皆剛正柔佞豈得而據乎夫君子道微之時法令常密而或失之者何也内有小人也小人道微之時法令常顯而無忌者何也内皆君子也此卦一柔而乘五剛危可知矣五剛而決一陰易可知矣故揚于王庭而不忌賞罰明行之際歟舜舉八元而去四凶此其時矣萃澤處於地兑為澤坤為地其流集矣上説下順其義親矣物情和聚之時也上以說臨下下以順奉上上下莫不聚乎天地亨而萬物以類聚大人亨而天下以義聚觀其所聚而天地萬物之情可見矣彖言剛中而應者取其上下相應以成萃聚之義而已若夫萃天下者豈私其應哉必也以虚受人然後能萃其天下故九五以大人之位而匪孚者以其應之於一不能盡天下之誠惜哉無私則至矣升地中生木其道上行君子位以徳升之時也夫髙以下為基木始生於地中其舉逺矣聖人日躋其徳而至于大寳賢者日崇其業而至于公圭以順而升物不距矣故爻無凶咎初則大吉二則有喜三則無疑四則用亨五則貞吉惟上六極而猶升則為㝠昧若能知其消息猶可為利故曰㝠升利于不息之貞困水在澤下澤方竭焉其道不加於物君子困窮之時也夫水者浸於外而後施於物今伏於其内何施之有是則川澤竭而伏其流君子困而隠其道困於險而不改其說坎險也兑說也其惟君子乎能固窮而樂道哉苟不安其困欲尚口而去之窮斯甚矣知此時者巻而懷之極然後反其困必亨故曰困亨夫子之於陳蔡也豈其憂乎井木為泉之底井道治而其施外彰君子居徳遷恵之時也夫井居其地而不可改其泉之出也無所不利君子居於徳而不可移其恵之遷也無所不仁唯井也施之而不窮存之而不溢惟徳也常施於人而不見其虧獨善於身而不見其餘故曰井徳之地不其然乎革火水相薄變在其中聖人行權革易之時也夫澤有水則得其宜今澤有火是反其常矣天下無道聖人革之以反常之權然而反常之權天下何由而從之以其内文明而外説也内卦文明外卦兑説以此之文明易彼之昏亂以天下之説易四海之怨以至仁易不仁以有道易無道此所以反常而天下聴矣其湯武之作耶苟道徳不去雖湯武日生當為天下之助何反常之有焉鼎以木順火鼎始用焉聖人開基立器之時也夫天下無道聖人革之天下既革而制作興制作興而立成器立成器而鼎莫先焉故取鼎為義表時之新也湯武正位然後改正朔變服章更器用以新天下之務其此之時歟故曰革去故而鼎取新聖人之新為天下也夫何盛焉莫盛乎享上帝而養聖賢也享上帝而天下順養聖賢而天下治不亦盛乎震雷相從而興威動萬物内外皆震君子心身戒懼之時也萬物震其道通焉君子震其徳崇焉君子之懼於心也思慮必慎其始則百志弗違於道懼於身也進退不履於違則百行弗罹于禍故初九震來而致福慎於始也六二震來而喪貝履於危也六二乘剛夫震者長子之道也長子有威驚逺而懼邇然後能主宗廟之器而祭祀不輟也夫艮山相當而各止其所内外不相與六爻皆無應上下静止之時也天地動而萬物生日月動而晝夜成聖賢動而天下亨今其止者君子理不可動之時也故此卦無元亨貞之徳者以其道不行焉然止之為道必因時而存之若夫時不可進斯止矣髙不可亢斯止矣位不可侵斯止矣欲不可縱斯止矣止得其時何咎之有故曰時止則止時行則行動静不失其時其道光明非君子其孰能與於此乎漸山止生木日益其髙君子漸進之時也夫内止而不躁外巽而不争以斯而進不亦漸乎長女得位乎其外故曰女歸吉然則女生而知其嫁也必漸而及時然後有歸焉君子學而知其仕也必漸而成徳然後有位焉故升髙必自下陟遐必自邇乾陽漸進而至于在天坤陰漸進而至于堅氷天地不能踰而况於人乎苟内不止而躁外不巽而争則失漸之道犯時之忌豈正邦之有焉豐文明以動無往不亨王道開泰之時也夫雷電之至隠者彰而否者亨聖賢之造困者通而幽者顯於是制乎禮以序天下之倫作乎樂以興天下之和物物昌而無不大也是以謂之豐然則日之動也下離日也上震動也豐于正中焉文明之動也豐于皇極焉過乎正中日斯昃矣過乎皇極文明虧矣故曰宜日中進於大而戒于盈也丕哉旅火麗山而不久其處君子羇旅之時也君子羇旅之時處無其位何能與物大通然則内止而不動于心外明而弗迷其往以斯適旅故得小亨而貞吉夫旅人之志卑則自辱髙則見嫉能執其中可謂智矣是故初瑣瑣而四不快者以其處二體之下卑以自辱者也三焚次而上焚巢者以其據二體之上髙而見嫉者也二懷資而五譽命者柔而不失其中者也君子旅之時也道其然乎巽風從至而物莫之違上下皆順命令宣行之時也夫上下弗順雖令不從今上下皆順故可申命而行事也若夫巽之為徳其失也偽非君子體之則入乎柔邪之道矣觀其名雖近於謙焉然則謙之為體内剛而外柔謙卦坤外艮内坤柔而艮剛也降於禮而不降於徳者也是以亨君子有終巽之為體内外皆柔可以行權未可以終義惟五以中正而志行乃得小亨利有攸往利見大人是故謙之六爻皆無凶咎巽之六爻則美惡半矣兑澤重潤而上下皆説君子推恩敷恵之時也夫説萬物者莫説乎澤今復重之民説而無疆者也勸天下者莫大乎推恩而敷恵則順乎天應乎人而王道亨不然者反此若夫威以先民民重其勞威以犯難民重其死故周文為臺而人謂神靈者忘其勞也楚子下令而人如挾纊者忘其死也然則説之為徳其失也佞上下皆説之時必内存其剛正然後免佞之情故曰説以利貞
