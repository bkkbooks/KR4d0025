body:
  text: 祭謝賓客文維景祐二年八月日具位某謹致祭于故賓客謝公之靈嗚呼南有諸謝兮風流不衰金玉嗣音兮非公而誰大儒之文兮醇醇而弗醨君子之器兮安安而弗敧升百里之堂兮仗千里之麾載循良之吏兮形愷悌之詩踐瀛洲之華兮弗驅弗馳立憲臺之端兮有威有儀士患其薄兮公持重以厚之士病其躁兮公恬退以静之歸去来兮賢哉遂偃仰以舒遲坐西臺而甚泰參東朝而非卑嗚呼悵日月兮不留訴天地兮胡為仁者以夀兮我懐安悲老成以往兮我僚何師賴堂搆之隆兮天弗我欺臧孫之後兮蓋相繼而丕丕想雲山之秀兮神實有知嚴子之隣兮可相與而熙熙國人不得而見兮望秋光而淚滋伏惟尚饗祭胡侍郎文維寶元二年六月日具位某謹致祭於故侍郎安定公之靈惟公出處三朝始終一徳或雍容於近侍或偃息於外邦動惟至誠言有名理卓茂以禮樂率下黄憲以度量過人靡尚威刑積有隂徳安車以謝正寝而終老成云亡薦紳興慕某辱知深厚聞訃驚哀官守所縻不皇躬事嗚呼悲哉伏惟尚饗祭蔡侍郎文維寶元二年六月日具位某謹致祭于故參知政事户部侍郎蔡公之靈天生距公泰山之東初矯首於王庭冠天下之英雄孤標孑孑美聲隆隆顧幽陋之何階亦卑飛於牓中瞻公青雲日大月崇出處二府心醇道充進惟兢兢退無忡忡端人之徒莫不望公近年京師密仰清風立朝禮隔報國心通憂愚之直憫愚之忠愚貶未還公出而終嗚呼邦之善人胡福不䝉欲一問於蒼天天杳杳而誰窮尚饗祭石學士文維慶厯三年九月日具位某謹致祭于故友曼卿學士之靈嗚呼曼卿之才大而無媒不登公卿善人為哀曼卿之筆顔精栁骨散落人間寶為神物曼卿之詩氣雄而竒大愛杜甫獨能嗣之曼卿之心浩然無機天地一醉萬物同歸不見曼卿憶兮如生希闊之人必為神明尚饗祭呉龍圗文維慶厯三年九月日具位某謹致祭於故龍圖學士兄之靈嗚呼與兄相知積有年矣行可師法言皆名理日重一日人望公起憂國憂民早衰而死嗚呼天有五行播於羣靈惟純惟粹哲人乃生厥生不易厥道未行一朝往矣天地何情嗚呼我不得知泣而懐之又失此人寧莫我悲魂兮有生來休盛時尚饗祭呂相公文維慶厯四年十一月日具位某謹致祭於故相贈太師令公呂公之靈嗚呼富貴之位進退惟艱君臣之際始終尤難公覯昌辰宰予庶揆保輔兩宫訏謀二紀雲龍協心股肱同體萬國久寧雍容道行四鄙多故憂勞疾生辭去台衡命登公袞以養髙年如處嘉遁嗚呼日月迭來數不可回兩楹告兆萬乗興哀某素游大鈞猥居近輔得公遺書適在邉土就哭不逮追想無窮心存目㫁千里悲風尚饗祭陳相公文維慶厯四年十一月日具位某謹致祭於故相太子太師贈司空侍中陳公之靈惟公挺生聖時素懐偉志髙文醇醇得聖賢之粹大節落落鍾公輔之器出處三朝周旋五紀入調鼎鼐叶太平之治出仗旄鉞當夹輔之寄忠勞罄宣踐揚備至念始終兮覆簣謝崇髙兮脱屣冠東朝之極品訪南華之深㫖百辟所曕五福具美大數奄終髙風不墜搢紳仰其遺範子孫光其餘懿某行役邉隅阻趨哀次望音徽而㫁絶想老成而感涕尚饗祭韓少傅文維慶厯五年正月日具位某謹致祭於故太子少傅贈太保韓公之靈惟公寒苦而立平直以進賢材一伸淑聲大振天子乃知命鎮坤維兩川父老含哺而嬉入領中司進陟二府邦憲以清袞職斯補一徳一心弗愧弗負偃息近藩㫖酒盈樽可以卧理不廢清言功成名遂揖讓而退為國元老望髙中外子孫詵詵禮樂簪紳積善之報集于仁人嗚呼厥生有涯終焉惟命柱石之衰邦國不幸尚饗祭知環州种染院文維慶厯五年閏五月日具位某謹致祭於故環慶鈐轄知環州東染院使种君之位惟君少負氣岸兮聲蓋闗輔青春多難兮白髮始遇西戎入寇兮邉臣共沮君從邉事兮獨立不懼營故寛州兮一日百堵鑿山出泉兮兵民鼓舞叛我者攻兮服我者撫延安東北兮俗康財阜伊余知君兮屢以才舉改環之麾兮禦彼外侮萬餘族落兮貪豺狡䑕畏如明神兮愛如慈父朝廷倚之兮一方柱礎忽焉長往兮葬于鄠杜君子憂邉兮尚有胡虜伊余追念兮心之酸苦焉得邊帥之盡如君兮守此西土尚饗祭陕府王待制文維慶厯五年八月日具位某謹致祭于故天章待制子野親家王公之靈嗚呼自古皆有死公死特可悲生相門而不驕幼矻矻而從師纔十五而器成獻雄藻於丹墀天子愛而召試摛亹亹之英辭拜登瀛之妙選與先生而並馳起風采於臺閣久優游於嵗時三借麾以出守民所至而熙熙性清方以自䖏政坦白而莫欺往按察於荆楚方澄清於一陲惟韓富之二公屢密啟於輔帷乃脩撰於史局尚未足以施為遽侍從於天閣聳内朝之表儀俄西鎮於陕郊懐周召之風規惟孜孜於生民将富庶之可期每布政於畎畞不飾名於路岐君子愛之而心醉小人畏之以神離凡有志於時者皆望公於雲逵矧伊余之相知懷金石而弗移曩余謫於江南靡貴賤而見嗤公慷慨而不顧日拳拳以追随何交道之斯篤曽不易於險􅆥仰萬石之家聲結絲蘿以相維庶子子與孫孫保嵗寒之不衰嗚呼叔寳多病兮一朝已而顔子不夀兮厥靈何之神茫茫兮安問天杳杳兮曷司不見子野兮窮此生而長思尚饗祭謝舍人文維慶厯六年二月日具位某謹致祭于故紫微舍人希深謝公之靈惟公雅識懿文發於誠性著國之史掌邦之命臺閣徊翔搢紳輝映徳業素充聲猷日盛賢哉云亡顧淵不幸某同年之中切磋游泳今此于藩復仰前政不見故人惄焉如病尚饗祭同年滕待制文維慶厯七年三月日具位某謹致祭於故天章待制滕侯同年子京之靈嗚呼子京吾人之英文詞髙妙志意坦明自登朝闥翕然風聲言動兩官上嘉其誠迺升諫曹心膂益傾謫去江徼暄涼屢更曾不齎咨奉親為榮西夏猖獗僉曰當行乃藩于涇有城無兵渭帥敗覆戎馬縱横征夫不復哭聲連營弔之綏之與治其生復率編民易服乗城完此生聚而不奔驚援兵四來擾攘攙搶犒以牛酒萬夫豐盈衆稱其才達於朝廷既允公論俄加寵靈經畧一路環慶邠寧愛民之力强兵之形機謀若織邉陲如扃御史風言用度非經投杼之際遷於巴陵巴陵政修百廢具興雖小必治非賢孰能往臨姑蘇人喜其升至未踰月美聲四騰遘疾不起福善何憑我固當悲同年之朋忠孝相勗悔吝相懲聞其凋落痛極填膺生平意義忽如弗曽獨有令嗣堂構可承我其撫之必教而稱子京勿恤魂兮髙昇嗚呼哀哉尚饗祭龍圗楊給事文維慶厯七年三月日具位某謹致祭於故龍圗給事楊公之靈嗚呼余嵗三十兮從事於譙獨棲難安兮孤植易搖公方監郡兮風采翹翹一顧而厚兮甚乎神交議必以直兮中無藏韜法必在平兮下無寃號政事以和兮不理而調志議以合兮不結而牢公徙宛丘兮彼豈無僚獨不我忘兮且薦且裦羽翼有漸兮階于雲霄二紀之餘兮恩榮屢叨公還自蜀兮勲望益髙余貳國政兮得其風謠相目於庭兮中心昭昭曽未密啟兮余出豳郊謂公將享兮用于鈞陶天不輔善兮公殁于朝大器未充兮非夕非朝思欲報兮光塵寂寥子孫有善兮余撫而招公之不見兮惟余心之忉忉嗚呼哀㢤尚饗祭尹師魯舍人文維慶厯七年四月十一日具位某謹致祭于故龍圗舍人師魯之靈嗚呼天生師魯有益當世為學之初時文方麗子師何人獨有古意韓栁宗經班馬序事衆莫子知子特弗移是非迺定英俊迺隨聖朝之文與唐等􅆥繄子之功多士所推堂堂沂公延於幕中矯矯文康薦于四聰自兹登瀛坐揚清風舉止甚直議論必公人事多故遷謫羈旅子行其志曽不為苦才弗可掩起于貶所往貳經畧屢典藩府自謂功名如芥可取黑白太明吏議横生斥於散地頽然不争惟曰我咎匪由人傾天意已回吉宜大來于何感疾益重其災隠几澄神而已焉哉嗚呼人皆有死子死特異神不惑亂言皆名理能齊死生信有人矣嗚呼與子往還抑亦有年今見其終益知子賢故友門人對泣漣漣哀哉祭故相太傅李侍中文維慶厯七年十一月日具位某謹致祭于故太傅侍中之靈惟公生于東魯早游聖門育文若豹就志如鯤巍巍章聖仄席臨軒天下英雄雲翔駿奔公冠其首光華帝閽嘉猷日沃威顔日温數十年間秉持大鈞言必讜直道惟忠純或出或處有屈有伸兩朝真宰一徳良臣白髮仗鉞氣猶過人青宫作傅禮能退身優游養夀靜黙含真人仰如仙上待如賓門館憧憧子孫詵詵咸聞詩禮並列簪紳人間之盛公無不臻嗚呼天地之數聖賢一均髙明而終精爽必神念昔登門遇厚情親曽莫之報是寧不仁東嚮何為歎惋悲辛嗚呼哀哉尚饗祭葉翰林文維皇祐元年己丑十月庚申朔日具位某謹致祭于故内翰侍讀學士諫議葉公之靈嗚呼賢哉道卿鍾乎粹靈秀格峩峩英采熒熒濬學偉文發於妙齡决策三篇萬儒竦聽闊視霄路直步雲庭天然清流不雜渭涇西垣北門大筆未停為藩為翰于澶于青乃牧京兆闗輔以寧再主大計實營實經慷慨國論冒干雷霆出守河橋期歸闕庭一夕奄去天地𡨕𡨕嗚呼遘時甚盛得主惟聖謂道必行謂事必正髙節莫屈直言屢諍朝廷風采搢紳輝映天子知人期以輔政弗諧而去能不曰命嗚呼僕與公知則相知心蓬瀛共舍切瑳規箴蘇秀隣邦唱酬謳吟相許道大交薦言深久要之意不為浮沉今也云亡絶絃于琴白髮相失清淚難禁音問一㫁憂愁百侵古之遺直千載猶欽生平之交情何以任哀哉尚饗祭杜待制文維皇祐三年正月日具位某謹致祭於故環慶經畧待制杜君之靈嗚呼大儒之門生此令人學深如海文敏若神羣經衆史精㣲悉臻長疏大議慷慨屢陳藹然風采出乎搢紳寇發嶺南猖狂不臣通彼鬼􅆥毒我天民妻子以驅室廬以焚降之則變撫之不馴一方瘡痍嗷嗷呼寃朝廷軫憂擇使在人命君以往萬里其勤去惡務本豈曰不仁數百就擒戮於逡巡賊怨我當民枉我伸於今㡬年一邉無塵君之剛果温造其倫聖奨休烈屏諸讒言擢為侍從寄以藩垣邠寧一道制于中軍忽焉疾至不起以聞天子震悼惜其忠純嗚呼既鍾其才弗以夀存一舉之功亦巳不泯我實知君甞以表論今也云亡痛楚悲辛尚饗祭英烈王文年月日具位某謹致祭于英烈王之神惟王孝於其親可以訓天下之為人子者忠於其君可以訓天下之為人臣者惟忠孝之至誠與天地而不泯宜乎廟食兹土仰之如在某嘗叨近輔來守是邦憂國愛民此其職也今春稼方立霪雨大至川源奔注田畞浸溢生民之命實繫於斯人将不堪神豈無意救兹億兆非王而誰尚饗范文正集巻十欽定四庫全書范文正集巻十一宋范仲淹撰碑銘
