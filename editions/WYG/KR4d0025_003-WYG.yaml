body:
  text: 律詩睢陽學舍書懷白雲無賴帝鄉遥漢苑誰人奏洞簫多難未應歌鳯鳥薄才猶可賦鷦鷯瓢思顔子心還樂琴遇鍾君恨即銷但使斯文天未喪澗松何必怨山苗詠史五首陶唐氏純衣黄冕厯星辰白馬彤車一百春莫道茅茨無復見古今時有致堯人有虞氏成都成邑即天開終踐堯基詠起哉但得四門元凱至九韶何必鳯皇來夏后氏景命還將伯益傳九川功大若為遷謳歌終在吾君子豈是當時不讓賢商人履癸昆吾禍莫移應天重造帝王基子孫何事為炮烙不念嘻吁祝網時周人斧鉞為藩忍内侵商人塗炭柰何深不煩魚火明天意自有諸侯八百心次韻和劉䕫判官對雪䔩䔩樓臺外新輝溢四遐雲中凋玉葉星際落榆花嶽色參差露松聲髣髴加風流裁賦苑清苦讀書家霜女慙輕格蟾娥讓素華孤鴻迷鳥道萬馬憶龍沙浄拂王恭氅香滋陸羽茶載歌勞郢謝一奏待鍾牙幾處和梅賞何人為鬢嗟含毫看不足詩社好生涯河朔吟太平燕趙許閒遊三十從知壯士羞敢話詩書為上將猶憐仁義對諸侯子房帷幄方無事李牧耕桑合有秋民得袴襦兵得帥禦戎何必問嚴尤和黄總太博上知郡杜少卿萬石君賢再出麾猶龍川上五歌時九重執憲清規在十鎮分憂白髪知環禁申威星拱極鈴齋舒嘯月侵帷金臺下客思何報願上中和樂職詩過太清宫醜石危松半綠蘿函闗真相玉嵯峨誰言仙道求難至自愧陰功積未多𣺌𣺌雲霞開絳節雝雝鸞鳯答空歌幾時身退瓊壇畔榮利匆匆柰老何寄餘杭全安石段少連二從事分攜俱是佐髙牙兩地光塵自等差榮事日趨丞相府道情時過老君家雙鴻得侣知風便一鶴思鳴對露華早晩相將雲漢外重為龍友免天涯送江南運使張傳度支刑措東南始詔迴重分邦計命欽哉于公已積充閭慶蕭相還施富國才十郡甘棠歌未歇一方流馬路初開啓心知有嘉謨在足亂雲霓憶帝臺堯廟千古如天日巍巍與善功禹終平洚水舜亦致薫風江海生靈外乾坤揖讓中鄉人不知此簫鼓謝年豐西溪見牡丹陽和不擇地海角亦逢春憶得上林色相看如故人寄秦州幕明化基寺丞同時辟命新中道改絲綸滄海人歸楚清風子在秦共居卿月下獨得將星隣聳動軍前檄峥嶸席上珍烽煙邊信息金鼓武精神獵度天山雪歌逢隴樹春燕臺無限好西向自霑巾鵰鶚在秋天秋漢寥寥迥雄心肯木棲人間正揺落天外絶攀躋月兔精應喪陽烏影欲齊長河匹練小太華一拳低下眄羣毛遁横過百鳥睽乘風俊未巳空闊玉闗西觀獵鷹犬一何驕霜明逺近郊鸞皇不觸網狐兔自充庖熠熠流鳴鏑紛紛過綠髾雄飛侵漢下殺氣與雲交翦棘争探穴摧林競覆巢惟開三面者盛徳播絃匏鸚鵡堂上每云云金籠久受恩思山誠有意對主忍無言性比孤鸞潔聲殊百舌繁雲林如一去應喜謝朱門歸鴈稻粱留不得一一起江天帶雪南離楚和春北入燕依依前伴侣歴歴舊山川木葉程猶逺梅花信可傳子規啼到曉鸚鵡鎖經年應羡冥冥者東風羽翼全青郊青郊鳴錦雉綠水漾金鱗願得郢中客共歌臺上春射陽湖渺渺指平湖煙波極望初縱横皆釣者何處得嘉魚舟中珠彩耀前川歸來一扣舷微風不起浪明月自隨船寄歐静秀才君歸一水遥魂斷木蘭橈賴有南軒竹清風慰寂寥和韓布殿丞三首泛湖中平湖萬頃碧謝客一開顔待得臨清夜徘徊載月還琴酒絃上萬古意樽中千日醇清心向流水醉貌發陽春漁父日色滿滄波吾生樂事多何人獨醒者試聴濯纓歌送識上人遊金山寺空半簇樓臺紅塵安在哉山分江色破潮帶海聲來煙景諸隣斷天光四望開疑師得仙去白日上蓬萊野色非煙亦非霧羃羃映樓臺白鳥忽㸃破夕陽還照開肯隨芳草歇疑逐逺帆來誰謂山公意登髙醉始逥雜詠四首梓人一笑白雲鄉杞桂森森遇豫章聞道周公繩墨在天庭誰此議明堂有客藍田得意歸溪光冉冉白虹蜺玉人豈忍言環珮留取天王尺二圭鏗鏗千古嶧山桐金石聲來造化中誰道元和無復致為君堂上起薫風嶺上英英向日開帝鄉情態自徘徊如何一施陽春雨依舊無心歸去來書事呈韓布殿丞南宫曽薦牧之文失足徒勞忽十春天上雲龍期際會山中猿鶴愧因循無功豈不孤黄石有道何堪憶紫蓴少壯由來須努力篆銘鐘鼎古何人西溪書事卑棲曽未託椅梧敢議雄心萬里途蒙叟自當齊黒白子牟何必怨江湖秋天響亮頻聞鶴夜海朣朧每見珠一醉一吟疎嬾甚溪人能信解嘲無得李四宗易書秋風海上憶神交江外書來慰寂寥松柏舊心當化石塤篪新韻似聞韶須期管鮑垂千古不學張陳負一朝三復荆州無限意王孫芳草路遥遥歐伯起相訪海涯牢落若為懷惟子相過未忍迴勁草不隨風偃去孤桐何意鳯飛來罇藏金醴遲遲進匣鎖雲和特特開萬古功名有天命浩然㩦手上春臺寄贈林逋處士唐虞重逸人束帛降何頻風俗因君厚文章至老淳玉田耕小隠金闕夢髙真罷釣輪生蠧慵冠鑑積塵餌蓮攀鶴頂歌雪扣琴身墨妙青囊秘丹靈綠髪新嶺霞明四望巖笋入諸隣幾姓簮裾盛諸生禮樂循朝廷唯薦鶚鄉黨不傷麟弔古夫差國懷賢伍相津劇談來劍俠騰嘯駭山神有客瞻冥翼無端預薦紳未能㤀帝力猶待補天均早晩功名外孤雲可得親酬滕子京同年謝家風雅若為酬散吏方耽海上游疎嬾幾㤀傳筆夢寂寥仍有負薪憂欲歌蘭雪歸真隠敢向簮軒競急流如共茂先瞻氣象莫言神物在南州贈餘杭唐異處士名動公卿四十秋相逢仍作旅人遊青山欲買難開口白髪思歸易滿頭厭入市㕓如海燕可堪雲水屬江鷗故鄉知巳方都督千樹春濃種橘休時胡侍郎守餘杭和沈書記同訪林處士山中宰相下巖扃静接遊人笑傲行碧嶂淺深驕晩翠白雲舒巻看春晴煙潭共愛魚方樂樵爨誰欺鴈不鳴莫道隠君同徳少樽前長揖聖賢清原本看字作戲字諸暨道中作林下提壺招客醉溪邊杜宇勸人歸可憐白酒青山在不醉不歸多少非題翠峯院范蠡舊宅翠峯髙與白雲閒吾祖曽居水石間千載家風應未墜子孫還解愛青山與人約訪林處士阻雨因寄閒約諸公扣隠扃江天風雨忽飄零方憐春滿王孫草可忍雲遮處士星蕙帳未容登末席蘭舟無賴寄前汀湖山早晩逢晴霽重待尋仙入翠屏寄西湖林處士蕭索遶家雲清歌獨隠淪巢由不願仕堯舜豈遺人一水無涯静羣峯滿眼春何當伴閒逸嘗酒過諸隣越上聞子規夜入翠煙啼晝尋芳樹飛春山無限好猶道不如歸送李紘殿院赴闕二首寂寥門巷每相過親近賢人所得多今日九重天上去濉陽孤客柰愁何霜露丘園不忍違三年月日速如飛金門乍入應垂淚因挂朝衣憶彩衣送邢昻處士南遊落落崆峒一大儒四方心逸憶江湖東南賴有林君復萬里清風去不孤送丁司理赴明州仙家枝葉令威孫南去司刑庇越民金闕道書微旨在獄多陰徳是真人道書謂升真者皆須曽為獄官送鄞江竇尉片㠶飛去若輕鴻一霎春潮過浙東王謝江山久蕭索子真今為起清風送常熟錢尉姑蘇臺下水如藍天賜仙鄉奉旨甘梅淡栁黄春不淺王孫歸思滿江南試筆偶緣疎拙得天真豈問前途屈與伸車馬縱能欺倦客江山猶可助騷人懶如叔夜書盈几狂似淵明酒滿巾况有南窗姬易在此心那更起纎塵送真元二上人歸吳中歸心不可奪千里故園春及見市朝事却思江海人煙波方得伴松月定為隣願結虎溪社休休老此身寄題許州錢相公信美亭華搆髙軒敞名湖一面分星辰居上相鼓吹燕中軍山色來嵩室風光徹汝墳杉篁涵晩翠蘭茝薦時薫坐嘯頻乘月歸懷幾望雲迥臨黄霸俗逺味仲宣文萬户方開國三階復致君斯亭比棠樹千載頌清芬送何白節推宰晉原二首盛府兼名邑榮歸指故林多年望鄉淚萬里倚門心江館春寒薄山程晩翠深板輿迎侍日桃李正芳陰此行深惜别所喜是寧親祖帳千門曉鄉闗錦國春鳥歌疑勸酒山態似迎人我絶南陔望因兄淚滿巾送刁紡户掾太常下第時為太常發解官精鑒本非深英僚暫此沉火炎方試玉沙密偶遺金豈累青雲器猶孤白雪音敢希蘇季子潛有激儀心憶杭州西湖長憶西湖勝鑑湖春波千頃綠如鋪吾皇不讓明皇美可賜疎狂賀老無寄林處士片心髙與月徘徊豈為千鍾下釣臺猶笑白雲多事在等閒為雨出山來依韻酬毋湜推官聖門非入室文陣敢争盟不意棲雲閣何才隷月卿珍羣憐未至霄鶚引脩程直舍有仙味祕庭無俗聲午陰宫樹綠宵刻禁鐘清奉制歌三秀稱觴聴六英恩輝孤易感交結淡難成新髪鑑中改舊山天際横纓思漁父濯春伴隼旟行桃浪觀秦塞薫風省舜城幾多興廢跡重疊古今情進退思先覺蹉􅋸畏後生見詒如美衮欲報乏英瓊浄揖澄江練髙窺擢露莖復驚聞正始終仰輔登閎好勵圖南志翺翔覽四瀛送石曼卿河光嶽色過秦闗英氣飄飄酒滿顔賈誼書成動西漢謝安人笑起東山亨途去覺雲天近舊隠回思水石閒此道聖朝如不墜疏封宜在立譚間送何涉秀才蜀道歸來萬里身上堂嘉慶動諸隣賢良詔下先生起休向成都問卜人八月十四夜月光華豈不盛賞宴尚遲遲天意將圓夜人心待滿時已知千里共猶訝一分虧來夕如澄霽清風不負期送吳安道學士知崇州一麾輕去奉蘭羞共惜清賢豈易求筮易暗驚鳴鶴逺賦詩深望白駒留古來經緯心皆曉閒處光陰髪半秋長孺之才同吏隠相寛頻上海邊樓時聶長孺倅通判謫守睦州作重父必重母正邦必正家一心囘主意十口向天涯銅虎恩猶厚鱸魚味復佳聖明何以報沒齒願無邪赴桐廬郡淮上遇風三首聖宋非强楚清淮異汨羅平生仗忠信盡室任風波舟楫顛危甚蛟黿出沒多斜陽幸無事沽酒聴漁歌妻子休相咎勞生險自多商人豈有罪同我在風波一棹危於葉傍觀亦損神他時在平地無忽險中人送韓瀆殿院出守岳陽仕宦自飄然君恩豈欲偏纔歸劍門道忽上洞庭船墜絮傷春目舂濤廢夜眠岳陽樓上月清賞浩無邊出守桐廬道中十絶隴上帶經人金門齒諌臣雷霆日有犯始可報君親君恩泰山重爾命鴻毛輕一意懼千古敢懷妻子榮妻子屢牽衣出門投禍機寧知白日照猶得虎符歸分符江外去人笑似騷人不道鱸魚美還堪養病身有病甘長廢無機苦直言江山藏拙好何敢望天閽天閽變化地所好必真龍軻意正迂闊悠然輕萬鍾萬鍾誰不慕意氣滿堂金必若枉此道傷哉非素心素心愛雲水此日東南行笑解塵纓處滄浪無限清滄浪清可愛白鳥鑑中飛不信有京洛風塵化客衣風塵日已逺郡枕子陵溪始見神龜樂優優尾在泥蕭灑桐廬郡十絶蕭灑桐廬郡烏龍山靄中使君無一事心共白雲空蕭灑桐廬郡開軒即解顔勞生一何幸日日面青山蕭灑桐廬郡全家長道情不聞歌舞事遶舍石泉聲烏龍山泉實過公署蕭灑桐廬郡公餘午睡濃人生安樂處誰復問千鍾蕭灑桐廬郡家家竹隠泉令人思杜牧無處不潺湲蕭灑桐廬郡春山半是茶新雷還好事驚起雨前芽蕭灑桐廬郡千家起畫樓相呼採蓮去笑上木蘭舟蕭灑桐廬郡清潭百丈餘釣翁應有道所得是嘉魚此郡魚少而嘉蕭灑桐廬郡身閒性亦靈降真香一炷欲老悟黄庭蕭灑桐廬郡嚴陵舊釣臺江山如不勝光武肯教來新定感興五首數仞黄堂上題名僅百賢孤髙宋開府千載可拳拳山水真名郡恩多補諌官中間好田錫風月亦盤桓風物皆堪喜民靈獨可哀稀逢賢太守多是謫官來去國三千里風波豈不賒迴思洞庭險無限勝長沙江上多嘉客清歌進白醪靈均良可笑終日著離騷遊烏龍山寺髙嵐指天近逺溜出山遲萬事不到處白雲無盡時異花啼鳥樂靈草隠人知信是棲真地林僧半雪眉江干閒望江干日清曠寓目一搘笻落葉信流水歸雲識舊峯蘭蓀誰共采鳬鴈自相從莫愛蘋風起波來千萬重和章岷推官同登承天寺竹閣僧閣倚寒竹幽襟聊一開清風曽未足明月可重來晩意煙􅂷草秋姿露滴苔佳賔何以佇雲瑟與霞杯齋中偶書狂愚多苦口幽逺獨甘心言路有餘責權門無去音㤀憂曽扣易思古即援琴此意誰相和寥寥鶴在陰留題江秀才舊居結舍近滄洲江山不外求我來明月夜更得主人留依韻酬周騤太博同年孰敢先懷富貴圖良時須惜幾嗟吁衆心可致巍巍主上意思平兩兩符不稱内朝裨耳目多慙外補救皮膚子陵灘畔觀漁釣無限殘陽媚綠蒲依韻答胡侍郎見寄千年風采逢明主一寸襟靈慕昔賢待看朝廷興禮讓天衢何敢鬬先鞭桐廬郡齋書事千峯秀處白雲驕吏隠雲邊豈待招數仞堂髙誰富貴一枝巢隠自逍遥杯中好物閒宜進林下幽人静可邀莫道官清無嵗計滿山芝朮長靈苖留題方干處士舊居某景祐初典桐廬郡有七里瀨子陵之釣臺在而乃以從事章岷往搆堂而祠之召會稽僧悦躬圖其像於堂洎移守姑蘇道出其下登臨徘徊見東嶽絶碧白雲徐生云方干處士之舊隠遂訪焉其家子孫尚多儒服有楷者新策名而歸因留二十八言又圖處士像於嚴堂之東壁楷請刋詩于其左風雅先生舊隠存子陵臺下白雲村唐朝三百年冠蓋誰聚詩書到逺孫時裔孫楷方登進士科范文正集巻三欽定四庫全書范文正集巻四宋范仲淹撰律詩
