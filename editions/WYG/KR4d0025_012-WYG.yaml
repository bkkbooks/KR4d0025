front:
  text: 部郎中許公墓誌銘公諱衮字公儀世為燕人皇考諱某王考諱某並隠君子也避五代之難不榮以祿考諱某汶陽之廬令累贈光祿少卿妣清河張氏贈河内縣太君皆積徳深長慶著來嗣公英秀而文與時㑹亨開寶八年太宗之尹開封也龍徳日彰髦傑之士其嚮如雲是嵗秋賦公卿送名者比比焉及試藝公為之首覆策于庭復有高等時登甲乙科者必更州縣有唐之遺風釋褐除江寧府獄曹掾本路大使言聽決詳明上既御大器北伐太原促召至行在曰我姑試之除均州防禦判官郡將表其能狀乃拜太子右贊善大夫通判姑蘇郡事時二浙之地始歸朝廷宿政如繩公善解之就進殿中丞俄拜奉常博士領曹南郡樹善屏惡新民耳目以前均𣙜浙右坐聨職之累降品一等領饒陽錢監未㡬辦之移倅弋陽郡復官曲臺在郡七陳諫章上愛其忠就遷本郡守受代至闕下復上策議并所著文四十巻翌日召試禁庭上覽而嘉之曰南府才冠吾不失人即以本官直昭文館賜服五品判登聞鼓院由是四方之訟清而不壅以奉安先塋請理覃懷郡出奉公家入敦孝事河内人歌焉又西陲文州扼其戎險命公往刺逺人便之真宗即位一日謂執政曰人君之言行也動乎天地不可以誣命公脩注記以先君之諱固請不獲須正人也公在館三進秩至於職方員外郎因論邊事慷慨動上心面改兵部方將圖任遘疾求解不得去以景徳二年四月二十九日終于京師武成坊之私第享年五十七娶朱氏封永城縣君有子四人伯曰珂祁州深澤尉仲曰琰有文與行擢進士第今為太常博士奉朝請叔曰琦恭謹有立今為右侍禁衛州兵馬監押季曰頊早亡一女適進士張濤朝廷贈公尚書户部郎中進封夫人河南縣太君子登朝也以某年某月日歸葬于懷之河内縣某鄉某里銘曰燕趙之英邦家之寶親逢聖神首冠俊造翹翹入彀郁郁登瀛榮滯六曹淹恤百城晩歸内朝端立右史直道始行怒飛爰止嗚呼遇豈不奇進豈不時賢者弗達天乎可疑葬于善地兮保以令嗣兮亦公之意兮
