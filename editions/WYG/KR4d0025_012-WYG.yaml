body:
  text: 滕公夫人刁氏墓誌銘序曰葬者藏也欲人不得而見之也君子之思也逺故復卜于山坎于泉又刻名與行從而祕之意百代之下治亂之變觀其銘思其人而不敢廢其墓斯孝子之心取諸大過初夫人之長子今祠部外郎宗諒作諫官以抗章黜知玉山郡再貶莅池陽之𣙜酤俄而起倅江寧府事常謂池之九華山上凌紫霄下盤洪流千巖白雲萬壑清風草木多靈民人一熙書契已降不知干戈居者得其壽藏者得其朽乃歎曰是可隐志焉是可宅先焉即奉先公太博之靈葬于此山之金雞原斯又大過之意至矣哉時景祐之三載明年夫人無疾而終春秋七十有二閏四月舉而祔之禮也夫人姓刁氏其先譜史存焉皇考諱晃後唐天平軍節度判官王考諱傑梁泰寧軍節度判官考諱允成皇朝贈太子右贊善大夫夫人歸滕氏服勤婦道自先太博之遺世也二子尚幼夫人夙夜誨導内惟節儉外豐禮於賓客俾令人是親以就厥文行而祠部君克承善志鴻軒鳳翥有風采于朝廷夫人累封渤海縣太君次子宗元就養于家未登祿仕二女適名族稱其禮範夫人之性柔而明端而慈曉文翰通名理事長如不克撫下如不及居大族餘五十載門中無間言及子以言貶顛沛於江湖間夫人從之未嘗出憂語知事君之然也難哉故生享徳於慶閭沒反真於福地某於祠部同年之執也嘗入拜于堂上知夫人之賢而敢述焉其銘曰九江之上九華之中孝子宅親厥思無窮茫茫萬年高岸可遷尚有人焉來此拳拳曰賢哉滕公夫人之墓再拜而去都官員外郎元公墓誌銘公諱奉宗字知禮其先臨川大姓危氏也皇考諱仔倡唐信州刺史避楊渥之亂東依錢氏時朝廷命討淮南未行而終因家於餘杭王考諱徳照為吳越王相僅三十年賜姓元氏累贈太保考諱秀文典吳越書命累贈太僕少卿妣陳氏贈馮翊縣太君少卿子五人曰興宗象宗宜宗道宗公即幼子也三人事忠懿王有儒術皆補為郎象宗忠懿之壻也從而還朝以文召試拜光禄寺丞公精於詞律景徳中天子臨軒試天下士公中甲科初命歙州績溪縣事再命常州武進令皆以㢘愛稱遷漳州從事故鎮牧錢公惟濟洎數朝賢交章保任除忠正軍掌書記俄改淮南幕本道按刑使采公理行以聞擢拜太子中允領淝川𣙜酤朝廷以西蜀天下之富昔者吏嚵民膏怨所由生階之為亂宜清舉者往焉公例改知蜀州晉原縣今上即位遷太常丞賜服五品還知通州海門縣遷博士入拜尚書屯田員外郎有監郡之行公以思事松楸願得餘杭一閒局莅之詔從其請再朞求分務南都尋告老歸姑蘇郡朝廷恤之補一子官又以籍田之慶進都官外郎景祐戊寅嵗十月丙戌考終于永定里第之寢享年七十有八始娶吳氏再娶李氏封壽安縣君公三子昞煜暕皆舉進士昞從其補今為歙縣簿煜暕並策名煜不赴調暕解官俱就養左右及公之喪勺水不入口者三日公孝悌之性不避禍難初江浙始下關譏甚嚴衣冠之族咸促赴闕下無敢私歸公聞太夫人之憂晝匿夜馳以及於葬兄道宗有才名不就世祿舉天府進士為搢紳先生所推諾公友事之如在膝下易衣并食不改其樂有兄子翼幼依於公愛之如傷敎之若不及以至于成宗黨稱焉相國潁川公曩司淛漕公在武進諸郡有難獄多命公決之在海門日患斥鹵之澤民無甘飲及卜良地鑿大池廣方百步積泉袤丈自是雖甚旱暵人常賴之又邑有大瀆亘數十里堙而不治公抗議籍力導至于海人咸利焉公退十餘年創竹亭花圃逍遙其間多素食清居非有道者不接晩年制斂服葬器而命諸子曰吾死之日必歸我于父兄之側魂如有知得事親於地下諸子如其教以其年十二月甲申葬于錢塘履孝鄉峴陁嶺之先塋禮也某以公年徳嘗脩鄉丈之禮而敢銘焉榮華之衢奔者無極公乎何心却焉而息孝友之風樹者無㡬公乎何心沒焉不已遷惠于民抱道于身于嗟君子吾不知夫古人贈兵部尚書田公墓誌銘公諱錫字表聖世為京兆人唐徳之衰徙家于蜀昔武王封舜之後於陳春秋時公子完如齊子孫遂大食采於田而命氏焉厥後將有穰苴相有千秋斯可謂之著矣大王父易直王父成皆隐君子也文而不耀父懿因公之貴累贈尚書左司郎中善教于家嘗命公曰汝讀聖人之書而學其道慎無速為期二十年可以從政矣公服其訓拳拳然博通羣書東游長安昌黎韓丕復居驪山白鹿觀數年器志大成拔王府薦有聲于京師太宗皇帝親策天下進士擢公第二人時太平興國三年秋也釋褐除將作監丞通判宣城郡召還改著作佐郎俄拜右拾遺直史館賜五品服出為河北轉運使改知相州就除左補闕移桐廬郡遷起居舍人遷判登聞鼔院尋以本官知制誥進兵部員外郎充職以直言改户部郎中出守淮陽以留獄之謗左降海州團練副使起為工部員外郎直集賢院復户部郎中真宗皇帝即位遷吏部郎中判審官院兼通進銀臺封駮司賜金紫求出典海陵郡還臺兼御史知雜拜右諫議大夫史館脩撰以咸平六年十二月十一日終于私第享年六十四公自白衣已有意于風化上書闕下請復鄉飲禮又請脩藉田禮及在朝廷知無不言太宗初既取太原范陽未下帝怒不賞平晉之功中外囂然而莫敢言者獨公上書論諫理意深切帝感悟璽書褒荅賜内帑錢五十萬僚友謂公曰今日之事鮮矣宜少晦以逺讒忌公曰事君之誠惟恐不竭矧天植其性豈一賞之奪耶在河朔暨相州累章論邊事至桐廬郡以吳越之邦歸朝廷未乆人阻禮教邈如也公下車建孔子廟教之詩書天子賜九經以佑之自是睦人舉孝秀登搢紳者比比焉在郡聞禁中火拜章極言上嘉之及還眷遇愈隆㑹乾明節館閣多進詩歌帝獨喜公之辭乃依韻和賜令宰相宣付公又上封禪書謂五代之亂人如豺虎不圖復見太平宜崇檢玉之禮以荅天意公在西掖㑹京畿大旱禱祠無應遂抗言切于時政故有宛丘之行咸平初出使秦隴迴上三章言陜西數十州苦于靈夏之役朝廷為之慼然出海陵之初以星文示變拜疏請降詔責躬上奉天誡真宗皇帝嘉其意屢召對便殿及行降中使撫安仍加寵賚爰有翰林學士承㫖宋公白舉公賢良方正以副天下之望一日召對乆之且曰陛下以皇王之道為心臣請采經史中切於治體者上資聖覽帝深然之乃具草以進手詔荅曰卿能演皇王清淨之風述理亂興亡之本備觀鑒戒朕心渙然所撰三十篇皆隠其目公奉事兩朝由遺補歴御史至諫議大夫前後章疏凡五十有二嘗謂諸子曰吾每言國家事天子聴納則人臣之幸不然禍且至矣亦吾之分也及終有遺表陳邦國安不忘危之意其家弗預焉天子怛然命中使賻之有制痛悼贈工部侍郎二子改大理評事持䘮中並給月俸哀榮之禮可謂至矣後以二子登朝累贈兵部尚書寳元幾年某月某日與夫人合𦵏于泗州臨淮縣某鄉之某原禮也公娶楊氏再娶奚氏封江陵縣君能循法度以配君子二子長曰慶逺今為駕部員外郎次曰慶餘今為比部郎中竝克奉堂構有能政于四方女三人長適王氏次適龎氏季適張氏皆以婦道稱公動必以禮言必有法賢不肖咸憚伏之出處二十年未嘗趨權貴之門在貶廢中樂得其正晏如也著文章成五十巻目之曰咸平集行于世論者曰在大禹時臯陶矢厥謨在湯武時伊尹周公為之訓誥故教化紀綱莫盛于三代而子孫有天下皆數百年秦滅詩書其風丕紹至西漢得賈誼董仲舒其言可以追先王之烈而弗克施使後世王者無復起三代之心由漢始也聖宋定天下太宗鋭意太平真宗之初復親擢俊乂如田公之徒並見奬用惜乎不終其才豈皇天之意特厚于古歟某㓜聞高風未嘗游于其門今駕部書先君之履業索文于江外某敢約而脩之又采舊老之言而作銘云嗚呼田公天下之正人也言甚危命甚竒盡心而弗疑終身而無違嗚呼賢哉吾不得而見之兵部侍郎致仕胡公墓誌銘寳元二年六月十八日尚書兵部侍郎致仕胡公薨于餘杭郡之私第明年二月十有一日𦵏于杭之錢塘縣南山履泰鄉龍井源以夫人潁川郡君陳氏祔焉禮也孤子楷泣血言于友人范某禮經謂稱揚先祖之美以明著于後世此孝子孝孫之心也然而言之不文行而不逺處䘮之言烏乎能文今得浙東簽書寺丞俞君狀先人之事而敢請誌焉某曰孔子見齊衰者必作重其孝于親也敢不唯命公諱則字子正婺之永康人也昔虞舜之後有胡公武王封于陳葢族望之來逺矣皇考諱彭王考諱濲皆隠于唐季其道不顯考諱承師在鄉閭間以積善稱因公而貴官至尚書比部員外郎贈吏部郎中妣應氏封永樂縣太君贈普寧郡太君公少而倜儻負氣格錢氏為國百年士用補廕不設貢舉吳越間儒風幾息公能購經史屬文辭及歸皇朝端拱二年御前登進士第釋褐為許州許田尉以幹自聞補蘄州廣濟宰又補憲州録曹以本道計使諫大夫索公湘之舉改秘書省著作佐郎簽署貝州節度觀察判官公事升本省丞知潯州拜太常博士提舉二浙𣙜茶事兼知桐廬郡丁太夫人憂服除以本官知永嘉郡遷屯田員外郎提舉江南路銀銅場鑄錢監擢任江淮制置發運使轉户部員外郎入為三司度支副使賜金紫除禮部郎中京西轉運使又移廣南西路轉運使以户部郎中充江淮制置發運使轉吏部郎中改太常少卿丁先君憂終制知玉山郡移福唐郡拜右諌議大夫知杭州入判流内銓以舉官累責授少常知池州未行復諫議大夫知永興軍領河北都轉運使給事中入權三司使拜工部侍郎集賢院學士知陳州進刑部再牧餘杭郡踐更中外凡四十七年得請加兵部侍郎致仕朝廷命長子通判錢塘以就養又六年而終享齡七十有七天子聞而悼之進一子官初至道中公在憲州時西寇梗邊朝廷命師五路入討詔具三十日糧以從之索公方引公督隨軍糧草事公曰為百日計猶或不支奈何索公乃遣公入奏召對逾刻公陳邊事如指之掌上顧左右曰州縣中有如此人遂可其奏具示甄拔之意後大帥李繼隆果與寇遇十旬不解索公曰微子幾敗吾事一日其帥移文曰兵將深入糧可繼乎公曰師老矣矯問我糧為歸師之名耳請以有備報之索從其議彼即自還無以咎我其先見如此及索公主河北計又奏辟之遂以貝州之行朝廷遣使省天下冗役就命公行河北道凡去籍者僅十萬數民用休息在潯州人有虎患公齋戒禱城隍神翌朝得死虎于廟中其誠之效歟按池州永豐監得匿銅數萬斤吏懼當死公思之曰昔馬伏波哀重囚而縦之前史義焉今銅尚在吾忍重其貨而輕數人之生耶咸以羨餘籍之不復為坐在江淮制置日㑹真宗皇帝奉祀景亳公實主其供億千乘萬騎至于禮成無一毫之闕帝深愛其才面加奬勞遂進秩登于計相之貳在廣南西路有大舶困風于逺海食匱資竭久不能進􅆥人告窮于公公命瓊州出公帑錢三百萬以貸之吏曰􅆥本無信又海舶乘風無所不之公曰逺人之來不恤其窮豈國家之意耶後􅆥人卒至輸上之貨十倍其貸朝廷省奏而嘉焉又宜州繫重辟十九人時有大水公不慮患而特往辨之活者九人焉在福唐有官田數百頃民輸租食利舊矣至是計臣上言請就鬻之責其估二十萬貫民不勝弊公奏之未報章三上且曰百姓疾苦刺史當言之而弗從刺史可廢矣乃有俞詔減其直之半而民始安公領三司使寛於財利不以刻下為功時上方以兩京陜西官鹽嵗久民鮮得食而日以犯法命通商有司重其改作公首請奉詔其事遂行公性至孝自曲臺丁太夫人憂廬于墓側以終喪紀有草木之祥本郡表之及西京之行以家君朱紱為請上曰胡某為孝雖非其例與以明勸也搢紳先生榮之又天禧中尚居郎署朝廷擬公諫議大夫知廣州公以家君八十嵗懇辭于政府乃復有制置之行尋以哀去職得盡心於喪葬公富宇量篤風義往往臨事得文法外意人或譏之公亦無悔焉其輕財尚施不為私積士大夫又稱之福唐前郡將被訟去官嘗延蜀儒龍昌期與郡人講易率錢十萬遺之以歸事在訟中及公下車昌期自益部械至公曰斯何罪耶遽命釋之見以賔禮法當償其所遺公代以俸金仍厚遣而還又濟陽丁公為舉子時與孫漢公客許田公待之甚厚及其執政而雅故之情不絶若休慼士人而未嘗預暨丁有朱崖之行昔之賔客無敢顧其家公實被議出玉山郡尚屢遣介夫不逺萬里而往遺焉此又人之難矣及退居西湖乘畫船擊清波深樽雅絃左子右孫與交親笑歌於時嵗之間浩如也人不謂之賢乎夫人潁川郡君有慈和之徳先以夀終令子四人長曰楷都官員外郎前知眭州祥符七年秋登服勤詞學科所至政能有先君風度次曰湘好學有志識朋友多之次曰桂俊異居喪而亡次曰淮孝謹有成人風二女長適泉州徳化縣尉蘇璠次適御史臺主簿華參而亡其閨門之範見其潁川之誌某非特為重齊衰之情嘗倅宛丘郡㑹公為二千石以國士見遇且與都官布素之㳺誠可代孝子而言焉銘曰進以功退以夀義可書石不朽百年之為兮千載後胡公夫人陳氏墓誌銘詩稱采蘩夫人不失職也夫人之職莫先乎舅姑甘旨以事居蘋蘩以事往故可以配君子正家道也夫人姓陳氏金華郡之令族曽祖諱晦祖諱資父諱文諭皆樂善于家不從仕宦夫人幼賢父母篤愛擇公而妻之及公中科第累調逺方二親樂閭里與姻族㳺夫人願侍左右不從公行凡二十年縫衣爨飱必躬親之至舅姑之終與公執喪三年然後就公官所此夫人大節無愧天下之為人婦者有聲詩之義焉又性好禮自少至老對公如賔客加以純儉而仁筓服之餘皆均于親之貧者夫人自公登朝封上黨縣君公為諫議大夫進封本郡君寳元元年秋九月寢疾乃齋沐易衣怡怡而終享年七十有九以三年二月十一日與公合葬于履泰鄉龍井源禮也子四人長曰楷都官員外郎次曰湘曰桂曰淮並太常寺太祝二女習夫人之教柔淑有禮宗黨稱焉長適蘇氏次適華氏銘曰惟孝惟禮作配君子伊夫人兮至矣寧海軍節度掌書記沈君墓誌銘呉興郡太守滕侯下車求故同年沈兄之家得諸孤問其墳墓曰貧未之葬滕侯傷之乃謀于僚屬卜善地揀良日其禮悉備以寳元三年二月某日𦵏于徳清縣之永和鄉大壯嶺君諱嚴字叔寛世為本郡人其先食邑於邥後子孫失國而為沈氏漢晉而下代有其人曽祖諱規祖諱廷誨父諱延岫皆隠而不仕叔寛幼負器識服親之教宗經屬文有聲于江表大中祥符七年秋郡國敦遣首送于禮部明年春禮部較天下之才奏叔寛第四人天子命試于庭中甲科除南康軍判官三載有善績改宣城節度掌書記國家興山澤之利主計等薦君洪州武寧之茗局外臺上請兼領本邑事朝廷從之既而吏畏其㢘民愛其慈君子謂之善政餘杭郡榷酤嵗金二十萬貫為諸郡之劇主計又奏君尸之三年而還會故參政蔡公居守南都以同年之㳺惜其沈俊辟為留守推官其年秋七月以疾終于官所享年五十叔寛孝悌于家事其親未嘗違顔色視兄之孤必先於己子與人交篤於信義善人君子無不樂見之及聞其亡皆相弔云天與其才也又賦其行也而不及其顯以夀也悲夫三子曰祁曰邰曰郁並從儒學必有立者二女長適前進士陳經次女未笄長女之嫁蔡公不逺千里命齎金以送之及君之葬又滕侯極意以營之有以見叔寛感人之深也如此某同年之列最相知心故書之銘曰叔寛叔寛生兮可愛殁兮可傷友朋之望兮子孫其昌户部侍郎贈兵部尚書蔡公墓誌銘寳元二年嵗次巳卯四月前參知政事户部侍郎蔡公薨天子悼之卿大夫憂之國人傷之上命三公舉行典禮贈兵部尚書諡曰文忠以康定二年嵗次辛巳十一月某日𦵏于許州陽翟之某山公諱齊字子思其先周之子孫累封于蔡因以著姓秦漢以降代生偉人曽祖綰贈太保洛陽人也嘗宰萊之膠水居官九年民愛以深遂家焉祖諱鄰贈太傅隱居丘園以墳素為樂考諱夢臣累贈中書令博通經史善時筆與宗族居鄉黨稱其孝友娶楚國太夫人張氏而生公教之親仁賔來如歸公幼而神秀眉目廣聳見者異之嘗依外舅劉氏學於彭城今相國隴西公迪時為監郡得公詩語歎曰渠有大志宜善視之大中祥符八年春真宗皇帝臨軒以文考天下之士公中第一及引對文陛堂堂英偉進退有法上大悦顧謂寇萊公曰得人矣遂下詔俾金吾給七人清道自公始也釋褐除將作監丞通守兖海郡移北海郡召還以大著直集賢院主判三司開拆司賜服五品今上即位拜右司諫同脩起居注改禮部員外郎兼侍御史知雜事賜金紫歴户部度支二副使遷起居舍人知制誥同知審官院既而召入翰林為學士兼侍讀學士轉禮部郎中龍圖閣學士守西京以便親求為髙密郡徙南京入除左諫議大夫權御史中丞尋改給事中復充龍圖閣學士權三司使拜樞密副使進禮部侍郎參知政事以户部侍郎罷終于汝陰郡享年若干楚國在堂君子哀之公之弟秘書丞稟甥著作佐郎寇平幹公襄事中山郡夫人劉氏哭泣三年至于疾廢二子尚幼曰延慶太常寺太祝曰延嗣祕書省正字長女適試將作監主簿劉庠次女在室而某自布素從公之逰見公出處語黙無一不善門中奉親日視其親色諸公昆弟愛之如傷先朝采拔以輔相器之當遺弓之初公懷哀慕不能食者數日家人視其衾衣涕泗霑溼公病汝陰聞拓拔僭稱嘻吁感槩敎弟稟言西事甚詳葢忠孝之性發之天也公於親舊間雖死生不易彼有孤遺則必為之備嫁娶又好學無倦未嘗不以名教為急孔子之後世襲文宣公嘗宰曲阜乾興中四十九代孫承祐卒遂廢十餘年公聞承祐有母弟在抗章請復其嗣有詔從之其立朝也能清其心髙其行未嘗取於人明肅太后時用事中貴人董脩景徳寺時公在翰林詔為之記中人求公善辭許以不次公遲之不進故被誣而出至髙密㑹嵗饑公請蠲諸州税又力請放海利以救東人于今賴之公兩居憲臺方嚴不動百辟畏其風權戚有過則彈劾不隱未嘗求其下也明肅之終莊惠復立閤門促百僚賀公毅然正色目臺吏不得追班前白執政遂罷自是莊惠損抑禮數有力焉在樞密院海南奏交趾八百餘人避本國之虐以歸我議者謂不如還之恐生邊患公曰當内之荆湖間活以閒田奈何求生而來委之兕虎蠻亦人也義必不還苟散為民盜從而戮之酷又甚焉爭之不能得後果為亂捕之嵗餘宜桂以西皆警朝廷患之公猶有愧色在政府浩然示至公於中外以進賢為樂以天下為憂見佞色則嫉聞善言必謝孜孜論道以致君堯舜為心與大臣居和而不倚正而不訐無親疎之間有方大之量朝廷為之重刑賞為之平及其出也未踰嵗時而天子思之公遽不起嗚呼公之生也天有意也公之亡也天無意乎使在位而夀則道徳功名非竹帛之可勝矣銘曰㤗山之東齊魯同風厥生我公我公堂堂觀國之光亨于真皇真皇上僊隕血漣漣欲報昊天今上聖神迺眷正人參于國鈞純徳坦坦平心浩浩進退惟道恕以待物誠以報國仁人之徳天乎天乎豈不有心奪此令人我懷憂深箕山峩峩潁川悠悠山為陂兮川為丘公之名兮與日月留范文正集巻十二欽定四庫全書范文正集巻十三宋范仲淹撰墓誌銘
