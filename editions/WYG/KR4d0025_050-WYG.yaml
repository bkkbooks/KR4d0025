seq: 50
front:
  text: 地之業於斯述也委而不論亦吾道之志歟時天聖五年正月日高平范仲淹序
  hash: sha256:3da8c774a33c26e1ad03b25f3d1107336fbe2844c387afdc840f008c85feed49
body:
  text: 竇諫議録竇禹鈞范陽人為左諌議大夫致仕諸子進士登第義風家法為一時標表馮道贈禹鈞詩云燕山竇十郎敎子以義方靈椿一株老仙桂五枝芳人多傳誦禹鈞生五子長曰儀次曰儼侃偁僖儀至禮部尚書儼禮部侍郎皆為翰林學士侃左補闕偁左諌議大夫參知政事僖起居郎初父禹鈞家甚豐年三十無子夜夢亡祖亡父聚謂之曰汝早脩行緣汝無子又夀算不永禹鈞唯諾禹鈞為人素長者先家有僕者盗用過房廊錢二百千僕慮事覺有一女年十二三自寫券繫於臂上云永賣此女與本宅償所負錢自是逺逃禹鈞見女子券甚哀憐之即時焚券收留此女祝付妻曰養育此女及事日當求良匹嫁之及女筓以二百千擇良匹得所歸後舊僕聞之歸感泣訴以前罪禹鈞不問由是父子圖禹鈞像日夕供養晨興祝夀公嘗因元夕往延慶寺燒香像前忽於後殿階側拾得銀二百兩金三十兩遂持歸明旦侵晨詣寺守候失物主須臾見一人泣涕至公問所因其人具以實告曰父犯刑至大辟徧懇至親貸得金銀若干將贖父罪昨暮以一相知置酒酒昬忽失去今父罪巳不復贖矣公騐其實遂與同歸以舊物還之加以惻憫復有贈賂其同宗及外姻甚多貧困者有喪不能自舉公為出金𦵏之由公𦵏者凡二十七喪親戚故舊孤遺有女未能嫁者公為出金嫁之由公嫁者孤女凡二十八人故舊相知與公有一日之雅遇其窘困則必擇其子弟可委以財者隨多寡貸以金帛俾之興販自後由公而活族者數十家以至四方賢士賴公舉火者不可勝數公毎量嵗之所入除伏臘供給外皆以濟人之急家惟素儉器無金玉之飾室無衣帛之妾於宅南搆一書院四十間聚書數千巻禮文行之儒延置師席凡四方孤寒之士貧無供須者公咸為出之無問識不識有志於學者聼其自至故其子見聞益博凡四方之士由公之門登貴顯者前後接踵來拜公之門必命左右扶公坐受其禮及公之亡䝉恩深者有持心喪三年以報其遺徳先是公之亡祖亡父夢中告以無子及夀數不永後十年復夢其亡祖亡父告之曰汝三十年前實無子分又夀促我嘗告汝今汝自數年以來名掛天曺隂府以汝有隂徳延算三紀賜五子各榮顯仍以福夀而終死後當留洞天充真人位言訖復祝禹鈞曰隂陽之理大抵不異善惡之報或發於見世或報於來世天網恢恢疎而不漏此無疑也禹鈞愈積隂功年八十二沐浴别親戚談笑而卒五子八孫皆貴顯於朝廷後之稱敎子者必曰燕山竇十郎云某祖與竇公故人祖嘗録於書冊以示子孫為法惜其不傳天下故録以示好善者始見隂陽報應之理使惡者知所戒焉參知政事范仲淹述啟上張侍郎啟某啟聞漢相出守遽彰集鳳之仁蜀客寓言適起攀鴻之志是則感深者惠來而熟間希逺者景附以誠宜矧嘗赫赫之瞻敢昧菁菁之樂恭惟留守侍郎崇宣古道茂冠人彝濬雅量於玉淵耀華勲於金冊經緯抗魯雲之作論思傾丹石之衷仁助南薰下解吾民之愠道侔東易旁洗庶物之心由是仙貫日升天姿晝接皇墳帝典奉國府之諮詢周紀漢綱振憲司之風議臺霜載厲心水彌清故得穆穆顧懐師師屬望參萬微之景業升九序之康歌象先以清浄加人元崇以應變成務梓人之政大斵於周邦金鑑之功景鏘於唐室翊宣帝問欽敘疇倫羲鼎載羮既觀於烹養魯巵在廟俄鍳於敧盈不盡君子之餘迺起達人之觀劇言黼扆牢讓台衡天章開均逸之慈國論仰知榮之躅今則倚毘載重名敎荐登鳴玉北門實奉觀書之座分珪南闕崇司受籙之都彌重國威益嚴廟寄蕭侯闗内鬱隆炎漢之基旦相陜東雅布崇周之化一人為之安撫四國為之承流莫不凝養粹靈惠綏美俗東陽之扇動揖清風武昌之樓静延明月儀刑乎仁夀之域嘯歌乎逍遥之墟浩氣載盈仁聲允塞然而三輔之隩適賀帶安庶邦之懐未忘高仰佇見日圍迅命星駕嚴㱕兔苑風移愛甘棠而益茂龍池天近著温樹之重芳浹麗澤於百靈藹英聲於億載如某者藝疎芳潤行愧直清蜉蝣之術未充蝘蜓之嘲奚解依經敏學恥讀非聖之書約史徇名勉附青雲之士實偶登三之盛獲從旅百之先洽呦呦之鳴誤膺於宸選循婉婉之書謬廁於賔榮詎興沈後之嗟尚冀騰夷之遇伏遇留守侍郎燕金募秀蔡屣延才鐸宣百世之文旌集四方之善逺者近者鼔之舞之某顒若望風惠然入國六經之敎郁郁成文三月之韶洋洋在耳而况某將趨列鎮實附宏都弗違雞犬之音密奉馬牛之境小國之仰大國亹亹誠敦先知之覺後知循循豈倦竊效封人之請顧觀魏相之威雖才異唐英未入晉公之幕而時同漢秀庶登梁孝之園如此則慕孤飛之雲或為霖而有助效百年之榦幸構厦以無遺跡預洪鈞惠聞函夏某卑情無任俟恩激切知歸之至上大名府主王侍郎啟某啟聞樂府宏開金石有發揮之望靈臺峻立風雲無隐晦之姿延羣奏以咸宣俯多祥而益辯其况當具瞻之際凝真覽之明激揚駕説之音妍醜思皇之俊咸歌樂育熟議密藏恭惟知府侍郎聲盈天湍道潤金璧儼神鋒而不耀藴寳器以難名禀自誠之徳之純賦將聖之才之美明明詔下諸候脩北海之書穆穆賔來天子得平津之䇿自是蹈揚仙室遷歴帝闈青簡婉微謹周孔之垂法王書雅奥含虞夏之遺風故能輔翊天家參脩皇極沃心必符於舜好論思豈止於曺隨萬化景彰諸華砥屬一元是問屬博陽之有憂六府既瞻異延平之不懼密辭岩座遜請藩庭周人詎有於流言魯哲曾無於愠色今則屏臨三輔岳鎮萬封輟妙算於廟中抗雅歌於閫外束兵之伍樂夀域以何長含哺之氓賞春臺之不足佇見下從僉論上迪宸謀金堤啟途黄樞正位大明禮樂不貽唐相之慚盡養聖賢更廣周文之意神明百揆舞蹈萬邦如某者善逺芝蘭言疎黼黻静忘窺圃顧玉器之未成進異括囊愧金聲之不振景高山而詎至騰夷路以何稽幸以亨㑹景炎賁捜寒俊方領矩歩入拜侍郎之庭載纚垂纓出預將軍之幕當𤓰期之未及猶蓬累之斯行伏遇侍郎啟闢聖門儀刑俊域實斯文之東道乃吾黨之南車是興請見之辭稍露盍歸之志雖拳拳希聖曾無日月之階而肅肅景賢當有神仙之歎庶乎韓宣此日得言在魯之文吉甫異時願上維嵩之頌冀親黄閣永戴洪鈞下情無任賀胡侍郎致仕啟伏審侍郎進清崇之爵諧髙尚之風耆徳尊隆睿恩深厚榮映之下慶仰居多恭以侍郎誠明自天進退由道宣三徳於夙夜被四紀於龍光赫有華名密多隂施囏難險阻盡力乎三朝富貴崇高致身乎五福而乃起達人之觀引大夫之年聰明不衰止足自處國家興廉讓之節疏渙汗之仁寵數優賢休聲載路耀錦南國邑子榮太守之歸掛冠東門都人藹丈夫之歎為儒及此其樂何涯伏惟上為聖朝倍保崇重舜好清問方體貌於宿賢國有老成尚彌縫於顯道某久荷鈞録卑情無任榮觀景仰之至知杭州謝兩地啟某啟三月二十一日敕差知杭州軍州事東南得請夙夕趨程地重寄優感深愧集竊念某生禀迂拙進當盛明述不臻於聖門跡久塵於榮路領出師之重任曽莫有功參論道之近司亦惟無状清光旋逺晦昧所宜爰假㑹藩即從便道過于桑梓見故老以相榮處兹江湖與嘉魚而共樂允為天幸出自陶成兹蓋集賢相公權衡以誠神明其照俾蒲桞之微質被霖雨之大私惟寅奉於官箴庶欽崇於鈞造感懼激切依歸之至移蘓州謝兩府啟罪布四方大不可掩寵分千騎得之若驚仰雷霆之霽威加霖雨而䝉潤報君何道殺身有宜竊念某生於唐虞學於鄒魯一簞之樂素伏於丘園四庫之遊濫升於臺閣而自踐揚諫列對越清光允出遭逢誠當感槩事君無隐必罄狂夫之言渉道未深終乖智者之慮俟竄居於楚澤尚假守於桐廬風俗未殊足張條敎江山為助寜慕笑歌鶴在隂而亦鳴魚相忘而還樂優遊吏隐謝絶人倫豈謂䝉而克亨幽而致顯屢改劇藩之寄莫非名部之行宗族相榮搢紳改觀此蓋相公仁鈞大播量澤兼包示噩噩之公朝存坦坦之言路道兹優渥屈彼典彝茂楊天子之休純被幽人之吉某敢不黽勉王事寤寐政經佩黄裳之文庶揚於易敎詠朱繩之直無忝於詩人上酬乃聖之知旁荅具瞻之造過此以往不知所裁謝夏太尉啟某䝉恩授前件官者金石之言方形於清舉絲綸之命遽被於鴻私深惟山野之材曷副英豪之薦斯蓋某官棟梁王室篁鼓天聲痛么麽之戎夷敢䖍劉於封鄙是求參贊將賜殄夷謂某經術粗通可以識國家之體謂某愚衷素慤可以盡兵民之心奏達九清増輝多士敢不竭其素藴輔之至誠震耀我國威張皇我帝算晉公之幕力希唐士之謀能虞帝之庭誓獻有苗之俘馘英儀所激狂言不誣謝賀正啟某啟伏以青祗布職珠緯窮天授嵗律以端時建斗杓而首序賀牘未馳於便置繁文遽枉於圜封荷勤懇之相先輒佩藏而無斁履兹令旦倍納殊休劄子論西亊劄子臣聞兵家之用在先觀虚實之勢實則避之虚則攻之今縁邊城寨有五七分之備而闗中之備無三二分若昊賊知我虚實必先脅邊城不出戰則深入乗闗中之虚小城可破大城可圍或東阻潼闗隔兩川貢賦縁邊懦將不能堅守則朝廷不得高枕矣為今之計莫若且嚴邊城使之久可守實闗内使無虚可乗西則邠州鳳翔為環慶儀渭之聲援北則同州河中府扼鄜延之要害東則陜府華州據黄河潼闗之險中則永興為都㑹之府各須屯兵三二萬人若寇至使邊城清野不與大戰闗中稍實豈敢深入復命五路脩攻取之備張其軍聲分彼賊勢使弓馬之勁無所施牛羊之貨無所集三二年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上䇿也又聞邊臣多請五路入討臣竊計之恐未可以輕舉也太宗朝以宿將精兵北伐西討艱難嵗月終未收復縁大軍之行糧車甲乗動彌百里敵騎輕㨗邀擊前後乗風揚砂一日數出進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也况今承平嵗久中原無宿將精兵一旦興深入之謀係難制之虜臣以謂國之安危未可知也然則唐漢之時能拓疆萬里者蓋當時授任與今不同既委之以兵又與之税賦而不求速效故養猛士延謀客日練月計以待其隙進不俟朝廷之命退不闗有司之責觀變乗勝如李牧之守邊可謂善破虜矣惟陛下深計而緩圖之贊道服贊平海書記許兄製道服所以清其意而潔其身也同年范仲淹請為贊云道家者流衣裳楚楚君子服之逍遥是與虛白之室可以居處華胥之庭可以步武豈無青紫寵為辱主豈無狐貉驕為禍府重此數師畏彼如虎旌陽之孫無忝於祖范文正别集巻四欽定四庫全書范文正集補編巻一宋范仲淹撰奏議論職田不可罷天聖八年眞宗初賜職田實遵古制蓋大賚於多士俾無蠧於生民無厭之徒或冒典憲由濫官之咎非職田之過若從而廢罷則吏困於廉収而均給則民受其弊天下幕職州縣官三班使臣俸微禄薄全藉職田濟贍其無職田處持廉之人例皆貧窘曩時士員尚少凡得一任必五六年方有交替到闕即日差除復便請給當時條例未宻士寡廉隅雖無職田自可優足今物貴與昔不同替罷之後守選待闕動踰二年官吏衣食不足廉者復濁何以治化天下受弊必如臣言乞深加詳軫不以一時之論廢經逺之制天下幸甚奏減郡邑以平差役天聖八年七月天下郡縣至宻吏役至繁奪其農時遺彼地利是以邊廩或窘民財未豐臣觀漢光武朝倂合四百餘縣吏職減損十置其一今欲去煩苛之吏致富壽之俗當施此令以寛兆民如河中府倚郭二縣惟河東縣主戸四千不致逼迫河西縣主户一千九百内八百餘户屬鄉村本縣尚差公吏三百四十人内一百九十五人於鄉村差到緣鄉村中等户只有一百三十户更於以下抽差是使堪役之家無所休息以臣管見其河西縣冝倂入河東及大名府縣分極多甚可省去或謂縣邑之中有𣙜酤關征之利臣謂所廢之縣止可為鎭而坊市仍舊所貴吏役稍減農時不奪地利無遺民財可阜也封進草子乞抑奢侈明道二年七月公時爲右司諫江淮體量安撫臣昨到太平州界體量安撫本處檢㑹廣德軍判官錢中孚當塗縣主簿兼嘉祥縣尉溫宗賢等状稱往諸鄉檢旱竊見貧民多食草子名曰烏昧幷取蝗蟲曝乾摘去翅足和野菜合煑食别無虗妄者臣竊思之東南上供糧米每嵗六百萬石至於府庫物帛皆出於民民於饑年艱食如此國家若不節儉生靈何以昭蘇臣今取前件草子封進伏望宣示六宫藩戚庶抑奢侈以濟艱難仍乞密下裁造務後苑文思院糧料院檢祖宗之朝每嵗用度之費數目比於今時則奢儉自見伏望聖慈特降進止則天下幸甚奏乞督責管軍臣寮舉智勇之人康定元年九月公時知延州臣竊見邊上將帥常患少人今髙繼嵩纔亡人情頗駭恐鎭戎不能守禦却須藉朱觀徃彼朱觀既去則鄜延路又闕勇敢之將國家奄有四海未必乏才豈天地生人厚於古而薄於今蓋選之未精用之未至今諸軍諸班必有勇智之人多被管軍臣寮人員等遞互彈壓不得進用坐至衰老只如朱觀元是軍班出身因歴邊任方得將名伏望聖慈專督管軍臣寮等於諸班中摉羅智勇之人各舉一名不以將校長行或試以武藝或觀其膽畧出衆便可遷轉於邊上任使如將来頗立戰功則明賞舉主或屢敗軍事亦當連坐所貴諸路漸次得人不致頻有那移免使戎狄謂大國乏才愈増驕氣况西北二方將帥之闕實非細事乞國家常為預備早加遷擢論夏賊未宜進討慶厯元年正月公時為陜西經畧副使知延州先是康定元年閏十一月朝廷詔鄜延涇原兩路取正月上旬進兵入討西賊故公上此奏臣聞昨賊界投来山遇嘗在西界掌兵言其精兵纔及八萬餘皆老弱不任戰鬭始賊衆深入蓋為官軍以分地自守既不能獨禦賊鋒又不能併力掩殺彼得其便繼爲邊患其虜劫生口牛羊亦不曽追奪故安然徃來如蹈無人之境今延州東路合堤防之處已令朱吉與東路廵檢駐軍延安寨其西路亦委王信張建侯狄青黄世寧在保安軍每日訓練及令西路廵檢劉政在德青寨張宗武在政縣密令分布兵馬候賊奔衝放令入界㑹合掩擊若數路竝入且併衆力禦敵或破得一處即便邀擊别路其環慶路已遣通判馬端往報總管司令一如鄜延路設備如此則可以乘勝而破賊也今須令正月内起兵則軍馬糧草動踰萬計入山川險阻之地塞外雨雪暴露僵仆使賊乘之所傷必衆况鄜延路已有㑹合次第不患賊先至也賊界春暖則馬痩人飢其勢則易制及可擾其耕種之務縱出師無大獲亦不至有他虞自劉平陷没之後脩城壘運兵甲積糧草移士馬大爲攻守全勝之䇿非爲小利而動如重兵輕舉萬一有失將何繼之則必闗朝廷安危之憂非止邊患之謂也苟自今賊至不擊是臣之罪也兵法曰戰道必勝主曰無戰必戰可也戰道不勝主曰必戰不戰可也臣昨於九月未至鄜延路便遣葛懷敏朱觀入界掩襲族帳蓋與今来時月不同非前勇而後怯今若承順朝㫖不能持重王師爲後大患雖加重責不足以謝天下苟俟春暖舉兵尤未爲失䇿且元昊稔惡以来欲自尊大必被奸人所誤謂國家太平日乆不知戰鬭之事又謂邊臣無備所向必破所以恣桀慢之心侵擾不已今邊鄙漸飭度其已失本望况已下敕招攜族帳首領臣亦遣人探問其情欲通朝廷柔逺之意使其不僭中國之號而脩時貢之禮亦可俯從今鄜延是舊日進貢之路蕃漢之人頗相接近願朝廷廣天地包荒之量存此一路令諸將勒兵嚴備賊至則擊但未行討伐容臣示以恩意嵗時之間或可招納如先行攻掠恐未能擒其聚落如白豹之功官軍既退戎類復居狼心重報増其怨毒邊患愈滋無時敢暇若天兵屢動不立大功必爲夷狄所輕臣又近召張亢到延州熟議亦稱願與戎人相見於界上臣所以乞存此一路者一則懼春初盛寒士氣愈怯二則恐隔絶情意偃兵未期若施臣之鄙計恐是平定之一端苟嵗月無效遂舉重兵取綏宥二州擇其要害而舉之屯田營田作持乆之計如此則横山一帯蕃漢人戸去昊賊相逺懼漢兵威迫可以招降或即奔竄則是去西賊之一臂拓疆制寇無輕舉之失也乞先脩諸寨未宜進討慶厯元年二月臣近准陜西都招討使夏竦牒連到朝廷指揮所有行軍所須令三司與韓琦等商量疾速擘畫應副者臣今據鄜延路部管葛懐敏等申所要軍須糧草共四状繳連進呈臣相度前項軍須糧草萬數不少必是一兩月辦集未得如令辦搬運上項隨軍輜重糧草又須用廂軍二三萬人必慮諸處廂軍數少起發不得或使駱駝騾子一二萬頭即山路險隘與兵馬三二百里轉難主管若多差人夫即恐有雨雪之變﨑嶇暴露稍有驚危便多逃散抛棄糧草為賊之資臣竊見延州廢却承平南安長寧安遠塞門栲栳六寨之後自延州去賊界三程斥堠漸遠賊馬動息卒不可知又退却疆界賊轉深入又况延州東路廢却諸寨歸明弓箭手盡皆流移著業未得又諸寨側近蕃部亦多驚起在近裏與漢户雜居今春未有土田耕種若不修復舊寨其蕃部既無活路恐糾率打劫近邉人户走入横山賊界則其患不細臣又聞得横山蕃部散入岩谷多設堡塞控扼險處入界之時兵少則難近多則難行假使主將智勇能奪其險彼則逺遁我無所獲須過横山後方到平沙却無族帳可取其討伐之計須是將帥出奇兵從天落則有非常之功似今重累而行實憂不利臣雖密奏朝廷留此一路未速討伐以示招来之意其邊界舊塞不可不謀乞作聖意指揮遣近上使命急至鄜延路令與臣催促諸將於二月半後出兵萬餘人於廢寨中㨂有利處先次脩復未須大段軍須只以隨軍運糧兵夫因便興工候著次序選驍㨗將兵以守之既逼近蕃界彼或㸃集人馬朝夕便知大至則閉壘以待隙小至則扼險以制勝彼或放散人馬亦朝夕便知我則運致糧草以實其備彼若歸順我已先復舊疆彼未歸順我已壓於賊境横山一帯在我目中强者可襲弱者思附此亦禦邊之一事然脩復諸寨亦動軍民煩費不少比之入界勞敝則有經乆之利而無倉卒之患且安存得東路熟户蕃部幷歸明弓箭手乞聖慈裁酌公繼此又言臣所以不敢更執前議乞擇廢寨中有利者先次脩復一則安存得上項熟户弓箭手各著農畞無畔離之患二則遮障漢户且爲籬落三則耕作地廣糧草易爲四則城寨逼近蕃界之後賊爲聚散朝夕便知易爲設備五則將来委諸將在彼就近爲謀大至則守小至則擊有間則攻使居不得安耕不得時然後可以降集可使逃遁此固撓賊之一䇿庶幾畏懼早思欵伏前後凡六奏事城承平等十二寨蕃漢之民相踵復集冄議攻守疏先是慶厯元年十一月公知慶州上攻守二䇿詔答曰將帥累次挫衂未甚勇果若幸於獲勝恐未爲良籌假令克獲又須守備若且勤訓練嚴加捍禦逺設探候制其奔衝見利而進觀釁而動庶可養鋭持乆即宜深體此意與隣路互相應援叶心畢力有便宜密具以聞至二年正月公再上此奏臣竊惟國家太平日久而一旦西戎背德陵犯邊鄙公卿大夫争進計䇿而未能副陛下憂邊之心且議攻者謂守則示弱議守者謂攻必速禍是二議卒不能合也臣前至延安所謂復諸寨爲守禦之備次則幸其休兵輒遣一介示招納之意朝廷以羣言之異未垂采納今臣領慶州日夜思之乃知攻有利害守有安危何則蓋攻其逺者則害必至攻其近者則利必隨守以土兵則安守以東兵則危臣謂攻逺而害者如諸路深入則將無素謀士無素勇或風沙失道或雨雪彌旬進則困大河絶漠之限退則有乘危扼險之憂臣謂攻近而利者在延安慶陽之間有金湯白豹之阻本皆漢寨陷爲賊境隔延慶兵馬之援爲蕃漢交易之市姦商往来物貨叢聚此誠要害之地如别路入寇數百里外應接不及則當逺爲牽制金湯白豹等寨可乘虗取之因險設陣布車横塹不與馳突擇其要地作爲城壘則我無不利之虞至於合水華池鳳州一作鳳川平戎柔逺德靖一作靜六寨兵甲糧斛可就屯泊固非守備之煩也環州定邊寨鎭戎軍乾興寨相望八十餘里二寨之間有胡蘆泉今屬賊泉爲義渠朝那二郡之交其南有明珠滅臧之族若進兵據胡蘆泉爲軍壁北斷賊路則二族自安宜無異志又朝那之西秦亭之東有水洛城一作永洛亦爲之限今䇿應之兵由儀隴二州十驛始至如進脩水洛斷賊入秦亭之路其利甚大非徒通四路之勢因以張三軍之威也臣謂守以土兵則安者以其習山川道路之利懐父母妻子之戀無乆戍之苦無數易之弊臣謂守以東兵則危者蓋費厚則困於財戍乆則聚其怨財困則難用怨聚則難保民力日窮士心日離他變之生出於不測臣所謂攻宜取其近而兵勢不危守冝圖其久而民力不匱招納之䇿可行於其間今奉詔冝令嚴加捍禦觀釁而動與隣道協心而共圖之又覩赦文謂彼無驕動則我不侵掠臣恐賊寇一隅逺在數百里外應援不及須爲牽制之䇿以沮賊氣至時諸路重兵豈能安坐如無素定之畫又無行營之備恐當牽制之時茫然無措雖見利而莫敢進觀釁而莫敢動寇至愈盛邊患愈深叛亡之人日助賊算不可不大爲之謀也願朝廷於守䇿之外更備攻術彼寇其西我圖其東彼寇其東我圖其西寧有備而不行豈當行而無備也所謂備者必先得密㫖許抽將帥便冝從事并先降空名宣勅之類恐可行之日奏請不及臣前曽遣人入界通往来之問或更有人至不可不答如朝廷先降密㫖令往復議論嵗年之間當有成事若謂邊將之恥未雪而不欲俯就臣恐諸路更有不支其恥益大賊或潛結諸蕃并勢合謀則禦之必難且兵馬精勁西戎之所長也金帛豐富中國之所有也禮義不可化干戈不可取則當任其所有勝其所長此霸王之道也臣前知越州每嵗納税絹十二萬和買絹二十萬一郡之入凡三十萬儻以啖戎是費一郡之入而息天下之敝也答詔諭以文彥博涇原對徙慶厯二年時文彥博經畧涇原帝以涇原傷夷欲對徙公遣王懐德諭之公上此奏帝采用其言涇原地重第恐臣不足當此路與韓琦同經畧涇原竝駐涇州琦兼秦鳳臣兼環慶涇原有警臣與韓琦合秦鳳環慶之兵掎角而進若秦鳳環慶有警亦可率涇原之師爲援臣當與琦練兵選將漸復横山以斷賊臂不數年間可期平定矣願詔龎籍兼領環慶以成首尾之勢秦州委文彥博慶州用滕宗諒總之孫沔亦可辦集渭州一武臣足矣論元昊請和不可許者三大可防者三慶厯三年正月元昊遣僞六宅使伊州刺史賀從勉來納欵持書至保安軍知延州龎籍令保安軍簽書判官公事邵良佐視其書元昊自稱號邦尼定國烏珠曩霄上書父大宋皇帝從勉又言契丹使人至本國稱南朝遣梁適侍郎来言南北修好已如舊而西界未寕知此界與彼爲婚姻請喻令早議通和故本國遣從勉上書縁夲國自有國號無奉表體式其稱烏珠蓋如古單于可汗之類從勉亦請詣闕籍具以聞二月始許從勉赴闕公等上此疏時爲陜西西路安撫使臣等久分戎寄未議䇿勲上玷朝廷俯慙鄙懐心究利害目擊勝負三年於兹備詳本末今元昊遣人赴闕將議納和其来人已稱六宅使伊州刺史觀其命官之意欲與朝廷抗禮臣恐不改僭號意朝廷開許爲鼎峙之國又慮尚懐隂謀卑辭厚禮請稱烏珠以緩國家之計臣等敢不爲朝廷思經久之䇿防生靈之患哉臣等謂繼遷當時用計脱身竊弄凶噐德明外示納欵内實養謀至元昊則悖慢侮常大爲邊患以累世奸雄之志而屢戰屢勝未有挫屈何故乞和雖朝廷示納欵之意契丹邀通好之功以臣等料之實因累年用兵蕃界勞擾交鋒之下傷折亦多所獲噐械鞍馬皆歸元昊其下胥怨無所厚獲其横山蕃部㸃集最苦但漢兵未勝戎人重土不敢背賊勉爲驅馳爾今元昊知衆之疲聞下之怨乃求息肩養鋭以逞兇志非心服中國而来也臣等謂元昊如大言過望爲不改僭號之請則有不可許者三如卑辭厚禮從烏珠之稱亦有大可防者三何謂不可許者三自古四夷在荒服之外聖帝明王恤其邊患柔而格之不吝賜與未有假天王之號者也何則與之金帛可節儉而補也鴻名大號天下之神噐豈私假於人哉惟石晉藉契丹援立之功又中國逼小纔數十州偷生一時無卜世卜年之意故薦號於彼壊中國大法而終不能厭其心遂爲呑噬遽成亡國一代君臣為千古之罪人自契丹稱帝滅晉之後參用漢之禮樂故事勢强盛常有輕中國之心我國家富有四海非石晉逼小偷生之時元昊世受朝廷爵命非有契丹開晉之功此不可許者一也又諸處公家文字并軍民語言皆呼昊賊人知逆順去就之分尚或逋亡莫由禁止今元昊於天都山營造所居巳逼漢界如更許以大號此後公家文字幷軍民語言當有西帝西朝之稱天都山必有建都郊祀之僭其陜西戎兵邊人負過必逃其地蓋有歸矣至於四方豪士稍不得志則攘臂而去無有逆順去就之分彼多得漢人則禮樂事勢與契丹竝立夾困中國豈復有太平之望耶此不可許者二也又議者皆謂元昊胡人也無居中國之心欲自尊於諸蕃爾臣等謂拓拔珪石勒劉聰苻堅赫連勃勃之徒皆胡人也竝居中原近則李克用父子沙陁人也進據太原後都西洛皆漢人進謀誘而致之昨定川事後元昊有僞詔諭鎭戎兵民有定關輔之言此其騐蓋漢家之叛人不樂處夷狄中心謀侵據漢地所得城壘必使漢人守之如契丹得山後諸州皆令漢人為之官守或朝廷假元昊僭號是將啟之斯爲叛人之助甚矣此不可許者三也何為大可防者三元昊以累世奸雄之資一旦僭逆初遣人至猶稱臣奉表及劉平之陷賊氣乃驕再遣賀九言至上書朝廷便不稱臣其辭頓慢而復屢勝當有大言過望乃人情之常也若卑辭厚禮便肯從烏珠之稱皆隂謀也是果以山界之困暫求息肩使中國解兵三四年間將帥懈慢士卒驕惰邊備不嚴戎政漸弛却如前暴發則中國不能支梧此大可防者一也又從德明納欵之後經謀不息西擊土蕃回鶻拓疆數千里至元昊事勢稍盛乃稱尊悖禮背負朝廷結連北人情跡盡見大為邊患偶未深入今復起詐端以欵我兵而休息其衆又欲倂力專志倂吞烏勒斯賚等諸蕃去秦州一帯籬落為將来再舉之利縁元昊初叛之時親攻延州是本有侵陷郡國之志今復强盛豈便息心且朝廷四十年恩信所被一朝反側豈有發既畔之謀蓄未挫之鋭而能久守盟信者乎此大可防者二也又從德明納欵後來使蕃漢之人入京師賈販憧憧道路百貨所歸獲中國之利充乎窟穴賊因其事力乃興兵為亂今兹五年用度必困乃卑辭厚禮迎合我意欲復圖中國之利待其給用既畢却求釁興兵以快本意狼子野心固難馴伏今若通和或再許靈夏蕃漢之人依前出入京師深為不便緣自前往来叛状未彰情無蠧害今既爲强敵之虜稔禍未已必窺伺國家及夾帯亡命入蕃或與姦人别有結連或使刺客竊發驚擾朝廷又此類必所在恣縱甚於昔時有事何以處置此大可防者三也臣等乞朝廷俟元昊所遣人至觀其所請彼如大言過望堅求僭稱則乞朝廷答云上畏天地宗廟不可私許大號壊中國之法彼卑辭厚禮止是求烏珠之稱則按唐單于可汗故事有許之之理亦預防其陰謀嚴飭邊臣脩葺城寨訓練軍馬儲蓄糧草以備虚詐俟一二年間見其表裏及邊備牢固方可那減戍兵於近裏屯泊緣西戎自古翻覆朝廷不可休兵以啟不虞之變如求割熟戸則乞答云靈夏甚有漢戸能割歸朝廷否况横山蕃部安於内附一旦驅之則驚擾生事必不爲西界之用彼如求至京師依前来出入賈販則乞答云昨来戰鬭之後甚有軍民沒陣其子孫骨肉銜怨至深必恐道塗之中多有讐殺致西界相疑更却生事只於邊上建置𣙜場交易有無各得其所彼如邀我自今而後罷脩城寨則乞答云邊界熟户生有讎怨常相侵害須藉城寨駐兵方能鎭静使各安居爾若自餘更有非禮之求朝廷或難應副即且拒之不必從也但厚遣来人善詞回答使遷延往来即逾四月賊不能舉矣至秋則無足畏也何以言之臣等觀朝廷信賞必罰今已明白帥臣奉詔得以便冝又舊將漸升前弊稍除將責實效約束將佐不令輕出訓練軍馬率多變法但今極邊城寨或未堅全新集之兵未可大戰若賊今春便来以臣等計之尚可憂慮然大軍持重奇兵襲擊宜無定川之負也如候秋而来則城寨多固軍馬已練或堅壁而守或據險而戰無足畏矣臣等已議一二年間訓兵三四萬使號令齊一陣伍精熟又能使熟户蕃兵與正軍参用則横山一帯族帳可以圖之降我者使之納質厚其官賞各令安居籍爲熟戸拒我者以精兵加之不從則戰我軍鼓行山界不爲朝去暮還之計元昊聞之若舉國而来則我退守邊寨足以困彼之衆若遣偏師而来我則據險以待之蕃兵無糧不能久聚退散之後我兵復進使彼復集毎嵗三五出元昊諸廂之兵多在河外頻來應敵疲於奔命則山界蕃部勢窮援弱且近於我自求内附内選酋豪以鎭之足以斷元昊之手足矣然乞朝廷以平定大計爲意當軍行之時不以小勝小衂黜陟將帥則三五年間可集大功仍詔中國臣寮不得諱言邊事以沮永圖我太祖太宗統闢四海創萬世之基業今以三五年之勞再定西陲豈為晚耶契丹聞國家深長之謀必懼而保盟不復輕動然後中國有太平之期矣臣等所以言彼賊非禮之求不必從者蓋有此議也或曰今王師不利者數四而未思戢兵何也臣等謂不然國家太平日久將不知兵兵不習戰以致不利非中國事力不敵四夷非今之軍士不逮古昔蓋太平忘戰之弊爾今邊臣中有心力之人鑒其覆轍各思更張將有勝賊之計昔漢楚之戰不以多負罷兵而終有天下安禄山之亂所向無前郭子儀日夜謀慮王師復振而終滅大盜今國家以天下全盛之勢豈有偶勝偶負而自謂中國不可振而夷狄不可禦耶斯惑之甚矣或曰兵不可久久則民困而財匱臣等謂不然爭勝逐利之師則有巧遲拙速之異如其外禦四夷則自古未甞廢兵是以山海之利皆歸邊用抑為此也况即日邊上城壘經今春脩葺漸以險固兵民力役自當減罷又毎嵗春夏之交軍馬甚可抽退於數百里間就食芻糧亦足省入中之費減饋運之勞庶乎民不困而財不匱非如西事之初人人畏懼未測虜情所屯軍馬不敢少退臣等更思興利減費之算以為之助臣等早䝉聖奨擢貳清班西事以來供國麄使三年塞下日勞月憂豈不願聞納和少圖休息非樂職矢石之間蓋見西賊强梗未衰挾以變詐若朝廷處置失冝它時悖亂為中原大禍豈止今日邊患哉臣等是以不敢念身世之安忘國家之憂須罄芻蕘少期補助其元昊來人到闕伏望聖慈於納和禦侮之間審其處置為聖朝長乆之慮天下幸甚論轉運得人許自擇知州慶厯三年二月公時参知政事臣竊見古者内置公卿士大夫助天子司察天下之政外置岳牧方伯刺史觀察使採訪使統領諸侯守宰以分理之内外皆得人未有不大治者也今轉運按察使古之岳牧方伯刺史觀察採訪使之職也知州知縣古之諸侯守宰之任也内官雖多然與陛下共理天下者惟守宰最要耳比年以来不知選擇非才貪濁老懦者一切以例除之以一縣觀一州一州觀一路一路觀天下則率皆如此其間縱有良吏百無一二是使天下賦税不得均獄訟不得平水旱不得救盜賊不得除民既無所告訴必生愁怨而不思叛者未之有也民既怨叛姦雄起而収攬之則天下必將危矣今民方怨而未甚叛去宜急救之救之之術莫若守宰得人欲守宰得人請詔二府通選轉運使如不足許權擢知州人既得人即委逐路自擇知州不任事者奏罷之仍令權擢幕職官如是行之必舉皆得人凡權入者必俟政績有聞一二年方眞授之雖以精擇尚慮有不稱職者必有降黜直俟人稱職而後已仍令久其官守勿復數易其有異政者宜就與升擢之若然官脩政舉則天下自無事矣朝廷惟總其大綱而振舉之可也奏乞出内帑物帛收贖陷蕃漢戸劄子慶厯三年公為參知政事臣聞淳化中太宗皇帝以邊戸饑荒多賣人口入蕃頗憫惻之特遣使以物貨收贖各還父母此人君之盛德也近年緣邊漢戸被西戎虜不少今既通人使乞出聖意以内帑物帛委邊臣漸次收贖陷蕃漢戶人口各還其家使父母子孫冄得完聚則不惟邊上生民恩淪骨髓必也至德動天降祐王室書之史冊光於後代乞不降出序續家譜序吾祖唐相履冰之後舊有家譜咸通十一年庚寅一枝渡江為處州麗水縣丞諱隋中原亂離不克歸子孫為中呉人皇宋太平興國三年曽孫堅坰墉塤埴昌言六人從錢氏歸朝仕宦四方終於他邦子孫流離遺失前譜至仲淹蒙竊國恩皇祐中來守錢塘遂過姑蘇與親族㑹追思祖宗既失前譜未獲復懼後来昭穆不明乃於族中索所藏誥書家集攷之自麗水府君而下四代祖考及今子孫支泒盡在乃創義田計族人口數而月給之又理祖第使復其居以永依庇故作續家譜而次序之皇祐二年正月人日資政殿學士金紫光禄大夫行尚書户部侍郎知青州軍事兼管内勸農事充青州淄濰登萊沂密徐州淮陽軍安撫使䕶軍仲淹述尺牘蔡欽聖殿丞皇祐元年三月十一日今日相國筵㑹不暇子細保愛保愛或有書入京逓中即易逹也蘇才翁轉運皇祐三年十一月示諭冩黄素爲乾卦字多眼力不逮且冩伯夷頌上呈此中寒甚前靣筆凍欲重寫又恐因循書札亦要切磋未是處無惜見教書伯夷頌後詩餘憶王孫秋思颼颼風冷荻花秋明月斜侵獨倚樓十二珠簾不上鈎黯凝眸一㸃漁燈古渡頭蘇幙遮懐舊碧雲天黄葉地秋色連波波上寒烟翠山映斜陽天接水芳草無情更在斜陽外黯鄉魂追旅思夜夜除非好夢留人睡明月樓髙休獨倚酒入愁腸化作相思淚漁家傲秋思塞下秋来風景異衡陽雁去無留意四靣邊聲連角起千嶂裏長烟落日孤城閉濁酒一杯家萬里燕然未勒歸無計羌管悠悠霜滿地人不寐將軍白髪征夫淚御街行秋日懐舊紛紛墜葉飄香砌夜寂静寒聲碎眞珠簾捲玉樓空天淡銀河垂地年年今夜月華如練長是人千里愁腸已斷無由醉酒未到先成淚殘燈明滅枕頭攲諳盡孤眠滋味都来此事眉間心上無計相逥避范文正集補編巻一欽定四庫全書范文正集補編巻二制詞除參知政事勅勅曰詩云樂只君子邦家之基言人君樂得賢者兹為邦家之本肆朕夙夜疇咨峻德共圖大政以綏四方具官范仲淹挺然卿材居為國噐敷爾謨猷可以光贊大業惟厥職守可以裁成萬務入更要近出領藩垣蹇蹇匪躬彰彰有跡向以戎人失馭疆堠多虞得於僉諧付之帥節輯和卒乘懋著恩威登爾樞廷屬之機柄佇矢陳於逺畧期允迪於大猷副予倚毗無俟煩訓端聽徽命往惟欽哉復除參知政事知諫院勅勅曰帝舜嘗命禹曰隣哉臣哉臣哉隣哉蓋歎君臣道合相須而濟今夫與我守祖宗之業成天下之務者大柄所付不在貳府兹其用命惟厥艱哉具官范仲淹道匪一方材周諸用近雅不流合清廟之琴瑟任重無撓中明堂之柱石景祐初載子始親政懼明敏之不至求畯良而自助得爾疎逺之地非由左右之先擢置諫垣彌縫衮職庶政得失皆我家事凡爾感憤豈躬之故風雨如晦不爽先晨之期雪霜既零益見後凋之節比戎羌不若疆堠為虞斧鉞在前罔知攸付思集吾事無易汝者三年鄙上一心勞止卒乘輯睦物械繕完居不暇於雅歌退不寧於蓐寢雖閫外之事賴其臨䕶而幄中之要先乎密勿故馳召傳舍命登樞廷兹屬宰司則有虚位俾爾旬浹踐歴兩地夫大恩之下難於報大名之下難為處矧兼此二者可無勉哉爾尚朝夕以交修予允迪前人勤教邦其允孚於休無俾多方議爾於始終之際也慶厯三年八月日下拜資政殿學士知邠州兼陜西四路沿邊安撫使勅勅曰夏寇之為邊患七年於兹矣朕為生靈之思庶幾堯舜湯文之事懐之以德綏之斯和乃眷疆陲方兹安輯當得重任以稱此行具官范仲淹早富藝文素著名節敭歴通顯周旋委遇比當閫寄實立事功召還本朝更踐柄府兹昆戎之初附顧西土之粗安深練機冝揣無爾比惟是新平之路居當四路之衝為吾撫綏抑爾誠請増華秘殿以寵於藩祗服恩榮無易忠義慶厯五年正月日下贈太師楚國公衛國太夫人誥誥曰昔我皇祖仁宗博求多士以綏靖四方天惟眷佑賚之正人既已克和羌戎又以爕治區夏出入中外實兼文武之烈今予嗣守丕業選任大吏亦拔西帥以臨中樞匪伊異人惟父惟子得人之盛朕無愧焉具官范純仁父范仲淹秉德不貳好謀而成始任諫諍知無不言中為將帥靖而能勇卒以功業股肱先聖兹予懐想風烈用建爾仲子嘉其緇衣之德錫以召祖之命惟師保之貴既無以加故河漳之封益大其寵可特贈太師追封楚國公誥曰士大夫義隆於顯親恩深於念母追劬勞之罔極悼寵禄之無施兹予毖祀於總章大霈龎恩於海宇思廣吾孝以慰爾心具官范純仁母李氏山河之容江海其行其君子正直有羔羊之德其後世信厚有麟趾之風宜錫褒榮以慰存殁乃祖唐相實啟衛國之封眷我樞臣願為密章之贈賁於幽壤尚克嘉之元祐元年三月日下追封魏國公誥誥曰庇民尊主繄賢哲之逺猷崇德報功實帝王之先務昭掲羣倫之丕範逺旌希世之偉人爰錫恤章式孚衆聽故具官范仲淹清明而直諒博大而剛方早以名世之才出贊寖昌之運危言警世髙義薄乎天地直道立朝勁氣貫乎金石入議大政有功斯人需膏澤之下民繄嘉猷之告后山有伏猛則藜藿至於不採朝知强本則精神為之折衝當夏賊之跳梁總師干而捍禦料敵制勝智機若神弭變消萌酋渠褫魄聲名暴於夷貊功烈著於鼎彝故斂衽朝堂奮庸乎帝載運籌帷幄震張乎天威文武惟憲萬邦風采想見天下泰山北斗學者仰其髙明景星鳳凰人皆快於瞻覩當規皇基億載之業首建金城萬雉之謀功成於元豐效見於今日屬纂臨於初政彌難想於宏模思有褒揚聳兹遐邇命圭華衮已位上公之槐胙土分茅載賜全魏之履豈特賞當賢而臣下勸庶幾褒有徳而萬方懐英爽如存寵靈斯享可特追封魏國公靖康元年月日下朝廷優崇給賜祠堂扁額康熈四十四年四月十六日御書濟時良相賜前宋推誠保徳功臣資政殿學士金紫光禄大夫尚書户部侍郎護軍汝南郡開國公食邑二千三百户食實封六百户累贈兵部尚書太師中書令兼尚書令歴追封楚國魏國公諡文正臣范仲淹御書亭記康熈四十有四年乙酉仲春天子南廵閲河臨幸江浙翠華所至問俗省方樂育賢材嘉恵臣民優恤淹滯布徳施仁㒺弗周至萬姓歡恱四月十二日乙亥自杭回蘇駐蹕於時淑景清和湖山明麗萬幾休暇鄉農野老羣懐望幸之思皇上軫念麥隴方秋恐車駕所歴有妨東作惟静息行宫從容翰墨之樂聖學淵深􅆳揚莫及龍章揮灑恩賚有差而尤加意前賢表章往哲十五日戊寅賜呉泰伯祠言子祠二扁額次蒙天語垂詢有翰林臣查昇臣蔣廷錫鴻臚寺卿臣宋駿業等以宋先臣仲淹文正祠對上俞允翼日已夘親書濟時良相四大字與錢唐朱子祠晉陵東坡書院各祠扁六軸命南書房翰林臣查昇臣陳壮履臣勵廷儀臣張廷玉臣錢名世臣蔣廷錫捧出首宣賜先臣祠傳諭云皇上崇重先代名臣特賜扁額御書墨本當給與嫡𣲖長房子孫藏守如後裔不在蘇州者交與地方官有江寧廵撫臣宋犖啟奏范氏本家相傳設有義莊主奉係長房嫡裔范濬臣所素識隨捧授臣祗受臣率同宗族行在户部侍郎臣承烈原任東平州知州臣溥吳縣學訓導臣旦勳監生臣濓臣興禾等跪接恩㫖恭開瞻仰四字褒揚八法古勁書盈二尺大踰他幅衆目聳觀無不驚羡以為臣家榮遇臣跪承之下感恩無地謹附奏云臣祖祠建在鄉邦數百年來未邀玉音旌顯臣父必英係丁酉科舉人已未召試博學鴻詞欽授翰林院檢討忝列侍從恭覩御書精妙以微員供職未久不敢請給欲求扁對以為祖祠光榮因向無此例亦不敢瀆奏有志未伸今䝉煥發奎章輝􅀈祠宇眞亘古未有之曠典臣家子孫散處四方者甚多皇上追奨先臣正所以勉勵後嗣臣一介儒生需次選人之末於國家未有尺寸報効乃荷聖慈賜臣祖祠扁額頃分頒諸臣御書臣濬臣溥俱得與賜一日之間叠膺榮寵雖捐糜頂踵何以仰答隆恩此不獨臣一家感戴凡厥臣庶觀瞻者仰見我皇上推恩及數百年前之臣子念其成績錫以芳名自莫不踊躍奮興砥礪臣節敎忠敎孝聖德之生成無量所有賜給墨寳除一靣臨榜祠楣臣原有先世誥勅手澤及前人題跋相傳法守謹當装潢珍藏昭示子孫永沐皇仁於萬世侍郎臣承烈奏云臣瀋陽分支系同出先臣之後上叨遺䕃一家父子兄弟先後屢受國恩拔置大僚今臣隨駕至蘇得拜先臣祠下私心方為慶幸今奉欽賜先祠扁額臣適躬逢異數恩出非常喜溢望外敢不益矢恪恭勉圖報稱臣謹隨蘇屬子孫恭同接㫖理合奏謝奏畢翰林臣昇等隨引至宫門前入内一一代為傳奏出云爾等所奏皇上俱知道了當即謝恩而出臣等齎捧御扁至文正書院祖像前恭設香案拜告望闕叩謝訖伏念先臣自筮仕至執政四十年中歴知州郡恵澤幾半天下所在祠祀不啻百計吳中為父母之邦昭揭璇題未能遍及謹擬建立碑亭夀諸貞珉摹奉直省各祠俾處處子孫咸得恭瞻宸翰庻不負皇上優崇先臣之至意因出義田儲粟臣承勲臣承烈臣時崇臣溥臣旦勲等復捐金以助其役於是市材製榜丹黄金碧藻繪兼施擇吉懸掛蘇城文正書院天平山忠烈賜廟郡學祠支硎寺祠滸墅關書院等處别選石摹勒供寘亭中倂將頒賜臣濬臣溥御書列樹於壁天文璀璨榮光上燭於先祠睿藻繽紛鳳彩分輝於下士臣不揣荒陋援筆恭紀以彰聖世之殊恩小臣之竒遇臣不勝感激悚惶之至傳宋太師中書令兼尚書令魏國公文正公傳公諱仲淹字希文唐宰相履氷十世孫其先邠州人也濬按唐宰相懐州河内人麗水丞幽州人今云邠州人當是麗水丞之先世復遷居於此髙祖隋唐懿宗時調官處州麗水縣丞因徙家江南遂世爲蘇州呉縣人曽祖夢齡祖贊時父墉俱仕呉越後父隨錢俶歸宋終徐州節度掌書記後以公及諸孫貴皆贈太師以徐唐周三大國追封三代祖考父爲周國第三子太宗端拱二年已丑生於徐州官舍二嵗而孤母謝夫人貧無依更適池州長山朱氏濬按周國公卒時時中舍最長方六嵗次鎡亦不過四五齡考宋官制掌書記秩列三班之末周國從錢氏歸朝十餘年間自冀而蜀而徐匍匐以就微禄一旦捐館去鄉千里三稚幼弱此太夫人所以貧而無依也厥後中舍二兄歸呉而文正未離襁褓遂隨育於朱氏從其姓名説既長知其世家感泣辭母去之應天府今河南歸德府依戚同文學晝夜不息冬月憊甚以水沃靣食不給以糜粥繼之人不能堪公不苦也眞宗大中祥符五年禮部舉第一八年登蔡齊榜進士第為廣德軍司李參軍迎其母歸養改集慶軍節度推官始還姓更今名監泰州西溪鹽税仁宗天聖元年徙監楚州糧料院遷大理寺丞以母喪去官晏殊知應天府聞公名召寘府學上書請擇郡守舉縣令斥游惰去冗僭愼選舉撫將帥凡萬餘言服除以殊薦為秘閣校理公汎通六經長於易學者多從質問爲執經講解亡所倦嘗推其俸以食四方遊士諸子至易衣而出公宴如也毎感激論天下事奮不顧身一時士大夫矯厲尚風節自公倡之天聖七年章獻太后將以冬至受朝天子率百官上壽公極言之且曰奉親於内自有家人禮顧與百官同列北面而朝之不可為後世法且上疏請太后還政不報尋通判河中府徙陳州時方建太一宫及洪福院市材木陜西公言昭應壽寧天戒不逺今又侈土木破民產非所以順人心合天意也宜罷脩寺觀減常嵗市木之數以蠲除積負又言恩倖多以内降除官非太平之政事雖不行仁宗以為忠太后崩召為右司諫言事者多暴太后時事公曰太后受遺先帝調䕶陛下者十餘年冝掩其小過以全后徳帝爲詔中外母輒論太后時事初太后遺誥以太妃楊氏爲皇太后参决軍國事公曰太后母號也自古無因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無母后之助矣嵗大蝗旱江淮京東滋甚公請遣使循行未報乃請間曰宫掖中半日不食當何如帝惻然乃命公安撫江淮所至開倉賑之且禁民淫祀奏蠲廬舒折役茶江東丁口鹽錢且條上救弊十亊㑹郭皇后廢率諫官御史伏閣爭之不能得明日將留百官揖宰相廷爭方至待漏院有詔出知睦州嵗餘徙蘇州首興學校延安定胡瑗爲之師州大水民田不得耕公疏五河導太湖注之海募人興作未就尋徙明州轉運使奏留公以畢其役許之拜尚書禮部員外郎天章閣待制召還判國子監遷吏部員外郎權知開封府時吕夷簡執政進用者多出其門公上百官圖指其次第曰如此爲序遷如此爲不次如此則公如此則私况進退近臣凡超格者不冝全委之宰相夷簡不恱他日論建都之事公曰洛陽險固而汴爲四戰之地太平冝居汴即有事必居洛陽當漸廣儲蓄繕宫室帝問夷簡夷簡曰此仲淹迂濶之論也公乃爲四論以獻大抵譏切時政且曰漢成帝信張禹不疑舅家故有新莽之禍臣恐今日亦有張禹壊陛下家法夷簡怒訴曰仲淹離間陛下君臣所引用皆朋黨也公對益切由是罷知饒州殿中侍御史韓瀆希宰相㫖請書仲淹朋黨揭之朝堂於是秘書丞余靖上言曰仲淹以一言忤宰相遽加貶竄况前所言者在陛下母子夫婦之間乎陛下既優容之矣臣請追改前命太子中允尹洙自訟與仲淹師友且嘗薦已願從降黜館閣校勘歐陽脩以髙若訥在諫官坐視而不言移書責之由是三人者偕坐貶明年夷簡亦罷自是朋黨之論興矣公既去士大夫爲論薦者不已仁宗謂宰相張士遜曰向貶仲淹爲其密請立皇太弟故也今朋黨稱薦如此奈何再下詔戒敕公在饒州嵗餘徙潤州又徙越州元昊反召爲天章閣待制知永興軍改陜西都轉運使㑹夏竦爲陜西經畧安撫招討使進公龍圖閣直學士以副之夷簡冄入相帝諭公使釋前憾公頓首謝曰臣鄉論蓋國家事與夷簡無憾也延州諸砦多失守公自請行遷戸部郎中兼知延州先是詔分邊兵總管領萬人鈐轄領五千人都監領三千人寇至禦之則官卑者先出公曰將不擇人以官爲先後取敗之道也於是大閲州兵得萬八千人分爲六各將三千人分部教之量賊衆寡使更出禦賊時塞門承平諸砦既廢种世衡䇿城青澗以據賊衝大興營田且聽民得互市以通有無又以民逺輸勞苦請建鄜城為軍以河中同華中下户税租就輸之春夏徙兵就食可省糴十之三他所减不與詔以為康定軍明年正月詔諸路入討公曰正月塞外大寒我師暴露不如俟春深入賊馬瘦人飢勢易制也况邊備漸脩師出有紀賊雖猖獗固巳懾其氣矣鄜延密邇靈夏西羌必由之地也第按兵不動以觀其釁許臣稍以恩信招来之不然情意阻絶臣恐偃兵無期矣若臣策不效當舉兵先取綏宥據要害屯兵營田爲持久計則茶山横山之民必挈族来歸矣拓疆禦寇䇿之上也帝皆用其議公又請脩承平永平等砦稍招還流亡定保障通斥堠城十二砦於是羌漢之民相踵歸業久之元昊歸陷將髙延德因與公約和公爲書戒諭之㑹任福敗於好水川元昊答書語不遜公對来使焚之大臣以爲不當輒通書又不當輒焚之宋庠請斬公帝不聽降本曹員外郎知耀州徙慶州遷左司郎中爲環慶路經畧安撫縁邊招討使初元昊反陰誘屬羌爲助而環慶酋長六百餘人約為鄉導公以其反覆不常也至部即奏行邊以詔書犒賞諸羌閲其人馬爲立條約若讎已和斷輒私報之及傷人者罰羊百馬二已殺者斬負債爭訟聽告官爲理輒質縛平人者罰羊五十馬一賊馬入界追集不赴隨本族毎戸罰羊二質其首領賊大入老幼入保本砦官爲給食即不入砦本家罰羊二全族不至質其首領諸羌皆受命自是始爲漢用矣改邠州觀察使公表言觀察使班待制下臣守邊數年羌人頗親愛臣呼臣爲龍圖老子今退而與王興朱觀為伍第恐爲賊輕矣辭不拜慶之西北馬鋪砦當後橋川口在賊腹中公欲城之度賊必爭密遣子純佑與蕃將趙明先據其地引兵隨之諸將不知所向行至柔逺始號令之版築皆具旬日而城成即大順城是也賊覺以騎三萬来戰佯北公戒勿追巳而果有伏大順既城而白豹金湯皆不敢犯環慶自此寇益少明珠滅臧勁兵數萬公聞涇原欲襲討之上言曰二族道險不可攻前日髙繼嵩巳喪師平時且懐反側今討之必與賊表裏南入原州西擾鎭戎東侵環州邊患未艾也若北取細腰胡蘆衆泉為保障以斷賊路則二族安而環州鎮戎徑道通徹可無憂矣其後遂築細腰胡蘆諸砦葛懐敏敗於定川賊大掠至潘原闗中震恐民多竄山谷間公率衆六千由邠涇援之聞賊已出塞乃還始定川事聞帝按圖謂左右曰若仲淹出援吾無憂矣奏至帝大喜曰吾固知仲淹可用也進樞密直學士右諫議大夫公以軍出無功辭不敢受命詔不聽時已命文彥博經畧涇原帝以涇原傷夷欲對徙公遣王懐德諭之公謝曰涇原地重第恐臣不足當此路與韓琦同經畧涇原並駐涇州琦兼秦鳳臣兼環慶涇原有警臣與韓琦合秦鳳環慶之兵掎角而進若秦鳳環慶有警亦可率涇原之師為援臣當與琦練兵選將漸復横山以斷賊臂不數年間可期平定矣願詔龎籍兼領環慶以成首尾之勢秦州委文彥博慶州用滕宗諒總之孫沔亦可辦集渭州一武臣足矣帝采用其言復置陜西路安撫經畧招討使以公與韓琦龎籍分領之公與琦開府涇州而徙彥博帥秦宗諒帥慶張亢帥渭公爲將號令明白愛撫士卒諸羌來者推心接之不疑故賊亦不敢輒犯其境元昊請和召拜樞密副使王舉正懦黙不任事諫官歐陽修等言仲淹有相才請罷舉正用仲淹遂改參知政事公曰執政可由諌官而得乎固辭不拜願與韓琦出行邊命為陜西宣撫使未行除參知政事㑹王倫寇淮南州縣官有不能守者朝廷欲按誅之公曰平時諱言武備寇至而專責守臣死事可乎守令皆得不誅帝方鋭意太平數問當世事公語人曰上用我至矣事有先後久安之弊非朝夕可革也帝冄賜手詔又爲之開天章閣召二府條對公皇恐退而上十事一曰明黜陟二府非有大功大善者不遷内外須在職滿三年在京百司非選舉而授須通滿五年乃得磨勘庶幾考績之法矣二曰抑僥倖罷少卿監以上乾元節恩澤正郎以下若監司邊任須在職滿三年始得蔭子大臣不得薦子弟任館閣職任子之法無冗濫矣三曰精貢舉進士諸科請罷糊名法參考履行無闕者以名聞進士先䇿論詩賦諸科取兼通經義者賜第以上皆取詔裁餘優等免選注官次第人守本科選進士之法可以循名而責實矣四曰擇長官委中書樞密院先選轉運使提㸃刑獄大藩知州次委兩制三司御史臺開封府官諸路監司舉知州通判知州通判舉知縣令限其人數以舉主多者從中書選除刺史縣令可以得人矣五曰均公田外官廩給不均何以求其為善耶請均其入第給之使有以自養然後可以責㢘節而不法者可誅廢矣六曰厚農桑每嵗預下諸路風吏民言農田利害堤堰渠塘州縣選官治之定勸課之法以興農利减漕運江南之圩田浙西之河塘隳廢者可興矣七曰修武備約府兵法募畿輔强壯為衛士以助正兵三時務農一時教戰省給贍之費畿輔有成法則諸道皆可舉行矣八曰推恩信赦令有所施行主司稽違者重寘於法别遣使按視其所當行者所在無廢格上恩者矣九曰重命令法度所以示信也行之未幾旋即釐改請政事之臣參議可以乆行者刪去煩冗裁為制勅行下命令不至於數變更矣十曰減徭役户口耗少而供億滋多省縣邑户少者為鎮併使州兩院為一職官白直給以州兵其不應受役者悉歸之農民無重困之憂矣天子方信嚮公悉采用之宜著令者皆以詔書畫一頒下獨府兵法衆以為不可而止又建言周制三公分兼六官之職漢以三公分部六卿唐以宰相分判六曹今中書古天官冢宰也樞密院古夏官司馬也四官散於羣有司無三公兼領之重而二府惟進擢差除循資級議賞罰檢用條例而已上非三公論道之任下無六卿佐王之職非治法也臣請倣前代以三司司農審官流内銓三班院國子監太常刑部審刑大理羣牧殿前馬步軍司各委輔臣兼判其事凡官吏黜陟刑罰重輕事有利害者竝從輔臣予奪其體大者二府僉議奏裁臣請自領兵賦之職如其無補請先黜降章得象等皆曰不可乆之乃命參知政事賈昌朝領農田公領刑法然卒不果行初公以忤吕夷簡放逐者數年士大夫持二人曲直交指為朋黨及陜西用兵天子以公士望所屬拔用之及夷簡罷召還倚以為治中外想望其功業而公以天下為己任裁削倖濫考覈官吏日夜謀慮興致太平然更張無漸規模濶大論者以為不可行及按察使出多所舉劾人心不恱自任子之恩薄磨勘之法密僥倖者不便於是謗毁稍行而朋黨之論浸聞上矣㑹邊陲有警因與樞密副使富弼請行邊於是以公為河東陜西宣撫使賜黄金百兩悉分遺邊將麟州新罹大寇言者多請棄之公為修故砦招還流亡三千餘户蠲其稅罷𣙜酤予民又奏免府州商稅河外遂安比去攻者益急公亦自請罷政事乃以為資政殿學士陜西四路宣撫使知邠州其在中書所施為亦稍稍沮罷以疾請鄧州進給事中徙荆南鄧人遮使者請留公亦願留鄧許之尋徙杭州冄遷户部侍郎徙知青州㑹病甚請潁州肩輿至徐州而薨年六十有四時皇祐四年壬辰五月二十日甲子也贈兵部尚書諡文正初公病帝嘗遣賜藥存問既卒嗟悼乆之又遣使就問其家既葬帝親書其碑曰褒賢之碑公内剛外和其於富貴貧賤毁譽歡戚一不動其心而慨然有志於天下嘗曰士當先天下之憂而憂後天下之樂而樂初仁宗以前天下州縣未嘗立學公自始筮仕以迄參大政其間歴守諸州郡所在必開設學校率先訓督教育多士首以吳郡所卜居之宅奏請立郡學至慶厯四年詔州縣皆立學從公請也康定用兵時鳳翔張載方年十八慨然以功名自許上書謁公公知其逺器乃抑之曰儒者自有名教可樂何事於兵因勸其讀中庸又授太山孫明復以春秋其後皆成名儒公之好明經術有功理學者如此性至孝以母在時方貧後雖貴非賔客不重肉妻子衣食僅能自充身歿之後諸子家貧無歸日借官屋以居僅蔽風雨而獨好施子置義荘里中以贍族人創立規法以垂永久汎愛樂善士多出其門雖里巷之人皆能道其名字卒之日四方聞者皆為歎息為西帥時所得朝廷賜賚悉以給將士故人樂為用又為政尚忠厚所至有恩諸蕃質子縱其出入無一人逃者蕃酋來見召之卧内徹衛與語邠慶二州之民與屬羌皆畫像立生祠事之及卒羌酋數百人哭之如父齋三日而去元祐中贈太師中書令兼尚書令追封楚國公靖康初復追封魏國公後賜廟號曰忠烈所著有文集二十巻奏議十七巻政府論事三巻别集五巻行於世四子純佑純仁純禮純粹别有傳史臣論曰自古一代帝王之興必有一代名世之臣宋有仲淹諸賢無愧乎此仲淹初在制中遺宰相書極論天下事他日為政盡行其言諸葛孔明草廬始見昭烈數語生平事業備見於是豪傑自知之審類如是乎攷其當朝雖不能久然先憂後樂之志海内固已信其有𢎞毅之噐足任斯責使究其所欲為豈讓古人哉范文正集補編巻二欽定四庫全書范文正集補編巻三題跋跋文正公手書伯夷頌墨蹟書從北海寄西豪開巻裁窺竦髮毛范墨韓文傳不朽首陽風節轉孤高戊申後三十有七日許昌郡齊中題平陽文彦博寛夫手書伯夷頌係皇祐三年庚寅十一月戊申日夷清韓頌古皆無更得高平小楷書舊相嘉篇題巻後蘇家能事復何如壬辰嵗正月才翁按察富弼題青州資政寄示小楷伯夷頌許昌相公以詩跋尾因作詩謝二公兼呈永興觀文相公舜元上法書遙逐使車還嘉句新從相府頒牢落二賢天地外孤竹之二賢風流三絶古今間台文競耀高逾麗化筆交揮老更閒不用悲吟恐飛去豈無神物護重關轉運度支得青州資政黄素書韓吏部伯夷頌許昌相公以詩跋尾遂為七言因而寄及謹用拙篇紀咏殊上首陽􅂷範逺吏部屬辭深染翰著嘉尚系言光徳音襃崇亘千禩精妙極雙金題詠益珍秘用昭賢彦心逺蒙運使度支以資政范公所寄黄素小字韓文公伯夷頌請許昌文公淮西富公題詩於後才翁復綴雅什兼寄長安晏公公亦有作衍久兹休退人事僅廢不意雅故未移悉以副本為貺俾愚繼之對此怔忪既感且愧輒爾率强課成拙句奉呈敢言亦驥之乘聊為續貂之比耳衍上希文健筆鈔韓文文為首陽山下人寧止一言旌義士欲教萬古勸忠臣頌聲益與英聲逺事跡還隨墨跡新當世宗工復題咏尤宜率土盡書紳壬辰嵗孟春月使車按部獲一觀焉執中題范希文好談古賢人節義老而彌篤書此頌時六十有三矣癸已嵗夏四月昌朝書此書皆謗毁艱難者讀之益以自信故退之希文尤慇懃耳治平二年五月六日襄題河東薛嗣昌亢宗觀丹楊邵亢獲觀熈寧庚戌二月庚寅記時領滎陽舟次泗上覽才翁家希文手筆伯夷頌輒書短篇於紙尾熈寧庚戌嵗初伏日潁川韓絳子華題高賢忠義古今同手筆遺篇法甚工寳軸傳家當不朽追懷餘思凜生風許昌題後及今二紀乃熈寧甲寅之嵗仲冬中澣之日念往懷賢不覺悢悢伊川逸老再題番陽劉定金陵陳祐甫同觀元豐四年三月廿八日辛酉季冬九日當世題潁昌韓縝玉汝屢嘗觀之元豐甲子嵗仲秋社日又從安國借看西府東㕔書今墨蹟佚元祐二年臈日靖恭楊傑京兆慎宗同觀今墨蹟佚皇祐三年侍行於青社時先公書此頌以寄京西轉運使蘇公今再見手澤不勝悲慕元祐三年六月七日嗣子守尚書右僕射兼中書侍郎純仁謹題林种賈公望獲觀戊寅冬十月廿九日記汾陽郭彭年建安陳昱同觀宣和壬寅夏六月二十有六日崇寧五年純粹得見先公先兄遺墨於潁昌伏讀久之涕落紙上七月八日謹題范文正高風表表文采云為天下後世之仰服蓋不獨其書也此巻皆元老真儒翰墨使人竦然欽賞政和四年正月六日濮陽李孝彦跋今墨蹟佚政和丙申孟秋二十八日趙子琥王孝迪同觀於高平三瑞堂清江李開晉陵胡唐老同觀髙賢邈已逺凜凜生氣存韓范不時有此心誰與論紹興甲寅八月望建康秦檜謹題伯夷古賢人昌黎追作頌文正小楷書尊仰世所共李侯吾故人收藏萬金重適来尹平江范氏暫陪從一日拜祠下歸諸子孫用三賢固自佳侯徳亦堪誦再拜書五賢心薌辦清供大徳已亥四月十五日曹南馬紹書於平江旅次舟中子卿右丞皇祐三年十有一月文正范公在青社用黄素小楷書韓子伯夷頌遺京西轉運使蘇公舜元蓋天下萬世大綱常大議論扶植天地不可一日以無者昔文王三分天下有其二以服事殷伯夷固知其將終身西伯故辟紂而歸之其心豈遂忘殷哉一旦武王之師載木主而以王號於其衆非文王意也兄弟奮然以身為天下萬世争綱常繼之以死其事誠卓絶然人乃或非之至孔子時猶有以為怨者而孔子獨曰求仁而得仁又何怨至唐時猶有以為偏而不通者而韓子獨曰伯夷者特立獨行窮天地亘萬世而不顧韓子之言上繼孔子而公乎天下萬世有功於綱常甚大時無韓子議論廢則綱常泯吾為此懼而幸獲睹范公之所書義士仁人壯顔毅色凜在心目間使頑者懦者一見且泚汗破膽知畏議論是范公亦與有功於綱常也公平生自許忠義前後縁論諫得罪至被以誣謗目以朋黨擯斥逺外而公信道之篤躓而愈奮老而愈厲伯夷頌固其中素所蓄積者嗚呼皇祐盛眀時公之書此猶義形於色設不幸處綱常之變當何如若公者真可畏而仰哉大興李侯戡丁丑嵗得此本於燕朅來守姑蘇偕濟南陳君祥汴梁焦君徳眀首詣公祠下訪問其子孫而以畀之尊賢尚義有如此公之孫邦瑞士貴敬受而藏不啻珙璧始其家嘗以摹本刻於義莊嵗寒堂至是乃得真跡於二百四十八年之後若有神物護持以待其子孫而後付殆匪偶然二君議勒石傳不朽輒具論顛末俾以刻晏元獻杜正獻文忠烈富文忠蔡忠恵諸賢與公忠義相期各有題賦而蘇公詞翰氣槩又公所重宜併刻於後若昌朝執中輩雖素有牴牾亦不以人廢焉抑予觀忠宣公兄弟有感手澤言泯意外志念深矣尤後人所當取節二君皆有典刑文學能亢其宗族黨所共推尚帥其族之人與其子弟謹守此寳圖繼前志用衍忠義之傳其永永無斁大徳四年二月初吉陵陽牟巘識長白山中名相出首陽山下若人賢古今如此能多少嵗月相望越二千遺墨來從新畫㦸故家復取舊青氊偉哉君子無窮澤留得餘芳奕世傳嘉興張伯淳敬題師道學士班固人表吾嘗疑第一武王二伯夷我謂伯夷可第一武未盡美宜二之退之第一唐文人希文第一宋輔臣韓為夷頌范為寫三絶誰歟什襲珍星奎運餘三百年皇祐慶厯諸鉅賢逮至渡江乾淳後珠題玉跋盈長編名士題跋不一范氏衮衮饒公侯丞相忠宣公純仁以下幽州栝州至蘇州范氏本幽州良鄉人遷栝蒼今江湘提學君澤居處州是文正始居姑蘇行軍元昊驚破膽義莊睦族春復秋子子孫孫居吳中族長主祭今八世孫邦瑞也指李後人今黄龔謂平江使君李公信之逸齋錦囊偶貯此三絶燕香夜寒吐長虹衮衣繡衣觀且誇衮衣謂右丞馬公性齋繡衣謂陳亷訪君祥完顔亷訪正卿故國喬木興咨嗟大尹不吝歸趙璧祠以少牢復其家提學翰林索我詩謂君澤自玉堂外補肯捐此寳真復竒授者良難受者易即此可刋遺愛碑大徳庚子春上丁之眀日紫陽方回萬里虚谷先生企清風兮薇山之陽寳芳帖兮薇露之香意人世不可以久留兮雷霆下而取將幸鄴侯之巾襲兮儼墨蹟之未亡把一麾而東來兮文正之鄉喬木蒼蒼兮蘭菲菲其彌芳嘉先正之有後兮偉徳澤之長出此帖而歸之兮甚魏笏之輝煌時不可兮再得勉世世兮珍藏天台柯謙山齋先生小楷青州三絶碑復還范氏事尤竒不知百世聞風者更有何人似伯夷古今一理是綱常范筆韓文妙發揚公餓首陽元不死春風嵗嵗蕨薇香錢塘仇逺再拜山村先生退之常作伯夷頌綱常更為文章重小范老子翰墨香喚醒首陽千古夢爾来宇宙三百年劫灰不壞寧非天姑蘇李侯賢太守為將手澤歸雲𤣥因憶右軍脩禊敘智永藏之固其所今比蕭翼誰賢愚豪奪何如能樂與君子於物不留意好徳終然勝好古劍許徐君自有心書還孔子非無故粟可不食國可辭較之一紙真豪釐聞風亷立遽如許信哉聖人百世師西山之薇何獨美向㣲二子一草耳東海魯連死猶生中書馮道生猶死承平文獻傳至今品題先後如盍簮就中何人合愧死九錫不是夷齊心楚北村民湯炳龍題北村先生逸齋總管相公以所藏文正公書伯夷頌歸於范氏懷賢尚徳之心士大夫皆樂道之為詩若文盈軸甚盛事也不揣蕪陋僭賦小詩髙沙龔璛拜手一時端合拯斯民萬世寧無啓不臣此意聖賢非二致誰令今古共彝倫墨胎事逺頌聲在青社人鈔楷法新尺素郡侯還范氏先憂天下亦同仁大徳庚子二月廿一日書於義宅之西序吳興趙孟頫子昻高郵龔璛子敬同觀海濵二老本同歸末路殊途孰是非叩馬匆匆扶義士憐渠未識首陽薇韓辭范筆照千齡扶植綱常似六經日月争光宜下拜莫將此眼對蘭亭眉山史孝祥葯房先生豫章先生集有此帖跋云范文正公書伯夷頌極得前人筆意蓋正書易為俗而小楷難於清勁有精神如斯人不必以書立名於來世然翰墨乃工如此蓋喜多能雖大賢不免焉志仁伏讀諸名公所題大篇短章於伯夷之清風昌黎之偉詞文正公之寳墨賢侯歸帖之美聞孫承家之懿藻繪盡矣尚何辭之措敬書山谷此跋以補闕遺又山谷嘗跋公真蹟云范文正公書落筆痛快沈著極近晉宋人書法往時蘇才翁筆法妙天下不肯一世人惟稱文正公書與樂毅論同法老年觀此書乃知用筆實處是其最工想其鉤指回腕皆優入古人法度中此跋首述才翁所云於冩伯夷頌亦相關渉因牽聨書以歸之竹趣先生晚學清江羅志仁拜手壺秋先生文正公所以師表百世者固不在書然筆法之妙自足追嫓古人故蘇公號稱能書者亦從公求之以為珍玩焉書此頌時已六十有三距公薨財一年耳而楷法謹嚴一筆不苟如此真可敬而仰哉夫書雖細事而最足以觀人公書如是中之所存可知已同時如文富韓歐諸公書之工拙雖或不同而其渾厚端莊則亡以異此四五公者坐廟堂邦其有弗乂俗其有弗醇者乎世稱王荆公書如斜風急雨其胸中躁擾可以想見一旦當國遂盡取成憲而紛更之天下騷然而風俗亦一變而趨於薄矣厥後温公復古而國再安章蔡崇新而世遂亂其正與邪皆莫逃於筆墨之間益信心畫之説不誣然究其大歸則熈寧以前之書多重厚而少輕浮熈寧以後之書多輕浮而少重厚兹蓋世道之所以升降者予嘗從故家盡得宋南渡前墨蹟觀之而竊為之説如此故并識之俾來者有考焉大徳庚子六月乙已朔陵陽牟應龍敬書成甫先生文正公為蘇舜元書伯夷頌名公題贊甚富二百年間不知凡幾傳至於賈秋壑宋亡北流於燕逸齋李侯時為部侍郎得之寳藏文府大徳戊戌侯自兩淮都轉運使來守是邦謁公祠下求公之後人以與之侯盛徳也衎奉檄來姑蘇理海舟之獄范氏之族長竹趣先生出示幸獲觀焉大徳庚子秋七月小子李衎再拜謹識息齋同知文正范公細書昌黎公伯夷頌石刻在建業玉麟堂墨跡傳流大徳已亥復歸於范氏庚子嵗九月過吳中獲觀拜手敬贊餘杭盛彪虎林先生百世之師維孤竹氏六經之文維子韓子不有斯文孰繪厥媺維高平公髙山仰止素書銛鋒羲獻是似匪翰匪墨為綱為紀去珠斯逺良玉不燬有物護持復歸於是庶幾寳之有永千祀夷齊之論至夫子而定或謂得夫子而名益彰二子求仁得仁名之彰與否不暇為身後計也退之之頌賢於司馬遷附青雲之見逺矣按文正公在青社皇祐三年十一月書此未幾以病請汝隂眀年五月薨於徐其平生特立獨行之志夷險一節老且死不變而見於心畫者如此與守桐廬日祠嚴子陵祠同意清風凜乎其相劘也時文潞公罷相知許昌杜祁公為賈昌朝所抑致仕去富鄭公淮西晏元獻京兆諸賢在外詞翰往返蕭灑高潔語出意表視夷齊異世同調所恨者公方向用而即世矣後三年文富竝相使公而無死天章一疏盡行豈有熈寕之禍哉蔡忠恵治平二年五月之題謂此書皆謗毁艱難者讀之益以自信是年忠恵為三司使給事以讒出守杭故云爾意謂公屢遭擯沮蓋夷齊其行而世或有非之者遂借此以自見然公知有直道而行而已豈自必於夷齊哉自必於夷齊亦未免有所利而為之矣天荒地老崑玉不燼宛其復歸與義田竝傳君子之澤通乎盈虚之運幽眀之故正不偶然也片紙三百年承平碩輔姓字皦皦如日月見之束衽盤辟若檜若似道亦蝨其間使人指畫唾罵然則士不以夷齊自厲其不為文正公之罪人者幾希雖然亦豈願其為夷齊哉大徳庚子日長至長樂郭隚拜手謹書梅西先生伯夷之行昌黎頌之文正書之真三絶也子孫其寳之哉真定董章小山郡侠汲郡王簡漢東孟淳同觀大徳乙已夏五十日王敬夫御史孟能静總管文正范公手澤獲見於二百六十三年之後扶植綱常流傳是寳濟南王文羽保定孫杲同觀時皇慶二年嵗在癸丑暮春大名王亢宗識王伯儀郡推官孫缺吳縣尹王仲常郡侯翰墨嘗託文章傳文章益重節義全使無節義照今古文章翰墨空嬋娟特立獨行不顧衆萬世標凖權亦用吏部雄文破鬼膽為渠喚醒西山夢范公相望餘千齡人物自與臯夔并黄素細書伯夷頌白頭不草太𤣥經一字千金價無讓虹光夜徹星斗上夷清韓頌髙平書再拜莫作文翰想奸臣襲藏猶畏仰面無生色泚流顙珠還氊復子孫賢我信斯文天未喪佳辭善書常有餘嗚呼節義不可一日無致和元年中秋日金華後學胡助再拜謹書古愚編修先正范公文武忠孝親親仁民之徳充周穹壤是以尺素寸楮觀者斂衽墨妙曹操王敦桓温未嘗書不佳也至今見者唾之公所書伯夷頌流入秦檜賈似道家繇賈遂沒入官宋亡出於燕趙間復歸吳范氏世所共貴重者有在也熈寧以來見者必著姓名豈欲託以不朽耶苟不知觀感興起之㣲求公之心希公之徳徒珍玩是誇亦秦賈耳不幾於狎大人乎凡我同志相與勉焉泰定丙寅七月十九日天台後學楊敬徳書仲禮提學古人尚友以其類也伯夷之心惟孔子為能知之千載而下惟文正范公有以似之文正之心惟朱文公為能知之千載而下其亦有似之者乎嗚呼希矣至順壬申夏五月宛平曹鑑拜手謹書克眀太常文正公以寳元元年赴潤道謁狄梁公廟為之作記立碑又十三年皇祐三年鎮青社用黄素小楷書伯夷頌寄蘇才翁蓋去公薨半嵗耳於是公屢以言事忤㫖出殿外服知其道之莫可行也將以仰睎古人而於伯夷之清風梁公之大節竊深慕焉攬公之迹可以諒公之心矣所謂百世以俟聖人而不惑者兹非其徴乎東陽柳貫謹題道傳博士右宋推誠保徳功臣贈太師中書令魏國范文正公書唐韓子伯夷頌真蹟筆意精嚴動合法度有晉人之遺風熈寧以後名公題識具存誠寳玩也按公書此頌遺武功蘇舜元南渡後歸秦檜氏又歸賈似道氏宋亡流入北方李侯戡得之京師來守吳實魏公之郷因謁公遺像以其書歸其後之人今藏於范氏義莊子孫世守之竊嘗謂時有代謝世有盛衰至於天理民彝則越萬世而不可泯者必有人焉王侯之貴晉楚之富死生之大舉不能以動其心始足與有為也太史公纂史傳思可以厲節義維綱常者許由務光之倫其事不經得孤竹之子遂為數千載人物稱首遷之志念深矣唐韓子探其微旨著伯夷頌文正公復得韓子之㫖而為之書蓋公屢以忠讜不容於時遭誣擯斥守道彌篤所謂不動心以有為者其在斯人歟其在斯人歟夫聖賢所遭之時雖異至於厲節義維綱常而天理民彝賴之而不泯者則一而已故觀此書者莫不興起書云乎哉贊曰於昭民彝不億而泯肅肅元夫厥徳孔純弗移弗屈執中允固思皇九有克寧無斁民不可乏主我不隕厥清匪兹元夫日離亂争此何人斯孤竹之子非其君不事非其民不使韓侯作頌郁郁其章魏公書之翼翼其相死生弗渝是式是似曠代同心惟予與爾人獲遺書如圭如璠懷徳不替來歸其孫維魏公孫子永保勿失惇我風化尚胙皇國後學柯九思拜手謹書敬仲博士伏承主奉范君出示先世書詔及文正公手書伯夷頌令集題識仰惟前賢争光日月不敢妄有贊述輒以鄙句奉謝用表惓惓景慕之意云耳蜀郡虞集頓首伯生待制慶厯元臣細字書清風真與伯夷俱潞韓竝識何舂應秦賈争藏實衊汙神物護持天愛寳子孫驚喜海還珠敢以微塵賛喬岳願推餘論砭頑夫企仰前賢嵗月深阿衡事業伯夷心義田猶是當時祿遺像能令百世欽竊頌詩書求仿彿黙嗟人物轉銷沈誰人浪漫矜家世看取天平萬石林敬題文正公所書伯夷頌巻尾長沙湯彌昌頓首再拜碧山先生頌文遙附青雲傳楷法獨推黄素書百世清風元不泯兩公髙志更誰如珠遺舊入權臣槖璧返今逢刺史車一巻寳藏同魏笏虹光清夜燭寒虚文正千年士精忠凜不亡勲名山嶽重翰墨日星光喬木參天古幽蘭叠砌芳我來拜祠下端欲濯滄浪髙昌偰玉立再拜別駕孤竹身為百世師范公手染退之辭不知青社揮毫日得似天章論道時鐵畫銀鉤黄素帖珠還璧返嵗寒堂須知此事關風教子子孫孫盍寳藏吳後學干文傳載拜壽道州尹青青首陽薇皎皎孤竹子求仁亦何怨清風千萬祀昌黎述𤣥聖雄文劇頌美偉哉青社書感激有深旨列宿麗寒旻羣鴻戲秋水李侯信卓犖不惜百金市分符守吳㑹開緘授雲耳故物傳衛公遺璧歸孔氏一玩三歎息當思繼前軌元統乙亥三月壬寅新安汪澤民冄拜叔志郡推官古之君子之於學也至於成已成物其於天下國家則曰功成治定所謂言之必可行也行之必可言也蓋物格知至而至於國治天下平者如此非苟以為言而已世之君子何其言之詳而卒不見其成功耶若文正范公則所謂能言之而能行之者也觀其所書韓子伯夷頌豈特筆墨之妙其為萬世之慮也深矣後學京兆杜本敬觀白原先生魏國文正范公在宋朝為名臣稱首當時論者或直以為聖人或方之以夔卨是豈泛然而為之言哉觀魏國出處始終大節一合乎道其豐功盛徳煥乎簡䇿若日星之不可掩山嶽之不可齊與天地相為悠久其窮理盡性以至於命者與今觀魏國所書伯夷頌筆法森嚴直可與黄庭樂毅等書相頡頏是則魏公非特於徳行功業超然傑出其於書法亦造乎其極者也然公不他書而書韓子伯夷頌者尤見公切切於綱常世教未嘗一日而忘也披玩再三令人斂衽起敬至元三年後丁丑嵗秋九月望後學台哈巴哈謹書首陽髙節退之頌之吏部文章文正書之時稱為三絶趙宋諸賢及有元之材大夫士題咏之不少置其八世孫静翁裝潢而珍襲之求名筆以發其光華信可寳已余嘗私竊論之伯夷以特立獨行之節不待退之頌之而始顯惟得退之頌之則其節為益顯吏部以日光玉潔之文不待文正書之而可傳惟得文正書之則其文為益傳故伯夷之節唯知適於義而已初不計後之頌與否也退之之頌深以為亂臣賊子不守名節者之戒初不計後之書與否也三者無心㑹而為一虹光渥彩昭如日星之垂天使世之亂臣賊子未為者而觀此書此頌則神駭心悸而不敢肆其惡已為者而觀此書此頌則膽落魄喪而無所逃其罪其有功於世教大矣且文正以清才茂行為時名臣先哲稱其事業滿邊陲忠義滿朝廷聲名滿天下則字畫乃其餘事然猶莊楷遒麗過人如此真趙宋第一流人物也余適以事過吳伏謁祠下静翁持成巻示余故欣然書之以俟夫知言者得焉薊丘韓璵載拜庭玉秘書黄簿伯夷頌首云士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知眀者也此數語已足盡伯夷之心文正公親書此頌匪惟知之亦久蹈之觀其立身大節亦不顧人之是非信道篤而自知眀者豈非豪傑之士哉其裔孫静翁先生恬愉樂道獨能保有斯文而珍藏之觀此者千載清風俱凛然矣後學永嘉鄭僖再拜書天趣先生范文正公所書伯夷頌後有秦㑹之太師賈師憲太傅兩人圖記宋南渡後此巻必流落江左而嘗入其家至李侯戡得之於燕則宋亡之眀年也范氏所居近在吳中兩人不能舉而歸之卒有待於李侯而公之子孫乃獲敬受寳藏焉豈偶然哉蓋自西方兵寢不用公歸而均逸外藩因得以暇日游心於藝事才翁善書而深服公楷法之妙求公冩乾卦而公以字數多眼力不逮故為寫此頌巻末第云書法亦要切磋未是處無惜賜教而已後來一二大老又推廣其說謂公書此實為天下萬世綱常計至哉言乎不容復賛一辭也至正七年春正月甲子後學黄溍敬觀韓文稱頌伯夷賢黄素真書慶厯年月照眀珠還合浦春風長共義莊田至正甲申六月辛未燕山呼勒圖再拜宋范文正公書唐韓文公殷伯夷頌想其清風勁節徳行文章真希世之三絶也元初平江太守李侯戡得之中原歸之范氏子孫可謂劍出豐城珠還合浦李侯其亦仁人之心歟展玩之頃頓覺忠義之氣凜然在天地間令人毛髮竦立宋朝十相景仰之忱藹然見於言辭之表秦賈二公猶加企敬而珍藏之度其心寕無所愧大眀兵至義莊祠宇俱為灰燼此巻同罹此患覬必不存大宗孫廷珍十世孫天倪復覯之於軍砦中嗚呼公之靈在天天佑其忠俾公之手澤不泯於世是知公之遺澤未艾也雝生二百載後而獲觀覽猶天青白日覩景星鳯皇快平生之心目也河東後學王雝拜書文正公文章政事載諸簡册者竊嘗觀誦感仰至於遺墨罕獲見焉癸未秋予督餉至東吳憩公書院其十代孫天倪持公手澤一軸示予盥手拜閲且羨且慄何也蓋所書者非他文乃韓吏部伯夷頌伯夷特立獨行聖之清者也後世孰加焉公書其頌所以寓儆者深矣矧公之書法遒勁嚴整妙絶前代而予也敢不起敬起慕永樂癸未仲秋資善大夫户部尚書夏原吉拜手書於姑蘇文正書院右魏國文正公書韓昌黎伯夷頌一通筆意精妙清古入神雖鍾王顔柳不過也余聞書藝也君子貴之藝之美也况大賢之手澤傳於後與世俱存公之在盛宋而其名天下重之不特文章翰墨也而學問淵源立朝大節世未必盡知之當時公之書與蘇才翁范氏子孫復得而珍惜之十一世孫主奉元理出以相示余生也晚恭覩遺墨肅然起敬悚然在下凜然如公之在前也其真有感發也夫其真有興起也夫時宣徳戊申仲春上澣奉政大夫戸部郎中零陵劉良拜手謹書伯夷聖之清者也韓昌黎頌之范文正書之頌之者固尚其節義之清書之者亦尚其節義之清書之以遺蘇才翁豈惟欲尚書法之古亦欲其尚節義之清也是書也曽幾何年復歸范氏非世有賢子孫惡能珍藏之若是耶巡按劉同年葺文正祠堂偕余往觀焉頃見主奉從規能善言厥祖不謂之賢矣乎且見其二子其幼者岐嶷不凡而知范氏又將有興者矣然則公之遺墨不亦留芳於千古不磨者乎成化辛丑秋八月八日句曲戴仁敬題拜觀是巻以韓富諸公之詞翰以秦賈二人之圖書一善一惡而勸戒具焉有志者得不凜然而敬慕惕然而警懼乎時成化甲辰二月朔旦天台楊澤書垔評訂宋之名臣謂范希文質性氣局可比伊尹當有真知垔者信斯言矣兹拜觀所書伯夷頌因用識此大眀成化甲辰九月蘭亭司馬垔書於鶴山書院𢎞治元年夏四月廿四日掌宗人府事駙馬都尉相人周景同兄蘇州府同知周冕拜觀廣庭端拜一塵無門外清谿㸃緑蕪三代偉人生慶厯千年遺廟託姑蘇淺夫敢竊先憂號盛徳還徴後樂圖徽國陋儒空仰止海峯高絶倚雲孤右一范家園脚步春風皎日英標在眼中銀杏十圍家廟古玉粳千頃義莊豐身當文正無雙士手授中庸第一功却走畫廊看翠碣朱絃三歎憶歐公右二走奉詔北上道吳門伏謁文正祠下得閲忠宣恭獻諸遺像緬想髙風敬賦二律寫貽公世孫從規用致鄉仰之萬一云時𢎞治六年嵗次癸丑春二月廿七日新安後學程敏政謹志西望天平萬笏林凜然生氣到於今名文有託幽光顯餘事能傳楷法深義士若微真接跡髙賢雖有莫論心嵗寒堂裏千年物敢作尋常翰墨臨先正范魏公楷書韓子伯夷頌宋元以來題詠甚多然奸檜亦厠其間有韓范不時有此心誰與論之句是可笑也舊嘗獲觀此巻今再從公裔孫從規主奉借觀焚香再拜謹題其後鄉學生吳寛右宋范文正公書唐韓文公伯夷頌以貽西京轉運使蘇舜元蘇之後不知何代失之而畢竟歸於文正公之子孫豈偶然哉豈偶然哉今其嗣孫從規持以示予且請題古今人題咏多矣予何容贅嗟夫文正公宋名臣也道徳功業烺烺炳炳當以三代以上人物論之其片紙隻字流落人間者雖三尺之童皆知寳之况其子孫乎噫先天下之憂而憂後天下之樂而樂安得復見斯人也耶高山仰止景行行止又當於書法之外求之若檜與似道乃宋之賊臣公視之宜不啻犬彘其墨蹟豈可厠於其間當削去勿為此巻之汙大眀宏治乙卯嵗春二月之吉後學淳安徐貫謹識此巻首乃宋魏國范文正公遺墨也後世珍襲或咏歎之無間善惡豈真所謂柳骨顔筋而作祖書法耶抑惟其人而已矣况其所書又韓昌黎之文頌伯夷之清哉於乎觀其書而究其心誦其文而論其世千載之下流風猶襲人襟懷范氏子姓其永寳之勿替賤子以𢎞治丁已來按吳謁公祠而主奉汝轝出此巻徵題遂忘其僭陋而贅此於末簡云長至日古閩王鼎書於蘇臺之冰玉堂君臣大經猶天高地下非可以人力移易者是以武王八百國精兵可以滅商家六百年社稷而不可滅二子扶植綱常違衆自是之論觀吾夫子謂武未盡善可見矣世降戰國生民塗炭已極孟軻氏始以仁義之師諷諭當時蓋不得已而救世之大權耳後世以争戰定天下往往援以自濟遂至篡竊相仍衆亦視以為常不復以為變二子之論幾滅此昌黎韓公又違衆自是特為之頌文正范公又違衆自是特為之書今考韓公入淮蔡范公在西夏君臣之義死生以之是二公者附美於二子不止於頌與書也二公既逺頌與書存范氏子孫世守若大訓然得之復失失之復得若有以㝠護之者人得而閲之如商彝周鼎大為竒遇輒有題識用從不朽是又欲附美於公者也嗚呼附公之美謂可止於斯耶正徳七年壬申三月朔旦賜進士吳縣知縣山隂胡文静題文正公筆蹟之重重人也觀者輒有題跋以識景仰之私且欲託名於不朽耳檜何人斯亦有詠焉斯亦可見秉彝好徳之心無間於忠佞矣嗚呼韓范之不同時於檜亦幸耳使不幸而同焉抑豈為檜所容哉檜為此言又將舉天下後世而欺之矣愚欲其子孫割去之使無汚此巻可也雖然若檜者世亦有之毀程朱之道以立異議廟祀之禮以阿世得無似耶范氏之象賢者其韜此巻使無重汚哉嘉靖七年乙酉季冬髙安鶴坡朱彦昌書鳳梧以巡撫之暇謁范文正公書院捧閲公手書伯夷頌真蹟肅然起敬因奉次宋諸名公題韻以致景仰之私云范公千載一人豪小楷精分穎上毛真蹟至今傳不朽泰山北斗竝争高右次文潞公韻首陽特立古今無韓頌還兼范老書三絶世間真罕見商彝周鼎可能如右次富鄭公韻昌黎辭爾雅文正字精深峻節清風頌髙山流水音聲華尊北斗詞翰重南金千載神交地先憂後樂心右次晏公殊韻青天白日仰希文自是先朝第一人西賊膽寒真大將東垣望重此名臣青編已載聲華舊黄素猶傳手澤新應有鬼神為拱護雲仍百世尚冠紳右次杜公衍韻嘉靖丙戌春三月中旬後學廬陵陳鳯梧謹書於鶴山書院范文正手書伯夷頌端雅有好致第不能作開天章帥延慶風骨耳書家者流以為得樂毅論遺意吾不識樂毅論未敢附和然伯夷聖清與昌黎高平皆斯道楩梓不應於翰墨中論輕重也跋内文富晏杜四名相與文正相伯仲純仁昆玉不忝象賢而君謨才翁輩皆臨池老手尤可寳愛别一巻皆元人跋盖元有平江路李總管者嘗得之以歸於范氏之子孫一時諸公高其誼争為其詩歌題識其間極多名筆不佞獲一寓目焉不勝高山仰止之感乃至秦繆醜欲與韓范論心為之失笑庚午春日鄉後學王世貞頓首書此帖與忠宣公告身跋之月餘而其後人主奉者不能守作余質庫中物者十年矣余聞之數責其以原價取贖不得今年初夏悉理散帙分授兒輩因舉此二巻以歸主奉且不取價嗟夫余豈敢以百金市義名顧滿吾甘棠勿剪之願云耳為范氏後者時時念文正之手澤為他人者逺則念伯夷近則念李總管庶幾其常為魏公家有哉庚辰初夏世貞又題先正文公手書伯夷頌自李總管戡歸吾范氏迄今將三百年而復得王大理世貞不索質鏹而歸之誠是義事夫當吾世而為不肖子孫所質且久而不知其事何能無罪因識數語巻尾以歸掌守者併示後人世寳藏焉倘後有不肖子孫仍以質人請其人勿與質質而如王大理之捐鏹以還無益也即子孫不能贖而竟留不歸或因而貨有之則又為大理君之罪人矣吾不能保後之子孫而所可信者好徳尚義如大理君士君子孰無是心乎萬厯庚辰六月十六世孫南京太僕寺卿致仕惟一謹識時年七十有一曩時於弇州王先生所獲覩先賢范文正公手書伯夷頌字畫楷秀令人肅然起髙山之仰巻後題跋甚富多名賢擅臨池者即秦繆醜論心一語不妨竝存以備勸戒真范氏世寳也後人弗能守并忠宣告身質弇州庫鏹後捐以歸與范與李總管先後一轍稱盛徳事萬厯庚戌不佞叨貳雲間其主奉者不戒二巻并元祐間所賜忠宣御詩落拾遺手諸搢紳謂可同裴丞相失印事處分虞投水火不佞竊計印以用用訖無所復用故可緩得此巻無論用不用人人共珍緩將流匿旁邑無復出理竟以急追得之乃知緩急隨宜顧用之何如耳為識諸巻末授公十八世孫必溶什襲藏之毋再落他人手詭冀李總管王弇州復遇也甬東朱勲謹識先生曽為吾鄉守遺澤在人甘棠猶思矧惟奕世也百花洲雖復凌墟而過化贔屭之石屹屹矣五六百年間桐鄉裔氓得覩手澤愴然先世之感何如眀後學彭而述觀於姑蘇廿世孫之安柱鳳來堂世有兵火而古物之遭其劫者不獨名人遺蹟而名人遺蹟尤易消毁其獲存於世者皆神物也然世存之而未有子孫世守之者其世存之而即為子孫世守之者則惟范文正公之後而已文正徳業文章為有宋以來第一人書法其小技也而為世所寳愛余從公二十世孫安柱者備觀於其鳳來堂并諸名公手跋洞心刮目應接不暇内有伯夷頌巻書獨精楷當時秦賈二賊皆有題識故論者恨之余謂白璧眀珠知其寳者奚分善惡古來遺蹟不有藏者何以能存造化自不得不有所借以護持神物而與其人原不相掩也嗟嗟滄桑逓變一消一息宇宙間何物長為人有此之筆墨淋漓六百年來聚散得失不知幾經人手獨見超然劫外至今日而范氏之物還歸於范家藏無恙余因幸見先賢典型斯竒遇矣後學王心一謹題余冄宦遊吳獲謁范公祠屢矣毎瞻拜文正忠宣遺像令人肅然起敬今年春從公十九世孫主奉能濬得觀祠中所藏墨跡九種其一乃文正公楷書伯夷頌貽京西轉運使蘇公舜元者文正公為有宋第一流人固不以書名而此書謹嚴有法度一筆不苟世之善書者或莫及焉虞道園有云仰惟前賢争光日月不敢妄有賛述良然按跋中文富晏杜四名相實與文正相伯仲忠宣晜弟不忝象賢君謨才翁及元眀諸鉅公一一具在真巨觀也秦繆醜題句欲與韓范論心得毋顙有泚耶此巻南渡後歸繆醜又歸賈似道宋亡流入北方元李侯戡得之因來守吳舉而歸之范氏義莊眀神宗時曽入王弇州質庫後仍歸范氏不取直未久主奉者不戒復失去為雲間貳守朱勲追得復歸祠中今巋然無恙信有神物呵護其間也其餘八種一為唐懿宗賜文正公四世祖柱國誥一為宋哲宗賜恭獻公拜給事中誥恭獻公純禮也一為哲宗賜忠宣公御書一為文正公與尹師魯二帖一為文正公道服賛一為忠宣公劄子一為忠烈傳芳巻忠烈徽宗賜文正祠額巻中載詩文甚夥一為東溪書舎巻東溪為唐以安氏讀書處唐正統間人因其地隣范祠不知何時歸祠中展閲諸巻定當以伯夷頌為第一余承乏此地幸覩鴻寳敬綴不文之辭於巻末尚有忠宣誥未及見今兩江制府蘇公先生即忠宣二十世孫也康熈丙子花朝後二日商丘後學宋犖識男至敬書承勲於甲戌嵗荷䝉聖恩自滇黔召總臺綱甫就道又䝉調制兩江季秋履任金陵即受命閲視太湖暨吳淞水利以孟冬扺姑蘇公事既竣因得謁祀先祠翌日往天平省視賜廟不勝水木霜露之感因念先文肅公平生毎心憶東吳冀一親到而縁㑹未偶厥志莫遂先兄忠貞公撫越制閩三過吳門數行祭告之禮又為捐俸葺祠至今賴弗圯墜兄之力也因思我父兄徳業事功幾與文正忠宣争光嫓美承勲無似雖忝竊是土其於祖功宗徳何能増益毫末但矢志斤斤恪守先訓不敢遺羞於我列祖父兄之靈斯為幸矣主奉能濬出文正諸手澤見示真吾宗世寳也巻帙零落因請歸署内命工裝潢新之還納祠中附語巻末以誌嵗月且鈐記制篆以示鄭重俾子孫葆藏世世勿替毋再歸他氏庶先澤藉以長存是所望於吾族之賢後人云大清康熈嵗次乙亥清和月榖旦兩江制使忠宣房第二十代裔孫承勲謹題時年五十有五文正公忠貞貫日月事功炳史册其正書伯夷頌筆力清挺世所罕覯又有文富杜晏諸公及忠宣昆仲跋尾聿為巨觀康熈庚辰三月廿有六日舟至中吳擬拜公祠下天雨未果曉過芝蘭堂請觀墨本展閲再四想見公之丰神其源流賛頌宋元以來衆君子言之詳矣士竒後學無文何敢多述謹附名巻末誠為厚幸錢塘高士竒拜書芝蘭堂為余同年友秋濤讀書處其叔子能濂孫興校在家應接足慰故人之思是日同觀者顧上舎崧暨余從子不騫并記之跋文正公手書道服賛墨蹟希道比部借示文正詞筆觀之若侍其人之左右令人既喜而且凜然也熈寜壬子孟夏丙寅陵陽守居平雲閣題石室文同與可竊觀文正公道服賛文醇筆勁既美且箴以盡眀契之義有以見高陽公之徳矣傳曰不知其人視其友諒哉熈寧壬子年十一月甲子吳興戴䝉正仲題范文正公當時文武第一人至今文經武畧衣被諸儒譬如蓍龜而吉凶成敗不可變更也故片紙隻字士大夫家藏之世以為寳至其小楷筆精而瘦勁自得古法未易言也黄庭堅書獲觀文正公之詞翰淳重清勁如其為人毎展巻諷誦未嘗不想見風采何名徳之重使人愛慕如此其深也富川吳立禮題文正公為同年友許書記作道服賛言皆至理書特清勁至今觀之悚然増敬所謂寵為辱主驕為禍府重此如師畏彼如虎是又美不忘規益可玩味乃知異時丞相堯夫布衾銘實權輿於此歟然是賛不載文正集中則公之文之遺者有矣抑亦盛年之作而或失於編次也耶因綴廿字以寓景行之意云文正道服賛忠宣布衾銘家乘揆一徳名言符六經至正癸未春正月廿日金華胡助書范文正公道服賛其書有法而詞有氣前人題跋盡之矣余復何言敢僭用公韻敬作遺墨賛欲范氏後裔益知所寳重云式觀遺墨端嚴濟楚柳骨顔筋㣲公孰與龜文龍鱗或翔或處烈士忠臣兼文兼武畫見諸形曰心為主詞發諸口曰學為府石抉怒猊章成繡虎百世彌藏弗替厥祖成化辛丑八月八日句曲戴仁題賛右范文正公為同年許書記作道服賛真跡道服之制不可考許公為此其意蕭然物外必非不臧之服也不然文正公豈率易為人下筆者哉此賛今藏范氏義莊賛後又有文與可諸賢跋語亦不可得者也延陵吳寛謹題萬厯已酉夏漢陽守華亭孫克𢎞獲觀范必溶秀才出文正忠宣宋板集示余余請之郡司理毛公孺初捐俸梓藏松之郡閣天下士大夫得覩范氏一家言至是必溶重裝道服贊真蹟能護世寳如護頭目不愧義澤子孫矣是可重也陳繼孺謹題崇禎二年已已春正太常卿長水姚士慎同弟進士士恒文學士恪拜觀於文正公十八世孫主奉必謨家支硎山之暉發堂崇禎十有七年春二月十日盛王賛陳宗之同張采拜展於鳳來堂丙戌中秋十九日王心一拜觀於文正二十世孫安柱即公柱之鳳來堂先魏國所書道服賛結搆謹嚴有龍跳虎卧之勢筆力之最勁者搢笏垂裳徳容如可想見康熈甲戌嵗清和六日雨中觀二十世裔孫承勲謹題跋文正公與蔡欽聖手啓墨蹟尺楮逾二百載魏公手筆如新語不繁而意足可以想見其人矣湯彌昌敬題右文正公聞子弟過省荅友人書若固有之視利達為何如哉與常人外飾遜避之辭中懷僥倖之意不可同日語覽者黙識於辭意之表亦足以感發矣天台楊敬惪拜觀謹識時至順壬申人日此行次許下荅欽聖帖中云示及省牓兒子與謝家兄弟俱過省兒子即忠宣忠宣皇祐元年進士公以慶厯八年由鄧州求守杭眀年三月十一日次許得書正南省放進士時也欽聖不著姓今亦莫可考而籖題蔡欽聖必有據哉東陽後學柳貫書祁留吳郡城中毎從范静翁先生閲其家藏文正公手帖凡若干巻今又得許下帖讀之富哉范氏之藏也静翁先生力承宗緒至老彌篤凡遇其先公片紙隻字即購藏之以為家寳嗟乎公之翰墨留天地間如精金美玉人咸知愛重而况公之子孫孫子哉是宜先生之寳之也使子孫之來者皆如先生之用心焉則公之遺澤將百世不泯矣盍相與懋戒之至正十年嵗在庚寅夏五月後學荼陵李祁謹題跋文正公與尹師魯手啓墨蹟方范文正因與吕文靖争論上前貶饒州時尹舎人實上書願得俱貶監郢州酒税此一巻帙情義諄諄不啻兄弟蓋二公愛君憂國道合志同其相與之厚自應爾耳淳熈乙已清眀日梁谿尤袤敬觀范公二帖皆是師魯謫漢東時書後一帖却當在前或是自均過鄧託范公以死時問訊之書與衆云云之戒可見也賢者困厄至此人到於今傷之藏之深固之密石可朽名不滅歐公銘文盡之矣淳熈丙午四月洪邁書佳客千山得得來主人雙眼為渠開逢人莫説當時事且泊南亭把一杯右第二紙當是尹自均來訪范於南陽時也范戒尹以不須與衆云云此意最深淳熈戊申三月廿八日廬陵楊萬里敬書師魯自均州輿疾至南陽託范公以死蓋平日之相與者如此四眀樓鑰書紹熈三年十月晦静翁近又收得此二帖乃文正公與尹師魯書也交情古誼百世之下尚可想見視他帖尤當珍愛學士大夫所願見而不可得者况尤樓洪楊四公之題識亦豈復可得哉賢子孫永宜寳之至順四年五月五日後學東陽胡助謹書范公與尹舎人往還書一巻當有與衆云云帖而逸之觀洪楊二公跋語可知也後人不見此帖乃改跋中三字作二字耳覽者當能辨之元統乙亥春三月壬寅新安後學汪澤民謹書景祐二年公上論遷都事與呂文靖異議黜知饒州秘書丞集賢校理余靖言加罪言者非太平之政坐落職監筠州酒税而太子中允館閣校勘尹洙又言范某義兼師友乞從降黜亦坐貶崇信軍節度掌書記監郢州酒税此二帖皆尹公在郢時所遣問若曰日給外月月有横費家家如之至於收檢邠酒候送鄧醖合花蛇散和方送上見朋友有救卹通財之義而惟君子樂道為能盡之也其後公鎮鄧尹公再貶監均州酒税舁疾來鄧以存歿託公則公於尹公可謂生死不易其諒矣然楊洪二公跋語以第二帖是自均來南陽時且有不須與衆云云之戒今帖中乃無此語然以動止休佳及報他貧且安也等言證之則非疾矣恐此跋非此帖也前帖銜縫有王厚之順伯隂文十六字印知為順伯所藏順伯臨川王和之孫好古博物為中興第一徽文公與之友善集中載其書問可考也田元均諱况蓋諡宣簡云東陽後學柳貫謹識尹師魯何如人而克致范文正公之敬愛若是耶余嘗考之師魯以静退為樂以古文矯俗其行髙學古可知已及觀文正黜知饒州師魯請同降黜其臣節友誼又可知已宜其為文正之所敬愛帖簡往還契之若金蘭而友之若兄弟也噫觀文正遺翰留芳千載一日師魯之名得與同􅂷不朽亦何幸哉成化辛丑秋八月八日句曲戴仁敬題宋盛時有西夏之擾范公與尹師魯合謀戮力以抗之相得甚深蓋以道義事功為友者也此二帖公與師魯者其一帖已刻於文正尺牘中寛嘗閲之何幸今日復獲見此真跡哉然二帖不藏於尹氏顧歸於文正子孫則其後世之盛衰亦可知矣鄉後學吳寛謹書師魯貧公語以樂道惟樂道則貧安此絶難問恒人則又得曰先天下之樂而樂矣公生平極辨朋黨與師魯患難交且屬生死其密劄一言近勢利否及投贈僅邠酒四瓶花蛇散若此誠安得有黨觀者念之哉時崇禎十有七年春二月十日鄉後學張采敬沐手拜題題意與盛子王賛陳子宗之商語也范文正集補編巻三欽定四庫全書范文正集補編巻四碑記祭文附蘇州郡學范文正公祠記承徳郎平江路總管郡推官汪澤民為文并書中奉大夫江南諸道行御史臺經歴台哈巴哈篆額吳學之興始於文正范公此所以専祠公也宋景祐初天下郡縣未有學公守吳請而建焉吳為公父母之邦向得錢氏南園地將居之或謂是必世生公卿即以其地為學宫公之子恭獻公持節過郡益新學給田由是立祠禮殿後忠宣公恭獻公從祀髙賢報本典禮宜備至元再元春正月鬱攸及祠屋幾燬眀年文學掾蔣君伯昇至顧瞻摧圯懼神弗居告諸郡守掄材木陶甓瓦撤故朽完補缺棟宇隆敞像設儼肅秋九月始事冬十二月工迺告成工為日凡若干錢為緡凡若干郡守通議道童公乃為署祠之扁蔣君偕公八世孫文英來言曰公之祠於是也乆矣若稽歲月紀載闕焉不書之石曷詒永圗願記之澤民惟間氣哲人問學本乎六經蹈履合乎仁義元勳鉅德蔑以形容方慶厯中召對天章閣列奏十事三曰精貢舉既用其説學校徧天下矣嘗聘安定胡先生幸教吳士嗟乎興學立師羽翼斯道豈淺淺哉祭法禦大菑捍大患於一時猶得祀之若公之功施於天下後世豈惟吳學宜祀之凡有學者皆可祠也夫奉常固以致嚮往隆報效士之朝夕仰瞻又豈無感發希賢之心者乎澤民夙仰公之髙風隨牒公之鄉屢常拜公之像今復以文字寓名祠下何其幸耶遂不辭而為之記又明年嵗在丁丑正月壬子記文正書院記遂昌鄭元祐撰至正五年龍集乙酉夏六月吉亷訪僉事趙公承僖分廵中吳至則首謁范文正公祠下拜瞻廟貌起敬起慕作而言曰文正公以德以功既無忝伊傅之為輔相以學以識則有功於洙泗道統之傳故其具文武全才出將則安邊却敵入相則尊主庇民其先憂後樂與先知覺覺後知覺者何以異豈非聖之任者乎其平生論諫直道正言剴切人主至上百官圗詆宰執為張禹觸犯盛怒雖坐摧抑曽弗少阻詎不猶木從繩則正而欲后之克聖者乎當時天下郡縣未嘗皆置學公至吳首以已地建學故學校徧天下者自公始識泰山孫明復於貧賤中授以春秋遂大鳴聖道於時延安定胡公入太學為學者師而河南程叔子實遇奬拔其後横渠張子以盛氣自負公折之而授以中庸卒之關陜之教與伊洛相表裏盖自六經堙晦聖人之道不傳為治者貿貿焉罔知適從以至於公而後開學校隆師儒造就士類作成忠義之風以致道統之傳則公之學識於名教豈小補哉公之薨也所在廟食一以忠烈賜名顧兹中吳公父母之邦所宜大建祠廟萬世血食如之何僅享之於私第况今國朝崇德報功在在有書院以祠先賢豈有豐功偉德正學卓識如文正公而書院莫之建則是缺典豈有大於此者乎公八世孫文英具辭於趙公以為先公之功德學識誠如公所言顧惟范宗仰食於義廩食指幾千餘使建書院則官除山長有山長則有廩稍之奉矣今藐焉義廩不自給使但建書院以祀公慎選族人之賢者充主奉斯足矣官除山長則乞免焉於是公從其言時總管古燕吳侯秉彞聞公之所建明即叙公所言請於行省上之中書議有關世道且不設教官而以居嫡者世主祠而行教於事便由是二公商出公帑羡餘命工益址而崇制既宏且固甫完屬元祐記之祐以蕞爾膚謭烏敢厠一喙於大賢之門雖然公之功德學識憲僉公知而言之則凡天下之士皆知道之也知其人而不思效之可乎子朱子謂人之立志必當以公自期待况遊於公之門乎况郡人乎若然庶於公可無負所謂尚友者此也元祐言不腆謹用復諸憲僉公俾書之石焉康熈十七年閏三月九日從友人太倉顧伊人湄借得元鄭明徳先生僑吳集録之應俱李提舉文並存家乘中不可失也世孫必英識重脩文正書院記翰林院脩撰承務郎郡人張益譔文奉政大夫脩正庶尹吏部郎中兼翰林侍書廣平程南雲篆額郡人鄒𦙍書丹肆惟我國家敦崇教化尊尚儒賢其於前代良臣誼弼功德及人而廟祀於郡邑者必命守臣嚴祀事葺祀宇示勸之意不既深乎顧在守臣之賢乃克視此為重而盡心焉蘇郡實宋太師魏國文正范公桑梓之里而其先隴義莊義宅義田義學咸在故公之祠堂乆建於此事詳舊刻西江况侯伯律以奉政大夫禮部郎中奉敕來守兹郡政敷民安百廢並舉嘗有事於祠下顧瞻棟宇有圯橈者因喟然曰兹責在我弗急所圗曷稱上意即請於朝用加脩治於是卜日鳩工度材築基撤舊易新拓小以大為祠堂前後各五楹後以奉公神像前置累朝碑刻東西有廊廡東祠宋郡守潛公咸淳中始建是祠者也堂東偏為書院搆用舊材以其尚堅好也院亦有堂前後各三楹掲以忠厚舊扁東西有廡齋宿閲牲以及庖湢莫不有所其西偏則范氏家廟嵗寒堂在焉子孫嵗祀公父子於其中外為門屋三間亦仍以文正書院舊額掲之垣墉周繚規制宏壯視昔有加凡所用度一皆出粟之羡貯於官者經始於宣德甲寅六月三日畢工於九月十日况侯謹率僚屬暨學官諸生合范氏子孫以落其成主奉元理及提管希賔爰與族人謀曰祠宇再新既賴郡守盍礱石鐫辭用著不忘遂以屬余余忝為公郡人於斯盛事在所當述故不敢辭以蕪陋惟公間氣所生心與學術俱正毅然有為於世奈何周旋中外政府方登讒慝已搆雖其才不盡展乃若功徳之及人者尚多節義足以厲俗進退綽綽非古之所謂大臣者何能與於此乎當時苟能盡用必將成就大業以濟天下此盖君子所深惜也然而公之自立於天地間者百世不泯祠當百世愈新况侯為郡賢守克承上意亟致脩治宜乎在郡多善政也詩云伐柯伐柯其則不逺斯之謂歟故余特為之書正統五年嵗在庚申夏四月吉日裔孫提管元英掌計子惠子寧元靖希歐照磨子易教諭從文知縣希正希瑊義學師希鳳立石何淵鐫重脩忠烈廟記資善大夫吏部尚書兼經筵官前國史縂裁泰和王直譔奉政大夫脩正庶尹吏部郎中賜食三品祿直文淵閣永嘉黄養正書中憲大夫太常寺少卿兼經筵侍書廣平程南雲篆正統八年十一月蘇州府重脩范文正公忠烈廟成其十一世孫都察院照磨子易具事始末屬直為之記盖公蘇人也曽祖徐國公祖唐國公考周國公皆塟蘇之天平山公嘗請於朝改天平山白雲庵為白雲禪寺世度僧守焉作祠於寺之右以奉祀事至公之子孫又作祠於是寺之南以祀公然忠烈之名未有也宋自元昊反西鄙騷動師出無功仁宗乃命公經畧公選將練兵築城寨墾屯田據其要害示以形勢招徠屬羌恩信大洽決䇿取横山復靈武元昊勢屈乃請降西人仰公之徳服公之化皆為公置生祠公薨相與哭於祠下者累日不絶宣和間宇文虗中為慶帥言公忠於朝廷其功烈顯於西土至今猶廟祀益䖍然廟未有額徽宗命以忠烈名之且為題其榜凡廟之在西者皆易以新名然蘇猶未有也紹興以來西土皆陷忠烈之廟越在異邦蘇之守令與其士大夫謀曰蘇公故郡也而天平山則公祠墳在焉公之精神必往來乎此乃更作新廟掲忠烈之榜於廟門由是蘇始有忠烈廟每嵗上已郡縣長吏率其屬致祭嵗乆廟壊元至元乙酉嗣孫邦瑞士貴復新之末世兵亂毁焉踰八十年未有能復之者至是工部侍郎廬陵周公忱廵撫至於蘇而監察御史壽光劉君甄武昌劉君仕昌錢塘鄭君顒皆以事蒞焉郡守李侯從智來㑹政事之暇語及兹廟因相與歎曰公之徳業著於當時傳於天下後世不繋乎廟之有無也然表先生以儀來今使後生小子得瞻其廟貌想其精忠偉烈而興企慕之心則廟亦不可無也乃各出貲俾吳縣令永嘉葉錫圗其成錫毅然以身任之殫心盡力規畫處置凡隣邑之令佐皆以貲來助市良材命衆工為堂前後各三間以奉公及三世先公像東西廂如其數以藏祭器而齋宿寓焉壯麗嚴整有加於昔中作石橋橋南左右為碑亭前作大門榜曰勅賜范文正公忠烈廟經始於是年九月初九日閲兩月而廟成直聞之士之能任天下之重者必以天下為心心之欣戚主乎人而不私於已是以天下為心者也以天下為心則人庶乎有濟矣初公未顯時已欲任天下之重嘗曰士當先天下之憂而憂後天下之樂而樂夫憂人之憂而欲免其憂使人皆樂然後與之同其樂此豈小丈夫然哉孟子曰禹思天下有溺者猶已溺之稷思天下有飢者猶已飢之公之心猶是也故其徳業之盛不愧乎古人豈特著於西土也哉嗚呼士不以天下之重自任者多矣不以天下之重自任則其所行一主於為已人之利害不少槩於其心而又悻悻然自以為得功烈之卑無足怪也而所以為士者固當如是耶然則公之孫與邦之人士及四方之來者拜公之廟慕公之功業必當思公之心充之以仁義而力行之於公其殆庶幾乎故為之記而道愚之所聞使刻之石以告焉凡以貲來助者其姓氏皆載之碑隂正統十年秋八月癸丑日立郡人何淵鐫重建文正書院記詔賜章服閒居前太史中執法經筵講官翰林學士知制誥奉天翊衛推誠宣力守正文臣特進光祿大夫柱國武功伯兵部尚書兼華盖殿大學士東海徐有貞撰并書賜進士及第翰林國史脩譔儒林郎文華殿講讀官長洲陳鑑篆額宋有天下三百載視漢唐疆域之廣不及而人才之盛過之此宋之所以為宋者也盖自太祖而後十有五君君徳莫盛於仁宗前後輔政之臣幾百數十人人才亦莫盛於仁宗之朝就仁宗朝之人才論之盖莫盛於范文正公公之為人剛大清純天資忠孝而為學得聖賢之心庶乎所謂極髙明而道中庸者故其為臣表裏一誠始終一正而文武經緯備焉公事仁宗自秘閣登諫垣出入侍從守郡帥邊多所渉歴而不得乆處於朝及參大政方將拯時復古權倖間之曽不期月而去凡所建明旋亦更革公之所存十不施其四五然而勳業徳望之盛視彼乆於其位者猶倍蓰焉使其乆且盡施則宋之為宋當不止是矣於乎甚矣直道之難行也有君如仁宗有臣如文正公其猶若此此有志於世者所深惜也公之同時名臣莫如韓魏公富鄭公魏公於公每事推重而鄭公因事感歎至擬公於聖異時大儒莫如朱文公文公謂公傑出之才為天下第一流而吳澂氏亦謂公為百代殊絶人物之數公者豈無所見而言哉是以後之君子聞風而起者未嘗不稱公之為盛也凡公所嘗過化之地皆有祠吳中公之故鄉而文正書院故義莊也其祀事自宋元暨國朝列於嘗典春秋享之而其祠宇因故嵗寒堂為之屢毁屢葺規制未宏迺者今大司寇萬安劉公顯孜以都憲奉璽書廵撫南圻而臨是邦因謁公祠顧瞻興懐爰諮所司撤舊為新闢而宏焉協議以贊其圖者前郡守黄巖林侯一鶚前郡守瓊臺邢侯克寛承命以董其工者吳邑主簿南昌李榮也於是公之十二世孫主奉祠事從規來以記請有貞聞之君子之於道也其有所立也必有所宗也求乎今而不足則尚友乎古之人所謂世異而道同者也今夫都憲公之廵撫於斯也猶文正之經制於陜右河東也兩郡侯之繼守於斯也亦猶文正之為治於蘇潤饒越也事文正之事也心文正之心也是亦文正而已矣然則三君子之於公豈非所謂世異而道同者歟有貞於公幸為鄉之後學固嘗寤寐乎公而思所企及者其能自已乎哉雖不文也願執筆焉附名於三君子之後以庶幾夫髙山景行之意云成化二年嵗次丙戌春三月望日立石重脩文正書院記書院在蘇城中吳縣西隅通衢之上祀宋大賢范公之祠也按范之先世自北徙南而居於吳公生於武寧官舍長仕中朝而薨於徐子孫奉其柩塟河南萬安山而祠於是者以公父母之邦且其地本范氏舊業公嘗經理作義莊以贍宗族者也當宋咸淳丙戌太守潛説友始請於朝立專祠祀公元末至正甲戌郡守吳秉彝又奏改為書院而以公之贈諡表其門閭舉其族之嫡嗣主奉祀事義莊田宅悉附天平山三太師墓所逮際昌朝大新禮制遂以書院登諸祀典春秋祭享郡之官屬師生與其族之子姓咸集祠下行禮著為定規彰彰詳備可謂盛矣然自國初至今百有餘年而祠宇室堂日入於壊時雖脩治而功費浩穰率未能完美如舊今主奉從規與其族人屢欲經營顧力弗逮所頼郡守劉侯為之規畫又值嵗祲公私多故未克就緒適監察御史劉公持節按臨爰自下車洞燭幽隐發姦摘伏而下無遁情洗寃滌滯而犴無留獄且不翕翕希同矯矯附異數加延訪以革猜防故政不迷而廢墜畢舉於是郡守得以祠事白公公曰事神治民敦崇風化郡邑首務有或不然非憲體所當究乎夫事有經權時有可否貴在變通使無偏廢可也矧先賢祠宇風化所關宜亟行之勿怠吾亦為之處焉用是親詣祠中纎悉畢視黙運㝠思酌量措置悉付長洲令劉輝典史張灝董之而責其成令亷慎老成謹於趨事曽未踰時凡祠之敝者一撤而新之言言赫赫加於舊觀邦之士庶來瞻來仰靡不驚歎莫究所繇盖是圖也材給於上而官不知費力役於下而民不告勞神享其成而族頼以芘一舉而衆美悉具非善於謀敏於事而公於心者未易臻此衆方落成㑹監察御史戴公廵歴至郡詣祠見之極加稱賞曰盛事也不可無紀於是令與主奉數過丘園以記為請予惟文正公之髙風大節彌兩間而冠百世者登諸國史載諸郡乘而雜出於譜傳紛播於品題者不可勝書至今庸人孺子一聞公名皆知敬仰故其平生所至存有生祠没有廟祀者不約而同於以見秉彝好徳之誠不以古今彼此而有間也况公父母之邦精神手澤所在則凡生於斯仕於斯者有不加之意乎是宜賢監司良守令之用情於是也第顥晚生末學淺見寡聞不能加豪末以光盛事為慊然嘗聞之記者取記其事實信今傳後不失其真乃可故敢原其始末畧其彌文而為之直書云侍御公名魁字士元髙唐人戴公名仁字以徳句容人郡侯名瑀字汝器蠡吾人皆以進士歴顯融所至有聲不係諸此不書成化十七年嵗次辛丑九月既望大中大夫山西等處承宣布政使司右參政太原祝顥著奉訓大夫南京兵部武選清吏司員外郎長洲李應禎書篆邑人陳俊刻滸墅鎮宋文正公范先生書院記先生蘇人也滸墅蘇地也原非居里書院祀焉矯俗也蘇之往哲多矣獨䖍者就人所知耳前乎先生固有其人後乎先生亦未嘗無人先生去今四五百年卓然之風青天白日滸墅談者了了如見先生何所待而興其豪傑之士歟予觀所為之事皆今人所當為者兹滸墅出風氣之表躅遺芳而著聞者幾人耶使先生所為矯情媚世以大其美則不可為矣惑於一時隨後攻之矣欺於無知者難逃於具目矣今猶能大理於口耶使先生所為戾於人情之常亦不必為矣根乎天理之正不奪於私順乎人心之同不牽於怪今何憚而不為耶使先生所為優入聖域非衆人一蹴可到而為之不及猶可諉也人皆可以為堯舜奚先生之有哉人自絶之先生始孤髙於前矣能自奮者肯曰我之形骸欲役倫羣類聚靈於萬物造化賦予無少虧欠其志行獨不肖人道誰其厄之寧不負所生哉企其懿去其不懿務去其媿求至其企企之弗至弗措焉業儒也豫天下事於胷中擴良心以有為義理所在礌礌落落舉而措之篤近舉逺毋顧忌毋退遜毋戾毋比毋襲毋俟毋已有隨所處而惠澤流衍不逐逐於虚聲而寡實效窮逹一致泰如也先生之矩歩的矣身雖齊民不死其良心推平旦之好惡逹於膠擾之際由家庭而宗族隣里鄉黨交與勉為忠厚而狡詐是恥老窮不遺强不犯弱衆不暴寡自拔鄙陋而惇爽矣今滸墅也誰其人歟盖有之矣苦傅畏咻莫孑其歸也安得懿其俗哉予固設義塾敦教事矣見廣福菴右畔别墅一所幽邃軒豁林木蓊樾日惟藂族賭博蠧俗尤甚令顧澤輩推餘工葺頽益新玲瓏户牖堅甓屏壁創重門拓院落充廣翼宇完潔堦砌暨雘煥然邪塑盡徹設先生木主於中堂嵗時特牲祀之掲扁樹碑以昭不朽屏浮蕩之迹寓諸生肄業昕夕仰瞻而企慕脩為誘之孔易矣有來於堂均得觀感則勸𢎞矣競力全好則先生之懿不擅於一身不止於一時不拘於一方受賜衍賜沛然無既矣猶或有無自待焉得謂之學哉得謂之人哉唯肄業諸生脱落自强為民之先可也或有過其齊民之望不知予之初意也風俗所以難振鈞是人也睎驥驥乘睎顔顔徒存乎其人不甘自誣何難哉或謂非後學之極致予恐作輟相勝户庭難跂足也行逺登髙此莫非發軔之地尋向上去自莫可禦但戒自足耳先生事迹六一碑悉今人莫不知不複具仲尹之事有投杼之疑當闕之書院成仍令守於僧毋仍傾圯焉嘉靖辛卯嵗仲夏賜進士第奉訓大夫户部員外郎懐寧後學天池方鵬撰建三公堂記三公堂者祀大師徐國公夢齡唐國公贊時周國公墉也周為文正公之考而唐為王考徐為皇考云按祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏迪殷周更立而不變三公堂所由始也粤若我世宗嗣位之初尊師重道稽古禮文首勅天下建啓聖祠於學宫上祀孔子父叔梁紇大哉聖人之制作炳越千古矣夫為子者居以王者之庭享以王者之祭為其父者曽不得妥以專祠薦以一牢豈人情乎禮曰天尊而不親然人思事之者以其有生物之功也况毓靈蒼際誕生𤣥聖與斯民立命者乎范乘載三公者或仕為節度判官或檢校少府或掌管書記皆著有勞績以曽孫之貴追膺封典文正功徳𢎞茂獨盛當時而宋室湛恩汪濊報亦隆矣范氏忠烈廟在吳縣徳鄉讓原笏林之陽墟墓在焉而三公祔諸寢室郡城義澤莊亦止及文正而三公故缺也迨侍御史洛陽温公如璋持節按吳周爰展視仁率義起令於祠後創建三公之堂檄下郡丞茶陵龍公慶雲經理其事亡何以瓜代去繼為董公堯封亦洛陽人也至則亟覈祠工更議坊制矣先是邑司以時詘財殫頗艱厥任適鉅家徐姓者誤扞憲網恥受汙名請以金贖聽輸工所官第籍記之梓材既集匠作斯興驅運之勞不擾於鄉呀呷之聲無驚於市地素窪塹墄而平者肅坻數級筵堂三楹峻而垣墉翼而廊序巍而綽楔飾以丹堊圖以雲藻蜿蟺飛革煌煌奕奕工若浩繁再期而畢兩侍御之令迅於風霆丞一人之力神於不日矣三公者肖像於中旁以將作監簿純佑許國忠宣公純仁恭獻公資政學士純禮龍圗直學士純粹配焉濟美五世禋祀一堂由是衣冠之賔䖍奔式路來躋其堂為父祖者詒謀是思為子孫者繩武是媿過其門者雖或細流釋負弛擔徘徊顧瞻咨嗟歎息乃知憂樂之遺忠貞之報百世不斬若此范公可為而人顧不為哉此觀風者之績也司勲氏曰余觀兹堂之成而有感於大道之公懿徳之好矣夫闡崇先賢佑啓後人激世範俗非御史不能仰承徳意恪供厥職非有司不能上或宣令下或怠事有舉之而中廢者矣前人美意後人惡其不出於已也將有其始而多不克終者矣堂之成亦幸而遇其人雖文正功徳之感人協恭同好而𤣥貺黙啓其三公在天之靈哉范氏乃更立主堂右以祀温董及龍不忘報徳亦禮也為是舉者公十六世守祠孫縣學生以益偕其兄主奉惟立請於當路移書太僕卿惟一祠部郎惟丕從外交贊云落成之日告於廵撫都御史莆陽林公潤公嘉樂之亦為捐金以畢餘工時兵憲為南皮湯公賔郡守為廣平蔡公國熈郡丞為上虞金公柱涇陽張公雲鸑浮梁吳公宗吉節推長沙龍公光吳邑令漳浦魏公體明繼至者郡尉番禺招公夢賢孝豐吳公維京長洲令新昌吕公若愚也敏以從事者蘇衛經歴虞興舜長洲縣丞楊榮也並勒於石用戢恩私昭示來裔隆慶二年戊辰春二月望日賜進士第奉政大夫雲南按察僉事前吏刑工三部郎官國子五經博士長洲皇甫汸撰賜進士第前吏部文選清吏司員外郎翰林院庶吉士太原王榖祥篆蘇州府學生沈庭訓謹書提管世孫善耘主計世孫惟新督鐫重脩河南范文正公祠堂記賜進士第文林郎河南府推官臨清周易譔賜進士第中憲大夫山東按察使司副使郡人劉贄書賜進士第大中大夫浙江布政使司左參政郡人劉衍祚篆洛中舊有文正公祠其建置沿革誌悉之矣余戊辰登第初授河南府理刑冬仲月朔蒞任越六日宿汴城公署中夜分時夢戴幞頭著紅袍者來詣余詰守門者而問焉其吏應曰范文正公也余忽覺而異之已已春西塘後峯二公祖枉駕寅賔館告余曰文正祠之欲脩乆矣昔余輩未第時曽共董李村攜曹生滋蔡生承珮張生謳肄業於中往嵗呈守道澐泉董公祖府中新所張公祖俱有捐特因循未舉也幸卒成之何如余一聞其言黙然自驚曰前日之夢不偶哉文正公其諒余之可寄以興斯役也而來歟迺首捐俸金數星卜日飭材委主簿董子鳩工而肯構焉其令尹復新鮑子雅有同志亦捐俸補助之堂宇圯壊者隨即改築後起仰止亭俯睇龍門遥瞻嵩少河山形勝畢収一覧之中祠遂煥然一新矣祠前有井昔冲菴翁做秀才時所鑿以便一方之用鄉民日食寒泉之利翁之隂徳泯然無聞余復搆亭於上題其扁曰劉公井俾知享其利者知所自云工俱告竣西塘後峯二公命余言記之余辱舊治門下知二公之家世獨詳敢以不文辭乎竊惟士君子立身於天地間其建功樹業當垂無疆之休故天之報施善人奕世顯榮必有無窮之澤冲菴公振鐸平順雲巖公出宰真定二公雖詘於下位其學問淵源行誼卓越素推重於鄉評視文正公何媿焉故西塘後峯聫登甲第並司樞要况二公之弟衍疇辛酉鶚薦慎庚午發解諸子之在黌宫者蜚英馳譽詵詵然綿昌大之祚膺福祉之慶者猶未艾也視忠宣兄弟之貴顯又何讓焉天人福善之機余於二劉氏信之深矣鄉人升斯堂而登斯亭者寧不感發而興起乎故兹舉也在二公謂之顯其親在小民謂之樂其利在余謂之尚其賢固一時之盛事也若文正之徳業文章著在史册者尤詳余奚容贅特紀今日之事以見公之精神感召流行於宇宙者不朽而祀之興廢恢𢎞顧有所待而然也故姑為之記云隆慶五年辛未孟春吉日立石重脩文正書院記賜進士通議大夫南京太常寺卿前禮科給事中山東提學副使太僕寺少卿南京鴻臚太僕光祿三寺卿奏准致仕奉詔進階正議大夫資治尹長洲袁洪愈謹譔鄉後學陳爾見謹書并篆額文正公祠故義宅也范氏自唐以來世居此矣公既置義田義莊以贍其族之人又葺故居而拓之以出納其莊之所収以居族之無家者名曰義宅推先世之徳詒永乆之謀焉子孫嗣守不廢雖中更散亂遺澤依然咸淳間潛説友守平江以公徳業之盛宜百世祀請建專祠於宅之東至正間守吳秉彝奏改為書院迨我皇朝開大明神大化勸學脩禮崇古上賢以風四方祀典既定又即書院為祠而公私時祭子孫㑹食因以為常祠乆不無頽敝敝則葺葺者凡幾而壯麗為難今皇上萬厯二年御史餘姚邵公選自館閣代廵江南所至咨諏政務攸先民何以格心俗何以返古謁公祠下慨焉廟貌之弗稱無以樹之風聲若痌瘝厥躬乃謀之藩臬檄郡庀工一大脩治資以罰鍰郡守成安吳公承休毖事命吳邑魏丞正參董厥工經始迄落成凡五閲月先是御史温公如璋按吳議建三太師堂於公祠之北樹綽楔於祠南温公復命奉行者急於苟完地未堅平材多觕瘠無幾何時臲卼陊剝䵝昧弗莊羣情靡寧至是重檻巨棟髙扉邃龕神靈攸妥罔不尊嚴前後堂宇門廡周垣暨茨丹雘罔不精整徹舊而増新則坊石堅貞宫牆赫奕建先憂閣於祠左與嵗寒堂對峙蒼白相凖神氣固完不煩府庫不疲民力而績效倍常矣三年七月癸卯御史率司屬陳牲䖍祀告於祠文辭深厚燦如也洪愈密邇公祠樂聞盛典秉誠晨詣佇公之門怡然髙望而逺志焉拜公之像黯然沈思而内愧焉作而歎曰嗟乎自古傑士名流豈少哉當時則榮没則已焉偉烈休聲震耀千古直與泰伯子游相等埓惟公一人而已豈非禮義之宗盟道學之師範邪盖嘗以先憂後樂揣公之心公何好憂而惡樂如此哉伊尹曰予弗克俾厥后惟堯舜其心愧恥若撻於市一夫不獲時予之辜夫曰愧恥曰予辜其能勿憂乎公之心事固如此或以公當盛世而常不忘憂此不知公者也世必時雍迓衡然後可以言盛真仁時可遽許乎即公所為不合於時者皆不得已也公所見惟理所存惟理所言所行惟理公故不得大用於時然當時君臣固已愧悔恨惜矣後人之思慕景仰而崇奉乆且益篤豈不以理根於心其天有不死者乎吾儕讀聖賢書餐君之粟藉慶於前人而樂利憂窮懵然於理者皆公之罪人也公嘗有言吾儒之職舍先王之經則茫乎無從矣奚暇學人之巧失其故歩但惟精惟一死生以之此公之學術生平所以自立也學不通經無以致用而立志者學之基也讀書刻厲數年長山數年學舍不解衣不嘗肉不窺寳藏不觀法駕大通六經而後出而有為學者之志能有如公者乎希賢在我可以深省矣夫善治者繩人以法不若化人以道喻人以言不若感人以心執樞要揚芳風因人心之自然而鼔舞之不待户説以𦕈論而天下化此知治之本者也邵公此舉得之矣時藩參臨川舒公督儲憲副永嘉王公飭兵協心同徳樂觀厥成吳公奉職循理治平稱最夙辦於此無難也魏丞雅敬先賢奉公竣事亦可嘉矣文正公十六世孫太僕卿惟一念祖紹烈創謨傑構主奉御醫惟立守祠庠生以益十七世孫鄉進士允謙皆殫慮蕆材共底厥績不可以弗識也邵公名陛舒公名化王公名叔杲吳公名善言皆以進士髙第為聖朝名臣亦一時之隆際也洪愈淺聞不能究宣受命吳公辭之弗獲謹書此以為記又賜進士出身中憲大夫浙江提學副使文正十六世孫惟一謹撰先文正公在當時凡宦遊所至各有祠而吳為公鄉郡宋咸淳甲戌潛公説友守郡請於朝即公義宅之左建祠祀公而撥田以供祀事至正丙戌郡守吳公秉彝以書院易祠額而承務郎李祁記之大都謂公功被當年澤流後世未易殫舉惟是首請天下郡縣建學捐已地建郡學授横渠中庸延安定太學有功名教啓宋道學之源盖祖紫陽之論云入我明宣徳甲寅郡守况公鍾成化丙戌廵撫劉公孜辛丑廵按劉公魁先後葺脩之嵗乆漸圯且祠南岸地昂林木聳鬱堪輿家每言祠庳不稱法宜加崇以昌後𦙍嘉靖甲子侍御洛陽温公如璋按吳是年冬惟一以浙臬使入覲謁公郡臺言之公忻然諾行郡於祠後築坁數級建三公堂五楹祠公皇考徐國王考唐國考周國視公祠特峻起以應堪輿家之言而郡丞龍君慶雲經理其事請以公四子將作監簿純佑許國忠宣公純仁資政殿學士恭獻公純禮龍圗閣學士純粹配享左右皆所謂禮以義起者也已董公堯封代按至與温公同邑合志復樹綽楔於祠前題曰世濟忠貞丹堊赫奕益増舊觀矣方三公堂之初議建也今兵憲永嘉王公叔杲時以海虞令治行髙被召未行温院檄公覈之公議工直若干㑹吳尹秦君崢議與公不合故縮其直以苟完塞命堂既崇敞而梓材不勝任以故不三四年堂且就傾惟一與諸宗人方憂皇之顧計未能舉也今侍御餘姚邵公陛奉天子命代廵江南謁公祠而歎曰予責哉迺謀諸糧道大參舒公化兵憲王公郡守吳公善言委吳邑丞魏正參督脩之自祠徂堂自門及廡工材並飭堂加四壁鞏以陶埴轉傾為堅易故以新先年武功伯徐公有貞所題祠左右文正義澤二坊亦咸整治采繪炳然又於祠左建先憂閣三楹森出雲漢之上祠前臨河圍以石闌南岸列之照屏以障林木盖自有祠以來歴四五百年而祠之制乃大備於今日魏丞祗命恒宿祠中兩道暨郡侯時程省之工凡四閲月而竣直取贖金工從傭役㕓市無驚氓黎不擾侍御之威令道府之襄勞豈非交相贊者哉七月癸卯侍御自製文祭文正公以告成事畧曰陛也踐公之鄉景公懿軌新公之祠敬陳奠饋期與百僚凖公為標各脩職業以翊聖朝嗟乎侍御固抱先憂之志與文正曠世而相感者哉乃惟一讀是文不覺感而泣下因對宗人諸長老言惟一向列士林回翔且乆無所建立竟免以歸慚負先憂之訓多矣今侍御功徳我范甚大當為立主與潛况温董諸公並祀祠中以無忘報徳且以詔後之子孫庶幾聞而興起不致如惟一之徒貽悔於噬臍也諸長老曰是是因命叙記以鑱於石祭范文正公文賜進士第廵按直𨽻監察御史邵陛撰范公之祠於吳盖四百餘禩矣今萬厯三年乙亥餘姚邵陛以監察御史代天子按吳中得拜公祠而見其有頽圮者謀諸參政舒化副使王叔杲知府吳善言等亟命工葺之事竣乃諏得七月七日癸卯寅率司屬以清酌少牢之奠而昭祭於公之神位曰昔聞在宋多賢大臣厥賢伊何公其一人於惟范公秉道踔卓天下自任先憂後樂始居校理風裁獨持蘇州再徙越有名師四論迕時三臣坐竄為國當然於公奚憾延中失守忼慷廵行纍纍羌漢公有其城經略中原軍雄一范富哉胷中真時宰相天章十事咸仰徽猷台星弗耀遂隕徐州於惟范公學本忠孝誠信所孚焉往不造矜賢嘉善士多及門義田之創族有餘恩公雖兼才若無能耳公位不盡公徳至矣公之存也屢擯殊方朋黨之議抑而彌揚公之没也碧騢狂訕白璧之輝乆而無間遺範孔嚴廟食萬年以專奉公法有合焉陛也踐公之鄉髙山伊邇懿軌㬭然於今猶古顧斯簡命期我百僚盡法於公以翊聖朝棟宇重新拜公廡下先於蒸嘗陛其奠者一以自罄仰止之私一以相朂儀刑在兹時代有遷祀公無斁尚使雲仍沾其世澤南睇遺封迢迢洛陽靈其不爽來乎故鄉尚饗鄉後學周天球謹書重脩文正書院記賜進士資政大夫太子少保禮部尚書兼翰林院學士予告三賜存問華亭陸樹聲撰時年九十六皇明任子中憲大夫知漢陽府華亭孫克𢎞書并篆萬厯甲辰御史馬君奉命按視吳中興賢軌俗率先風化乃首謁范文正公先生於故祠仰視榱棟旁周門廡咸摧圮不治乃喟然慨歎與郡守李侯謀所以新公祠者於是陶甓度材不半期而告成公十七代孫主奉太學生允觀十八代孫諸生必溶率族之子姓再拜徴予文為記用副御史馬君表章先賢鉅典予惟公事蹟載在宋史若歐陽公神道碑考亭名臣錄不啻詳矣予耄謝筆研乆則烏能記公獨念公少而孤貧塊處一室饘粥不贍進士釋褐鬻馬徒歩而歸及為執政焚黄姑蘇僅摉庫絹以散親戚閭里知舊小有俸餘捐置義田南園數畝地又推之以建郡學度公平生殆未嘗享有一日士大夫之奉者夫同一吳耳當時士大夫良田美宅與其人轉盼俱盡即其人亡其姓名存誰復為之禮一瓣香薦一杯水者而公之祠至今獨存百世而後御史又相與撤蠧而更新之則士大夫不當以此易彼明矣公為將相時邠慶二州之民與屬羌皆畫像生祠祀公及卒羌酋數百哭如父齋三日而去祠滿海内一祠又何足為公重輕特以吳故鄉父老丘隴所在子孫旅食於義田者歌哭祠下公其賁然而來思乎未可知也吳中祀典最著者泰伯子游暨公而三公遜田贍族舍宅建學有泰伯之心以春秋授孫明復以中庸授張横渠又延胡安定入太學為諸生師濬發道脈於濓洛關陜之前其功又與子游學道相表裏豈若鄉先生没而祭於社者等乎御史特新公祠盖推本公為宋儒理學淵源之祖使吳人以公重吳俗亦以公厚凡士大夫有意収恤其族人而加禮於學校者過公之祠或尚有興起焉是不可以無記御史名從聘靈壽人郡侯名右諫豐城人並已丑進士而贊成其事者公十七代孫乙未進士今滇中學憲允臨也例得附書萬厯甲辰八月吉立金山建范文正公祠記賜進士出身文林郎知常熟縣事長水譚昌言撰文十七世孫允臨篆并書嘗稽往牘若越王之念蠡文公之念子推伍子胥之念江上丈人彼非有血脈淵源之𣲖則銜徳慕義精相注而神相馳也以今睹於揮使范公允夫念其先祖文正公於數百年之後乃首倡議而創祠以祀此其精神所嚮往至深逺已古今人豈不相及哉公之𦙍子揮使君必忠以治兵與余共事海虞恂恂惟謹且誠不敢自戾於度以速官謗以辱我先文正以負家大人之明訓迺從容述尊君揮使公祠文正之始末而祈余記盖公文正公十七代孫國朝有髙祖廷玉以吳縣廪生教諭密雲故於宦次子天祐獲軍功擢指揮同知世官永清左衛迄天順已卯始調金山金山去蘇郡三百里而遙文正祠堂向建於蘇郡學宫左羣族之子弟崇祠之至今獨公以道阻故每不得展謁奉蒸嘗心實惻然曰報本反始自昔重之髙山仰止情何能已遂具專祠之議請於當路當路以為可於是度廣基聚材鳩工始於癸卯嵗孟秋成於甲辰年季夏廣霤延蔭衡闌擁衛堂宇翔矯牖户通潔翼翼然寢廟聿新矣事既竣公率其子暨族人拜而祭焉海濵之人圜集而觀焉斯時也念先憂後樂之懐則恢狹小為廣大可以勸志念青天白日之心則變闇沕為光明可以勸徳念破膽寒心之頌則振巽懦為威武可以勸忠章縫念之而檢不渝編甿念之而樸不鑿萃渙合離移風易俗厚之道也教之始也豈直脩祀禮伸孝思云哉嗟乎維水有源其流斯逺維木有本其枝斯蕃乃所以培植而疏瀹之者人也周公肇封東魯一以親親為亟遄遄追念文王且上而追念后稷無忘本始以故開業傳世侯封千載視他國獨緜長不已輓近士大夫紆朱懐金勢雄閭里以輿馬宅第相矜耀而尊祖敬宗周黨睦族之禮闕焉弗講以希保世滋大庸可冀乎若公者篤水木之忱敦親愛之誼迹邁流俗躬持古道其為子孫衍餘慶可知也固樂為之記俾勒於石以俟後之人有所鏡而念焉萬厯三十二年六月日重脩滸墅文正書院記馮夢禎撰宋范文正公學術則為純儒立朝事業則為純臣垂範子孫則為賢祖宗而師表百世則為殊絶人物公故吳人也少遭閔凶流移轉徙以致顯逹故京雒齊魯間皆有公名迹既貴復歸吳故公廟祀遍於南北吳中尤盛公之一言一行遺風餘烈無論士大夫争為傳述即婦人女子具能言之故其廟祀所在即至衰歇化為荒烟野火而士大夫好古嗜義者輒能飾而新之以樹世教盖不獨愛人思樹秉彝好徳之心不可泯沒而公之風烈精神實有以鼓之矣公嘗讀書濟南之長白山中其卧起游歴處至今遺踪彷彿可睹民部郎𣙜關王公者濟南之新城人也少嘗挈子弟讀書其處禀仰風流追玩遺跡依依不能釋去既貴宦游又得蒞公之里其於公似有夙緣以故樂新公祠滸墅隔水廣福菴之左故有文正公祠王公初至脩謁見其堂宇頽然階下雜沓心動而未敢言㑹學使范長倩相見語及祠之所以頽紊狀詞色慘然而以重脩為託王公唯唯其明年乙已乃偕承祀范生允恒按行其處則知為守祠宗人彦倫者挈其内姻沈某同居沈又挈其姻黨擅造私房横塞神路其他匹居羣處者尚纍纍也王公繩以三尺逐之他徙選耆民二董役始新正堂添造兩廡繪公遺跡又添儀門以分内外杜塞旁竇外為大門門左右以居奉香火者餘俱嚴禁凡以工計者若干為費若干祠既成當樹之碑以識成功詔不朽而范生允恒者故嘗與余有筆硯之舊乃令為介以記請夫古之君子先成民而後致力於神以余所聞王公初至念近嵗取民無藝所征科額外例溢加一亟令損之及額而止關南蘇松杭嘉湖五郡興販小商船叩關者向入科税今一切蠲除商民咸徳之積有羡餘以待公用報之兩臺使者不入私槖盖王公之所以成民者至矣而後斥其餘力以飾先賢祠宇合萬姓之驩以申馨香之薦文正公在天之靈寧不亟享之故吾謂惟有王公之稱職而其崇祀先賢為可稱也若其職業之隳棄民力之不存私槖之是營而欲以媚神瀆祀託先賢以文其短神之聰明正直寧不吐之何以稱焉又嘗論之君子之澤及子孫者雖至逺不過五世十世而其風之被於天下及後世者每至於無窮即如文正之祠圮之毁之乃其典香火之子孫而脩復飭新者則風馬牛不相及之齊魯縉紳也是故君子之脩身善世亦慎所以風之者而已至以先祠為急白之當道以綿其世澤如長倩學使及允恒者亦范氏之賢子孫也因並記之若長白山祠堂則今少師申相國記之其文髙古典則足光盛舉又逺非鄙陋所及姑以承王公雅意云爾范文正集補編巻四欽定四庫全書范文正集補編巻五碑記新建河南范文正公祠記賜進士第知洛陽縣事太原古交武攀龍撰宋魏國范文正公葬伊闕萬安山下其子忠宣公置祭田八百畝熈寧開創褒賢顯忠寺以奉香火然而祀事未備也自元守臣郭文鼐始請舉祀遂循為常典云厥後修祠墓禁牧樵者代不乏人而兵革相尋荒頽日甚求其故蹟胥委之寒烟蕪草之間余既建程夫子之祠於中邵先生之祠於左復闢西偏之地為公之祠堂使天下知公之忠義在朝廷勲猷在竹帛世濟厥美在累朝而祀事孔眀在萬禩也祠既成長平同年龎子太樸適過余顧謂余曰公之建兹三祠也其以表宋之大儒與宋之名臣也固矣第四人者時地既不同出處亦各異胡鼎峙而為三胡珠聨而若一其有意為之耶抑無心合之耶豈非道徳事功可一以貫之耶亦豈繼往開來高譚名理之人出將入相固不難耶又豈非先憂後樂慨然以天下為已任者其於聖學淵源顧未嘗無所得耶噫是其作祠之意寧無是耶余俛而笑抵掌而應曰有是哉相與酹酒祠側舉而記之石上時順治八年六月吉日縣丞傅夢祖督工鄉約曹俊傑重脩先文正魏國公墓道饗堂碑記先文正宋太師魏國公薨於徐從母氏謝太夫人兆葬於洛陽萬安山并其子監簿公純佑忠宣公純仁恭獻公純禮龍圖學士公純粹以下三世皆附焉公做秀才時即以天下為已任大通六經之旨文章必本於仁義先天下之憂而憂後天下之樂而樂以名世之才致位將相正色立朝亟意尊主庇民歴官過化靡不繪像立祠故有泰山北斗景星鳳皇之詔第一流人物之稱世濟忠直有功名教因與天下之名山大川前代之聖帝眀王並登祀典毎嵗上已有司奉中牢祗祭及世代沿革子孫散處望白雲而仰止芳草萋萋至大中八年世孫國雋履其中得同知徐公景儒為復侵地至正七年國俊從弟文英命其子廷方致命李君公平時分憲於洛率所屬奉牲帛致祭服豪猾以歸化而復徐君所封之故土繚以周垣樹以松楸又築室六楹俾趙氏隣民廬其上以守熈寧間創褒賢顯忠寺為立香火正統戊午都御史陳公鎰訪公墓於郡守袁公錠按褒賢寺碑求其規制遺規偕十三世孫曹縣令希正㑹祭葺脩既而憲副尹公禮按部率官僚奠拜墓下新其牆垣饗堂立門植柏令洛人一户免徭役守之成化乙未十三世孫從規詣都憲洛陽畢公移檄河南都憲張公下令正其塋域禁其樵牧而一時大參孫公伯少參蔡公克存副憲王公廷秀僉憲馮公景陽協力從脩盱江何喬書其事兼製迎饗送神之歌遺子孫以侑牲醪𢎞治四年都御史徐公恪巡撫兹土慨然太息而藩臬守令封築一新第文章事業炳後世之景行故誦詩讀書勤千秋之向慕惟是一坏之土無嫡裔守丘毎致斧斤芻牧相尋不無水源木本之痛審處其間乃復蒙公遺文召取吳中後裔迨眀季鹿奔潢池弄警石麟卧於宿莽松韻泣乎秋風大清定鼎詔凡古昔帝王先聖前賢忠臣祠墓毋得毁棄適余姪承祖特奉簡書分巡河洛未幾余姪承祖復膺寵命出鎮兩河掃墓登山殷思先祧時余掌事秘書院輟政居家調苓煎术念先人體魄弓履瘞藏之地乃走書千里督諭兩比兒曰汝謂承祖承宗矣顧名思義其亦何居伊洛瀍澗之濵祖宗之宅兆在焉荆蓁草蕪得無芟與牛羊樵牧得無禁與斷橋破壁得毋飭與供祭土田得毋清與守丘支庶得毋盻與於是乎革眀堂之隘陋祛斷水之湫汙擴大厦而就濃隂開繚垣而成直道添設耳廡昂軒星門甃兩岸以駕虹墾荒烟而培樹更買六尺之花蹄給八家之蘘薛命勤於耜庸潔蘋蘩遙望蒼雲鬰嶺眀月印溪依希夜雨青山矣而分府大參朱公衣助河南太守甯公之鳳汝州刺史秦公耀名洛陽令葉公琪各捐金助役謀建華表擎天石柱以公無忝於雙槐華衮標題眀徳允馨於百世亦既賁泉扃之光而錫雲仍之福矣家書報竣喜溢滋惶切余不肖叨承顧命參政中書未克繼先憂後樂之遺志實自愧出將入相之家聲乘六龍以御天慢謂經綸天下躋三公而嫓位甘􅐽粥之餘休惟敦睦宗支彌縫衮職罔敢渝越為家法羞或亦山靈之所鑒而宗祊之所格也極睇牛眠蓊蔥松柏曷勝焄蒿之想至其經濟文行俱載文忠公勒石非所敢及惟記萬安山先後脩葺之由以示子若孫世守之而并誌諸君子之懿好如斯云順治十有三年嵗次丙申吉旦内院掌内翰林祕書院事纂脩大總裁太傅兼太子太師許陳國家重務大學士瀋陽後裔文程頓首撰文欽差整飭河南等處分巡兵備道按察司僉事陞山東布政司分守東兖兵備道左參議後裔承祖薰沐書丹欽差經理河南等處軍務鎮守河南開封歸徳三府等處地方總兵官都督府都督僉事後裔承宗薰沐篆額重建天平山忠烈廟前堂及儀門記徵仕郎翰林院檢討充纂脩眀史官文正公十八世孫文正書院主奉必英敬撰康熈二十有四年孟夏賜山忠烈廟前堂及儀門告成蓋庀材鳩工已六年所甚矣兹堂與門之成之難也粤自慶陽廟貌移建於天平之麓宋宣和迄今將六百載考之家乘重建者再矣其始也在元始祖之二十二年主斯役者為主奉諱邦瑞提管諱士貴而司計諱邦翰宗遜等佐之土木丹漆之費咸取具於義學餘粟廟成而前朝奉大夫牟公巘為之記經營者固勞矣未聞其難也其繼也在眀英宗正統之八年是時巡撫侍郎為廬陵周公忱巡按御史為壽昌劉公甄武昌劉公仕昌錢塘鄭公顒知府為李公從智以及隣封之長四方之人先後佽助且責成於吳縣知縣葉公錫閲三載而廟成而吏部尚書王公直為之記斯役也出於衆力尤知其非難也夫前者值元代輕賦之時義學方興舉不墜後者又當眀盛時宦兹土者崇重儒先百廢具舉宜乎其廟之易成也今則義學久廢安從取粟異代賜廟亦何關於國事况乎空山逺道車騎罕有至焉則兹一堂一門之成也不較難於前人哉必英自十年前主祠事時郡城書院門燬於火且為守祠者斥賣幾盡浙江巡撫忠貞公諱承謨者蠲金贖之復為修整其什之五書院麤具規模後英繫官京師山祠復告將厭焉於是以義田贍族之粟委之提管可詢主計彌隆安上及子能洪能濬等令其鉤校畸贏積絫錙銖次第興工猶苦不足逮英請急歸里為㑹計稔知其難復令監簿房世孫興巖監收新租以充其費先後五載凡以粟易值得白金五百有竒遂撤前堂而新之惟石柱仍其舊較前為樸壯又以形家言移儀門於石橋之南建為五楹以兩夾室庥舊碑而池北周以石欄子孫瞻拜之地尤宏敞為費復百餘金許是雖一堂與門其成之之難如此烏可以不記乎或曰記當及於廟之成是舉不已遽乎英應之曰五年間義田再遘凶荒子孫共蠲升斗以襄厥成且董之者興巖勞苦為多尤不可没也若夫竭其心力以竣厥工實英之責他日廟成自有當代名公鉅卿豐碑深刻如牟王二公者英也何足言記乎惟是後人之覩斯堂者勿視為元眀兩代之易而忘今日經營之苦是則英之志也夫賜山舊葬文正公高祖麗水府君曽祖考徐國公祖考唐國公考周國公及孫子儀公并諸子姓有功義莊者其墓道嵗久漸淪於莽因令興巖培土立石以識之㑹與廟工同時竝舉附勒於此乙丑夏四月必英再記文正書院世徳源流碑記康熈甲戌之春承勲以滇黔制使召為御史大夫未幾改制兩江特敕馳郵之鎮其秋涖止金陵即奉命與浙江㑹視震澤暨吳淞水利孟冬來吳公務既竣乃展謁在城先祠及省視諸墓道族之父老子孫長幼畢集獻酬飲畢僉以修祠請承勲作而言曰是固先文肅公之志而仲兄忠貞公未竟之事也微父老言固將竭蹷以從今又以為請敢不敬諾謹按譜牒我遼瀋一支出自忠宣公子子儀公諱正國累官荆湖漕運使宋末扈從隆祐太后至江西卜居臨川三傳至恂儒公諱良儻者仕為迪功郎自臨川遷樂平因世為樂平人恂儒公傳六世至景申公諱岳者眀洪武時以通經授雲夢縣丞失火延焚巻籍謫戍遼東瀋陽中衛後所建文初遇赦還家子匡十七公諱孝文者留瀋陽匡十七公三傳而至瀋溪公諱鏓者登正徳丁未進士至兵部尚書瀋溪公又三傳而至我父先文肅公諱文程官至内秘書院大學士溯厥源流則文肅公為文正公十九世孫而實忠宣房之嫡裔也先是瀋溪公筮仕水部筦𣙜武林始得詳樂平謫戍本末後乃建大司馬坊於其邑示不忘本云至先文肅公又得詳姑蘇至江西原委自是水木本源洞然眀白順治年予告後擬請命南歸謁祠上冢初志未遂諄諄以屬承勲兄弟而仲兄忠貞公隨撫越制閩凡三過吳門必展祭先祠見其摧圯幾盡祖像不蔽風雨亟捐貲度材陶甓鳩工改作先葺正寢以恪其典禮嗣葺三公堂以安三太師之神鼎新嵗寒堂俾子孫報享有所復建先憂閣於祠之左門廡垣牆方欲一切興舉而逆藩告變公遂殉節海疆於是乎遺其責於後人嗟夫非承勲之任而誰任哉然又不敢先私而後公以故甫履任即出俸緡倡脩聖宫之在省㑹者工既成乃從事於家祠遵忠貞公之規畫而加毖焉世濟忠直及文正義澤之坊一郡之觀瞻也工最急宜首河以南大垣一祠之屏蔽也工亦亟宜次然後建後樂樓於祠之右與先憂閣竝峙稱雄工又次之又於巽地廢基特創新祠以奉文肅公主而以先兄忠貞公從祀焉工又次之忠宣公舊有官祭特祠鞠為茂草春秋權祀於先憂閣下心竊恫焉乃重葺舊諸賢祠改為忠宣公祠以為専祠地而以文肅公舊祠改為諸賢祠以報先賢之有功於義莊者復於東南隅建祠以祀土地之神而眀禋於是乎咸秩矣嵗寒堂饗亭廢久陪祀子孫曝日承霤無所庇乃復建立如其舊又作門加扃鑰焉於是乎旅進趨蹌而不失其度矣至於四隅隙地有鬻於他姓者盡償其直而還諸莊於是乎經界正而侵牟無所容矣凡此固承勲之所以述忠貞之事而皆所以繼文肅公之志者也夫以我文正公之徳澤而又承以忠宣公之忠孝父子事業照耀天壤似難乎其為子若孫矣今其苗裔散處四方者多有唯我遼瀋當有眀中葉風㑹未開乃篤生我瀋溪公其歴官立朝樹績不朽相傳有洛陽水月及范青天之謠士民謳思至今又數傳而及我文肅公為開國翊運功臣凡此皆祖宗積累深厚是以代有偉人應昌期而挺出為宇宙扶綱常植名教非特一家之俊傑也今承勲待罪兹土不能於祖功宗徳有加毫髮而但淵冰自懍上報皇上眷顧寄托之深恩下副祖宗父兄期望責難之厚意故於祭告時矢諸几筵之前苟玷宗風有如皦日唯欲令後人指而目之曰此真不愧清白吏子孫者也他何求焉癸酉之冬承勲自滇來朝奏對留浹月辭還皇上親灑奎章賜臣承勲四字曰世濟其美乙亥之嵗閩撫臣請特祀臣兄於閩皇上宸翰重褒賜臣承謨四字曰忠貞炳日凡此皆萬世難遇之恩榮而可為祖宗光寵者也祗勒御額恭掲祠楣以昭示子孫於勿替云後之觀者步范家之園撫十圍之樹俯仰今古前人之流風餘韻有宛然如在者乎儻由此醖釀栽培元氣愈固則根本愈深而暢茂條達自不期然而然矣安知不又篤生偉人如上數公乎所望我後之感發而興起者無窮也工始於乙亥七月以丙子五月落成謹識其實於麗牲之石如右所云勷其事者則有文正十九世孫監簿房孫主奉能濬例得附書康熈嵗在丙子夏五月吉日總督江南江西等處地方軍務兼理糧餉操江兵部尚書兼都察院右都御史加三級文正二十世忠宣房孫承勲拜手謹記兼書文正書院世徳源流碑隂記祠始建於宋咸淳甲戌蓋四百二十餘年於兹矣其中堂寢廊廡樓閣垣屏坊亭綽楔之屬則皆賴當時諸賢卿大夫涖兹土者相繼葺脩日有以益其闕至嘉靖間凡歴三百餘年而其制始備其成之難如此然規度既宏繕完不繼百餘年來日即於圯已酉之嵗瀋陽相國文肅公中子忠貞公撫浙道吳謁祠下慨然興水木之感乃為捐俸以營之庀材鳩工什居六七未幾而公以制閩殉節遂弗克潰於成又越二十餘年而今制府駐節兩江始得以竣其事凡而祀飲寢食教肄庖湢之所無不畢具前後所費不下數千緡而祠之制復備於今其成之難又如此昔文正公置義莊立義學以教養羣族而監簿忠宣右丞侍郎諸公為之詳眀規式指揮盡善請於朝而勒之堅䂥俾子孫世守至今不廢今制府紹文肅之志續忠貞之業父子弟昆殫心祖澤篤成烈而衍餘慶何其盛也此世徳源流制府述之詳矣竊念先大父少參公當義澤中落為割膏腴田十頃助入之以供脩祠贍族之費蓋文正公當日義田至有眀中葉僅存三之一田故最下而又困於賦不足以支而貧族仰給者且數千百指實藉是而少沾升斗之恵也暨先父檢討公早嵗登賢書即以清理義田為已任前後四十餘年間凡三主祠事興復舉廢脩定規矩凡族之貧且老者嫠而處者喪而無以為葬者子弟之能讀書者必加意優恤嘉矜激勸無不曲至先是天平山有忠烈祖廟建於宋紹興中於吳中祠為最先嵗久頽廢益甚乃倡勸子孫共捐義米更為斥其制而新之今閈閎階序嚴整合度皆先君子之力也當忠貞公之修復先祠也先君子實經理之既以未竟厥工為憂而今制府方開府粤西旋擢制滇黔乃萬里家書往復惟以修祠相屬今制府能踐其言而先君子已不獲覩其成亦可悲已能濬濫主祠事得挂名碑尾藉以不朽敢為序而綴之以誌徳於不忘且以諗吾族之父老子弟共相維持思所以善其後則尤能濬之所厚望也已康熈丙子八月文正書院主奉文正十九世監簿房孫能濬拜手謹記重建滸墅文正書院記先文正公祠宇遍海内而吳中為公鄉邦得奉朝㫖建専祠立書院載入國家祀典者尤非一所滸墅關武丘鄉文正書院其一也祠始建於眀嘉靖中懷寧方公鵬以户部員外郎來𣙜關設義塾敦教化掲祀公以示諸生典型即古鄉先生沒而祭於社之義詳華鑰義學記與陳大咸諸賢祠記中又於廣福菴之左特建書院以奉公祀毎嵗春秋部使者具牲牢謁祠下祭典具編關志其來久矣先是彭華鄉官署傍故有祠相傳公嘗降靈為土人舊祀既廢而方公乃建於此其後分司張公立愛葺修之而榜其門繼為族人佔居毁頓既而户部王公之都與先大夫參議公同年相友善屬之興復馮夢禎為之記世孫守祠生可維復増建三太師祠規制畧備興朝以來二十餘年又盡頽廢滸墅為南北莊馗名賢往來輻輳前賢建祠祀公風厲來學立意深逺顧以去郡三十里而遥子孫又復散處其平日之繕完灑掃責在奉祀之人守祠者賢否不等既居其中不一再傳遂有視同私産分析授受姻黨雜處甚或僦居取直聴其傾圯而不惜祠之廢壞大率由此康熈癸丑瀋陽族孫忠貞公承謨制閩來吳既捐資修建城莊書院及郡學祠時滸關僅存儀門一椽以棲神主庳逼破露不堪屬目㑹主事陳公於忠貞為年家子先君子檢討公因乞其一言為勸遂得倡助市木五十緡未幾陳公瓜代去而海疆不靖忠貞殉節工弗克舉祠木久貯河干復為族人廢去族孫生員安度與子君揆相繼為義莊提管矢志興建提學賛善許公督關馬公巡撫宋公咸分清俸以助其役於是首申理所售之木為賈若干繼請撤郡庠舊祠五楹得木瓦之材若干積諸當事及族人所助金若干不足益之以義莊所存舊租餘粟若干經始於壬申之夏至壬午秋乃成中建文正公祠旁兩夾室左崇徳報功祠右衣徳象賢祠後三太師祠舊祗一室今規而廣之一如前堂之制以及大門儀門凡若干楹周垣照屏廣袤共計若干丈若干尺門序正位輪奐堅壯逺過於昔蓋工力艱鉅時㑹有需累三十年而始克告竣實為關中賢祠之冠龍在旃䝉天子南巡至吳特賜文正公祠御書扁額因摹奉各祠擇吉懸掛於時子姓咸集奉祀生安炎歴叙前此廢興之始末而屬濬記之濬忝主祠事義不獲辭竊念書院之成皆賴當世賢公卿大夫優崇賛襄之力而尤念先君子與安度提管實始其事今君揆善能繼述經理督治以迄於成其功未可泯也因括其大畧而書之石自兹以往尤願關居附近子孫交相保護母使隳廢復蹈前轍濬之志也陳公名常夏陜西富平人遷蘇州郡守許公名汝霖浙江海寧人歴官禮部侍郎馬公名逸姿陜西武功人今任蘇松糧儲道參議宋公名犖河南商丘人今任江南巡撫皆以治行著聲於吳士民食徳而在吾族之生祠而尸祝者尤不容已此崇徳報功之祠所由立也謹竝識其名以著不朽云康熈四十有四年乙酉仲秋榖旦文正十九世孫主奉能濬拜手謹記并篆額二十世孫興禾書丹重建支硎山文正公祠記支硎山觀音寺者天平白雲功徳寺子院也宋制凡大臣塋所恩許置寺度僧追福祖先先文正公葬河南哲宗朝勅置功德寺以舊法㑹院改賜額褒賢顯忠禪院以奉香火今公祠及仁宗御篆墓碑俱在寺中而蘇州天平山白雲寺則公參知政事時以髙曽祖考四世松楸所在藉此寺照管准先降條貫奏賜今額為功徳寺間嵗聴度一僧以嚴崇奉至公仲子忠宣公登相位乞兩處遇節各添剃度行者毎嵗一名申尚書省禮部施行蓋前代優恤大臣以緜孝思於不匱恩意周渥此功徳香火院之所自來也先是勅建忠烈廟在白雲寺之右眀正徳中知吳縣事劉公恒以寺本為公奏請而祠反在旁於義弗稱乃於寺中復建堂祀公名曰正本俾守於僧欲其不忘厥主焉後寺經兵燬而正本堂亦廢支硎為天平支隴兩山聨亘相望眀初歸併天下寺觀其屬於白雲者凡六而支硎之觀音寺與焉遂為功徳寺子院信施所入分供白雲常住率以為常寺中亦崇祀公以為山主故皆為范氏香火院祠嵗久圯不治神主移供僧舎與釋像列坐族姓聚處山下者不下數十家嵗時瞻拜無所蓋兩寺香火僅有空名久矣先君子檢討公主奉祠事振興衰緒謀重建祠以存香火壬申秋以謝世不果濬仰承先志與掌莊執事房長彌隆彌勲彌熹興平興似興俊君訥君揆儀則儀秩等分董其役材用一取於義莊儲粟不以纎悉累僧人重建文正公祠三楹像塐如忠烈廟製外為大門堂階欄楯樸堅如度自相基㑹作凡閲八載而卒事祠門南向憑髙靣山蒼翠異狀逺而村墟藂落樹隂晻曖遊客箯輿隠見絶續者皆出於几席之下以嵗之春秋躬率子孫至祠下修報祀之禮凡族人借端侵擾常住者依祖規欺詐白雲功徳寺例有罸復上請於學院批襲奉祀生一人以司兩山祠廟奔走豆籩之職而香火院始克復其舊以落成之眀年皇上南巡駐蹕蘇州念先公為宋室名臣特賜親書濟時良相扁額四大字懸之祠宇以墨本給濬藏守因摹勒奉於兩山祖祠以示寵榮焉方濬之從事斯舉也客有詰之者曰白雲功徳之始也捨彼圗此毋亦以兩寺香火盛衰異勢將與寺僧規尺寸之利與濬應之曰非敢然也白雲之為功徳寺載之史冊人皆知之今頽廢殆盡用艱力鉅未克輕復且前此已鼎新忠烈廟矣去寺不數武報享有堂登降有序規制完善正本堂雖未建而香火固不患其湮滅也支硎去闤闠甚近惟藉春間匝月香火以供終嵗齋薰諷唄而觀者朶頥蠶食僧人空乏今祠既建俾子孫入寺慤然思祖宗式憑在是相與維持而保護之亦欲使見之者念先賢香火所留或生甘棠之愛不至盡剪伐之而後已在寺僧當亦不忘厥主體劉公昔日立正本堂於白雲之遺意則是役也上有以妥先靈下有以馭族姓守僧䝉其休遊人致其敬蓋先君子之志而濬之所樂觀厥成也客曰善夫是不可以不記也遂書而刻之於石康熈四十有四年嵗次乙酉仲秋吉旦文正書院主奉十九世孫能濬謹記并篆額二十世孫興禾書丹范文正集補編巻五
