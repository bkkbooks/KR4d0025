front:
  text: 和人遊嵩山十二題
  hash: sha256:6d0f5cee7c725a9448ca77b08060598d3dc4cae931ba91a7d57f2e2b71f751cd
body:
  text: 公路澗曹公與袁術常争據此地嵩髙發靈源北望洛陽注清流引河漢白氣横雲霧英雄惜此地百萬曽相拒近代無戰争常人自來去拜馬澗子晉登仙遺馬於此鄉人見之皆拜傳聞王子仙澗邊遺逸驥當時青雲路雞犬亦可致未必真龍媒悠悠在平地二室道太室何森聳少室欲飛動相對起雲霞恍如遊仙夢何以寵此行行歌降神頌自峻極中院步登太室中峯白雲隨人來翩翩疾如馬洪崖與浮丘襟袂安足把不來峻極遊何能小天下玉女牕􅆼窕玉女窻想像玉女粧皎皎月為鑑飄飄霓作裳莫學陽臺夢無端惑楚王玉女搗衣石但見嵓前砧誰聞月下杵金文與鐵色璨璨知千古試問搗衣仙何如補天女天門天門絶境遊熈然揖灝氣下顧莽蒼間雲雷走平地天威不逺人孰舊本作莫起欺天意天門泉天門有靈泉埃塵未嘗至日月自髙照雲霞亦輝庇惟抱夷齊心飲之可無愧天池嶽頂見天池神異安可度勿謂無波濤雲雷有時惡乘此澄清間吾纓可以濯三醉石巍巍八仙壇上有三醉石憐此髙陽徒如樂華胥域憔悴澤邊人獨醒良可惜峻極上寺徘徊峻極寺清意滿烟霞好風從天來吹落桂樹花髙髙人物外猶屬梵王家中峯嵩高最髙處逸客偶登臨迴看日月影正得天地心念此非常遊千載一披襟聽真上人琴歌銀潢耿耿霜稜稜西軒月色寒如氷上人一叩朱絲繩萬籟不起秋光凝伏羲歸天忽千古我聞遺音淚如雨嗟嗟不及鄭衛兒北里南隣競歌舞競歌舞何時休師襄堂上心悠悠擊浮金戞鳴玉老龍秋啼蒼海底㓜猿暮嘯寒山曲隴頭琴瑟咽流泉洞庭蕭蕭落寒木此聲感物何太靈十二銜珠下仙鵠為予再奏南風詩神人和暢舜無為為余試彈廣陵散鬼物悲哀晉方亂乃知聖人情慮深將治四海先治琴興亡哀樂不我遁坐中可見天下心感公遺我正始音何以報之千黄金和僧長吉湖居五題湖山湖山滿清氣賞心甲呉越晴嵐起片雲晩水連初月漁父得意歸歌聲等閒發水月千尋月脚寒湖影浄於天忽如嫦娥宫俯仰見嬋娟更約中秋夕長津無寸烟筠亭為愛碧鮮亭入夏敂敂至臺榭競生煙獨有清凉意髙岡鳯不來幽人此沉醉風笛風引湖邊笛焉知非隠淪一聲裂雲去明月生精神無為落梅調留寄隴頭人渚蓮武陵誰家子波面雙雙渡空積心中絲未成機上素似共織女期秋宵苦霜露酬葉道卿學士見寄世傳學中祿小子迺逢辰一入諫諍司鴻毛忽其身可負萬乘主甘為三黜人豈量堯舜心如日照孤臣薄責落善地雅尚過朝倫僅同龜在泥敢冀蠖求伸朱樓逼清江下睨百丈鱗羡此南魚樂不忍持鈎綸為郡良優優乏材止循循恬愉弗擾外何以慰逺民拙可存吾樸静可逸吾神漸得疎懶味下車將四旬嘉興風雅來觀對如天賔感兹韶夏音佐我臺上春和章岷從事鬭茶歌年年春自東南來建溪先暖冰微開溪邊竒茗冠天下武夷仙人從古栽新雷昨夜發何處家家嬉笑穿雲去露牙錯落一番榮綴玉含珠散嘉樹終朝採掇未盈襜唯求精粹不敢貪研膏焙乳有雅製方中圭兮圓中蟾北苑將期獻天子林下雄豪先鬭美鼎磨雲外首山銅瓶攜江上中泠水黄金碾畔綠塵飛紫玉甌心雪濤起鬭余味兮輕醍醐鬭余香兮薄蘭芷其間品第胡能欺十目視而十手指勝若登仙不可攀輸同降將無窮恥吁嗟天産石上英論功不愧階前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉伶却得聞雷霆盧仝敢不歌陸羽須作經森然萬象中焉知無茶星商山丈人休茹芝首陽先生休采薇長安酒價減千萬成都藥市無光輝不如仙山一啜好泠然便欲乘風飛君莫羡花間女郎只鬭草贏得珠璣滿斗歸和葛閎寺丞接花歌江城有卒老且貧憔悴抱闗良苦辛衆中忽聞語聲好知是北來京洛人我試問云何至是欲語汍瀾墮雙淚斯須収淚始能言生自東都富貴地家有城南錦繡園少年止以花為事黄金用盡無他能却作瓊林苑中吏年年中使先春來曉宣口勅脩花臺竒芬異卉百餘品求新換舊争栽培猶恐君王厭顔色羣芳只似尋常開幸有神仙接花術更向成都求絶匹梁王苑裏索妍姿石氏園中搜淑質金刀玉尺裁量妙香膏膩壤彌縫密迥得東皇造化工五色敷華異平日一朝寵愛歸牡丹千花相笑妖嬈難竊藥嫦娥新換骨嬋娟不似人間看太平天子春遊好金明栁色籠黄道道南樓殿五雲髙鈞天捧上蓬萊島四邊桃李不勝春何况花王對玉宸國色精明動韶景天香旖旎飄芳塵特奏霓裳羽衣曲千官獻夀羅星辰兌恱臨軒逾數刻花吏此時方得色白銀紅錦滿牙牀拜賜仗前生羽翼惟觀風景不憂身一心嵗嵗供春職中途得罪情多故刻木在前何敢訴竄來江外知幾年骨肉無音鴈空度北人情况異南人蕭灑溪山苦無趣子規啼處血為花黄梅熟時雨如霧多愁多恨信傷人今年不及去年身目昏耳重精力減復有鄉心難具陳我聞此語聊悒悒近曽侍從班中立朝違日下暮天涯不學爾曹向隅泣人生榮辱如浮雲悠悠天地胡能執賈誼文才動漢家當時不免來長沙幽求功業開元盛亦作流人過梅嶺我無一事逮古人謫官却得神仙境自可優優樂名教曽不恓恓弔形影接花之技爾則竒江鄉卑溼何能施吾皇又詔還淳朴組繡文章皆棄遺上林將議賜民畋似昔繁華徒爾為西都尚有名園處我欲抽身希白傅一日天恩放爾歸相逐栽花洛陽去天平山白雲泉靈泉在天半狂波不能侵神蛟穴其中渇虎不敢臨隠照涵秋碧泓然一勺深游潤騰龍飛散作三日霖天造豈無意神化安可尋挹之如醍醐盡得清涼心聞之異絲竹不含哀樂音月好羣籟息涓涓度前林子晉罷雲笙伯牙收玉琴徘徊不擬去復發滄浪吟乃云堯湯嵗盈盈常若今萬里江海源千秋松桂陰兹焉如有價北斗量黄金留題常熟頂山僧居平湖數百里隠然一山起中有白龍泉可洗人間耳吾師仁智心愛兹山水音結茅三十年不道日月深笑我名未已來問無端理却指嶺邊雲斯焉贈君子江上漁者江上往來人但愛鱸魚美君看一葉舟出沒風波裏送蔡挺代父之蜀朔風豈不寒蜀道豈不難之子代親行萬里心自安劍閣雪猶明錦江春未䦨到日必詩戰重登李杜壇鄱陽酬泉州曹使君見寄吾生豈不幸所稟多剛腸身甘一枝巢心苦千仞翔志意苟天命富貴非我望立譚萬乘前肝竭喉無漿意君成大舜千古聞羶香寸懷如春風思與天下芳片玉棄且在雙足何辭傷王章死於漢韓愈逐諸唐獄中與嶺外妻子不得將義士撫巻起眦血一霑裳胡弗學掲厲胡弗隨低昻干時宴安人滅然已不揚匹夫虎敢鬬女子熊能當况彼二長者烏肯巧如簧我愛古人節皎皎明如霜今日貶江徼多慙韓與王罪大禍不稱所損傷纎茫盡室來官下君恩大難㤀酒聖無隠量詩豪有餘章秋來魏公亭金菊何煌煌登髙發秘思聊以攄吾狂卓有梅聖俞作邑郡之旁矯首賦靈烏擬彼歌滄浪因成答客戲移以贈名郎泉南曹使君詩源萬里長復我百餘言疑登孔子堂聞之金石音繩繩自宫商念此孤鳴鶴聲應來逺方相期養心氣彌天浩無疆鋪之被萬物照之諧三光此道果迂闊陶陶吾醉鄉和謝希深學士見寄天地久開泰過言防結括誰憐多出處自省有本末心焉介如石可裂不可奪盡室得江行君恩與全活迴頭諫諍路尚願無壅遏豈獨世所非千載成迂闊廬山瀑布靈源何太髙北斗想可挹凌日五光直逗雲千仞急白虹下澗飲寒劍倚天立闊電不得瞬長雷無敢蟄萬丈巖崖坼一道林巒濕險逼飛鳥墜冷束山鬼泣須當截海去獨流不相入滕子京魏介之二同年相訪丹陽郡長江天下險涉者利名驅二公訪貧交過之如坦途風波豈不惡忠信天所扶相見乃大笑命歌倒金壺同年三百人大半功名呼沒者草自綠存者顔無朱功名若在天何必心區區莫競貴高路休防讒疾夫孔子作旅人孟軻號迂儒吾輩不飲酒笑殺髙陽徒送劉牧推官之兗州相國鎮東魯時李相公迪在兖開閤多英豪羡子賦從軍壯思如波濤當有非常遇所得連九鼇故人孫復之卧雲生二毛或作梁甫吟秋風共呼號翩翩草檄外可與相遊遨益以夫子心萬物都一毫此行名與節須似泰山髙和楊畋孤琴詠愛此千里器如見古人面欲彈換朱絲明月當秋漢我願宫商絃相應聲無間自然召南風莫起孤琴歎絳州園池絳臺史君府亭閣參園圃一泉西北來羣峯髙下覩池魚或躍金水簾長布雨怪柏鎖蛟虬醜石鬭貙虎羣花相倚笑垂楊自由舞静境合通仙清陰不知暑每與風月期可無詩酒助登臨問民俗依舊陶唐古晉祠泉神哉叔虞廟地勝出嘉泉一源甚澄静數步忽潺湲此異孰可窮觀者増恭䖍錦鱗無敢釣長生同水仙千家溉禾稻滿目江鄉田我來動所思致主愧前賢大道果能行時雨宜不愆皆如晉祠下生民無旱年訪陜郊魏疎處士賢哉先處士天書召不起雲夫嗣孤風復為隠君子有石礪其齒有泉洗其耳不瞰紅塵路榮利無窮已孜孜朝市人同在風波裏大為髙士笑誓不拾青紫我亦寵辱流所幸無愠喜進者道之行退者道之止矧今領方面豈稱長城倚來訪卧雲人而請益諸已得無長者言佩之玉非美中元夜百花洲作南陽太守清狂發未到中秋先賞月百花洲裏夜㤀歸綠梧無聲露光滑天學碧海吐明珠寒輝射空星斗疎西樓下看人間世瑩然都在青玉壺從來酷暑不可避今夕涼生豈天意一笛吹銷萬里雲主人髙歌客大醉客醉起舞逐我歌弗舞弗歌如老何覽秀亭詩南陽有絶勝城下百花洲謝公創危亭紫微謝希深領郡日建此亭屹在髙城頭盡覽洲中秀歴歴銷人憂作詩刻金石意垂千載休我來亭蚤壞何以待英遊試觀荆棘繁欲步瓦礫稠嗟嗟命良工美材肆爾求曰基復日搆落成會中秋開樽揖明月席上皆應劉敏速迭唱和醺酣爭獻酬老子素不淺預兹年少儔九日重登臨涼空氛氣收風來鴈聲度雲去山色留西郊有潭菊滿以金船浮雅為君子夀物外真悠悠過則與春期春時良更優熖熖衆卉明衮衮新泉流簫鼓動地喧羅綺傾城遊五馬不行樂州人為之羞亭焉詎可廢願此多賢侯祠風師酬提刑趙學士見貽先王制禮經祠為國大事孟春祭風師刺史敢有二齋戒升于壇拜手首至地所祈動以時生物得咸遂勿鼓江海濤害我舟檝利昊天六七月會有雷雨至慎無吹散去坐使百榖悴髙秋三五夕明月生天際乃可驅雲烟以喜萬人意願君入薫絃上副吾皇志阜財復解愠即為天下賜八使重古禮作詩歌祭義誠欲通神明非徒奬州吏賢哉推此心良以警有位依韻和安陸孫司諌見寄甫穰下故都今善藩沃衍千里多豐年孫公頃以清浄化我來代之慙二天人物髙傳卧龍里神仙近接弄珠川漢光舊烈山河在徘徊弔古良依然二十八將固不朽風雲一代皆忠賢我亦明時得君者出處十載功不前尚得州麾養衰疾優游豈減居林泉因逢故人作宴喜琴樽風月夕不眠之翰詩來若金石重於我輩何其偏相其直道了無悔寧争蠖屈與鵬騫送鄖鄉尉黄通少年好逸驥老者重安車争先尚逐逐致逺貴徐徐勿言一尉卑千户繫慘舒外矜固不足内樂則有餘子游與季路作邑寧欷歔五斗對萬鍾所問道何如依韻和襄陽王源叔龍圖見寄髙車赴南峴敝郊主東道風采喜一見布素情相好屈指四十秋于今嵗寒保我起為君夀善頌復善禱願盡杯中物薄言理可到君子貴有終功名非必早朝端卿大夫所尚賢而老世慮久乃周聖門深已造與君誓許國無忝於祖考潔如鳯食竹樂若魚在藻安得長相親時時一絶倒不㤀平生期明月滿懷抱依韻答賈黯監丞賀雪今之刺史古諸侯孰敢不分天子憂自秋徂冬渇雨雪旬奏空文慙轉郵得非郡國政未洽刺史閉閤當自尤上賴天子仁且聖神龍奔走不俟求同雲千里結雪意一夕密下誠如羞俗有雪羞多夜落之語曉來賞心江海上東望不見三神丘渾祛厲氣發和氣明年黍稷須盈疇烟郊空闊獵者健酒市暖熱沽人稠光精璨璨奪劍㦸清寒拂拂生衣裘鈴齋賀客有喜色飲酣歌作擊前籌常願帝力及南畝盡使風俗如東鄒誰言吾子青春者意在生民先發謳依韻答提刑張太博嘗新醖南陽本佳處偶得作守臣地與汝墳近古來風化純當官一無術易易復循循長使下情達窮民奚不伸此外更何事優游欵嘉賔時得一笑會恨無千日醇客有多聞者密法為我陳自言此靈物盡心妙始臻非徒水泉潔大要麴糵均暄涼體四時日月周數旬其氣芳以烈厥味和而辛涓涓滴小槽清光能照人固可奉宗廟宜能格天神我姑酌金罍駐此席上珍况有百花洲水木長時新煙姿藏碧塢栁杪見朱闉兩兩鳬鴈侣依依江海瀕晩光倒晩影一川無一塵悠悠乘畫舸坦坦解朝紳綠陰承作蓋芳草就為茵引此杯中物獻酬交錯頻禮俗重三爵今乃不記巡大言出物表本性還天真或落孟嘉帽或抛陶令巾吾非葛天氏誰為劉伯倫大使達觀者與予日相親作詩美嘉會調髙繼無因但願天下樂一若樽前身長戴堯舜主盡作羲黄民耕田與鑿井熈熈千萬春寄題峴山羊公祠堂休哉羊叔子輔晉功勲大化行江漢間恩被疆埸外中國倚而安治為天下最開府多英僚置酒每髙會徘徊臨峴首興言何慷慨此山自古有游者千萬輩堙滅皆無聞空悲嵗月邁公乎仁澤深風采獨不昧于今墮淚碑觀之益欽戴卓有王源叔文學偉當代借麾來襄陽髙懷極恬退山姿列雲端江響拂天籟行樂何逍遥覽古忽感概不見叔子祠蕪沒民疇内千金贖故基廟貌重營繪襄人復其祀水旱有攸賴太守一興善比戶皆歡快源叔政可歌又留千載愛送河東提刑張太博憶守姑蘇日見君已驚人翩翩幕中畫落落席上珍强記及敏力一一精如神洎余領西帥密與羌夏隣君來貳邊郡表裏還相親有如得四支周旋衞其身予始按萬渠兵行百物陳而君主其事進退皆有倫羌酋八九百醉歌喜齗齗傳告以號令再拜㒺不馴作城大順川扼敵來路津漢軍始屯集敵騎俄紛綸諸將稍畏怯偶語辭艱辛君躍匹馬去入險將死濵持檛畫禍福虎校靡不遵呼兵就畚鍤悦使咸忻忻晝夜戰且役城成未踰旬敵乃急攻我萬衆生煙塵蒼惶被矢石遁走無逡巡君馳奏闕下感慨動中宸是秋懷敏敗敵勢侵涇原天地正愁慘闗輔將迸奔腹心苟不守皮膚安得存予召蕃漢兵趨邠當北門諸將切切議謂宜守塞垣惟君力贊我咸鎬為本根全師遂鼓進連城息驚喧果釋天子憂奬詔垂明恩予貳機衡重君掌食貨繁豈敢懈夙夜未嘗攄笑言今叨領南陽會君乘使軒㩦手百花洲無時不開樽語論極今古情契及子孫氣同若蘭芝聲應如篪塤浩歌㤀物我劇飲無涼暄自問平生心此樂曽幾番一旦改使節悤悤指并汾惜别固不忍贈行當有云從來宿兵地北與敵境分長河出紫塞太行入青雲天然作雄屏覽者懷忠勲行府在平陽山川秀氤氳堯民擊壤歌千古猶得聞君有經濟心潤以金石文攬轡問風俗坐堂精典墳此道日益大行行思致君依韻和提刑太博嘉雪南陽風俗常苦耕太守憂民敢不誠今秋與冬數月旱二麥無望愁編氓龍遁雲藏不肯起荒祠巫鼓徒轟轟昨宵天意驟囘復繁陰一布飄寒英裁成片片盡六出化工造物何其精散亂狂飛若倚勢徘徊緩舞如含情千門競掃明月色萬木都拆寒梅英天上風流忽爾在人間險阻無不平因松偶作琴瑟調過竹徐聞環珮聲江天鳴鴈畏相失龍庭奔馬豪如驚丞相沙隄初踏練將軍紫髯渾綴瓔巖前饑殺嘯風虎海上凍死吞舟鯨我有髙樓擘雲上雙瞳一開千里明羣閻逐去疫癘逺長逵壓下塵埃清當知有年可坐致東臯父老休營營因招大使賞天瑞醉把羲黄向上評窮通得喪了無事莊老器宇何難并君起作歌我作和天地和氣須充盈當年此樂不可得與雪對舞攄平生共君學取雪好處平施萬物如權衡送謝景初廷評宰餘姚世徳踐甲科先賔客先紫微俱登甲科廷評今又繼之青紫信可拾故鄉特榮輝髙門復樹立餘姚二山下東南最名邑煙水萬人家熈熈自翔集又得賢大夫坐堂恩信敷春風為君來綠波滿平湖乘興訪隠淪今逢賀老無文藻凌雲處定喜江山助未能同仙舟離樽少留駐行行道不孤明月相隨去閲古堂詩中山天下重韓公兹鎮臨堂上繢昔賢閲古以儆今牧師六十人冠劍竦若林既瞻古人像必求古人心彼或所存逺我將所得深仁與智可尚忠與義可欽吾愛古賢守馨徳神祗歆典法曽弗泥勸沮良自斟躋民在春臺熈熈樂不淫耕夫與樵子飽暖相謳吟王道自此始然後張薫琴吾愛古名將毅若武庫森其重如山安其静如淵沉有令凛如霜有謀密如陰敵城一朝拔戎首萬里擒虎豹巻韜畧鯨鯢投釡鬵皇威徹西海天馬來駸駸留侯武侯者將相俱能任決勝神所啟受託天所諶披開日月光振起雷霆音九闗支一柱萬宇覆重衾前人何赫赫後人豈愔愔所以作此堂公意同堅金僕思寳元初叛羌弄千鐔王師生太平苦戰誠未禁赤子餵犬彘塞翁淚涔涔中原固為辱天子動宸襟乃命公與僕聨使禦外侵歴歴革前弊拳拳掃妖祲二十四萬兵撫之若青衿惟以人占天不問昴與參相彼形勝地指掌而蹄涔復我横山疆限爾長河潯此得喉可扼彼宜肉就椹上前同定策奸謀俄獻琛梟巢不忍覆異日生凶禽僕已白髪翁量力欲投簮公方青春期抱道當作霖四夷氣須奪百代病可鍼河湟議始行漢唐功必尋復令千載下景仰如髙岑因賦閲古篇為公廊廟箴南康軍江中落星寺長江萬里來古寺中流起如何天上星汩汩波濤裏范文正集巻二欽定四庫全書范文正集巻三宋范仲淹撰
