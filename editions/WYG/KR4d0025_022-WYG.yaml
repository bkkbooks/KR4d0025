body:
  text: 古詩寄石學士家有清白志所寳甑中塵休去無生涯老來猶苦辛一麾了㛰嫁萬事蠧精神與君嘗大言定作青山隣蹭蹬未㩦手得無羞故人江樓寄希元上人清言一以遥黙黙江樓上安得如白雲無心兩相忘酬和黄太博古籍東南美蔚蔚幙中議懿行希聖賢尚文粲游賜伊余髮已禿偶繼立朝士何以宣王政甘為時所棄酌以廣州泉不易伯夷志直哉心如弦安慮道邊斃竊嘗力於古秉筆庶幾至孰為末聞達聊以道幽秘夫君鏘以名尤為世之器贈我百餘言升堂出而示土木朽且陋黼黻謬増賁毌鹽煩刻畫返朴吾所愧華勛愛士心蓬壺延才地何人薦於子當彼得言位吐以胷中竒落落金玉繼九虚高可游凌厲垂天翅吾將退而隐尚得榮其視滕子京以真籙相示因以贈之泰山采芝人吏隠清淮濵金函祕寳籙奉之如高真謂子有仙志興言一相示叩頭鳴天鼔玉書粲然異白雲引輕素朱絲聞靈篇題云天寳嵗傳於任鳳仙兵火換九州于兹三百年非有靈物持此書安得全緑字起龍蛇丹文掛星斗六甲當奉行百神迺奔走密密天上語忽忽人間有與君置青山解冠松桂間服此上淸籙上淸庶可攀無為塵土中草草凋朱顔送徐登山人原本後四巻有送徐允升歸九華詩典同止易五字今附注于下重君愛後作樂詩書孜孜不知老白髮末理後作未治生惟談後作設聖人道愛君妙山水所得是神氣尺素冩林巒邈有千里意今日江南行孤雲無繋程直指九華峯去掃先君塋却來華陽川與後作邀我溪上盟行歌紫芝秀坐嘯清風生鍊真變金骨飄飄朝玉京結成物外遊忘此天下情匣劍靈劍經年匣决雲誰為高報人如有道何忍問吹毛南園南園萬樹花極目春芳麗林下老成人相招植松桂行歌行歌春滿路坐歌春滿園花前人自樂桃李豈須言明月明月照前墀朱絃奏流水春風如未回敢望無雲起南樓南樓百尺餘淸夜微埃歇天㑹詩人情遺此高髙月送陳瓌秀才遊金陵君有江南行為君歌以喜龍盤山萬曲練静江千里江山不可空台星照呉中相國隴西公時鎮金陵古來王謝地今有周召風而間楊誥與鄭戩萬丈光相映煌煌聚宰府金陵一何盛此去知已賢雅客情無邊白雲起江樹明月逐江船雲月共徘徊優哉如游仙㱕來笑春風白日登青天律詩送歐伯起天與神交忽解㩦一溪風月更同誰自慙瀟灑如猿鶴却向周郎怨別離九日欲賦前賢九日詩茱萸相鬭一枝枝可憐宋玉情無限爭似陶潛醉不知緑鬢愛隨風景變黄華能與嵗寒期登髙㢠處狂多少笑殺襄陽拍手兒送虎丘長老暫向天台參衆真虎丘風月逺隨身瓊臺肯便長棲去無限人間未度人寄潤州龎籍北固髙棲海氣寒使君應此凭闌干春山雨後青無限借與淮南洗眼㸔送湛公歸四明講席滿靣南風指四明山長水曲不勝情自言此去雲林下惟講華嚴報太平和龎醇之見寄北樓千尺午猶寒冉冉飛塵不可干横望滄溟了無際貴人休向畵圖㸔依韻和胡使君書事都督再臨横海鎮集仙遥輟内朝班清風又振東南美好夢多親咫尺顔坐嘯樓臺凌皓月行春鼓吹入青山太平天子尊耆舊八十王祥未賜閒贈呉秀才萬户侯家幾葉孫弟兄紅斾獨烏巾㩦琴人入廬山去誰信朱門有逸人依韻和魏介之同遊玉仙壇雲壇共上百神清碧塢紅霞相照明幽草欲迷丹井處亂峯依舊白雲生亭亭翠纛高杉矗險險狂雷落石轟待得九霄鸞鶴馭玉書應改地仙名本傳云玉作遼地仙也依韻和介之未開菊本非桃李色佳節敢先開席上無言晩霜前幸未摧芳心應有待真賞直須催願上金樽夀何傷蝶不來依韻酬池州錢綺翁天涯彼此勿冲冲内樂何須位更崇白髮監州身各健青山遶郭景多同日髙窻外眠方起月到樽前宴未終况在江南佳麗地重陽猶見牡丹紅鄱陽牡丹有四時開者寄題溪口廣慈院越中山水絶纎塵溪口風光歩步新若得㑹稽藏拙去白雲深處亦行春釣臺詩漢包六合㒺英豪一箇㝠鴻惜羽毛世祖功臣三十六雲臺爭似釣臺髙送饒州董博士諱淵􅃛鹿鳴燕之後舉送詩番國英豪富魯儒同時舉送起鄉閭文章恥學揚雄賦議論羞談賈誼書喜得明珠三十六恨遺壮士二千餘送君直上青霄去行㸔歸乗駟馬車范文正别集巻一欽定四庫全書范文正别集巻二宋范仲淹撰賦堯舜帥
