body:
  text: 依韻酬章推官見贈姑蘇從古號繁華却戀巖邊與水涯重入白雲尋釣瀨更隨明月宿詩家山人驚戴烏紗出溪女笑偎紅杏遮來蚤又抛泉石去范茫榮利一吁嗟蘇州十詠泰伯廟至徳本無名宣尼一此評能將天下讓知有聖人生南國奔方逺西山道始亨英靈豈不在千古碧江横木蘭堂堂上列歌鐘多慙不如古却羨木蘭花曽見霓裳舞白樂天為蘇州刺史嘗教此舞洞庭山吳山無此秀乘暇一遊之萬頃湖光裏千家橘熟時平看月上早逺覺鳥歸遲近古誰真賞白雲應得知虎丘山昔見虎耽耽今為佛子巖雲寒不出寺劍静未離潭幽步蘿垂徑髙禪雪閉菴吳都十萬户煙瓦亘西南閶門吳門聳閶闔迎送毎躋攀一水帝鄉路片雲師子山落鴻漁釣外斜栁别離間白傅歸休處盤桓幾厚顔靈巖寺吳王之離宫也下臨太湖古來興廢一愁人白髪僧歸掩寺門越相煙波空去鴈吳王宫闕半啼猿春風似舊花猶笑往事多遺石不言唯有延陵逃遁去清名髙節滿乾坤太湖有浪即山髙無風還練静秋宵誰與期月華三萬頃伍相廟胥也應無憾至哉忠孝門生能酬楚怨死可報吳恩直氣海濤在片心江月存悠悠當日者千載秪慙魂觀風樓髙壓郡西城觀風不浪名山川千里色語笑萬家聲碧寺煙中静紅橋栁際明登臨豈劉白滿目見詩情南園西施臺下見名園百草千花特地繁欲問吳王當日事後來桃李若為言依韻奉酬晏尚書見寄徽音來景亳盛事聳吳鄉上象三台照髙文五色章純如登樂府淵若測天潢寒谷春重煦幽宫草特芳感知心似血思報鬢成霜新定慙無恵姑蘇惜未康堯湯餘水旱劉白舊風光北闕雲霓逺南園橘柚荒願聞歌畫一敢議賦長楊碌碌嘲須解循循教弗㤀跡甘榮路外情寄聖門傍幾託為魚夢江湖尚渺茫又用前韻謝晏尚書以近著示及祖述賢人業何因降互鄉周公舊才美夫子近文章逸氣彌衝斗雄源甚決潢月中靈桂老春外寶芝芳逺似天無翳清如塞有霜日星圖舜禹金石頌成康謂真廟神御頌也渦曲風騷盛謂游渦之作也營丘學校光謂青社州學記也至精含變化大手鑿洪荒崧嶽詞欺甫甘泉價掩揚滿朝當諷誦終古豈遺㤀恍若探龍際森疑履虎傍半生游此道觀海特茫茫陳質殿丞挽歌詞賢者逝如斯皇天豈易知衆人皆墮淚君子欲安碑幾世傳清白滿鄉稱孝慈賢哉生令嗣遺秀在蘭芝送僧文光一品山前識迢迢三十春多慚畫㦸裏重見白雲人依韻酬府判龎醇之見寄二十年前已定交而今鵬鷃各逍遥但能賈傅親前席何必蕭生意本朝直節羡君如指佞孤根憐我異凌霄凌霄花名生且有託莫將富貴移平昔彼此清心髪半凋依韻酬吳安道學士見寄聖君賢相正彌綸諌諍臣微敢徇身但得葵心長向日何妨騖足未離塵豈辭雲水三千里猶濟瘡痍十萬民宴坐黄堂愧無限隴頭元是帶經人依韻酬吳春卿二首來章有鶴羸松冷之句因以松鶴命題以答之鶴華亭孤立病時身終日徘徊向海濵露掌思髙還警夜芝田音斷欲傷春千年靈氣何求藥八變竒姿已過人莫厭在陰猶寡和九臯非晩見精神松亭亭百尺棟梁身寂寞雲根與澗濵寒冒雪霜寧是病静期風月不須春蕭蕭逺韻和於樂密密清陰意在人髙節直心時勿伐千秋為石乃知神應制賞花釣魚萬彚嘉亨日皇心豫宴辰華林新濯雨靈沼正涵春帝幄紛仙蘤天鈎擲錦鱗洋洋頒睿唱賡頌浹簪紳過餘杭白塔寺登臨江上寺遷客特依依逺水欲無際孤舟曽未歸亂峯藏好處幽鷺得閒飛多少天真趣遥心結翠微西湖筵上贈胡侍郎官秩文昌貴功名信史褒朝廷三老重鄉黨二疏髙涯業盡圖籍子孫皆俊髦西湖天下絶今日盛遊遨江城對月南國風波逺東門冠蓋囘多情是明月相逐過江來送向綜國博通判桂州通籍三公後監州五嶺深欲知明主意將慰逺人心嵗計多藏藥舟行不廢琴歸書清白最寧問槖中金芝山寺樓殿觀崔嵬靈芝安在哉雲飛過江去花落入城來得食鵶朝聚聞經虎夜囘偶臨西閣望五老夕陽開昇上人碧雲軒愛此詩家好幽軒絶世紛澄宵半牀月淡曉數峯雲逺意經年就微吟並舍聞只應虚静處所得自蘭芬郡齋即事三出專城鬢似絲齋中蕭灑過一作勝禪師近疎歌酒緣多病不負青山賴有詩半雨黄花秋賞健一江明月夜歸遲世間榮辱何須道塞上衰翁也自知同年魏介之會上作寒苦同登甲乙科天涯相對合如何心存闕下還憂畏身在樽前且笑歌閒上碧江游畫鷁醉留紅袖舞鳴鼉與君今日真良會自信麤官樂事多依韻酬黄灝秀才再貶鄱川信不才子規相愛勸歸來客心但感江山助天意難期日月迴白雪孤琴彌冷淡浮雲雙闕自崔嵬南方嵗宴猶能樂醉盡黄花見早梅贈鍾道士曽舉進士人間無復動機心掛了儒冠嵗已深惟有詩家風味在一壇松月伴秋吟道士程用之為余傳神因題貌古神疎畫本難因師心妙發毫端無功可上凌雲閣留取雲山静處看送魏介之江西提點旌旗如火浪如鷗一路春城次第遊江上髙樓欲千尺便從今日望歸舟遊廬山作五老閒遊倚舳艫碧梯嵐逕好程途雲開瀑影千門掛雨過松黄十里鋪客愛往來何所得僧言榮辱此間無從今愈識逍遥旨一聴升沉造化鑪瀑布迥與衆流異發源髙更孤下山猶直在到海得清無勢鬭蛟龍惡聲吹雨雹麤晩來雲一色詩句自成圖贈廣宣大師憶昔同遊紫閣雲别來三十二迴春白頭相見雙林下猶是清朝未退人移丹陽郡先遊茅山作丹陽太守意何如先謁茅卿始下車竭節事君三黜後収心奉道五旬初偶尋靈草逢芝圃欲扣真闗借玉書不更從人問通塞天教吏隠接山居贈茅山張道者有客生平愛白雲無端年老尚紅塵只應金簡名猶在得見仙巖種玉人京口即事突兀立孤城詩中别有情地深江底過日大海心生甘露樓臺古金山氣象清六朝人薄命不見此昇平懷慶朔堂慶朔堂前花自栽便移官去未曽開年年憶著成離恨只託清風管勾來拾遺勾作幹依韻酬葉道卿中秋對月二首天遣今宵無寸雲故開秋碧掛冰輪詩人不悔衣霑露為惜清光豈易親孤光千里與君逢最愛無雲四望通處處樓臺競歌宴的能愛月幾人同贈葉少卿退也天之道東南事了人風波抛舊路花月伴閒身湖外扁舟逺門中駟馬新心從今日泰家似昔時貧見子登西掖攜孫過北隣白雲髙閣曙淥水後池春樽酒呼前輩鑪香扣上真只應陰徳在八十富精神依韻答梁堅運判見寄蔽野旌旗色滿山笳吹聲功名早晩就裴度亦書生城大順迴道中作三月二十七羌山始見花將軍了邊事春老未還家依韻和延安龎龍圖栁湖種栁穿湖後延安盛可遊逺懷㤀澤國真賞即瀛洲江景來秦塞風情屬庾樓劉琨増坐嘯王粲乍銷憂秀發千絲墮光揺匹練柔雙雙翔乳鷰兩兩睡馴鷗折翠贈歸客濯清招隠流宴回銀燭夜吟度玉闗秋勝處千場醉勞生萬事浮王公多雅故某與龍圖公同年復為延安交政思去共仙舟和延安龎龍圖寄岳陽滕同年優游滕太守郡枕洞庭邊幾處雲藏寺千家月在船疎鴻秋浦外長􅅇晩樓前旋撥醅頭酒新炰縮項鯿宦情須淡薄詩意定連緜迥是偷安地仍當飽事年只應天下樂無出日髙眠豈信憂邊處干戈隔一川時宣撫岢嵐軍與張燾太博行忻代間因話江山作數年風土塞門行説著江山意暫清求取罷兵南國去滿樓蒼翠是平生過長安醉别資政鄭侍郎鄉闗交復親把酒且逡巡共上青雲路相看白髪人有為須報國無事即頥神故素幾云在風音莫厭頻依韻酬光化李簡夫屯田老來難得舊交游莫歎樽前兩鬢秋少日苦辛名共立晩年恬退語相投龔黄政事聊牽强元白隣封且唱酬附郭田園能置否與君乘健早歸休依韻酬太傅張相公見贈出處曽無致主功南陽為守地猶雄醉醒往日慙漁父得失今朝賀塞翁七里河邊歸帶月百花洲上嘯生風卧龍鄉曲多賢達願預逍遥九老中依韻酬益利鈐轄馬端左藏濫登清顯遇公朝豈有才謀可致堯拙守自慙成木强宦遊誰歎僅蓬飄醉來多謝提壺勸歸去寧煩杜宇招好樂當年開口笑此心無事愧重霄依韻酬邠州通判王稷太博南豳日日接英標公外追隨豈待招惡勸酒時圖共醉痛贏棊處肯相饒一抛言笑如何遣頻得音書似不遥獨上西樓為君久滿城明月會雲銷依韻酬李光化見寄南陽偃息養衰顔天暖風和近楚闗欲少禍時當止足得無權處始安閒心憐好鳥來幽院目送微雲過别山此景此情聊自慰是非何極任循環寄安素髙處士吏隠南陽味日新幕中文雅盡交賔滿軒明月清譚夜共憶詩書萬巻人酬李光化見寄二首交親莫笑出麾頻不任纎機只任真逺䕶玉關猶竭力入陪金鉉敢周身素心直擬圭無玷晩節當如竹有筠道本逍遥惟所適吾生何用蠖求伸萬里承平堯舜風使君尺素半空空庭中無事吏歸早野外有歌民意豐石鼎鬭茶浮乳白海螺行酒灎上聲波紅宴堂未盡嘉賔興移下秋光月色中依韻酬李光化敘懷列宿専城且自娛清名善最即前途江山樂國誠難會風月詩家的不辜未必晩成輸早達好將髙笑代長吁公餘更勵經邦業思為清朝贊禹謨和李光化秋詠四首曉牆外轆轤響樓前河漢攲曙光和月色猶記早朝時晝日色清如照前林葉未零海東新隼至一㸃在青㝠晩晩色動邊思去年猶未歸戍樓人已冷目斷望征衣夜春色人皆醉秋光獨不眠君看明月下何似落花前送黄灝員外三十餘年交舊心相逢那復議升沉卑飛塵土味誠薄達宦風波憂更深自古榮華渾一夢即時歡笑敵千金追陪未久還離索早晩軒車重見尋和并州大資政鄭侍郎秋晩書事太原兵重壓强吳莫對秋風憶鱠鱸萬里天聲揚紫塞十年人望在黄樞定應松柏心無改自信雲龍道不孤應笑病夫何所補獨能安坐養桑榆和提刑趙學士探梅三絶蕭條臈後復春前雪壓霜欺未放妍昨日倚欄枝上看似留芳意入新年静映寒林晩未芳人人欲看夀陽粧玉顔須傍韶春笑莫鬭嚴風與惡霜百花爭早孰過梅天與芳時豈待催莫惜黄金置清賞隔年春色為君開和太傅鄧公歸遊武當見寄三提相印代天工鄧國歸來耀本封此日神仙丁令鶴幾年霖雨武侯龍酬恩定得祠黄石談道須期會赤松莫慮故鄉陵谷變武當依舊碧重重即席呈太傅相公鳯池三入冠台躔致了昇平一品閒白傅歌詩傳海外晉公桃李滿人間上都雲逺經時别故國春濃幾度還太史占天應有奏夀星光彩近南山紀送太傅相公歸闕搢紳誰敢望差肩獨向昌期協半千首會雲龍游少海親扶日月上中天碧油兩就元戎鎮黄閣三提冢宰權坐致唐虞成大化退居師傅養髙年閒披丹訣開鑪竈醉度清歌被管絃同牓幾人登將相滿朝今日羡神仙松楸薙草思純孝里巷揮金過昔賢歸赴誕辰知兑説輕安拜舞夀觴前依韻和提刑張太傅寄梅數枝梅寄寂寥人多謝韶華次第均穰下此花留未發待君同賞後池春又和賞梅故人為使富天才相與抽毫賦早梅氣􅃩未勞横玉笛風光先合倒金罍隴頭欲寄交情逺林下初逢病眼開必若和羮有遺味花王應亦命公台依韻答王源叔憶百花洲見寄芳洲名冠古南都最惜塵埃一㸃無樓閣春深來海鷰池塘人静下仙鳬花情栁意憑誰問月彩波光豈易圖漢上山公發新詠許昌何必詫申湖申或作西獻百花洲圖上陳州晏相公穰下勝遊少此洲聊入詩百花争􅆼窕一水自漣漪潔白憐翹鷺優游羡戲龜闌干紅屈曲亭宇碧參差倒影澄波底横煙落照時月明魚競躍春静栁閒垂萬竹排霜仗千荷巻翠旗菊分潭上近菊花潭在郡之西郊因有菊門復有菊潭鎮近取菊植于洲中洲有髙臺遂命之曰菊臺梅比漢南遲京洛而南至鄧始有梅焉梅比襄陽又晩一月岸鵲依人喜汀鷗不我疑綵絲穿石節襄鄧間舊俗正月二十二日士女游河取小石通中者用綵絲穿之帶以為祥羅襪踏青期素髪頻來醉滄浪減去思步隨芳草逺歌逐畫船移繪寫求真賞緘藏獻已知相君那肯愛家有鳯皇池依韻答青州富資政見寄樞府當年日贊襄隠然一柱在明堂親逢英主開前席力與皇家正舊章直道豈求安富貴純誠惟欲助清光龔黄政事追千載齊魯風謡及萬箱偉望能令中國重竒謀曽壓北方强故人待看調元後乞取優游老洛陽依韻答并州鄭大資政見寄制節重并汾淹留又見春年髙成國老道在樂天真風韻應如舊精明迥絶倫致君心未展寧是式微人過陳州上晏相公曩由清舉玉宸知今覺光榮冠一時曽入黄扉陪國論重求絳帳就師資談文講道渾無倦養浩存真絶不衰獨媿鑄顔恩未報捧觴為夀獻聲詩和運使舍人觀潮二首何處潮偏盛錢唐無與儔誰能問天意獨此見濤頭海浦吞來盡江城打欲浮勢雄驅島嶼聲怒戰貔貅萬疊雲纔起千尋練不收長風方破浪一氣自横秋髙岸驚先裂羣源怯倒流騰凌大鯤化浩蕩六鼇遊北客觀猶懼吳兒弄弗憂子胥忠義者無覆巨川舟把酒問東溟潮從何代生寧非天吐納長逐月虧盈暴怒中秋勢雄豪半夜聲堂堂雲陣合屹屹雪山行海面雷霆聚江心瀑布横巨防連地震羣檝望風迎踊若蛟龍鬭奔如雨雹驚來知千古信迴見百川平破浪功難敵驅山力可并伍胥神不泯憑此發威名依韻和蘇州蔣宻學餘杭偶得借麾來山態雲情病眼開此樂無涯誰可共詩仙今日在蘇臺白樂天謂韋蘇州為詩仙依韻和孫之翰對雪江干往往臘不雪今喜紛紛纔孟冬迺知王澤寖及逺益明天意先在農有年預可慰四海大瑞且當聞九重况此湖山滿清思與君交唱若為慵依韻和并州鄭宣徽見寄二首錢唐作守不為輕况是全家住翠屏名品久參卿士月部封全屬斗牛星仁君未報頭先白故老相看眼倍青最愛湖山清絶處晩來雲破雨初停西湖載客恣游從湖上參差半佛宫迴顧隙駒曽不息沉思樽酒可教空層臺累榭皆清曠萬戶千門盡鬱蔥向此行春無限樂却慙何道繼文翁依韻答蔣密學見寄東南為守慰衰顔憂事渾祛樂事還鼓吹夜歸湖上月樓臺晴望海中山奮飛每羡㝠鴻逺馳騁那慙老驥閒此日共君方偃息是非榮辱任循環依韻和同年朱兵部王賔客交贈之什鶴禁蘭宫達了身髙居南闕重為隣西園冠蓋時時會北海樽罍日日親共棄榮華抛世態同歸清静復天真一如劉白東都下更得裴公作主人登表海樓一帶林巒秀復竒每來凭檻即開眉好山深會詩人意留得夕陽無限時石子澗二首鑿開竒勝翠微間車騎笙歌暮未還彦國才如謝安石他時即此是東山飛泉落處滿潭雷一道蒼然石壁開故老相傳應可信此山雲出雨須來依韻答韓侍御雖叨世契與隣藩東道瞻風御史尊鄭館昔時延下客予執巻時即遊端公之門于家今日見髙門端公之先君嘗作金陵獄椽我居方面榮為懼君向臺端直且温彼此中懷藴金石不須銷黯動離魂謝栁太博恵鶴新詩遺鶴指真經對此仙標詎敢輕萬里華亭思去伴千年遼海識歸程雞羣與處曽非辱鵬路將翔孰謂榮獨愛九臯嘹唳好聲聲天地謂之清知府孫學士見示和終南監宫太保道懷五首因以綴篇玉皇近侍請脩真賜得南山十里雲樽有聖賢聊自慰鼎多龍虎復誰分謝家山色朝晡見陶隠松風寤寐聞萬物已齊無一事獨醒惟笑衆醺醺要路抛來自寡尤髙懷巻去白雲収玉緣祕寶須藏密蘭為竒香却在幽仙骨豈曽移静節帝心終是竭嘉猷紅霞綠竹㤀機地未免天家下詔求漢陂髙興自飄飄何必天台渡石橋潭上藥靈多餌菊林間詩逸半書蕉勤歌蘭珮招逋隠懶事塵纓逐宷僚客有赤松盟約在異時猿鶴不相遼瑶壇日月静中長詩思時時逸謝塘神枕自成仙島夢朝衣猶有御爐香三元祕簡侵星奏五嶺靈芽待雪甞金闕九重留不住髙風何處是嚴光門外煙嵐紫閣横九衢風土更何情籬邊醉傲淵明飲隴上歌隨桀溺耕三樂放懷千古重萬鍾回首一毫輕鵬鷦共適逍遥理誰復人間問不平贈方秀才楷髙尚繼先君嵓居與俗分有泉皆潄石無地不生雲隣里多垂釣兒孫半屬文幽蘭在深處終日自清芬依韻和龎殿院見寄吳門歉嵗減繁華蕭索專城未足誇栁色向秋迎使館水聲終夜救田車丘山在負思朝寄毫髪經心愧道家不似桐廬人事少子陵臺畔樂無涯范文正集巻四欽定四庫全書范文正集巻五宋范仲淹撰義易義乾上乾下内外中正聖人之徳位乎天之時也徳内也位外也九二君之徳九五君之位成徳于其内充位于其外聖人之徳居乎誠而不遷有時舍之義故曰見龍在田徳昭于中故曰利見大人天下文明君德也聖人之位行乎道而不息有時乘之義故曰飛龍在天位正於上故曰利見大人乃位乎天徳於是乎位矣或者泥於六位之序止以五為君曽不思始畫八卦三陽為乾君之象也豈俟於五乎三陰為坤臣之象也豈俟於四乎震為長子豈俟重其卦而始見於長子乎明夫乾君之象既重其卦則有内外之分九二居乎内徳也九五居乎外位也餘爻則從其進退安危之會而言之非必自下而上次而成之也如卦言六龍而九三不言龍而言君子蓋龍無乘剛之義則以君子言之隨義而發非必執六龍之象也故曰易無體而聖人之言豈凝滯於斯乎咸陰進而陽降兌陰卦艮陽卦上下交感之時也與泰卦近焉泰卦天地交而萬物通咸卦天地感而萬物化生然則泰卦三陰進于上三陽降于下極於交而泰矣故曰萬物通咸卦陰進而未盡達也陽降而未盡下也下卦猶有二陰上卦猶有二陽感而未至於泰矣故曰萬物生而猶未通也聖人感人心而天下和平是感之無窮而能至乎泰者也感而不至其道乃消故至騰口薄可知也恒陽動陰順剛上柔下震陽也剛動于上巽陰也柔順于下上下各得其常之時也天尊地卑道之常矣君處上臣處下理之常矣上陽卦天與君之道也下陰卦地與臣之道也男在外女在内義之常矣震為長男巽為長女天地君臣男女各得其正常莫大焉諸卦多以有應為吉此卦六爻皆應而爻無元吉者何也夫吉於應者相求以濟之時也常者上下各得其所之時矣故以剛柔皆應為常而不以獲應為吉是以士之常也在於已不在於人諸侯之常也在於政不在於隣天子之常也在於道不在於權故曰聖人久於其道而天下化成堯舜為仁終身而已矣其知常也哉遯陰進陽退二陰進之于内四陽退之于外柔佞入而剛正出君子遯去之時也夫柔勝於剛則小人制君子矣辱可逃乎柔未勝剛則君子辱可逺也未見制於小人焉此卦二陰而四陽柔未勝剛小人始浸而長也君子知吉之先辨禍之萌思逺其時也可不遯乎故遯之為義尚乎逺也是以最在内者有遯尾之危最在外者有肥遯之利子曰知幾其神始可與言遯也已矣大壯剛以震而陰摧内剛外震二陰剝焉君子威而小人黜政令剛嚴之時也陽於陰為大也陽進陰退大者壯而小者喪矣夫雷在天上萬物以震威行天下萬邦以恐天地之壯見乎雷聖人之壯見乎威壯而不節於天下暴矣壯其喪矣是以君子非禮弗履以保其壯也故九二九四以陽居陰體剛而處巽乃復獲乎貞吉餘爻皆不克全其壯也已晉順而上行奉于文明坤順也離明也君子嘉遇顯進之時也夫上無文明賢斯遁矣今文明麗于上君子可不進乎其進也柔順内融内卦坤也有柔順之義則上不拒其逼矣故曰晝日三接也英華外著外卦文明有英華之徳則衆不疑其行矣故曰君子以自昭明徳蓋明出地上如日之升君子當其象也豈復昧哉其伊尹之時歟明夷陰上明下其義病矣火入地中其光翕矣蔽賢傷善之時也夫文明在上則賢者遂進文明在下則善人用傷其商之末世耶君子用晦然後免於其難然則文王其不用晦乎何以嘗幽之耶文王蓋有國焉徳加於人晦之難也故以文明入于難終以柔順而出矣箕子雖無政焉而最近於闇故自辱其身以晦其道然後乃免故文明在下難哉聖賢其猶病諸變斯時者惟九三乎得其大首其湯武之事歟家人陽正於外謂五也陰正於内其二也陰陽正而男女得位君子理家之時也明乎其内禮則著焉内卦明也順乎其外孝悌形焉外卦順也禮則著而家道正孝悌形而家道成成必正也正必成也聖人將成其國必正其家一人之家正然後天下之家正天下之家正然後孝悌大興焉何不定之有故曰刑于寡妻以御于家邦然則正家者貴閑其初也故初九有悔閑得其道乃首得悔亡至于九五王假有家則天下化成故勿恤而吉也睽火炎澤潤其性不同炎從上潤從下其道違而不接物情睽異之時也陰陽不接而天地睽日月不接而晝
