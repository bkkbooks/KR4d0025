front:
  text: 天下以仁賦堯舜仁化天下從矣穆穆虞舜巍巍帝堯伊二聖之仁化致四海之富饒協和萬邦蓋安人而為理肆覲羣后但復禮以居朝當其如天者堯繼堯者舜守位而時既相接行仁而性亦相近内睦九族善隣之志咸和外黜四凶有勇之風遐振聰明作聖濬哲如神一則命羲和而欽厯象一則舉稷契而演絲綸孰謂各行其道但見同致於仁謗木設時惻隠之情旁達薰絃奏處生成之惠皆臻民保淳和政無譎詐實博施而可大亦無為而多暇茅茨何恥方不富以為心璿璣有倫惟罕言而自化故得兆民就日萬國慕羶誠同心而同徳又何後而何先水沴久憂曷三月而違也朝綱歴試非一日而用焉然則帝者民之宗焉仁者敎之大也帝居大於域内仁為表於天下諮詢四岳何異樂山之情統御八元允謂長人之美夫五帝之最百王之宗物無不遂賢無不從于以見昭徳於文思于以見播美於温恭殊途同㱕皆得其垂衣而治上行下效終聞乎比屋可封大哉光宅無私文明由已稽陶唐之道法有虞之理是則萬彚熙熈咸頌聲而作矣
