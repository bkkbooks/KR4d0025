body:
  text: 代人奏乞王洙充南京講書状右臣聞三代盛王致治天下必先崇學校立師資聚羣材陳正道使其服禮樂之風樂名教之地精治人之術藴致君之方然後命之以爵授之以政濟濟多士咸有一徳列于朝則有制禮作樂之盛布于外則有移風易俗之善故聲詩之作美上之長育人材正在此矣國家崇儒敦古右文致化三京五府多建庠序當州近輔之郡宜崇治本兼至聖文宣王廟已有學舍三十餘間有修學進士二十餘人非有講貫何以發明臣竊見賀州富川縣主簿充應天府書院説書王洙於天聖二年御前進士及第素負文藻深明經義在彼講説已滿三年伏望聖慈特與除授當州職事官兼州學講説所貴國家教育之道風布於邦畿進修之人日聞於典籍士務稽古人知嚮方干冒聖威臣無任云云求追贈考妣状右臣竊露㣲衷仰干睿聴霆威匪逺淵懼斯深伏覩編勅節文一應京朝官在任未滿不因公事朝廷非時移替在任不曽磨勘轉官者後來同計及三周年不以到闕在任並與磨勘者伏念臣自䝉恩改授京官到今七年除持服月日外亦以四年餘兩箇月不敢僥求磨勘今為遷奉在近未曽封贈父母竊念臣襁褓之中已丁何怙鞠養在母慈愛過人恤臣幼孤憫臣多病夜扣星象食斷葷茹逾二十載至于其終又臣游學之初違離者乆率常殞泣幾至喪明而臣仕未及榮親已不待既育之仁則重㒺極之報曽無夙夜永懐死生何及今又俯臨塟禮尚闕褒封祭奠之間誌述之際乏慈恩數逼於哀誠身廁登瀛之華親無漏泉之澤矧遇孝理若為子心今欲将磨勘改轉官恩澤乞先移贈考妣所冀遷厝之日得及追榮况臣尚在壮年序進未晩伏望皇太后陛下皇帝陛下深軫至仁俯從危素特降曲成之造更覃廣愛之風則人子至榮獲顯親於不次君父大賜必捐軀而是圖臣無任云云奏致仕分司官乞與折支全俸状右臣伏覩先降勅命指揮乞致仕官三丞以上與一子身事後來甚有朝官因此陳乞自贊善大夫以下文武官即未有殊恩鮮聞致仕臣竊見外處勾當文武臣僚幕職州縣毎有疾患昬耄之人百姓無告本路轉運使長吏欲行體量或聞貧虚不忍廢罷臣聞先王養老莫不推仁在於公朝宜行懋典伏望聖慈應致仕分司官今後毎遇郊禋各與進秩耆耄蓋寡優渥何傷内致仕官并乞與折支全俸况國家折支物色朽腐無算又所估太髙乆冝制置庶能周濟以養衰殘其文資未有朝散階者仍乞就加庶明尚齒之恩異於班列其三班使臣判司簿尉以其非大夫之等未有致仕條例亦乞與南班上佐等第别降指揮所貴休官之人不甚失所勸臣下亷退之節彰君親存覆之仁遂其優閒免於窮困如允臣所奏即乞特出聖恩指揮舉歐陽修充經畧掌書記状右臣叨膺聖寄充前件職任即日沿邊廵按其有将帥之能否軍旅之勇怯人民之憂樂財利之通塞戎狄之情偽皆須廣接人以訪問復盡心以思度其於翰墨無暇可為而或奏議上聞軍書叢委情須可逹辭貴得冝當藉俊僚以濟機事臣訪於士大夫皆言非歐陽修不可文學才識為衆所伏徃者縁臣之罪有黷朝聴蓋本人素好議論聞于搢紳只如臣為諫官之初杜衍任中丞之日修皆曽移書責臣等緘黙無執非獨有高若訥之讓也以此明之實非朋黨若訥知其無他亦常追悔臣切於集事不敢避嫌其人見權滑州節度判官伏望聖慈特差充經畧安撫司掌書記隨逐廵按所典書奏並國家之事非臣下之私若不如舉状臣甘欺㒺之罪云云舉張方平充經畧掌書記状右臣今分經畧安撫都部署司職任在延州又發遣延州兵民公事其應荅諸路文字動渉機冝日不暇給凡有奏報朝廷事須精密臣獨力當之必有謬誤經畧司雖有判官三員多在本司及别路勾當臣昨舉歐陽修充本路掌書記尋以召歸館閣更不赴任臣竊見著作佐郎通判天雄軍張方平富於文學復有才用乞朝廷改除充本司掌書記舉彭乘自代状准勅應係兩省臺官尚書省六品已上諸司四品已上授訖具表讓一人自代者右謹具如前臣奉勅就轉尚書户部郎中依前充職臣伏見西京提㸃刑獄尚書祠部員外郎充集賢校理彭乘博學不倦孤立無徒館殿之中獨為淹乆臣今舉自代舉許渤簽署陜府判官事状右臣竊見權潤州觀察推官許渤在鄉曲時衆推孝行登仕宦後自守靜節天禧三年進士及第授初等職官數任别無過犯至今猶是初等清心至行不求聞逹復通經術長於論議苟非扣撃似不能言伏望聖慈特與改轉京官簽署陜府判官㕔公事庶旌亷退之士以抑僥競之風如後犯正入已贓臣甘當同罪舉滕宗諒状右臣竊見知涇州刑部員外郎直集賢院滕宗諒詞才公器周於致用曽出聖選擢在諫司當時同列之人並已清顯今涇原已有帥臣本州不屯軍馬别無劇務欲乞朝廷改除於繁重處任使如無稱效及有所犯臣甘當同罪舉丘良孫應制科状右臣伏覩先降勅節文今後應京朝官幕職州縣官不曽犯贓私罪情輕並許應賢良方正科目者竊以國家下賢良之詔求補益之言非止掄材将以致治先王坐以待旦旁求俊乂必以得士為昌不以限年為重臣竊見權耀州觀察推官丘良孫學術稽古文辭貫道求之多士冝奉大對臣今舉本人堪應上件科目伏乞朝廷特賜召試若不如舉状甘俟朝典舉張昇自代状右臣伏䝉聖慈特授尚書禮部侍郎臣伏見工部郎中集賢院修撰知潤州張昇筮仕以來清介自立精思劇論有憂天下之心純誠直道無讓古人之節朝野推重臣所不如乞廻臣所授以允公議舉張伯玉應制科状右謹具如前臣竊見秘書丞知并州太谷縣事張伯玉天賦才敏學窮閫奥善言皇王之治博逹今古之冝素藴甚充清節自處嘗應科舉未親册對如今仰被清問罄陳大畧必能竭前人之正論副大君之虚懐擇而行之有補聖教臣今保舉其人堪充應賢良方正能直言極諫科若不如舉状甘俟朝典舉張問孫復状右臣伏覩赦書節文應天下懐材抱器或淹下位或滯草萊委逐處具事由聞奏臣觀國家居安思危搜羅賢俊以充庶位使民受賜此安邦之正體也臣竊見試将作監主簿張問文學履行有名於時前應茂材異等科再考中式以父喪不得就試近上封事始霑國恩職不稱才衆知沈俊臣又見兖州仙源縣寄居孫復元是開封府進士曽到御前素負詞業深明經術今退隱泰山著書不仕心通聖奥跡在窮谷伏望朝廷依赦文採擢張問乞除一陜西藩鎮職事官孫復乞賜召試特加甄奨庶幾聖朝渙汗被于幽滯除樞密副使召赴闕陳讓第一状韓公同上右臣等各准中書劄子奉聖㫖令臣等交割本職公事與鄭戬管勾訖乘遞馬疾速發來赴闕者臣等未立邊功忽承召命必慮别有進擢實不遑寕伏縁臣等自領經畧之任竭心戎事其於邊上利害軍中情偽年嵗之後方能諳悉至若倉卒之際賊謀百端熟於見聞始可料度且朝廷舉天下之力應副西事于今累年賊氣尚驕屢為邊患是朝廷責臣等立效之秋臣等盡節報國之日况賊界雖來請和或恐盟約未合近復却有㸃集事冝将來倍須禦備今去防秋只是百餘日間夙夜經營猶恐闕漏臣等若更離去或致疎虞不惟上悞朝廷愈長寇孽顯是臣等自貪寵異移過後人雖當萬死何以塞責兼近䝉差降中使宣諭臣等候邊事稍寕用在兩地臣等尋具奏聞且乞依舊陳力此由衷之請天鍳可明即非今來虚有陳讓伏望聖慈念邊事至大不可差失特降中㫖允兹至誠許臣等且在本任庶竭疲駑得裨萬一臣等無任云云第二状右臣等奉聖㫖令疾速赴闕臣等為邊事未寕防秋在近已具奏聞乞且在本任去訖竊念臣等自臨邊鄙乆阻闕廷入對清光人臣所願忽承召命豈合稽留然事有可憂須當陳列伏自西事以來邊上帥臣數有改易天下知其不便朝廷毎以曠官承乏不得已而行之臣等四年之中三換邊任不聞成效固當坐責昨以涇原師敗之後朝廷命臣等兼領四路以禦劇寇臣等夙夜議論思有報效奏選将佐促治城塞閱習軍馬完補器械為向秋之備但西人詣闕方議納和臣等不敢出入塞下恐渉生事然常防慮詐計未嘗懈心且西賊前來誓書甚明以四十年之恩信一旦翻覆况今情偽未知復有㸃集之説此大可憂防之日也臣等於此處置纔以諳練上下之情方且禀信節制進退庶無大衂若貪冒寵榮輒便舍去則是復有帥臣數易之弊如寇患再作臣等躬親邊事猶懼不濟或逺料賊情則多失機㑹且臣等自膺寄任䝉朝廷推信日重一日凡百陳請如在帷幄無不施行是臣等遭遇盛明盡節立事之時也所以感激剖述願留嵗年或寇患必息則修固邊備為他時之防如其未寕則與将佐合心持重禦捍冝無深入之憂如賊志倔彊終難調伏則臣等選練兵将於三二年間仗朝廷威靈討服横山界近蕃以遏外患臣等志在分憂非敢飾讓近名頻煩天聴乞聖慈深照臣等無任云云第三状右臣等近以邊事未寕忽承召命兩陳奏牘且乞在任誠慤斯至利害甚明尚慮朝廷未垂照悉謂臣等以禮為讓務取虚名俟及再三即當上道是以重煩天聴終期得請竊以處勞而思逸重内而輕外人情之常也今臣等勤勤懇懇且願竭力塞下豈置身艱苦違人情之所樂以矯時干譽者哉誠以經畫西陲于今累嵗雖無毫髮之效上副委遇其如軍中之事粗已諳詳况西賊父祖以來蓄養姦謀一旦叛命乗累勝之氣而遣人納和此固包藏禍心别營兇計今防秋急備都無數月之期臣等若貪冒寵榮便離職任向去或有侵軼害及生靈使朝廷重憂後人當患則有識之人孰不責咎何施靣目以對威顔雖伏顯誅亦無所救故臣等披瀝肝膈屢有奏述且乞在任以盡疲駑持重保邊庶少敗事或且許其盟約未解防虞則願更留嵗月之間補完闕漏縱其翻覆不失支梧萬一寸功有立寇患稍平則朝廷進用有名臣等歸朝未晩愚衷感切天地可明唯君知臣必當鍳諒伏望聖慈開納早賜允俞臣等無任云云第四状右臣等自承召命累上封章乞且留本任聖明之照必察愚衷然慮朝廷謂成命已行不許改易或謂三讓為禮未賜允可臣等莫遑啟處重煩天聰竊念臣等本以書生昩於兵術朝廷委兹邊事不獲固辭三數年間勉心彊力徒懐憂患㒺敢暇逸至於勲績絶無稱道雖天心至仁尚賜全宥臣等當自循省更思報效豈復舍邊陲之患冒朝廷之寵以取重悔哉所乞且在本任者非敢自謂必能銷殄兇寇以安西鄙蓋臣等受國重委乆於戎政或才力不足終坐重責是臣等之分也若不能畢事移患後人而得謂之忠乎况自來帥臣初至則衆多之言爭陳利害於軍民蕃部之中號令處置頻有更改是以邊塞衆情皆安於習舊而憚於新規又将佐勇怯未能盡知倉卒之時指蹤或誤則其害不細故未平定間忌在數易此朝廷之所明知况今國家急務在於西陲臣等於此用之不為不重乞聖慈特廻天鍳使得盡臣子之心臣等云云第五状右臣等近者忽承詔㫖俾赴闕廷繼上奏封且乞在任未量聖慈果悉愚誠夙夜震惶若無所措伏念臣等自西寇猖獗乆當戎事雖才不逮志未有成績若其裁處軍政審料敵情既踰嵗年粗亦詳練故邊防憂患之急臣等去就之分前奏備列不敢煩陳今所切者昊賊累次盜邊必先偽逹誠欵伺我少懈隨即奔衝今又遣人請和徃復遷延即過夏月其或盟約未合必是又圖侵軼而朝廷當經營防秋之際動易帥臣送故迎新衆情自擾則於禦扞之事不無廢闕賊如乘我不備適足遂其姦謀則是朝廷以西事為輕而以進擢㣲臣為重或因此有誤大計更滋寇孽則臣等貪冒寵異情何以安臣等所以知逺在朝廷不若親臨彊場蓋耳目所接指蹤為便庶於倉卒不失事機况今干戈未寕民力漸屈忠義思奮聖宸重憂冝拔非常之才待以不次之位使其恢宣賢業講求廟筭臣等自當奔走塞下奉行勝畧如此則内資帷幄之議外期節制之行用以相須冀乎必濟伏望聖慈察臣等忠藎之懇素有本末實不以内外之職輕重於心早賜俞允使盡臣子之節臣等云云范文正集巻十八欽定四庫全書范文正集巻十九宋范仲淹撰状
