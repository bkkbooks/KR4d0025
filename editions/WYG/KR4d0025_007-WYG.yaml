body:
  text: 桐廬郡嚴先生祠堂記先生漢光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆天下孰加焉惟先生以節髙之既而動星象歸江湖得聖人之清泥塗軒冕天下孰加焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯髙尚其事先生以之在屯之初九陽徳方亨而能以貴下賤大得民也光武以之蓋先生之心出乎日月之上光武之器包乎天地之外微先生不能成光武之大微光武豈能遂先生之髙哉而使貪夫㢘懦夫立是有大功於名教也某來守是邦始搆堂而奠焉迺復其為後者四家以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山髙水長南京書院題名記皇宋闢天下建太平功掲日月澤注河漢金革塵積絃誦風布乃有睢陽先生贈禮部侍郎戚公同文以賁于丘園教育為樂門弟子由文行而進者自故兵部侍郎許公驤而下凡若干人先生之嗣故都官郎中維樞密直學士綸並純文浩學世濟其美清徳素行貴而能貧祥符中鄉人曹氏請以金三百萬建學于先生之廬學士之子殿中丞舜賔時在私庭俾幹其裕故太原奉常博士瀆時舉賢良始掌其教故清河職方員外郎吉甫時以管記以領其綱學士畫一而上真宗皇帝為之嘉歎面可其奏今端明殿學士盛公侍郎度文其記前參預政事陳公侍郎堯佐題其榜由是風乎四方士也如狂望兮梁園歸歟魯堂章甫如星縫掖如雲講議乎經詠思乎文經以明道若太陽之御六合焉文以通理若四時之妙萬物焉誠以日至義以日精聚學為海則九河我吞百谷我尊淬詞為鋒則浮雲我決良玉我切然則文學之器天成不一或醇醇而古或郁郁於時或峻于層雲或深於重淵至於通易之神明得詩之風化洞春秋褒貶之法逹禮樂制作之情善言二帝三王之書博渉九流百家之説者蓋互有人焉若夫廊廟其器有憂天下之心進可為卿大夫者天人其學能樂古人之道退可為鄉先生者亦不無矣觀夫二十年間相繼登科而魁甲英雄儀羽臺閣蓋翩翩焉未見其止宜觀名列以勸方來登斯綴者不負國家之樂育不孤師門之禮教不忘朋簪之善導孜孜仁義惟日不足庶㡬乎刋金石而無愧也抑又使天下庠序規此而興濟濟羣髦咸底於道則皇家二五之風歩武可到戚門之光亦無窮已他日門人中絶徳至行高尚不仕如睢陽先生者當又附此焉清白堂記㑹稽府署據卧龍山之南足北上有蓬萊閣閣之西有凉堂堂之西有巖焉巖之下有地方數丈密蔓深叢莽然就荒一日命役徒而闢之中獲廢井即呼工出其泥滓觀其好惡曰嘉泉擇高年吏問廢之由不知也乃扃而澄之三日而後汲視其泉清而白色味之甚甘淵然丈餘綆不可竭當大暑時飲之若餌白雪咀輕冰凛如也當嚴冬時若遇愛日得陽春溫如也其或雨作雲蒸醇醇而渾蓋山澤通氣應於名源矣又引嘉賓以建溪日注卧龍雲門之茗試之則甘液華滋說人襟靈觀夫大易之象初則井道未通泥而不食弗治也終則井道大成收而勿幕有功也其斯之謂乎又曰井徳之地蓋言所守不遷矣井以辨義蓋言所施不私矣聖人畫井之象以明君子之道焉予愛其清白而有徳義為官師之規因署其堂曰清白堂又搆亭于其側曰清白亭庶幾居斯堂登斯亭而無忝其名哉寳元二年月日記岳陽樓記慶厯四年春滕子京謫守巴陵郡越明年政通人和百廢具興乃重脩岳陽樓増其舊制刻唐賢今人詩賦于其上屬余作文以記之余觀夫巴陵勝狀在洞庭一湖銜逺山吞長江浩浩湯湯横無際涯朝暉夕陰氣象萬千此則岳陽樓之大觀也前人之述備矣然則北通巫峽南極潚湘遷客騷人都㑹於此覽物之情得無異乎若夫霪雨霏霏連月不開陰風怒號濁浪排空日星隠耀山嶽潛形商旅不行檣傾檝摧薄暮㝠㝠虎嘯猿啼登斯樓也則有去國懷鄉憂讒畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦鱗游泳岸芷河蘭郁郁青青而或長煙一空皓月千里浮光躍金静影沉璧漁歌互答此樂何極登斯樓也則有心曠神怡寵辱偕㤀把酒臨風其喜洋洋者矣嗟夫予嘗求古仁人之心或異二者之為何哉不以物喜不以已悲居廟堂之髙則憂其民處江湖之逺則憂其君是進亦憂退亦憂然則何時而樂耶其必曰先天下之憂而憂後天下之樂而樂乎噫微斯人吾誰與歸時六年九月十五日邠州建學記國家之患莫大於乏人人曷嘗而乏哉天地靈粹賦于萬物非昔醇而今漓吾觀物有秀於類者曽不減於古豈人之秀而賢者獨下於古歟誠教有所未格器有所未就而然耶庠序可不興乎庠序者俊乂所由出焉三王有天下各數百年竝用此道以長養人材材不乏而天下治天下治而王室安斯明著之效矣慶厯甲申嵗予參貳國政親奉聖謀詔天下建郡縣之學俾嵗貢羣士一由此出明年春予得請為豳城守署事之三日謁夫子廟通守太常王博士稷告予曰奉詔建學其材出於諸生備矣今夫子廟隘甚羣士無所安因議改卜于府之東南隅地為髙明遂以建學并其廟遷焉以兵馬監押劉保節度推官楊承用共掌役事博士朝夕視之明年夏厥功告畢増其廟度重師禮也廣其學宫優生員也談經於堂藏書於庫長廊四迴室從而周總一百四十楹廣廈髙軒處之顯明士人洋洋其來如歸且曰吾黨居后稷公劉之區被二帝三王之風其吾君之大賜吾道之盛節歟敢不拳拳服膺以樹其徳業哉予既改南陽郡博士移書請為之記予嘗觀易之大象在小畜曰君子以懿文徳謂其道未通則畜乎文徳俟時而行也在兑曰君子以朋友講習謂相説之道必利乎正莫大於講習也諸生其能知吾君建學聖人大易之旨則庶幾乎故書之天竺山日觀大師塔記師錢塘人也姓仲氏名善昇十嵗出家十五通誦法華經十七落髪受具戒客京師三十年與儒者遊好為唐律詩且有佛學天禧中詔下僧錄簡長等注釋御製法音集師預選中書畢詔賜師名遂還故里公卿有詩送行師深於琴余嘗聽之愛其神端氣平安坐如石指不纎失徽不少差遲速重輕一一而當故其音清而弗哀和而弗淫自不知其所以然精之至也予嘗聞故諭徳崔公之琴雅逺清静當代無比如師則近之矣康定中入天竺山居日觀庵曰吾其止乎不下山者十餘年誦蓮經一萬過皇祐元年余至錢塘就山中見之康彊精明話言如舊一日遣侍者持書謝余曰吾願足矣將去人世必藏於浮圖之下願公記焉又一日侍者來告曰師化矣其門人中靄等𦵏師于塔復以師之言求為之銘銘曰山月亭亭兮師之心山泉泠泠兮師之琴真性存兮孰為古今聊志之兮天竺之岑書奏上時務書天聖三年四月二十日文林郎守大理寺丞臣范仲淹謹詣閤門再拜死罪上書皇太后陛下皇帝陛下臣聞巧言者無犯而易進直言者有犯而難立然則直言之士千古謂之忠巧言之人千古謂之佞今臣勉思藥石切犯雷霆不遵易進之塗而居難立之地者欲傾臣節以報國恩恥佞人之名慕忠臣之節感激而發萬死無恨况臣之所言皆聖朝當行之事而未之行者諒有以也聖人之心豈不至此蓋當乎一日萬幾未暇餘論大臣之心豈不至此蓋懼乎上疑下謗未克果行臣請言之以發聖慮臣聞國之文章應於風化風化厚薄見乎文章是故觀虞夏之書足以明帝王之道覽南朝之文足以知衰靡之化故聖人之理天下也文弊則救之以質質弊則救之以文質弊而不救則晦而不彰文弊而不救則華而將落前代之季不能自救以至于大亂乃有來者起而救之故文章之薄則為君子之憂風化其壞則為來者之資惟聖帝明王文質相救在乎已不在乎人易曰窮則變變則通通則久亦此之謂也伏望聖慈與大臣議文章之道師虞夏之風况我聖朝千載而會惜乎不追三代之髙而尚六朝之細然文章之列何代無人蓋時之所尚何能獨變大君有命孰不風從可敦諭詞臣興復古道更延博雅之士布於臺閣以救斯文之薄而厚其風化也天下幸甚臣又聞聖人之有天下也文經之武緯之此二道者天下之大柄也昔諸侯暴武之時孔子曰俎豆之事則嘗聞之此聖人救之以文也及夾谷之會孔子則曰有文事者必有武備請設左右司馬此聖人濟之以武也文武之道相濟而行不可斯須而去焉唐明皇之時太平日久人不知戰國不慮危大寇犯關勢如瓦解此失武之備也經曰禍兮福所倚福兮禍所伏乂曰防之於未萌治之於未亂聖人當福而知禍在治而防亂故善安身者在康寧之時不謂終無疾病於是有節宣方藥之備焉善安國者當太平之時不謂終無危亂於是有教化經畧之備焉我國家文經武緯天下大定自真宗皇帝之初猶有舊將舊兵多經戰敵四􅆥之患足以禦防今天下休兵餘二十載昔之戰者今已老矣今之少者不知戰争之事人不知戰國不慮危豈聖人之意哉而况守在四􅆥不可不慮古來和好鮮克始終唐陸贄議云犬羊同類狐鼠為心貪而多防狡而無恥威之不悟撫之不懷雖或時有盛衰大抵常為邊患屬方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求浸多飜覆不定託因細事嘖有煩言猜矯多端其斯可騐此唐人之至論也今自京至邊並無闗嶮其或恩信不守釁端忽作戎馬一縱信宿千里若邊少名將則懼而不守或守而不戰或戰而無功再扣澶淵豈必尋好未知果有幾將可代長城伏望聖慈鑒明皇之前轍察陸贄之讜議與大臣論武於朝以保天下先命大臣密舉忠義有謀之人授以方畧委之邊任次命武臣密舉壯勇出羣之士試以武事遷其等差壯士蒙知必懷報効列於邊塞足備非常其或自謂無虞不欲生事輕長世之策苟一時之安邊患忽來人情大駭自古兵不得帥魚肉無殊乃欲倉卒戰鬭之間拔卒為將豺狼競進真偽交馳此五代之前鑒也至於塵埃之間豈無壯士宜復唐之武舉則英雄之輩願在彀中此聖人居安慮危之備備而無用國家之福也惟聖意詳之臣又聞先王建官共理天下必以賢俊授任不以爵祿為恩故百僚師師各揚其職上不輕授下無冒進此設官之大端也我國家累聖求理而致太平大約紀綱法象唐室以臣觀之宜法唐興之時不宜法唐衰之後唐興之時特開館殿以待賢俊得學士十八人聲滿天下此文皇養將相之材以論道經邦而成大化也暨至中興往往得人唐衰之後此選不盛我朝崇尚館殿目為清華輔相之材多由此選三館清密古謂登瀛近嵗選出内庭逼居坊陌非唐所謂集仙之館也又其間校讐之職或不由科第以恩而除限以嵗年漸至清顯輕十八學士之選恐非文皇養將相之材之意也伏望聖慈與大臣議其可否重為制度以法唐興之時而延廊廟之器此國家之大美也惟聖意詳之又諫官御史耳目之司不諱之朝宜有賞勸自陛下臨政以來未聞旌一諫員賞一御史若言而無補是選之不精言而有補豈賞之不行徒使犯顔者危緘口者安以進藥石為虚言以陳絲髪為供職三載之後進退雷同臣恐天下竊議朝廷言路未廣忠臣未勸將令諫官御史之徒尸素於朝非國家之福也惟聖意詳之臣又聞先王義重君臣賞延于世大勲之後立賢為嗣餘子則以才自調不使混淆而後大防一隳頽波千載凡居近位嵗進子孫簪紱盈門冠蓋塞路賢與不肖例升京朝謂之賞延無乃太甚此必前代君危臣僭之際務相姑息因為典故以至於斯又百司之人本避鄉役不踰數嵗例與出官莫非貪忍之徒絶異孝亷之舉使親民政其弊如何開此二途嵗取百數無所不有實累王風恐非任官惟賢之體也人避衆怨不敢上言遂令仕路紛紜祿位填委文武官吏待闕踰年貪者益礪其爪牙亷者悉困於寒餓徒於禮闈之内増其艱難壯士惜年數嵗一舉乃相奔競至有訟争而况脩辭者不求大才明經者不問大旨師道既廢文風益澆詔令雖繁何以戒勸士無㢘讓職此之由其源未澄欲波之清臣未之信也儻國家不思改作因循其弊官亂於上風壞於下恐非國家之福也儻為長久之策則願與大臣特新其議澄清此源不以謗議為嫌當以治亂為意此國家之福也惟聖意詳之臣聞以徳服人天下欣戴以力服人天下怨望堯舜以徳則人愛君如父母秦以力則人視君如仇讎是故御天下者徳可憑而力不可恃也伏惟皇太后陛下皇帝陛下日崇聖徳以永服天下之心若夫敦好生之志推不忍之心薄於刑典厚於惻隠在物祝網於民泣辜常戒百官勿為苛酷示天下之慈也唯聖人能之恥珠玉之玩罷組繡之貢焚晉武之雉裘出文皇之宫人少度僧尼不興土木示天下之儉也唯聖人能之鷄鳴而起孜孜聽政每有餘暇則召大臣講議文武訪問艱難此皇王之勤也唯聖人勉之貴賤親疎賞罰惟一有功者雖憎必賞有罪者雖愛必罰捨一心之私從萬人之望示天下之公也唯聖人行之自古帝王與佞臣治天下天下必亂與忠臣治天下天下必安然則忠臣骨鯁而易疎佞臣柔順而易親柔順似忠多為美言骨鯁似彊多所直諌美言者得進則佞人滿朝直諫者見疎則忠臣避世二者進退何以辨之但日聞美言則知佞人未去此國家之可憂也日聞直諌則知忠臣左右此國家之可喜也伏惟聖明不可不察自古王者外防􅆥狄内防姦邪􅆥狄侵國姦邪敗徳國侵則害加黎庶徳敗則禍起蕭牆乃知姦邪之凶甚於􅆥狄之患伏惟聖明常好正直以杜姦邪此致理之本也臣又聞聖人宅九重之深鎮萬國之望以静制動以重為威如天之髙如地之深使人不得容易而議也昨覩鑾駕順動稍頻恐非深居九重静鎮萬國之意况進奏院報於天下天下聞之恐損威重先朝以御宇日深功成天下巡幸之費尚或諌止今繼明之始聖政方新宜加憂勤深防逸豫則人心大悦天道降康不比先帝功成之年未可輕為巡幸伏惟聖慈再三詳覽每有順動必循典禮以服天下之望臣又聞人主納逺大之謀久而成王道納淺末之議久而成亂政方今聖人在上賢人在側取捨之際豈有未至然而刑法之吏言絲髪之重輕錢榖之司舉錙銖之利病則往往謂之急務響應而行或有言政教之源流議風俗之厚薄陳聖賢之事業論文武之得失則往往謂之迂說廢而不行豈朝廷薄逺大之謀好淺末之議哉伏望聖慈納人之謀用人之議不以逺大為迂說不以淺末為急務則王道大成天下幸甚臣又聞聖人之至明也臨萬幾之事而不敢獨斷聖人之至聰也納羣臣之言而不敢偏聽獨斷則千慮或失偏聽則衆心必離人心離則社稷危而不扶聖慮失則政教差而彌逺故先王務公共設百官而不敢獨斷者懼一慮之失也開言路采羣議而不敢偏聴者懼衆心之離也今聖政方新動思公共委任兩地出入萬幾萬幾之繁能無得失乃許羣臣上言以補其闕使上無蒙蔽下無壅塞有以見聖人之不獨斷也天下幸甚然而臣下上言密陳得失未可盡以為實亦當深究其宜或務窺人短長或欲希旨上下動揺賞罰之柄離隔君臣之情似是而非言偽而辯雖聖鑒之下能無惑焉偶動宸衷無益王道似此密奏之類更望聖慈深加詳覽與大臣議論可否然後施行儻密奏之言便以為實内降處分一面施行則讒譖之人緣隙而進以訐為直以詐為忠使内外相疑政教不一非致理之本也古人有言曰為君難為臣不易者其在此乎伏惟聖明不可不察又自古親近小臣率多纎佞恃國恩寵為人階緣公議未行私請先至如此則人皆由徑政有多門伏望聖慈深為防慮以存至公之道也臣曲陋之人本無精識覽前王之得失究聖朝之取捨因敢罄而陳之伏望聖慈詳擇一二干犯天威臣無任戰汗激切屏營之至臣某昧死謹言范文正集巻七欽定四庫全書范文正集巻八宋范仲淹撰書
