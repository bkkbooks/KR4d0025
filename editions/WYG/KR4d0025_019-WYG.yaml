body:
  text: 陳乞邠州状右臣聞臣之事君也貴先勞而後禄朝之命官也患重内而輕外重内輕外何以收藩翰之功先勞後禄所以勵搢紳之志臣雖無似輒慕前修臣昨在朝日曽與韓琦同進陜西攻守策又覩手詔云今用何人鎮彼西方又去年秋曽有聖㫖令韓琦與臣互換往邊上照管臣遂面奏乞罷參知政事知陜西一郡兼沿邊安撫使乞不轉官及不帯招討部署之名尋䝉聖恩差充陜西宣撫使又以契丹舉兵西征元昊在河東接近復差臣兼河東宣撫使臣自至河東體量得邊上利害各己奏陳今余靖自北既回必見契丹無南牧之意臣乆住州軍亦慮煩擾欲過陜西即又宣撫使所行諸軍須望特支恩澤縁南郊均賜之後陜西府庫已虚或更行特支又須費十數萬貫如不徃陜西則前所上攻守之策復成空言伏望聖慈依臣前來面奏罷參知政事并安撫使只差臣於邠涇間知一州帯沿邊安撫使乞不轉官仍不帯招討部署之名如此則不銷更散特支自可就近處置邊事臣此直誠並守前奏俟三二年間邊事寕息攻守有備儻聖恩未移用臣不晩庶朝廷無内重外輕之失臣亦有先勞後禄之效進退始終良得其冝臣無任云云陳乞鄧州状右臣聞理之安危固當殊體官之廢置孰可冒居竊念臣昨廁台司日曕宸扆親承睿詔俯念邊防思得邇臣徃分重寄臣既獲聞命因敢請行遽将宣慰之恩來徃屯戍之旅臣以戎情未測備預當嚴願領一藩兼按四路欲将臣與韓琦所上邊策躬親施行尚䝉朝廷付兹職任臣自到豳土已逾半年復以前策奏陳庶逃尸素朝廷以彼戎欵順方用柔懐不欲修威恐成生事臣之所上必可寝停今又覩朝㫖據鄜延路奏所定疆界並已了當仰保安軍鎮戎軍𣙜務通行博易者事或寕靜理當改更其陜西邊事自有逐路經畧使處置惟此四路安撫使今後别無事務欲乞朝廷指揮廢罷臣則宿患肺疾每至秋冬發動若當國有急難之時臣不敢自求便安且當勠力今朝廷宣示西事已定况邠州元係武臣知州伏望聖慈恕臣之無功察臣之多病許從善地就訪良醫於河中府同州或京西襄鄧之間就移一知州取便路赴任示君親之至仁從臣子之所望實繄聖造得養天年臣無任瞻天仰聖云云舉李宗易向約堪任清要状准御史臺牒准慶厯八年五月十四日勅節文於内外升朝官曽任通判成資以上人内堪任清要任使者各同罪保舉貳名並須歴任無公私過犯及不是見任兩府并自己親情方得奏舉或雖公罪杖以下情理輕亦許論薦者右謹具如前臣伏見知絳州職方員外郎向約生相輔之家而能專儒學謹官業㢘貧苦節慎靜寡過臣前知潤州日約為通判備見操守後來累次為郡皆有理績推舉甚衆未䝉奨擢知光化軍屯田員外郎李宗易天禧三年進士第九人及第素負詞雅居常清慎有靜理之才無躁進之跡今在隣屬稔聞治状人憂其去吏不敢苛此二人者乆於揚歴各有行實並堪充清要任使如朝廷擢用後犯入已贓臣甘當同罪即不是見任兩府并自己親情歴任並無私罪内有公罪者亦係杖已下情理不重謹具状奏聞伏候勅㫖舉張諷李厚充青州職官状伏奉勅命就差知青州兼安撫使已到任訖今具合奏辟官二員如後一前御史臺主簿張諷文學懿贍履行純雅未升科進的有才稱欲乞朝廷採於清議推以異恩特賜召試授一出身差簽署青州觀察判官㕔公事新注下正官王嘉祥即今未到乞勘㑹京東路節鎮别除一處一鄧州南陽縣主簿李厚進士出身素有文行渉道且深到任已成一考見權鄧州職官欲乞朝廷特除權青州兩使推官兼管句安撫司機冝文字節度推官近新到任乞移側近州郡如難得闕即乞許令安撫司差權見闕官處勾當所貴不住俸給况本路見闕官數員右謹具如前臣受國寄任日憂曠闕或得此二人助其不逮庻無敗事如朝廷擢任後犯入已贓及不如舉状臣並甘當同罪謹具状奏聞伏候勅㫖薦李覯并録進禮論等状右臣聞古之明王坐以待旦旁求俊乂蓋将盡天下之才成天下之務故為臣者以舉善為忠亦将竭知人之明副待旦之意也臣親逢聖旦嘗忝輔臣輒慕前修之為少荅非常之遇臣伏見建昌軍草澤李覯前應制科首被召試有司失之遂退而隱竭力養親不復干禄鄉曲俊異從而師之善講論六經辯博明逹釋然見聖人之㫖著書立言有孟軻揚雄之風義實無愧於天下之士而朝廷未賜采收識者嗟惜可謂遺逸者矣臣竊見徃年處州草澤周啟明攻於詞藻又江寕府草澤張元用及近年益州草澤龍昌期並老於經術此三人者皆䝉朝廷特除京官以示奨勸臣觀李覯於經術文章實能兼富今草澤中未見其比非獨臣知此人朝廷士大夫亦多知之臣今取到本人所業禮論七篇明堂定制圖序一篇平土書三篇易論十三篇共二十四篇編為十巻謹繕冩上進伏望聖慈當乞夜之勤一賜御覧則知斯人之才之學非常儒也其人以母老不願仕宦伏乞朝廷優賜就除一官許令侍養亦可光其道業榮於閭里以明聖人在上下無遺才若不如舉状臣甘重受朝典謹具状奏聞伏候勅㫖進故朱寀所撰春秋文字及乞推恩與弟寘状右臣伏見故祕書丞集賢校理朱宷幼有俊材服膺儒術研精道訓務究本源越自經庠擢升文館力學方起美志未伸不幸天喪深可嗟悼寀春秋之學為士林所稱有唐陸淳始傳此義學者以為春秋之道乆隱而近乃出焉寀苦心探賾多所發揮其所著春秋指歸等若干巻謹繕冩上進乞下兩制詳定如實可收采則乞宣付崇文院又念其人家道貧窶妻息孤窮有親弟寘亦習儒業未登仕禄伏望聖慈特霑一命况寀曽任府界提㸃偶縁病罷别無過犯中前監察御史梁堅蔡禀等亡後亦䝉録用子孫體例頗同不為僥倖以彰聖朝旌録儒學使其孤幼不墜丘壑亦天地之造也干冒宸嚴臣云云陳乞潁亳一郡状右臣輒陳危悃上黷髙聰逖仰雷霆不任淵谷竊念臣渉道至淺賦材本下爰從孤宦首被聖知自謂得君未嘗避事險易一志周旋四方今守東齊方靣亦重救災禦寇敢不盡心而年高氣衰日増疾恙去冬以來頓成羸老精神減耗形體尫弱事多遺忘力不支持其青州常程公事已牒通判職官發遣其安撫一路九州軍兵馬公事繁多至於郡縣利害鄉川寇盜皆禀本司指蹤自臣抱病勾管不前上無以分宵旰之憂下無以逃尸素之誚惟是奏報文字臣則竭心勉率亦多稽緩揣已量力實不自安伏望聖慈於潁亳二州就差臣一處所貴閒慢少事可以養疾庶安朽質少保殘年仰祈洪造之私惟誓丹衷之報臣無任云云劄子論西京事冝劄子臣近親奉徳音以孔道輔曽言遷都西洛臣謂未可也國家太平豈可有遷都之議但西洛帝王之宅負關河之固邊方不寕則可退守然彼空虚已乆絶無儲積急難之時将何以備冝以将有朝陵之名漸營廪食陜西有餘可運而下東路有餘可運而上數年之間庶幾有備太平則居東京通濟之地以便天下急難則居西洛險固之宅以守中原易曰天險不可升地險山川丘陵王公設險以守其國此之謂也先王修徳以服逺人然安不忘危故不敢去兵以恃徳也陛下内惟修徳使天下不聞其過外亦設險使四夷不敢生心此長世之䇿也伏望聖慈未煩下議且留聖意可俟臣口對不備謹再具状奏聞論復併縣劄子臣伏覩赦書節文西京河陽管界諸縣近經併廢頗聞人民不便並特令依舊臣去年秋纔入中書䝉聖慈差中使催臣言事臣首陳七事内一事為天下民困由吏役煩重如西京在後漢時三十七萬户置二十縣唐㑹昌中十七萬户置十九縣今有五萬六千户尚置十九縣是户口十分去七而縣額如舊吏役不減安得百姓不困哉後漢光武詔天下併減四百餘縣此治世之規可舉為法臣請先於西京減併縣分以省吏役奉聖㫖下范雍并本路轉運使密切相度聞奏尋據范雍夏安期等奏相度西京縣邑衆多人户差役頻併今來減縣邑為鎮實亦利便除山險空迥地里闊逺及陵寝所安難為廢罷外乞併作十三縣委得允當别無妨礙尋䝉朝廷依奉降勅施行訖約計減役人一千五六百户已放歸農官員亦已省罷訖竊聞後來有臣僚上言或稱縣尉檢覆地逺且逐縣界分俱不及百里如南方縣分有三二百里者亦只一員縣尉以此方之甚不遥逺或稱却費軍人把守其守把軍人即非旋有招置並是本府宣毅兵士在本府中亦須請受或稱酒稅虧額今體問得逐鎮比舊日却有増盈其所上言皆非害民之事况無實状只是坊郭物力之人恐産業閒慢或逐縣公人中有巢穴已成不願更改者因兹妄説不便扇揺人情致臣僚誤有採聞形于奏牘朝廷未深窮究便以為然改已行之命特作霈恩而不知一千五六百户免役之家重加勞擾殊非霑恩之意只是坊郭物力之人縣邑狡猾之吏遂其志願僥倖歡呼必有作感聖恩道場以惑朝聴者其鄉川之民棄農就役復為愁苦是害其本而徇其末也且光武之朝詔下併四百縣何號令之行無敢沮者今朝廷止併六縣而號令已出敢有沮言是國家命令不行於外恩澤不逮於民矣國政如此則天下無事可行皆欲守因循之弊弊不可救亂所由生且西京在漢時三十七萬户置二十縣今五萬六千户置十九縣其吏役勞擾亦甚明白非隱昧之事臣為近輔請行此令者蓋欲蘓息窮民且非利已縁親奉徳音并降中使促令論列時事非臣輒有改易况典故甚明非出自胷臆如上言不當乞朝廷直行黜罷不銷重擾生民而沮此一議若轉運使等定奪不當亦乞朝廷駁下不當事件特行勘問明示責降自然利害分别中外無疑臣本上言之人如不黜罷其元定奪之官又不勘問却将重擾生民之事作恩宥施行於體不便不知令諸縣仍舊恵及何人臣為朝廷惜此一舉使天下無復有省役息民之望伏望聖慈指揮西京未得追擾放役之人别候朝廷指揮更年嵗間利害既明謗議自息所以懇懇上言者忝為輔臣知利害不能執守則國家之恵必不能行生民之弊亦不能去儻朝廷以臣僚上言為是以臣所言為非即乞依臣所奏早加勘劾速行降黜臣即甘于伏罪不復論列取進止乞修京城劄子臣危言孤立乆荷聖知當此旰昃之憂豈可循黙自守雖言而無取亦以盡臣子之心臣先於景祐三年五月初在開封府曽進劄子言西洛帝王之宅絶無儲備乞聖慈以将有朝陵為名使東道有餘則運而西上西道有餘則運而東下數年之間庻幾有備太平則居東京舟車輻湊之地以便天下急難則守西洛山河之宅以保中原當時臣言西洛可營者以備急難也今北事既動營洛已晩臣今别有愚見請一二以陳之臣竊聞修建北京以禦大敵以臣料之可張虚聲未可為倚何哉河朔地平去邊千里北馬豪健晝夜兼馳不十數日可及澶淵陛下乘輿一動千乘萬騎非數日可辦倉卒之間敵騎已近欲進北京其可及乎此未可一也又承平已乆人不知戰聞敵大至羣情憂恐陛下引憂恐之師進渉危地或有驚潰在爪牙之臣誰能制之此未可二也又北京四靣盡平絶無險扼之地儻乘輿安然到彼而敵騎旁過直趨河南於澶淵四面乘凍而渡京師無備将何以支宗廟社稷宫禁府庫皇宗戚里之屬千官百辟之家六軍萬民血屬盡在無金城湯池可倚無堅甲利兵可禦陛下行在河朔心存京師豈無廻顧之大憂乎此未可三也假使大河未凍敵不得渡而直圍守澶淵聲言向闕以割地㑹盟為請當此之時京師無備敵騎俯逼陛下能堅守不動而拒其請乎唐明皇時禄山為亂舊将哥舒翰引四十萬兵屯守潼關請不出戰且以困賊楊國忠促令進討一戰大敗遂陷長安今京師無備敵或南牧朝廷必促河朔諸将出兵截戰萬一不勝則有天寳之患朝廷将安徃乎昔煬帝盤遊淮甸違逺關中唐祖據之隋室遂傾明皇出幸西蜀非肅宗立於朔方天下豈復為唐乎徳宗欲幸益都李晟累奏乞且幸山南以係人心乃知朝廷萬邦之根本今陜西河北聚天下之重兵如京師揺動違逺重兵則姦雄奮飛禍患四起臣聞天有九閽帝居九重是王者法天設險以安萬國也易曰天險不可升地險山川丘陵王公設險以守其國正在今日矣臣請陛下速修東京高城深池軍民百萬足以為九重之備乗輿不出則聖人坐鎮四海而無煩動之勞鑾輿或出則大臣居守九重而無廻顧之憂矣彼或謀曰邊城堅牢不可卒攻京師坦平而可深犯我若修完京師使不可犯則是伐彼之謀而沮南牧之志矣敵入之淺則邊壘已堅敵入之深則都城已固彼請割地我可弗許也彼請決戰我可勿出也進不能為患退不能急歸然後因而撓之返則追之縱有抄掠可邀可奪彼衰我振未必不大勝也此陛下保社稷安四海之全䇿矣或曰京師王者之居髙城深池恐失其體臣聞後唐末契丹以四十萬衆送石高祖入朝而京城無備閔宗遂亡石晋時叛臣張彦澤引契丹犯闕而京城無備少主乃陷此皆無備而亡何言其失體哉臣但憂國家之患而不暇顧其失體也若以修完城隍為失體不猶愈於播遷之禍哉朝廷大臣百辟必暁此事但懼議者謂其失體而不敢言臣任在西陲非當清問而輒言此事誠罪人也然臣子之心豈敢忘君親之憂况臣素來愚拙惟知報國而不知其受謗矣昔奉春君負販之夫勸高祖都關中而張良贊之翌日命駕臣叨預近列而輒建言比之奉春之僭未甚為過至於西洛帝王之宅太祖營修蓋意在子孫表裏山河接應東京之事勢連屬關陜之形勝又河陽據大川之險當河朔河東㑹要為西洛之北門又長安自古興王之都天下勝地皆願朝廷留意常委才謀重臣預為大備天下幸甚干犯聖威臣無任云云又臣近覩邸報有北使到闕逺近稱慶及見逐處關報事宜却言西北兩界各大㸃集比疑北使之來未甚誠實以四十年之恩信無故動揺恐非有限之貨能足無厭之心此可大為之防盟誓不足倚也敵情翻覆自古非一臣竊覩朝廷未修東京而先修北都臣謂東京根本也北都枝葉也雖先朝曽有北都之行當自有宿将舊兵嘗經大敵然猶上下憂疑盤桓而進今太平已乆人情易動又無宿将舊兵不可不過慮也臣見邊上将佐軍旅恥言不武爭乞効命及其臨敵十無一勇臣恐駕前諸班武士務誇膽勇有悞陛下昔漢樊噲對上曰臣願得十萬衆横行匈奴中季布叱曰噲可斬也昔匈奴圍高帝於平城漢兵三十二萬噲時為上将軍不能解圍今言以十萬横行是靣謾也今陛下自顧左右将軍有如樊噲者乎臣昨上言請修京城宜持重而不動者蓋為此也若将廵幸北都臣謂有可慮之事者五願陛下思之臣三四年來聞人所傳契丹造舟安輪遇陸可載遇川可濟如南牧而來於滄徳之間先渡黄河取鄆濮而襲我京城陛下虚徃北京而敵入東路此可慮之一也又宗廟社稷皇宫戚里千官百辟六軍萬民之家盡在京師而城池無備敵或大至将何保守此可慮之二也若廵幸北京六軍盡出廻顧京師億萬之中或有姦兇竊發為亂陛下之心能安於外乎此可慮之三也假使鑾輿未出敵逼澶淵聲言向闕有割地之請既京師無備朝廷能拒其請乎此可慮之四也又敵騎之來必數十萬其河朔之兵當須持重如京城無備畏彼深入必促重兵與之決戰萬一有哥舒之敗則社稷為憂此可慮之五也願陛下必修京城可禦大患况天子之城古有九重之號未聞以不嚴不固而為國體也能嚴且固則上自宗廟社稷下及百萬之衆可安堵矣陛下乘輿不煩順動矣雖敵入東路不得而襲矣彼扣澶淵有割地之請可拒而弗許矣彼求決戰可戒諸将持重而勿出矣彼知京師有備大軍持重則南牧之志不得而縱足以伐其謀矣而復銳則避之困則擾之夜則驚之去則躡之因其隙而圖焉皆須京師大固然後能行其策近代戎狄為京師之禍者數四矣不可不大為之防易曰王公設險以守其國此先聖之訓非臣之所能言也惟聖鍳裁之乞召還王洙及就遷職任事劄子臣聞國家求治莫先於擢才臣之納忠無重於舉善臣竊見工部員外郎直龍圖閣新差知徐州王洙文詞精贍學術通博國朝典故無不練逹搢紳之中未見其比以唐之虞世南先朝之杜鎬方之不甚過也臣在中書日洙曽求知越州時章得象以下並言朝廷每有典禮之疑則問此人必見本末豈當許求外任遂不行所請尋以撰成國朝㑹要一百五十巻䝉恩進直龍圖閣依舊天章閣侍講仍賜金紫以旌稽古之能也後以赴進奏院筵㑹乃在京諸司常例得從一日之休徒以横議中傷例譴居外三經赦宥未䝉召還􅂲非聖朝棄瑕采善之意臣近見此人來知襄州復能精勤政治庻務修舉清簡和恕吏民樂康乃知其才内外可用自任工部員外郎已及六考不求磨勘直龍圖閣亦又四年未曽遷改伏望聖慈不以人之小累而廢其大善如朝廷采鴻儒碩學以備詢訪則斯人之選為中外所服矧有懿文可以發明議論潤色訓謨欲乞特賜召還儀表臺閣儻朝廷意切生民重其外補則乞就遷近職别領大藩使搢紳之列知稽古有勸為善弗掩實聖政之端也臣嘗叨近輔知無不言况襄鄧鄰封稔聞善治或不如舉状臣受上書詐不實之罪如朝廷擢用後犯入已贓臣自甘當同罪取進止范文正集巻十九欽定四庫全書范文正集巻二十宋范仲淹撰賦
