body:
  text: 謝轉給事中移知鄧州表臣某言伏䝉聖恩特授臣給事中依前資政殿學士知鄧州者洊進榮階徃臨善壤允為兊渥彌集震驚臣中謝竊念臣立跡本孤逢辰其盛以芻言㒺避擢登侍從之班以睿奨素隆選預弼諧之列乏増君之善道寡措國之令謀無補當時自安何地遽上借麾之懇實畏在梁之譏俄奉明恩曲加異數假職名於祕殿領使範於邊藩由朝廷之威靈屬羌戎之欵順方露便安之請忽頒霶霈之私青瑣是登朱轓載啟臣績未著合陳三讓之封君命已行懼致再言之黷進退惶惑不知所裁此蓋伏䝉皇帝陛下天造曲成皇暉乆照敦川澤并包之量法山雷善養之經憫其勤勞致諸安逸示中外之一體保君臣之至懽臣敢不寅奉朝經躬修民政孜孜共理少望於前賢蹇蹇一心無忘於大節臣已一面起發赴任次無任云云謝在中書日行遣公事不當放罪表臣某言近准中書劄子伏䝉聖慈以臣等在中書日行遣李曇男公事不當特放罪者具位之材早虧於國論大明之照終示於天慈爰霽震霆允為渙汗臣中謝向以昧陋參于幾㣲心則首公智非周物日視四方之奏類多庻獄之疑而有告訐以言情偽未究妖兇既斃證左弗完上開三靣之仁在刑惟恤僉重一成之議至失不經多歴嵗時尚騰牒訴伏䝉皇帝陛下川澤廣納日月委臨察其無他恕兹不及天地之私至大丘山之戴何勝敢不再省前尤一心後效少贖失中之咎用敷報上之誠臣無任感恩荷聖激切屏營之至鄧州謝上表臣某言伏奉勅命授臣給事中依前資政殿學士知鄧州軍州事已禮上訖瑣闈清品穰都善地處之甚重惴然若驚臣中謝竊念臣志意本㣲才力素寡始干及親之禄俄有得君之遇啟沃無隱出處惟命持一節以自信歴三黜而無悔頃以氐羌犯塞朝廷旰食起臣思過之地授臣禦戎之䇿往罄死力敢圖生還夙夜一心首尾四載僅免輿尸之禍終無克敵之勲一旦召還五章陳讓惟求守塞不敢入朝再煩詔音促登樞右改參大政俾竭㣲才革姑息之風則謀身者切齒尚循默之體則愛國者寒心退孤上恩進斂羣怨誠難處於要路復請行於邊鄙方陳豫備之䇿俄覩綏懐之事迺宣霈澤以安黎元臣以患肺乆深每秋必發求去冱寒之地以就便安之所庻近醫藥存養晩年伏䝉皇帝陛下天覆地生雲濡雨濯進以清近之秩付以偃息之藩風俗舊淳政事絶簡心方少泰病冝有瘳實繄寛大之朝将幸康寕之福敢不孜孜于善戰戰厥心求民疾於一方分國憂於千里上酬聖造少罄臣誠臣云云謝依所乞依舊知鄧州表臣某言奉勅就知荆南府續准中書劄子奉聖㫖允所乞依舊知鄧州者明命已行輒希改易危誠既露俄遂便安臣志獲宣天慈何報臣中謝臣渉道素淺立身最孤早由睿哲之知薦更繁劇之任頃升近弼思副上心以道直前雖危不避竭肝膂以論事犯雷霆而進忠未酬天地之恩已掇風波之議尚䝉聖渥俾守善藩忽此就遷實隆倚任臣以本朝盛徳優禮近臣多處京輔之間以存國體之重而又子有疾恙日常憂虞復困道塗仍逺醫藥遂至再三之瀆庻通萬一之情伏䝉皇帝陛下曲軫洪私特回中㫖許留舊治免渉長川蓋推體貌之恩曷副照臨之意敢不拳拳民政戰戰官箴誓堅介石之心仰荅髙穹之造臣云云杭州謝上表臣某言昨奉勅就差知杭州軍州事已到任禮上訖江海上游東南巨屏所寄甚重為榮極深臣中謝竊念臣生禀迂疎親逢明盛居常苦節動必危言踐揚諫諍之曹傾盡諮詢之地至於徃司戎事屬當元帥之權入奉聖謨爰廁大臣之列有致君之素志乏代天之懿功魏相之數陳便宜頗䝉納用汲黯之多犯顔色敢憚見疎雖遼隔於明天亦薦分於善壤共理呉㑹之域奉揚唐虞之風跡雖逺而獲安年已髙而就逸此蓋皇帝陛下天施廣育海務兼包寵優舊臣恩全晩嵗臣敢不抱公忠之節始終弗回體旰昃之憂逺邇咸一乂兹方面副于宸心臣云云謝賜鳯茶表臣某言入内西頭供奉官麥知㣲至傳宣㫖撫問臣并賜臣鳯茶一合者乆離帝右曷測天衷異恩一臨羣疑盡決臣中謝竊念臣至誠許國孤立事君屢觸雷霆之威數蹈風波之險一心自信三黜寕逃方安江海之情致覩雲天之問伏䝉皇帝陛下仁存舊物澤被逺臣聖訓丁寕皇慈委曲念犬馬之㣲志錫龍鳯之上珍馨掩靈芝味滋甘醴濯五神之精爽祛百疾之㝠煩允彰仁壽之恩特出聖神之眷謹當餌為良藥飲代凝冰思苦口以進言勵清心而守道上酬君父旁質神明臣云云謝轉禮部侍郎表臣某言伏䝉聖慈特授臣尚書禮部侍郎依前充職者渙渥自天震惶無地循牆弗獲致寇是虞臣中謝伏念臣布素寒姿斗筲㣲器初縻下士之禄忽塵上聖之知歴升近班嘗預大政深自感激詎為因循仰祖宗之謀請行故事懐社稷之計動發危言雖欲必盡其心奚能乆安於位遽彰無状誠合有誅而聖意始終天慈曠蕩尚寘名於祕殿復䝉幸於善藩大拙云藏人言用息莫聞課最敢覬龍光伏䝉皇帝陛下雷霆霽威日月還照未忘圖舊不次推恩擢登宗伯之曹上應文昌之緯職命如故爵數甚隆徒執讓以弗諧止服榮而為懼臣敢不夕愓三省寅恭一心進則盡憂國憂民之誠退則處樂天樂道之分上酬聖遇用竭愚衷臣云云乞召杜衍等備明堂老更表臣某言伏覩朝廷行明堂宗祀之禮誕告天下臣守在逺方不獲榮觀大慶思有補益輒兹狂易臣中謝臣聞易曰大觀在上言天下所觀在國家之為也自古國家興行風教使天下觀之必先乎廟周人祀文王於明堂以配上帝所以示天下尊親之道漢顯宗永平二年春正月祀光武於明堂其年冬十月養三老五更於辟雍三老五更以二千石禄養終厥身前史紀之為令王之盛節伏惟皇帝陛下稽古奉先行明堂大禮尊奉三聖配帝而饗普天率土咸知舞抃至於三老五更之典最為盛徳冝可兼而行之如前兩府老臣惟太子太保杜衍太子少傅任布在焉衍直清忠藎勤勞弼亮布亷潔不渝止足知退皆可備三老五更之選儻朝廷以禮大數煩難於並舉亦可召至俾陪觀大禮及覃慶之際特加恩奨是亦兼行養老之典也臣又覩工部侍郎致仕郎簡執節清素處心雅尚優游泉石樂於吟詠今八十三嵗精明不衰月俸之餘不治生業此則臣所目見之也而歸老十餘年不曽遷改亦無錫賜况天下似此近上老臣甚少不難旌奨如郎簡則去京遥逺難行召命可遥均三老五更之慶伏望聖慈稽考舊章特加恩禮自餘致仕官亦乞朝廷别賜推恩實當尊親之朝兼行養老之典足以表大禮之盛彰上聖之仁興天下之孝悌光搢紳之耆舊史官書之為陛下之至徳􅁮􅁮于千古干冒天威臣不任大願戰汗云云青州謝上表臣某言奉勅就差臣知青州充青淄等州軍安撫使已到任交割勾當者海岱之區地望攸重岳牧之任邦選甚隆拜命以還戴榮而懼臣中謝竊念臣某賦才寡薄抱節孤危㑹遇不倫進擢無状發言多忤非輕去明主之恩觸事為憂所重在太平之業㳙塵未補覆載何酬尚玷鴻私屢加優寄漸兹衰朽期以退藏伏䝉皇帝陛下天量庇全聖衷收采改此劇藩之守謹諸連帥之權臣敢不逾勵夙宵䖍分旰昃體九重之深造安千里之含生上副聖求少圖忠效臣云云遺表臣聞生必盡忠乃臣節之常守没猶有戀蓋主恩之難忘輒忍須臾之期少舒迫切之懇痛靡自覺辭皆不倫伏念臣生而遂孤少乃從學游心儒術決知聖道之可行結綬仕塗不信賤官之能屈纔脱中銓之冗遽參麗正之榮恥為倖人竊論國體昨自明肅厭代之後陛下奮權之初首承徳音占預諫列念昔執巻惟虞無位之可行况今得君安敢惜身而少避間斥江湖之逺旋塵待從之班大忤貴權幾成廢放屬羌臣之負險顧将列以難裁乃副帥權仍峻使任亦嘗周旋戰備指目地形力援定川之師始期遇敵誓復横山之壤亟逼講和雖㣲必取之功多弭未然之患預中樞之密勿曽不獲辭參大政之幾㣲益難勝責自念驟膺於寵遇固當勉副於倚毗然而事乆敝則人憚於更張功未驗則俗稱於迂闊以進賢援能為樹黨以敦本抑末為近名洎忝二華之行愈増百種之謗上繋天聴終辨衆讒因懇避於鈞衡爰就班於符竹一違近署五易名城雖聖恩曲示於便安奈神道常惡其盈滿請麾上潁蓋遭拙疹之未平息鞍東徐益覺靈醫之不效唯積疴之見困非晩嵗之能支神不在形氣将去幹㝠㝠幽壤倐為長徃之期穆穆清光永絶再瞻之望肝膽摧落精魄飛揚然臣起于諸生歴此華貫雨露澤於數世圭組煥於一門有如臣焉足為榮矣當瞑目以無憾尚貪生而有云蓋念所惜者盛時所眷者明主雖性命之際已能自通然君臣之間豈易忘報但無怛化以竭遺忠敢憚陳於緒言庶無負於沒齒伏望陛下調和六氣㑹聚百祥上承天心下徇人欲明慎刑賞而使之必當精審號令而期於必行尊崇賢良裁抑僥倖制治於未亂納民於大中如此則不獨㣲臣甘從於異物庶令率土永寖於淳風言逐涕零命隨疏殞臣無任惶懼戰惕之至范文正集巻十七欽定四庫全書范文正集巻十八宋范仲淹撰状
