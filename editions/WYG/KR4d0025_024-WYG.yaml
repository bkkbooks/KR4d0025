body:
  text: 易兼三材賦通彼天地人謂之易大哉易以象設象由意通兼三材而窮理盡性重六畫而原始要終二氣分儀著高卑於卦内五行降秀形動静於爻中所以明朝坤之化育見天人之㑹同者也昔者有聖人之生建大易之㫖觀天之道察地之紀取人於斯成卦於彼將以盡變化云為之義將以存潔静精微之理極其數也必在乎兼而兩之定其位焉由是乎三者備矣若乃高處物先取法乎天所以顯不息之義所以軫行健之權保合太和純粹之源顯著首出庶物高明之象昭宣此立天之道也御隂陽而徳全又若卑而得位下蟠於地所以取沉潛之體所以擬廣博之義寂然不動既侔厚載之容感而遂通益見資生之利此立地之道也自剛柔而功備於是卑高以陳中列乎人剛而上者宜乎主柔而下者宜乎臣慎時行時止之間寜迷進退察道長道消之際自見屈伸此立人之道也敦仁又而有倫既而明三極之端知八象之謂存擬議而無爽周變通而曷既君子用之而消息聖人執之而經緯亦由璇璣測象括運動於七辰玉琯候時含慘舒於四氣豈不以易之為書也範彼二儀易之為敎也達乎四維觀其象則區以别矣思其道則變而通之上以統百王之業下以㫁萬物之疑變動不居適内外而无滯廣大悉備包上下而弗遺至矣哉无幽不通唯變所適凖天地而容日月畜風雷而列山澤鼓之舞之以盡神統三才而成易淡交若水賦君子求友恬淡為上伊淡交之相愛諭柔水於前聞惟久要之情不瀆而靈長之徳爰分如通潤下之功同行其道似得朝宗之便相薦於君原夫大禮立言後賢是擬將敦切切之契必察湯湯之理非敢乎狎而翫之蓋懼乎數斯疏矣彼以甘而壊者允謂小人此以淡而成焉實惟君子莫不就乂若渇從善如流甘言者不可不畏澡行者予取予求冀獲有終之美免貽中輟之羞義協㫁金髣髴淘金之利譽稱連璧依俙沉璧之秋惟徳是依因心而友游泳而學海同濟兢慎而禮防共守寳其忠信懐珠之象寜賒志在琢磨穿石之功自有則知甘而交者何能别嫌淡而交者常如養恬進弗違於汎愛退不失於流謙同氣相求將益潤身之徳見利而讓必揚絜已之廉故得久而不渝誠然可覽論心而曷有凝滯投分而毎存澄淡情深結綬遠思誓帶之流志在彈冠潛動濯纓之感念兹在兹恬為淡為舍已類不爭之勢親仁浮就濕之基如切如磋自契激揚之義同心同徳孰分清濁之姿士有逺慕前脩聿希令望毎定交而不雜必推義而為上考同人於易象見賢必親法上善於禮文書紳无妄養老乞言賦求善言以資國之用年高者不可不養言善者予取予求奉黄髮以無怠垂清問而弗休主善為師尊縱心之耆舊既飽以徳咨逆耳之謀猷仰彼前王垂兹令典謂仁者所以能受則言也於斯可選肆筵授几聿脩尚齒之宜論道經邦必採無瑕之善莫不崇其盛禮納以明恩登上庠而有則躋太學以居尊待以常珍用貴皓然之士禆其闕政是詢哿矣之言養老之美於斯有以一則崇孝悌之本一則求善敎之㫖式宴且喜蔑聞大耋之嗟切問近思屢逆聖人之耳豈不以老者倍年之長言者善人之資養其老則惟賢是擇乞其言則患已不知識君臨之所重見父事之攸宜不素飱兮實舉燕毛之禮善待問者當陳補衮之詞是知捨此則無以尊徳遵此則足以守國大禮載之而為美前王行之而不忒漢朝定嗣延四皓以咨謀周伯興邦奉太公而取則恩斯勤斯故舊不遺孰侮桑榆之暮景毎求藥石之良規祝饐無虧何患乎老夫耄矣沃心有取但見乎聖人則之今國家治歴萬邦緝熈庶政納老成之嘉話闡誕敷之休命於以見至道勃興與唐虞而比盛得地千里不如一賢賦賢實邦寶何地能及地廣千里功虧一賢故開基之大矣寜命世以生焉附益我疆雖有邦畿之逺發揮王業難居家食之先得不載考謨猷旁稽士實延袤之境土雖衆挺特之才難可失彊吞是戒豈一千乗之多為禮聘斯行在五百年之間出又何取險包絶壑深控澄江非形勝於百二貴國士之無雙尋師之道路咸㱕何能異聖展驥之途程盡入詎可經邦是以攻掠無聞柬求可考匪煩開拓之力惟取弼諧之道秦商於而齊即墨非我之求傅巖野而渭水濵是吾所寳唯賢也其功莫料唯地也於用如何自欲得人之盛豈須拓地之多爵舉之流可進之而授賞目極之所難獻之而請和斯蓋意切求賢事非避地雖沃野之咸在諒竒材之足懿任附庸之國衆胡比盡忠縱兵賦之數多㒺加餘智豈不以賢之得雖少必貴地之有雖多曷能捨地得賢兮邦基以立失賢有地兮國難隨興是故治亂咸繋古先足徵鴻溝割而楚亡惟賢不用昌國去而燕奪何地堪矜在乎啟土罔資虚襟是急皇明由是以彌逺鴻業於焉而允緝若然則議賢者之深功何百城而能及體仁足以長人賦君體仁道隨彼尊仰聖人受天命體乾文既克仁而是務遂長人而不羣法元善之功可處域中之大奉博施之徳宜為天下之君原夫易象洞分乾元光啟謂元之徳也莫大乎始生之道生之善也莫若夫至仁之體所以法而用也既不由幹事之貞體以長焉又不預亨嘉之禮君子乃時法斯道力行乎仁侔剛健之克著致惻隐以昭陳敦惠愛以為心首出庶物得慈和而示化利見大人莫不與合化權潛符天造蓋本生成之禮益見尊崇之道安仁為念我則俯視於黎氓克已存誠我則上居於大寳豈不以體其仁則物皆尊戴居其長則民咸悦隨君非仁則曷享於推戴人非長則寜致於淳熈詎三月之違焉道之行也致一國之興矣人皆仰之足可以首四徳以居斯冠兆人而在彼不曰仁何以見為生之妙不曰長何以見居上之美故得萬民以濟咸承煦育之恩百姓不知盡荷發生之理不然何以握圖在上御宇居尊侔乾道之㒺息酌仁恩而不煩念兹為器之人未足與議審彼樂山之士始可與言方今道化惟微神功至廣用乾剛而不紊奉仁道而無爽所以吾皇體斯道而御寰中故是尊而是仰陽禮敎讓賦脩射崇飲民不爭矣先王制陽禮於百姓興民讓於九州覩射飲之斯在知政敎之所由我弓既張觀徳之風遐被朋酒斯饗序賔之義咸脩觀其司徒之職既揚王者之敎云下使穆穆而鄉飲俾濟濟而燕射將以弧矢之利習彼威儀復於罇俎之間宣其敎化至若洞啟澤宫射夫來同内叶和平之志外敦廉順之風揖讓而升非尚六鈞之勇進退可庶不矜五善之功此射之讓也邦敎攸崇又若以年以品㑹於鄉飲在獻酬之无謬居長幼而必審貴賤位矣三賔之象不踰和樂興焉百拜之容弗寢此飲之讓也國人是禀則知邦禮循循以敎萬民所以安天下於不競所以敎域中之有倫射不主皮息爭心於君子酒以成禮導和氣於鄉人是知用之而在化可久廢之而其化則不斯射也可以止其暴亂斯飲也可以樂其富夀所以反當仁之義以勸四方遵成魄之規用寜九有然則謂其陽也取其吉而為名謂其讓也取其和而不争于以見莫善於禮于以見與世作程侯以明之㒺替君臣之義禮無違者遂諧賔主之情遂使徳藝可觀忿肆遄已知沿事以興敎蓋因時而立紀故聖人務焉則違之者寡矣天驥呈才賦君徳通逺天馬斯見天産神驥瑞符大君偶昌運以斯出呈良才而必分眸廻紫電鬛妥紅雲星精效祥聿歸三五之聖龍姿挺異不溺三千之羣是何降靈霄極薦夢中國啟天之命光帝之徳包羞兮御閑之十二屏跡兮駑駘之萬億曳呉門之練不足以比容竭燕市之金不足以為直徒觀夫汗血流赭連錢拂驄鮫瘦筋露鸞肥臆豐矯矯焉鯨躍乎滄海昂昂焉鶴出乎籓籠契瑞圖之表述昭神化之感通卒使伯樂居前駭千載之有得王良處右悲一旦之无功得以馴致皇家駿奔帝苑厥生也足比乎房駟之異其來也寜憚乎渥洼之逺雖稱徳於絶羣豈代勞而一混首登華廏嘶風休憶於窮邊髙騁康衢逐日詎思於長坂豈徒矜半漢􅃷連乾必也瑞乎聖通乎天騰志千里飛聲八埏歴金埓以腰褭奉玉勒以周旋日馭如親合亞六龍之列瑶池若去請登八駿之先異乎哉神物來宜天意純嘏掩逸足於千駟革嘉祥於一馬方馳六轡且殊㱕岳之流儻駕皇輿曷如負圖之者是知造化之竒鍾焉在斯祥麟生而奚匹馴犀至而曷為寳於大邦寜徇晉臣之請出於有道豈惟漢帝之時客有感而歎曰馬有俊靈士有秀彦偶聖斯作為時而見方今吾道亨而帝道昌敢昧呈才之便稼穡惟寳賦王者崇本民食為貴資時者稼穡務本者惟王顧民食而可貴為國寳而允臧田疇播殖之時豈慙種玉倉廪豐登之際寜讓滿堂稽彼前賢垂諸大雅謂養民而可取必重榖而無捨惟農是務誠天下之本歟以寳為名表物中之貴者耒耜无廢黍稷是崇毎訓耕耘之績如敦追琢之功闢五土之時披沙豈異載千箱之處照乘攸同蓋以順彼天時美兹政本觀艱難而有獲稱瓌竒而何損年多膏澤連城之價可期瑞有嘉禾希代之姿奚逺是知寳金璧者見棄於聖人寳稼穡者克濟於生民得之則九年利用闕之則百姓食貧多既如雲寜愧白虹之氣祈於元日似求赤水之珍其或剖巨蚌以勞心攻他山而竭力在寒暑則非民之服在饑饉則非民之食徒聞賈禍之辱莫見作甘之徳曷若我東作可嘉西成不忒既堅既好亞父欲碎而何能如京如坻季子比多而莫得念兹在兹百王不移此盈疇而是貴彼韞櫝而何為見三時之有倫如分三品與四民之共給胡畏四知今國家崇后稷之功廣神農之道既豐年以為瑞蓋惟榖而是寳故能富庶之風告成穹昊天道益謙賦天道常益謙損之義士有探造化之真筌察盈虚於上天雖秉陽之功不宰而益謙之道昭宣萬物仰生否者由斯而泰矣四時下濟屯者自我而亨焉原夫杳杳天樞恢恢神造損有餘而必信補不足而可考是故君子法而為政敦稱物平施之心聖人象以養民行裒多益寡之道豈不以謙者物之自損益者時之與昌龍蛇蟄而後震草木落而還芳于以見其物理于以見其天常月既虧而中盈於時不昧陽盡剥而來復其義爰彰然則高明之運也善行无迹盛衰之應也惟變所適苟守之以謙必受之以益有終之士我則錫元吉而弗違罪已之君我則助勃興而无斁雅契姬文之述何煩太史之占處幽晦者日星必照在焦枯者雨露必霑取類而言如江海之潤下殊塗同致若鬼神之福謙得不觀庶物之情究至理之本貴必始之於賤益乃生之於損既人事之在斯又天道之奚逺高者抑而下者舉一氣無私往者屈而來者伸萬靈何遁大哉覆受無遺神之聼之執虚者不言而應用壯者雖猛何為卑以自牧之人實受其福貴而能降之君不失其宜我后上徳不矜至仁博施實兆民之是賴無一物之不遂貴退讓而黜驕盈得天道益謙之義聖人抱一為天下式賦淳一敷敎為天下式巍巍聖人其敎如神抱一而萬幾無事為式而庶彚有倫秉乎天得之樞羣氓作則立乃道生之化八表還淳老氏有云聖皇無失保環中而可久率天下而守一蓋以一之妙也冠四大而强名式之用焉正萬靈而咸秩莫不㝠符妙有脗合虚无察察之機悉去淳淳之理誕敷于以見清浄而不擾于以見易簡而不踰遵黄帝之求珠我真未喪契莊生之齊物我化皆孚无臭无聲是則是傚包自然之禮樂畜无親之仁孝去奢去泰惟存至道之精自西自東咸被不言之敎豈不以一者道之本式者治之筌苟能持於㒺象自可制於普天亦若大衍攸虛為四營之本也太陽無二作七政之首焉豈比夫昧於希夷煩其用捨滋彰之法著矣冲寂之猷逺也曷若我静守權輿克寜華夏執此惟精之㫖得自窈㝠俾諸咸有之風播於上下大矣哉上徳不徳無為而為保谷神而不宰育芻狗以何私政復結繩㒺有二三之令理敦執契自為億兆之規我后超五帝之功邁三王之徳化育而四時為柄恭黙而萬邦承式故得兆人熈熈登春臺而躋夀域政在順民心賦明主施政能順民欲王者廣育黔首誕布皇明闡邦政而攸叙順民心而和平振窮恤貧必俯從於衆望發號施令實允協於羣情昔管子以祖述大猷發揮明主垂敎之言斯著為政之方可覩以謂逆其民而理者雖令不從順於民而化焉其徳乃普是以究其所病察其所宜禮應時而沿襲敎隨俗以彰施欲求乎廣所及也必在乎俯而就之彼患困窮我則躋之於富庶彼憂苛虐我則撫之以仁慈于以見百姓為心萬邦惟慶無一物不得其所無一夫不遂其性所以感其和氣所以謂之善政故得上下欣合莫聞不協之謀遐邇悦隨毎覩易從之命豈不以政者為民而設民者惟政是平違之則事悖順之則敎興乃古今之必重實聖賢之所能亦猶梓匠任材因曲直而制作化工造物隨大小而陶甄是以布政從民者黎元克信驅民從政者羣心不徇思柔逺而能邇必去逆而效順舉刑罰罪因衆棄而方行列爵養賢由僉諧而後進懿夫施此彝倫洽彼生民在上者弗私其欲居下者孰敢不遵務材訓農皆因民之所利布徳行惠常捨已以從人今我后稽古省方順時察俗上克承於天道下弗違於民欲有以見善與物之咸亨實无幽而不燭水火不相入而相資賦其性相反同濟於用水火之性也偏其反而水火之利也一以貫之居惟異處動必相資始則無自入焉受諸睽而巳矣中則往有功也取既濟以宜其原夫兩儀肇生五行並命水以流而順火以明而盛一彼一此自分燥濕之情知和而和匪間炎涼之性烈烈湯湯曰隂曰陽其數六者柔而勝其數七者熾而昌六以隂而習乎坎位七以陽而配彼離方離坎誠非其一致隂陽安得而兩忘雖天生之材本四象而區别蓋日用之利合二體以交相道非獨善功不相逺翻疑乎方以類聚何患乎體與情反作鹹作苦始殊同氣之求曰潤曰炎豈宜相得之晩施之無窮和而不同亦猶天地分而其徳合山澤乖而其氣通日月殊行在照臨而相望寒暑異數於化育以同功則知質本相違義常兼濟六府辯盛徳之美九鼎洽大亨之惠分而為二曲直相入以誠難㑹之有元胡越異心而自契象則逺爾理則依於當異位而有别終同功而靡疎從政者寛猛相須體兹至矣為道者恬智交養觀此行諸是故躁以静為君有以無為用相薄類風雷之益違行殊天水之訟我道也不相入而相資與天下之公共者也范文正别集巻三欽定四庫全書范文正别集巻四宋范仲淹撰序十六羅漢因果識見頌序余嘗覽釋敎大藏經究諸善之理見諸佛菩薩施廣大慈悲力啟利益方便門自天地山河細及昆蟲草木種種善諭開悟迷徒奈何業結障蔽深高著惡昧善者多見性誠心者少故佛佛留訓祖祖垂言以濟羣生以成大願所以隨函類衆聖之詮總為大藏凡四百八十函計五千四十八巻録而記之俾無流墜余慶厯初任知政事時西虜背惠侵擾邊隅勞師困民以殄兇醜聖人愛民恤士命余宣撫河東沿邊居民將士塗中寓宿保徳水谷之傳舍偶於堂簷罅間得故經一巻名曰因果識見頌其字皆古𨽻書乃藏經所未録而世所希聞者也余頗異之啟軸而觀乃十六國大阿羅漢為摩拏羅多等誦佛説因果識見悟本成佛大法之頌也一尊七頌總一百一十二頌皆直指死生之源深陳心性之法開定慧真明之宗除煩惱障毒之苦濟生戒殺誘善祛邪立漸法序四等功徳説頓敎陳不二法門分頓漸雖殊合利鈍無異使羣魔三惡不起於心萬法諸緣同歸於善余一句一歎一頌一悟以至巻終胷臆豁然頓覺世縁大有所悟儻非世尊以六通萬行圓明慧鑒之聖則無以至此方知塵世之中有無邊聖法大藏之内有遺落寶文謹於府州承天寺命僧歸依别録藏之厥後示諸講説高僧通證耆達皆未見聞莫不欽信後於戊子嵗有江陵老僧慧喆見訪因話此頌諸聖祕密世所希聞喆傳之於武陵僧普煥處寳之三十餘年未逢别本余因求副本正其舛駮以示善知故直序其事以紀其因時戊子仲春髙平范仲淹序賦林衡鑑序人之心也發而為聲聲之出也形而為言聲成文而音宣言成文而詩作聖人稽四始之正筆而為經考五聲之和鼔以為樂是故言依聲而成象詩依樂以宣心感干人神穆乎風俗昭昭六義賦實在焉及乎大醇即醨旁流斯激風雅條散故態屢遷律吕胍分新聲間作而士衡名之體物聊舉於一端子雲語以雕蟲蓋尊其六籍降及近世尤尚斯文律體之興盛于唐室貽于代者雅有存焉可歌可謡以條以貫或祖述王道或褒贊國風或研究物情或規戒人事煥然可警鏘乎在聞國家取士之科縁於此道九等斯辨寸長必收其如好高者鄙而弗攻幾有肴而不食務近者攻而弗至若以莛而撞鐘作者幾希有司大患雖炎炎其火玉石可分而滔滔者流涇渭難見曷嘗求備且務廣收故進者豈盡其才而退者愈惑於命臨川者鮮克結網入林者謂可無虞士斯不勤文何以至撰述者既昧於向趣題品者復異其好尚繩墨不進曲直終非仲淹少遊文場嘗禀詞律惜其未獲竊以成名近因餘閒載加研玩頗見規格敢告友朋其於句讀聲病有今禮部之式焉别析二十門以分其體勢叙昔人之事者謂之叙事頌聖人之徳者謂之頌徳書聖賢之勲者謂之紀功陳邦國之體者謂之贊序緣古人之意者謂之緣情明虚無之理者謂之明道發揮源流者謂之祖述商㩁指義者謂之論理指其物而咏者謂之詠物述其理而詠者謂之述詠類可以廣者謂之引類事非有隠者謂之指事究精微者謂之析微取比象者謂之體物强名之體者謂之假象兼舉其義者謂之旁喻叙其事而體者謂之叙體總其數而述者謂之總數兼明二物者謂之雙闗詞有不羈者謂之變態區而辯之律體大備然古今之作莫能盡見復當旅次無所檢索聊取其可舉者類之于門門各有序盍詳其指古不足者以今人之作者附焉畧百餘首以示一隅使自求之思過半矣雖不能貽人之巧亦庶幾辯惑之端命之曰賦林衡鑑謂可權人之輕重辨已之妍媸也所舉之賦多在唐人豈貴耳而賤目哉庶乎文人之作由有唐而復兩漢由兩漢而復三代斯文也既格乎雅頌之致斯樂也亦達乎韶夏之和臣子之心豈徒然耳若國家千載特見取人易方登孝廉舉方正聘以伊尹之道䇿以仲舒之文求制禮作樂之才尚經天緯地之業於斯述也委而不論亦吾道之志歟時天聖五年正月日
