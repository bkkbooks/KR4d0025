body:
  text: 代胡侍郎乞朝見表臣某言今月日奉勅就差臣知杭州仍放朝辭取便路發赴本任者祇膺寵命伏積震兢臣某中謝竊以寧海鉅邦生聚十萬牧守之重豈臣克堪矧為晝繡之行再領宵衣之寄始終極幸進退甚榮臣方理輕裝即趨便道敢有再三之瀆庶傾萬一之誠竊念臣才不逮人遭逢有素束帶從事四十餘年荷三朝之奬知歴二省之清要職參仙殿位亞秋卿祿賞被于子孫名級顯於中外報國無狀殺身何成今復還父母之鄉邦適桑榆之晷刻解冠告老决在此行久事朝廷乍越江海無復瞻望咫尺對敭清光雖小人之心固多懷土而疲馬之志寧莫戀軒臣欲于京城就兩浙舟船載家赴任伏望聖慈暫許臣入謝雲天少敘平生之感退歸鄉里永為萬足之心頼君父之推恩庶人臣之畢願干冐宸極臣無任云云睦州謝上表臣某言臣昨奉勅差知睦州軍州事已到任交割勾當者獻言罪大輒效命於鴻毛宥過恩寛迴迴光於白日事君無逺為郡甚榮臣某中謝恭惟皇帝陛下天徳清明海度淵黙撫羣龍以宅吉念六馬而懷驚臨軒以來仄席不暇思啓心沃心之道奬危言危行之臣萬㝢咸歡九門無壅臣腐儒多昧立誠本孤謂古人之道可行謂明主之恩必報而况首膺聖選擢預諫司時招折足之憂介立犯顔之地當念補過豈堪循黙昨聞中宫搖動外議喧騰以禁庭徳教之尊非小故可廢以宗廟祭祀之主非大過不移初傳入道之言則臣遽上封章乞寢誕告次聞降妃之説則臣相率伏閤冀囘上心議方變更言亦翻覆臣非不知逆龍鱗者掇􅐽粉之患忤天威者負雷霆之誅理或當言死無所避蓋以前古廢后之朝未嘗致福漢武帝以巫蠱事起遽廢陳后宫中殺戮三百餘人後及巫蠱之災延及儲貳至宣帝時有霍光妻者殺許后而立其女霍氏之釁遽為赤族又成帝廢許后咒詛之罪乃立飛鷰姊妹妒甚於前六宫嗣息盡為屠害至哀帝時理之即皆自殺西漢之祚由此傾微魏文帝寵立郭妃譖殺甄后被髮塞口而葬終有反報之殃後周以虜庭不典累后為尼危辱之朝不復可法唐高宗以王皇后無子而廢武昭儀有子而立既而摧毁宗室成竊號之妖是皆寵衰則易搖寵深則易立後來之禍一一不差臣慮及㡬微詞乃切直乞存皇后位號安於别宫暫絶朝請選有年徳夫人數員朝夕勸導左右輔翼俟其遷悔復于宫闈杜中外覬望之心全聖明終始之徳且黔首億萬戴陛下如天皇族千百倚陛下如山莫不雖休勿休日慎一日外采納於五諫内彌縫於萬幾而况有犯無隐人臣之常面折庭諍國朝之盛有闕即補何用不臧然後上下同心致君親如堯舜中外有道躋民俗於羲黄將安可久之基必杜未然之釁上方虛受下敢曲從既竭一心豈逃三黜伏蒙陛下皇明委照洪覆兼包贖以嚴誅授以優寄郡部雖小風土未殊靜臨水木之華甘處江湖之上但以肺疾緜舊藥術鮮功喘息奔衝精意牢落惟賴高明之鑒不投遐逺之方抱疾于兹為醫尚可苟天命之勿損實聖造之無窮樂道忘憂雅對江山之助含忠履潔敢移金石之心仰戴生成臣無任云云蘇州謝就除禮部員外郎充天章閣待制表臣某言伏蒙聖恩特授臣前件官充職者渙渥自天震惶無地改中臺之華序進内閣之清班盡出高明殊登祕近臣中謝竊念臣發自顏巷賓于舜門一第為榮四方無效爰自書林預選閨籍升華恥汩沒以懷安或感激而論事惟慕古人之節詎希英主之知伏惟皇帝陛下稟帝堯之聰明加漢高之豁達坦聖懷而虛受期鴻化以咸孚念三聖之艱難而成丕業求七人之蹇諤以補大猷臣獨愧非才首當清問危言多犯孤立自持斧鉞居前雷霆在上敢避樞機之禍終乖藥石之良陛下日月􅂷光江海敦量恕其萬死假之一麾望已絶於青雲咎未更於鴻霈俄易藩宣之寄寧分旰昃之憂忽降綸章薦加寵數而况闢圖書之府切處於深嚴踐雲龍之庭當備于顧問非名儒而不稱豈曲士之能堪矧簉清曹仍居舊治輝榮大集志願何求敢不内守朴忠外脩景行進退惟道遵聖賢視履之方始終一心副君父育材之造臣無任云云饒州謝上表臣某言昨奉勅命落天章閣待制守本官差知饒州已到任禮上訖狂愚之誠進多冒死仁聖之造退亦推恩守土非輕報天無所臣中謝竊念臣出自􅅵畞階于搢紳驟升天閣之游親委王畿之政臣至孤難立屢請弗諧眷寵既隆補報宜異必將危墜猶或建明處事未精發言多率智者千慮而有失愚臣一心而豈周情雖匪他罪實由已然而有犯無隠惟上則知許國忘家亦臣自信伏蒙皇帝陛下惟天為量無大不容與日􅂷光何微弗照止削内朝之職仍分外補之符當死而生自勞以逸君恩彌重臣命愈輕敢不動靜三思始終一志此而為郡陳優優布政之方必也入朝增􅏝蹇匪躬之節庶從師訓無負天心瞻望闕庭臣無任云云潤州謝上表臣某言奉勅移知潤州已赴禮上者幽逺之誠未嘗聞達高明之鑒俄復照臨臣中謝伏念臣起家孤平蒙上奬拔置於清近之列授以浩穰之權聖惟知人臣則辱命徒竭誠而報國弗鉗口以安身言涉大臣議當深典可無退省抑有所聞汲黯漢之直臣嘗疏公孫之短裴度唐之名相亦陳元稹之非斯實忠良豈無讒毁臣聞孔子曰天下有道政不在大夫前代國家或進退羣臣聽決大事若出於君上則中外自無朋黨左右皆為腹心若委於臣下則威福集於私門禍釁積於王室故三桓興而魯敝六卿作而晉分往古興亡鮮莫由此孔子之論昭昭不誣是以君道宜彊臣道宜弱四瀆雖大不可受百川之歸五星雖明不可代太陽之照臣按大易之義坤者柔順之卦臣之象也而有履霜堅冰之防以其隂不可長也豐者光大之卦君之象也而有日中見斗之戒以其明不可微也臣考兹前訓慮于未萌當危言危行之秋有寖昌寖微之説謂大臣久次在進退而得宜謂王者萬幾必躬親而無倦總擥綱柄博延俊髦議治亂之本根求祖宗之故事政慘舒而自我物榮悴而如天人心不在於權門時論盡歸於公道朝廷惟一宗廟乃長臣之所言殊未盡意重煩上聽再貶逺方削天閣之班資奪神州之寄任重江險惡盡室顛危人皆為之寒心臣獨安於苦節蕭望之口陳災異蓋無負於本朝公子牟身處江湖徒不忘於魏闕未知死所敢望生還伏蒙陛下九日􅂷光八風迴力察臣有犬馬之志恕臣無塵露之勞特出聖恩稍遷便郡茁如行葦保於勿踐之仁鑑若鳴桐脱彼在焚之患敢不長懷霜潔至效葵傾進則持堅正之方冒雷霆而不變退則守恬虛之趣淪草澤以忘憂上副聖知下逃羣責臣無任云云延州謝上表臣某言伏奉勅命就差臣兼知延州軍州事已到任交割管勾訖討伐之秋委寄方重豈繄懦品可副聖憂臣中謝竊以延水極邊東夏雄屏控黠虜之衝要歴大臣之鎮臨范廷召出師於塞門向敏中移節於京兆斯為劇任曷在匪人况經侵軼之虞彌藉緝綏之政宿兵既盛為地可知臣職貳統戎志存殄寇所宜盡瘁敢昧請行自薦老成固慙於漢將誓平此賊詎擬扵唐賢伏蒙皇帝陛下曲徇微忠亟頒成命寛其無狀用之弗疑臣夙夜敢寧奔馳罔暇刻時莅事翌日興師庶牽制於戎心仍掩襲於邊落大軍已出中使聿臨不謂孱謀偶符睿算所期克勝少慰焦勞重念百姓屢驚體當招撫五兵又戢務在訓齊如治亂繩必期於耐事先除害馬亦假於行權仰賴聖威即紓邊患臣無任云云謝降官知耀州表臣某言蒙恩降授臣尚書户部員外郎依前充龍圖閣直學士知耀州者實負大尤尚從寛宥雲天之覆頂踵何酬臣中謝竊念臣才本迂疎識非機敏屢由狂率自取貶放朝廷以邊有擾動是使愚使過之秋微臣以國有急難當忘家忘身之報自膺寄委罔敢遜避而力小任重智小謀大勞心已竭處事逾乖苟利國家不恤典憲宜及於禍以貽厥羞伏蒙皇帝陛下日月照微天地包廣謂千慮之智猶有一失萬物之材固無全用軫兹孤弱播于生造削其官足使明大戒存其職足使思後圖臣敢不更勵疲駑愈加脩省庶陳纎芥之効上答高明之私臣無任云云耀州謝上表臣某言伏奉制命降授户部員外郎依前充職知耀州已到任禮上訖雷霆之威足加死責天地之造曲致生全臣中謝竊念臣運偶文明世專儒素靡學孫吳之法恥道桓文之事國家以西陲騷動之際起臣貶所特加奬用臣自知甚明豈堪其任但國家之急不敢不行自兼守延安莫遑寢食城塞未謹兵馬未精日有事宜處置不暇而復虞内應之患發於邊城或反間之言行於中國百憂具在數月于兹而方脩完諸柵訓齊六將相山川利器械為將來之大備不幸昨者高延徳來自賊庭求通中國之好其僭偽之稱即未削去臣以朝廷方命入討豈以未順之欵送于闕下此不可一也或送于闕下請朝廷處置又恐荅以詔㫖則降禮太甚若屏而不答則阻絶來意此不可二也兼慮詐為欵好以殆諸路之兵苟輕信而納之賊為得計此不可三也又寶元三年正月八日曾有宣㫖今後賊界差人齎到文字如依前僭偽立便發遣出界不得收接臣所以却令高延徳迴去仍諭與本人須候禮意遜順方可聞于朝廷亦已一面密奏臣又别奉朝㫖依臣所奏留鄜延一路未加討伐容臣示以恩意嵗時之間或可招納臣方令韓周等在邊上探伺彼或有進奉之意即遣深入曉諭適㑹高延徳到來堅請使介同行况奉朝㫖許臣示以恩意乃遣韓周等送高延徳過界以系其意或未稟承則於臣為恥於朝廷無損及韓周等迴且言初入界時見迎接之人叩頭為賀無何前行兩程便聞任福等有山外之敗去人沮氣無以為辭賊乃益驕勢使然矣其廻來文字臣始不敢開封便欲進上都鈐轄張亢懇言曾有朝㫖若得外界章表須先開視及僭偽文字應有辭渉悖慢者並須隨處焚毁勿使騰布臣相度事機誠合如此章表尚令先開况是與臣文字遂同張亢開封視之見其挾山外事後辭頗驕易亦有怨尤與賀九言齎來文字意度頗同非戎狄之能言皆漢家叛人所為枝葉之辭也恐上黷聖聰或傳聞于外為輕薄輩增飾而談有損無益臣尋便焚毁只存書後所求通好之言及韓周等别有劄到邀求數事並已納赴樞密院今於涇原路取得元寶二年七月十四日聖㫖劄子一道並如張亢之言其所來文字果合焚毁則臣前之措置皆應得朝廷處分唐相李徳裕與將帥王宰書為游奕將收得劉稹章表悖慢無禮不便毁除令向後得賊中文字所在焚之亦與今來意合其劄到數事内一事如臣所諭取單于可汗故事欲稱烏珠以避中朝之號此大事稍順餘皆可與損益儻朝廷欲雪邊將之恥當振皇威大加討伐亦繫朝廷熟議必持重而緩圖之或朝廷欲息生民之弊屈一介之使重諭利害苟能聽服亦天下之幸也臣前所措置於此二道並未有妨然以臣之愚處兹寄任豈得無咎何敢自欺伏蒙皇帝陛下至仁廣度不欲彰臣子之惡特因此量行薄責斯天之造也臣之幸也臣敢不夙夜思省進退惕厲犬馬有志曾未施為日月無私尚兹臨照臣無任云云乞小郡表臣某言臣聞先民有言曰陳力就列不能者止臣下之通規也進人以禮君親之盛徳也臣仰逢明聖俯念拙艱撫此病軀敢期生造臣中謝竊念臣前在饒州日因學行氣而有差失遽得眩轉之疾對賓客忽倒不知人事尋醫救得退自後久坐則頭運多務則心煩昨在延安數曾發動戎事方急雖死難言及降罷之後猶乞専領邊城蓋欲竭心豈敢避事無何赴任耀州以炎熱之期歴涉山險舊疾遂作近日頗加頭目昏沈食物減少舉動無力勉彊稍難見於永興軍請醫官看治次其本州公事權交割通判發遣臣賦性本蒙處心至狹國家擢於清要有遇事輒發之尤寄以重難無思患預防之智言必取悔舉則敗官未踰數年實經三黜頻招物議屢黷宸聰費天力之主張由臣命之竒蹇矧今抱病何可貪榮處於善藩已多優幸帶兹近職深未遑寧伏望皇帝陛下推至仁之恩施曲成之化念其理歴出自遭逢特發聖衷不循朝例以臣學士之職改一庶官或且在當郡或於隨郢均汝之間守一小州庶獲安靜尚圖痊瘉雖貪冒微禄詎逃識者之譏而遜避清班少緩有司之責儻形骸未頓藥餌有功則當再就驅馳少酬亭育臣無任云云代胡侍郎奏乞餘杭州學名額表竊以三代右文四郊立學尊嚴師道教育賢材被服禮樂之風凖繩仁義之行功磨國器標率人倫式致用於薦紳乃助成於聲教俊造以之富盛基業由是緜昌至于唐家中外建學文物之盛三代此隆國家徇鐸敷文舞干布化四方庠序比比而興萬國英翹拳拳以勸臣伏見餘杭郡素為善地蔚有秀民宜恢正始之風丕變輕揚之俗前知州李詔在任日重脩宣聖廟建置學舍數十廈面勢顯敞允為儒宫足容絃誦之流迥處雲山之勝臣自出守此郡延見諸生據衆狀舉請曾到御前進士楊希堂領文㑹有二十餘人日課藝業其來不已所益居多臣欲乞朝廷依天雄軍江寧府特賜州學名額用明勸導庶獲脩長嵗時不隳方俗可厚顏閔徳行逺侔洙泗之間唐虞文章廣及江湖之上臣無任祈天俟命激切屏營之至范文正集巻十五欽定四庫全書范文正集巻十六宋范仲淹撰表
