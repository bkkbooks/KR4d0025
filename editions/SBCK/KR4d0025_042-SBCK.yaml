body:
  text: 文正公傳張唐英范某字希文蘇州人武寕軍掌書記贈太師墉之子幼弧母適朱氏祥符八年登進士第曰朱說者是也累遷大理寺丞上相府書極陳天下之利害當時皆以王佐許之宰相晏殊薦其文召試秘閣校理上欲以冬至率百僚上太后夀抗䟽言不可遂罷岀通判河中府遷陳州屢上䟽言内降之􅁦引韋后爲戒章獻厭世擢爲右司諫言楊妃不當稱太后郭后不當廢降知睦州遷蘇州召爲禮部貟外郎天章閣待制論事益切執政忌之命知開封府欲處以煩劇而不暇他議某明敏通照决事如神京師謡曰朝廷無憂有范君京師無事有希文每上殿奏事多陳治亂以開悟人主歷詆人臣不法言者以某􅄐間君臣落聀知饒州事司諫高若訥言貶黜太輕歐陽脩上書責之亦得罪余靖尹洙皆坐朋黨􅀍絀蔡襄作四賢一不肖詩以詳其事不肖指若訥也寳元初元昊叛上知其才兼文武復聀知永興軍道授陜西都轉運遷龍圖閣直學士時延安新􅀍圍朝廷擇帥皆畏不行某奏請兼領延安軍以待㓂至上嘉而從之閱兵得萬八千遷六將俾領之日夕訓練號為精兵焉賊聞之第戒曰無以延州爲意今小范老子腹中自有數萬兵甲不比大范老子可欺戎人呼知州爲老子大范謂范雍也城青澗開營田招属羗及請戒諸路養兵畜銳不宜輕動賊許以書請和某以元昊國之叛賊不可俾朝廷報賊乃自作書與陳逆順賊㝷䧟好水某益信報賊書爲是而執政以其擅報當誅上以爲閫外之事專之不足罪止移知耀州㝷起知慶州兼經略招討未幾賊兵三萬叩城某鏖兵血戰賊兵奔北遂戒諸將無逅奔旣而果有伏兵又奪賊馬砦爲大順城及築細腰復葫蘆等砦招明珠滅臧二强族萬餘人及命環州种世衡招千餘帳自是属羗皆爲用久之王師再䘮於定川某晝夜領兵赴援初関輔人心動摇及見某耀兵號令嚴明威震戎落人心遂安第相賀曰邊上自有龍圖公爲長城吾属何憂􅀄上聞定川之敗頗以関中爲憂曰若得某出援可無慮及聞某出師甚喜時議黥鄕軍某惟令刺其手及兵罷環慶路皆復得爲農上㝷以四路都招討委之開府於涇某與韓􅄾叶謀必欲收復靈夏橫山之地元昊大懼稱臣明年春召爲樞宻副使以鄭戩代之秋拜參知政事乃上取士課吏減子更衛兵擇守宰謹赦令厚農桑之策塞僥倖之塗開公正之路天下側耳以􅃪太平凢所措置十未行一而權􅀔者大惡之明年契丹與元昊爭銀甕旋而麟府奏警某自請岀爲河東陜西宣撫二虜聞之皆不敢動懇以邊事爲請以資政殿學士復緫四路之師開府邠州以疾請鄧州移杭州青州遷戶部侍郎又請汝隂至徐州而薨年六十四奏至上嗟悼泣下曰朕方將大用不謂其早死贈兵部尚書謚文正子純佑有才識以疾廢于家次純仁登進士第有父風今爲都官貟外郎褒賢集
