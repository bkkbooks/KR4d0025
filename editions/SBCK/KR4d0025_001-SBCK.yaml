body:
  text: 後學時兆文校正後學黃􅁎水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校古賦明堂賦臣間明堂者天子布政之宫也在國之陽于巳之方廣大乎天地之象髙明乎日月之章崇百王之大觀揭三宫之中央昭壯麗于神州宣英茂於皇猷頒金玉之宏度集人神之丕休故可祀先王以配上帝坐天子而朝諸侯者也粤自蒼牙開極黃靈耀德巢穴以革棟宇以植徹太古之弊明大壯之則風雨攸止宮室斯美將復崇髙乎冨貴之位統和乎天人之理乃聖大造明堂肇起明以清其居堂以髙而視壁廓焉而四逹殿巋焉而中峙禮以㓗而儉必表之以茅敎以清而流故環之以水曁二帝之述焉合五府而祭矣逮夫夏禮秩秩奉以世室商祀穆穆制以重屋神禹卑宫階以一尺之崇成湯受命革以三尺之盛赫赫周堂制度景彰七筵􅀆南北之廣九筵􅀆西東之長堂并包於五室室辨正於五方左青陽而右緫章面明堂而背北堂耽然太室儼乎中黃都徽名之在南取盛德之向陽或謂厥堂惟一厥室惟九闢闔其三十六戸䟽逹􅀆七十二牖亦䂓上而天覆復矩下而坤厚近郊之宫廣而能受通天之宇髙而弗偶八方象其幅貟九陛叅其前後􅁊􅁊焉聽政之廟應辰而周彰趪趪焉承天之柱列宿而相望環林􅀆葱葱圓海􅀆泱泱旣方舟而經梁復素飾其廻牆陳位序以有嚴議法象而必臧示􅀖域之景鑠期人神之樂康左有辟雍天子學宫墳籍浩以明備文物森其會同奉三壽以朂天下之孝設三乏以勸諸侯之風右有靈臺庶民子來若經始於神明廼占􅃸於昭回天之道也惟黙黙以有象聖之心也蓋惕惕於無灾此三雍之大者故百世以欽哉􅀂夫約周之禮禀夏之正天子升青陽之位體大德之生彼相恊謀有司奉行慶賜必均歷象必明布農事於準直習舞德於和平止伯益之伐木禁􅃖尤之稱兵惟倉廪􅀆賑天之窮惟幣帛􅀆禮􅀖之英無隱不彰無濳不亨􅀩蕩蕩之至仁浸灝灝之醇精此明堂之春也萬物爲之榮又若炎以繼天羲以永日始於仲吕之管復于清宮之律天子乃登諸明堂曁夫太室命盛樂以象德致大雩以祈實升髙明而有豫定心氣而無逸靜百官之事驅五榖之疾無索於關無難於門止北伐之威以助養於生生導南風之和以飾喜於元元此明堂之夏也萬物爲之繁爾乃象正火位德王金行羽漸干以南嚮穀萬斯而西成天子乃居緫章之奥奏清商之聲圖有功而專任詰不義而徂征脩法制以謹收藏之令養衰老以惻摇落之情同我度量平予權衡人社以崇厚兆民報本之志神倉以秘示萬􅀖致孝之誠此明堂之秋也天下爲之清及夫蟲介時分虎威夕永詩人發其涼之詠日官賔可愛之景天子乃北堂以居南面而省錫飲蒸之慶從祀寒之請於是戒門閭備邊境勞三農於休息警百辟於恭靖關市必易官室必整無用之器斯徹無事之官必省􅅚國典以俟來歳之冝講武經以肅萬􅀖之屏此明堂之冬也天下爲之靜斯乃順其時與物咸冝適其變使民不倦者也稽夫宗祀之文大享之辰上儀乎皇皇盛節􅀆彬彬比於郊也我則取文之勝方其廟也我則取質之純損益其禮尊嚴其親五天之座曄曄以陳五常之席弈弈而倫惟太室之位廼上帝之神作配者先王從祀者五臣樽斚離離玉幣莘莘牲牢之舉旣遵於夏后􅂼果之薦復本於周人禮無不當誠無不臻聖人於是出齋宫而肅肅􅀍法服而循循酌一獻以從質躬百拜以表寅司儀實相樂正攸賔進爼豆之吉蠲羅簨簴之輪囷六樂咸在統美乎列皇八風相盪同和乎大鈞下舞上歌蹈德詠仁非常之祭駿及者萬國莫大之孝蟻懷者兆民於是神醉其德人樂而極太史書於䇿大夫頌於國頌曰明堂崇之明王祀之禮以成之樂以歌之光天之下敎以化之􅀂夫元朔㑹同群后對越穆穆乎舜門之闢晣晣乎宣燎之發帝時待旦而乆求衣以先紆黃組冠通天建日月服乾坤佩干􅀅升崑崙進山嶽之圭當雲龍之軒正聖人之大寳示天下之有尊巍巍焉􅀒扆而立濟濟焉辨色而入太常正其等衰九賔序其名級中階之前三公屹然應門之外九采察焉阼階之東諸侯以同西階之西諸伯以齊門東北面者子之位門西東上者男之次東門之外則有樂浪蟠木九夷之國西面而北上西門之外則有􅀩汜大秦六戎之屬南上而東向南門之外則有朱垠越裳八蠻之族唯北是望北門之外則有葷粥幽陵五狄之種唯東是尚於是兟兟旅進鏘鏘肆覲嚮明者蓋取諸離觀光者受之以􅀳君臣之位定禮樂之道振雅韶以奏文鐸以徇皆望雲而就日必歌堯而頌舜上和而下樂金聲而玉潤况乎晨光赫曦天顔弗違冕􅌧􅀆霞集玉帛􅀆川歸盛乎王庭之聲明煥乎天家之光輝􅀂北辰之㑹衆星咸粲粲而在共如太陽之臨多露普湛湛而􅀅晞莫不君三揖于上臣載拜于下行典禮揚風雅訪雋良議窮寡人曷幽而覆盆賢曷惻而遺野于以盛名器于以休宗社署聖法於圓闕馳神敎於方夏皇哉耀今昔之榮觀至哉敷億兆之純嘏故曰揖讓而治天下者明堂之謂也惜乎三代以還智者間間諸儒靡協議者􅱷􅱷而皆膠其増損忘禮樂之大本泥於廣狹廢皇王之大業使朝廷茫然有逾逺之嘆惘然有中輟之議殊不知五帝非㳂樂而興三王豈襲禮而至爲明堂之道不必尚其奥行明堂之義不必盡其制適道者與權忘象者得意大樂同天地之和豈匏竹而巳矣大禮同天地之節豈豆籩之云爾自漢魏之下曁隋唐之際堂或三五之上道非三五之世蓋不取其厚而取其薄不得其大而得其細享配之文或然未分政敎之烈斯焉弗聞是則帝道不施胡取乎緫期皇德不隆胡取乎合宫故夫明堂之設也天子居之日愼日思思之何也萬微存乎消息愼之何也兆靈繫之安危繇是惟克念以作聖思堯舜之齊名懼巍巍之弗逮迺孜孜於鷄鳴唯至平之休代思阜財於吾民懼四維之有艱尚瘡痍而百辛故聖人之寳儉弗下剥而上侈思寡費而薄索民庶幾于格耻惟下武之太寧亦省躬于干戈取諸豫於四方􅁣風雲以長歌惟知人其古難思濟濟乎賢者蓋舉一於臯陶廼連茹于天下惟好生之至德思與物而爲春懼幽陋之靡及常咨命于仁人惟及人之一德始􅀂晦而彌彰故三五之君子騰茂實而無疆惟皇極之大範思天下而與平懼萬物之或差持我心於誠衡然後見天下齊於無體和於無聲厖眉而壽吾何仁之有含哺而嬉吾何力之爲但淵淵緜緜無反無偏浸淳澤以咸若樂鴻化於自然此明堂之道也蓋無得而稱焉我國家凝粹百靈薦馨三極東升煙於岱首西展琮於汾側未正天神之府以讓皇人之德祖考來格俟配天之儀諸侯入朝思􅂇祭之職豈上聖之謙而愚臣之惑也臣請考列辟之明術塞處士之橫議約其制復其位儉不爲其陋奢不爲其肆斟酌乎三五擬議乎簡易展宗祀之禮正朝會之義廣明堂之妙道極眞人之能事以至聖子神孫億千萬期登於斯念於斯受天之禧與天下冝而巳乎秋香亭賦并序提􅀧屯田鉅鹿公就使居之北擇高而亭背􅀌巘面橫江植菊以爲好命曰秋香亭呼賔醑酒以落之僕賦而侑焉鄭公之後􅀆冝其百禄使于南國􅀆鏗金粹玉􅀝大斾於江干掲高亭於山麓江無煙而練迴山有嵐而屏矗一朝賞心千里在目時也秋風起􅀆寥寥寒林脫􅀆蕭蕭有翠皆歇無紅可凋獨有佳菊弗冶弗夭采采亭際可以卒歳畜金行之勁性賦土爰之甘味氣驕松筠香滅蘭蕙露漙漙以見滋霜肅肅而敢避其芳其好胡然不早歳寒後知殊小人之草黃中通理得君子之道飲者忘醉而餌者忘老公曰時哉時哉我賔我來緩泛遲歌如春登臺歌曰賦高亭􅀆盤􅁊美秋香而酡顔望飛鴻􅀆􅁳􅁳愛白雲之閑閑又歌曰曽不知吾曹者將與夫謝安不可盡歡而聿去乎東山又不知將與夫劉伶不可復醒而蔑聞乎雷霆豈無可而無不可􅀆一逍遥以皆寧靈烏賦并序梅君聖俞作是賦曽不我鄙而􅀉以爲好因勉而和之庶幾感物之意同歸而殊塗矣靈烏靈烏爾之爲禽􅀆何不高翔而遠翥何爲號呼于人􅀆告吉凶而逢怒方將折爾趐而烹爾軀徒悔焉而亡路彼啞啞􅀆如愬請臆對而心諭我有生􅀆累隂陽之含育我有質􅀆處天地之覆露長慈母之危巢託主人之佳樹斤不我伐彈不我仆母之鞠􅀆孔艱主之仁􅀆則安度春風􅀆旣成我以羽翰眷庭柯􅀆欲去君而盤􅁊思報之意厥聲或異警於未形恐於未熾知我者謂吉之先不知我者謂凶之􅀋故吿之則反災于身不告之則稔禍于人主恩或忘我懐靡臧雖死而告爲凶之防亦由桑妖于庭懼而脩德俾王之興雉恠于鼎懼而脩德俾王之盛天聽甚邇人言􅂚病彼希聲之鳯皇亦見譏於楚狂彼不世之麒麟亦見傷於魯人鳯豈以譏而不靈麟豈以傷而不仁故割而可卷孰爲神兵焚而可變孰爲英瓊寧鳴而死不黙而生胡不學太倉之䑕􅀆何必仁爲豐食而肥倉苟竭􅀆吾􅀅安歸又不學荒城之狐􅀆何必義爲深穴而威城苟圯􅀆吾將疇依寧驥子之困于馳騖􅀆駑駘泰於芻養寧鵷鶵之飢於雲霄􅀆䲭鳶飫乎草莽君不見仲尼之云􅀆予欲無言纍纍四方曽不得而巳焉又不見孟軻之志􅀆養其浩然皇皇三月曽何敢以休焉此小者優優而大者乾乾我烏也勤於母􅀆自天愛於主􅀆自天人有言􅀆是然人無言􅀆是然古詩謝黃惣太博見示文集松桂有嘉色不與衆芳期金石有正聲詎􅀅羣響隨君子著雅言以道不以時仰止江夏公大醇無小疵孜孜經緯心落落敎化辭上有帝皇道下有人臣規邈與聖賢會豈以冨貴移誰言荆􅁄滋獨此生蘭芝誰言鼃黽繁獨此蟠龍􅀛豈徒一時異將爲千古竒願此周召風達我堯舜知致之諷諌路陞之誥命司二雅正得失五典陳雍熈頌聲格九廟王澤及四夷自然天下文不復迷宗師四民詩士前王詔多士咸以德爲先道從仁義廣名由忠孝全美禄報爾功好爵縻爾賢黜陟金鑑下昭昭媸與妍此道日以踈善惡何茫然君子不斥怨歸諸命與天術者乗其􅂩異端千萬惑天道入指掌神心出胷臆聽幽不聽明言命不言德學者忽其本仕者浮於職節義爲空言功名思苟得天下無所勸賞罰幾乎息隂陽有變化其神固不測禍福有􅀝伏循環亦無極前聖不敢言小人爾能臆禆􅍳方激揚孔子甘寂黙六經無光輝反如日月蝕大道豈復興此弊何時抑末路競馳騁澆風揚羽翼昔多松栢心今皆桃李色願言造物者回此天地力農聖人作耒􅪢蒼蒼民乃粒國俗儉且淳人足而家給九載襄陵禍比戸猶安輯何人變清風驕奢日相襲制度非唐虞賦歛由呼吸傷哉田桑人常悲大絃急一夫耕幾壠游墮如雲集一􅁞吐幾絲羅綺如山入太平不自存凶荒亦何及神農與后稷有靈應爲泣工先王教百工作爲天下器周旦意不朽刋之考工記嗟嗟逺聖人制度日以紛窈窕阿房宫萬態橫青雲熒煌甲乙帳一朝那肯焚秦漢驕心起陳隋益其侈鼓舞天下風滔滔弗能止可甚佛老徒不取慈儉書竭我百家産崇爾一室居四海競如此金碧照萬里茅茨帝者榮今爲庶人耻冝哉老成言欲攦般輸指商甞聞商者云轉貨頼斯民逺近日中合有無天下均上以利吾國下以藩吾身周官有常籍豈云逐末人天意亦何事狼虎生貪秦經界變阡陌吾商苦悲辛四民無常籍茫茫僞與眞游者􅀼吾利堕者亂吾倫淳源一以蕩頽波浩無津可堪貴與冨侈態日日新萬里奉綺羅九陌資埃塵窮山無遺寳竭海無遺珍􅀑神爲之勞天地爲之貧此弊巳千載千載猶因循桑柘不成林荆􅁄有餘春吾商則何罪君子耻爲隣上有堯舜主下有周召臣琴瑟願更張使我歌良辰何日用此言皇天豈不仁􅀉題孫氏碧鮮亭天地何風流復生王子猷黃金買碧鮮緑玉排清秋非木亦非草東君歳寒寳耿耿金石性雪霜不能老清風乃故人徘徊過此君泠泠鈞天音千載猶得聞應是聖賢魄鍾爲此標格高節見直清靈心隱虚白粉筠多體貌錦籜見兒童上交松桂枝下結蘭蕙叢秀氣藹晴嵐翠光凝緑水明月白露中靜如隱君子不願湘靈泣不求伶倫吹鳯皇得未晚蛟龍起何時蕭蕭雲水間良與主人冝紅塵滿浮世何當拂長袂坐嘯此亭中行歌此亭際逍遥復逍遥不知千萬歳贈張先生應是少微星又云嚴君平浩歌七十餘未甞識戈兵康寧福巳大清靜道自生邈與神仙期不犯寵辱驚讀易夢周公大得天地情養志學浮丘乆錬日月精壽存金石性嘯作鸞鳯聲隂德不形言一一在幽明何當換金骨五雲朝玉京有客淳且狂少小愛功名非謂鐘鼎重非謂簞瓢輕素聞前哲道欲向聖朝行風塵三十六未作萬人英廼聞頭角者五神長戰爭禍福有􅀝伏冨貴多􅃜盈金門不乏雋白雲冝退耕人間有嵩華棲之比蓬瀛芝田春藹藹玉澗晝錚錚峯巒多秀色杉桂一何清月壑認瑶池花巖列錦城朱絃冉冉奏金醴遟遟傾相勸綺季徒頽玉信縱橫此樂不㝷常何苦事浮榮願師先覺者逺逺濯吾纓明月謡明月在天西初如玉鈎微一夕増一分堂堂有餘輝不掩五星耀不礙浮雲飛徘徊河漢間秀色若可飡清風起叢桂白露生堦蘭高樓望君時爲君拂金徽奏以堯舜音此音天與稀明月或可聞顧我亦依依月有萬古光人有萬古心此心良可歌憑月爲知音上漢謡眞人累隂德聞之三十天一朝鸞鶴來髙舉爲神仙冉冉去紅塵飄飄凌紫煙下有脩眞者望拜何拳拳願君銀臺上侍帝玉案前當有人間問請爲天下宣自從混沌死淳風日衰靡百王道不同萬物情多詭堯舜累代仁絃歌始能治桀紂一旦非宗廟自然一作白日毀是非旣循環興亡亦繼軌福至在朱門禍來先赤子嘗聞自天意天意豈如此何爲治亂間多言歷數爾願天賜吾君如天千萬春明與日月乆恩􅀅雨露均帝力何可見物情自欣欣人復不言天天亦不傷人天人兩相忘逍遥何有鄉吾當飲且歌不知羲與黃清風謡清風何處來先此高髙臺蘭叢國香起桂枝天􅄜廻飄飄度清漢浮雲安在哉萬古鬱結心一旦爲君開有客慰所思臨風乆徘徊神若遊華胥身疑立天台極渴飲沆瀣大暑執瓊瓌曠如携松丘騰上煙霞遊熈如揖莊老語人逍遥道朱絃鼓其薫可以解吾民滄浪比其清可以濯吾纓願此陽春時勿使飄􅁀生千靈無結愠萬卉不摧榮庻幾宋玉賦聊廣楚王情書海陵滕從事文㑹堂東南滄海郡幕府清風堂詩書對周孔琴瑟親羲黃君子不獨樂我朋來逺方言蘭一相接豈特十歩香德星一相聚直有千載光道味清可挹文思高􅀂翔笙磬得同聲精色皆激揚栽培盡桃李棲止皆鸞皇􅅣玉作鎮圭鑄金爲干將猗哉滕子京此意乆而芳上都行送張伯玉上都有聖人日月一以新曄曄天下才西走堯舜賔百谷望東浸萬星依北辰直者爲之轅曲者爲之輪一材不復遺况此席上珍南山張公子氣象清且淳懷有綺繡文朝無􅀲􅚩親寸心如鐵石不羞賤與貧買臣起白社賈􅁩冨青春寳此金轆轤去去延平津鳴琴思古理鳴琴聲聲動金玉何以報昔人傳此堯舜曲馴鷗詠萬物有常性性無不貴生風翔與駿奔一一逺害情鴥彼沙上鷗皎皎霜雪明月宿滄洲靜日浴滄浪清何以狎溪人溪人澹無營循循自飲啄徃徃相逢迎徘徊兩無猜何慕復何驚客有懷依依雲水言將歸逐爾羣鷗樂羣鷗爾勿飛此心未忘者天機非殺機古鑑磨此千年鑑朱顔清可覽君看日月光無求照人膽贈樊秀才知古之孫五代雲雷屯九野皆龍戰開國如棊枰皇極何由建太祖乗天飛大發光華旦樊公江表來經綸速如電微子入􅁎周倉皇救塗炭四海乃大同萬里聞薫風禮樂與征伐出自明光宮大勲未大賞積慶冝無窮李廣不封侯繼世多英雄公有承家子所至神明理復有起家孫一見知千里和氣十洲春清流九江水非有神筆夢粲粲文何綺天子青春朝列鼎招英髦明年桃李開禹浪如霞高之子可變化咫尺登金鼇始知祖德長光輝傳佩刀贈棊者何處逢神仙傳此棊上㫖靜持生殺權宻照安危理接勝如雲舒禦敵如山止突圍秦師震諸侯皆披靡入險漢將危竒兵飜背水勢應不可隳關河常表裏南軒春日長國手相得喜泰山不礙目疾雷不經耳一子貴千金一路重千里精思入於神變化胡能擬成敗繫之人吾當著棊史歳寒堂三題堯舜受命於天松栢受命於地則物之有松栢猶人之有堯舜也是故聖人觀有心而制禮體後凋以辨義丁公神遇鑒􅄰形焉陶相眞棲風韻在矣前言徃行豈徒然哉吾家西齋僅百載二松對植扶踈在軒靈根不􅀌本文相茂卓然有立儼乎􅀂思霜霰交零莫能屈其性絲桐間發莫能擬其聲不出戸庭如在林壑某少長北地近還平江美先人之故廬有君子之嘉樹清隂大庇期於千年豈徒風朝月夕爲耳目之資者哉因命其西齋曰歳寒堂松曰君子樹樹之側有閣焉曰松風閣美之以名居之斯逸由我祖德貽厥孫謀昆弟雲來是仰是則可以爲友可以爲師持松之清逺耻辱矣執松之勁無柔邪矣禀松之色義不變矣揚松之聲名彰聞矣有松之心德可長矣念兹在兹我族其光矣子子孫孫勿翦勿伐惟吾家之舊物在歳寒而後知天地憐其材而况於人乎作詩紀之以永長也歳寒堂我先本唐相弈世天衢行子孫四方志有家在江城􅀟松儼可愛高堂因以名雅知堂上居宛得山中情目有千年色耳有千年聲六月無炎光長如玉壷清于以聚詩書教子脩誠明于以列鍾鼓邀賔樂昇平緑煙亦何知終日在簷楹太陽無偏照自然虚白生不向摇落地何憂歳崢嶸朂哉肯構人處之千萬榮君子樹二松何年植清風未甞息夭矯向庭戸􅀟龍思霹靂豈無桃李姿賤彼非正色豈無蘭菊芳貴此有清德萬木怨摇落獨如春山碧廼知天地威亦向歳寒惜有聲􅀂江河有心􅀂金璧雅爲君子材對之毎前席或當應自然化爲補天石松風閣此閣冝登臨上有松風吟非絃亦非匏自起簫韶音明月萬里時何必開緑琴鳯皇下雲霓鏘鏘鳴中林淳如􅁑天歌太古傳于今㓗如庖羲易洗人平生心安得嘉賔來當之共披􅁭陶景􅀂在仙千載一相㝷贈都下隱者梅福隱市門嚴平居􅁲肆乃知神仙徒非必煙霞地異哉西山人逍遥京洛塵門多長者車察脉如有神軒皇萬餘載此術了然在精意洞五行飛名落四海結舎擬滄洲東池接御溝蘭芳披幽徑琴樽在小舟清夜泛月華宛是江湖遊他日上雲去兹爲黃鶴樓范文正公集卷第一
