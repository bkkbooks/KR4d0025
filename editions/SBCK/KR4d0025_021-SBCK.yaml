body:
  text: 後學時兆文校正後學黄􅁎水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校第一卷古詩􅀉石學士江樓􅀉希元上人酬和黃太愽滕子京以眞籙相示因以贈之送徐登山人匣劒南園行歌明月南樓送陳􅉞秀才逰金陵過方處士􅃇隐律詩送歐伯起九日送虎丘長老寄潤州龎籍送湛公歸四明講席和龐醇之見􅀉依韻和胡使君書事贈呉秀才依韻和龐殿院見􅀉依韻和魏介之同逰玉仙壇依韻和介之未開菊依韻酬池州錢綺翁􅀉題溪口廣慈院第二卷堯舜率天下以仁賦君以民爲體賦六官賦鑄劔㦸爲農器賦任官惟賢材賦從諫如流賦聖人大寳曰位賦賢不家食賦窮神知化賦乾爲金賦王者無外賦第三卷易兼三材賦淡交若水賦飬老乞言賦得地千里不如一賢賦體仁足以長人賦陽禮教讓賦天􅂹呈才賦稼穡惟寳賦天道益謙賦聖人抱一爲天下式賦政在順民心賦水火不相入而相資賦第四卷十六羅漢因果識見頌序竇諫議録上張侍郎上大名府主王侍郎啓賦林衡鑑序賀胡侍郎致仕知杭州謝兩地啓移蘇州謝兩府謝夏太尉謝賀王啓論西事劄子道服賛釣臺詩送饒州董愽士送徐􅁢升歸九華遺文范文正公集目録終
