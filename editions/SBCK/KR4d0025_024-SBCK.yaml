body:
  text: 易兼三材賦通彼天地人謂之易大哉易以象設象由意通兼三材而窮理盡性重六畫而原始要終二氣分儀著高卑於卦内五行降秀形動靜於爻中所以明乾坤之化育見天人之會同者也昔者有聖人之生建大易之旨觀天之道察地之紀取人於斯成卦於彼將以盡變化云爲之義將以存潔靜精微之理極其數也必在乎兼而兩之定其位焉由是乎三者備矣若乃高處物先取法乎天所以顯不息之義所以軫行徤之權保合大和純粹之源顯著首出庶物高明之象昭宣此立天之道也御隂陽而德全又若卑而得位下蟠於地所以取沉潜之體所以擬廣博之義宛然不動既侔厚載之容感而遂通益見資生之利此立地之道也自剛柔而功備於是卑高以陳中列乎人剛而上者宜乎主柔而下者宜乎臣愼時行時止之間寜迷進退察道長道消之際自見屈伸此立人之道也敦仁乂而有倫旣而明三極之端知八象之謂存擬議而无爽周變通而􅂚旣君子用之而消息聖人執之而經緯亦由璇璣測象括運動於七辰玉琯候時含慘舒於四氣豈不以易之爲書也範彼二儀易之爲教也逹乎四維觀其象則區以别矣思其道則變而通之上以統百王之業下以㫁萬物之疑變動不居適内外而无滯廣大悉備包上下而弗遺至矣哉无幽不通唯變所適凖天地而容日月畜風雷而列山澤鼓之舞之以盡神統三才而成易淡交若水賦君子求友恬淡爲上伊淡交之相愛諭柔水於前聞惟久要之情不瀆而靈長之德爰分如通潤下之功同行其道似得朝宗之便相薦於君原夫大禮立言後賢是擬將敦切切之契必察湯湯之理非敢乎狎而翫之蓋懼乎數斯䟽矣彼以甘而壞者允謂小人此以淡而成焉實惟君子莫不就乂若渴從善如流甘言者不可不畏澡行者予取予求冀􅀗有中之美免貽中輟之羞義協㫁金髣髴淘金之利譽稱連璧依俙沉璧之秋惟德是依因心而友游泳而學海同濟兢愼而禮防共守寳其忠信懷珠之象寜賖志在􅅣磨穿石之功自有則知甘而交者何能别嫌淡而交者常如飬恬進弗違於汎愛退不失於流謙同氣相求將益潤身之德見利而讓必揚絜已之㢘故得久而不渝誠然可覽論心而􅂚有凝滯投分而毎存澄淡情深結綬遠思誓帶之流志在彈冠濳動濯纓之感念兹在兹恬爲淡爲舎已􅀋不爭之勢親仁浮就濕之基如切如瑳自契激揚之義同心同德孰分清濁之姿士有遠慕前修聿希令望毎定交而不雜必推義而爲上考同人於易象見賢必親法上善於禮文書紳无妄飬老乞言賦求善言以資國之用年高者不可不飬言善者予取予求奉黃髪以无怠垂清問而弗休主善爲師尊縱心之􅂄舊旣飽以德咨逆耳之謀猷仰彼前王垂兹令典謂仁者所以能受則言也於斯可選肆筵授几聿修尚齒之宜論道經􅀖必採无瑕之善莫不崇其盛禮納以明恩登上庠而有則躋大學以居尊待以常珍用貴皓然之士禆其闕政是詢哿矣之言飬老之美於斯有以一則崇孝悌之本一則求善教之㫖式宴且喜蔑聞大耋之嗟切問近思屢逆聖人之耳豈不以老者倍年之長言者善人之資飬其老則惟賢是擇乞其言則患巳不知識君臨之所重見父事之攸宜不素飱􅀆實舉燕毛之禮善待問者當陳補衮之詞是知捨此則無以尊德遵此則足以守國大禮載之而爲美前王行之而不忒漢朝定嗣延四皓以咨謀周伯興􅀖奉太公而取則恩斯勤斯故舊不遺孰侮桑榆之暮景毎求藥石之良規祝饐無虧何患乎老夫耄矣沃心有取但見乎聖人則之今國家治歷萬􅀖緝熈庶政納老成之嘉話闡誕敷之休命于以見至道物興與唐虞而比盛得地千里不如一賢賦賢實􅀖本何地能及地廣千里功虧一賢故開基之大矣寜命世以生焉附益我疆雖有􅀖畿之遠發揮王業難居家食之先得不載考謨猷旁稽士實延表之境以雖衆挺特之才難可失彊吞是戒豈一千乘之多爲禮聘斯行在五百年之間出又何取險包絶壑深控燈江非形勝於十二貴國士之无􅀟尋師之道路咸歸何能翼聖展驥之途程盡入詎可經􅀖是以攻掠无聞柬求可考匪煩開拓之力唯取弼諧之道秦啇於而齊即墨非我之求傅巖野而渭水濱是吾所寳唯賢也其功莫料唯地也於用如何自欲得人之盛豈須拓地之多爵舉之流可進之而授賞目極之所難獻之而請和斯蓋意切求賢事非避地雖沃野之咸在諒竒才之足懿任附庸之國衆胡比盡忠縱兵賦之數多罔加餘智豈不以賢之得雖少必貴地之有雖多曷能捨地得賢􅀆􅀖基以立失賢有地􅀆國難隨興是故治亂咸繫古先足徴鴻溝割而楚亡惟賢不用昌國去而燕奪何地堪矜在乎啓土罔資虗襟是急皇明由是以彌遠鴻業於焉而允緝若然則議賢者之深功何百城而能及體仁足以長人賦君體仁道随彼尊仰聖人受天命體乾文旣克仁而是務遂長人而不群法元善之功可處域中之大奉博施之德宜爲天下之君原夫易象洞分乾元光啓謂元之德也莫大乎始生之道生之善也莫若夫至仁之體所以法而用也既不由幹事之貞體以長焉又不預亨嘉之禮君子乃時法斯道力行乎仁侔剛徤之克著致惻隱以昭陳敦惠愛以爲心首出庶物得慈和而示化利見大人莫不與合化權潜符天造蓋本生成之禮益見尊崇之道安仁爲念我則俯視於􅀺氓克巳存誠我則上居於大寳豈不以體其仁則物皆尊戴居其長則民咸恱隨君非仁則曷享於推戴人非長則寜致於淳熈詎三月之違焉道之行也致一國之興矣人皆仰之足可以首四德以居斯冠兆人而在彼不曰仁何以見爲生之妙不曰長何以見居上之美故得萬民以濟咸承煦育之恩百姓不知盡荷發生之理不然何以握圖在上御宇居尊侔乾道之罔息酌仁恩而不煩念兹爲器之人未足與議審彼樂山之士始可與言方今道化惟微神功至廣用乾剛而不紊奉仁道而无爽所以吾皇體斯道而御寰中故是尊而是仰陽禮教讓賦修射崇飲民不爭矣先王制陽禮於百姓興民讓於九州覩射飲之斯在知政教之所由我􅃓旣張觀德之風遐􅀍朋酒斯饗序賔之義咸修觀其司徒之職旣揚王者之教云下使穆穆而鄉飲俾濟濟而燕射將以􅓡矢之利習彼威儀復於罇爼之間宣其教化至若洞啓澤官射夫來同内叶和平之志外敦廉順之風揖讓而升非尚六鈞之勇進退可庶不矜五善之功此射之讓也􅀖教攸崇又若以年以品㑹於鄉飲在獻酬之无謬居長㓜而必審貴賤位矣三賔之象不踰和樂興焉百拜之容弗寢此飲之讓也國人是禀則知􅀖禮循循以教萬民所以安天下於不競所以教域中之有倫射不主皮息爭心於君子酒以成禮導和氣於鄉人是知用之而在化可久廢之而其化則不斯射也可以止其􅁀亂斯飲也可以樂其富壽所以反當仁之義以勸四方遵成魄之䂓用寜九有然則謂其陽也取其􅁻而爲名謂其讓也取其和而不爭于以見莫善於禮于以見與世作程侯以明之罔替君臣之義禮無違者遂諧賔主之情遂使德藝可觀忿肆遄巳知㳂事以興教蓋因時而立紀故聖人務焉則違之者寡矣天驥呈才賦君德通遠天馬斯見天産神驥瑞符大君偶昌運以斯出呈良才而必分眸􅅆紫電鬛妥紅雲星精效祥聿歸三五之聖龍姿挺異不溺三千之羣是何降靈霄極薦夢中國啓天之命光帝之德包羞􅀆御閑之十二屏跡􅀆駑駘之萬億曵呉門之練不足以比容竭燕市之金不足以爲直徒觀夫汗血流赭連錢拂騘鮫瘦筋路鸞肥臆豐矯矯焉鯨躍乎滄海昻昻焉鶴出乎煩籠契瑞圖之表述昭神化之感通卒使伯樂居前駭千載之有得王良處右悲一旦之无功得以馴致皇家駿奔帝􅁐厥生也足比乎房駟之異其來也寜憚乎渥洼之遠雖稱德於絶羣豈代勞而一混首登華廐嘶風休憶於窮􅁁高騁康衢逐日詎思於長坂豈徒矜半漢衒連乾必也瑞乎聖通乎天騰志千里飛聲八埏歷金埓以腰􅙂奉玉勒以周旋日馭如親合亞六龍之列瑶池若去請登八駿之先異乎哉神物來宜天意純嘏掩逸足於千駟革嘉祥於一馬方馳六轡且殊歸岳之流儻駕皇輿曷如負圗之者是知造化之竒鍾焉在斯祥麟生而奚匹馴犀至而曷爲寳於大􅀖寜徇晉臣之請出於有道豈惟漢帝之時客有感而歎曰馬有俊靈士有秀彦偶聖斯作爲時而見方今吾道亨而帝道昌敢昧呈才之便稼穡惟寳賦王者崇本民食爲貴資時者稼穡務本者惟王顧民食而可貴爲國寳而允臧田疇播殖之時豈慙種玉倉廪豐登之際寜讓滿堂稽彼前賢垂諸大雅謂飬民而可取必重榖而無捨惟農是務誠天下之本歟以寳爲名表物中之貴者耒耜无廢􅁰稷是崇毎訓耕耘之績如敦追􅅣之功闢五土之時披沙豈異載千箱之處照乘攸同蓋以順彼天時美玆政本觀艱難而有􅀗稱􅉞竒而何損年多膏澤連城之價可期瑞有嘉禾希代之姿奚遠是知寳金壁者見棄於聖人寳稼穡者克濟於生民得之則九年利用闕之則百姓食貧多旣如雲寜愧白虹之氣析於元日似求赤水之珍其或剖巨蚌以勞心攻他山而竭力在寒暑則非民之服在饑饉則非民之食徒聞賈禍之辱莫見作甘之德􅂚若我東作可嘉西成不忒旣堅旣好亞父欲碎而何能如京如坻季子比多而莫得念兹在兹百王不移此盈疇而是貴彼韞櫝而何爲見三時之有倫如分三品與四民之共給胡畏四知今國家崇后稷之功廣神農之道旣豐年以爲瑞蓋惟榖而是寳故能富庶之風告成穹昊天道益謙賦天道常益謙損之義士有探造化之真筌察盈虗於上天雖秉陽之功不宰而益謙之道昭宣萬物仰生否者由斯而泰矣四時下濟屯者自我而亨焉原夫杳杳天樞恢恢神造損有餘而必信補不足而可考是故君子法而爲政敦稱物平施之心聖人象以飬民行裒多益寡之道豈不以謙者物之自損益者時之與昌龍蛇蟄而後震草木落而還芳于以見其物理于以見其天常月旣虧而中盈於時不昧陽盡剥而求復其義爰彰然則高明之運也善行无迹盛衰之應也惟變所適苟守之以謙必受之以益有中之士我則錫元􅁻而弗違罪巳之君我則助勃興而无斁雅契姬文之述何煩太史之占處幽晦者日星必照在焦枯者雨露必霑取􅀋而信如江海之潤下殊塗同致若􅀑神之福謙得不觀庶物之情究至理之本貴必始之於賤益乃生之於損旣人事之在斯又天道之奚遠高者抑而下者舉一氣无私徃者屈而來者伸萬靈何遁大哉覆受无遺神之聽之執虗者不言而應用壯者雖猛何爲卑以自牧之人實受其福貴而能降之者不失其宜我后上德不矜至仁博施實兆民之是頼无一物之不遂貴退讓而黜驕盈得天道益謙之義聖人抱一爲天下式賦淳一敷教天下爲式巍巍聖人其教如神抱一而萬機無事爲式而庶彚有倫秉乎天得之樞羣氓作則立乃道生之化八表還淳老氏有云聖皇无失保環中而可久率天下而守一蓋以一之妙也冠四大而强名式之用焉正萬靈而咸秩莫不􅄀符妙有脗合虗无察察之機悉去淳淳之理誕敷于以見清淨而不擾于以見易簡而不踰遵黃帝之求珠我眞未䘮契莊生之齊物我化皆孚无臭无聲是則是効包自然之禮樂畜无親之仁孝去奢去泰惟存至道之精自西自東咸􅀍不言之教豈不以一者道之本式者治之筌苟能持於罔象自可制於普天亦若大衍攸虗爲四營之本也太陽无二作七政之首焉豈比夫昧於希夷煩其用捨滋彰之法著矣沖寂之猷遠也􅂚若我靜守權輿克寜華夏執此惟精之㫖得自窈􅄀俾諸咸有之風播於上下大矣哉上德不德無爲而爲保谷神而不宰育芻狗以何私政復結繩罔有二三之令理敦執契自爲億兆之規我后超五帝之功邁三王之德化育而四時爲柄恭黙而萬􅀖承式故得兆人熈熈登春臺而躋壽域政在順民心賦明主施政能順民欲王者廣育黔首誕布皇明闡􅀖政而攸叙順民心而和平振窮恤貧必俯從於衆望發號施令實允叶於羣情昔管子以祖述太猷發揮明主垂教之言斯著爲政之方可覩以謂逆其民而理者雖令不從順於民而化焉其德乃普是以䆒其所病察其所宜禮應時而㳂襲教隨俗以彰施欲求乎廣所及也必在乎俯而就之彼患困窮我則躋之於富庶彼憂苛虐我則撫之以仁慈于以見百姓爲心萬􅀖惟慶无一物不得其所无一夫不遂其性所以感其和氣所以謂之善政故得上下欣合莫聞不協之謀遐邇恱隨毎覩易從之命豈不以政者爲民而設民者惟政是平違之則事悖順之則教興乃古今之必重實聖賢之所能亦猶梓匠任材因曲直而制作化工造物隨大小而陶蒸是以布政從民者􅀺元克信驅民從政者羣心不徇思柔遠而能邇必去逆而効順舉刑罰罪因衆棄而方行列爵飬賢由僉諧而後進懿夫施此􅃔倫洽彼生民在上者弗私其欲居下者孰敢不遵務材訓農皆因民之所利布德行惠常捨巳以從人今我后稽古省方順時察俗上克承於天道下弗違於民欲有以見善與物之咸亨實无幽而不燭水火不相入而相資賦其性相反同濟於用水火之性也偏其反而水火之利也一以貫之居惟異處動必相資始則无自入焉受諸睽而巳矣中則徃有功也取旣濟以宜其原夫兩儀肇生五行並命水以流而順火以明而盛一彼一此自分燥濕之情知和而和匪間炎涼之性烈烈湯湯曰隂曰陽其數六者柔而勝其數七者熾而昌六以隂而習乎坎位七以陽而配彼離方離坎誠非其一致隂陽安得而两􅁯雖天生之材本四象而區别蓋日用之利合二體以交相道非獨善功不相遠翻疑乎方以􅀋聚何患乎體與情反作醎作苦始殊同氣之求曰潤曰炎豈宜相得之晚施之無窮和而不同亦猶天地分而其德合山澤乖而其氣通日月殊行在照臨而相望寒暑異數於化育以同功則知質本相違義常兼濟六府辯盛德之美九􅂦洽大亨之惠分而爲二曲直相入以誠難㑹之有元胡越異心而自契象則遠爾理必依於當異位而有别終同功而靡踈從政者寛猛相須體兹至矣爲道者恬智交飬觀此行諸是故躁以靜爲君有以無爲用相薄􅀋風雷之益違行殊天水之訟我道也不相入而相資與天下之公共者也范文正公别集卷第三
