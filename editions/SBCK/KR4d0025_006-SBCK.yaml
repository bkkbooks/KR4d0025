  text: 范文正公集卷第六
  hash: sha256:c28cb4f9763bfaecb7e45e445b400717ba4bdbfa9abc679aa58900f60b72adda
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_006-1a}
body:
  text: 皇儲資聖頌并序臣聞聖人之作易也以言乎離則大人有繼明之體以言乎震則元子有主器之威何則體以繼明而萬􅀖乆照威以主器而七廟大寧其況登監撫之期資聖神之政者哉國家興皇綂紹僊源寳葉茂昌靈根善固皇祖之功也神武不殺天開八際皇宗之德也文明以徤景臨萬有聖上妙體乾元光御人極應上眞之道撫大寳之運華親肅睦美俗昭明尚周文之文而百官懋德下漢武之武而四夷懷恩於是覽神洛以朝先因心之至也啓帝符以升中動天之著也如報厚徳於汾壤􅅃大道於亳宫表開聖之都掲降清之館鴻名盛則皇哉休哉曠代不舉者吾皇富有焉然猶清淨戒豫恭黙思高觀妙自然播芳無外璿樞麗正物有戴天之安金鑑凝明人咸抱日之景􅀂夫道德之奥仁義之醇禮樂之和刑政之清無得名矣又盡善矣功成功矣事無事矣聖子神孫其法象之矣居一日美三公登東塗皇帝若曰眷惟元子萬􅀖重器道心之㣲必䆒王業之難必知性習惟其􅀄左右惟其賢爾周爾召徃師傅焉講善體政欲有觀焉三公相與而進曰惟皇之嗣惟天之授生而神靈㓜而岐嶷而復累藩邸踐儲副奉見清廟載禧圓丘固當輔聖克家佐天理物也矣皇太子乃夕惕欽命未明而興儼觀東朝齊立西面與夫股肱優老羽翼令人講帝皇之風叅天人之理遐燭安危之轍􅆌窮得失之源曷甞不力仁而民懷作德而祥降於是消息乎九範經營乎五典與治與亂警䇿而弗迷惟時惟幾佩服而深諭此道心之㣲也蓋䆒祥於妙慮其於中外之務光大之政則賢必尚爵功必厚禄謀一令思以敷天下之祐議一賞思以起天下之善舉一刑則必悵然有不忍之心􅁀何端而興矣接一士則必慷然有好直之心佞何階而進矣天下欲以富利而弗奪也欲以壽養而弗傷也欲以固信而弗欺也欲以安靜而弗擾也期于無盜責之于衣食期于無刑求之於禮義禮義旣􅂶熟而成風然後天下熈熈而遂樂也無窮然則上世聖贒未甞不勉而後至愼而後寧故書曰勗哉庶其至矣詩云戒之愼之保其寧矣此王業之難也豈徒知之固以輔而去之矣􅀂性習左右可得而言聰哲自天誠明見志其始也后稷玩於播殖仲尼戯於爼豆爰發五勝之辨寔宣三正之方今乃琴誦成文典書在御入則有保出則有師太傅居前少傅居後而能幹蠱天家代工王室美四方之事資萬機之聖識者曰正斯嗣也明斯德也由斯道也天意人事章章乎豈符䜟而後著也惟聖源深長天道輔相歟非天私我有宋惟天祐于一德昔陶唐氏之與舜也歷試諸難三十載而堯德益明天下益治今斯時也然奚􅀂吾君之嗣之美矣君子有言曰巍巍乎皇之有成功也哉郁郁乎嗣之有成德也哉樂聖者係之頌云粤自黄靈爰及炎宋巍巍天造緜緜帝綂神武之祖文明之宗元基不㧞盛業來重我后御極吾民敏德盛節交舉庶彚咸殖萬􅀖作孚百神受職允也時雍何哉帝力王假有家廼建承華三善靡忒二對何嘉日光月輪山輝海潤相見乎離蓋取諸震帝均其勤撫國監軍天受英晤日彰温文乃左乃右惟仁惟舊稼穡斯憂艱難思䆒授人惟才進人惟德刑也以薄思也以直屈者其伸勞者其逸言思逆耳道務前膝玉振金相英聲茂實緜若壽域熈如春臺守之而巳仁遠乎哉天業昌􅀆天家光􅀆聖有嗣􅀆眀無􅆠􅀆皇心之寧􅀆黔首之康􅀆祖宗之靈􅀆子孫之長􅀆金石在廟乎頌聲洋洋􅀆泰州張侯祠堂頌生祠民報德也制置公本汝頴之竒以文武事朝廷爲勲臣於四方而甞戰守秦塞制勝非一招降屬寇全活甚衆撫南夷以乂遠俗使北􅆠以㝷大信光華之命所嚮凝績天禧中國家以鹽鐡饋運之計重於東南命公領之于兹八年公夙夜不懈闕政咸舉初淮浙之間鹽民告困海利云剥公請振崇泰楚三郡亭人歲增課數十萬石三郡鹽課虧者十年公訪其利害請加買直蠲積􅀒行數事以蘇之課乃大增興杭秀海三郡鹽塲歲入課四十萬石又甞蘇秀間太湖漲溢害于甫田公請導入于海復租六十萬石白沙郡大江之北有灣數里風濤爲險舟檝不利公於是開長蘆西河以濟之又高郵之北漕河屢決阻我糧道破我農畒公於是作堤二百里旁置石限平其增損以均灌漕焉惟兹海陵古有潮堰舊功弗葺驚波荐至鹽其稼穡偃其桑梓此􅀖之人極乎其否公堅請修復乃興厥功横議囂然僅使中廢公又與轉運使胡公再列其狀朝廷可之仍許兼領是郡以觀厥成起基於天聖二載之秋畢工於六載之春旣而捍其大災蠲其積􅀒朞月之内民有復諸業射諸田者共一千六百戶􅀅歸其租者又三千餘戸海陵民因潮之患而􅀝閣其租者三千餘戶天聖四年勑依制置司奏侯堰成日定奪今漸復焉撫之育之以簡以愛優優其政洽于民心於是請肖公之議以奉于祠期子孫之不忘乎秉筆者故作頌焉我公雄傑經制楚越鑒洞毛髪誠掲日月建利除孽代天工發海陵嗷嗷古防弗牢萬頃良膏歲凶於濤民焉呼號不粒而逃公聞􅉃怛廼按廼察草奏屢逹狂議四遏心過金鐡對天不奪宸聽旣聰宰謀旣同展矣胡公恊力諧忠兵民交􅂶興防之功盤盤偃偃百里而逺雲矗不散山亘不斷如天作限奠萬家産朝以公賢兼于蕃宣傷者我全疾者我痊逋亡幾千咸復于田公義不爽欲報彌廣建牙列壤將有攸徃衆圖其象以永瞻仰列星之精列嶽之靈儀焉亭亭神焉熒熒居千百齡此􅀖鎭寧旣寧旣聚濤莫我苦比比牖戸鱗鱗場圃而翁而竪于歌于舞天子穆清諸侯經營民􅀆樂成榖􅀆登盈作爲頌聲告于神明南京府學生朱從道名述天聖紀號之六載樞宻留守侍郎齊郡公以東朝舊德右弼上賢􅀅啓秉鈞之猷尚圖分政之任善下成乎江海養浩􅂶乎天地誠明之際無隱不及居一日曰祖宗之都儀刑萬􅀖道德之所興禮樂之所出風化不作四方何仰哉乃首訪膠庠躬省弦誦敦六籍以恢本發四科以彰善於是人樂名教復鄒魯之盛士爲聲詩登周召之美旣而丘園􅀄秀閥閱令嗣拳拳允集濟濟如歸沛國朱生世嚴冠冕㓜苦霜露憫先搆之將墜忽中陵之見育公特命就學果知向方豹以革而有文鴻亦漸而無咎公又嘉其遷善以從道而名焉仍命字之云在復之六四曰中行獨復以從道也言能體中而行特從於道以斯而復君子之象請字曰復之庶左右於名矣然則道者何率性之謂也從者何由道之謂也臣則由乎子忠則由乎孝行巳由乎禮制事由乎義保民由乎信待物由乎仁此道之端也子將從之乎然後可以言國可以言家可以言民可以言物豈不大哉􅀂乃誠而明之中而和之揖讓乎聖賢蟠極乎天地此道之致也必大成於心而後可言焉朱生其拜公之命勉之哉抑文與學者道之器也以君子乗之則積而不敗不以君子乘之則滿而致覆朱生其拜公之命愼之哉嘻子未預於教也弗學而志窮如玉之未攻如泉之在􅀩昧焉而弗見其寳汨焉而莫朝于宗子旣預於教也克學而神晤如金之在鑄如􅂹之方御躍焉可成乎美器騰焉可致乎夷路者也某觀士人中有青衿詩書素髪畎畆名不登縉紳之議目弗接軒冕之姿彼何不遇之甚哉朱生進德有漸屬文未幾始登庠序之列廼被巖廊之知此何遇之甚哉繄爾門之濟美歟抑我公之善教歟論者曰公之㫖也豈徒正爾之名蓋將成爾之德激清學校騰休都邑俾夫多士聳善庶􅀖成流格美俗於詩書􅀍頌聲於金石致我宋之文炳焉復三代之英抑公之盛德乎朱生振迹於盛德之下􅀤名於善教之始何必申繻之劇論豈異夫子之榮褒者哉當夙夜懷之不墜我公之令訓也其庶幾乎太清宫九詠序譙有老子廟唐爲太清宮地靈物竒觀者駭異歷代嚴護景槩所存􅀂靈溪渦河九龍井左細再生昇天檜皆附于圖籍發乎詠歌而風人之才難其破的余友曼卿將命斯來實董宮事􅄝道之外樂乎聲詩覽靈仙之區異其八物益以宮題而成九詠觀其立意皆鑿幽索秘破堅發竒高凌虹蜺清出金石有以見詩力之雄哉文以氣爲主此其辨乎矧夫人託文而志深物乗文而名逺如楊子雲之綿竹王文孝之靈光孫興公之天台皆揮藻一時騰照千載者矣􅐵彼物也庇聖賢之居而能長乆後果動君子之風雅以􅀤乎名矧人也庇聖賢之道則能高明果亦動天下之頌聲以揚其烈覽之者得無起歟高平范仲淹序朝賢送定惠大師詩序某典姑蘇郡一日有吳僧定惠大師宗秀者發龍山渡松江駐錫于門岀致政侍郎安定公本道計使太原公二書偕曰師徃無他有朝中送行詩請爲序引以示方來爾某旣不得謝乃叩其端師自言生不血茹七歲持佛事隱于靈巖多歷年所晚歲游名公之門然亦未甞及利天聖中大丞相東平公清河公憐其舊奏賜紫方􅂁號定惠乃告歸故山又以詩寵之旣而薦紳先生咸有贈章將勒堅珉期於不墜某感其說志其事且知上人之隱盛於吾儒之隱遠矣士有氣呑芝蘭才奔風雲精貫乎天人神馳於古今燭治亂興亡之機席法度教化之倫道通巖廊跡墜林壑遺沒於麋鹿之羣者衆矣如近代之陸􅀛蒙陳陶今朝雍丘邢敦錢唐林逋或執節堅介或放詞雅遠皆四方之聞人奈何道未信於三公名不熟於天子及其收遺文旌隱志而始惜其難得斯天下義士爲之長太息矣豈如金僊之流而人懷慕謝絶堂搆長揖軒冕來則談空實相號天人師去則指霞嶺嘯風林天子有賜三公有贈斯以見上人之隱盛於吾人之隱遠矣必也均是光輝以及考槃之際則聖朝無􅀒於隱君子也矧將有取焉子夏曰主文而譎諫蓋風人之職也序詩者敢有二事時景祐二年五月八日尚書貟外郎􅂶天章閣待制范某序太子賔客謝公夢讀史詩序公清淨而文出入朝廷三十年語黙仁義進止於青雲之衢徐徐如也自尚書郎領侍御史知雜事日轉戰于寵辱之場者或勝而夸或殆而悲乃嘆曰吾病矣不敢進寸而退尺求爲會稽郡及還又請知西臺因分務於洛下朝廷高其意累遷至東宮三品悉屏去外慮於筆硯歌詩素所耽􅄝亦不復爲曰方逸我以老也數年間惟日看舊史一編以代賔話爾無何先徹樂之前一日因寢覺記夢中所得詩一章召其孫景初録焉他日士大夫求觀之仰其風㫖識者謂人之將終神鮮不睽公於是時乃有正夢特歌周孔之仁義能乆澤於吾民以公生平之心蹈於斯誠於斯故精義存存著於神明而不亂矣今而後知傅說騎箕尾而爲星者至精之適亦何怪哉其詩曰百年竒特幾張􅁓千古英雄一窖塵惟有炳然周孔教至今仁義浸生民刻唐祖先生墓誌於賀監祠堂序某自丹陽移領會稽首途之日過邵餗逸人溪齋因話照湖事逸人曰客有自江夏􅀉唐人許􅂦所撰祖先生墓誌頗言賀監之異出而示予辭精理遠徐常侍鉉爲之别序旣抵郡訪天長觀即賀公之舊居也歎其眞堂卑陋以甚乃命工度材而新之又刻徐公所序之文以廣遊人之觀采焉時寳元元年知越州范某序述夢詩序景祐戊寅歲某自鄱陽移領丹徒郡暇日遊甘露寺謁唐相李衛公眞堂其制隘陋乃遷於南樓刻公本傳于其側又得集賢錢綺翁書云我從父漢東公甞求衛公之文于四方得集外詩賦雜著共成一編目云一品拾遺衛公有一品集姑臧集西南備邉録獻替録御臣要略伐叛志窮愁志其間有浙西述夢詩四十韻時元微之在浙東劉夢得在歷陽並屬和焉愛其雄富藏之禇中二十年矣願刻石以期不泯某觀三君子之詩嗟其才大名高俱見咎於當世李遇武宗獨立不懼經制四方有相之功雖姦黨營䧟而義不朽矣元􅀄以才進拜拾遺歷御史府無所畏避爲執政所困者乆之及天子召用書詔雅遠甚有􅀘益之風至於與晉公相失而姦人乘之謂元欲刺裴劔則無狀然一戾正人其光墜地惜哉劉與柳宗元吕温數人坐王叔文黨貶廢不用覽數君子之述而禮意精宻渉道非淺如叔文狂甚義必不交叔文以藝進東宮人望素輕然傳稱知書好論理道爲太子所信順宗卽位遂見用引禹錫等決事禁中及議罷中人兵權牾俱文珍軰又絕韋臯私請欲斬劉闢其意非忠乎臯銜之會順宗病篤臯揣太子意請監國而誅叔文憲宗納臯之謀而行内禪故當朝左右謂之黨人者豈復見雪唐書蕪駮因其成敗而書之無所裁正孟子曰盡信書不如無書吾聞夫子褒貶不以一庇而廢人之業也因刻三君子之詩而傷焉至於柳吕文章皆非常之士亦不幸之甚也韓退之欲作唐之一經誅姦䛕於旣死􅀤濳德之幽光豈有意於諸君子乎故書之尹師魯河南集序予觀堯典舜歌而下文章之作醇醨迭變代無窮乎惟抑末揚本去鄭復雅左右聖人之道者難之近則唐正元元和之間韓退之主盟于文而古道最盛懿僖以降寢及五代其體薄弱皇朝柳仲􅂗起而麾之髦俊率從焉仲􅂗門人能師經探道有文於天下者多矣洎揚大年以應用之才獨歩當世學者刻辭鏤意有希髣髴未暇及古也其間甚者專事藻飾破碎大雅反謂古道不適於用廢而弗學者乆之洛陽尹師魯少有高識不逐時軰從穆伯長游力爲古文而師魯深於春秋故其文謹嚴辭約而理精章奏䟽議大見風采士林方聳慕焉遽得歐陽永叔從而大振之由是天下之文一變而其深有功於道歟師魯天聖二年登進士第後中㧞萃科從事于西都時洛守王文正沂公曁王文康公並加禮遇遂引薦於朝寘之文館㝷以論事切直貶監郢州市征後起爲陜西經略判官屢更邉任遷起居舎人直龍圖閣知潞州以前守平涼日貸公食錢于將佐議者不以情復貶漢東節度副使歲餘監均州市征予方守南陽郡一旦師魯􅞿疾而來相見累日無一言及後事家人問之不荅予即吿之曰師魯之行將與韓公稚圭歐陽永叔述之以貽後代君家雖貧共當捐俸以資之君其端心靖神無或後憂師魯舉手曰公言盡矣我不復云翌日徃視之不􅀗見傳言曰巳别矣遂隱机而卒故人諸生聚而泣之且歎其精明如是剛決如是死生不能亂其心可不謂正乎死而不失其正君子何少哉師魯之才之行與其履歷則有永叔爲之墓銘稚圭爲之墓表此不備載噫師魯有心於時而多難不壽所爲文章亦未甞編次惟先傳於人者索而􅀋之成十卷亦足見其志也故序之唐異詩序皇宋處士唐異字子正人之秀也之才之藝揭乎清名西京故留臺李公建中時謂善畫爲士大夫之所尚而子正之筆實左右焉江東林君復神於墨妙一見而歎曰唐公之筆老而彌壯東宫故諭德崔公遵度時謂善琴爲士大夫之所重而子正之音甞唱和焉高平范仲淹師其絃歌甞貽之書曰崔公旣没琴不在兹乎處士二妙之外􅄝於風雅探幽索竒不知其老之將至一日以集相示俾爲序焉嘻詩之爲意也範圍乎一氣岀入乎萬物卷舒變化其體甚大故夫喜焉如春悲焉如秋徘徊如雲崢嶸如山高乎如日星遠乎如神仙森如武庫鏘如樂府羽翰乎教化之聲獻酬乎仁義之醇上以德於君下以風於民不然何以動天地而感􅀑神哉而詩家者流厥情非一失志之人其辭苦得意之人其辭逸樂天之人其辭逹覯閔之人其辭怒如孟東野之清苦薛許昌之英逸白樂天之明逹羅江東之憤怒此皆與時消息不失其正者也五代以還斯文大剥悲哀爲主風流不歸皇朝龍興頌聲來復大雅君子當抗心於三代然九州之廣庠序未振四始之奥講議蓋寡其或不知而作影響前輩因人之尚忘巳之實吟詠性情而不顧其分風賦比興而不觀其時故有非窮途而悲非亂世而怨華車有寒苦之述白社爲驕奢之語學歩不至效顰則多以至靡靡增華愔愔相濫仰不主乎規諫俯不主乎勸誡抱鄭衛之奏責夔曠之賞游西北之流望江海之宗者有矣觀乎處士之作也孑然弗倫洗然無塵意必以淳語必以眞樂則歌之憂則懷之無虚美無苟怨隱居求志多優游之詠天下有道無憤惋之作騒雅之際此無愧焉覽之者有以知詩道之艱國風之正也時天聖四年五月日序四德說易有說卦所以明其象而示其教也卦有四德曰元亨利貞雖文言具載其端後之學者或未暢其義故愚遠取諸天近取諸物復廣其說焉夫元者何也道之純者也於乾爲資始於坤爲發生於人爲温良爲樂善爲好生於國爲行慶爲刑措於家爲父慈爲子孝爲嘉穀爲四靈其迹異其道同綂而言之則善之長也夫亨者何也道之通者也於天爲三辰昭會於地爲萬物繁殖於人爲得時茂勲於國爲聖賢相遇爲朝覲會同爲制禮作樂爲上下交泰於家爲父子爲夫婦爲九族相睦於物爲雲龍爲風虎爲魚水其迹異其道同綂而言之則嘉之會也夫利者何也道之用者也於天爲膏雨於地爲百川於人爲兼濟於國爲惠民爲日中市於家爲豐財爲富其鄰於物爲騶虞爲得食雞其迹異其道同綂而言之義之和也夫貞者何也道之守者也於天爲行徤於地爲厚載於人爲正直爲忠毅於國爲典則爲權衡於家爲男女正位爲長子主器於物爲金玉爲獬豸其迹異其道同綂而言之則道之幹也行此四者之謂道述此四者之謂教四者之用天所不能違而況於人乎況於萬物乎故君子不去也天㣲四德天道不行地微四德坤儀不行人㣲四德則無令名國家無四德則風教不倫物無四德則祥瑞不生惟乾坤之德綂其四者焉餘卦則鮮克備矣惟聖人體乾而行後之希聖者亦鮮克備矣尭舜率天下以仁乾元之君也湯武應天順人開國除亂履其亨而闡其利者也夏禹治水乾之成功幹其事者也體其元而兼其三者堯舜也歟後之人孰能生知宜乎􅉥踵而勤行矣處必親仁元之基也動能俟時亨之始也進思濟物利之方也守誠不囘貞之道也四者未能兼行則出乎彼而入乎此出乎此而入乎彼周旋進退不離四者之中如是則其殆庶幾乎說春秋序聖人之爲春秋也因東魯之文追西周之制褒貶大舉賞罰盡在謹聖帝明皇之法峻亂臣賊子之防其間華衮貽榮蕭斧示辱一字之下百王不刋游夏旣無􅀘於前公榖蓋有失於後雖丘明之傳頗多氷釋而素王之言尚或天遠不講不議其無津涯今褒博者流咸志於道以天命之正性脩王佐之異材不深春秋吾未信也三傳房君有元凱之癖兼仲舒之學丈席之際精義入神吾軰方扣聖門宜循師道碎屬詞比事之教洞尊王黜覇之經由此登太山而知高入宗廟而見美升堂覩奥必有人焉君子哉無廢范文正公集卷第六
