  text: 范文正公集卷第四
  hash: sha256:61b0dfd623278008527d56e11886a2179fc8b8477a460c4c5d86c99ef425edb1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_004-1a}
body:
  text: 後學時兆文校正後學黄􅁎水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校律詩依韻酬章推官見贈姑蘇從古號繁華却戀巖邊與水涯重入白雲㝷釣瀬更隨明月宿詩家山人驚戴烏紗岀溪女笑隈紅杏􅃒來早又抛泉石去茫茫榮利一吁嗟蘇州十詠泰伯廟至德本無名宣尼一此評能􅀅天下讓知有聖人生南國奔方逺西山道始亨英靈豈不在千古碧江橫木蘭堂堂上列歌鍾多慙不如古却羡木蘭花曾見霓裳舞白樂天爲蘇州刺史嘗教此舞洞庭山吳山無此秀乘暇一遊之萬頃湖光裏千家橘熟時平看月上早逺覺鳥歸遟近古誰眞賞白雲應得知虎丘山昔見虎耽耽今爲佛子巖雲寒不岀寺劒靜朱離潭幽歩蘿垂徑高禪雪閉庵吳都十萬戶煙瓦亘西南閶門吳門聳閶闔迎送毎躋攀一水帝鄉路片雲師子山落鴻漁釣外斜柳别離間白傅歸休處盤􅁊幾厚顔靈巖寺吳王之離宫也下臨太湖古來興廢一愁人白髮僧歸掩寺門越相煙波空去鴈吳王宫闕半啼猿春風似舊花猶笑徃事多遺石不言唯有延陵逃遁去清名高節老乾坤太湖有浪即山高無風還練靜秋宵誰與期月華三萬頃伍相廟胥也應無憾至哉忠孝門生能酬楚怨死可報吳恩直氣海濤在片心江月存悠悠當日者千載秪慙魂觀風樓髙􅎹郡西城觀風不浪名山川千里色語笑萬家聲碧寺煙中靜紅橋柳際明登臨豈劉白滿目見詩情南園西施臺下見名園百草千花特地繁欲問吳王當日事後來桃李􅀂爲言依韻奉酬晏尚書見􅀉徽音來景亳盛事聳吳鄕上􅁚三台照髙文五色章純如登樂府淵􅀂測天潢寒谷春重煦幽宫草特芳感知心似血思報􅁂成霜新定慙無惠姑蘇惜未康堯湯餘水旱劉白舊風光北闕雲霓逺南園橘柚荒願聞歌畫一敢議賦長楊碌碌嘲須觧循循教弗忘跡甘榮路外情寄聖門傍幾託爲魚夢江湖尚渺茫又用前韻謝晏尚書以近著示及祖述賢人業何因降玄鄕周公舊才美夫子近文章逸氣彌衝斗雄源甚决潢月中靈桂老春外寳芝芳逺似天無翳清如塞有霜日星圖舜禹金石頌成康謂眞廟神御頌也渦曲風騷盛謂㳺渦之作也營丘學校光謂青社州學記也至精含變化大手鑿洪荒崧嶽詞欺甫甘泉價掩楊滿朝當諷誦終古豈遺忘恍􅀂探龍際森疑履虎傍半生㳺此道觀海特茫茫陳質殿丞挽歌詞賢者逝如斯皇天豈易知衆人皆墮淚君子欲安碑幾世傳清白滿鄉稱孝慈賢哉生令嗣遺秀在蘭芝送僧文光一品山前識迢迢三十春多慙􅀞㦸裏重見白雲人依韻酬府判龎醇之見􅀉二十年前巳定交而今鵬鷃各逍遥但能賈傅親前席何必蕭生意本朝直節羡君如指佞􅀌根憐我異凌霄凌霄花名生且有託莫將富貴移平昔彼此清心髪半凋依韻酬吳安道學士見􅀉聖君賢相正彌綸諌諍臣微敢狥身但得葵心長向日何妨駑足未離塵豈辭雲水三千里猶濟瘡痍十萬民宴坐黃堂愧無限隴頭元是帶經人依韻酬吳春卿二首來章有鶴羸松冷之句因以松鶴命題以荅之鶴華亭􅀌立病時身終日徘徊尚海濵露掌思高還警夜芝田音斷欲傷春千年靈氣何求藥八變竒姿巳過人莫猒在隂猶寡和九臯非晚見精神松亭亭百尺棟梁身寂寞雲根與澗濵寒冐雪霜寧是病靜期風月不須春蕭蕭逺韻和於樂密密清隂意在人髙節直心時勿伐千秋爲石廼知神應制賞花釣魚萬彚嘉亨日皇心豫宴辰華林新濯雨靈沼正涵春帝幄紛仙蘤天鈎擲錦鱗洋洋頒睿唱􅆳頌浹簮紳過餘杭白塔寺登臨江上寺遷客特依依逺水欲無際􅀌舟曾未歸亂峯藏好處幽鷺得閑飛多少天眞趣遥心結翠微西湖筵上贈胡侍郎官秩文昌貴功名信史褒朝廷三老重鄉黨二踈髙涯業盡圖籍子孫皆俊髦西湖天下絶今日盛遊遨江城對月南國風波逺東門冠蓋囘多情是明月相逐過江來送向綜國博通判桂州通籍三公後監州五嶺深欲知明主意將慰逺人心歳計多藏藥舟行不廢琴歸書清白最寧問橐中金芝山寺樓殿冠崔嵬靈芝安在哉雲飛過江去花落入城來得食鵶朝聚聞經虎夜囘偶臨西閣望五老夕陽開昇上人碧雲軒愛此詩家好幽軒絶世紛澄宵半床月淡曉數峯雲逺意經年就微今並舎聞只應虗靜處所得自蘭芬郡齋即事三出專城􅁂似絲齋中蕭洒勝禪師近踈歌酒縁多病不􅀒雲山頼有詩半雨黃花秋賞徤一江明月夜歸遲世間榮辱何須道塞上衰翁也自知同年魏介之會上作寒苦同登甲乙科天涯相對合如何心存闕下還憂畏身在樽前且笑歌閑上碧江游􅀞鷁醉留紅䄂舞鳴鼉與君今日眞良㑹自信麤官樂事多依韻酬黃灝秀才再貶鄱川信不才子䂓相愛勸歸來客心但感江山􅂇天意難期日月廻白雪􅀌琴彌冷淡浮雲􅀟闕自崔嵬南方歳晏猶能樂醉盡黃花見早梅贈鍾道士曾舉進士人間無復動機心掛了儒冠歲巳深惟有詩家風味在一壇松月伴秋吟道士程用之爲余傳神因題貌古神踈􅀞本難因師心妙發毫端無功可上凌煙閣留取雲山靜處看送魏介之江西提􅀧旌旗如火浪如鷗一路春城次第遊江上髙樓欲千尺便從今日望歸舟遊廬山作五老閑遊􅀝舳艫碧梯嵐逕好程途雲開瀑影千門掛雨過松黃十里鋪客愛徃來何所得僧言榮辱此間無從今愈識逍遥㫖一聽升沉造化鑪瀑布逈與衆流異發源髙更􅀌下山猶直在到海得清無􅀔闘蛟龍惡聲吹雨雹麤晚來雲一色詩句自成圗贈廣宣太師憶昔同遊紫閣雲别來三十二迴春白頭相見􅀟林下猶是清朝未退人移丹陽郡先遊茅山作丹陽太守意何如先謁􅈋卿始下車展節事君三黜後收心奉道五旬初偶㝷靈草逢芝圃欲叩眞關借玉書不更從人問通塞天教吏隱接山居贈茅山張道者有客平生愛白雲無端年老尚紅塵只應金簡名猶在得見仙巖種玉人京口即事突兀立􅀌城詩中别有情地深江底過日大海心生甘露樓臺古金山氣象清六朝人薄命不見此昇平懐慶朔堂慶朔堂前花自栽便移官去未曾開年年憶着成離恨只託春風管句來依韻酬葉道卿中秋對月二首天遣今宵無寸雲故開秋碧掛冰輪詩人不悔衣霑露爲惜清光豈易親􅀌光千里與君逢㝡愛無雲四望通處處樓臺競歌宴的能愛月幾人同贈葉少卿退也天之道東南事了人風波抛舊路花月伴閑身湖外扁舟逺門中駟馬新心從今日泰家似昔時貧見子登西掖携孫過北鄰白雲髙閣曙渌水後池春樽酒呼前輩鑪香叩上眞只應隂德在八十富精神依韻荅梁堅運判見􅀉蔽野旌旗色滿山笳吹聲功名早晚就裴度亦書生城大順􅅆道中作三月二十七羗山始見花將軍了邊事春老未還家依韻和延安龎龍圗柳湖種柳穿湖後延安盛可遊逺懐忘澤國眞賞即瀛洲江景來秦塞風情屬􅁃樓劉琨增坐嘯王粲斗銷憂秀發千絲墮光揺匹練柔􅀟􅀟􅃋乳鷰兩兩睡馴鷗折翠贈歸客濯清招隱流宴囘銀燭夜吟度玉關秋勝處千塲醉勞生萬事浮王公多雅故某與龍圖公同年復爲延安交政思去共仙舟和延安龎龍圗寄岳陽滕同年優游滕太守郡枕洞庭邊幾處雲藏寺千家月在船踈鴻秋浦外長笛晚樓前旋撥醅頭酒新炰縮項鯿䆠情須淡薄詩意定連綿逈是偷安地仍當飽事年只應天下樂無岀日高眠豈信憂邊處胡兵隔一川時宣撫岢嵐軍與張燾太博行忻代間因話江山作數年風土塞門行􅀃着江山意暫清求取罷兵南國去滿樓蒼翠是平生過長安醉别資政鄭侍郎鄕關交復親把酒且逡廵共上靑雲路相看白髪人有爲須報國無事即頥神故素幾云在風音莫猒頻依韻酬光化李簡夫屯田老來難得舊交遊莫歎樽前兩􅁂秋少日苦辛名共立晚年恬退語相投龔黃政事聊牽强元白鄰封且唱酬附郭田園能置否與君乘徤早歸休依韻酬太傅張相公見贈出處曾無致主功南陽爲守地猶雄醉醒徃日慙漁父得失今朝賀塞翁七里河邊歸帶月百花洲上嘯生風卧龍鄕曲多賢逹願預逍遥九老中依韻酬益利鈐轄馬端左藏濫登清顯遇公朝豈有才謀可致堯拙守自慙成木强䆠游誰歎僅蓬飄醉來多謝提壼勸歸去寧煩杜宇招好樂當年開囗笑此心無事愧重霄依韻酬邠州通判王稷太博南􅃎日日接英標公外追随豈待招惡勸酒時圗共醉痛贏棊處肯相饒一抛言笑如何遣頻得音書似不遥獨上西樓爲君久滿城明月會雲銷依韻酬李光化見􅀉南陽偃息飬衰顔天暖風和近楚關欲少禍時當止足得無權處始安閑心憐好鳥來幽院目送㣲雲過别山此景此情聊自慰是非何極任循環􅀉安素高處士吏隱南陽味日新幕中文雅盡嘉賔滿軒明月清譚夜共憶詩書萬卷人酬李光化見􅀉二首交親莫笑出麾頻不任纎機只任眞逺護玉關猶竭力入陪金鉉敢周身素心直擬圭無玷晚節當如竹有筠道本逍遥惟所適吾生何用蠖求伸萬里承平堯舜風史君尺素本空空庭中無事吏歸早野外有歌民意豐石􅂦闘茶浮乳白海螺行酒灎上聲波紅宴堂未盡嘉賔興移下秋光月色中依韻酬李光化叙懐列宿專城且自娛清名善㝡即前塗江山樂國誠難㑹風月詩家的不辜未必晩成輸早逹好將高笑代長吁公餘更勵經􅀖業思爲清朝賛禹謨和李光化秋詠四首曉牆外轆轤響樓前江漢欹曙光和月色猶記早朝時晝日色清如照前林葉未零海東新隼至一􅀧在青㝠晚晚色動邊思去年猶未歸戍樓人巳冷目斷望征衣夜春色人皆醉秋光獨不眠君看明月下何似落花前送黃灝貟三十餘年交舊心相逢郍復議升沉卑飛塵土味誠薄逹䆠風波憂更深自古榮華渾一夢即時歡笑敵千金追陪未久還離索早晚軒車重見㝷和并州大資政鄭侍郎秋晩書事太原兵重壓强胡莫對秋風憶鱠鱸萬里天聲揚紫塞十年人望在黃樞定應松栢心無改自信雲龍道不􅀌應笑病夫何所補獨能安坐飬桑榆和提刑趙學士探梅三絶蕭條臈後復春前雪壓霜欺未放妍昨日􅀝欄枝上看似留芳意入新年靜映寒林晚未芳人人欲看壽陽粧玉顔須傍韶春笑莫􅋐嚴風與惡霜百花爭早孰過梅天與芳時豈待催莫惜黃金置清賞隔年春色爲君開和太傅鄧公歸遊武當􅀉三提相印代天工鄧國歸來耀本封此日神仙丁令鶴幾年霖雨武侯龍酬恩定得祠黃石談道須期㑹赤松莫慮故鄉陵谷變武當依舊碧重重即席呈太傅相公鳯池三入冠台􅄤致了昇平一品閑白傅歌詩傳海外􅀳公桃李滿人間上都雲逺經時别故國春濃幾度還太史占天應有奏壽星光彩近南山紀送太傅相公歸闕搢紳誰敢望差肩獨向昌期協半千首會雲龍㳺少海親扶日月上中天碧油兩就元戎鎮黃閣三提􅃁宰權坐致唐虞成大化退居師傅飬高年閑披丹訣開鑪竈醉度清歌被管絃同牓幾人登將相滿朝今日羡神仙松楸薙草思純孝里巷揮金過昔賢歸赴誕辰知兊􅀃輕安拜舞夀觴前依韻和提刑張太傅􅀉梅數枝梅􅀉寂寥人多謝韶華次第均穰下此花留未發待君同賞後池春又和賞梅故人爲使富天才相與抽毫賦早梅氣豔未勞横玉笛風光先合倒金罍隴頭欲􅀉交情逺林下初逢病眼開必􅀂和羮有遺味花王應亦命公台依韻荅王源叔憶百花洲見􅀉芳洲名冠古南都㝡惜塵埃一􅀧無樓閣春深來海鷰池塘人靜下仙鳬花情柳意慿誰問月彩波光豈易圗漢上山公發新詠許昌何必詫申湖申或作西獻百花洲圗上陳州晏相公穰下勝遊少此洲聊入詩百花爭窈窕一水自漣漪潔白憐翹鷺優游羡戲􅀛䦨干紅屈曲亭宇碧參差倒影澄波底横煙落照時月明魚競躍春靜柳閑垂萬竹排霜仗千荷卷翠旗菊分潭上近菊花潭在郡之西郊因有菊門復有菊潭鎮近取菊植于洲中洲有高䑓遂命之曰菊䑓梅比漢南遲京洛而南至鄧始有梅焉梅比襄陽又晚一月岸鵲依人喜汀鷗不我疑綵絲穿石節襄鄧間舊俗正月二十二日士女㳺河取小石通中者用綵絲穿之帶以爲祥羅襪踏青期素髪頻來醉滄浪減去思歩隨芳草逺歌逐􅀞船移繪寫求真賞緘藏獻巳知相君那肯愛家有鳳皇池依韻荅青州富資政見􅀉樞府當年日賛襄隱然一柱在明堂親逢英主開前席力與皇家正舊章直道豈求安富貴純誠惟欲􅂇清光龔黃政事追千載齊魯風謡及萬箱偉望能令中國重竒謀曾壓北方强故人待看調元後乞取優㳺老洛陽依韻荅并州鄭大資見􅀉節制重并汾淹留又見春年髙成國老道在樂天真風韻應如舊精明逈絶倫致君心未展寧是式㣲人過陳州上晏相公曩由清舉玉宸知今覺光榮冠一時曾入黃扉陪國論重求絳帳就師資談文講道渾無倦飬浩存眞絶不衰獨媿鑄顔恩未報捧觴爲夀獻聲詩和運使舎人觀潮何處潮偏盛錢唐無與儔誰能問天意獨此見濤頭海浦吞來盡江城打欲浮􅀔雄驅島嶼聲怒戰貔貅萬疊雲纔起千㝷練不收長風方破浪一氣自橫秋高岸驚先裂羣源怯倒流騰凌大鯤化浩蕩六鼇遊北客觀猶懼吳兒弄弗憂子胥忠義者無覆巨川舟又把酒問東溟潮從何代生寧非天吐納長逐月虧盈􅁀怒中秋􅀔雄豪半夜聲堂堂雲陣合屹屹雪山行海面雷霆聚江心瀑布橫巨防連地震群檝望風迎踊若蛟龍􅋐奔如雨雹驚來知千古信􅅆見百川平破浪功難敵驅山力可并伍胥神不泯慿此發威名依韻和蘇州蔣密學餘杭偶得借麾來山態雲情病眼開此藥無涯誰可共詩仙今日在蘇臺白樂天謂韋蘇州爲詩仙依韻和蘇之翰對雪江干徃徃臘不雪今喜紛紛纔孟冬廼知王澤寖及逺益明天意先在農有年預可慰四海大瑞且當聞九重况此湖山滿清思與君交唱􅀂爲慵依韻和并州鄭宣徽見􅀉二首錢唐作守不爲輕况是全家住翠屏名品久參卿士月部封全屬斗牛星仁君未報頭先白故老相看眼倍青㝡愛湖山清絶處晚來雲破􅀨初停又西湖載客恣㳺從湖上參差半佛宫廻顧􅂩駒曾不息沉思樽酒可教空層臺累榭皆清曠萬戸千門盡鬱葱向此行春無限樂却慙何道繼文翁依韻荅蔣密學見􅀉東南爲守慰衰顔憂事渾祛樂事還鼓吹夜歸湖上月樓臺晴望海中山􅁬飛毎羡􅄀鴻逺馳騁那慙老驥閑此日共君方偃息是非榮辱任循環依韻和同年朱兵部王賔客交贈之什鶴禁蘭宮逹了身高居南闕重爲隣西園冠蓋時時會北海樽罍日日親共棄榮華抛世態同歸清靜復天真一如劉白東都下更得裴公作主人登表海樓一帶林巒秀復竒毎來凭檻即開眉好山深會詩人意留得夕陽無限時石子澗二首鑿開竒勝翠㣲間車􅀐笙歌暮未還彦國才如謝安石他時即此是東山又飛泉落處滿潭雷一道蒼然石壁開故老相傳應可信此山雲出雨須夾依韻荅韓侍御雖叨世契與隣藩東道瞻風御史尊鄭館昔時延下客予執卷時即遊端公之門于家今日見高門端公之先君甞作金陵獄􅁺我居方面榮爲懼君向臺端直且温彼此中懷藴金石不須銷黯動離魂謝柳太愽惠鶴新詩遺鶴指真經對此仙標詎敢輕萬里華亭思去伴千年遼海識歸程鷄群與處曽非辱鵬路將翔孰謂榮獨愛九臯嘹唳好聲聲天地爲之清知府孫學士見示和終南監宫太保道懐五首因以綴篇玉皇近侍請修真賜得南山十里雲樽有聖賢聊自慰􅂦多龍虎復誰分謝家山色朝晡見陶隱松風窹􅄰聞萬物巳齊無一事獨醒惟笑衆醺醺其二要路抛來自寡尤高懐卷去白雲收玉縁祕寳須藏密蘭爲竒香却在幽仙骨豈曽移靜節帝心終是竭嘉猷紅霞緑竹忘機地未免天家下詔求其三漢陂高興自飄飄何必天台渡石橋潭上藥靈多餌菊林間詩逸半書蕉勤歌蘭珮招逋隱􅂴事塵纓逐宷僚客有赤松盟約在異時猿鶴不相遼其四瑶壇日月靜中長詩思時時逸謝塘神枕自成仙島夢朝衣猶有御爐香三元祕簡侵星奏五嶺靈芽待雪嘗金闕九重留不住高風何處是嚴光其五門外煙嵐紫閣横九衢風土更何情籬邊醉傲淵明飲隴上歌隨桀溺耕三樂放懷千古重萬鍾囬首一毫輕鵬鷦共適逍遥理誰復人間問不平贈方秀才楷髙尚繼先君嵓居與俗分有泉皆漱石無地不生雲隣里多垂釣兒孫半属文幽蘭在深處終日自清芬依韻和龎殿院見􅀉二首前集巳有一首吳門歉􅀊減繁華蕭索專城未足誇柳色向秋迎使舘水聲終夜救田車丘山在􅀒思朝􅀉毫髪經心愧道家不似桐廬人事少子陵臺畔樂無涯范文正公集卷第四
