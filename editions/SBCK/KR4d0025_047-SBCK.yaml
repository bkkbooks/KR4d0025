front:
  text: 諸賢論頌
  hash: sha256:9e35966c8793a4f0daa0ace703616271c6703e229548163e1b5bbd4738dacb9c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_047-1a}
body:
  text: 忠宣公謚議節文鄧忠臣議日每思􅂢身而進䇿嘗願休兵而息民祗知扶危而濟傾寜恤䟦前而疐後方䜛言亂國而明蔡􅃀之無實洎姦黨投石而謂大防之可原義形正色憤激至誠非特救當世正人端士之網羅直欲戒後世亂臣賊子之迷惑循公忘己爲國惜賢又曰父母之國有時而去股肱之義於是或虧放之江湖忽如草芬紉蘭澤畔更甚屈原之悲占鵬坐隅已分賈生之死又曰側席南望而抉浮雲之蔽趣節東歸而詠零雨之濛又曰法座想見其風采詔書相望於道塗云云論忠宣公有量程氏遺書子言范公堯夫之寛大也昔余遇成都公時攝帥有言公於朝者朝廷遣中使降香峨眉實察之也公一曰訪于欵語余問曰聞中使在此公何暇也公曰不爾則拘束巳而中使􅁀怒以鞭傷傳言者耳属官喜謂公曰此一事足以塞其謗請聞於朝公旣不折言者之爲非又不奏中使之禍也其有量如此論忠宣公分資䕃與進士事􅀛山語録科舉取人不得間有得者自是豪傑之士因科舉以進耳且資䕃得官與進士得官孰爲優劣以進士爲勝以資䕃爲慊者此自後世流俗之論至使人耻受其父祖之澤而甘心工無益之習以與􅀌寒之士角勝於塲屋僥倖一第以爲榮是何見識夫應舉亦自寒士無禄不得巳藉此進身耳如得巳何用應舉范堯夫最有見識然亦以資䕃與進士分優劣建言於有無出身人銜位上帶左右字不可謂無所蔽也其言曰欲使公卿家子弟讀書耳此意甚善但以應舉得官者爲讀書而加奨勸焉則彼讀書者應舉得官而止耳豈真學道之人至如韓持國自是經國之才用爲執政亦了得不可以其無出身便廢其執政之才曰堯夫所别異者莫非此等人否曰執政不是合下便做亦自小官以次遷之如後來吳坦求等在紹聖中􅀍駁了學士以無出身故也彼自布衣中朝廷以其學行賜之爵命至其宜爲博士乃復以爲無出身奪之此何理也資䕃進士中俱有人惟其人用之如一右字亦自沮人爲善論忠宣公以德報怨邵氏聞見録元符末呂惠卿罷延安帥陸師閔代之有訴惠卿多以人冐功賞者師閔以其事付有司未竟罷去曽布爲樞宻使素與惠卿有隙特自太原移德孺延安盖德孺於惠卿亦有隙也德孺至取其事自治有自皇城使追奪至小使臣者德孺由是大失邊將之心議者謂有詞於前政事已在有司德孺乃取以自治失矣德孺聦明過人而爲曽布所使惜哉未幾德孺亦以論役法罷如忠宣丞相則不然公帥慶陽時爲揔管种詁無故訟於朝上遣御史按治詁停任公亦罷帥至公爲樞宻副使詁尚停任復薦爲永興軍路鈴轄又薦知隰州公毎自咎曰先人與种氏上世有契義純仁不肖爲其子孫所訟寜論事之曲直哉嗚呼可謂以德報怨者以德孺之賢於是乎有愧於忠宣矣論李清臣邵氏聞見録紹聖􅀄􅈒宗親政用李清臣爲中書侍郎范丞相純仁與清臣論事不合范公求去帝不許范公堅辭帝不得巳除觀文殿大學士判頴昌府召章惇爲相未至清臣獨當中書益覬倖相位復行免役青苗法除諸常平使者惇至不能容以事中之清臣出知北京建中靖國􅀄上皇即位用韓忠彦爲相清臣爲門下侍郎同平章事忠彦與清臣有連故忠彦惟清臣之言是聽清臣復用事范右丞純禮忠彦所薦也清臣罷之劉安丗呂希純皆忠彦所重清臣不使入朝外除安世帥㝎武希純帥高陽張舜民忠彦薦爲諫議大夫清臣出之帥真定其所出與外除及不使入朝者皆賢士清臣素所憚不可得而用者忠彦懦甚不能爲之主曽布爲右相用范致虗諌䟽云河北三帥連衡恐非社稷之福劉安世呂希純同日報罷清臣亦爲布所䧟出知北京伯溫常論紹聖建中靖國之􅀄朝廷邪正治亂未定之際皆爲一李淸臣以私意幸相位壊之邪說旣勝衆小人並進而清臣自亦不能立於朝矣使清臣在紹聖􅀄同范丞相在建中靖國之􅀄同范右丞劉安世呂熈純張舜民以公議正論共濟國事則朝廷無後日之禍而清臣亦得相位享美名矣此忠臣義士惜一時治亂之機爲之流涕者也又論徽宗不及相忠宣云王偁臣偁曰元符末命欽聖定䇿以立徽宗起范純仁干謫中欲任以相事而純仁以病不能造朝烏乎純仁不得相徽宗干􅀄政此治亂之所以分也夫忠臣進則朝廷尊羣隂用則禍亂作徽宗旣巳悞矣於是改過不吝以彰信兆民遜位于子以克謹天戒雖二駕遂狩而大業復興有以也夫本傳賛臣偁曰純仁忠厚仁恕宰平天下不澄不撓人莫能窺其際而其愛君憂國之心凛然有仲淹之風噫使熈寜用其言則元祐無改更之患元祐行其說則紹聖無黨錮之禍孟子謂仲尼不爲巳甚者臣於純仁見之矣䟦文正公道服賛文與可希道比部借示文正詞筆觀之若侍其之左右令人旣喜而且凛然也熈寕壬子孟夏丙寅陵陽守居平雲閣題石室文同與可論忠宣公不當與安燾同除王巖􅅱王巖􅅱言伏覩畫黄除同知樞宻院安燾知樞宻院試吏部尚書范純仁同知樞宻院者臣謹按燾資材闒茸器識猥庸立朝以來無一長爲人所稱燾之不材舊位且非所據况可冠洪樞顓兵柄所有書命謹繳連封進其范純仁除命伏乞分爲别敕行下又言臣聞古人有言曰賞當賢則臣下親罰當罪則姦邪止陛下一日逐章惇於汝州可謂罰當罪矣一日擢范純仁爲執政可請賞當賢矣燾之進則未有所當此臣所以當力爲陛下言也又言陛下用范純仁雖驟何故無一人有言盖當賢也一進安燾則諫官御史交章論奏盖非公望所與也送范德孺知慶州黃魯直乃翁知國如知兵塞垣草木識威名敵人開戶玩䖏女掩耳不及驚雷霆平生端有活國計百不一試薶九京阿兄兩持慶州節十年騏驎地上行潭潭大度如卧虎邊頭耕桑長兒女折􅂨千里雖有餘論道經􅀖正要渠妙年岀補父兄處公自才力應時湏春風旍旗擁萬夫幕下諸將思草枯智名勇功不入眼可用折箠笞羗胡德孺五丈和之字詩韻難以愈工輙復和成可發一咲黃魯直且然聊爾耳得也自知之獨咲真成夢狂歌或似詩照灘禽郭索燒野得伊尼早晚來同醉僧窓卧虎皮次韻德孺新居病起黃魯直潭潭經畧府寂寂閉門居京洛聖賢澤江湖魚鼈瀦官如一夢􅁴話勝十年書積喜過從近扶笻不駕車次韻德孺惠貺秋字之句黃魯直少日才華接貴㳺老來忠義氣橫秋未應白髪如霜草不見丹砂似箭頭顧我今成䘮家狗期君早作濟川舟漢家宗廟英靈在㝎是寒儒浪自愁
