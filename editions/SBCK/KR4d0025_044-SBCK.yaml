seq: 44
front:
  text: 建立義莊規矩范忠宣公奏知開封府襄邑縣范純仁切念臣父仲淹先任資政殿學士日於蘇州吳長兩縣置田十餘頃其所得租米逺祖而下諸房宗族計其口數供給衣食及婚嫁䘮塟之用謂之義莊見於諸房選擇子弟一名管勾亦逐旋立㝎規矩令諸房遵守今諸房子弟有不遵規矩之人州縣既無勑條本家難爲伸理五七年間漸至廢壊遂使飢寒無依伏望朝廷特降指揮下蘇州應係諸房子弟有違犯規矩之人許令官司受理㐲候勑㫖右奉聖㫖宜令蘇州依所奏施行
  hash: sha256:7158ad8a0f0b4f221be32b0d860f7ce5cc3e84dc84dd7ccbc4f44da88792c46c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_044-1a}
body:
  text: 劄付蘇州准此治平元年四月十一日押文正位勘㑹先文正公於平江府興置義莊賙給宗族德澤至厚其始㝎規矩雖有版牓不足久傳及有治平元年所得朝㫖亦未掲示族人兼有後來接續指置可爲永式者未曽刋定深慮歳久漸至隳廢今盡以編􅀋刻石置于天平山白雲寺先公祠堂之側子子孫孫遵承勿替今具如後文正公􅀄定規矩一逐房計口給米每口一升並支白米如支糙米即臨時加折支糙米每斗折白八升逐月實支每口白米三斗一男女五歳以上入數一女使有兒女在家及十五年年五十􅀊以上聽給米一冬衣每口一疋十歲以下五歲以上各半疋一每房許給奴婢米一口即不支衣一有􅁻凶增減口數畫時上簿一逐房各置請米暦子一道每月末於掌管人處批請不得預先隔跨月分支請掌管人亦置簿拘轄簿頭録諸房口數爲額掌管人自行破用或探支與人許諸房􅁴察勒陪填一嫁女支錢三十貫七十七陌下並准此再嫁二十貫一娶婦支錢二十貫再娶不支一子弟岀官人每還家待闕守選丁憂或任川廣福建官留家鄉里者並依諸房例給米絹并􅁻凶錢數雖近官實有故留家者亦依此例支給一逐房䘮塟尊長有䘮先支一十貫至塟事又支一十五貫次長五貫塟事支十貫卑幼十九歳以下䘮塟通支七貫十五歲以下支三貫十歳以下支二貫七歳以下及婢僕皆不支一郷旦外姻親戚如貧窘中非次急難或遇年飢不能度日諸房同共相度詣實即於義田米内量行濟助一所管逐年米斛自皇祐二年十月支給逐月餱粮并冬衣絹約自皇祐三年以後每一年豐熟樁留二年之粮若遇凶荒除給餱粮外一切不支或二年粮外有餘却先支䘮塟次及嫁娶如更有餘方支冬衣或所餘不多即凶􅁻等事衆議分數均匀支給或又不給即先凶後吉或凶事同時即先尊口後卑口如尊卑又同即以所亡所塟先後支給如支上件餱粮􅁻凶事外更有餘羡數目不得粜貨椿充三年以上粮儲或慮陳損即至秋成日方得糶貨囘換新米椿管右仰諸房院依此同共遵守皇祐二年十月日資政殿學士尚書禮部侍郎知杭州事范押續㝎規矩一諸位子弟得大比試者每人支錢一十貫文七十七陌下皆准此再貢者減半並須實赴大比試乃給即巳給而無故不試者追納一諸位子弟縱人採取近墳竹木掌管人申官理㫁一諸位子弟内選曽得解或預貢有士行者二人充諸位教授月給糙米五石􅀂遇米價每石及一貫以上即每石即支銭一貫文雖不曽得觧預貢而文行爲衆所知者亦聽選仍諸位共議夲位無子弟入學者不得與議若生徒不及六人止給三石及八人給四石及十人全給諸房量力出銭以􅂇束脩者聽右三項以熈寕六年六月日二相公指揮修定一掌管人侵欺及諸位輙假貸義莊錢斛之􅀋並申官理㫁償納不得以月給米折除一族人不得租佃義田詐立名字同一掌管子弟若年終當年諸位月給米不闕支糙米二十石雖闕而能支及半年以上無侵􅀮者給一半巳上並令諸位保明後支若不可保明各具不可保明實狀申文正位一義莊勾當人催租米不足隨所欠分數尅除請受謂如欠米及一分即只支九分請受之􅀋至納米足日全給巳尅數更不支有情􅁦者申官决斷右四項以元豐六年七月十九日二相公指揮修定一身不在平江府者其米絹錢並勿給一兄弟同居雖衆其奴婢月米通不得累過五人謂如七人或八人同居止共支奴婢米五人之類一未娶不給奴婢米雖未娶而有女使生子在家及十五年年五十歳以上者自依規給米一義莊不得典買族人田土右四項以紹聖二年二月初八日二相公指揮修定一義莊費用雖闕不得取有利債􅀒一義莊事惟聽掌管人依規處置其族人雖是尊長不得侵擾干預違者許掌管人申官理斷即掌管人有欺􅁦者聽諸位具實狀同申文正位右三項以紹聖二年四月二十九日二相公指揮修定一義倉内族人不得占居會聚非出納勿開一因岀外住支月米者其歸在初五日以前取諸位保明詣實聽給當月米一義宅有踈漏惟聽居者自修完即拆移舎屋者禁之違者掌管人申官理㫁􅀂義宅地内自添修者聽之夲位實貧乏無力修完而屋舎踈漏實不可居者聽諸位同相視保明詣實申文正位量支銭完􅀘即不得乞添展舎屋一諸位請米曆子各令諸位簽字圓俻方許給給訖請人親書交領即去失曆子者住給勒令根㝷侯及一年許諸位及掌管人保明申文正位候得報别給曆頭起支一積留月米併請者勿給一諸位不得於規矩外妄乞特支雖得文正位指揮與支亦仰諸位及掌管人執守勿給一義莊人力船車噐用之􅀋諸位不得借用一諸位子弟官巳陞朝願不請米絹錢助贍衆者聽一諸位生男女限兩月其母或所生母姓氏及男女行第小名報義莊義莊限當日再取諸位保明訖註籍即過限不報後雖年長不理爲口數給米一遇有規矩所載不盡事理掌管人與諸位共議定保明同申文正位本位有妨嫌者不同申雖巳申而未得文正位報不得止憑諸位文字施行右十項以元符元年六月日二相公三右丞五侍郎指揮叅定一諸位関報義莊事雖尊長並於文書内著名仍不得竹􅁓及色牋違者義莊勿受右一項以元符二年正月十七日三右丞指揮修定一義莊遇有人贖田其價錢不得支費限當月内以元銭典買田土輙將他用勒掌管人償納右一項以崇寜五年十月十二日五侍郎指揮修定一諸位輙取外姓以爲巳子冐請月米者勿給許諸位覺察報義莊義莊不爲受理許諸位徑申文正位公議移文平江府理㫁其大觀元年七月以前巳收飬給米者不得追訟右以大觀元年七月􅀄十日五侍郎及二相公指揮叅定一諸位子弟在外不撿生子冐請月米掌管人及諸位覺察勿給即不伏掌管人及諸位申文正位移文平江府理斷右以政和三年正月二十一日五侍郎指揮修定一族人不得以義宅舎屋私相兊賃質當右一項以政和五年正月二十九日五侍郎指揮修定右仰義莊及諸位遵守施行内文意前後相妨窒礙者從後規若有違犯仰掌管人或諸位俻録治平元年中書劄子所坐聖旨申官理斷各令知委政和七年正月十三日朝散大夫充徽猷閣待制提舉亳州太清宮范續定規矩清憲公奏朝散郎左司諌兼侍講范之柔奏臣不避誅夷輙瀝誠悃仰干天聽伏念臣五世祖故參知政事謚文正臣仲淹奮身孤藐遭世休明􅀷念保族之難欲爲傳逺之計自慶曆皇祐以來節次於蘇州吳長兩縣置田畒立義莊贍同姓創定規矩刻之板牓以貽後人巳而臣高叔祖故尚書右㒒射謚忠宣臣純仁於治平元年知開封府裏邑縣日慮板牓不足乆傳且諸房子弟有不遵規矩之人州縣旣無勑條本家難爲伸理必將漸致廢壊即嘗具奏乞降聖旨下本州許令官司受理􅁇蒙朝廷依所奏施行遂得慿藉保守伏自南渡之後雖田畒僅存而莊宅焚毀􅀉廪墳寺遷寓民舎蠧􅁦百岀盡失初意慶元初臣與兄弟始協謀同力盡復故基漸還舊觀叅定約束加備於前固嘗經本州鏤給板牓掲示義宅然非更得朝廷行下本州申明受理元降指揮恐無以善後懐此日久無路自伸今臣幸􅀩公朝軫念故家擢綴班列若不於此時控告君父則何以副先人属望子孫之意用敢冐昧以聞伏望聖慈俯鑒㣲􅂨特頒睿旨劄下平江府令將續添規約常切照應治平元年巳降指揮受理庻幾足以􅃙厲來者増固舊規臣與闔族實均戴天地施生之造所有治平元年指揮并慶元二年續添條約謹􅌳連在前瀆犯宸嚴臣無任惶懼俯伏俟命之至謹録奏聞伏候勑㫖前連治平元年巳降規約指揮十一月五日奉聖旨依右併録連送范司諫嘉定三年十一月七日一文正公曾祖徐國公祖唐國公父周國公墳塋並在天平山坐落間有族人輙敢於上牧羊及偷斫林木柴薪近雖行下義莊專一責令墓客看守外今後如有違犯之人諸房覺察申文正位罰全房月米一年全房謂照本房請米曆内口數並行住罰下皆准此義莊輙令墓客充他役者罰掌莊子弟夲名月米一季一天平功德寺乃文正公奏請追福祖先之地爲子孫者所當相與扶持不廢香火今則不然多有踈逺不肖子弟請過義米歸巳却返􅅙食於寺中至有欺詐住持逼逐僧行猎借舟船役使人㒒亞托私酒偷伐林木柴薪强占常住田地布種或作園圃不還租米以致常住空虗住持數易日漸敗壊今後探聞有違犯之人罰全房月俸兩月欺詐住持及占種田地者罰全房月米一年詐過錢物經官乞行根䆒從條施行田地退還常住爲業畢日申文正位􅃸囘報起支雖巳退業而故作阻障不容常住耕種者亦行前罰一義莊及白雲功德寺差役并應干非泛科敷並蒙官司蠲免近夾縣道胥吏多因乞覔不從故意搔擾今後如有似此之人許從本家經府陳理嚴行㫁理一舊規諸房不得租種義莊田土詭名者同近來有恃强公然於租戶名下奪種者及有垻􅎄義莊田渭涇浜車漕種菱不容租戶車水上下者爲害甚大今後探聞有違犯之人罰全房月米半年一義莊租戶所當優䘏使之安業聞有無頼族人將物貨高價亞賣顯属不便今後輙有違犯罰全房月米兩月仍經官陳理一舊規義莊事務惟􅃪掌莊子弟自行處置雖是尊長不得侵擾干預縁違犯者未曽有罰是以近來多有族人專爲貨賂不顧義莊利害或爲􅄃戸兠納苗米必要多増貼耗或主張不逞之徒充應脚力及墓客之􅀋甚至鼓誘外郡族人挾長前來擅開倉厫妄用米斛恣行侵擾意在破壊今後如有違犯許掌莊指實申文正位自行體訪知覺罰全房月米一年外仍經官乞行根究徴治内有乞覔過錢物之人即合從條施行一舊規掌莊子弟侵欺徑行申官理㫁勒令陪塡近自移建倉宇遴選主計此􅁦稍革深慮日久玩習合行関諸房今後掌莊子弟如有違犯許諸房覺察申文正位委請公當子弟對衆􅀧筭取見實侵數目以全房月米塡還足日起支仍控告官府乞行徴治以爲掌莊侵欺者之戒諸房子弟即不得專擅興詞紊煩官府一諸房聞有不肖子弟因犯私罪􅃪贖者罰本名月米一年再犯者除籍永不支米姦盗賭􅐠闘毆陪渉及欺騙善良之􅀋􅀂戸門不測者非除籍之後長惡不悛爲宗族鄕黨善良之害者諸房具申文正位當斟酌情理控告官府乞與移鄕以爲子弟玷辱門戶者之戒一舊規諸位輙取異姓以爲巳子冐請月米者勿給今乃有將巳子與人破蕩他人家業却欲歸宗請米如有似此之人仰掌莊申文正位不得支行一義宅地基久爲外人占㨿今來復業甚爲艱難宜體文正公之意專爲聚族之地即不許族人占造私宅等用如有違罰全房月米一年仍勒還元地一舊規諸房子弟得貢大比者義莊支裹足銭十千今物價翔貴難拘此數如有子弟得觧赴省義莊支官㑹一伯千其銭於諸房月米内依時直均尅其免舉人及補入太學者支官㑹五十千庻使諸房子弟知讀書之美有以激勸一歳寒堂除科舉年分諸位子弟暫請􅀠業餘時不得於内飲宴安泊如違罰全房月米一月義莊規矩終
