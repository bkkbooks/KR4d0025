  text: 范文正公别集第一
  hash: sha256:4f1769647ff58dc20eff4f09cc074549d14ab7dcb2ccaa3bad4d1bef3003dfbc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_022-1a}
body:
  text: 後學時兆文校正後學黃􅁎水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校古詩􅀉石學士家有清白志所寳甑中塵休去無生涯老來猶苦辛一麾了婚嫁萬事蠹精神與君嘗大言定作青山隣蹭蹬未携手得無羞故人江樓􅀉希元上人淸言一以遥黙黙江樓上安得如白雲無心兩相忘酬和黃太博古籍東南美蔚蔚幙中議懿行希聖賢高文粲㳺賜伊余髪巳秃偶􅁇立朝士何以宣王政甘爲時所棄酌以廣州泉不易伯夷志直哉心如絃安慮道邊斃竊嘗力於古秉筆庶幾至孰爲未聞逹聊以道幽祕夫君鏘以名尤爲世之器贈我百餘言升堂出而示土木朽且陋黼黻謬增賁母塩煩刻畫返朴吾所愧華勛愛士心蓬壺延才地何人薦於子當彼得言位吐以胸中竒落落金玉繼九虗髙可㳺凌厲垂天翅吾將退而􅀮尚得榮其視􅅬子京以眞籙相示因以贈之泰山采芝人吏隱清淮濵金函祕寳籙奉之如高眞謂子有仙志興言一相示叩頭鳴天鼓玉書粲然異白雲引輕素朱絲聞靈篇題云天寳歳傳於任鳯仙兵火換九州于兹三百年非有靈物持此書安得全緑字起龍蛇丹文掛星斗六甲當奉行百神廼奔走宻宻天上語忽忽人間有與君置青山解冠松桂間服此上清籙上清庻可攀無爲塵土中草草凋朱顔送徐登山人重君愛詩書孜孜不知老白髪未理生惟談聖人道愛君妙山水所得是神氣尺素冩林巒邈有千里意今日江南行孤雲無繫程直指九華峰去掃先君塋却來華陽川與我溪上盟行歌紫芝秀坐嘯清風生練眞變金骨飄飄朝玉京結成物外㳺忘此天下情匣劒靈劒經年匣決雲誰爲高報人如有道何認問吹毛南園南園萬樹花極目春芳麗林下老成人相招植松桂行歌行歌春滿路坐歌春滿園花前人自樂桃李豈須言明月明月照前墀朱絃奏流水清風如未囘敢望無雲起南樓南樓百尺餘清夜㣲埃歇天會詩人情遺此高高月送陳􅅛秀才遊金陵君有江南行爲君歌以喜龍盤山萬曲練靜江千里江山不可空台星照吳中相國隴西公時鎮金陵古來主謝地今有周召風而間楊誥與鄭戬萬丈光相映煌煌聚宰府金陵一何盛此去知巳賢雅客情無􅁁白雲起江樹明月逐江舡雲月共徘徊優哉如逰仙歸來笑春風白日登青天過方處士舊隱某景祐􅀄典桐廬郡有七里瀬子陵之釣臺在而乃以從事章岷徃搆堂而祠之召㑹稽僧悅躬圗其像於堂洎移守姑蘇道出其下登臨徘徊見東嶽絶碧白雲徐生云方干處士之舊隱遂訪焉其家子孫尚多儒服有楷者新䇿名而歸因留一十八言又圖處士像於嚴堂之東壁楷請刋詩于其左詩見前集送歐伯起天與神交忽解携一溪風月更同誰自慙蕭洒如猿鶴却向周郎怨别離九日欲賦前賢九日詩茱茰相􅃲一枝枝可憐宋玉情無限爭似陶濳醉不知緑􅁂愛隨風景變黃華能與歳寒期登髙逈處狂多少笑殺襄陽拍手兒送虎丘長老暫向天台叅衆眞虎丘風月遠隨身瓊臺肯便長棲去無限人間未度人􅀉潤州龐籍北固高樓海氣寒史君應此凭欄干春山雨後青無限借與淮南洗眼看送湛公歸四明講席滿靣南風指四明山長水曲不勝情自言此去雲林下惟講華嚴報太平和龐醇之見􅀉北樓千尺午猶寒冉冉飛塵不可干横望滄􅈚了無際貴人休向􅀞圖看依韻和胡使君書事都督再臨横海鎭集仙遥輟内朝班清風又振東南美好夢多親咫尺顔坐嘯樓臺凌皓月行春鼓吹入青山太平天子尊􅂄舊八十王祥未賜閑贈吳秀才萬戸侯家幾葉孫弟兄紅斾獨烏巾携琴又入廬山去誰信朱門有逸人依韻和龐殿院見􅀉二十年前巳定交而今鵬鷃各逍遥但能賈傅親前席何必蕭生意本朝直節羡君如指佞􅀌根憐我異凌霄凌霄花名生且有托莫將富貴移平昔彼此清心髪半凋依韻和魏介之同逰玉仙壇雲壇共上百神清碧塢紅霞相照明幽草欲迷丹井處亂峯依舊白雲生亭亭翠纛高杉矗險險狂雷落石轟待得九霄鸞鶴馭玉書應改地仙名本傳云玉作遼地仙也依韻和介之未開菊本非桃李色佳節敢先開席上無言晚霜前幸未摧芳心應有待眞賞直須催願上金樽壽何傷蝶不來依韻酬池州錢綺翁天涯彼此勿冲冲内樂何須位更崇白髪監州身各徤青山遶郭景多同日高窓外眠方起月到樽前宴未終况在江南佳麗地重陽猶見牡丹紅鄱陽牡丹有四時開者􅀉題溪口廣慈院越中山水絶纎塵溪口風光歩歩新若得㑹稽藏拙去白雲深處亦行春范文正公别集卷第一
