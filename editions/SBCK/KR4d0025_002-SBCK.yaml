body:
  text: 古詩和人逰嵩山十二題公路澗曹公與袁紹常爭據此地嵩高發靈源北望洛陽注淸流引河漢白氣横雲霧英雄惜此地百萬曾相距近代無戰爭常人自來去拜馬澗子晉登仙遺馬於此鄉人見之皆拜傳聞王子仙澗邊遺一驥當時青雲路鷄犬亦可致未必眞龍媒悠悠在平地二室道太室何森聳少室欲飛動相對起雲霞恍如遊仙夢何以寵此行行歌降神頌自峻極中院歩登太室中峯白雲隨人來翩翩疾如馬洪崖與浮丘襟袂安足把不來峻極遊何能小天下玉女窻窈窕玉女窻想像玉女粧皎皎月爲鑑飄飄霓作裳莫學陽臺夢無端惑楚王玉女搗衣石但見嵓前砧誰聞月下杵金文與䥫色璨璨知千古試問搗衣仙何如補天女天門天門絕境遊熈然揖灝氣下顧莽蒼間雲雷走平地天威不遠人孰舊本作莫起欺天意天門泉天門有靈泉埃塵未甞至日月自高照雲霞亦輝庇惟抱夷齊心飲之可無愧天池岳頂見天池神異安可度勿謂無波濤雲雷有時惡乗此澄清間吾纓可以濯三醉石巍巍八仙壇上有三醉石憐此高陽徒如樂華胥域憔悴澤邊人獨醒良可惜峻極上寺徘徊峻極寺淸意滿煙霞好風從天來吹落桂樹花高高人物外猶屬梵王家中峯嵩高㝡高處逸客偶登臨廻看日月影正得天地心念此非常遊千載一披􅁭聽眞上人琴歌銀潢耿耿霜稜稜西軒月色寒如冰上人一叩朱絲繩萬􅄜不起秋光凝伏犧歸天忽千古我聞遺音淚如􅀨嗟嗟不及鄭衞兒北里南隣競歌舞競歌舞何時休師襄堂上心悠悠擊浮金戞鳴玉老龍秋啼滄海底幼猿暮嘯寒山曲隴頭瑟瑟咽流泉洞庭蕭蕭落寒木此聲感物何太靈十二銜珠下仙鵠爲予再奏南風詩神人和暢舜無爲爲予試彈廣陵散􅀑物悲哀晉方亂乃知聖人情慮深將治四海先治琴興亡哀樂不我遁坐中可見天下心感公遺我正始音何以報之千黃金和僧長吉湖居五題湖山湖山滿淸氣賞心甲吳越晴嵐起片雲晚水連初月漁父得意歸歌詩等閑發水月千尋月脚寒湖影淨於天忽如常娥宫俯仰見嬋娟更約中秋夕長津無寸煙筠亭爲愛碧鮮亭入夏敂敂至臺榭競生煙獨有淸涼意高岡鳳不來幽人此沉醉風笛風引湖邊笛焉知非隱淪一聲裂雲去明月生精神無爲落梅調留􅀉隴頭人渚蓮武陵誰家子波面􅀟􅀟渡空積心中絲未成機上素似共織女期秋宵苦霜露酬葉道􅀸學士見􅀉世傳學中禄小子廼逢辰一入諫諍司鴻毛忽其身可負萬乗主甘爲三黜人豈量堯舜心如日照􅀌臣薄責落善地雅尚過朝倫僅同􅀛在泥敢冀蠖求伸朱樓逼清江下睨百丈鱗羡此南魚樂不忍持鈎輪爲郡良優優乏才止循循恬愉弗擾外何以慰遠民拙可存吾樸靜可逸吾神漸得踈􅂴味下車將四旬嘉興風雅來觀對如天賔感兹韶夏音佐我臺上春和章岷從事􅃲茶歌年年春自東南來建溪先暖冰微開溪邊竒茗冠天下武夷仙人從古栽新雷昨夜發何處家家嬉􅀏穿雲去露牙錯落一畨榮綴玉含珠散嘉樹終朝採掇未盈襜唯求精粹不敢貪研膏焙乳有雅製方中圭􅀆圓中蟾北苑將期獻天子林下雄豪先􅃲美鼎磨雲外首山銅瓶携江上中泠水黃金碾畔緑塵飛紫玉甌心雪濤起􅃲余味􅀆輕醍醐􅃲余香􅀆薄蘭芷其間品第胡能欺十目視而十手指勝􅀂登仙不可攀輸同降將無窮耻于嗟天産石上英論功不愧堦前􅕴衆人之濁我可淸千日之醉我可醒屈原試與招魂魄劉伶却得聞雷霆盧仝敢不歌陸羽須作經森然萬象中焉知無茶星商山丈人休茹芝首陽先生休采薇長安酒價減千萬成都藥市無光輝不如仙山一啜好泠然便欲乗風飛君莫羡花間女郎只􅃲草贏得珠璣滿斗歸和葛閎寺丞接花歌江城有卒老且貧憔悴抱關良苦辛衆中忽聞語聲好知是北來京洛人我試問云何至是欲語汍瀾墮􅀟淚斯須收淚始能言生自東都富貴地家有城南錦繡園少年止以花爲事黃金用盡無他能却作瓊林苑中吏年年中使先春來曉宣囗勑修花臺竒芬異卉百餘品求新換舊爭栽培猶恐君王猒顔色群芳只似尋常開幸有神仙接花術更向都城求絕匹梁王苑裏索妍姿石氏園中搜淑質金刀玉尺裁量妙香膏膩壤彌縫密廻得東皇造化工五色敷華異平日一朝寵愛歸牡丹千花相􅀏妖饒難竊藥常娥新換骨嬋娟不似人間看太平天子春遊好金明柳色籠黃道道南樓殿五雲高鈞天捧上蓬萊島四邊桃李不勝春何況花王對玉宸國色精明動韶景天香旖旎飄芳塵特奏霓裳羽衣曲千官獻夀羅星辰兌悅臨軒逾數刻花吏此時方得色白銀紅錦滿牙床拜賜伏前生羽翼惟觀風景不憂身一心歳歲供春職中途得罪情多故刻木在前何敢訴竄來江外知幾年骨肉無音鴈空度北人情況異南人蕭灑溪山苦無趣子規啼處血爲花黃梅熟時雨如霧多愁多恨信傷人今年不及去年身目昬耳重精力減復有鄉心難具陳我聞此語聊悒悒近曽侍從班中立朝違日下暮天涯不學爾曹向隅泣人生榮辱如浮雲悠悠天地胡能執賈誼文才動漢家當時不免來長沙幽求功業開元盛亦作流人過梅嶺我無一事逮古人謫官却得神仙境自可優優樂名教曽不恓恓吊形影接花之技爾則竒江郷卑濕何能施吾皇又詔還淳朴組繡文章皆棄遺上林將議賜民畋似昔繁華徒爾爲西都尚有名園處我欲抽身希白傅一日天恩放爾歸相逐栽花洛陽去天平山白雲泉靈泉在天半狂波不能侵神蛟穴其中渴虎不敢臨隱照涵秋碧泓然一勺深游潤騰雲飛散作三日霖天造豈無意神化安可尋挹之如醍醐盡得清涼心聞之異絲竹不含哀樂音月好群􅄜息㳙㳙度前林子晉罷雲笙伯牙收玉琴徘徊不擬去復發滄浪吟乃云堯湯歲盈盈長若今萬里江海源千秋松桂隂兹焉如有價北斗量黃金留題常熟頂山僧居平湖數百里隱然一山起中有白龍泉可洗人間耳吾師仁智心愛兹山水音結茅三十年不道日月深笑我名未巳來問無端理却指嶺邊雲斯焉贈君子江上漁者江上徃來人但愛鱸魚美君看一葉舟出沒風波裏送蔡挺代父之蜀朔風豈不寒蜀道豈不難之子代親行萬里心自安劒閣雪猶明錦江春未闌到日必詩戰重登李杜壇鄱陽酬泉州曹使君見􅀉吾生豈不幸所禀多剛腸身甘一枝巢心苦千仞翔志意苟天命富貴非我望立譚萬乗前肝竭喉無漿意君成大舜千古聞羶香寸懷如春風思與天下芳片玉棄且在􅀟足何辭傷王章死於漢韓愈逐諸唐獄中與嶺外妻子不得將義士撫卷起眦血一霑裳胡弗學揭厲胡弗隨低昻干時宴安人滅然巳不揚匹夫虎敢􅃲女子熊能留況彼二長者烏肯巧如簧我愛古人節皎皎明於霜今日貶江徼多慙韓與王罪大禍不稱所損傷纎芒盡室來官下君恩大難忘酒聖無隱量詩豪有餘章秋來魏公亭金菊何煌煌登高發秘思聊以攄吾狂卓有梅聖俞作邑郡之旁矯首賦靈烏擬彼歌滄浪因成答客戯移以贈名郎泉南曹使君詩源萬里長復我百餘言疑登孔子堂聞之金石音純純自宮商念此􅀌鳴鶴聲應來遠方相期養心氣彌天浩無疆鋪之被萬物照之諧三光此道果迃闊陶陶吾醉鄉和謝希深學士見寄天地久開泰過言防結括誰憐多出處自省有本末心焉介如石可裂不可奪盡室得江行君恩與全活迴頭諫諍路尚願無壅遏豈獨世所非千載成迂闊廬山瀑布靈源何太高北斗想可挹凌日五光直逗雲千仞急白虹下澗飲寒劒倚天立闊電不得瞬長雷無敢蟄萬丈巖崖坼一道林巒濕險逼飛鳥墜冷束山鬼泣須當截海去獨流不相入滕子京魏介之二同年相訪丹陽郡長江天下險渉者利名驅二公訪貧交過之如坦途風波豈不惡忠信天所扶相見乃大􅀏命歌倒金壷同年三百人太半空名呼没者草自緑存者顔無朱功名􅀂在天何必心區區莫競貴高路休防讒嫉夫孔子作旅人孟軻號迂儒吾輩不飲酒笑殺高陽徒送劉牧推官之兖州相國鎭東魯時李相公迪在兖開閤多英豪羡子賦從軍壯思如波濤當有非常遇所得連六鼇故人孫復之臥雲生二毛或作梁甫吟秋風共呼號翩翩草檄外可與相遊遨益以夫子心萬物都一毫此行名與節須似泰山高和楊畋􅀌琴詠愛此千年器如見古人面欲彈換朱絲明月當秋漢我願宫商絃相應聲無間自然召南風莫起􅀌琴嘆絳州園池絳臺史君府亭閣叅園圃一泉西北來群峯高下覩池魚或躍金水簾長布雨恠栢鎻蛟虬醜石􅃲貙虎群花相倚􅀏垂楊自由舞靜境合通仙淸隂不知暑毎與風月期可無詩酒助登臨問民俗依舊陶唐古晉祠泉神哉叔虞廟地勝出嘉泉一源甚澄靜數歩忽潺湲此異孰可窮觀者增恭䖍錦鱗無敢釣長生同水仙千家漑禾稻滿目江鄉田我來動所思致主愧前賢大道果能行時雨宜不愆皆如晉祠下生民無旱年訪陜郊魏踈處士賢哉先處士天書召不起雲夫嗣􅀌風復爲隱君子有石礪其齒有泉洗其耳下瞰紅塵路榮利無窮巳孜孜朝市人同在風波裏大爲高士􅀏誓不拾靑紫我亦寵辱流所幸無愠喜進者道之行退者道之止矧今領方面豈稱長城􅀝來訪卧雲人而請益諸己得無長者言佩之玉非美中元夜百花洲作南陽太守淸狂發未到中秋先賞月百花洲裏夜忘歸緑梧無聲露光滑天學碧海吐明珠寒輝射空星斗踈西樓下看人間世瑩然都在靑玉壷從來酷暑不可避今夕涼生豈天意一笛吹銷萬里雲主人高歌客大醉客醉起舞逐我歌弗舞弗歌如老何覽秀亭詩南陽有絕勝城下百花洲謝公創危亭紫微謝希深領郡日建此亭屹在高城頭盡覽洲中秀歷歷銷人憂作詩刻金石意垂千載休我來亭早壞何以待英游試觀荆􅁄繁欲歩瓦礫稠嗟嗟命良工美材肆爾求曰基復日搆落成會中秋開樽揖明月席上皆應劉敏速迭唱和醺酣爭獻酬老子素不淺預兹年少儔九日重登臨涼空氛氣收風來鴈聲度雲去山色留西郊有潭菊滿以金船浮雅爲君子壽外物眞悠悠過則與春期春時良更優熖熖衆卉明衮衮新泉流簫鼓動地喧羅綺傾城遊五馬不行樂州人爲之羞亭焉詎可廢願此多賢侯祠風師酬提刑趙學士見貽先王制禮經祠爲國大事孟春祭風師刺史敢有二齋戒升于壇拜手首至地所祈動以時生物得咸遂勿鼓江海濤害我舟檝利旱天六七月會有雷雨至愼無吹散去坐使百穀悴高秋三五夕明月生天際乃可驅雲煙以喜萬人意願君入薰絃上副吾皇志阜財復解愠即爲天下賜八使重古禮作詩歌祭義誠欲通神明非徒奬州吏賢哉推此心良以警有位依韻和安陸孫司諫見􅀉甫穰下故都今善藩沃衍千里多豐年孫公頃以淸淨化我來代之慙二天人物高傳卧龍里神仙近接弄珠川漢光舊烈山河在徘徊弔古良依然二十八􅀅固不朽風雲一代皆忠賢我亦明時得君者出處十載功不前尚得州麾養衰疾優游豈減居林泉因逢故人作宴喜琴樽風月夕不眠之翰詩來若金石重於我輩何其偏相其直道了無悔寧爭蠖屈與鵬騫送鄖鄕尉黃通少年好逸驥老者重安車爭先尚逐逐致逺貴徐徐勿言一尉卑千戶繫慘舒外矜固不足内樂則有餘子游與季路作邑寧欷歔五斗對萬鍾所問道何如依韻和襄陽王源叔龍圖見􅀉高車赴南峴敝郊主東道風采喜一見布素情相好屈指四十秋于今歲寒保我起爲君壽善頌復善禱願盡杯中物薄言理可到君子貴有終功名非必早朝端􅀸大夫所尚賢而老世慮久乃周聖門深巳造與君誓許國無忝於祖考㓗如鳳食竹樂􅀂魚在藻安得長相親時時一絕倒不忘平生期明月滿懷抱依韻答賈黯監丞賀雪今之刺史古諸侯孰敢不分天子憂自秋徂冬渴雨雪旬奏空文慙轉郵得非郡國政未洽刺史閉閤當自尤上頼天子仁且聖神龍奔走不俟求同雲千里結雪意一夕宻下誠如羞俗有雪羞多夜落之語曉來賞心江海上東望不見三神丘渾祛癘氣發和氣明年黍稷須盈疇煙郊空闊獵者徤酒市暖􅀬沽人稠光精璨璨奪劒戟清寒拂拂生衣裘鈴齋賀客有喜色飲酣歌作擊前籌常願帝力及南畒盡使風俗如東鄒誰言吾子青春者意在生民先發謳依韻答提刑張太博甞新醖南陽本佳處偶得作守臣地與汝墳近古來風化純當官一無術易易復循循長使下情逹窮民奚不伸此外更何事優㳺欵嘉賔時得一􅀏會恨無千日醇客有多聞者宻法爲我陳自言此靈物盡心妙始臻非徒水泉潔大要麴糵均暄凉體四時日月周數旬其氣芳以烈厥味和而辛㳙㳙滴小糟清光能照人固可奉宗廟冝能格天神我姑酌金罍駐此席上珍況有百花洲水木長時新煙姿藏碧塢桞杪見朱闉兩兩鳬鴈侣依依江海瀕晚光倒晚影一川無一塵悠悠乘􅀞舸坦坦解朝紳緑隂承作蓋芳草就爲茵引此杯中物獻酬交錯頻禮俗重三爵今乃不記廵大言出物表本性還天眞或落孟嘉㡌或抛陶令巾吾非葛天氏誰爲劉伯倫八使逹觀者與予日相親作詩美嘉會調高繼無因但願天下樂一若樽前身長戴堯舜主盡作羲黃民耕田與鑿井熈熈千萬春􅀉題峴山羊公祠堂休哉羊叔子輔晋功勲大化行江漢間恩􅀍疆場外中國􅀝而安治爲天下最開府多英僚置酒每高會徘徊臨峴首興言何慷慨此山自古有游者千萬輩堙滅皆無聞空悲歲月邁公乎仁澤深風采獨不昧于今墮淚碑觀之益欽戴卓有王源叔文學偉當代借麾來襄陽高懷極恬退山姿列雲端江響拂天􅄜行樂何逍遥覽古忽感槩不見叔子祠蕪没民疇内千金贖故基廟貌重營繪襄人復其祀水旱有攸頼太守一興善比戸皆歡快源叔政可歌又留千載愛送河東提刑張太傅憶守姑蘇日見君巳驚人翩翩幕中畫落落席上珍強記及敏力一一精如神洎余領西帥宻與羗夏隣君來貳邊郡表裏還相親有如得四支周旋衛其身予始按萬渠兵行百物陳而君主其事進退皆有倫羗酋八九百醉歌喜齗齗傳告以號令再拜罔不馴作城大順川扼胡來路津漢軍始屯集虜􅀐俄紛綸諸將稍畏怯偶語辭艱辛君躍疋馬去入險􅀅死濵持檛畫禍福虎校靡不遵呼兵就畚挿恱使咸忻忻晝夜戰且役城成未踰旬虜乃急攻我萬衆生煙塵蒼惶􅀍矢石遁走無逡廵君馳奏闕下感􅁣動中宸是秋懷敏敗虜􅀔侵涇原天地正愁􅃤關輔將迸奔腹心茍不守皮膚安得存予召蕃漢兵趨邠當北門諸將切切議謂宜守塞垣惟君力賛我咸鎬爲本根全師遂鼓進連城息驚喧果釋天子憂􅅄詔垂明恩予貳機衡重君掌食貨繁豈敢懈夙夜未甞攄􅀏言今叨領南陽會君乘使軒携手百花洲無時不開樽語論極今古情契及子孫氣同􅀂蘭芝聲應如箎塤浩歌忘物我劇飲無涼暄自問平生心此樂曾幾畨一旦改使節忩忩指并汾惜别固不忍贈行當有云從來􅀫兵地北與胡漢分長河出紫塞太行入青雲天然作雄屏覽者懷忠勲行府在平陽山川秀氤氲堯民擊壤歌千古猶得聞君有經濟心潤以金石文攬轡問風俗坐堂精典墳此道日益大行行思致君依韻和提刑太博嘉雪南陽風俗常苦耕太守憂民敢不誠今秋與冬數月旱二麥無望愁編氓龍遁雲藏不肯起荒祠巫鼔徒轟轟昨宵天意驟回復䌓隂一布飄寒英裁成片片盡六出化工造物何其精散亂狂飛􅀂􅀝勢徘徊緩舞如含情千門競掃明月色萬木都拆寒梅英天上風流忽爾在人間險阻無不平因松偶作琴瑟調過竹徐移環珮聲江天鳴鴈畏相失龍庭奔馬豪如驚丞相沙堤初踏練將軍紫髯渾綴瓔巖前飢煞嘯風虎海上凍死吞舟鯨我有高樓擘雲上􅀟瞳一開千里明群閻逐去疫癘逺長逵􅎹下塵埃淸當知有年可坐致東臯父老休營營因招大使賞天瑞醉把羲黃向上評窮通得䘮了無事莊老器宇何難并君起作歌我起和天地和氣須充盈當年此樂不可得與雪對舞攄平生共君學取雪好處平施萬物如權衡閱古堂詩中山天下重韓公兹鎭臨堂上繢昔賢閱古以儆今牧師六十人冠劒竦􅀂林旣瞻古人像必求古人心彼或所存逺我將所得深仁與智可尚忠與義可欽吾愛古賢守馨德神祗歆典法曾弗泥勸沮良自斟躋民在春臺熈熈樂不淫耕夫與樵子飽暖相謳吟王道自此始然後張薫琴吾愛古名將毅􅀂武庫森其重如山安其靜如淵沉有令凜如霜有謀宻如隂敵城一朝拔戎首萬里擒虎豹卷韜畧鯨鯢投釡鬵皇威徹西海天馬來駸駸留侯武侯者將相俱能任決勝神所啓受託天所諶披開日月光振起雷霆音九關支一柱萬宇覆重衾前人何赫赫後人豈愔愔所以作此堂公意同堅金僕思寳元初叛羗弄千鐔王師生太平苦戰誠未禁赤子餵犬􅇾塞翁淚涔涔中原固爲辱天子動宸􅁭乃命公與僕聮使禦外侵歷歷革前弊拳拳掃妖祲二十四萬兵撫之􅀂靑衿惟以人占天不問昴與參相彼形勝地指掌而蹄􅽃復我横山彊限爾長河潯此得喉可扼彼宜内就椹上前同定䇿奸謀俄獻琛梟巢不忍覆異日生㐫禽僕巳白髪翁量力欲投簮公方靑春期抱道當作霖四夷氣須奪百代病可鍼河湟議始行漢唐功必尋復令千載下景仰如高岑因賦閱古篇爲公廊廟箴送謝景初廷評宰餘姚世德踐甲科先賔客先紫微俱登甲科廷評今又繼之青紫信可拾故鄉特榮輝高門復樹立餘姚二山下東南最名邑煙水萬人家熈熈自翔集又得賢大夫坐堂恩信敷春風爲君來緑波滿平湖乗興訪隱淪今逢賀老無文藻凌雲處定喜江山助未能同僊舟離樽少留駐行行道不孤明月相隨去范文正公集卷第二
