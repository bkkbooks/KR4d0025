  text: 范文正公集卷第十六
  hash: sha256:f2f8b139efed495df7f7fa6836825b9b59939091701dbd7e34029543739cd0d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_016-1a}
body:
  text: 讓觀察使第一表臣某言馬遞降到誥勑各一道特授臣邠州管内觀察使仍依前邠寜環慶路馬歩軍都部署兼經略招討安撫等使非常之命旣出於絲綸未盡之誠敢逃於斧􅃏臣中謝臣聞先王爵以尚德禄以報功諸侯之失德者降其爵諸侯之有功者增其禄此百代不易之典也臣又聞貴貴者爲其近於君也漢遣御史繡衣持斧出按二千石唐御史之出節度使以軍禮見所以表朝廷之重也學士丞郎出則居廉察刾史之任入則復其位自五代之亂措置乖失廉察刾史之位遂爲武官學士丞郎一出爲之謂之換過入朝則不復其位故士大夫寧甘薄禄而不樂換之者久矣況今用兵之際事繫安危今日之命理有利害臣儻黙黙而受一則失朝廷之重勢二則減議論之風采三則發將佐之怒四則鼔軍旅之怨五則取夷狄之輕六則貽國家之患何以言之臣與韓􅄾並命陜西􅀄爲經略安撫副使次則分領秦慶二州兼本路都部署司兵馬公事次則進秩爲本路都部署兼領經略安撫招討等使皆以學士之職行都統之權是用内朝近臣出臨戎閫以節制諸將孰不以朝廷之勢而望風禀律臣輩亦以内朝之職毎覩詔令之下或有非便必極力議論覆奏不巳期於必正自以近臣當彌縫其闕而無嫌矣今一旦落内朝之職而補外帥前在左右丞諸行侍郎節度留後之上今降於知制誥待制之下使居方榮劉興之下列以外官而行都統之權此則失朝廷之重勢一也又旣爲外帥則今而後朝廷詔令之出或不便於軍中或有害於邊事豈敢區别是非與朝廷抗論自非近臣無彌縫其闕之理縱降詔丁寧湏令奏覆而臣軰豈不鑒前代將帥驕亢之禍存國家内外指蹤之體此則減議論之風采二也臣又自至邊上常責將佐當圖實効上報國家勿􅀣虚聲妄求恩􅅄故得歲年以來所奏邊効稍稍得實不至矯誣臣方經制􅀘葺以救邊防之闕而西賊猖熾枝葉愈大臣則一年之中三換寵數將何靣目責諸將之實効此則發將佐之怒三也又臣聞自古將帥與士旅同其安樂則可共其憂患而爲國家之用故士未飲而不敢言渴士未食而不敢言饑今邊兵請給粗供樵㸑醋鹽之費食必麤糲經逾歲年不霑肉味至有軍行之時羸不勝甲棄而埋之􅀒罪以逋未能遠去皆捕而斬之臣雖痛而不忍豈敢慢法或有危逼欲使此等之心同其憂患爲國家之用不亦難哉昔禄山之亂河北三十餘城俱歸於賊者非皆攻而下之由衆心無恩當未危之時勉以從事及旣危之後翻然改圖劫長吏以應賊皆此􅀋也臣每思之則常寒心古之方侯獲其厚禄養敢死之士以備㓂患今之戰士養有常廩賞有常格臣得千鍾之禄千金之賜豈敢私與死士哉徒聚之於家使彼目而銜之以待其釁爾臣恐此輩一日倉卒乘怒而發劫長吏以應賊不能爲國家之用而能爲國家之患矣此則鼓軍旅之怨四也又臣聞内列三公九卿外分五侯九伯所以安天下威四夷也臣自到􅁁上其熟戸蕃部皆呼臣爲龍圖老子至於賊界亦傳而呼之且不測其品位之髙下也今賊界㳂邊小可首領並僞署觀察團練使之名臣若受兹新命使蕃部聞之適足取夷狄之輕五也臣謂國家此舉使四路首帥失朝廷之重勢減議論之風采發將佐之怒鼓軍旅之怨取夷狄之輕由斯以徃必敗乃事寧不貽國家之後患哉此六者臣上爲國體而辭之也再念臣世專儒素遭逢盛時以文藝登科陛下擢於秘舘處之諫司歷天章龍圖之職可謂清切矣寒士至此大逾本望儒者報國以言爲先如臣曩者不能練事効賈生慟哭長太息之說黷于聖聰以中外共棄屢經貶放亦已塞朝廷之薄責矣然今之狂士效唐人肆言朝市徃徃甚於臣者而朝廷容之直以臣於無事之秋先爲之言故天下指之爲狂矣而臣自追其咎未甞怏怏此搢紳之所諒也前春延安之戰主將不利大挫國威朝廷有使愚使過之議遂及於臣逮臣至于延安竭心悉力而處置之間不合朝廷之意旣廢復用無所逃遁臣顛沛十載􅁅而又然者數四矣臣自知孑孑惴惴非將相之才豈了大事但國家急難之際􅁁鄙乏人臣以事君之心雖知屢困日勉一日俟將帥得人臣即引退丘園詠歌太平雖多難之夫有全歸之樂此臣之所期也臣粗守廉隅朝廷豈有貪夫畜臣落近職而增厚禄將令長居邊鄙永謝丘園非臣之所期也臣本有風眩之疾聞命以來心墮氣索不知其涯縁臣夙夜乃事精爽巳乏量臣之力豈堪武帥長爲荷戈之事乎此臣下爲私心而辭之也伏望體天法道欽文聰武聖神孝德皇帝陛下垂日月之明發於獨斷追還新恩許存舊職則是以内朝近臣經略邊事節制諸將其體重矣而況儒臣武士所習不同所志亦異臣輩不願去清列而就廉察之厚禄者如方榮劉興輩必不願減厚禄以就學士之清列矣如使四路之帥上失其勢下撓其志沮喪不樂意衰神瘁則事有隳墮豈復能振謀發䇿爲國家長城之􅀝哉恐非陛下推委使人人盡心之意也一昨宰臣堅讓三公雖巳行之命􅀩陛下特俞其請臣今冐犯天威爲國體而辭之者六爲私心而辭之者一苟不獲命臣當繫身慶州之獄自劾無功冐賞之咎又劾違制不受之罪以聽于朝廷假使朝廷極怒臣得死於君父之命猶勝貪此厚禄敗名速禍死於㓂亂之手此臣之所以知其退而不知進也惟天鑒處之臣無任云云第二表臣某言馬遞降到詔書一道伏􅀩聖慈諭臣所除觀察使且從廩秩之優益慰戎行之望者祗膺寵異載􅀍孱愚心戴雲天足臨淵谷臣中謝􅀼念臣器業無取誤荷聖知國有急難固宜自効臣奔走塞下首尾三年曾無寸功以稱上意伏䝉體天法道欽文聰武聖神孝德皇帝陛下曲敦寛宥未即嚴誅今又擢居廉察享千鍾之厚禄加千金之重賜於臣何少哉臣固上表陳讓者蓋爲國家未便何則落内朝之職改爲外官使節制諸將頓失體勢又無功進禄發將佐之怒積貨于家鼓軍旅之怨況慶州與賊界相接其逐族首領管三五百人者便僞署觀察團練之名本司常時行移邊上文字及招安牓示若署臣新銜彼則相輕此皆未便之端也又四路文帥自來帶内朝之職而行節制凡百將佐無不稟服方且力修邊備堅禦賊鋒頼其協心將圖成効一旦遷改人情大惑知者謂去此近職改爲外官非美也其不知者謂有何竒功加此厚禄非宜也經略使旣無功遷改則經略副使豈得無望兼鈐轄都監等出入暴露衝冐矢石比臣處任尤更重難見此遷改必有不平之意若朝廷不待有功例皆進秩則諸將驕墮誰復自奮國家邊事爲之柰何此又未便之大也伏望陛下發於獨斷追還此恩臣得帶内朝職名節制邊事其體且重副使鈐轄都監等即無不平之意各思自奮以求功名又得經略招討銜位與僞署蕃部之名不相交錯免生輕易此事體大乞垂聖鑒特降中㫖如不􅀗命臣當踐言繫獄上請不敢逃罪臣亦知本朝李維陳尭咨俱自學士換觀察使當時四方無事非領節制但享厚禄爲優賢之命與今事體不同臣非罷陜西經略安撫副使日便乞落職守貟外郎知一小郡而朝廷不從今却堅辭廉察之位請存學士之職者蓋居節制之任藉朝廷之勢以重其體也且儒生後進換入武帥或居於上則多憎憤必有怨言或處於下則多見抑亦無成功惟異其品流隆其委注彼則望風懷畏靡敢不從此爲得其體也况臣􅀌立明時無結託之跡遠居極塞非進用之地如朝廷疑臣不就右職别懷過望即乞聖慈依楊偕張存例特許解去邊任仍乞落學士之職換一刺史或守郎官於隨郢間知一小郡臣死生幸甚死生幸甚非領重􅀉固不敢借内朝之職矣如受命之日却有翻言甘俟鼎鑊惟聖鑒裁之干犯天威臣無任云云第三表臣某言馬遞降到御前劄子伏奉聖㫖以臣上表陳讓就除邠州觀察使事當體深􅂨勿循小節前來成命即宜祗受者天語重臨莫非敦奬臣心再剖合盡懇私臣中謝臣聞虞舜以舎巳從人而稱至德此聖人感人之要也又聞陳力就列不能者止此人臣事君之分也竊念臣世爲文吏拳拳素風國家以西事之急用臣過次俾預經略三年于兹進不能行討伐之威非勇也退不能宣懷柔之化非智也非智非勇豈主帥之材固當自劾聽于有司豈期睿恩驟進寵禄臣退省無狀深所未安況臣前表所陳謂落内朝之職則失朝廷之重勢旣爲外帥則減議論之風采獨受寵名發將佐之怒積貨于私鼓軍旅之怨與僞署蕃部同其官號取夷狄之輕述斯以徃必有敗事以貽國家之患此物情可見朝廷必已照之非臣之敢誣也況臣懦尫之質宿患風眩近加疾毒復多鼻衂膚髪衰變精力減渇豈堪專爲武帥以圖矢石之功此臣量力之所不能也明矣且如劉乎本是文臣衆推忠勇尚不能將帥之任朝廷察臣之材能如劉平之武力乎昔唐用房琯虚名將兵拒賊一戰而潰危困社稷此前人之明驗㣲臣之深戒也重念臣出處窮困憂思深遠民之疾苦物之情僞臣粗知之而天賦􅄶心遇事輙發故居其外則寡悔處於内則多咎臣自知非朝廷進用之器如未􅀗退則願久守一藩奉行條詔庻幾爲聖朝之循吏亦足託青史之未光垂於來代今以邊鄙方艱承乏於此禦㓂之力頼諸將佐臣則日夜思省救其闕漏而巳衆知儒臣固不責其勇力及改武帥則取􅀏於三軍其諸路有不辭者或當壯歲或􅀒雄才非臣之所及也裴德輿張可久並命閤門使一受一免朝廷各從其志斯有以見虞舜舎巳從人足以感群下之心矣臣久荷聖知叨居近列何獨未獲其請臣竊自疑今邊上新有事冝巳發走馬承受張翔赴闕敷奏本州全闕部署鈐轄臣未敢下獄待罪再瀝肝膽上冒斧􅃏伏望體天法道欽文聰武聖神孝德皇帝陛下垂至明之察推廣生之造許臣依期帶内朝之職經畫邊方節制諸將小事行之大事言之爲朝廷之耳目其體甚重臣尚可力疾爲國盡心其武師之難寵禄之過臣敢不揆度固以死請干冒天憲臣無任云云謝許讓觀察使守舊官表臣某言准樞密院劄子奉聖㫖令臣却守舊官者寵禄固辭渉邀君之大咎聖言惟允推舎已之至仁臣中謝臣聞進人以禮退人以禮哲王之體也大讓如慢小讓如僞儒臣之行也上得其體足以寧家􅀖下興其行可以導風俗臣親逢盛美得不手之舞之足之蹈之與天下稱慶哉竊念臣少㳺庠序長登科級周旋􅀌䆠了無聞逹伏遇體天法道欽文聰武聖神孝德皇帝陛下金鑑臨御多士駿奔於千官百辟之中擢臣諫諍之列置臣圖書之府揚歷中外恩常異等自西陲用兵朝廷旰食遣臣經略邊事歲月無狀亦嘗得請示以招納之意期于平定而物議喧然禍在不測上頼日月垂照保全㣲生曁再委方靣專此一路又無出竒之䇿惟知守禦而巳日常自訟以待來者陛下濬發宸謀思欲崇諸路之寄例改廉車且從廩禄之優兼貴稱呼之重霈然渥澤被于弱質臣以今之觀察使列爲武帥書生何力可堪此任幸以内朝之職爲國家心腹耳目權節制之任其體任重不煩改作願廻寵異少寛憂慄三黷天聽義不容誅伏䝉陛下念進人退人之禮察如慢如僞之情特降俞㫖許存舊秩臣且懼且喜不知所爲懼者有不即從制之罪而尚屈􅃔典喜者以不奪稽古之志而復􅀍儒紳臣敢不竭力悉心夙宵乃職謹疆場之細事佇干羽之大猷退作頌聲仰荅聖造臣無任云云謝傳宣表臣某言入内内侍省高班陳舜封至伏􅀩聖慈傳宣爲日近差除兩地臣僚未差除間巳指揮中書劄記候將來邊事稍寜詔卿用在兩地非出擬議亦非臣僚奏舉特出朕意宣諭卿知兼令臣宻舉臣僚代臣邊任奏聞聖言天意非臣敢當仰戴光靈伏增戰汗臣中謝竊念臣素乏才䇿誤膺􅅄􅀉經制西事三年于兹㑹㣲毫髪之功方俟雷霆之罰伏􅀩體天法道欽文聰武聖神孝德皇帝陛下特降宻㫖許以重用豈兹無狀之跡可承不次之命況羗戎素詐邊鄙多虞若以社稷之靈自然嚮化則臣當自揆以請便安抱病之軀假一近郡靜臨民政退保天年如朝廷未議解兵臣願奔走塞下再竭心膂少贖過尤何敢輙舉他人代巳邊任惟期自効上答聖知臣無任云云讓樞宻直學士右諫議大夫表臣某言三班借職劉仲顔齎降官誥一通勑牒一道伏望聖恩特授臣右諫議大夫充樞宻直學士差遣依舊者在物之情向榮必喜自天之命過寵則驚臣中謝竊念臣齊魯諸生本無榮望素乏佐王之術豈期遇主之知伏􅀩皇帝陛下采自􅀌平擢于侍從無似之迹毎玷聖造前年以羗戎負德官軍失利朝廷特命韓􅄾與臣同貳經略歲時之間􅄾以節制不行而免臣以招納非宜而罷尋分四路復領中權二年于兹一功未立屢叨進改深負愧羞雖朝廷憂勞且務姑息而其下將佐覩臣忝冒必思僥倖豈復有實効之心臣亦何靣目以責率其下令邊略未固兵力未強威令不揚戰鬭多覆因循已甚平定無期一時㓂逼三川其勢可困而葛懷敏等入賊伏中一戰大潰殺傷滿野驅掠無􅄸臣以本路多虞救援不早臣方痛心疾首日夜悲憂髪變成絲血化爲淚殞殁無地榮耀何心今日之恩非臣所望臣昨蒙朝廷特除邠州觀察使累章獲讓巳煩聖聰三黷之誅豈當再冐然臣有愚心不敢不盡有謬䇿不敢不陳雖屬邊臣實叨近職敢不議論少禆聖明傳曰事君如事親又曰君臣同體當此安危之際豈敢事形迹避嫌疑而不盡心於君親乎魏元成曰隋以事形迹而亡唐太宗深然之今願陛下恕臣萬死采臣一言天下幸甚天下幸甚臣觀易震卦曰震亨謂聖人因震恐而致亨大也禹湯罪已其興也勃焉是皆得易之㫖畏天之威而致其亨矣陛下其捨諸昨者鎭戎兵敗之後天色隂晦十日不解木冰地震群心憂傷此將帥失人生靈致䧟天地震怒之意也冬至後一日申時慶州又地震此隂陽戰而致動占書曰四夷爲中國之隂是夷夏交爭未寧之象也自西事以來延安東路北路官軍傷折萬餘人并金明承平諸寨殺虜過蕃部萬餘戸約四五萬口及麟府喪䧟鎮戎三敗殺者傷者前後僅二十萬人矣死者爲魚肉生者爲犬羊臣仰測陛下之心必大震動而天下莫知但見爵賞頒行疑朝廷高枕負兹生靈願陛下因其震動過崇謙讓以柔遠未至選將有差之辭告謝于皇天后土五岳四瀆以哀痛之㫖誕告多方下感人心上答天戒陛下旣巳罪已兩府大臣必有遜謝之請小損勲爵而復其位臣等則宿兵困民討伐未効罪之大者請落近職左降一官帶責授二字仍削除經略招討等使名秪管句部署司公事以謝邊陲以警將佐以勵軍旅如此則天下聞朝廷罪巳知陛下之心不負生靈將佐軍旅等見主帥負責知天子必欲破賊即皆震懼甘爲艱辛更無僥倖之望臣等得以嚴率其下日夜聚謀上頼威靈可期平定仍請詔下部署以下非大功不録鈐轄都監非竒功不賞其班行將校軍士等所得功勞依舊量大小酬奬此救弊之端也今西賊漸熾恐謀深入陛下誠能與大臣宻議行臣之策天下幸甚如失此機㑹行恐後時儻朝廷不取臣言則邊上終無大功寖有大患其勢然矣願陛下以大易之㫖取古聖人之用心則震而後亨受景福於無窮庇蒼生於大賚臣之愚心謬䇿盡於此矣所降到誥勑等臣有此一䇿未敢拜受臣無任云云謝授知邠州表臣某言伏蒙聖慈特授臣依前行右諫議大夫充資政殿學士知邠州軍州事及管内勸農使兼陜西四路㳂邊安撫使改賜推誠保德功臣者陟降秘殿爲寵甚􅂭撫按邊庭所􅀉至重臣中謝竊念臣涉道尚淺立身本􅀌偶縁英主之知􅀗厠邇臣之列進登二府叅預萬幾議刑賞則不避上疑革僥倖則多招衆怨心雖無愧跡已難安而況親奉德音遠憂邊患旣此聞命誠合請行始塵宣慰之名來撫凋疲之俗纔周晉地將適秦􅀜屬府庫之巳虚積兵旅之尚衆動費萬計理當三思願假一麾就兼四路亦可處其疆事庻不傷於國財詔㫖弗從留居丞弼之位表章再露請陳戎狄之機伏蒙皇帝陞下俯照臣心特廻天聽罷政府之重責加仙殿之寵名徃守要藩遥按諸部存兹國體簡干聖心臣敢不即日首塗奉詔行事生民疾苦可得詢求邊塞機宜更當籌慮用罄臣節以酬聖知臣無任云云邠州謝上表臣某言伏奉制命授臣資政殿學士守本官知邠州兼陜西路㳂邊安撫使巳到任訖祕殿清華舊藩要劇祗膺渙渥伏切震驚臣中謝竊念臣生遘文明㓜蹈聲教登于造秀之級渉彼州縣之勞寖遷榮塗過被宸眷擢居近府叅對大猷詎有興􅀖之言曽無經國之効自惟三省必匪久安願解貳於黃樞請分憂於紫塞庶供麤使聊謝輿言伏􅀩皇帝陛下舜聰弗違堯言斯布假禁庭之要職居郡國之長人兼領使名復重邊􅀉進退以禮足爲儒者之榮本末可言盡出大人之造敢不砥礪風節佩服訓謀不以毁譽累其心不以寵辱更其守副委遇之本意酬保全之大恩臣無任云云遺表臣聞生必盡忠乃臣節之常守没猶有戀蓋主恩之難忘輙忍須􅁷之期少舒迫切之懇痛靡自覺辭皆不倫伏念臣生而遂􅀌少乃從學㳺心儒術決知聖道之可行結綬仕塗不信賤官之能屈􅂊脫中銓之冗遽􅂙麗正之榮耻爲倖人竊論國體昨自明肅厭代之後陛下奮權之初首承德音占預諌列念昔執卷惟虞無位之可行況今得君安敢惜身而少避間斥江湖之遠旋塵侍從之班大忤貴權幾成廢放屬羗臣之負險顧將列以難裁乃副帥權仍峻使任亦嘗周旋戰備指目地形力援定川之師始期遇敵誓復橫山之壤亟逼講和雖㣲必取之功多弭未然之患預中樞之宻勿曾不􅀗辭叅大政之幾㣲益難勝責自念驟膺於寵遇固當勉副於倚毗然而事久弊則人憚於更張功未驗則俗稱於迂闊以進賢援能爲􅀣黨以敦本抑末爲近名洎忝二華之行愈增百種之謗上繫天聽終辨衆纔因懇避於釣衡爰就班於符竹一違近署五易名城雖聖恩曲示於便安柰神道常惡其盈滿請麾上穎蓋遭拙􅐄之未平息鞍東徐益覺靈醫之不効唯積􅐄之見困非晚歲之能支神不在形氣將去幹冥冥幽壤倐爲長徃之期穆穆清光永絶再瞻之望肝膽摧落精魄飛揚然臣起于諸生歷此華貫雨露澤於數世圭組煥於一門有如臣焉足爲榮矣當瞑目以無憾尚貪生而有云蓋念所惜者盛時所眷者明主雖性命之際巳能自通然君臣之間豈易忘報但無怛化以竭遺忠敢憚陳於緒言庻無􅀒於没齒伏望陛下調和六氣㑹聚百祥上承天心下徇人欲明愼刑賞而使之必當精審號令而期於必行尊崇賢良裁抑僥倖制治於未亂納民於大中如此則不獨㣲臣甘從於異物庻令率土永寖於淳風言逐涕零命隨䟽殞臣無任惶懼戰惕之至范文正公集卷第十六
