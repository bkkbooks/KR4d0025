front:
  text: 諸賢賛頌論䟽韓魏公遺事云魏公謂挺然忠義奮不顧身師魯之所存也身安國家可保明消息盈虗之理希文之所存也敢問二公曰立一節則師魯可也考其終身不免終亦無所濟若成就大事以濟天下則希文可也韓公與孫元規龍圖書云近方知希文留徐將治巳差下人致書藥詣徐及裁記爲慶逓中忽領來教且承希文疾遂不起聞之驚慟數日不能飮食忠正大賢天下属望平生素藴未得紓盡遂至于此深可哀哀痛痛所幸者到公治所後事得仁者盡力幹辦亦賢者之先識希文􅊕目無憾矣今專差人致奠如公未發告令一幹吏同辦之幸甚富鄭公稱之爲聖人石徂徠比之爲䕫卨張横渠謂才氣老成歐陽公撰公神道碑云自公坐呂公貶羣士大夫各持二公曲直呂公患之凢直公者皆指爲黨或坐竄逐及呂公復相公亦再起􅀍用於是二公驩然相得戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能正上旣賢公可大用故卒置群議而用之歐陽公手自記日脩學道三十年所得者平心無怨惡尓脩初以范希文事得罪於丞相坐黨人逺貶三峽流落累年比呂公罷相始􅀍進擢及後爲范公作神道碑言西事呂公擢用希文盛稱二公之賢能釋憾而共力於國家者希文子純仁大以爲不然刻石時輙削去一節云我父至死未嘗觧􅄷每歎曰我亦得罪於丞相者惟其言公所以信於後世也嘗聞范公平生自言無怨惡於一人兼其與呂公觧􅄷書見於范集中豈有父自言無怨惡於一人而其子不使觧􅄷於地下父子之性相逺如此邵氏聞見録曰歐陽作碑辯不可則自削去驩然勠力等語歐陽殊不樂謂蘇明􅁢云范公碑爲其子弟擅於石夲改動碑中文字令人恨之歐陽公論小人讒沮范富諸賢云韓􅄾仲淹富弼等遇陛下聖明可謂難逢之㑹陛下有仲淹弼等亦可謂難得之臣陛下旣巳傾心待之仲淹等亦各思報臣謂事無不濟但顧行之如何耳况仲淹弼是陛下特出聖意自選之人􅀄用之時天下巳皆相賀然臣所慮者仲淹等所言必湏先絕僥倖因循姑息之事此等之事皆外招小人之怨怒而奸邪未去之人湏時有䜛沮若稍聽之則事不成矣臣謂當此行事之􅀄尤湏上下叶力凡小人怨怒仲淹等自以身當浮議陛下亦湏力拒待其久而漸定日見成功歐陽公論范公爲衆所推云韓􅄾與仲淹皆是國家委任之臣材識俱堪信用然仲淹於陜西軍民思信尤爲衆所推今若令仲淹外捍㓂兵而􅄾居中應副必能濟大事若陛下以新用仲淹責其展効則且令了此一事俟邊防稍定不兩三月可以還朝旣先弭於外庶可漸脩於缺政歐陽公論四賢不當罷䟽云杜衍韓􅄾范仲淹富弼天下皆知其可用之賢而不聞其有可罷之罪自古小人䜛害忠賢其說不逺欲廣䧟良善不過指為朋黨欲摇動大臣必湏誣以專權其故何也去一善人而衆善人尚在則未爲小人之利欲盖去之則善人少過難於一一求瑕唯指以爲朋黨則可以一時盡逐大臣不可以他事動摇惟有專權是人主之所惡故湏此說方可傾之臣料杜衍等四人各無大過而一時盡逐必有朋黨專權之說上惑聖慈臣請詳言之杜衍爲人清審而謹守規矩仲淹則恢廓自信而不疑韓􅄾則純正而質正富弼則明敏而果銳四人爲性旣各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲􅀷罪滕宗諒仲淹力爭而寛之仲淹謂契丹必攻河東請急脩邊俻富弼料九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水各城事韓􅄾則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤爲彰著陛下素巳知者此四人者可謂公正之賢也平日間居則相稱美之不暇爲國議事則公言廷爭而無私以此而言臣見杜衍等真得漢史所謂忠臣有不和之節而小人䜛爲朋黨誣矣陛下於千官百辟之中親選得此數人一旦罷去而使群邪相賀於内四夷相賀於外此臣所以爲陛下惜也
