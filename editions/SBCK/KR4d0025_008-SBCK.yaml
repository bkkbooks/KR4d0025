body:
  text: 上張右丞書乾興元年十二月日文林郎試祕書省校書郎權集慶軍節度推官監泰州西溪鎭鹽倉范某謹齋戒選日裁書拜于右丞閣下某聞先知覺後知先覺覺後覺伊尹之心也哲人傳焉故賢賢相與其道不息若顯􅀂隱者則惟時爾使伊尹之心邈乎無傳則賢賢相廢來代以降豈復有致君堯舜覺天下之後覺者哉今有施阿衡之才之道而將博其傳者可無眷眷以求其人乎有服膺仁義親逢聖賢而未預其􅀓者可無遑遑以聽於大人之門乎敢齋戒以辨之恭惟右丞維嶽降神儀我華旦文以鼓天下之動學以逹天下之志始乃育大節歷小位艱難備思造次惟道踐七諌之清列奉萬樞之宻府奏議森乎朝聽顧問沃於天心早以位峻中司禮嚴百辟人神恊贊貳于台宰邴侯之問繫乎􅃤舒叔相之才著於禮樂而常居以正色動惟至誠名可巽而道不可屈懷可卷而節不可降故昨讓廟堂之高回星象之度能輕人之至重易人之至難故道清朝廷名高泰山蓋盡美矣然我宋重明累聖與周比隆賢人之業宜衛社稷當復正熒煌之座爲萬􅀖之休光四海之景福此右丞之才之道之萬一也天下才士莫不稽顙仰望光明但仲尼日月之階難爲其升爾某何人也可預陶甄之末其大幸者生四民中識書學文爲衣冠禮樂之士研精覃思粗聞聖人之道知忠孝可以奉上仁義可以施下功名可存于不朽文章可貽於無窮莫不感激而興􅁣然有益天下之心垂千古之志豈所謂不知量也又昔人云一卷之書必立之師豈天下之道無從而正之而可得其指要乎某所以雞鳴孜孜望其有􅀗於此而當世大君子以某雕蟲之技而憐之者有矣未有謂某之誠可言天下之道者今復吏于海隅葭菼之中與國家補錙銖之利緩則罹咎猛且賊民窮荒絕島人不堪其憂尚何道之可進自惜屬文未逹見書未博三十爲學未􅀗事大賢人之師周旋其心未能受大君子之道其愚不巳尚遑遑乎聽於大人之門恭惟右丞播洪鈞之仁矜其不肖以一言置于左右至於稼穡之難獄訟之情政教之繁簡貨殖之利病雖不能辨亦甞有聞焉似可備僚俊之末議且使朝夕執事於前觀之可否如得其誠願預教育然後天下之道可得而明阿衡之心可得而傳使某會遇之日有益於當時有垂於將來乃右丞之道傳傳而不朽矣昔郭隗以小才而逢大遇則燕昭之名于今稱道黄公天人也有以跪履而授帝師之道者豈以孺子而捨諸智愚不同人則然矣先民有言曰希聖者亦聖之徒也此庶幾於萬一然干犯台嚴無任狂越戰兢之至不宣某再拜蝢首上執政書天聖五年月日丁憂人范某謹擇日望拜上書於史館相公集賢相公叅政侍郎叅政給事某居親之喪上書言事踰越典禮取􅀏天下豈欲動聖賢之知爲身名之計乎某謂居喪越禮有誅無赦豈足動聖賢之知耶矧親安之時官小禄薄今親亡矣縱使異日授一美衣對一盛饌尚當泣感風􅀣憂思無窮豈今几筵之下可爲身名之計乎不然何急急於言哉蓋聞忠孝者天下之大本也其孝不逮矣忠可忘乎此所以冐哀上書言國家事不以一心之戚而忘天下之憂庶乎四海生靈長見太平況今聖人當天四賢同德此千百年中言事之秋也然聖賢之朝豈資下士之補益乎蓋古之聖賢以芻蕘之談而成大美者多矣豈俟某引而質之況儒者之學非道不談某敢企仰萬一因擬議以言之皆今易行之事其未易行者某所不言也恭惟相府居百辟之首享萬鍾之厚夙興夜寐未始不欲安社稷躋富壽荅先帝之知致今上之美況聖賢存誠以萬靈爲心以萬物爲體思與天下同其安樂然非思之難致之難矣某竊覽前書見周漢之興聖賢共理使天下爲富爲壽數百年則當時致君者功可知矣周漢之衰姦雄競起使天下爲血爲肉數百年則當時致君者罪可知矣李唐之興也如周漢焉其衰也亦周漢焉自我宋之有天下也經之營之長之育之以至于太平累聖之功豈不大哉然否極者泰泰極者否天下之理如循環焉惟聖人設卦觀􅁚窮則變變則通通則乆非知變者其能乆乎此聖人作易之大㫖以授於理天下者也豈徒然哉今朝廷乆無憂矣天下乆太平矣兵乆弗用矣士曾未教矣中外方奢侈矣百姓反困窮矣朝廷無憂則苦言難入天下乆平則􅀝伏可畏兵乆弗用則武備不堅士曾未教則賢材不􅂶中外奢侈則國用無度百姓困窮則天下無恩苦言難入則國聽不聰矣􅀝伏可畏則姦雄或伺其時矣武備不堅則戎狄或乘其􅂩矣賢材不充則名器或假於人矣國用無度則民力巳竭矣天下無恩則􅀖本不固矣儻相府思變其道與國家磐固基本一旦王道復行使天下爲富爲壽數百年由今相府致君之功也儻不思變其道而但維持歲月一旦亂階復作使天下爲血爲肉數百年亦今相府􅀒天下之過也昔曹叅守蕭何之規以天下乆亂與人息肩而不敢有爲者權也今天下乆平修理政教制作禮樂以防微杜漸者道也張華事西晉之危而正人無徒故維持紀綱以延歲月而終不免禍以大亂天下今聖人在上老成在右豈取維持之功而忘磐固之道哉某竊謂相府報國致君之功正在乎固􅀖本厚民力重名器備戎狄杜姦雄明國聽也固􅀖本者在乎舉縣令擇郡守以救民之弊也厚民力者在乎復游散去冗僣以阜時之財也重名器者在乎愼選舉敦教育使代不乏材也備戎狄者在乎育將材實邉郡使夷不亂華也杜姦雄者在乎朝廷無過生靈無怨以絕亂之階也明國聽者在乎保直臣斥佞人以致君於有道也夫舉縣令擇郡長以救民之弊者何哉某觀今之縣令循例而授多非清識之士衰老者爲子孫之計則志在苞苴動皆徇巳少壯者恥州縣之職則政多苟且舉必近名故一邑之間簿書不精吏胥不畏徭役不均刑罰不中民利不作民害不去鰥寡不恤游墯不禁播蓻不增孝悌不勸以一邑觀之則四方縣政如此者十有七八焉而望王道之興不亦難乎某恐來代之書論得失者謂相府有不救其弊之過矣如之何使斯人之徒爲民父母以困窮其天下又朝廷乆有擇縣令郡長之議而不遂行者蓋思退人以禮不欲動多士之心故務因循而重改作也豈長世之䇿哉儻更張之際不失推恩又何損於仁乎今約天下令録自差京朝官外不過千數百貟自來郊天之恩鮮及州縣若天下令録自大禮以前滿十考者可成資日替與職官七考以上可滿日循其資俸除録事叅軍則縣令中昬邁常常之流可去數百人矣蓋職官録事叅軍不甚親民爲害亦細此謂退人以禮士豈有怨心哉其間課最可尚論薦頗多俟到銓衡别議疇賞前旣善退後當精選其判司簿尉不由薦舉初入令録之人並可注録事叅軍如無貟闕可授大縣簿尉仍賜令録之俸其曾任令録有過該恩合入本資者可依初入之例頒此數條入令者鮮然後委清望官於幕職判司簿尉中歷三考以上具理績舉充其川廣福建縣令可委轉運使等就近於判司簿尉中舉移庶從人便若此後諸處縣令特有課最可旌尚者宜就遷一官更留三載庶其宣政者可以成俗其僥倖者自從朝典如此行之三五年中天下縣政可澄清矣願相府爲天下生靈而行之爲國家盤固基本而思之不以聽芻蕘爲嫌而罷之則天下幸甚幸甚某又觀今之郡長鮮克盡心有尚迎送之勞有貪燕射之逸或急急於富貴之援或孜孜於子孫之計志不在政功焉及民以獄訟稍簡爲政成以教令不行爲坐鎭以移風易俗爲虚語以簡賢附勢爲知幾清素之人非縁囑而不薦貪黷之輩非寒素而不糺縱胥徒之姦尅寵風俗之奢僭況國有職制禁民越禮頒行巳乆莫能舉按使國家仁不足以及物義不足以禁非官實素飡民則菜色有恤鰥寡則指爲近名有抑權豪則目爲掇禍苟且之弊積習成風俾斯人之徒共理天下王道何從而興乎某恐來代之書論得失者亦謂聖朝有不救其弊之過矣然朝廷以黜陟郡長爲難者官有定制不欲動摇懼其招怨謗而速僥倖爾故知縣兩任例升同判同判兩任例升知州柰何在下之時飾身修名邀其清舉居上之後志滿才乏愆于素持止能偷安未至覆餗故賢愚同等清濁一致此乃朝廷避怨於上移虐於下俟其自敗民何以堪故鄭莊公伺共叔之自弊而春秋罪焉以其長惡也易曰履霜堅氷至由辨之不早辨也此聖人昭昭之訓豈用於先王而廢於今日者哉近年諸處郡長以贓致罪者數人皆貫盈之夫乆爲民患如此之􅀋至終不敗者豈止數人而巳乎雖轉運使提􅀧刑獄職在訪察其如位望相亞怨􅄷可敵非致敗露鮮敢發明宜乎論道之間激揚天下古者天子五載一巡皇上疑命于今六載矣以軍國重大未可行遠古之道今郊禮之餘宜宣大慶可於兩制以上密選賢明巡行諸道以興利除害黜幽陟明舒􅃤四方豈同常務可命御史嚴諭百僚與出使之官絕書刺徃還之禮仍翌日首塗以禁請託茍利天下大體何傷所出使之官宜以宣慶爲名安遠聽也其諸道知州同判耄者懦者貪者虐者輕而無法者墮而無政者皆可奏降以激尸素又四方得以上聞未舉巡守之禮而遣觀風之使非不典也然後委清望官於朝臣同判中舉諸郡長於朝臣知縣中舉諸同判今後同判之官非著顯效及有殊薦雖或乆次止可加恩郡國之符不當輕授其知縣之人入同判者宜比此例如此行之天下郡政其濫鮮矣今一司一務猶或舉官一郡之間生靈數萬反可輕授於人乎願相府爲天下生靈而行之爲國家盤固基本而行之不以聽芻蕘爲嫌而罷之天下幸甚幸甚某前所謂官有定制不欲動揺懼其招怨謗而速僥倖者兩宮聖人臨軒命使激揚善惡澄清天下何怨謗之有乎自兹以降非舉不授舉官之責厥典非輕何僥倖之有乎如所舉之人果成異政則宜旌尚舉主以勸來者聖朝未行此典蓋亦闕矣縣令長旣得其才然後復游散去冗僭以阜時之財者何哉某觀天下榖帛厥價翔起議者謂生靈旣庶使之然矣某謂生者旣庶則作者復衆豈旣衆之爲累哉蓋古者四民秦漢之下兵及緇黄共六民矣今又六民之中浮其業者不可勝紀此天下之大蠹也士有不稽古而禄農有不竭力而饑工多竒器以敗度商多竒貨以亂禁兵多冗而不急緇黄蕩而不制此則六民之浮不可勝紀而皆衣食於農者也如之何物不貴乎如之何農不困乎某謂穀帛之貴由其播蓻不增而資取者衆也金銀之貴由其制度不嚴而器用者衆也或謂資四夷之取而使之然則山川之所出與恩信之所給自可較之非某所敢知也今議更張之制繁細非一某敢略而陳之夫釋道之書以眞常爲性以清淨爲宗神而明之存乎其人智者尚難於言而況於民乎君子弗論者非今理天下之道也其徒繁穢不可不約今後天下童行可於本貫陳牒必詰其鄕黨苟有罪戾或父母在鮮人供養者勿從其請如巳受度而父母在别無子孫勿許方遊則民之父母鮮轉死於溝壑矣斯亦養惸獨助孝悌之風也其京師寺觀多招四方之人宜給本貫憑由乃許收録斯亦辨姦細復游散之要也其天下寺觀毎建殿塔蠧民之費動踰數萬止可完舊勿許創新斯亦與民阜財之端也又古者兵在於民且耕且戰秦漢之下官庫爲常貴武勇之精備征伐之急也今諸軍老弱之兵詎堪征伐旋降等級尚費資儲然國家至仁㫖在存活若詔諸軍年五十巳上有資産願還鄉里者一可聽之稍省軍儲復從人欲無所歸者自依舊典此去冗之一也又諸道巡檢所綂之卒皆本城役徒殊非武士使之禁􅁀十不當一而諸州常患兵少日旋招致榖帛之計其耗萬億以某觀之自京四嚮千里之間或多㓂盜蓋創置巡檢路分頗多而卒伍至羸捕掩無効非要害者宜悉罷之所存之處資以禁軍訓練旣精冦盗如取況千里之内抽􅀤非難又使少歷星霜不至驕惰彼無用之卒可減萬數庶使諸郡節於招致此去冗之次也又京畿三輔五百里内民田多􅂩農功未廣旣巳開導溝洫復須舉擇令長使詢訪父老研求利病數年之間力致富庶不破什一之稅繼以百萬之糴則江淮饋運庶幾減半挽舟之卒從而省焉此亦去冗之大也至於工之奇器敗先王之度商之奇貨亂國家之禁中外因之侈僣上下得以驕華宜乎大變澆漓申嚴制度使珠王寡用榖帛爲寳此又去僣豐財之本也今盛朝之代何事而不可行乎曩者國家禁泥金之飾乆未能絕一旦使命婦不服工人不作于今天下無敢衣者使其餘奢僣皆如泥金之法亦何患不禁乎又播蓻之家古皆督責今國家有勸農之名無勸農之實毎於春首則移文於郡郡移文於縣縣移文於鄕鄉矯報於縣縣矯報於郡郡矯報於使利害不察上下相􅀩豈朝廷之意乎若縣令郡長一變其人乃可詔書丁寧復游散之流抑工商之侈去士卒之冗勸稼穡之勤以周禮司徒之法約而行之使播者蓻者以時以度勤者惰者有勸有戒然後致天下富之壽之彼不我富不我夀者豈能革之哉此則厚民力固􅀖本之道也觀夫國風之七月小雅之甫田皆以農夫之慶爲王化之基豈聖人不思而述者乎故周漢李唐雖有禍亂而能中興者人未厭德作亂者不能革天下之心是􅀖本之固也六朝五代之亂鮮克中興者人厭其德弔民者有以革天下之心是􅀖本之不固也然則厚民力固􅀖本非舉縣令擇郡長則莫之行焉或謂舉擇令長乆則乏人亦何道以嗣之某謂用而不擇賢孰進焉擇而不教賢孰繼焉宜乎愼選舉之方則政無虚授敦教育之道則代不乏人今士材之間患不稽古委先王之典宗叔世之文詞多纎穢士惟偷淺言不及道心無存誠曁于入宮鮮於致化有出􅀋者豈易得哉中人之流浮沉必矣至于明經之士全暗指歸講議未甞聞威儀未甞學官于明上貽笑不暇責其能政百有一焉詩謂長育人材亦何道也古者庠序列于郡國王風云邁師道不振斯文銷散由聖朝之弗救乎當太平之朝不能教育俟何時而教育哉乃於選用之際患其才難亦由不務耕而求穫矣今春詔下禮闈凡修詞之人許存䇿論明經之士特與旌别天下之望翕然稱是其間所存䇿論不聞其誰激勸未明人將安信儻使呈試之日先䇿論以觀其大要次詩賦以觀其全才以大要定其去留以全才升其等級有講貫者别加考試人必強學副其精舉復當深思治本漸隆古道先於都督之郡復其學校之制約周官之法興闕里之俗辟文學􅁺以專其事敦之以詩書禮樂辨之以文行忠信必有良器蔚爲􅀖材況州縣之用乎夫庠序之興由三代之盛王也豈小道哉孟子謂得天下英材而教育之一樂也豈偶言哉行可數年士風丕變斯擇材之本致理之基也又李唐之盛常設制科所得大才將相非一使天下竒士學經綸之盛業爲􅀖家之大器亦䇿之上也先朝偶屬多務暫停此科今可毎因貢舉之時申其墜典必有國士繼於唐人豈非􅀖家之盛選歟勿謂未必得人遂廢其道此皆愼選舉敦教育之道亦何患乏人哉儻國家行此數事若今刑政之用心則無不成焉前代亂離鯨吞虎噬無􅁲世􅁲年之意故斯道乆缺反爲不急之務旣在陳平之朝當爲長乆之道豈如西􅀳之禍而有何公之嘆者乎願朝廷念祖宗之艱難相府建風化之基本一之日圖之二之日行之不以聽芻蕘爲嫌而罷之則天下幸甚幸甚至于嵓穴草澤之士或節義敦篤或文學高古宜崇聘召之禮以厚澆競之風國家近年羔鴈弗降或有考槃之舉不踰助教之命孝廉之士適以爲辱何敦勸之有乎又流外之官澄清未至㳂之則百姓受弊革之則諸司乏人將使群謗不興衆心知勸不􅀂敦仍舊之制加􅅄善之方自簿尉兩任有舉奏者許入録事叅軍録事叅軍有舉奏者許入職事官或換三班使臣旣有進身之階豈無畏法之志設使流内之人無遷進之望而能盡公者必亦鮮矣今後百司新入之人或采其藝能或出於仕族行藏必審考試必精避役之人無圖之􅀋嚴革其弊高爲之防旣激其流復澄其源亦何患流外之冗乎某又謂育將材實邉郡使夷不亂華者何哉蓋聞古之善禦戎者將不乏人則師戰而不衂邉不乏廪則城圍而不下狄疑且畏罔敢深入此劉漢所以長也不善禦戎者將在貴臣邉須遠饋故戰之則衂圍之則下狄無疑畏乗虚深入此石􅀳之所以亡也今兵乆不用未必爲福在開元之盛有函谷之敗可􅀛鑑矣何哉昔之戰者耄然巳老今之壯者囂而未戰聞名之將徃徃衰落豈無晚輩未聞邊功此必廟堂之所思也仍聞㳂邊諸將不謀方略不練士卒結援弭謗固禄求寵一旦急用萬無成功加以邊民未豐邊廪未實下武之際兵寡食足如屯大軍必煩逺饋則中原益困四夷益矯深入之虞未可量也于時廟堂之上雖有臯陶之謀伯益之贊不亦難乎夫天下禍福如人家道成於覆簣敗於疾雷聖朝豈恃其太平而輕其後計王衍之鑒豈曰不明清談之間坐受其弊蓋備之弗預知之弗爲許下之兵日血十萬豈不痛心哉今西北和好誠爲令圖安必慮危備則無患昔成周之盛王道如砥及觀周禮則大司馬陣戰之法粲然具存乃知禮樂之朝未甞廢武今孫吳之書禁而廢學苟有英傑受亦何疑且秦之焚書也將以愚其生人長保天下及其敗也陳勝吳廣豈讀書之人哉況前代名將皆洞逹天人嗣續忠孝將門出將史有言焉今將家子弟蔑聞韜鈐無所用心驕奢而巳文有武備此能備乎今可於忠孝之門搜智勇之器堪將材者密授兵略歷試邉任使其識山川之向背歷星霜之艱難一朝用之不甚顚沛十得三四不云盛乎至于四海九州必有壯士宜設武舉以收其遺唐郭子儀武舉所得者也斯可遺乎又臣僚之中素有才識可賜孫吳之書使知文武之方異日安邉多可指任此皆育將才之道也又㳂邉知同精加舉擇特授詔命專謀耕桑三五年間豐其軍廩此則實邊郡之道也將材旣育邊郡旣實師戰而不䘐城圍而不下狄疑且畏敢深入乎縱有搔動朝廷可高枕矣前代禦戎其䇿非一唐陸贄議縁邉備守之術請置本土之兵勤營田之利與今事宜相近可約而行也本土之兵者若今之北邉有雲翼招收之軍更可增致作爲竒兵至于營田之利宜常興作而加焉願相府爲國家安危思之五代之亂非遠也爲河朔生靈思之景德之前未乆也今相府勞一夕之思絕百代之耻無使中原見新覊之馬赤子入無知之俗則天下幸甚幸甚聖人曰㣲管仲吾其􅀍髪左袵又曰民到于今受其賜管仲覇臣也而能攘戎狄保華夏功高當時賜及來代況朝廷之盛德乎某又謂朝廷無過生靈無怨以絕亂之階者何哉蓋天下姦雄無代無之或窮爲夜舞或起爲大盗伺朝廷之過執以爲辭幸生靈之怨弔而稱義不然亦何名而動哉今明盛之朝豈有大過亦宜辨於毫末杜其堅氷或戚近撓權或土木耗國或禄賞未均或綱紀未修或任使未平斯亦過之漸也某敢小舉其失以言之國家戚近之人不可不約除拜之際宜量其才非曰惜恩懼乎致㓂􅀂力小任重則撓權亂法增朝廷之過啓姦雄之志易曰小人而乘君子之器盗思奪之矣所謂盗者其姦雄之謂乎今道路傳聞或緇黄之流或術藝之輩結託戚近邀求進貢或受恩賜或與官爵此撓權之漸矣可不畏乎夫賞罰者天下之衡鑑也衡鑑一私則天下之輕重妍醜從而亂焉此先王之所愼也又土木之興乆爲大蠧或謂土木之費出於内帑無傷財害民之弊故爲之而弗戒也某謂内帑之物出於生靈太祖皇帝以來深思遠慮聚之積之爲軍國急難之備非謟神侒佛之資也國家祈天永命之道豈在兹乎如洞眞壽寧之宮以延燎之災一夕逮盡豈非天意警在帝心示土木之所崇非神靈之所據也安可取民人膏血之利輟軍國急難之備奉有爲之惑冀無狀之福豈不誤哉一旦有蒼卒之憂須給賞之資雖欲重困生靈􅁀加率歛其可及乎此耗國之大也可不戒哉儻謂内藏豐盈用不可竭則日者黄河之役使數十州之人極力􅀒資奔走道路豈惜府庫之餘而不用之耶故土木之妖宜其悉罷豈相府之不言乎兩宮之不聽乎又文武百官之禄取兵荒五代之制或職輕禄重或職重禄輕重輕之間奔競者至大亨之世猶患不均豈聖朝之意乎所宜損之益之以建其極又今三司之官差除頗異禄賜弗輕何知弊而不言多養望以自進天下金穀決于羣胥掊克無厭取怨四海使先帝寛財之命弗逮于民和氣屢傷豐年寡遇曾不謂之過乎蓋由三司之官不制考限不責課最朝受此職夕求他官直云假塗相與匿禍天下受弊職此之由豈聖朝之意乎宜其别制考課重議賞罰激朝端之俊傑救天下之疲瘵其庶幾乎又古之勲臣賞延于世今則毎舉大慶必行此典自兩省以上奏薦子弟並爲京官比於庶僚亦旣優矣而特毎歲聖節各序子孫謂之賞延黷亂巳甚先王名器私假於人曾不謂之過乎非君危臣僣之朝何其姑息之如是耶遂使􅄻序之人塞于仕路曾未稽古使以司民國家患之屢有􅁵革然但革其下而不革其上節於彼而不節於此天下豈以爲然哉我相府豈惜一孺之恩不爲百辟之表乎又遠惡之官多在寒族權貴之子鮮離上國周旋百司之務懵昧四方之事況百司者朝廷之綱紀風教之戸牖咸在童孺曾無激揚使寺省之規剥牀至足公卿之嗣懷安敗名未甞試難何以致逺非獨招縉紳之議實亦玷鈞衡之公此則禄賞未均任使未平綱紀未修之􅀋也斯弊巳乆何可極乎惟我相府能革其弊能變其極而天下化成不爲難矣晉趙王倫石勒之徒心窺天子口責丞相豈非姦雄之人伺朝廷之過乎又今乆安之民不經塗炭勞則易怨擾則易驚猛將謀臣威信未著況邉民尚困邊廪尚乏苟有搔動饋運所艱武備未堅狄志可騁旣撓之以征戰或加之以饑饉生靈窮而姦雄奮迅鼓舞羣小血視千里此五代之鑒昭昭焉非止方冊之有云抑亦耳目之可接也我太祖皇帝亦甞有事四方勞於饋運而生靈不敢怨姦雄不敢動者何哉一則餘民乆在塗炭乍覩明盛如子得母縱有勞役未甚曩昔此生靈所以不敢怨也又當乘天開之運震神武之威征伐四方動如山壓況躬擐甲胄備甞艱難猛將如雲謀臣如雨此姦雄所以不敢動也所謂彼一時此一時爾今朝廷豈謂當時之易而不慮今時之難乎又謂保直臣斥佞人以致君於有道者何哉有若人未之病則苦口之藥鮮進焉國未之危則逆耳之言鮮用焉故佞人易進直臣易退其致君於有道也難哉及其旣病也藥必錯雜而進故鮮效焉及其旣危也言必錯雜而用故鮮功焉蓋佞人在矣直臣遠矣其悔之也難哉今朝廷乆安苦言而不用者􅀔使之然矣天深戒而不變者禍可畏矣伏聞京師去歳大水今歲大疫四方聞之莫不大憂此天之有以戒也豈徒然乎而京師之災甚於四方何哉蓋京師者政教之所出君相之所居也禍未盈而天未絕故鑒戒形焉不獨恐懼其心必使修省其政國家之德尚可隆天下之道尚可行也儻弗懼于心弗修于政漸盈于禍漸絕于天則國家四海將如何哉或謂國家之災由歷數之定非政教之出若如所論則夏禹九疇之書果妖言耶豈欲棄而焚之乎茍天下有善則歸諸巳天下有禍則歸諸天豈聖朝之用心願黜術士之言奉先王之訓必不謬矣必無過矣於保直臣斥佞人則兩宮二省之心如日星焉孰可蔽其明乎縱有行僞而堅言僞而辯試於行事人焉廋哉徃日不極言而今極言者學陋之人思慮未精又親安之時上懼失禄不幸親今亡矣朝廷或怒之自頂至踵惟忠也又何憂乎儻相府思變其道與國家作長乆之計固其基本一旦王道復行使天下爲富爲壽數百年則福在國家功在相府得與天下生靈長見太平幸甚幸甚竊以五代以來諸侯􅁀酷視民如芥生殺由之皇朝龍興典章一寛眞宗皇帝至仁如天盡心于此内則舉執法之吏外則創按刑之司徒流之間無敢差者若今於教化之道復如刑名之用心亦何患不至乎今縉紳之間多議按刑之司無益於外亦思之未深耳如得其人糺察四方絕斯民之􅁈恊先帝之志豈無益乎得人而巳不可謂川之旣平可壤其防也今王刑旣清王道可行此天下士人爲相府惜其時也或曰天下之事猶指諸掌豈相府弗克行乎亦在兩宫之意爾謂人主在上或喜怒生殺或好惡邪正則諫諍之際爲臣不易也􅀂乃修四方之政教正百司之綱紀澄清風俗相府之職也豈必兩宫之意乎儻相府疑某之言謂欲矯聖賢之知爲身名之計豈不能終喪之後爲歌爲頌潤色盛德以順美於時亦何必居喪上書俞越典禮進逆耳之說求終身之棄而自置於貧賤之地乎蓋所謂不敢以一心之戚而忘天下之憂是不爲身名之計明矣觀前代國家當其安也士人上言論興亡之道非聖主賢相則百不一采及其徃也則後之史臣收于簡䇿爲來代之鑒今日之言願相府采其一二爲國家天下之益不願後之史臣收于簡策爲來代之鑒狂斐之人誅赦惟命以廟堂深嚴恐不得上乃敢相門之下各致此書庶有一逹於聰明干犯台嚴下情無任惶恐激切之至不次某死罪惶恐再拜上資政晏侍郎書天聖八年月日具銜范某謹齋沭再拜上書于資政侍郎閤下某近者伏􅀩召問曾上封章言朝廷禮儀事果有之乎某甞辱不次之舉矧公家之事何敢欺黙因避席而對曰有之遽奉嚴教云爾豈憂國之人哉衆或議爾以非忠非直但好奇邀名而巳苟率易不已無乃爲舉者之累乎某方一二奉對公曰勿爲強辭某不敢犯大臣之威再拜而退退而思之則自疑而驚曰當公之知惟懼忠不如金石之堅直不如藥石之良才不爲天下之奇名不及㤗山之高未足副大賢人之清舉今乃一變爲尤能不自疑而驚乎且當公之知爲公之悔儻黙黙不辨則恐縉紳先生誚公之失舉也如此某何面目於門牆哉請露肝膂之萬一皆質於前志非敢左右其說惟公之采擇庶幾某進不爲賢人之疑退不爲賢人之累死生幸甚死生幸甚某天不賦智昧於幾㣲而但信聖人之書師古人之行上誠於君下誠於民韓愈自謂有憂天下之心繇是時政得失或甞言之豈所謂不知量也蓋聞昔者聖人求天下之言以共理天下於是命百官箴闕百工獻藝則大臣小臣無非諫也建善旌立諫鼓諮芻蕘采謡詠斯則何遠何近咸可言也此誠歷代令王懼上有所未聞下有所未逹特崇此道以致天下之言俾九重之深無所蔽也亦必憂國大臣懼義有所未從諫有所未上復廣此道以致天下之情冀萬乘之心有以動也某又聞事君有犯無隱有諫無訕殺其身有益於君則爲之衛顗曰非破家爲國殺身成君者誰能犯顔色觸忌諱建一言哉亦忠臣之分也而曰不在其位不謀其政者謂各司其局不相侵官如當二千石之位則不責尚書之政當尚書之位則不責三公之政非言路之謂矣又曰天下有道庶人不議蓋言有道之朝教化純􅀍則庶人無所議焉某登進士第由幕府歷宰字爲九卿之屬似非庶人敢不議乎如云遠不當諫則伯夷叩馬諫武王豈近臣哉太公謂之義士夫子稱其賢人曾不以遠而爲過乎至於頴考叔曹劌杜簣絃高魯仲連梅福之徒皆遠而謀國者也前史嘉之況國家以公之清舉置某于近閣同文館之列唐文皇於此延天下之才使多識前言徃行以諮政教之得失備廊廟之選用如朝廷延才之意不減於前則某事君於此非遠也又聞言未及而言謂之躁今國家詔百官轉對使明言聖躬之過失宰司之闕遺其不預轉對者俾實封章奏以聞則某非言未及而言也若以某好竒爲過則伊尹􅀒􅂦太公直釣仲尼誅侏儒以尊魯夷吾就縲絏而覇齊藺相如奪璧於強鄰諸葛亮邀主於弊廬陳湯矯制而大破單于祖逖誓江而克清中原房喬杖䇿於軍門姚崇臂鷹於渭上此前代聖賢非不竒也某患好之未至爾若以某邀名爲過則聖人崇名教而天下始勸莊叟云爲善無近名乃道家自全之說豈治天下者之意乎名教不崇則爲人君者謂堯舜不足慕桀紂不足畏爲人臣者謂八元不足尚四凶不足耻天下豈復有善人乎人不愛名則聖人之權去矣經曰立身揚名又曰善不積不足以成名又曰耻沒世而名不稱又曰榮名以爲寳是則教化之道無先於名三古聖賢何甞不著於名乎某患邀之未至爾某又聞天生蒸民各食其力惟士以有德可以安君可以庇民於是聖人率民以養士易曰不家食吉如其無德何食之有某官小禄㣲然歲受俸禄僅三十萬竊以中田一畆取粟不過一斛中稔之秋一斛所售不過三百金則千畆之􅀗可給三十萬以豐歉相半則某歲食二千畆之入矣其二千畆中播之耨之穫之歛之其用天之時地之利民之力多矣儻某無功而食則爲天之螟爲民之螣使􅀑神有知則爲身之殃爲子孫之患某今職在校讐務甚清素前編後簡海聚雲積其間荒唐詭妄之書十有七八朱紫未辨膏肓柰何某棲遲於斯絕無補益上莫救斯文之弊下無庇斯人之德誠無功而食矣所可薦於君者惟忠言耳況我國家以六合之廣四葉之盛撫旣濟之食防未然之幾兢兢持盈旰昊不暇謂今天下民庶而未富士薄而未教禮有所未格樂有所未諧多士之源有所未澄百司之綱有所未振兵輕而有所未練邉虚而有所未計賞罰或有所未一恩信或有所未充乃詔百官轉對其未預者並許封章此吾君盡心以虚受天下之言也亦天下君子盡心以助成王道之日也然獻言之初或有所賞於是浮淺僥覬之輩爭爲煩言或采其細而傷其大或誇其利而隱其害下冐上之寵而矯其辭上疑下之躁而輕其說此政教之大害也某遠觀五帝三王爵以尚德禄以報功未有賞其空言者至於舜俞禹拜惟重其言而行之逮夫春秋之時則有舉贒之賞唐文皇賞孫伏伽之諫以天下始定而權以進之未始乆行焉今朝廷必欲求有道之言在其擇而必行不在其誘於必賞言而無賞則眞有憂天下之心者不廢其進焉然後下不冐上之寵而直其辭上不疑下之躁而重其說此政教大利也某亦甞聞長者之餘論鬱于胷中而莫敢罄發者耻與浮淺僥覬之徒受上之疑於國門矣謀昨輒言國家冬至上壽之禮者斯言有罪必不疑其僥覬矣是故輕一死以重萬代之法請皇帝率親王皇族於内中上皇太后聖壽請詔宰臣率百僚於前殿上兩宮聖壽實無減皇太后尊崇之威又足存皇帝貴高之體蓋一人與親王皇族上壽於内則母子之義親君臣之禮異與百僚上壽於外則是行君臣之儀非敦母子之義在今兩宮慈聖仁孝之德而行此典則未見其損柰何後代必有舅族強熾竊此爲法以仰制人主者矣聖朝旣不能正之使後代忠臣何所執議先王制禮之心非萬世利則不行焉或五帝不相㳂樂三王不相襲禮此何泥於古乎某謂禮樂等數㳂革可移帝王名器乾坤定矣豈㳂革之可言哉􅀂謂某不知聖人之權則孔子何以謂􅀳文公譎而不正以臣召君不可以訓書曰天王狩于河陽是諱其權而正其禮也豈昧於權哉小臣昧死力言大臣未能力救苟誠爲今日之事未量後代之患豈小臣之狂言大臣之未思也某天拙之効不以富貴屈其身不以貧賤移其心儻進用於時必有甚於今者庶幾報公之清舉如求少言少過自全之士則滔滔乎天下皆是何必某之舉也夫天下之士有二黨焉其一曰我發必危言立必危行王道正直何用曲爲其一曰我遜言易入遜行易合人生安樂何用憂爲斯二黨者常交戰於天下天下理亂在二黨勝􅀒之間爾儻危言危行􅀗罪於時其徒皆結舌而去則人主蔽其聦大臣喪其助而遜言遜行之黨不戰而勝將浸盛於中外豈國家之福大臣之心乎人皆謂危言危行非遠害全身之謀此未思之甚矣使縉紳之人皆危其言行則致君於無過致民於無怨政教不墜禍患不起太平之下浩然無憂此遠害全身之大也使縉紳之人皆遜其言行則致君於過致民於怨政教日墜禍患日起大亂之下忷然何逃當此之時縱能遜言遜行豈遠害全身之得乎凡今之人生于太平非極深研幾豈斯言之信哉昔魏􅀳之亂哲人罹憂至有管寧之徒渉海而遁某今進危言於君親蹈危機於朝廷不猶愈於渉海之險而遁於異域者乎儻以其逺而盡心不謂之忠言而無隱不謂之直則而今而後未知所守矣惟公察某之辭求某之志謂尚可教則願不悔前日之舉而加平生之知使某罄誠於當時垂光於將來報德之心宜無窮巳儻察某之志如不可教則願昌言於朝以絕其進前奏旣巳免咎此書尚可議責使黜之辱之不爲賢人之累則某退藏其身省求其過不敢以一朝之責而忘平生之知報德之心亦無窮巳恭惟資政侍郎羽翼舊賢股肱近輔赫赫之猷天下所望願論道之餘一賜鑒慮與其進則天下如某之徒皆不召而進矣與其退則天下如某之徒皆不斥而自退矣決天下進退者其在公一言乎干犯台嚴不任戰懼之至不宣某再拜范文正公集卷第八
