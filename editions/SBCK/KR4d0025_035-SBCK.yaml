front:
  text: 范文正公鄱陽遺事録
  hash: sha256:7bfe7224c95ed00c44243a5a49b2ab073bbcd9f52a42fca22f27cf48bda98b26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_035-1a}
body:
  text: 慶朔堂蜀錦海棠郡齋春香虗靜亭九賢堂五老亭碧雲軒寳福候禱􅀨文筆峰硯池州學基秋香亭三祠堂長沙王廟記慶朔堂慶朔堂公之所剏也在州圃之北偏左瞰蜀錦右連流柸前古春香虗靜傍對湖光四望直見清心退思以正設㕔儀門之道基平而棟隆􅀔巍而氣壮公之意非所以示㳺玩也􅀅以承宣天子風教而發施於政令儀乎古諸侯藏朔焉所以題之曰慶朔而且親植花卉欄爲二壇公旣移潤是以作詩而紀之云慶朔堂前花自栽便移官去未曽開公景祐三年八月三日到任五年正月十三日移潤州年年憶着成離恨秪託春風管勾來後之人觀公之堂思公之政及公詩之來而爭和之以刋于石壁度支貟外郎提􅀧鑄錢魏兼史君去後堪思處慶朔堂前獨到來桃李無言爭不怨滿園紅白爲誰開職方貟外郎知饒州畢亰花木還依舊徑栽春園不惜爲時開幾多民俗熈熈樂似到老聃臺上來祠部郎中提􅀧江東路刑獄公事陳希亮弱柳竒花遞間栽紅芳緑翠對時開主人當日辜真賞䰟夣還應屡到來供備庫副使同提􅀧江東刑獄公事曹涇池舘名花舊日栽幾畨零落又春開誰人解識紅芳意猶有多情五馬來噫世之人常以絳之園亭爲最而鄧之百花洲抑爲其冠若銭塘有美烏程碧瀾瑯瑯醉翁貴池弄水率爲士大夫之所矜愛者然以公之慶朔名著乎建康廣信雖愚夫稚子莫不知尚頌念之非公之仁德惠澤流播于風俗間安及於此哉蜀錦海棠公慶朔堂詩云慶朔堂前花自栽今堂之東南隅有海棠二樹東西各一夾植于小徑兩傍說者皆曰公之所栽也得無詩之謂哉公去饒殆六十載度其高巳丈餘而蟠結之隂復四五㝷春陽之布如錦綉然元祐末太守鄒公軻惜其無臨賞休息之所遂築亭其後題日蜀錦盖海棠本蜀植也而花開猶錦綉推而名焉殆非愛公之流風遺澤而充擴自㘽之句耶郡齋公守饒凡十有八月移潤而饒爲繁劇之郡民頑好闘吏狡多梗公下車興庠序曉教令待賢愛物壹以愷悌終日無事故常留題曰三出專城􅁂似絲公自河中府通判移陳州後爲右司諫岀知陸州後徙蘇又知饒是三專城也齋中蕭灑過禪師齋之存今有飬正堂及黙軒飬正黙軒之名得非過禪師云毎踈歌酒縁多病公守饒飲宴有節然􅀉居過客無不得其歡心不􅀒雲山頼有詩公守饒多歌詠今之所有者有郡齋即事慶朔堂芝山寺五老亭及題昇上人碧雲軒并贈御賜名道圡鍾惟靜傳神道士程用之二絶句凡六篇半雨黃花秋賞徤郡有提􅀧鑄錢司廨宇㕔之傍有一亭盡種菊時提􅀧魏兼與公劇相得其亭名秋香公爲之作秋香亭賦黃花之句得無意於是乎一江明月夜歸遲人間禍福何湏道塞上衰翁也自知後之爲守者以饒之繁劇雖窮日力常懼其不治公處之有方而民樂於愷悌每閱公郡齋即事之詩必跂仰而談公之優㳺於政也春香虗靜亭春香虛靜分峙慶朔之前與二花檻並列傳云乃公之所建也慶朔之舊常爲宴賔之憇焉樂旣作於庭而卉木環抱得二亭揜映真娛樂之趣也求公之措置豈獨政事而巳哉雖應接細務必有法度而爲後人之矜式良足書也九賢堂州之後圃有堂焉四壁間圖陸襄虞溥二内史梁文謙周魴二太守并柳荘儀同馬植常侍李復刺史與顔魯公曁公凡九人因攷郡圗經若陸襄虞溥梁文謙周魴柳荘馬植李復俱以賢牧稱魯公止載於樂平縣乾元初􅀍中丞唐旻誣劾降知饒而雪程小娘遭冦屠害父兄事不厠於賢牧之列何賢者難得如此耶國家自開寳迄紹聖六十有八人而在九賢之序者惟公一人巳矣信夫人才不世出而公之仁德惠澤非㝷常侔也惜乎基隘而屋􅋻土隳而像泯余逼於受代不得從容而新之也命之曰九賢復録其始末爲記云噫建康古名郡府之後圃有瞻儀堂繪像者近百人人率爲之讃然明其新舊年月而巳猶饒之㕔壁記焉安如九賢之必以德乎五老亭五老峰廬山之勝也饒去江殆數百里而州北芝山院危坡屹起晴霽間可以瞰焉公下車怜其可觀乃作題芝山寺詩云樓殿冠崔嵬靈芝安在哉雲飛過江去花落入城來寺去州城止三里得食鴉朝聚聞經虎夜􅅆偶臨西閣望五老在寺之西五老夕陽開寺僧遂作五老亭于危坡之頂饒之人寒食以芝山爲踏青所至者必曰范公五老亭也碧雲軒碧雲軒芝山寺海㑹堂後之小軒也外瞰危石中鏁幽檻軒簷之庭栽列花木蘭蘆諸藥似有高人逹士趣嚮公守饒時有昇上人占居此軒公毎到寺必適其處愛其閑寂蕭灑常爲之留題曰愛此詩家好幽軒絶世紛澄霄半牀月淡曉數峰雲逺意經年就㣲吟並舎聞只應虗靜處所得自蘭芬公移潤而饒人矜公之詩有以二南名者盖見公之辭騷雅且名重當世足以爲後人稱想有以然也今之人􅂊逰芝山莫不㝷傃其所以閱公之詩榜焉噫鄱陽境上如德興之聚逺餘干之于越興薦福之澄心開福之寒林幾二千首獨公之詩爲士大夫所膾䏑而饒人惇尚之非公之名重當世而政著於去思何以臻此耶寳福侯禱􅀨寳福侯乃漢之樊噲也舊廟于芝山之頂曰鹿頭大王公守饒凡民間旱即禱於此神頗有驗應今之廟地公之所徙也且州之民邵都院者􅁲其地置生墳公一日入院詰其故乃曰五十年後當出侯伯不得鬻於人於是令移鹿頭廟屋於此復移文干僧寺曁元豐庚申太守馬淵以久不􅀨因禱於神而霶霈沾足遂状其感應而奏之乞加旌奨朝廷下太常封爲寳福侯淵之奏陳且道公之請􅀨有功修飾廟貌迄今血食以景祐迄元豐恰五十年公之先知誠可尚也後之人凡入寺見其廟必指之曰范文正公之遷而五十年出侯伯處也文筆峰硯池饒之山水大率秀㧞有豪傑者出焉公之至識其形勝一日乃曰妙果禪院一塔高峙當城之東南屹起千餘赤饒之文章應也城之下枕瞰數湖水脉連秀抑爲儒者滋顯也於是名其塔爲文筆峰目其湖爲硯池且曰二十年後當出狀元逮治平乙巳州人彭尚書汝礪果第一人及第公之沉幾逺識良足書也州學基公所謂妙果浮圗爲文筆峰東湖爲硯池而郡學之基乃占文筆硯池之中而公指之也然其當州城之巽地周環枕湖水長堤數里林木揜映坡麓森爽學旣建而生徒日盛牓牓有登第者多巍科異等信夫公之興剏非唯示法於一時能爲典刑於後世者也噫饒之學自晉虞溥作敎諭以招誘士子數歳間聚徒幾二三千爾後零散儒風挑撻由公遷指基址今殆四千人公之德惠豈㝷常之比哉惜乎公去之速未及建立而規模不甚宏齋宇不甚整迄今見者之歎惜而學者之歎念焉堂之上所以置公之祠而朝夕瞻敬者盖不忘公之指擇也秋香亭鄭公之後􅀆宜其百禄使于南國􅀆鏗金粹玉􅀝大斾於江干掲高亭於山麓江無煙而煉囘山有嵐而屏矗一朝賞心千里在目時也秋風起􅀆寥寥寒林脫􅀆蕭蕭有翠皆歇無紅可凋獨有佳菊弗冶弗夭采采亭際可以卒歳畜金行之勁性賦土爰之甘味氣驕松筠香㓕蘭蕙露溥溥以見滋霜肅肅而敢避其芳其好胡然不早歳寒後知殊小人之草黃中通理得君子之道飲者忘醉而餌者忘老公曰時哉時哉我賔我來緩汎遲歌如春登臺歌曰賦高亭􅀆盤桓美秋香而酡顔望飛鴻􅀆􅄀㝠愛白雲之閑閑又歌曰曽不知吾曹者將與夫謝安不可盡歡而聿去乎東山又不知將與夫劉伶不可復醒而蔑聞乎雷霆豈無可而不可􅀆一逍遥以皆寜范文正景祐間罷天章閣待制守鄱陽爲提􅀧鑄錢魏侯作此賦公賦之就攷其景趣求其意思宛在目下公之製作信非苟成也必其成法以矜後世古人云賦體物而瀏亮者乃公之所能賦也今其舊址雖易爲征官所居而提􅀧之别􅅟於大㕔之東偏傍猶以秋香名是不忘公之所愛也元祐癸酉太守鄒軻閱公之舊址而看經院之南芟剗蕪穢修平坡壠剏以廊宇以發公之所用心不幸鳩工而亡得無公之遺事在人而不衰乎漢晉而降迄于聖朝守饒者無慮千餘人今之立祠祭享者止公一人而巳矣信乎公之德澤惠愛逺出今古而爲民去思也且饒之所立祠班春堂天慶觀州學講堂凡三處春秋祭賽禱晴􅀨及州官之到罷皆修敬不絶若學講堂毎遇上下釋莫亦具禮祝公之功德豈數百歳而泯耶愚以召棠歌頌北焉者盖適於此也長沙王廟記長沙王廼吳王芮也東漢建安十五年吳大帝時張昭等議以䂊章土廣人繁請分置廬陵鄱陽二郡初治部故城後徙吳芮即今所治立長沙廟貌得非縁於此哉且饒之爲國殆千餘年而廟不立公之守饒始建焉然公之窮古尚德好賢樂善之心豈尋常人也今攷諸碑而刻其傳賛以歳月列公之名衘復命提􅀧鑄錢魏兼􅂐額且使賢令嗣監簿純佑書公之遺跡尤足矜後人也范文正公鄱陽遺事録終遺跡詩曰蔽芾甘棠勿剪勿伐召伯所苃是雖召公之德教明於南國亦足見人心天理之所在盛德至善果能使民之不能忘也文正公之勲德􅀍於海宇凡平生所至之地後人皆爲立名號建祠宇以示不忘迄今三百餘年敬慕猶昔是豈人力之所致哉於此見窮天地亘萬古斯民好善之心猶一日第患在上者不能以善政感發之耳是故􅀔力非所以服人貴富不足以傳久惟盛德大業可以服人心而垂後世觀者其亦有省於斯百花洲在南陽公集有荅王叔源憶百花洲詩洲上有文正祠黄山谷先生嘗㳺百花洲謁文正公祠有詩東溪書院在澧州初公幼時侍其父朱文翰宰安鄕縣讀書此地後爲文正公讀書堂寳慶丙戌知州董與幾建東溪書院西溪書院在泰州海陵縣西溪鎮􅀄公監西溪塩倉築捍海隄二百餘里人懐其惠旣爲立廟邑士姜國英復請于官中書送禮部議舊有祠堂委係前賢合設書院宜從所請忠烈廟在慶州宣和中宇文虗中爲慶帥建與种世衡同祀公廟號忠烈世衡廟號威靖景范樓在鄧州古牙城公嘗知鄧州􅀖人思之建景范樓思范亭在廣德司理㕔詳見孫莘老詩及汪浮溪樓鑰祠堂記清風槗在潤州公知潤州時所建范公栢在番陽郡學凡十八株俗傳公遺言栢及地則吾再出今栢枝去地不及二尺嚴子陵祠堂公知睦州日建以祠子陵今爲釣臺書院内有公祠堂讀山在池州青陽縣東十五里長山公幼讀書之地人名之曰讀山後建文正祠堂池人以公随所飬父淄州長史朱文翰之長白山非讀書於長白山所謂長山者乃在此而非淄州之長山也紹定二年池州郡守丁黼記之有辨甚詳亦未暇考平江府文正公祠宋咸淳間太守潜􅀃友建撥官田以供祠事旣成以聞于省依所請其東爲范文正公坊其西則文正公故宅喬木森蔚巋然故家其南則爲范家園有石刻太守李大異書國朝至元􅀄平江路學官衘中皆帶提督范祠祠設教諭至今毎歳春秋二丁郡官致祭㙜省諸司官因事按吳者皆與祭凡逹官顯人過吳必拜謁祠下其題名具在吳郡學本文正公南園也公以南園爲郡學後公仲子持節按吳復加增廣至今郡學爲浙中之􅆟學有文正公祠以范氏子孫一人爲主祠褒賢寺在洛陽文正公忠宣公墓在其地是寺爲奉祠之所内有仁宗所􅂐褒賢碑吳中子孫亦常遣人至洛陽致祭其寺僧亦常來吳褒賢顯忠禪院重修法堂記奉議大夫前同知歸德尹事賜紫金魚袋蔡如撰并書昔佛成道坐於菩提樹下化力風行峰象頭山入王舎大城瓶沙王御于郊野因以迦蘭陀竹園爲佛寳舎伽藍之興自此始也漢明帝夢金人項佩日光飛于殿庭乃遣蔡愔秦景使大月氐與攝摩騰笁蘭遇焉二沙門入于洛獻釋迦圖像并諸經於是肇有寺於洛城佛法入中國自此始也由漢至唐由唐至宋悉加崇奉故此禪院創自李唐初名法㑹宋元祐間范文正相公得請于朝改號褒賢顯忠經靖康亂法堂火灾有慧照大師福渙來住斯刹四方敬信徒衆歸依時河南􅀄定人烟稀少師乃振錫渡大河登太行抵金臺勸化鄉黨仁彦智夫得金以歸命工伐木造瓦重建法堂一所水磨兩􅋥修葺􅁦漏煥然􅂦新招來客所廣闢田疇倉廩實矣齋粥衍矣􅆊香芬藹法喜禪恱嗚呼無􅄌悲之德者昧於苦樂不能興是事無喜捨之心者著於慳貪不能結此縁無頴悟之識者樂於小法不能成此大惟師脩行四無量法惟師叅悟佛光真諦是以名逹天庭禮納使相住持向太后功德寺太觀宣和間聲名籍甚今行年八十有七而能辨此一大事因縁可以見其平昔之志丁卯仲冬師來訪知足居士曰本院修造於皇統乙丑至丙寅仲夏畢功未有爲我記者敢請居士爲記其事以示後人居士唯然願樂書之皇統七年十一月十三日記住持傳法慧照大師福渙立裴卞刋尚書禮部牒准元祐三年月日辰時到部門下省送下中書禮部奏准都省批下太中大夫尚書右僕射兼中書侍郎上柱國范純仁状近奉㫖授尚書右僕射合依例置度僧追薦先祖純仁先祖母及父塟在河南府河南縣有功德褒賢禪院今欲乞兩遇節於夲院添剃度行者一名祖以上並塟蘇州天平山白雲寺亦乞兩遇節添剃度行者一名其兩䖏每一年度一名申尚書省伏乞依例施行状前批送禮部奉乞請一依指揮施行者右下褒賢院仰一依前項禮部牒内㫖指揮施行元祐三年七月初三日范文正公旣􅌾而墓隧之碑乃立嘉祐元年仲兄右丞相時爲著作郎以國朝故事大臣塋所恩許置寺度僧遂請于朝願以彭婆鎮舊法㑹院改賜名額間歳聽度一僧以嚴崇奉朝廷從之元祐元年仲兄進貳樞府三年乃登相位兩以例恩皆得増度僧數它日院之度僧道因請以始末詔㫖刻諸石余旣許之又爲書其所以然者元祐四年月六日左朝請郎充寳文閣待制環慶路經略安撫使兼馬歩軍都揔管兼知慶州軍州事范純粹記至大二年四月七世孫􅀖瑞遣八世孫國雋宗俊宗是賫江浙行省咨咨河南行省河南省劄付河南府路委自同知徐景儒率属僚詣墓加禮致祭先文正公墓下祭文昔吾范氏始於陶唐根夲深固奕葉流芳漢有淸詔郡國流行唐有春官鳯闕平章世家河南譜係甚詳咸通以後一枝渡江爰居度䖏闔閭舊􅀖麗水哦松誥牒猶蔵子孫保之爲今甘棠四世而後文正挺生少長北地即家頴昌學問淵海聞望珪璋條奏十事嘉謀孔彰昭陵注􅀝國之棟梁四子顯貴悉稱元良監簿忠宣恭獻侍郎封胡羯末華蕚相光父子勲業巍巍煌煌具載信史代曰無􅀟化窮數盡玉蔵洛陽佳城欝欝拱木蒼蒼炎運中㣲紐解皇綱地維云絶南北異疆市無寕居後昆徬徨離湯沐之故邑不復敬止於梓桑别祖父之先塋不克時奉於烝嘗狐兔得以出没荆榛從而蕪荒多歷年所幾易星霜丘壠寥閴風悲白楊瞻望弗及念切羮墻坤軸旋轉咸歸職方車同􅁤轍衢出康荘農敬松楸匍匐踉蹡恭拜墓下我心則降目想英靈如侍其旁有肴在爼有酒在觴幽􅄀感格歆子馨香福我後人地久天長歸拜辭墓文某等自高祖曽祖祖父不􅀗拜省始祖祖禰墓域者又四世矣抱恨終天齎志而歿􅀔使然也時使然也柰之何哉今則天道好還地軸旋轉南北坦塗離而復合機㑹之來間不容髪某等匍匐至此恭拜墓下剪其荆􅁄上以慰祖宗属望之霛下以盡子孫追逺之責先憂後樂不墜成訓至若􅗲福後人悃愊已露不敢再犯瀆告之戒祀事告畢言還言歸囘塗寕止不能無望吾祖宗之黙相也敢告天平山在吳縣西去吳郡城二十七里其山峰巒峭抜石皆卓立與他山絶異其山上有龍門頭陀岩五丈石蟾蜍石龍頭石穿山洞卓茟峰飛來峰半山亭小石屋大石屋烏􅀛石釣魚石卧龍石照湖鏡等石白雲泉在天平半山間泉色如乳四時不竭以烹茗甚佳泉側有石刻白樂天詩文正公及蘇子美俱有詩泉之上今爲白雲亭喬木環合高據重崖俯見平野數十里間如指諸掌橫山諸峰羅列面拱誠佳致也白雲寺在天平山下右石刻刺史白居易詩慶曆四年文正公奏本家松楸在此實籍此寺照管請賜額爲白雲寺盖以白雲泉而名也寺有無量壽佛閣住山僧逺禪師嘗與忠宣公登其上講經乾道丅亥汎舟逰山録周益公五月丁亥早范至能顔休文相别於閶門外唐致逺聯舟遶城望姑蘇舘而過八里至橫塘又數里至黃山又數里過木瀆遂至靈岩院至能走价送薫香松黃新茶其簡云來日登天平頂攀援至逺公亭及諸石屏䖏白雲泉泉在水品其色凝白盖乳泉也張又新以虎丘石井松江在第三第六而下此泉未知如何試一别之向夀老欲作亭泉上及别築逺公亭寺右上山路傍有石􅀛極形似向亦有名近無知者忠烈廟具有文正已下􅀞像挂壁謁之丙辰早升小車過天平下嶺甚峻約數里至白雲寺圖經云唐寳曆二年置在縣西南二十五里本逺錄公道塲今爲范文正公功德院文正父祖􅌾山下寺有白樂天蘇子美王君玉􅃽希魯詩刻欲同致逺登山而脚力頓疲難之然思至能簡中語恐遺恨它年遂奮衣右轉而上酌白雲泉甚白而甘躡石磴至卓茟峰峰高數丈截然立雙石之上附著甚􅑶臲疑其􅀅墜餘如屏如矗或挿或􅀝備極竒恠行十六七石愈衆而力愈憊廼循左徑訪石屋三面壁立覆以二大石少休其中下至小石屋一石覆之又下至飛來峰高二丈上銳下侈㣲附磐石前臨崖谷兹其異也又東下逺公菴一名望湖臺正直寺後又下至五丈石亦閣石上次至頭陁岩有盖斜蔽之次至􅀛石脊􅀔隱起名不虗得此山大抵皆石也瑰形詭状可喜可愕今日適疲倦又當暑不能窮其㒹然郡人能至予之所至者寡矣况㳺客乎歸寺欲拜文正及四子畫像坐待魚鑰移時乃至明日盖文正忌辰也䟦龍門二大字天平之龍門卓茟殆似造物者特爲范文正公而設淛西提刑旴江包恢請史校勘桐江楊德藻作㳺天平山記中吳之西山天平山爲之長實爲呉鎮原隰環之江河絡之其上多恠石如凘氷如琱木或立或僵或如介夫或如奔馬不可名状其木多松檜有泉出焉曰白雲之泉瀉於蒼崖激於巨石注於絶澗其聲如鳴玉其味甘冽是山也范魏公之祠在焉其祀用中牢魏公吳人有施於鄕黨德義至厚旣死而不殁故鉅公名卿高人韵士經由是􅀖莫不肅拜祠下顧瞻遺像而仰其休風夫玉藴石而山輝珠蔵淵而川媚况德義所加丘陵林麓有不増其高而發其耀者乎故兹山之勝抑其亦以其人也至元再元之歳冬十有二月江淛行省叅政孛木魯公徵拜翰林侍講學士於是郡守濟南張公亦拜吏部尚書趨朝有日適相遇也班荆語舊偕逰是山謁魏公之像臨白雲之泉翰林各賦詩七言四韵九思等屬而和之新除教授紹興路儒學范文英靜翁魏公八世孫也主奉祠事奉觴爲夀而請曰翰林擅詞宗於當代尙書􅀍遺愛於中吳雅道允叶嘉㑹難逢不載以文何以示後請爲之記將刻諸祠翰林以命九思固辭不􅀗因道先生遺德山林勝槩而附以兹㳺之歳月焉翰林名翀字子翬尚書名基字淵仲同逰者平江路捴管府判官楊時舉思明推官王大有廷秀經歷王諌仲正知事伯都彦實儒學教授􅃽伯昇進之玄明通道虚一先生趙嗣祺住持白雲寺沙門淨標爲文者奎章閣學士院叅書文林郎柯九思義學去天平山一里餘外有孔子廟内有文正公祠左右設敬身知本兩齋中爲清白堂詳見陵陽牟先生義學記太師墳文正公祖父唐國公周國公所塟在天平山之下其穴主天平正峯以秦臺山爲外門以橫山爲逺按環抱拱挹形􅀔甚竒按王氏語録徐忠翊嘗遇一好山水心期爲公相之地意謂我方以術求售於時待其克應於幾十年之後孰若待應於不數年之間則人信向我方身享其利故必擇人與之不肯輕􅂌且如公相之材非里巷所有必於輦轂之下四方賢英畢集之地求之寓京師七年始遇范文正公以品官詣禮部徐識大貴也欣然以地圖授之范謝徐以相見之晩適先柩巳塋四年矣慕徐名術發圖視之則形􅀔向背全􅀋其所􅌾之地其地名又合范遣份約徐同徃觀之其穴法之高下向背皆與術􅆻惟窖堂太深猶是俗術䂓爲即斷曰公相當自此生巳生者去公相一間耳歸而與范曰足下優㳺致身於叅樞之地歟然范嘗吟中秋月詩曰巳知千里共猶訝一分虧事皆黙契後范子果拜相即堯夫也秦䑓山在天平山之右大石巉崒上刻秦䑓二字俗傳奏始皇㳺㑹稽嘗到此太師墳公曽祖徐國公所􅌾在天平山之南正與靈巖山相對無外居士墳在白雲寺前居士亦文正諸孫即作元夕寳􅂦現詞者范文穆公石湖先生墓在天平山之西南有覺巖寺爲奉祠之所文穆公居石湖而塟於此意欲自附於天平之范者歟吳縣忠烈廟在白雲寺之右宋南渡慶州隔絶置忠烈廟於此至今毎歳郡官致祭凡名公鉅卿之來吳者多詣天平謁拜廟下卧雲書院在天平南三里有恠松屈盤於地偃蹇數畒極爲竒古俗名眠松旁有石刻盤松二大字􅂐文字畫甚古上有卧雲書院范氏建内有文正公及狄武襄公遺像醴泉寺在長白山麓文正公未第時讀書此山大德癸卯寺僧德榮始塑公像寺中中菴劉敏中有詩遺德榮刻諸石懐范樓在城東南南望羣山如畫至元癸巳春縣尹濟南安承務重建刻其詩及移名人詩石於其上黌堂嶺在㑹仙山之南以公嘗讀書於其上故名其有上書堂下書堂在黌堂嶺南十里許按劉仲元記云傍鄒邑山也黌堂䖏其東長白峙其南聖王諸山連峰委㑹於其西聖王之南有山曰㑹仙其峰壁立特起蒼翠可愛其中有堂故基曰書堂世傳以爲文正范公之别墅也又按魯昌祖創修祠堂記黌堂嶺徑北十里許㑹仙峰之巖公之下書堂遺龕在焉工部侍郎賈侯之荘在兹山之下仰公之德意欲創起祠堂於山之麓先出楮幣三十七貫文以􅂇工役之需監縣房侯唐卿未登仕版時慕公之爲人常有慷􅁣感歎之心斯任之來斯事正符宿昔之願勇於爲義黽勉從事無時或怠鳩工貿材經營之際縣尹石侯縣丞成侯主簿丘侯典史王國昌同心和􅂇之或曰山麓荒蕪祠堂雖就恐爲野火焚毀樵牧戲踐祠成乏香火之供反爲不敬何以勸善盍若少北二里許醴泉寺之巽隅高平爽塏興盖若何侯曰善仍以都目趙鑑弟趙銓孫克敬督其役興功於大德庚子秋七月至大德辛丑夏四月落成堂宇壮麗儀形儼然范公泉在青州洋溪皇祐中文正公帥青社有德於民而州之乾方洋溪醴泉出焉後人目之日范公泉詳見任城王所撰記文正公祠堂在長山縣治平三年知縣韓澤建撰記至正七年八月辛未朔越四日甲辰奉議大夫河南府路逹魯花赤也先不花奉議大夫河南府路同知郭文鼐承直郎河南府路判官董鉉將仕佐郎河南府路知事劉臣源河南府路照磨胡欽祖兹以故宋太師魏國文正范公八世孫文英謹遣男廷方不逺數千里省墓洛陽且復侵地某等仰公德澤之深逺感公裔孫之不忘其祖而媿吾有司弗克戒約甿􅀠之無知者因以潔牲淸酌之奠爲文以祭日惟公學貫天人材兼文武濟貧活族德澤過於晏嬰出將入相勲業擬於伊吕惟昭代之尚賢嘉不茹而不吐爰肇崇於祀典實名教之有補何甿􅀠之無知即丘墳而敢侮壤􅀣􅁀於斧斤域兆鞠爲禾􅎟犯􅃔憲而不䘏徒昏頑之是怙属裔孫之來斯増有司之媿􅀒認異代之松楸復侵犯於强禦戒樵牧於晨昏謹封藏於終古倘彼甿之不悔其斯言之是暏致薄奠以陳詞覺汗下之如􅀨尚饗祭丞相忠宣公維公世濟忠􅀡名昭日星眷茲洛土有崇其塋彼甿􅃖􅃖恣爲盗賊旣伐松楸又滋稼穡神雖未殛法實難容裔孫戾止爰復故封凢百丘壠莫之敢廢引公父子有功於世戒􅅚禁約責在有司繼今以徃孰敢弗祗崇酒於觴登肴於爼神其監之永安終古范氏復祖塋記天台陳基譔奉訓大夫江南諸道行御史䑓監察御史斡勒海夀書中奉大夫陜西諸道行御史䑓侍御史丁元􅂐額故宋太師魏國范文正公以上三世墳墓在吳縣之天平山至公之薨始􅁙洛陽萬安山母夫人謝氏之兆其子監簿忠宣恭獻侍郎以下三世皆祔焉中更靖康之亂子孫之在呉者弗􅀗以時展墓唯顧瞻山河北嚮流涕而已我世祖皇帝混一四海列聖相承誕敷文德而尤惓惓焉致意於古今忠臣烈士有功於名教者故公克與天下之名山大川前代之聖帝明王並登祀典毎嵗仲丁有司祇奉中牢致祭惟謹可謂盛矣然亦不過即天平之白雲以寓其髙山仰止之意而萬安之原至大中八世孫國俊僅一至其處同知徐君景孺爲復侵地亦存什一於千百自是又三十九年爲至正七年國俊從弟將仕佐郎文英謂其子崑山州教授廷方曰嗚呼自陵谷變遷以來故家喬木零落殆盡吾子孫幸生聖明以孝治天下之時慿藉餘澤食有義田居有義宅教有義塾凢養生送死可以無憾而祖宗二三百年之丘壠所恃以爲藏者鞠爲芻牧之區徐君所封亦巳侵削尚安在其爲子孫哉洛陽土風號爲近古豪民無知可以德化不可以力勝吾聞御史斡勒君允常居里第日以吾先文正公濟貧活族之仁自勉而僉事李君公平分應於洛又嘗執筆而爲公之傳者誠以狀白之必有以矜吾之志也廷方即日具資糧扉屨不逺數千里致其父之命於是李君首出俸金爲之倡斡勒君率郷黨與同知郭君文鼐判官董君鉉奉牲幣爲文以祭於墓下所謂豪民之無知者觀感而化卒復徐君所封之舊而其地以畝計者若干焉旣繚以周垣益之􅀣壌又築室六楹俾其甥趙氏廬其上甫竣事以基嘗與觀􅇼豆玉帛之盛使書之於石竊惟文正公以間生之氣王佐之才致位將相爲宋宗臣百世之下誦其詩讀其書者可以立忠信而尊君父興王道而致太平故其少而􅀠業長而從政所至之地遺愛不忘率繪像以爲祠刻銘以頌德顧是窀是穸在其父子平生䆠居衣冠禮樂之郷而使斧斤耒耜日相㝷於其中豈國家尸而祝之以待先賢之意乎繼自今兹爲子孫者如文英之不忘其本處里閈者如斡勒君之推尚古道居風紀者如李君之知所勸相爲有司者如郭君董君之克恭所事則萬安之松楸將人人爲之封殖益乆而不廢尙何斧斤耒耜之患乎哉公父子世濟忠直太史有傳神道有碑家乘有載兹不敢以瀆書書其復塋歳月以爲方來告云是歲丁亥十月丙子謹記嘉議大夫河南府路捴管兼本路諸軍奥魯捴管管内勸農事知河防事張明逺奉議大夫同知河南府路捴管府事郭文鼐承直郎河南府路捴管府判官董鉉􅀅仕佐郎河南府路捴管府知事劉巨源河南府路捴管府照磨胡欽祖昭勇大􅀅軍河南淮北蒙古軍都萬戸府都萬戸察罕帖穆爾昭毅大將軍河南淮北蒙古軍都萬戸府副都萬戸失里伯吉從仕郎河南淮北蒙古軍都萬戸府經歴兀訥罕知事郭仲禮提控按牘趙璋儒學敎授丁士恒學録蔡世責等立石蓮花堡在鎮戎軍西南與德勝堡相連又定川砦諸葛亮城皆在鎮戎界嘗有蕃賊至此公遣張建侯徃救應長武寨在涇州西賊㓂邊公與都監張肇部領軍馬離邠州取長武路徃涇州策應後又聞賊分軍囘奔保安軍上面公又差廵檢宋良蕃部廵檢趙明部領蕃漢軍馬徃長武把隘萬安鎮去保軍八十里􅀄延州有一􅀅軍馬在保安軍駐劄費用粮草供應不辦公乞􅀅保安軍所駐軍馬抽退於萬安鎮就食粮草却􅀅萬安鎮一􅀅軍馬抽退延州亦只八十里馬鋪寨通近後槗白豹寨毎有賊馬出來公脩此砦時兵馬不多只是據河西山坡特重下砦不與追逐其砦城十日内􅅺築并􅅺飾了當木波寨在環州正當賊來大川路惟頼諸寨蕃部熟戶同共防托公恐熟戶二心未可􅀝仗遂保舉种世衡知環州以牢籠蕃部定邊砦在環州公嘗令劉貽孫至此相度葫蘆泉一帶立寨接連鎮戎軍去處明珠滅臧二族在環州之西鎭戎之東二族之北有葫蘆泉公併兵於其地修起城砦招撫二族華池鳳川平戎三寨皆在慶州東平戎去延州德靜砦七十里華池去德靜一百一十里鳳川去德靜一百二十里公指揮慶州并諸寨並權住入中白米却告示客旅並令於東路延州接界平戎鎮􅄈價入中白米慶州路有美􅅺虐􅅺大抜城等䖏小砦公只差兵士百十人防托如賊馬大叚入冦便令歸側近大城寨内一䖏防守所貴不致枉䧟軍民人心稍安薄家荘在岢嵐軍火山軍之間公以火山軍城中無水兼地窄狹難守奏乞於中路薄家荘擇地共脩城砦東關城在岢嵐軍水砦外公以岢嵐城小􅀅東関城築作大城撿計到土工五十二萬七千九百四十五工神堂堡銀城寨在麟南五十里公令經略司相度興脩令人戸耕種住坐續脩神樹寨并堡子府州於鞋斜谷端正平等要害䖏置大寨兩坐又置堡子三坐篳篥城在秦州田况嘗請脩築公奏乞依田况所奏早賜指揮佛空平明珠等族所居公嘗令􅃽偕燒蕩其地族帳金明城在延州公奏議近重脩金明城且托得北面又東北廢却承平南安長寕白草等寨後東西四百里更無藩籬可以禦冦候金明城了方脩寛州以禦東北鳳川寨在慶州東城􅀍山坡直下臨注或有西賊圍閉矢石入城禦捍不下公牒李丕諒宋良同徃鳳川相度得本寨東烽火臺山上四面牢固及山脚下有好水泉可以置砦令弓箭手兵士等寅夜興工山上只築女􅉹四靣削崖近下低䖏築城圍入水泉續又牒本州通判范祥相度令新脩砦城分擘街巷修盖軍營倉房草場􅇬署及城上皆安置敵樓唐龍鎮與契丹對岸在府州之北豐州之東其東南火山軍對岸公奏乞招誘唐龍鎮七族人口故寛州在延州東北三程公言昨廢却承平塞門等砦惟此一䖏􅆟爲控扼蕃賊牒監脩官相度一併下手脩築後又奏乞以寛州城爲青澗城鄜城縣在鄜州南至同州河中府各四程北至鄜州兩程至延州五程公乞朝廷建鄜城縣爲軍以康定爲名管鄜城縣并於同州割一縣爲之属建倉敖營房所有同華河府苗稅於此送納後公又令知鄜州李丕諒相度丕諒差劉􅊞禮􅀅帶匠人徃鄜脩展城􅉹高一丈底濶四尺五寸靣收一尺五寸盖馬棚瓦舎三百間繫得馬二百疋安下得兵士四千五百人兼脩露圈二十八箇計度到二萬九百九十五工延州城在寛州東南四十里公嘗請於朝乞以延川縣爲延川城云彼中人烟不少更有井泉勝於寛州城肅逺馬嶺定邊永和安塞等砦在環州界􅀄諸寨城􅉹低下壕塹淺狹公牒環州那廂兵軍士及和雇人夫脩築細腰城公令􅃽偕等所築公又勘㑹本城至環州定邊砦三十七里西至鎮戎軍乾興寨六十里南至原州柳原鎮七十里量其地界逺近所脩城寨地土并側近蕃部元属環州兼本是環慶路擘畫脩建兼細腰城東北板井川是西賊來路在細腰城定邊寨之間係属環州地分緩急若有奔衝即須定邊砦與細腰城互相救援就環州節制甚順奏乞朝廷撥属環州萬安寨在延州西北徃保軍路中路舊無城砦公差周美郭慶楊麟部領延州膚施兩縣人戶并廂軍脩築計度到六萬一千六百五十七工并脩築敵樓戰棚豐林縣地在延州東二十五里就崖爲城青化鎮在延州東六十里公差陳永圗部領臨真豐林兩縣人戶脩築計二萬六千五百五十二工甘泉縣城在延州南八十里公差任世亰部坊州丹州人夫脩築計六萬五千三百四十五工承平砦在延州東北二百里在青澗城西八十里把截得承平川大路寨北大里河約六十里自來蕃族在大里河北居住公甞請復脩此砦以遏蕃賊不使過河云􅀄脩之時則部署司那兵馬大爲之備畢工之後只銷得二十人駐劄南安寨在延州東北二百七十里在青澗城正北七十里北至綏州四十里去無定河二十里公嘗欲脩之以其去水泉稍逺朱􅁻种世衡欲於青澗城北四十里啇舘鋪南安寨中路創脩一山寨栲栳砦在延州北八十里嘗爲賊所破公相度舊砦南五里地名龍平口興置一寨把截安逺塞門龍口川賊馬來路胡家川寨在延州􅀄胡􅁇諤乞脩鷂子城公差殿直楊麟興工麟州申稱計七萬四千工恐難了當公遂差推官何渉與胡􅁇諤相度於胡家川荘北靣書按山上脩築一砦計三萬三千餘工下面川口是德靖砦保安軍來路地􅀔委是要害只差本族熟戶人工官給口食并差廂軍三百人徃彼􅂇工三関城在延州公牒招討那撥諸州差到兵士五千人興脩義蓮鋪在延州康定二年四月公差使臣趕殺西賊抵此奪得人馬駱駞牛騾牢山驛新店驛在麟州至延州一百六十里間嘗因朝臣上言减廢公嘗與明鎬至此軍馬疲乏無支請草料去處公言鄜延路􅆟是屯兵去處日有軍馬及使命過徃遂牒延州脩􅀘二驛毎有過徃使命軍馬或遇晴明直到中路甘泉縣即支給一日口糧等物若遇􅀨雪及山河水漲即於新店牢山止宿葫蘆泉在環州定邊砦與鎮戎軍乹興寨相望八十之間爲義渠朝郍二郡之阻其南有明珠滅臧之族公嘗言能進兵㩀葫蘆泉爲城壘北㫁賊路則二族自安宜無異志後竟於此地築城招服明珠滅臧二族永洛城在朝郍之西秦庭之東公嘗奏言䇿應軍馬由儀隴二州十程始到如能進脩永洛城斷西賊入秦庭之路其利甚大非徒通諸路之勢因以張三軍之威者也
