front:
  text: 褒賢祠記卷之一
  hash: sha256:723c22c6bd976aae2efce8a4d22a76a0c060caceee90f9e4409e841a7b71b0dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_049-1a}
body:
  text: 淄州長山縣建范文正公祠堂記古之治天下所謂不賞而民勸者非謂絶而不賞之也賞一善而百善進也何哉自京師至於郡縣郡縣至於鄉黨其間有德行節義可稱者取而旌之爵於朝廷死表其門閭如此風俗莫不勉勵也漢唐之間雖不及於三代而以號為治者此道素行也且今之天下何異乎古之天下然而風俗未厚於古者得非此道之廢歟故文正公范希文之于於陵也豈特德行節義而巳矣夫公家世姑蘇幼而孤弱無父所怙而後隨其母氏來居兹土留而不出遂為邑人及其長也卓有所立鄉人竒之嘗廬於長白日自諷誦雖刻苦不睱每患其寡友一日超然遐舉四走方外求老師巨儒以成就其業不數歲間大通六籍聲名傾動當世祥符中㑹明天子詔天下舉賢者能者公素擅鄉閭之譽為卿大夫之所賔興一上而中殊科尋𥙷職任驟歷臺諫丕功碩惠加乎生民鯁議讜言許於當國天下之人無賢不肖不謀而同辭曰范公如登輔相太平可期及乎領邊郡握兵權談笑樽爼之間折衝方靣之難威聲逺布坐鎮獷俗以致疆場塵清投烽釋警虜不敢犯邊盜不敢入寇天子倚之如金湯視之如腹心何患乎西戎何憂乎北狄時以海內既安邦國無事乃擢二樞府參預機務天下之人歡然相語曰范公用矣但翹首跋足以俟太平爾公自是負上重責以謂其功不可亟成也必待馴致故其所為志在遠大移風易俗釐革頽弊下輯臣儀上禆衮聀欲行之以人而兾效於後也大易稱漸以正邦公實用之矣惜乎其不能終之而薨設使而終之則周召伊傅曷以加此嗚呼天之生公將以輔世功未及宣何速寡之詩云彼蒼者天殱我良人此之謂也公沒之後邑里無傳焉噫古之人有德行節義取而旌之猶能以厲其風俗况有功于天下者乎治平中澤出宰是邑訪公之跡得公之實因謂邑中諸君子曰范公爵位如此其逹功烈如此其顯豈非兹邑之勝事耶何久而不為之祠諸君從容而語曰今日之議允符夙昔之願蓋邑素有是心而患在位者未嘗注意既聞澤言翕然樂從爰飭􅎚人構堂宇命繪工圗儀形一之日二之日經始三之四之日告成財斂餘羡用不漁民既而修虔誠謁偉像洋洋乎如在使夫十室之民朝夕耳傾而目屬自非嵬瑣之類得無聲激薄者敦懦者立如是何患風俗不及古也故曰不賞而民勸謂此矣愚之所以建公祠者非止為乎公也為民也非止為乎民也為天下也澤竊邑兹久慙無異政聊𫐠其美以傳之後公之能事大參歐陽公褒賢之碑詳矣此不覼縷舉其梗槩而已治平二年三月四日記尚書虞部貟外郎知縣事上騎都尉賜緋魚袋韓澤𫐠將仕郎守縣尉兼主簿事劉鼎三班奉職監酒稅徐士安宣奉郎守殿中丞知縣事兼兵馬都􅐭郭槩同立石鄉貢進士王特篆額郊社齊郎韓郭仁書丹刋者董選范公泉記洪範五行一曰水混混然利物源泉為本飬老愈病醴泉為上昔宋皇祐中范文正公常帥青社有德於人而州之乾方洋溪醴泉出焉後人目之曰范公泉其與戴公山嚴公瀨邵伯塘鄭公渠埒美儷踪矣以經兵革遂致湮絶鞠為園𬞞踰五十載耆老過之靡不興嘆乃者連帥完顔公思欲發前賢之跡慰青人之意乃按圗志詢故老得其故處畚鍤清泉復出方池流溝作亭蓻木巨壑層城映帶左右屈曲靖深蕭然如屏蒼岩翠阜間又且築臺開軒西崖缺處招引西山秀色可攬朝烟夕霏四時有之物外勝絶紛綸坌集邦人萃止神明還觀滋液甘寒宜藥宜茶嗚呼物有否而泰物有塞而通醴泉之瑞感而應地不愛寶是造物之無盡藏也范公以善政致之于前今公復以善政致之于後前後相望如蹈一軌可謂異世同流者矣他日芝封趣公歸朝後人思之亦如思范公也古者思其人愛其樹僕於斯泉云城王撰南麓任詢書營丘王樞篆大定辛丑十一月朔輔國上將軍山東統軍使范文正公書堂記傍鄒邑山也黌山處其東長白峙其南聖王諸山連峯委㑹於其西聖王之南有山曰㑹仙其峰壁立特起蒼翠可愛其中有堂故基曰書堂世傅以為文正范公之别墅也公復有上書堂在㑹仙之南黌堂山之上黌堂之得名者亦以公嘗讀書於其上故也因為之嘆曰自開闢以來不知其幾千萬年矣而山之名由公而得自公而殁又幾三百年矣聞公之名其猶如生其果何似而然哉嘗試推公之出處矣憶昔公之始來居是山也非為棲身遁迹之舉必也讀天下書窮天下事以為天下之用耳其出也非為肥身榮家之計必也幼而學壯而行以伸平日之藴耳惟公有是心也故能一旦立於朝廷之上忠犯天顔恩流海內巋然為一代宗臣及其歿也復使斯人聞風而作興慕義而感動者然歟此公之德所以盛也仲元忝為邑人求遊堂下慨然有感於中乃為之歌曰鄒邑之陽兮聳列群山㑹仙特起兮秀色可餐有峰兮峨峨有水兮潺潺松風兮蕭颯白雲兮往還公之遊兮水曲公之居兮山顛公之誦兮林下公之歌兮雲間瞬千古兮易往仰高風兮莫攀德巍巍兮山之高心休休兮雲之間凛兮孤松之操淵兮巨浸之瀾誰復繼此遐踪兮躋斯民於夀域之安金國翰林學士劉仲元記池州范文正公祠堂記文正范公以徑飾大志盛德壯烈卓然為宋名臣凡䆠遊人懷其惠莫不有祠池陽雖非公所仕之地而亦祠之學宫蓋以其少長於長山朱氏也國史本傅及歐陽公撰神道碑俱云公生二歲而孤母貧無依改適長山朱氏然人漫不知長山為何地朱氏為何人而公之寓於其家幾何時也天台丁君木宰池之青陽政成暇日討究先賢遺事慨然慕之長山去縣僅十五里朱之族故在遂訪求其家得公之續譜遺墨及公與母謝夫人之畫像又從好古博雅之士根據其本末源流既畢委故人程君爚過黼而言曰將為祠堂願有𫐠焉黼謝不敢其請益堅有不得辭凡公之立言立功具載方冊不必贅叙獨以其在長山之事言之謹稽諸記録公之父墉從吳越錢氏入朝歷成德成信武寧軍掌書記以卒元妃陳氏繼室以謝氏其卒于徐也歸葬於吳中之天平山陳氏祔焉謝氏無以為生改適朱君文翰公生于端拱二年猶在襁褓而鞠於母朱氏云族有在應天府者故公以及冠辭母絶江逾淮學於應天蓋景德之末祥符之初也閲五六歲登進士第則在祥符之八年欲便親飬授廣德軍司理參軍迎母以往攝集慶軍節度推官辟泰州西溪鹽稅再辟興化縣令徙楚州糧料院母終于楚天聖五年公復如應天府晏元獻公知之表掌府學服除乃歸宗易名越明年晏公再薦召試為祕閣校理始克請于朝追贈父母遷奉母喪葬于河南尹樊里萬安山下參考歲月公之從朱姓幾四十年登科記用今氏名後人改之耳朱氏之譜則文翰以景德初嘗任淄州長史後以公贈興得太常博士公之手帖與博士之孫延之在明道二年乃改郡至丹陽時猶稱延之為秀才而待以子姪禮又一帖在慶曆五年者則稱之為官人蓋巳受公奏補而帖中頗及延之兄之子求異姓恩澤事由此觀之公留止往來長山歷時最久其親愛顧念朱氏情義最篤皆以母故也公之䆠遊遠者三四歲近者一二歲猶皆立祠長山獨無祠可乎此丁令君所以拳拳不能巳也放禮諏經法施於民以死勤事以勞定國能禦大灾能捍大患皆所宜祀公於數者殆無愧焉其神氣精爽如五行麗天芒寒色正不可晦蝕中國夷狄所共瞻仰豈特其平生經歷之處宜奉祠事而猶區區於是邑之長山者蓋祀國之大節邦政之所成可以興起人心可以扶持教化此不特為公設也祠堂擇地之爽塏且與朱氏附近為屋十楹有室以奉遺像有堂以嚴祭享有東西廂以居守祠者憩待祠者固以門扄繚以周垣夾道以松杉而直逹于通衢規模邃潔不侈不陋費從官給役不民勞委學聀王震董其成朱氏近族守其祀是亦可矣令君又云去長山數里有滕子京待制墓公與滕為同年進士生嘗薦諸朝死嘗銘其竁欲以配祀黼嘗聞公之守嚴修子陵祠而以唐隱士方干配况滕既竒才而公與之同時共事情好欵密以配公祠為宜遂并書以贊其决且諗來者勿廢云紹定二年九月二十有二日朝請大夫丁黼記增修范文正公祠記長白張臨撰太中大夫參議中書省事張飬浩題額奉訓大夫僉燕南河北道廉訪司事劉從禮書古今仕其貴同何古人聲震天下事業巍巍而後世不能也吁能者未必得為得為者未必能者也雖然能者不難其人得為者每難其峙文正公先生范公事業魏魏者屢進屢黜卒之擯斥難其時如此使先生終為之事業巍巍為何如嗚呼俗因五季之後廉耻道喪士昧出處賢不肖漫漶先生以剛大毅决之資拔出衆人之中進退超邁委靡之世為變尊王黜霸明義去利凛然有洙泗之風其後真儒輩出聖學復明如發洙泗之堙先生實指其處其可不謂之有功於聖門乎事業巍巍者不足為先生道長山視先生情北桑􅎚宋治平二年邑人韓澤知縣事首率邑中祠祀先生石刻無恙金亡祠燬至元巳卯邑士故江南河北道廉訪簽事韓居仁兄居貞唱邑中新之淫祠猖熾祈氓悉往先生祀為之寂然今膠州同知歷下莫侯文淵尹縣始舉祀典居貞洎今富寧庫同提舉王居敬偕邑中十餘巨姓助牲醴費距今三十餘年不輟朱氏賴先生庇猶奉灑掃居其傍縣為之蠲泛賦延祐六年寧夏子俊順昌監縣濟陽楊侯僖為尹滕陽左侯俌勾稽俱慕先生者也深以祠廢不治縣甚耻一日同謁祠下覩陊剝俱曰盍葺之各捐俸金若于邑士皆以楮鏹助忽楊侯遷西臺御史去子俊亦瓜代次年秋左侯偕繼政燕山蒙古忽台汴梁梁侯至始鳩匠腐者易之缺者補之危者崇之象服非者更之增內門三楹厨二楹東西陬木悉植柏左侯詣余曰先生記之惟先天下之憂而憂後天下之樂而樂孟子所謂樂以天下憂以天下先生志也士大夫居相君之位視天下赤子之樂不以人理待吮剝之困苦之乃曰吾能為君實倉廪充府庫聞先生之志如何故讀嶽陽樓記至此未嘗不三復莊誦久為之感慨承左侯之命余雖老不覺壯心如昔是以不讓樂為之書云至治元年八月己巳日記高郵軍興化縣重建濯纓亭記天聖間文正范公為是邦作濯纓亭於南溪之上賦詩曰笑解塵纓處滄浪無限清公之意豈特挹滄浪之清以滌我塵垢而巳邪君子目擊而道存矣中更兵燹蕩為莾區後有重建於稅務之南者尋亦圯廢耆老云鄉校前乃故址也余既甃適學之路即故址為亭而扁之以舊名亭並溪當邑東西之中眼界軒豁荷汀蘋渚鷗鷺翔集風帆露楫朝夕往來最物互變而俱宜草色際天緑液瀰漫則於春宜氷輪浮空商灝沆碭則於秋宜宜酷暑南薰徐來敻無鬲閡京徹肌骨宜隆寒黃蘆旅鴈粧點雪意如展畫啚凡是諸景昔也散漫而不屬今皆萃列於斯亭之上足以廣吾胸中之雲夢而助筆下之波瀾夫名所以詔是實也斯名也其義則夫子取之孟子屈子發明之而文正范公昭揭之青青子襟藏修之暇於是而逰息焉對景而自得因名而心㑹吾知是邦人物自今未易量矣紹興癸丑良月承直郎知高郵軍興化事苕溪吳華記并書冬至日修職郎主簿眉山孫之竒立石高郵軍興化縣滄浪清風記文正范公先生吾道之元氣也蓋夫子之道不行於春秋戰國而為萬世師公之道際運文明措之華夏而為萬世法興化最幸涵濡於相業問津之始嘉定十七年垓既建學以祠明年築城立四門門祠縣望南白馬將軍北金吾將軍東得勝龍母西昭陽君隂陽家之說龍角宜伉即城為樓樓獨軒偉公端冕學宫從夫子以詔多士矣想其晝日垂簾琴之清堯舜之曲也野渡橫舟纓之潔莘渭之志也清風徐來吟情夷猶滄浪之歌童舞冠詠瞻之仰之斯道如存其敢生一忽心乎敬像公燕遊書淸風鳴琴馴鷗三詩于壁而以滄浪清風名之垓之城化雜費取於酒蠧役先於湖嚙尺三㭖而杵千堵萬甎而匠百其能築斯城而祠公與羣望於門也亦公與神隂賜垓不敢忘永矢堅珉後之榷酤於斯譏征於斯栖旅於斯携妓於斯不畏神寧不畏公神之不豫禍止一時公之不子愧垂千古滄浪不足以洗其愆清風不足以掃其鄙可不戒哉鑰于學以嚴唘閉徑于學以杜遊邑士民與來者尚恪守之於是賦迎享送神之章誓以斯文而刻焉詞曰學以用世何幽明星斗千載炯所臨我文正公世典刑滄浪之水天與清水哉水哉濯吾纓衮衣赤舄同此心堯舜之曲宓子琴絃歌更入清風吟冠童風雩詠至今民懷吏聳神顧歆後二百年築斯城城高水濶峙孔庭侑公舍奠春秋丁公相我民金湯成四墉之望中耆英穹樓龍角甘棠隂芒寒色正欄更橫羣祠翼從森效靈鷗翔南溪恍逢迎月明滄州冉雲乘秋菊寒泉酹德馨儼如侍公敢不欽歌圍旅榻酤與征環而殛之咨爾神二三子兮同鑰扄嚴以公道折未萌公亦福汝邑里寧峨冠曵履龍崢嶸三山陳垓撰高郵軍興化縣重建縣學記詔天下州縣皆立學仁宗朝參知政事范公仲淹請也然國初文治巳盛如周黨遂有賢守今學校必興按泰州圖經曽易占建如皋縣學錢魯望記之實祥符八年時公為西溪鹽繼令興化興化如皋均泰邑也要終而原其始即彼而得於此正使學不待公而創非公所作成者耶垓後公二百載當嘉定十六年九月辛丑朏以祗事吉夫子一殿巋然與重門峙立於水天莽蒼中諸生謂垓令鄭簿章以公濯纓滄浪二亭故址為學學未備者十七八先生尚嗣成之垓謝不敏意此學之興必仁宗皇帝𥘉政公試民事之日也文明之運輔宰所臨學重於天下而士得師矣垓雖愚敢不力請無煩民無擾士以令始至供堂緍五百佐是役新第吳君應酉辱主學裒門殿餘緡千縣纍酤羡數月緡二萬有竒合三者鳩材庀工十七年春為崇化堂五間軒三挾二右官位左學職東西廊二十二前列從祀若土祠若祭器若書籍若錢榖皆有所後分四齊曰博文曰敏行曰貫忠曰篤信齊有爐亭殿加兩挾周以陛楯植扉中門列㦸十二東祠范公屋三鑿方池亭其對復濯纓名益東伉便門祠亦廡二總公厨湢溷創屋五十合門殿共六十區堂之崇二十尺袤一百三十尺翬棟沈沈他率稱是門納湖光城築之閣道連復清淑扶輿之氣萃焉明年夏五月以成增田架僦月割酒量錢十四𥙷弟子貟食日三十歲元正長至縣載酒三行闔耋艾與縣官序拜崇化堂㝎為比於是吳君率諸生請記之石垓嘗謂講學師友之職也興學守令之職也幸不乏事何記然垓嘗為學官永嘉昔語人者不敢不以告夫子曰十室之邑必有忠信如丘者不如丘之好學也孟子曰學則三代共之皆所以明人倫也學非外求也教非外立也忠信夫人之天姿人倫夫人之天性諸君以為外乎內乎上以學明之下以學成之而天之所以豫我我之所以日用常行者豈能越於忠信忠信又豈能越於君臣父子兄弟夫婦朋友之間哉我國家學以明人倫既同符於三代文正公忠信而好學又一本於夫子垓謂諸君得師者此也公刻苦而學成以忠信大節受知仁宗自西溪議海堰請邑興化以成之與京口之麥舟吳郡之義莊信也爭郭后抗吕相主西事而夏人欵塞登政路而身任太平忠也諸君拜公於鄉校得公於詠遊不以公自期得乎垓濫宰於斯勉焉不近築城浚河振貸扞禦修堤岸立義阡必賴諸君講行之詎無意哉詩曰高山仰止景行行止必以范公之學為學斯無負國家教飬天下之至恩允蹈孔孟垂世立訓之格言云寶慶元年七月甲子承議郎知高郵軍興化縣主管勸農營田公事賜緋魚袋三山陳垓謹記高郵軍興化縣重建范文正公祠堂記盛德必百世祀文正范公天聖間嘗宰興化遺德在民永久弗忘寶慶乙酉邑令三山漫翁陳君垓始創祠堂附于學之左歲久弊漏凛兮欲壓淮東總管高沙陸君元齡攝令年餘慨然捐錢市木甓撒而新之以舊祠在太成殿東兩廟並峙未當於禮乃徙堂基與齊堂並郡太守姜公聞而嘉之亦遣木材相其成凡為屋三楹前序稱是規模視昔頗高敞立棟於良月旦日之乙未工三旬而畢堊飾俱備邑庠士友舉酒慶成大發時以簿職領學事諗于衆曰昔文正公為士時巳有澤民之志每謂士當先天下之憂而憂後天下之樂而樂𥘉仕􅒾溪鎮官即請于朝築捍海堰為承楚泰三州民田無窮之利作小官時志慮力量已如此異時勳名滿宇宙皆自此發之觀大節必於細事觀立朝必於平日前輩謂士自一命以上苟存心於澤物皆可有濟吾儕學古入官當志文正公之志彼囊帛匱金笑與秩終身寵而載高位家肥而食厚祿止自為溫飽計念不及吾民者盍少愧哉維陸君暫為攝承又當邊事孔棘之時象弭魚服靡不日戒而能景慕先賢載立祠宇為前治邑者之所不暇為是可尚矣今特取文正公滄浪三詠濯纓亭兩詩刋諸石兼以漫翁祀公詩列置堂之東西以𥙷闕典用成陸君之美使後之登斯堂者景先哲之高風以勵壯志激滄浪之清波以滌塵襟鼓金玉之遺音以發幽趣廉貪立懦則五詩昭揭庶亦少補於世教云峕景定庚申長至日九華葉大發記
