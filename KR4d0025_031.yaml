front:
  text: 范文正公政府奏議上
  hash: sha256:21b3bb406d2578bd12fbf80e18188d767055379caf2300c088c8a2e22532e91d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_031-1a}
body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校治體答手詔條陳十事伏奉手詔今來用韓琦范仲淹富弼皆是中外人望不次拔擢韓琦暫往陜西范仲淹富弼皆在兩地所宜盡心為國家諸事建明不得顧避兼章得象等同心憂國足得商量如有當世急務可以施行者並須條列聞奏副朕拔擢之意者臣智不逮人術不通古豈足以奉大對然臣蒙陛下不次之擢預聞政事又詔意丁寧臣戰汗惶怖曾不獲讓臣聞歷代之政久皆有弊弊而不救禍亂必生何哉綱紀寖墮制度日削恩賞不節賦斂無度人情慘怨天禍暴起惟堯舜能通其變使民不倦易曰窮則變變則通通則久此言天下之理有所窮塞則思變通之道既能變通則成長久之業我國家革五代之亂富有四海垂八十年綱紀制度日削月侵官壅于下民困于外夷狄驕盛寇盜橫熾不可不更張以救之然則欲正其末必端其本欲清其流必澄其源臣敢約前代帝王之道求今朝祖宗之烈采其可行者條奏願陛下順天下之心力行此事庶幾法制有立綱紀再振則宗社靈長天下蒙福一曰眀黜陟臣觀書曰三載考績三考黜陟幽明然則堯舜之朝建官至少尚乃九載一遷必求成績而天下大化百世之後仰為帝範我祖宗朝文武百官皆無磨勘之例惟政能可旌者擢以不次無所稱者至老不遷故人人自勵以求績效今文資三年一遷武職五年一遷謂之磨勘不限內外不問勞逸賢不肖並進此豈堯舜黜陟幽明之意耶假如庶僚中有一賢於衆者理一郡縣領一務局思興利去害而有為也衆皆指為生事必嫉之沮之非之笑之稍有差失隨而擠陷故不肖者素餐尸祿安然而莫有為也雖愚暗鄙猥人莫齒之而三年一遷坐至卿監丞郎者歷歷皆是誰肯為陛下興公家之利救生民之病去政事之弊葺紀綱之壞哉利而不興則國虛病而不救則民怨弊而不去則小人得志壞而不葺則王者失賢不肖混淆請託僥幸遷易不巳中外苟且百事廢墮生民久其危耶至若在京百司金穀浩瀚權勢子弟長為占據苦群盜漸起勞陛下旰􅉴之憂者豈非官失其正而致有虛食廪祿待闕一二年者暨臨事局挾以勢力豈肯恪恭其職使祖宗根本之地綱紀日隳故在京官司有一貟闕則爭奪者數人其外任京朝官則有私居待闕動踰歲時往往到職之初便該磨勘一無勤效例蒙遷改此則人人因循不復奮勵之由也臣請特降詔書今後兩地臣僚有大功大善則特加爵命無大功大善更不非時進秩其理狀尋常而出者祇守本官不得更帶美職應京朝官在臺省館閣職任及在審刑大理寺開封府兩赤縣國子監諸王府并因保舉及選差監在京重難庫務者並須在任三周年即與磨勘若因陳乞并於中書審官院願在京差遣者與保舉選差不同並須勾當通計及五周年方得磨勘如此則權勢子弟肯就外任各知艱難亦有俊明之人因此樹立可以進用如今日巳前受在京差遣已勾當者且依舊日年限磨勘其未曾交割勾當却求外任者並聽其外任在京朝官到職勾當及三年者與磨勘內前任勾當年月日及公程日限并非因陳乞而移任在道月日及升朝官在京朝請月日並令通計其遠官近地勞逸不同并在假待闕及公程外住滯或因公事非時移替在道月日委有司别行定奪聞奏如任內有私罪并公罪徒以上者至該磨勘日具情理輕重别取進止其庶寮中有高才異行多所薦論或異略嘉謀為上信納者自有特恩改遷非磨勘之可滯也又外任善政著聞有補風化或纍訟之獄能辨冤沈或五次推勘人無翻訟或勸課農桑大獲美利或京城庫務能革大弊惜費巨萬者仰本轄保明聞奏下尚書省集議為衆所許則列狀上聞並與改官不隔磨勘或有異同各以所執取㫖出於聖斷仍請詔下審官院流內銓尚書考功應京朝官選人逐任得替明具較定考績結罪聞奏內有事狀猥濫并老疾愚昧之人不堪理民者别取進止巳上磨勘考績條件該說不盡者有司比類上聞如此則因循者拘考績之限特達者加不次之賞然後天下公家之利必興生民之病必救政事之弊必去綱紀之壞必葺人人自勸天下興治則前王之業祖宗之權復振於陛下之手矣其武臣磨勘年限委樞密院比附文資定奪聞奏二曰抑僥幸臣聞先王賞延于世諸侯有世子襲國公卿以德而任有襲爵者春秋譏之及漢之公卿有封爵而殁立一子為後者未聞餘子皆有爵命其次寵待大臣賜一子官者有之未聞每歲有自薦其子弟者祖宗之朝亦不過此自真宗皇帝以太平之樂與臣下共慶恩意漸廣大兩省至知雜御史以上每遇南郊并聖節各奏子充京官少卿監奏一子充試銜其正郎帶職貟外郎并諸路提點刑獄以上差遣者每遇南郊奏一子充齊郎其大兩省等官既奏得子充京官明異於庶僚大示區别復更每歲奏薦積成冗官假有任學士以上官經二十年者則一家兄弟子孫出京官二十人仍接次升朝此濫進之極也今百姓貧困冗官至多授任既輕政事不舉俸祿既廣刻剝不暇審官院常患充塞無闕可𥙷臣請特降詔書今後兩府并兩省官等遇大禮許奏一子充京官如奏弟姪骨肉即與試銜外每年聖節更不得陳乞如别有勳勞著聞于外非時賜一子官者繫自聖恩其轉運使及邉任文臣初除授後合奏得子弟身事者並候到任二年無遺闕方許陳乞如二年內非次移改者即許通計三年陳乞三司副使知雜御史少卿監以上並同兩省遇大禮各奏薦子孫其正郎帶館職貟外郎并省府推判官外任提點刑獄以上遇大禮合該奏薦子孫者須是在任及二周年方得陳乞巳上有該說不盡者委有司比類聞奏如此則內外朝臣各務久於其職不為苟且之政兼抑躁動之心亦免子弟充塞銓曹與孤寒爭路輕忽郡縣使生民受弊其武臣入邊上差遣并大禮合奏薦子弟者乞下樞密院詳定比類聞奏又國家開文館延天下英才使之直祕庭覽群書以待顧問以養器業為大用之備今乃登進士高等者一任才罷不以能否例得召試而補之兩府兩省子弟親戚不以賢不肖輒自陳乞館閣職事者亦得進𥙷太宗皇帝建崇文院祕閣自書碑文重天下賢才也陛下當思祖宗之意不宜甚輕之臣請特降詔書今後進士三人內及等者一任回日許進于教化經術文字十軸下兩制看詳作五等品第中第一第二等者即賜召試試又優等即補館閣職事兩府兩省子弟並不得陳乞館閣職事及讀書之類御史臺畫時彈劾并諫院論奏如館閣闕人即委兩地舉文有古道才堪大用之士進名同舉并兩制列署表章仍上殿稱薦以充其職如此則館閣職事更不輕授足以起朝廷之風采紹祖宗之本意副陛下愼選矣三曰精貢舉臣謹按周禮卿大夫之職各教其所治三年一大比考其德行道藝乃獻賢能之書于王賢為有德行能為有道藝王再拜受之登于天府天府太廟之寶藏也蓋言王者舉賢能所以上安宗社故拜受其名藏于廟中以重其事也卿大夫之職廢既久矣今諸道學校如得明師尚可教人六經傳治國治人之道而國家乃專以辭賦取進士以墨義取諸科士皆捨大方而趍小道雖濟濟盈庭求有才有識者十無一二况天下危困乏人如此將何以救在乎教以經濟之業取以經濟之才庶可救其不逮或謂救弊之術無乃後時臣謂四海尚完朝謀而夕行庶乎可濟安得晏然不救坐俟其亂哉臣請諸路州郡有學校處奏舉通經有道之士專於教授務在興行其取士之科即依賈昌朝等起請進士先䇿論而後詩賦諸科墨義之外更通經㫖使人不專辭藻必明理道則天下講學必興浮薄知勸最為至要內歐陽修蔡襄更乞逐場去留貴文卷少而考校精臣謂盡令逐場去留則恐舊人扞挌不能創習䇿論亦不能旋通經㫖皆憂棄遺别無進路臣請進士舊人三舉以上者先䇿論而後詩賦許將三場文卷通考互取其長兩舉初舉者皆是少年足以進學請逐場去留諸科中有通經㫖者至終場别問經㫖十道如不能命辭而對則於知舉官貟前講說七通者為合格不㑹經㫖者三舉巳上即逐場所對墨義依自來通粗施行兩舉初舉者至於終場日須八通者為合格又外郡解發進士諸科人本鄉舉里選之式必先考其履行然後取以藝業今乃不求履行惟以詞藻墨義取之加用封彌不見姓字實非鄉里舉選之本意也又南省考試舉人一場試詩賦一場試䇿人皆精意盡其所能復考校日久實少舛謬及御試之日詩賦文論共為一場既聲病所拘意思不遠或音韻中一字有差雖生平苦辛即時擯逐如音韻不失雖末學淺近俯拾科級既鄉舉之處不考履行又御試之日更拘聲病以此士之進退多言命運而不言行業明君在上固當使人以行業而進而乃言命運者是善惡不辨而歸諸天也豈國家之美事哉臣請重定外郡發解條約須是履行無惡藝業及等者方得解薦更不封彌試卷其南省考試之人巳經本鄉詢考履行却須封彌試卷精考藝業定奪等第進入御前選官覆考重定等第訖然後開看南省所定等第內合同姓名偶有高下者更不移改若等第不同者人數必少却加封彌更宣兩第參校然後御前放榜此為至當在三人巳上即於高等人中選擇聖意宣放其考校進士以䇿論高詞賦次者為優等䇿論平詞賦優者為次等諸科經㫖通者為優等墨義通者為次等巳上進士諸科並以優等及第者放選注官次等及第者守本科選限自唐以來及第人皆守選限國家以收復諸國郡邑乏官其新及第人權與放選注官今來選人壅塞宜有改革又足以勸學使其知聖人治身之道則國家得人百姓受賜四曰擇官長臣聞先王建侯以共理天下今之刺史縣令即古之諸侯一方舒慘百姓休戚實繫其人故歷代盛明之時必重此任今乃不問賢愚不較能否纍以資考升為方面懦弱者不能檢吏得以蠧民強幹者惟是近名率多害物邦國之本由此凋殘朝廷雖至憂勤天下何以蘇息其轉運使并提點刑獄按察列城當得賢於衆者臣請特降詔書委中書樞密院且各選轉運使提點刑獄共十人大藩知州十人委兩制共舉知州十人三司副使判官同舉知州五人御史臺中丞知雜三院共舉知州五人開封知府推官共舉知州五人逐路轉運使提點刑獄各同舉知州五人知縣縣令共十人逐州知州通判同舉知縣縣令共二人得前件所舉之人舉主多者先次差補仍指揮審官院流內銓今日以後所差知州知縣縣令並具合入人歷任功過舉主人數聞奏委中書看詳委得允當然後引對如此舉擇則諸道官吏庶幾得人為陛下愛惜百姓均其徭役寬於賦斂各獲安寧不召禍亂天下幸甚五曰均公田臣聞易曰天地養萬物聖人養賢以及萬民此言聖人養民之時必先養賢養賢之方必先厚祿厚祿然後可以責廉隅安職業也皇朝之初承五代亂離之後民庶凋弊時物至賤暨諸國收復天下郡縣之官少人除補至有經五七年不替罷者或才罷去便入見闕當物價至賤之時俸祿不輟士人之家無不自足咸平巳後民庶漸繁時物遂貴入仕門多得官者衆至有得替守選一二年又授官代闕一二年者在天下物貴之後而俸祿不繼士人家鮮不窮窘男不得婚女不得嫁喪不得葬者比比有之復於守選待闕之日衣食不足貸債以苟朝夕到官之後必來見逼至有冒法受贓賖舉度日或不耻賈販與民爭利既非負罪之人不守名節吏有姦贓而不敢發民有豪猾而不敢制姦吏豪民得以侵暴於是貧弱百姓理不得直冤不待訴徭役不均刑罰不正比屋受弊無可奈何由乎制祿之方有所未至真宗皇帝思深慮遠復前代職田之制使中常之士自可守節婚嫁以時喪葬以禮皆國恩也能守節者始可制姦贓之吏鎮豪猾之人法乃不私民則無枉近日屢有臣僚乞罷職田以其有不均之謗有侵民之害臣謂職田本欲養賢緣而侵民者有矣比之衣食不足壞其名節不能奉法以直為枉以枉為直衆怨思亂而天下受弊豈止職田之害耶又自古常患百官重內而輕外窘外官月俸尤更豐足簿尉俸錢尚二十貫今窘於財用未暇增復臣請兩地同議外官職田有不均者均之有未給者給之使其衣食得足婚嫁喪葬之禮不廢然後可以責其廉節督其善政有不法者可廢可誅且使英俊之流樂於為郡為邑之任則百姓受賜又將來升擢多得曾經郡縣之人深悉民隱亦致化之本也惟聖慈深察天下幸甚六曰厚農桑臣觀書曰德惟善政政在養民此言聖人之德惟在善政善政之要惟在養民養民之政必先務農農政既修則衣食足衣食足則愛膚體愛膚體則畏刑罰畏刑罰則寇盜自息禍亂不興是聖人之德發於善政天下之化起於農畝故詩有七月之篇陳王業也今國家不務農桑粟帛常貴江浙諸路歲糴米二百萬石其所糴之價與輦連之費每歲共用錢三百餘萬貫文又貧弱之民困于賦斂歲伐桑棗鬻而為薪勸課之方有名無實故粟帛常貴府庫日虛此而不謀將何以濟臣於天下農利之中粗舉二三以言之且如五代群雄爭霸之時本國歲飢則乞糴於鄰國故各興農利自至豐足江南應有墟田每一墟方數十里如大城中有河渠外有門閘旱則開閘引江水之利潦則閉閘拒江水之害旱潦不及為農美利又浙西地卑常苦水沴雖有溝河可以通海惟時開導則潮泥不得而堙之雖有堤塘可以禦患惟時修固則無摧壞臣知蘇州日點檢簿書一州之田係出稅者三萬四千頃中稔之利每畝得米二石至三石計出米七百餘萬石東南每歲上供之數六百萬石乃一州所出臣詢訪高年則云曩時兩浙未歸朝廷蘇州有營田軍四都共七八千人專為田事導河築堤以減水患于時民間錢五十文糴白米一石自皇朝一統江南不稔則取之浙右浙右不稔則取之淮南故慢於農政不復修舉江南墟田浙西河塘太半隳廢失東南之大利今江浙之米石不下六七百文足至一貫文者比於當時其貴十倍而民不得不困國不得不虛矣又京東西路有卑濕積潦之地早年國家特令開決之後水旱大減今罷役數年漸巳湮塞復將為患臣請每歲之秋降勑下諸路轉運司令轄下州軍吏民各言農桑之間可興之利可去之害或合開河渠或築堤堰陂塘之類並委本州軍選官計定工料每歲於二月間興役半月而罷仍具功績聞奏如此不絶數年之間農利大興下少飢歲上無貴糴則東南歲糴輦運之費大可減省其勸課之法宜選官討論古制取其簡約易從之術頒賜諸路轉運使及面賜一本付新授知州知縣縣令等此養民之政富國之本也七曰修武備臣聞古者天子六軍以寧邦國唐初京師置十六將軍官屬亦六軍之義也諸道則開折衝果毅府五百七十四以儲兵伍每歲三時耕稼一時習武自貞觀至于開元百三十年戎臣兵伍無一逆亂至開元末聽匪人之言遂罷府兵唐衰兵伍皆市井之徒無禮義之教無忠信之心驕蹇凶逆至于喪亡我祖宗以來罷諸侯權聚兵京師衣糧賞賜豐足經八十年矣雖已困生靈虛府庫而難於改作者所以重京師也今西北強梗邊備未足京師衛兵多遠戍或有倉卒輦轂無備此大可憂也遠戍者防邊陲之患或緩急抽還則外禦不嚴戎狄進奔便可直趍關輔新招者聚市井之輩而輕囂易動或財力一屈請給不充則必散為群盜今生民巳困無可誅求或連年凶飢將何以濟膽軍之䇿可不預圖若因循過時臣恐急難之際宗社可憂臣請密委兩地以京畿見在軍馬同議有無闕數如六軍未整須議置兵則請約唐之法先於畿內并近輔州府召募強壯之人充京畿衛士得五萬人以助正兵足為强盛使三時務農大省給贍之費一時教戰自可防虞外患其召募之法并將校次第並先密切定奪聞奏此實强兵節財之要也候京畿近輔召募衛兵巳成次第然後諸道效此漸可施行聖慈留意八曰減徭役臣聞漢光武建武六年六月詔曰夫張官置吏所以為人也今戶口耗少而縣官吏職所置尚繁令司隸州牧各實所部二府於是條奏并省四百餘縣天下至治臣又觀西京圖經唐㑹昌中河南府有戶一十九萬四千七百餘戶置二十縣今河南府主客戶七萬五千九百餘戶仍置一十九縣主戶五萬七百客戶二萬五千二百鞏縣七百戶偃師一千一百戶逐縣三等而堪役者不過百家而所供役人不下二百數新舊循環非鰥寡孤獨不能無役西洛之民最為窮困臣請依後漢故事遣使先往西京併省諸邑為十縣其所廢之邑並改為鎮令本路舉文資一員董榷酤關征之利兼人烟公事所廢公人除歸農外有願居公門者送所存之邑其所在邑中役人却可減省歸農則兩不失所候西京併省稍成倫序則行於大名府然後遣使諸道依此施行仍先指揮諸道防團州巳下有使州兩院者皆為一院公人願去者各放歸農職官㕔可給本城兵士七人至十人替人力歸農其鄉村耆保地里近者亦令併合能併一保耆管亦減役十餘戶但少徭役人自耕作可期富庶九曰覃恩信臣竊覩國家三年一郊天子齊戒衮冕謁見宗廟乃祀上帝大禮既成還御端門肆赦天下曰赦書日行五百里敢以赦前事言者以其罪罪之欲其王澤及物之速也如此今大赦每降天下歡呼一兩月間錢榖司存督責如舊桎梏老幼籍沒家産至于寬賦斂減徭役存恤孤貧振舉滯淹之事未嘗施行使天子及民之意盡成空言有負聖心損傷和氣臣請特降詔書今後赦書內宣布恩澤有所施行而三司轉運司州縣不切遵禀者並從違制徒二年斷情重者當行刺配應天禧年以前天下缺負不問有無侵欺盜用並與除放違者仰御史臺提點刑獄司常切覺察紏劾無令壅遏臣又聞易曰先王以省方觀民設教故有巡狩之禮察諸侯善惡觀風俗厚薄此聖人順動之意今巡狩之禮不可復行民隱無窮天聽甚遠臣請降詔中書今後每遇南郊赦後精選臣僚往諸路安撫察官吏能否求百姓疾苦使赦書中及民之事一一施行天下百姓莫不幸甚十曰重命令臣聞書曰愼乃出令令出惟行凖律文諸被制書有所施行而違者徒二年失錯者杖一百又監臨主司受財而枉法者十五匹絞蓋先王重其法令使無敢動搖將以行天下之政也今覩國家每降宣勑條貫煩而無信輕而弗禀上失其威下受其弊蓋由朝廷采百官起請率爾頒行既昧經常即時更改此煩而無信之驗矣又海行條貫雖是故違皆從失坐全乖律意致壞大法此輕而弗禀之甚矣臣請特降詔書今後百官起請條貫令中書樞密院看詳㑹議必可經久方得施行如事干刑名者更於審刑大理寺勾明㑹法律官貟參詳起請之詞删去繁冗裁為制敕然後頒行天下必期遵守其衝改條貫並令繳納免致錯亂誤有施行仍望别降勑命今後逐處當職官吏親被制書及到職後所受條貫敢故違者不以海行並從違制徒二年未到職巳前所降條貫失於檢用情非故違者並從本條失錯科斷杖一百餘人犯海行條貫不指定違制刑名者並從失坐若條貫差失於事有害逐處長吏别見機㑹須至便宜而行者並須具緣由聞奏委中書樞密院詳察如合理道即與放罪仍便相度别從更改再進前所陳十事臣前兩次所上共十事曾奉聖㫖更進一本今寫録進納一曰明黜陟為重定文武百官磨勘將以約濫進責實效使天下政事無不舉也二曰抑僥幸為重定文武百官奏䕃及不得陳乞館閣職事將以革濫賞省冗官也三曰精貢舉為天下舉人先取履行次取藝業將以正教化之本育卿士之材也四曰擇官長為舉轉運使提點刑獄并州縣長吏將以正綱紀去疾苦救生民也五曰均公田為天下官吏不廉則曲法曲法則害民請更賜均給公田既使豐足然後可以責士大夫之廉節庶天下政平百姓受賜也六曰厚農桑為責諸道溝河并修江南野田及諸路陂塘仍行勸課之法將以救水旱豐稼穡强國力也七曰修武備為四方無事京師少備因循過日天下可憂請密定規制相時而行以衛宗社以寧邦國也八曰減徭役為天下徭役至繁請依漢光武故事併合縣邑以省徭役庶寬民力也九曰覃恩信為赦書內宣布恩澤未嘗施行并請放先朝缺負以感天下之心也十曰重命令為制書忽而行違者請重其法以行天子之命也臣之所陳蓋欲周悉故言辭之間有涉細碎而於國體甚大乞聖慈再加詳覽一一行之則天下之幸非臣之幸也奏乞下審官院等處應官貟陳訴定奪進呈臣竊見京朝官使臣選人等進狀戓理㑹勞績或訴說過犯或陳乞差遣其事理分明可行可罷者則朝廷便有指揮內中書樞密院未見根原文字及恐審官三班院流內銓别有條例難便與奪者多批送逐司其逐司為見批送文字别無與奪便不施行號為送煞以此官貟使臣三五度進狀不能結絶轉成住滯臣欲乞特降聖㫖今後京朝官使臣選人等進狀理㑹勞績訴雪過犯陳乞差遣朝廷未有與奪指揮只批送審官三班院流內銓者仰逐司主判子細看詳如內有合施行者即與勘㑹具條例情理定奪進呈送中書樞密院再行相度别取進止如不可施行亦仰逐司告諭本人知悉所貴逐司主判各揚其職事無漏落亦免官員使臣選人等重疊進狀紊煩聖聽奏乞定奪在京百司差遣等第臣竊見內諸司并百司顯有緊慢高下事體不同今來臣僚不拘官職大小各取便乞勾當紊亂綱紀深屬未便欲乞特降指揮令入內內侍省定奪內中諸司高下等第令三司定奪在京百司高下等第各合係何等官職及合入何差遣人勾當既定高下等第則陳乞之人不敢踰越所貴百司有倫不至輕授奏乞差官看詳投進利見文字臣竊見天下官員使臣諸色人日有投進并奏到利見文字中書樞密院以公事文字至多不暇子細看詳其中須有民間利濟及于邉機可行之事恐有漏落雖自來曾差兩制臣僚各有主判去處不得精專動經歲時不能與奪臣欲乞特降聖㫖權於館閣選差官二員就近置局看詳官貟使臣諸色人所投進及奏到利見文字內有合行事件兩府臣僚更加詳酌逐旋取㫖施行所貴下情盡逹庶政有𥙷其看詳官每季或半年一替所看文字須旋旋了當不得交割後人所有機密文字即兩府依舊自行更不送看詳官處奏乞救濟陜西飢民臣等竊見陜西永興軍同耀華州陜府等處今夏災旱得雨最晚民間秋稼甚無所望官中倉廩亦無積貯若不作擘畫即百姓大假流移殍亡者衆兼軍食闕絶臨時轉漕不及臣等欲乞朝廷速降指揮委本路都轉運使孫沔速相度上件州軍向去救濟飢民及辦給軍食有何次第如難為擘畫即便於黃河內搬輦自京以來斛斗往彼應副仍速行相度㳂路如何計綱即不至艱阻事狀聞奏候到乞朝廷早賜施行慶曆三年七月四日臣范仲淹臣韓琦奏乞罷陜西近裏州軍營田臣等竊見陜西昨來興置營田本欲助邉以寬民力除㳂邉有空閒膏腴地土處可以開墾外其近裏州縣官吏不能體朝廷之意將遠年瘠薄無人請佃逃田抑勒近鄰人戶分種或令送納租課又自來人戶租佃官㽵地土每畝出課不過一二斗今亦勒令分種每畝須收數斗致貧戶輸納不前州縣追擾無時暫暇緣人戶自用兵以來科率勞弊至於巳業尚多荒廢實無餘力更及營田其所出租課多是抱虛送納切覩編勑指揮不得將逃戶田土抑勒親鄰佃蒔蓋恐害民况今歲災旱尤甚理當優恤不可非理煩擾使之重困臣等欲乞特降指揮應陜西近裏州軍營田一切廢罷如元係租佃即令依舊額出課如元係遠年瘠薄逃田舊稅額重無人請佃者即與減定稅額召人請佃所貴疲民受賜歸感睿仁臣范仲淹臣韓琦奏乞擇臣僚令舉差知州通判臣等竊以天下郡邑牧宰為重得其人則致化失其人則召亂推擇之際不可不愼國家承平以來不無輕授應知州通判縣令因舉薦擢任者少以資考序進者多才與不才一塗並進故能政者十無二三謬政者十有七八國家詔令程式天下一體何則能政之處民必䝉福謬政之下民常受弊非國家法令之殊蓋牧宰賢愚之異也今四方多事民日以困窮將思為盜復使不才之吏臨之賦役不均刑罰不當科率無度疲乏不恤上下相怨亂所由生若不急於求人早革其弊誠國家之深憂也然自來雖曾詔臣僚各舉所知或舉主非賢則多謬薦臣等欲乞聖慈特降詔書委中書樞密院臣僚各於朝臣中薦堪充舉主者三人候奏到姓名即逐人各賜勑一道令於通判內舉成資巳上一員充知州知縣內舉成資巳上一員充通判簿尉中舉有出身三考巳上無出身四考一員充職官知縣或於職官令録中舉五考巳上之人充京官知縣仍於勑明言所薦之人若將來顯有善政其舉主當議旌賞若贓汙不理苛刻害民並與同罪所貴生民受賜寇盜自息臣范仲淹臣韓琦奏乞將先減省諸州公用錢却令依舊臣竊見朝㫖下陜西省罷同解乾耀等九州軍公使錢共一千八百貫文切以國家逐處置公使錢者蓋為士大夫出入及使命往還有行役之勞故令郡國饋以酒食或加宴勞蓋養賢之禮不可廢也謹按周禮地官有遺人掌郊里之委積以待賔客野鄙之委積以待羇旅凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積凡委積之事巡而比之以時頒之此則三王之世巳有厨傳之禮何獨聖朝顧小利而亡大體且今贍民兵一名歲不下百貫今減省得公用錢一千八百貫只養得兵士一十八人以一十八人之資廢十餘郡之禮是朝廷未思之甚也况今來逐州使命之外各有軍營每年春後邊兵歇泊動經半年軍中人員並無宴犒之具雖條貫有旬設之名逐州每月一次舉行軍員各給得錢一伯文巳來官務薄酒二升既無公用更不赴筵亦不張樂豈朝廷宴饗將校之意州郡削弱道路咨嗟當全盛之朝豈宜如此或謂有公使錢處收買食物搔擾戶民殊不知郡守得人自能約束如非其人更出巳俸買物虧民愈甚是見其小而不思其大也伏望聖慈速降指揮下陜西河北河東路轉運司昨來經減廢公用錢處並令依舊庶協典禮稍息物論况朝廷用武之際於此一事尤宜照管臣等久在邊任深知此事近二樞庭豈當緘默臣范仲淹臣韓琦奏乞差官陜西祈雨臣今月五日至華州華隂縣入西嶽廟燒香切見本廟有老醫官一員監當其廟廷闊遠舍屋甚多只有剩員一十四人盡是老年病患供應灑掃不前在國家崇奉五嶽之意似非嚴謹今來關中大旱永興同華陜􅉑以來無二三分秋苗粟米每斗一百五十文足兼鄉村無可收糴人心嗷嗷賊盜不少欲乞聖慈選精謹使命至西嶽廟專行祭告并於陜西靈湫等處祈雨澤以救生民仍乞委轉運使一貟赴西嶽廟點檢廟貌祭器法物并添差兵士灑掃防護所貴崇奉之禮不至廢墜奏為灾異後合行踈決刑獄等六事臣今早親聞德音謂復有灾異當修德以及民并詔臣等謹省刑法此實見聖人憂畏之心合於天意臣今條奏數事皆陛下增修明德之要一齊誡發誠特降詔命明言灾變屢見敢不罪巳祗畏以告中外群臣同心修省二遣使四方踈決刑獄非害人者悉從減降三詔天下州縣長吏訪問民間孤獨不能存活者特行賑恤四詔逐處籍出陳亡之家察其寡弱别加存養五邊陲之民被戎狄驅虜者量支官物贖還本家六詔諸處缺負巳該赦恩除放者官司更不得催理違者官吏科違制之罪遇赦不原仍差近臣置司與奪陛下力行此數事下悅民心上答天戒昔商中宗桑穀共生於朝懼而修德撫綏百姓三年而歸者十六國號為中興陛下今日因灾修德則福及兆人道光千載天下幸甚答手詔五事臣等伏奉六月一日手詔云云臣等各蒙奬用待罪二府不能燮理彌縫致化天下過煩聖慮特降德音上以宗廟為憂下以生靈為念臣等不任慚恐戰汗死罪詔旨謂合用何人鎮彼西方臣等思之今元昊遣人到闕名體稍順其如戎人難信止可權宜如翻覆未寧則當擇節制之帥若和好且合亦須藉鎮撫之才經度邊陲以防來患見選人具名聞奏次詔㫖謂民之困弊財賦未强臣等議之國家革五代諸侯之暴奪其威權以度支財用自贍天下之兵歲月既深賦斂日重邉事一聳調率百端民力愈窮農功愈削水旱無備稅斂不登減放之數動踰百萬今方選舉良吏務本安民修水旱之防收天地之利而更嚴著勉農之令使天下官吏專於勸課百姓勤於稼穡數年之間大利可見又山海之貨本無窮竭但國家輕變其法深取於人商賈不通財用自困今須朝廷集議從長改革使天下之財通濟無滯又減省冗兵量入以出則富强之期庶有望矣詔旨謂軍馬尚多何得精當近韓琦范仲淹所上備邊文字內有河北五六事陜西七事精擇兵馬及攻守之策巳在其中臣等見啇量施行次詔㫖謂將臣不和如何制樞密院先因許懷德張亢不協曾指揮戒勵然將佐之中性情不類愛惡相攻全在主帥别白撫遏隨才任用使各得其所則怨惡不生故長帥之才不敢輕易選用詔㫖謂躁進之徒宜塞奔競臣等謂躁進懷貪之人何代無之由朝廷辨明而進退之如責人實效旌人靜節貪冒者廢之趍附者抑之如此則多士知勸各生廉讓之心奏乞重定三班審官院流內銓條貫臣竊見審官三班院并銓曹自祖宗以來條貫極多逐旋衝改久不删定主判臣僚卒難詳悉官員使臣莫知涯涘故司屬高下頗害至公欲乞聖慈特降指揮選差臣僚就審官三班院并銓曹取索前後條例與主判官貟同共看詳重行删定畫一聞奏付中書樞密參酌進呈别降勑命各令編成例䇿施行奏議尹洙轉官臣竊見尹洙才業操行搢紳所推由臺閣進用便可直入兩制若邊城驟遷則有未便緣去年春是太常丞在路分都監許遷張肇之下去年秋轉司諌管句經略司公事遷在鈐轄安後之上才方半年若就除待制又遷在部署狄青之上既不因功勞又不改路分偏受寵擢衆情非便於體未安如須合進擢即今將入夏邊上無事且乞召尹洙赴闕令條奏邊事觀其陳述可采即與改職却令馳往邊上亦未為晚既因啓沃面受殊恩邊臣聞之不為越次續奏乞於職官令録中舉充京官知縣臣近與韓琦上言乞擇舉主令逐人於通判中舉知州一員於知縣中舉通判一員於簿尉中舉職官知縣一員官䝉降勑至密院入遞次臣看詳勑頭名署臣等上言於理未便欲乞只作朝廷憂勞之意特選臣僚舉官其體甚重仍乞於簿尉中舉職官知縣一員下添入或於職官令録中舉五考以上之人充京官知縣計添一十九字庶無遺才奏為赦後乞除放祖宗朝缺負臣伏覩國家每一降赦萬人歡呼一兩月間錢榖司存將缺負之人依舊督責桎梏老幼籍沒家産既失大信且虧至仁蒙聖恩已差楊日嚴王質與三司詳定不係侵欺盜用該赦缺負次臣舊曾在三司定放缺負見滑州酒務有少缺雜物係專副四十餘界計八十來年登戴少數又不顯侵欺其勾當人亡殁年深只追貧弱子孫理納並不知祖父如何少缺似此刻剝傷民豈陛下愛育生靈之德臣欲特出聖意應祖宗朝天下缺負更不問侵欺盜用並與除放如省司更不舉行許三司知次第人陳告干繫人吏並坐違制決停告事人與轉一資諸處承受施行官吏並科違制之罪奏乞指揮國子監保明武學生令經略部署司講說兵書臣竊聞國家興置武學以來苦未有人習藝或恐英豪隱晦恥就學生之列儻久設此學無人可教則慮外人窺覘謂無英材於體未便欲乞指揮國子監不須明立武學之名如學生中有好習兵書者令本監官貟保明委是忠良之人即密令聽讀臣切見邊上甚有弓馬精強諳知邊事之人則未曾習學兵書不知為將之體所以未堪拔擢欲乞指揮陜西路河東逐路經略司於將佐及使臣軍貟中揀選識文字的有機智武勇久遠可以為將者取三五人令經略部署司參謀官員等密與講說兵馬討論勝䇿所貴邊上武勇巳著之人更知將略或因而立功則將來有人可任即不得聲張多教人數奏為置官專管每年上供并軍須雜物臣竊見兵興以來天下科率如牛皮筋角弓弩材料箭幹鎗幹膠鰾翎毛漆蠟一切之物皆出於民謂之和買多非土産之處素已難得既稱軍須動加刑憲物價十倍吏辱百端輸納未前如負重罪一年之中或至數四官中雖給價直豈能補其瘡痍蓋是國家不能素備禍及生民伏望聖慈委三司選差官并有行止心力司屬三五人别置一司專管天下科率應副每年合要上供并軍須雜物先勘㑹諸處見在數目置簿拘管如朝廷取索并外處奏乞之時即先點檢見在物色支撥應副外將少數下諸處和買亦大段減得分數仍於土産處許將二稅㳂納錢并場務課利依市價取人戶情願折納不得抑勒據納到數目如尚少闕亦只就土産處置場收買如此百物有備更無非時科率其非土産之處自無煩撓國家大計須為經久豈可逐度須索旋行誅求蘇息萬民無切於此如允臣所奏即乞特降勑命指揮奏乞兩府兼判臣謹按三代之制皆立三公建六卿太公周公召公周之三公也以論道經邦為師傅又天官冡宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司寇掌邦禁冬官司空掌邦士此周之六卿也各帥其屬以佐王理邦國大事從其長小事則專逹亦以三公兼六卿之職取其重也周用此制而王道大興世祚綿久至八百年我國家有周之天下未能行周之制亦當約而申之以治天下則可卜長世之業矣今中書乃天官冡宰之任樞密院乃古夏官司馬之任其地官春官秋官冬官之職各散於群有司皆無六卿之正又無三公兼領之重而兩府間惟進擬差除多循資級評論賞罰各遵條例之外上不專三公論道之職下不專六卿佐王之業雖庶政不修天下不理咎將安歸臣請朝廷於百職中選其務之重者命輔臣兼領其綱要體周之三公下兼其六卿法周之六卿各帥其屬以佐理邦國唐貞元中詔宰相齊映判兵部李勉判刑部劉滋判吏部崔造判戶部工部又嘗命宰相兼諸道鹽鐵轉運使是宰相下兼其職以重其事也其不修舉者朝廷得以責之輔臣任責則庶政之弊可救天下之治可期惟陛下裁擇一審官是京朝官所集之府固當區别善惡黜陟幽明使賢者知勸歲終書其一歲黜陟之數以何等功而進者幾人以何等罪而退者幾人各分其類具目進呈一吏部流內銓條詔程式頗聞煩碎權勢之與孤寒優便之與遠惡在乎均平惻隱方協至公况群材所聚倚在銓品亦天官冡宰之任也臣請命輔臣兼判每至歲終書其一歲之黜陟以何等功而進者幾人以何等罪而退者幾人各分其類具目進呈一國子監又諸道郡學聚天下之士講議詩書服習禮樂長養賢俊為國器用此地官司徒之職也臣請命輔臣兼判以捴天下郡學每遇科場開日或有德行文學之士鄉里所推重者不以應舉不應舉許郡學士衆舉履行善狀詣所屬薦舉逐處官貟更體量名實相副者保明聞奏當議别行敦遣以勸天下之士一三司天下金穀之府今窘於財用經費以艱刻剝既深生靈重困宜疏通利源以救天下之弊此地官司徒之政也臣請命輔臣兼判此當今之急務每至歲終盡其減省冗費之數增息財利之數蠲放困窮之數具目進呈一司農寺管天下常平倉本欲凶歲用濟生民今逐處弛慢不為急務倉廩漸虛灾傷無備赤子之命委于溝壑又勸農之政新頒詔令其天下官貟勸課勞績並合委本寺考校以聞此亦地官司徒之政也臣請命輔臣兼判每歲終以諸道常平倉增損之數并親民官勸課功狀之優者具目進呈一太常禮院用歷代之禮或不謹於典法隨時綿蕝綱紀寖壞制度日隳太常寺用歷代之樂或八音失序慢於大祀則神祗不享禍罰可召此春官宗伯之職朝廷之所重也臣請命輔臣兼判至歲終具禮樂有所損益或廢墜有所修舉畫一進呈一三班院使臣數千人其品流至雜難於區别磨勘差遣日有榮悴臣請命輔臣兼判常選可用於邊陲或可委以錢穀或可付以親民或可任以殄寇至歲終以所選人數具目進呈一殿前馬步軍司捴轄諸軍其體最大更戍邊鄙要在均平㨂擢材勇責其精當至於戰陳之法號令之要皆須服習此夏官司馬之政也臣請命輔臣兼判至每歲終以將校選擢之數軍旅服習之效具目進呈一審刑大理寺評天下之法生死榮辱繫於筆下禍及非辜怨動天地故五帝三王盡心此道即秋官司寇之政也臣請命輔臣兼判每至歲終具天下斷案中大辟流罪以特恩減放并法寺辨明出入數進呈一刑部一司詳覆天下巳斷文案凡天下訴冤之奏盡委刑部辨之此亦秋官司寇之政也今官屬寡弱與審刑大理寺勢不相敵豈敢盡行駮正故沈冤之人十無一雪臣請命輔臣兼判至每歲終具天下斷案詳覆到差失公事并辨雪過負冤人數進呈右伏望聖慈各委輔臣兼判前件職司其創置新規更改前弊官吏黜陟刑法輕重事有利害者並令兼判輔臣與奪其大體者别具奏呈令中書樞密院更從僉議然後奏取勑裁其逐司常務即主判官貟依舊兼行再奏乞兩府兼判臣昨上愚見乞詔兩地輔臣兼領要務蓋欲朝廷綱紀並舉以救因循之弊伏以三代命官以三公論道六卿分職按於書傳則三公兼卿事又漢以三公分部九卿唐以六尚書分部二十四司亦嘗命宰相兼領事任著於方册我國家承五代破散之弊未能復三代漢唐之制事多權宜今中書是冡宰之任而四人或五人共司一職樞密院是大司馬之任亦四人或五人共司一職上不專三公論道之事下不兼六卿分職之業其六尚書九卿之位皆無正官並是權假如三司審刑大理寺審官院流內銓司農寺之類是朝廷六官九卿之職而皆用人權知權判無一正官莫安其職臣到闕數月間見審刑院梁適宋祈丁度三人權判其審官院經富弼王拱辰孫抃三人權判本曹盡非正官數易無定大臣又不任責豈是永圖今二虜至強四方多事兵戈未息財利巳乏生民久困苛政未寬設有飢饉相仍盜寇競起將何以定天下可憂國家當令大臣各竭其力以持危墜之勢如欲復三公九卿六尚書之位則體大難舉卒不可定願陛下從臣前議且詔兩地輔臣兼領要務庶幾可濟陛下既能責兩地之職業大臣必能振百司之綱紀綱紀備用則政令既行政令既行則天下自理使吏安其職民樂其業雖有夷狄而中國明盛彼不我輕雖有水旱而百姓富庶自不為亂然後社稷可久生靈無禍臣非才多難分甘遠棄蒙陛下擢居輔列夙夜思報臣願為百司中領一最重難處如朝廷不以職業責於輔臣而伺其私有過咎然後廢黜臣恐人人自全但求免過無補國家之政不為社稷之福臣無任再三冒昧􅈤切之至進呈周朝三公六卿漢朝宰臣兼判事周官三公太師天子所師法太傅傅相天子太保保安天子兹惟三公論道經邦燮理隂陽官不必備惟其人三公之官不必備員惟其人有德乃處之六卿天官卿冡宰掌邦治統百官均四海今中書之任也地官卿司徒掌邦教敷五典擾兆民春官卿宗伯掌邦禮治神人和上下夏官卿司馬掌邦政統六師平邦國今樞密院之任也秋官卿司寇掌邦禁詰姦慝刑暴亂冬官卿司空掌邦土居四民時地利六卿分職各率其屬屬謂大夫也每卿之屬六十官以倡九牧阜成兆民以倡導九州牧伯大成兆民之性命歲終天子齊戒受諌諫當有所改為六卿以百官之成質於天子質猶平平其計百官齊戒受質受平報然後休老勞農饗食之成歲事斷計要制國用周禮大司徒職云二卿則公一人鄭注云三公者內與王詢道中參六官之事外與六卿之教周禮正義云三公下兼六卿尚書孔安國注曰冡宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之此周時三公各兼一卿之職漢制三公分部九卿太尉所部太常衛尉光祿三卿司徒所部太僕鴻臚廷尉三卿司空所部宗正少府司農三卿唐太宗朝宰臣兼職事蕭瑀內外考績委之司㑹唐之尚書省今之三司高士廉攝太子少師特令掌選杜如晦知選事馬周為中書令兼右庶子戴胄專掌選事中宗朝宰臣崔湜與鄭愔同知選事代宗朝宰臣元載領度支轉運使劉晏充度支鹽鐵諸道鑄錢等事使德宗朝宰臣喬琳兼京畿觀察使竇參兼轉運使齊映兼判兵部李勉判刑部劉滋判吏部崔造判戶部工部文宗朝宰臣楊嗣復李珏同領諸道鹽鐵轉運使李珏依舊判戶部鄭覃判國子祭酒武宗朝宰臣杜琮判度支鹽鐡轉運使曹確充延資庫使皇朝開寶中宰臣薛居正領淮南嶺南湖南等路都提舉三司水陸發運司同列沈義倫兼荆南劒南等道都提舉三司水陸發運使開拓輔臣兼領職任條目三司司農寺今戎事未息三司主天下大計而財力已困又司農寺管天下常平倉以備水旱賑救生民亦可督天下勸農之政今委輔臣一貟兼掌重為經制取天下歲入之利并歲給之數較之有所不足則須專置農官以廣天地之利大變商法以行山海之貨每至歲終具天下減省冗費之目增息財用之法蠲放困窮之數并常平倉增收賑發之數及取天下官吏勸農課績之優者畫一進呈群牧司今諸路騎兵絶未精强諸軍闕馬人多相與咨怨今委輔臣一貟兼領專修馬政較之漢唐增葺苑監庶於多中選擇可得精強每至歲終具括買并滋息之數及㨂選格盡筋骨必可帶甲衝突者方得均與諸軍三班院今三班使臣數千人品流至多難於區别今委輔臣一員兼領常切選擇可任邊陲或可擒寇盜或可幹錢穀或可委親民每季具所選到人數進呈則人品自分用無不當太常寺國子監太常寺掌歷代禮樂上以奉天地宗廟次則正朝廷序人倫也國子監并天下學校是國家育材之府今委輔臣一貟兼領以重其事每至歲終具禮樂損益之事并天下教育之數進呈審官院流內銓審官院流內銓是天下掄材之府今委輔臣一貟兼領每至歲終具旌擢過京朝官若干黜陟過選人若干進呈審刑大理寺刑部經曰刑者成也一成而不可變故君子盡心焉天下之人生死榮辱繫於筆下禍及非辜怨動天地刑部覆較天下巳斷文案并天下訴冤之奏盡得辨正今委輔臣一員兼領以重其事每至歲終具天下斷過大辟徒流若干人并特恩寬減及法寺辨雪人數并刑部覆校過公案若干道辨正冤訟若干件進呈奏乞令兩府詳議百官起請條貫如可經久即令施行等事係用前所陳十事內重命令一門再作劄子進呈臣聞書曰愼乃出令令出惟行准律文諸被制書有所施行而違者徒二年失錯者杖一百又監臨主司受財而枉法者十五匹絞蓋先王重其法令使無敢動搖將以行天下之政也今覩國家每降宣勑條貫煩而無信輕而弗禀上失其威下受其弊蓋由朝廷近來百官起請率爾頒行既昧經常即時更改此煩而無信之驗矣又海行條貫雖是故違皆從失坐全乖律意致壞大法此輕而弗禀之甚矣臣請特降詔書今後百官起請條貫令中書樞密院看詳㑹議必可經久方得施行如事干刑名者更於審刑大理寺勾明㑹法律官員參詳其起請內有能合律意可以久行者委中書將起請之詞删去繁冗裁為制勑然後頒行天下必期遵守其衝改條貫並令繳納免致錯亂誤有施行仍望别降勑命今後逐處當職官吏親被制書及到職後所受條貫敢故違者不以海行並從違制徒二年未到職以前所降條貫失於檢用情非故違者並從本條失錯斷決杖一百餘人犯海行條貫不指定違制刑名者並從失坐若條貫差失於事有害逐處長吏别有機㑹須至便宜而行者並須具緣由聞奏委中書樞密院詳酌如合理道即與放罪仍便相度别從改更奏議葬荆王昨日奉聖㫖令中書熟議荆王葬事者臣謂此議有三其一曰年歲不利此隂陽之說也其二曰財用方困此有司之憂也其三曰京西寇盜之後不可更有搔擾此憂民之故也臣又别有四議乞陛下擇之其一曰諸侯五月而葬是自古不易之典今年歲不利之說非聖人之法言也其二曰天下財利雖困豈不能葬一皇叔耶陛下常以荆王是太宗愛子真宗愛弟雖讒惑多端陛下仁聖力能保全使得令終豈忍送葬之際却惜財利而廢典禮使不得及時而葬恐未副太宗真宗之意臣為陛下惜之豈不防天下之切議哉更乞檢㑹先朝諸王之薨有無權厝之者其三曰自來勑葬多是旋生事端呼索無算臣請特傳聖旨令宋祈王守忠與三司使副并禮官聚議合要物色務從簡儉畫一聞奏與降勑命依所定事件應副更不得於勑外旋生事節枉費官物仍出聖意特賜內藏庫錢帛若干備葬事使三司易為應副如此則陛下孝德無虧光于史册其四曰自來勑葬枉費太半道路供應民不聊生臣請特降嚴㫖荆王二子并左右五七人送葬外其餘婦人合存合放便與處分更不令前去自然道路易為供頓大減冗費既減得費耗又存得典禮此國家之正體也乞聖慈從長處分臣待罪政府不敢不盡奏議許懷德差遣臣竊見許懷德在延州為不進兵擊賊及軍民虛驚拋棄隨軍糧草遂送永興勘劾該赦釋放授秦州部署近又西賊侵邊破蕩却熟户一千帳不能保護却合重行朝典以其在邊無效降充永興部署郭承佑降知相州為轉運使糾奏充北京都部署此二人一面責降一面遷轉天下聞之是朝廷賞罰顛倒取笑四方何以激勸勳臣何以鑒戒惰將如王信狄青實有武勇堪任管軍亦恐未有大功遷轉太速祖宗朝任用邊將賞賜至厚使用度充足委信至重使生殺在已惟惜官職不令滿志恐有懈惰不思立功實前王馭將之術也又朝廷曾降詔所闕都虞候等更不循轉候有邊功除授今却不因功勞衝改此詔而今後國家之命全無信矣惟用兵命將之令尤要取信繫之安危與其它號令不同如須合轉起亦候過郊禮使作該恩方可進爵願陛下再三思之仍乞丁寧指揮兩府今後議論賞罰不可輕易須是有所激勸不招旁議方可施行臣謂國家承五代之弊賴祖宗威德陛下仁聖保守四海久無禍難今四夷巳動百姓巳困倉庫已虛兵旅巳驕國家安危實未可保惟賞罰之柄駕馭天下如賞罰頻失將何以保太平之業臣切愳之願陛下裁擇奏重定臣僚奏薦子弟親戚恩澤事宰相使相舊制子除將作監丞弟兄孫姪並授太祝奉禮今後親弟兄孫姪并朞親尊屬依舊制其餘親屬並等第與試銜樞密使參知政事樞密副使舊制子除太祝奉禮弟兄孫姪并弟守祕校今後子孫并朞親尊屬並依舊制其餘親屬並與試銜僕射尚書舊制子除守祕校弟兄孫姪並授京主簿今後子孫并朞親尊屬依舊制其餘親屬並與試銜三司使翰林學士侍讀侍講學士龍圖閣樞密直學士丞郎舊制子除正字弟兄孫姪並授京主簿今後子依舊制朞親尊屬授主簿其餘親屬並等第與試銜并齊郎給諫舍人龍圖閣直學士知制誥大卿監龍圖天章閣待制三司副使知雜舊制子與京主簿弟兄孫姪並授試銜今後長子除京主簿其餘親屬並與試銜并齊郎正郎至帶館職貟外郎遇南郊大禮合奏薦親屬者若降在監當不得陳乞曾犯正入贓罪至追官該恩叙用後來纍官正郎者只得奏䕃子孫一名諸路轉運使提點刑獄遇南郊大禮內有正郎帶館職貟外郎自合奏薦外餘並須於郊禮日前到任一年者方得奏薦親屬一巳上臣僚奏薦子孫親屬內長子長孫皆不拘年甲雖本非長子長孫見在居長者亦是諸子諸孫須年十五以上弟姪等並須二十以上方得奏薦所奏親屬並須在五服內者如虛增年甲并妄冒服紀並以上書詐不實論其合奏異姓之時即不問服紀應曾奏得子孫恩澤後其子孫亡殁本官别無孫食祿者並許再奏子孫親屬一名更不拘年甲一應奏䕃選人年二十五以上遇南郊大禮限半年內許令赴銓投狀差兩制以上官三貟於尚書省鎖院置封彌謄録司考試內習辭業試一場或論一首或詩賦各一首詞理可采不犯不考式者為及格與放選注官習經業者春秋禮記毛詩周易尚書逐人各專一經並兼習律文試一場墨義十道只問正文不問注疏五通者為及格與放選注官剝落者且守選限經三度試不中者選限滿日與司士參軍內有京朝官三人同罪保舉有行止堪守官者注遠地判官簿尉如不赴試又無上件舉主并雖曾三度就試詞業紕繆對義不及格更不理選限一奏䕃京官候年及二十五每年春一度赴國子監投狀差兩制巳上官三員於太學鎖院依選人考試內及格者方與差遣候兩任無私罪有本路轉運提刑知州通判三人同罪保舉即入親民經三度試不及格者如有三人朝臣同罪保舉有行止可以差仕者與小處監當候兩任無私罪本路轉運提刑知州通判五人同罪保舉方得親民其不赴程試又無上件官舉并雖曾三度就試詞業紕繆對義不及格者未得差使如却願班行者與等第安排奏重定職田頃畝州職田長吏大藩府二十頃節鎮十五頃防團以下州軍十頃京軍監七頃通判大藩府八頃節鎮七頃防團以下州軍六頃幕職官大藩府判官五頃餘並四頃節鎮判官四頃餘並三頃五十畝防團以下州軍監判官三頃五十畝餘並三頃縣職田令萬戶以上六頃五千戶以上各五頃不滿五千戶並四頃簿尉萬戶以上三頃五千戶以上各二頃五十畝不滿五千戶並兩頃發運轉運使比節鎮長吏武官職田部署頃畝比節鎮長吏鈐轄比防團州長吏路分都監比節鎮通判都監比大藩府判官監押比節鎮判官州軍監當官員使臣職田不得過本處職官之數在縣鎮監當不得過簿尉之數録事參軍比本州判官判司比倚郭縣簿尉一無職田處及有職田而頃畝少處并元摽得山石積潦之地不可耕植者限三年內檢括官荒田并戶絶地土及五年以上逃田支撥添換其係官莊田見有人戶出納租課者不得一例支撥如逐縣職田比今來所定頃畝數目不足即據見在重與上下衆官等第均分如地內有桑棗𬞞果之利者即以所收宜利約度比附逐處地利折充職田頃占客不得過三戶即不得令州縣差人勾當及招畝其田許逐㕔自差公人勾當并招置客戶每頃客戶或遇灾傷並令撿灾傷官貟依例撿覆的實分數減放子利如逐處官員為恐減下職田子利却一例不肯收接人戶灾傷詞狀者並從違制定斷其本官職田上見收子利盡底納官如將地土影庇令免却合入差徭及抑配虛作租佃令出課利入已者並以受所監臨財物贓罪論所差勾當人亦行嚴斷仍令提點刑獄司專切覺察轄下官貟職田欺弊犯者畫時勘鞠施行內情理頗重失於覺察者本司官貟當議勘劾各降差遣或有該奏重定臣僚轉官及差遣體例說不盡事理仰逐處起請聞奏一今後兩地臣僚非有勳德善狀即不得非時進秩或非次罷免者仍不以轉官帶職為例一兩省以上自來四年勘㑹轉官今後並具履歷取㫖一舊制京朝官三周年磨勘私罪并曾降差遣者四周年贓罪者五周年今後內外差遣京朝官無贓私罪者依舊三周年磨勘磨勘年限內犯私罪并公罪曾降差遣者四周年有入巳贓罪者五周年每遇磨勘仰審官院先具元犯情理入巳不入已因依輕重并今度磨勘年限內有無勞績及舉主人數進呈取㫖如經兩度取旨磨勘各有勞績及有同罪舉主三人以上又無私過者即依常例三周年磨勘更不先取㫖其到闕守候差遣人於指射路分內未有闕以前并受差遣以後待闕及得替赴任公程月日水計綱路程並許通計磨勘如守候差遣人於元指射合入路分內有闕不就則將守候差遣半年後月日并假限外及得替赴任公程外住滯日數並不得理入磨勘之限一今後京朝官上章陳乞并於中書審官院求就在京差遣者此後各須投狀並五周年磨勘所有前後資考即許通計如因省府等處保舉及准條貫差入在京勾當者依舊三周年磨勘即不得保舉及選差見任兩地并大兩省以上及省府臺諫官有服紀親屬入在京差遣一巳上差遣京朝官并陳乞在京勾當京朝官自降勑以前轉官及一周年者將來且依舊制年限磨勘一次其巳得在京差遣未曾勾當却求外任者並聽一今後文武臣僚善政異績可為衆範或勸課農耕厚獲美利或差鞠獄纍雪冤枉或在京監當庫務能革大弊因省得錢物萬數多者委所屬保明聞奏量事跡大小特與改官不隔磨勘或升陟差遣其幕職州縣官未該磨勘而有上項勞政者亦與比類升擢如保明不實以上書詐不實論一朝官轉至貟外郎須自任升朝官後有安撫轉運使提點刑獄或淸望官共五人同罪保舉并三周年內無私罪者方得磨勘貟外郎轉至正郎須自任貟外郎後有上項官五人同罪保舉并三周年內無私罪方得磨勘巳上如舉主不足五周年無公私過犯者亦與磨勘郎中轉少卿監亦依此施行少卿監轉大卿監并轉諫議大夫並取聖選指揮一今後京朝官幕職州縣官到審官院流內銓差注日仰銓院體量如有事狀猥濫老疾愚昧之人不稱事任並别取㫖本司不舉仰御史臺彈劾奏乞於陜西河東㳂邊行贖法臣竊見陜西河東邊計不足遂鑄鐵錢以助軍費而民多盜鑄日犯極典為法之弊久將不堪臣觀舜典曰金作贖刑又呂刑曰五刑不蕳正于五罰注謂不應五刑當止五罰出金贖罪是虞舜周公皆用贖法孔子删書垂于後世明其可行之法也歷代嘗行今久不用人或疑之臣欲乞且於陜西河東㳂邊次邊州軍行之候戎事稍息官不闕用則别從朝㫖今具條如後舜典曰金作贖刑金黃金誤而入刑出金以贖罪呂刑曰五刑不蕳正于五罰不蕳核謂不應五刑當正五罰出金贖罪五罰不服正于五過不服不成罰也正於五過從赦免墨辟疑赦其罰百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰漢惠帝民得買爵三十級以免死罪今民出買爵之錢一級直錢二十凡為六萬文帝輸粟縣官得以除罪武帝令死罪入贖錢五十萬減死一等梁髙祖詔依周漢舊典有罪入贖外詳為條格以時奏聞齊武時以尚書令王亮侍中王瑩僕射沈約等參定刑書其制刑為十五等之差棄市以上為死罪梟其首其次棄形二歲巳上為耐罪言各隨伎能而任使之也有髠鉗五歲刑笞三百收贖絹男子六百匹又有四歲刑男子四十八匹又有三歲刑男子三十六匹又有二歲刑男子二十四匹罰金一兩巳上為贖罪贖死者金二斤男子十六匹贖髠鉗五歲刑笞二百者金一斤十二兩男子十四匹贖四歲刑者金一斤八兩男子十二匹贖三歲刑者金一斤四兩男子十匹贖二歲刑者金一斤男子八匹罰金十二兩者男子六匹罰金八兩者男子四匹罰金四兩者男子二匹罰金二兩者男子一匹罰金一兩者男子二丈女子各半之五刑不蕳正于五罰五罰不服正于五過以贖論故為此十五等之差一徒以上罪不贖一杖以下罪依下項一侵損於人者皆不贖侵謂侵財物損謂傷折於人一兵士公人不贖內公人不因公事私自失誤者亦聽贖一為盜并造作詐僞及誣告論不干巳事者皆不贖一捕捉賊盜公人違限等罪不贖一興販私茶盬醖賣私酒并賭博人並不贖一所犯罪新條該贖至第三犯者不贖一衆人共犯一事合贖富貴不均者不贖內有物力願與衆人納罰錢者即皆聽贖造意人不以貧富不贖一軍人百姓同犯一事者不贖一應有䕃并老小疾患之類但舊條合贖者並依舊法每斤納錢一百二十文足一舊條不該贖而今得贖者並取情願之人其銅每斤納錢一貫二百文足亦許以粟帛依時價折納其錢無物贖納者自依常法區分一逐縣典押保舉有行止會筆札曹司一名赴本州法司習學法律委本州長吏以下聚㕔試驗稍通刑名義理即放歸本縣充法司候三周年撿斷無失者與轉一資有失誤無贓私者五年與轉一資一所斷贖刑失錯者官吏各凖其罪不以失減官典受贓者並以枉法贓論奏灾異後合行四事臣近日屢聞德音以災異數見畏天罪已此實聖帝明王至仁之體也天下幸甚幸甚昨日宰臣等再奉聖旨不須謝過但自行事此又濟時責實之要也臣等敢不惶恐思竭誠志以副宵旰之意臣觀自古國家皆有灾異但盛德善政及於天下人不敢怨叛則雖有災異而無禍變也如其德衰政暴兆民怨叛故灾異之出多成禍變也陛下今既畏天之戒上憂宗社下憂生靈固巳得堯湯之心矣如更行堯湯之事使天下受賜其有災異適足增陛下之盛德臣待罪輔臣經年無狀四方多事未敢引退恐負君親擢用之意臣竊觀自祥符年後以至今日火不炎上之灾巳十數度又纍有地震之異今夏蝗秋潦人多妖言雖陛下修德罪巳自可以動天地感鬼神而念及生民若不遑處臣請行此數事少助陛下救生民之萬一惟聖心裁擇一委天下按察使省視官吏老耄者罷之貪濁者劾之昏懦者逐之是能去謬吏而糾慢政也至於激勸善政之術即未著明其官吏中有畏上位之威希意望進或矯修廉節而爭為猛政求集事之名者務為暴斂求盡公之稱者專用深文政尚虛聲人受實弊資産竭於科率舉動觸於刑憲生民困苦善人嗟痛此天下怨叛之本也秦以天下怨叛而亡漢以救秦之弊而興臣請詔諸路按察官除常程糾察舉薦外於轄下知州知縣縣令中别選潔已愛民顯有善政得百姓心如倚父母者各具有的實事狀舉三兩人特與改官再任或升陟委用如此則天下官吏知陛下憂赤子之心各務愛民求理不為苛政足以息生民之怨叛也如所舉不實仰御史臺彈奏當議重行貶黜令别進呈唐時選刺史縣令條目便乞約附施行一天下官吏明賢者絶少愚暗者至多民訟不能辨吏姦不能防聽斷十事差失者五六轉運使提點刑獄但采其虛聲豈能遍閲其實故刑罰不中日有枉濫其奏按于朝廷者千百事中一二事耳其奏到案牘下審刑大理寺又只據案文不察情實惟務盡法豈恤非辜或無正條則引謬例一斷之後雖冤莫伸或能理雪百無一二其間死生榮辱傷人之情實損和氣者多矣古者一刑不當而三年大旱著於史䇿以戒來代非虛言也況天下枉濫之法寧不召灾沴之應耶臣請詔天下按察官專切體量州縣長吏及刑獄法官有用法枉曲侵害良善者具事狀奏聞候到朝廷詳其情理别行降黜其審刑大理寺乞選輔臣一貟兼領以愼重天下之法令撿尋自來斷案及舊例削其謬誤可存留者著為例册一今諸道常平倉司農寺管轄官小權輕主張不逮逐處提點刑獄多不舉職盡被州府借出常平倉錢本使用致不能及時聚糴每有灾沴及其遣使安撫雖民委溝壑而倉廪空虛無所振發徒有安撫之名且無救恤之實又國家養民之政本尚務農因民之利而利之則朝廷不勞心而民自養之矣臣請選輔臣一貟兼領司農寺力主天下常平倉使時聚糴以防灾沴并詔諸路提點刑獄今後得替上殿並先進呈本路常平倉斛㪷數目方得别奏公事移任者亦須依此發奏後方得起離仰司農寺常切糾舉及委輔臣等速定勸農賞罰條約頒行天下一天下茶盬出於山海是天地之利以養萬民也近古以來官禁其源人多犯法今又絶商旅之路官自行販困于運置其民庶私販者徒流兵稍盜取者絞配歲有千萬人罹此刑禍是有司與民爭利作為此制皆非先王之法也及以官販之利較其商旅則增息非多而固護之弊未能革者俟陛下之睿斷爾臣請詔天下茶盬之法盡使行商以去苛刻之刑以息運置之勞以取長久之利此亦助陛下修德省刑之萬一也奏贖法等三事臣數日前面奏三代帝王子孫綿遠蓋由積德之深臣請陛下日修至仁之德下及民庶以感動天地此聖嗣無疆之本也今有劄子三道進呈內一道為議贖法事即乞降出臣近覩詔㫖令御史臺審刑院大理寺修編勑所同議贖刑此陛下至德深仁被于億姓天下幸甚今諫官孫甫上言乞令大臣定奪施行臣欲乞特降聖㫖令中書樞密院同與見議官員疾速定奪聞奏仍乞且贖杖罪巳下情理輕者所貴易行取進止臣聞唐武德九年八月十八日詔曰觀省宮掖其數實多憫兹深閉久離親族一時減省各從娶娉自是宮中前後所出三千餘人又正觀二年十月二日太宗謂侍皆竭人財力朕所不取掃灑之餘更何所用於是命尚臣曰婦人幽閉深宮情實可憫隋氏末年求採無巳此書右丞戴胄給事中杜正倫於掖庭西門揀出之臣不知今來宮中人數幾多或供使有餘宜降詔㫖特令減放以遂物性又省冗費亦人君盛德之事可以感動天意范文正公政府奏議上
