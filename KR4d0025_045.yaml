front:
  text: 諸賢詩頌
  hash: sha256:7033a8c67c458410d5208390a491a3eecb3fed50b5842efe7e3af6ec11c1e595
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_045-1a}
body:
  text: 廣德司理詩孫莘老維待狴犴下枉直情必通太守異趣舍挺然不曲從有事爭論之粉屏記其終官小俸祿薄家居率窮空賣馬以自給徒步氣彌充遊百花洲盤礴文正祠下以生存華屋處零落歸山丘為韵賦十詩黃魯直其一憶昔昭陵日傾心用老成功歸仁祖廟政得一書生其二羊生但著鞭勿哭西州民故有不亡者南山相與存其三慶州自不惡籍甚載聲華忠義可無憾公今有世家其四公歸未百年鶴巢荒古屋我吟殄瘁詩悲風韻高木其五傷心祠下亭在時公燕處臨水不相猜江鷗㑹人語其六公有一杯酒與人同醉醒遺民能記憶欲語涕飄零其七委徑問謡俗高丘省胄作昔遊非苟然今花幾開落其八在昔實方枘成功見圎機九原尚友心白首要同歸其九人去洲渚在春回花草班清談值淵對發興如江山其十落日㗸城壁祠東更一遊悲來惜酒少安得董糟丘次韻其一夏均倪父神文秉周禮廟樂奏九成當時䕫一足不待魯諸生其二嘖嘖雀噪屋愔愔蛛網門我來九頓首生氣凛如存其三堂堂古遺直心嚴䫉無華人見不嫵媚何以娛大家其四朴䔩復朴䔩何以棟我屋風雨莫輕搖南山無老木其五有酒當自醑有室莫共處古今一丘貉何能坐飛語其六夢回四賢篇長風吹人醒嗟哉不我見淚與秋露零其七百代無幾人九原何可作不必溫御史解令君膽落其八寶元乃多故公時捴戎機胸中百萬兵要取橫山歸其九公歸今幾時遺懿何班班公議要難沒言波可懷山其十我心不可規滔滔誰與遊向來秉大雅心復成一丘懷范樓中奉大夫致仕楊用道初載希文此屈盤天衢一旦遂高摶古人直許到䕫契當世猶能並富韓事與陶朱均日煥名彰長白倚天寒何但東坡為流涕遺編我讀亦汍瀾故寧海軍刺史楊中奉才學與蘇黃不相上下近於李舜臣家得公墨跡慮其湮沒命工勒石以傳永久泰和乙丑春休日宣武將軍行主簿都騎尉王國器立石長山書事孫弘多詐涴齊人玉石由來各自分汲黯有靈吾可問此山曽見范希文至元七年秋七月二十有四日汶水節齊陳祐按部過此故題進義副尉長山縣主簿崔仲元立石謁文正公祠堂詩長白何岧嶤下有讀書室人云小范老於此度辰夕蕭蕭翳荆榛落落臨泉石拳拳往拜瞻赫赫如相及維宋慶曆間多士麟鳳集孰為天下憂一疏丹心白中朝元有人西夏諒難國力言師出凶深慮手滑失炳幾先見明韓富有慚德奈何時相陋欲碎和氏壁向非仁廟知千載血應碧至今忠義氣高壓萬仞壁所以行業隆要自清苦積功臣何代無名為富貴役視公乎昔懷霄壤邈相隔但能一善兼亦足百歲塞遺容揭日星未覺關塞黑長歌景行詩風林撼秋色右延祐四年三月草又七日翰林學士資善大夫知制誥同修國史張飬浩偕龐提領拜謁祠下文正范公祠吳潜仁誼功忠一片心兵間招弄更精神當時老上龍庭種豈信江南有此人長山溪畔蓼莪青想見當年念母情顧我遠遊營底事擡頭重感老先生長山青陽縣東二十里文正范仲淹幼鞫于朱氏讀書其地紹定二年縣令丁木立祠朝請大夫丁黼記池州青陽文正祠理齊楊少愚繤注范墉饒州書記歸徑池之青陽謁長山朱文翰留謝歸之越三月公生端拱巳丑歲也說名登第於祥符乙卯歸姓於天聖丁卯文翰任淄州長史亦嘗往長白山𥘉仕廣德軍云便迎母家書卑池州朱延之范太師戶置田青陽活朱氏孤遺獨墓碑為忠宣公諱耳七子母聖善凱風吹棘薪蒯聵書世子文姜絶不親詩亡春秋作寧以諱失真人之大倫五克諧信義仁吾身所由出同出先吾身循此而孝弟道與堯舜均異姓聿居三友妻上君臣事母豈殊父母或從乎人從人良有由夫命志莫伸所以謝夫人寄生天麒麟覃恩復歸宗善乎處天倫春秋明時中大經所經綸敢借魯衛書重為范氏陳澧州路安鄉縣太平興國觀文正公讀書堂東原申屠駧致祭祝詞維元統三年歲次乙亥六月辛丑朔越十有六日丙寅後學東原申屠駧巡歷至澧州路安鄉縣詣太平興國觀先師文正范公之讀書堂謹以三牲酒饌雜果盤𬞞敬祭而昭告曰惟公有出將入相之才則見諸事業有致君澤民之志則見乎文章捍海濤而築巨堰恤宗族而為義莊駧也昔嘗拜公之像於興化今復拜公之像于安鄉蓋非羡公之自寒微而至通顯乃特慕公之秉方正而備賢良也尚饗與祭官敦武校尉澧州路安鄉縣逹魯花赤兼勸農事馬合謀承事郎澧州路安鄉縣尹兼勸農事吕袁友進義校尉澧州路安鄉縣主簿夏思德縣尉楊宋照略案牘鄧天祐將仕郎吉安路儒學教授致仕羅勉道安鄉縣學教諭張巖儒生李恆周泰劉浚劉南昌青陽賔常德等處榷茶提舉司司吏魯思明祝辭維大元至正七年歲次丁亥八月辛未朔越二十有一日辛卯奉議大夫奉元路耀州知州兼管本州諸軍奧魯勸農事東平申屠駧謹以潔牲清酌冥楮淨香致祭于文正范公而昭以告曰公昔嘗寵知於耀駧今亦忝知于耀駧也黽勉焉惟前賢之是希庶幾乎逭後人之所誚謹告與祭官雲南省臨安路建水州儒學正殳栩蹇仲義陜西省奉元路耀州同官縣儒學教諭韓城程好問讀祝儒生汴梁李鼎詩頌
