body:
  text: 言行拾遺事録卷第三公知開封府每進見輒論時政得失宰相呂夷簡惡之斥守饒州諫官高若訥詆誚公與歐陽修為黨歐陽公以書責若訥謂其不復知人間有羞耻事若訥以聞謫夷陵令徙乾德復為武成軍節度判官公帥陜西辟修掌書記修曰吾論范公豈以為利哉同其退不同其進可也辭不就張升改轉運使知鄧州升以親老辭或以為避事范仲淹曰張升非避事者乃聽侍飬通鑑富彥國幼篤學有大度范公見而識之日此王佐才也懷其文以示王曽晏殊殊即以女妻之談藂河東轉運司指揮諸州軍場務更不得收納大鐡錢為民間漸多私鑄要得止絶欺弊遂有百姓經并州告訴各是交易到大鐡錢無處使用公遂出榜并州街市且令依舊行用公又恐諸處軍民疑惑各巳入急遞發下榜示逐處曉示軍民其官鑄大錢並依舊行使諸場務亦仍舊行用鐡錢麟州元無酒務至慶曆二年十二月官中創置灑務後據百姓劉遷狀申公勘㑹鄰州元管三縣六畨落蕃漢戶二千五百餘家朝廷以河東極邊不榷酒利今來殘破之後四靣並無居民入城交易只有城中主客二百餘戶别無經營從去年十二月官自開沽在市居民更無營利之地今算出官本并官貟兵士請受外只有淨利二百餘貫兼城中居民逐旋離去久逺不成州郡遂出榜并劄與麟州指揮本務據見在酒貨賣盡日住行醖造令百姓依舊任便開沽陜西側峻瘠薄逃田地土自來勒地分鄰人分認空納租錢人戶不願送納陜府申乞除放公劄與陜府據諸縣逃田官地勒地分鄰人空納租錢者并見缺錢數並與除放今後不得抱認送納慶曆四年十二月上差入內供奉官衛克勤押賜醫藥至公處并傳宣令公探候北界事宜公上言見各訓練選竒兵准備戰敵惟難得經歷將帥如北戎兵馬未放散間臣不敢便離河東北邊或有緩急與明鎬啇量指揮將佐料敵使人庶幾分朝廷萬一之憂公言諸軍頭等遺文帖宋舊勑文應有軍頭等𥙷署文帖誤𬒳水火損壞或賊人偷盜者許申本管人貟勘㑹詣實給與公據如自失墜即勒充長行者公言軍頭失了文帖降充長行其中甚有能部轄勾當人因纍次功勞方得遷補𬒳手下軍士憎嫌多方窺算藏毁文帖便降充長行情實可閔以此苟且和同不敢鈴轄覺察手下兵士違犯作過成弊愈深乞朝廷特降宣命指揮今後失去𥙷署文帖有因故事失去勘驗不虛即依舊職名重給公據收掌别無因依稱去失者如勘㑹得委不因酒醉及不是典解錢物即於舊聀名止降一等别給文帖安排所貴兵級安心無致誤犯公禁義軍搔擾樞密院劄子與安撫司行移都部署司依准朝㫖施行仍指揮本路州軍縣鎮出榜及鄉村粉璧曉示人戶嚴行覺察如替名人及諸色人等起動搔擾即收捉赴官勘斷施行公言天下郡邑事朝廷從之降勑署琦仲淹等奏請公又言若署臣等奏請於理未便只乞作朝廷憂勞之意特選臣僚舉官則事體甚重也通鑑慶曆四年六月己丑省河南府頴陽夀安偃師緱氐河清五縣並為鎮逐鎮令轉運司舉幕職州縣官兩貟監酒稅仍管勾煙火公事又拆王屋縣隸河南府始因參政范仲淹之請也類苑康定元年春正月丙子經略安撫判官尹洙至延州與范仲淹謀出兵越三日仲淹徐言巳得㫖聽兵勿出洙留延州幾兩旬仲淹堅持不可辛丑洙還至慶州乃知任福等敗績長編慶曆四年七月丙戌詔諸路轉運使副提點刑獄察所部知軍知縣有治狀者以名聞議旌擢之或不如所舉御史劾奏並坐上書不實之罪從參政范仲淹奏請也類苑公奏言西人請和有不可許者三有大可防者三又言臣等已議於一二年間訓兵三四萬使號令齊一陳伍精熟我軍鼓行山界每歲三五出元昊諸廂之兵頻來應敵疲於奔命則山界蕃部勢窮援弱自求內附足以斷元昊之手足矣臣等早䝉聖奬擢與清班西事以來三年塞下日勞月憂豈不願少圖休息非樂職矢石之間蓋見西戎强梗未衰挾以變詐臣等是以不敢念身世之安忘國家之憂須罄芻蕘少期𥙷助其元昊來人到闕伏望聖慈於納和禦侮之間愼於處置為聖朝長久之慮則天下幸甚實録公牒逐州相度新兵未有營房欲配買木植則大費官錢兼搔擾人戶又卒難了當其自來等第戶各有莊園宅舍及將家入營僅得一間營房難為存濟新兵內貧窮之家即給與係官木植其稍有家力情願自於夲家般到材植要蓋舍屋者聽如中等已下苦無事力除自有舊材料情願將來蓋造外或買到新瓦木者估價給與解鹽交引大省官錢又逐家自蓋屋宇早得了當并等第之家乍住營房不致迫窄可以存濟公纍奏薦种世衡知環州未用又上言環州勾當一郡十三寨當此危地須在得人朝廷以臣不才而輕此一路臣恐將有麟府之禍雖加罪於臣無益邊事臣今乞將新授左司郎中一官回授种世衡轉諸司使知環州權鈴轄司或朝廷從臣所請使邊臣知推讓之風亦非細事如終不允從則乞差臣帶本路一將軍馬權知環州支備如朝廷體量臣稍涉虛妄甘受上書詐佞不實之罪又奏云臣前乞將一官保舉本人非欲鼓激蓋為環州可憂後朝廷竟從公請果得世衡之用奏議及長編公出巡邊至環州點撿環州管界熟戶蕃官共一千七十二人與酒食管設作聖恩等第支與綵絹角茶銀碗紫綾襖黃花襖銀腰帶銀裹頭杖帽子旗槍銀交椅紅纓紫綾袋全錦襖子等物重立約束四件對衆告諭尋令蕃部望闕謝恩率皆喜躍名臣傳公言禁青鹽欲以困西賊非困賊之要却有所害㑹淮安寨捉到買青鹽兵士二人勘得夲指揮火隊掠錢買􅐭入衆喫用公言竊見諸軍常令聲樂蓋欲恱其衆心不至愁苦今兵士處於窮邊冒矢石負星霜若飲食失所更禁絶鹽味何以聊生未能困賊先困我師其買鹽兵士是本部衆人之罪實不敢盡法恐傷士心只決二人杖二十押送本部仍奏朝廷乞更參詳青鹽條貫名臣事實河東諸處坊郭村鄉人戶甚有差配頻併貧困祗當等第不得各拋下産業逃移在外大段失所公出榜曉諭諸州軍應坊郭村鄉人戶今日以前帶却配賣物色或抱二稅逃移者並令與放罪各令歸業其元拋下産業不得納官疾速差能幹官吏比附見在人戶物産定奪合該减放等第招誘歸業者不得更依元本等第其元缺二稅並與放除仍劄與都轉運司施行陜府有稅戶朱士成等八百九戶各為送納秋稅不前全家逃走延州延長等七縣逃移却稅戶三百七十一戶公牒陜府逐縣鄉村拘管上件逃移人戶屋業桑産不得燒毀斫伐其逃走人戶權與倚閣去年秋稅其見在第五等秋稅只於本處送納其第四等戶亦於鄰州送納免致逃移毁却桑産將來歸業不得所有諸州軍人戶慮恐亦有似此逃移并牒逐州亦請相度安恤類苑任福破白豹寨捉虜到僞首領李家妹在慶州官貟充奴婢公恐蕃界首領聞及轉生怨毒别起奸弊遂差指使侍禁石斌往慶州取同延州通判馬端及本路都監朱青問得所說事文狀一𥿄及稱於慶州淮安鎮有投來軍是親叔公即差石斌押送慶州分付與親叔歲奴收管令嫁事人為妻後石斌回稱到彼歲奴骨肉並來覷當號哭延州東路青澗城承平寨并保安軍北巡撿劉化基手下熟戶蕃部遭西賊打虜驚移傷殘戶數并投來蕃部並在逐寨及本軍側近住坐未曾歸業公慮恐其失所却逃入蕃界遂牒种世衡等勘㑹驚移熟戶蕃部有未敢歸業即便相度鄰近官私空間地土權撥與耕種如無牛具者官與量借糧收買又勘㑹驚移人戶并投來蕃部其中甚有缺乏糧食存濟不得却恐致有逃走又牒种世衡相度逐戶口數目每十口巳上量支借貸祿粟各一石十口巳下支借五斗嘗切照管安撫無令失所又金明寨蕃戶三百二十八戶雖給與田土緣經討虜後無力耕耘公又牒延州通判高延夫將蕃部每家十口巳下各支斛斗二石十口以上支三石並令於本處寨倉支給西夏夲末公常言官人之法人主當知其遲速升降之序其進退近臣不宜全委宰相實録康定二年五月十四日中書省劄子陜西軍州如有因修展城郭倉庫草場營房等但係侵占人戶地土去處並令將係官空間地許人戶請願指射官司給還若無地土即取索本主元買契比類鄰近地假買置價例支還本錢公到邠州據人戶王昭瑋等陳狀稱官中修營占却園地拆了屋舍乞估計合支價錢公體問得邠州稱繞城側近並無空間官地給還公遂委安平知縣李仲昌訪地所估到王昭瑋等合支價錢牒邠州請依上項條貫支給逐人價錢去訖又據後邠州申准轉運司牒修營占却人戶地基却令兊換係官空間地土撥還却勾收巳支價錢赴軍資庫送納公言諸州自來修造營房只是踏逐官地不許毁人戶見宅邸舍物業其邠州便將人戶見住物業毀拆逐起人戶無處存活既無官地兊還即合給還價錢買屋當司支與錢物其人戶當巳破費雖准轉運司指揮今將空間官地兊還既無官地即合回申轉運司豈得便却例行催納已支價錢侵害人戶遂勾到本州元行典級王益等勘杖一百斷遣所有人戶地土價錢牒邠州依條支還名臣事實公體量河東州軍人戶近年徭役科配頻併例各貧困遂免放今年秋稅稍得休息又恐陜西州軍人户亦自兵興以來祗應差科不易尋劄與陜西轉運司依河東例減放人戶支移奏議麟府州岢嵐軍極邊之地人戶稀少其色役公人並差主戶客戶祗應輪差出入應副軍期多致陪備破却家産又邊人日見貧困祗應不前公劄與轉運司并府州岢嵐軍據見今衙前使院人吏並仰依鎮戎軍條例支撥與係官荒間田土仍免送納二稅租課名臣事實西夏曩宵之叛其謀皆出於華州士人張元與吳昊而其事本末國史不書比得田畫承君集實紀其事云張元吳昊姚嗣宗皆關中人負氣倜儻有縱橫才相與友善嘗薄逰塞上觀視山川風俗有經略西鄙意姚題詩崆峒山寺壁在兩界間雲南粵干戈未息肩五原金鼓又轟天崆峒山叟笑無語飽聽松聲春晝眠公巡邊見之大驚又有踏破賀蘭石掃清西海塵之句張為鸚鵡詩卒章曰好著金籠收拾取莫教飛去别人家吳亦有詩將謁韓范二帥耻自屈不肯往乃礱大石刻詩其上使狀夫拽之於通衢三人從而哭之欲以鼓動二帥既而果召與相見躊躇未用間張吳徑走西夏公以急騎追之不及乃表姚入幕府張吳既至夏國夏人倚為謀主以抗朝廷連兵十餘年西方至為疲弊聀此二人為之時二人家屬羈縻隨州間使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家而去自此邊帥始待士矣姚又有述懷詩曰大開雙白眼只見一青天張有雪詩曰五丁仗劍決雲霓直取銀河下帝畿戰死玉龍三十萬敗鱗風卷滿天飛吳詩獨不傳觀此數聯可想見其人非池中物也容齊三筆延州都監周美言于范公曰賊新得志其勢必復來金明當邊衝我之蔽也今不亟完將遂失之公因屬美復城如故數日賊果來其衆數萬薄金明陳于延州城北三十里美領衆二千力戰㑹暮援兵不至乃徙軍山北多設疑兵賊望見以為救至即引去既而賊出艾蒿寨遂至郭北平夜鬪不解美悉衆使人持一炬從間道上山益張旗幟四靣大譟賊懼走獲牛羊馬槖駝鎧甲數千計遂募兵守其地東都事略嵐石都巡撿司接應到西界蕃部􅷌移團練使十三戶奉勑於海州住坐􅷌移願殺其妻子自刎死公差人往石州勾喚到􅷌移問當深不願海州居住公言􅷌移歸投新來其心未安若必遣住海州安泊不惟逺去鄉土全失蕃情又其人不測朝廷意㫖却自刑害今來西事未寧邊上蕃部聞之絶其向化之意則皆為怨敵邊害愈深遂發遣􅷌移住府州與田土耕種准備緩急使喚及令招喚本族未來蕃部公節制諸將勘㑹自來漢家兵馬先出只排作一陳被賊奔衝便見輪折遂牒東路朱吉任守信等候賊奔衝未得出兵但堅守城池放令深入即計㑹多著頭項衝突掩殺不得先出軍馬只作一陳排布依然無功如是𬒳賊守門出兵不得却多置索梯從城上夜出竒兵掩擊賊寨以資勝捷如違者當行軍法施行西夏夲末公門客滕逹道龍圖布衣時公尹京而滕年少頗不羈往往潜出狎邪縱飲公病之一夕至書室中滕巳出公因明燭觀書以俟意將愧之至夜分乃大醉而歸公陽不視以觀其所為滕略無慚懼長揖而問曰公所讀者何書也曰高祖傳滕曰漢高祖何如人公逡巡而入東軒筆録公言關中民苦轉輸請建鄜州之鄜城縣為軍以河中同華中下戶稅租就輸之春夏徙邊兵就食可省糴價什之三他所减不與詔名其軍日康定實録公知慶州兼管勾環慶路部署司兵馬至部即奏行邉以詔書犒賞諸羌閲其人馬立條約為信凡讐巳和斷輒私報之及傷人者罰羊百馬二已殺者斬負債爭訟聽告官為理輒質縳平人者罰羊五十馬一賊馬入界追集不起隨夲族每戶罰羊二質其首領賊大入老幼入保夲寨官為給食即不入寨本家罰羊二全族不至者質其首領諸羌受命恱服自是始為漢用長編慶曆元年三月任福等既敗朝議因欲悉罷諸路行營之號明示招納使賊驕怠仍密收兵深入討擊詔公體量士氣勇怯如不至畏懦即可驅策前去乘機立功公言任福已下勇於戰鬪賊退便追不依韓琦指蹤因致陷敗此皆邊上有名之將尚不能料賊今之所選往往不及更令深入禍未可量臣非不能督主兵官貟須令討擊不管踈虞敗事之後誅之何濟惟聖慈念之其鄜延路罷行營文字臣且令所部許懷德收掌别聽朝㫖臣一靣依此聞報夏竦韓琦啇量申奏如所議未合乞朝廷取捨臣方待罪不敢久冒此職妨誤大事從之於是行營之號卒不罷兵亦不復出實録慶曆詔諸路轉運使副提點刑獄察所部知軍知縣有治狀者以名聞議旌擢之或不如所舉令御史臺劾奏並坐上書不實之罪從范仲淹所請也通鑑和魯公有觀晝鷹獵兔詩云雖是丹青物沉吟亦可傷君誇鷹眼疾我憫兔心忙豈動騷人興惟憎獵客狂鮫綃百餘尺爭似製衣裳文正公觀之歎曰真仁人之言也筆録宣和五年經略宇文虛中奏故參知政事范仲淹知慶州築大順城為一路扞蔽辟洛苑副使种世衡知環州至今諸路戰守之備多二人規畫今慶陽府有仲淹廟環州有世衡廟合古者有功於民以死勤事之法乞各賜廟額詔賜廟為忠烈世衡威靖東都事略言行拾遺事録卷第三
