front:
  text: 諸賢贊頌論疏韓魏公遺事云魏公謂挺然忠義奮不顧身師魯之所存也身安國家可保明消息盈虗之理希文之所存也敢問二公曰立一節則師魯可也考其終身不免終亦無所濟若成就大事以濟天下則希文可也韓公與孫元規龍圖書云近方知希文留徐將治巳差下人致書藥詣徐及裁記為慶遞中忽領來教且承希文疾遂不起聞之驚慟數日不能飮食忠正大賢天下屬望平生素藴未得紓盡遂至于此深可哀哀痛痛所幸者到公治所後事得仁者盡力幹辦亦賢者之先識希文暝目無憾矣今專差人致奠如公未發告令一幹吏同辦之幸甚富鄭公稱之為聖人石徂徠比之為䕫卨張橫渠謂才氣老成歐陽公撰公神道碑云自公坐呂公貶羣士大夫各持二公曲直呂公患之凡直公者皆指為黨或坐竄逐及呂公復相公亦再起𬒳用於是二公歡然相得戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能正上既賢公可大用故卒置群議而用之歐陽公手自記日修學道三十年所得者平心無怨惡尓修初以范希文事得罪於丞相坐黨人逺貶三峽流落纍年比呂公罷相始𬒳進擢及後為范公作神道碑言西事呂公擢用希文盛稱二公之賢能釋憾而共力於國家者希文子純仁大以為不然刻石時輒削去一節云我父至死未嘗解仇每歎曰我亦得罪於丞相者惟其言公所以信於後世也嘗聞范公平生自言無怨惡於一人兼其與呂公解仇書見於范集中豈有父自言無怨惡於一人而其子不使解仇於地下父子之性相逺如此邵氏聞見録曰歐陽作碑辨不可則自削去歡然勠力等語歐陽殊不樂謂蘇明允云范公碑為其子弟擅於石夲改動碑中文字令人恨之歐陽公論小人讒沮范富諸賢云韓琦仲淹富弼等遇陛下聖明可謂難逢之㑹陛下有仲淹弼等亦可謂難得之臣陛下既巳傾心待之仲淹等亦各思報臣謂事無不濟但顧行之如何耳况仲淹弼是陛下特出聖意自選之人𥘉用之時天下巳皆相賀然臣所慮者仲淹等所言必須先絶僥幸因循姑息之事此等之事皆外招小人之怨怒而奸邪未去之人須時有讒沮若稍聽之則事不成矣臣謂當此行事之𥘉尤須上下叶力凡小人怨怒仲淹等自以身當浮議陛下亦須力拒待其久而漸定日見成功歐陽公論范公為衆所推云韓琦與仲淹皆是國家委任之臣材識俱堪信用然仲淹於陜西軍民思信尤為衆所推今若令仲淹外捍寇兵而琦居中應副必能濟大事若陛下以新用仲淹責其展效則且令了此一事俟邊防稍定不兩三月可以還朝既先弭於外庶可漸修於缺政歐陽公論四賢不當罷疏云杜衍韓琦范仲淹富弼天下皆知其可用之賢而不聞其有可罷之罪自古小人讒害忠賢其說不逺欲廣陷良善不過指為朋黨欲搖動大臣必須誣以專權其故何也去一善人而衆善人尚在則未為小人之利欲蓋去之則善人少過難於一一求瑕唯指以為朋黨則可以一時盡逐大臣不可以他事動搖惟有專權是人主之所惡故須此說方可傾之臣料杜衍等四人各無大過而一時盡逐必有朋黨專權之說上惑聖慈臣請詳言之杜衍為人清審而謹守規矩仲淹則恢廓自信而不疑韓琦則純正而質正富弼則明敏而果鋭四人為性既各不同雖皆歸於盡忠而其所見各異故於議事多不相從至如杜衍欲深罪滕宗諒仲淹力爭而寬之仲淹謂契丹必攻河東請急修邊備富弼料九事力言契丹必不來至如尹洙亦號仲淹之黨及爭水各城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙此數事尤為彰著陛下素巳知者此四人者可謂公正之賢也平日間居則相稱美之不暇為國議事則公言廷爭而無私以此而言臣見杜衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨誣矣陛下於千官百辟之中親選得此數人一旦罷去而使群邪相賀於內四夷相賀於外此臣所以為陛下惜也
