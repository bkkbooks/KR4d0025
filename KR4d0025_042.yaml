front:
  text: 褒賢之碑宋仁宗皇帝篆額觀文殿學士光祿大夫行禮部尚書知河南府兼西京留守事畿內勸農使上柱國臣王舉正題宋推誠保德功臣資政殿學士金紫光祿大夫尚書戶部侍郎護軍汝南郡開國公食邑二千三伯戶食實封六伯戶贈兵部尚書諡文正公范公神道碑銘并序皇祐四年五月甲子資政殿學士尚書戶部侍郎汝南文正公薨于徐州以其年十有二月葬于河南尹樊里之萬安山下公諱仲淹字希文五代之際世家蘇州事吳越太宗皇帝時吳越獻其地公之皇考從錢俶朝京師後為武寧軍掌書記以卒公生二歲而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之南都入學舍掃一室晝夜講誦其起居飮食人所不堪而公自刻益苦居五年大通六經之旨為文章論說必本於仁義祥符八年舉進士禮部選第一遂中乙科為廣德軍司理參軍始歸迎其母以飬及公既貴天子贈公曾祖蘇州糧料判官諱夢齡為太保祖祕書監諱贊時為太傳考諱鏞為太師妣謝氏為吳國夫人公少有大節其於富貴貧賤毀譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害為趍捨其有所為必盡其力曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈苟哉天聖中晏丞相薦公文學以大理寺丞為祕閣校理以言忤章獻太后旨通判河中府陳州久之上記其忠召拜右司諫當太后臨朝聽政時以至日大㑹前殿上將率百官為夀有司巳具公上疏言天子無北靣且開後世弱人主以疆母號之漸其事遂巳又上疏請還政天子不報及太后崩言事者希旨多非太后時事欲寖治之公獨以謂太后受托先帝保佑聖躬始終十年未見過失宜掩其小故以全其大德𥘉太后有遺命立楊太妃代為太后公諫曰太后母號也自古無代立者繇是罷其冊命是歲大旱蝗奉使安撫東南使還㑹郭皇后廢率諌官御史伏閣爭不能得貶知睦州又徙蘇州歲餘即拜禮部貟外郎天章閣待制召還益論時政闕失而大臣權幸多忌惡之居數月以公知開封府開封素號難治公治有聲事日益簡暇則益取古今治亂安危為上開說又為百官圗以獻曰任人各以其材而百職修堯舜之治不過此也因指其遷進遲速次序曰如此而可以為公可以為私亦不可以不察由是呂丞相怒至交論上前公求對辨語切坐落職知饒州徙潤州又徙越州而趙元昊反河西乃以公為陜西經略安撫副使遷龍圖閣直學士是時新拜大將延州危公請自守鄜延捍賊乃知延州元昊遣人遺書以求和公以謂無事請和難信且書有僣號不可以聞乃自為書告以逆順成敗之說甚辨坐擅復書奮一官知耀州未逾月徙知慶州既而四路置帥以公為環慶路經略安撫招討使兵馬都部署纍遷諫議大夫樞密直學士公為將務持重不急近功小利於延州築素澗城墾營田復承平永平廢寨屬羌歸業者數萬戶於慶州城大順以據要害奪賊地而耕之又城細腰胡盧於是明珠滅臧等大族皆去賊為中國用自邊利久墮至兵與將常不相識公始分延州兵為六將訓練齊整諸路皆用以為法公之所在賊不敢犯人或疑公見敵應變為如何至其城大順也一旦引兵出諸將不知所向軍至柔逺始號令告其地處使往築城至於版築之用大小畢具而軍中初不知賊以騎三萬來爭公戒諸將戰而賊走追勿過河巳而賊果走追者不渡而河外果有伏賊既失計乃引去於是諸將皆服公為不可及公待將吏必使畏法而愛巳所得賜賚皆以上意分賜諸將使自為謝諸蕃質子縱其出入無一人逃者蕃酋來見召之卧內屏人徹衛與語不疑公居三歲士勇邊實恩信大治乃决策謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣初西人籍為卿兵者十數萬既而黥以為軍惟公所部但刺其手公去兵罷獨得復為民其於兩路既得熟羌為用使以守邊因徙屯兵就食內地而紓西人饋挽之勞其所設施去而人德之與守其法不敢變者至今尤在慶曆三年春召為樞密副使五讓不許乃就道既至數月以為參知政事每進見必以太平責之公歎曰上之用我者至矣然事有先後而革弊於久安非朝夕可也既而上再賜手詔趣使條天下事又闓天章閣召見賜坐授以𥿄筆使疏於前公惶恐避席始得而條列時所宜先者十數事上之其詔天下興學取士先德行不專文辭革磨勘例遷以别能否减任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥幸之人皆不便因相與騰口而嫉公者亦幸外有言喜為之佐佑㑹邊奏有警公即請行乃以公為河東陜西宣撫使至則上書願復守邊即拜資政殿學士知邠州兼陜西四路安撫使其知政事才一歲而罷有司悉幸罷公前所施行而復其故言者遂以危事中之賴上察其忠不聽是時夏人巳稱臣公因以疾請鄧州守鄧三歲求知杭州又徙青州公益病又求知頴州肩卑至徐遂不起享年六十有四方公之病上賜藥存問既薨輟朝一日以其遺表無所請使就問其家所欲為贈以兵部尚書所以哀恤之甚厚公為人外和內剛樂善泛愛喪其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其為政所至民多立祠畫像其行巳臨事自搢紳處士里閭田野之人外至夷狄莫不知其名字而樂道其事者甚衆及其世次官爵志于墓譜于家藏于有司者皆不論著著其繫天下國家之大者亦公之志也歟銘曰范於吳越世實陪臣俶納山川及其士民范始來此中間幾息公奮自躬與時偕逢事有罪功言有違從豈公必能天子用公其難其勞一其初終夏童跳邊乘吏怠安帝命公往問彼驕頑有不聽順鉏其穴根公居三年怯勇墮完見憐獸擾卒俾來臣夏人在廷其事方議帝趣公來以就豫治公拜稽首茲惟難哉初匪其難其在終之群言營營卒壞于成匪惡其成惟公是傾不傾不危天子之明存有顯榮歿有贈諡藏其子孫寵及後世惟百有位可勸無怠翰林學士尚書吏部郎中知制誥充史館修撰歐陽修文翰林學士兼侍講尚書吏部郎中知制誥充史館修撰王洙書墓志銘富弼撰皇祐四年夏五月二十日甲子資政殿學士戶部侍郎范仲淹以疾薨于徐吏走驛馬以公喪聞天子感慨不一御垂拱殿朝特贈兵部尚書太常考行諡文正録孤賻物悉用加等中外士大夫駭然相吊以泣至於岩􅊤處逸無不痛惜之其孤護帷幘還洛卜以是年十二月一日壬申葬于河南縣萬安山尹樊里先隴之側孤馳使來求銘將納于竁曰公之先始居河內後徙長安唐垂拱中履氷相則天以文章稱實公之逺祖也四代祖陏唐末為幽州良鄉縣主簿遭亂奔二浙家於蘇之吳縣自爾遂為吳人時中原多故王澤不能逮逺於是世食錢氏之祿蘇州糧料判官夢齡以才德雄江右即公之曽王父也判官生贊時幼聰警嘗舉神童任祕書監集春秋洎歷朝史為資談録六十卷行於時祕監生墉博學善屬文纍佐諸王幕府端拱初隨錢俶納國終武寧軍節度掌書記公即掌記之第三子也朝廷以公貴用太保太傅太師追贈三代又擇徐許越吳四大國追封王妣陳氏妣陳氏謝氏為太夫人公諱仲淹字希文不幸二歲而孤吳國太夫人以北歸之𥘉亡親戚故舊貧而無依再適長山朱氏公既長未欲與朱氏子異姓懼傷吳國之心姑姓朱後從事於亳吳國命始奏而復焉公少舉進士祥符八年中第調廣德軍司理椽權集慶軍節度推官制置使舉監泰州西溪鹽廪以勞進大理丞又舉知興化縣建州關隸以吳國老疾辭監楚州糧料院丁憂去官服除晏丞相以文學薦公于朝試可署祕閣校理時章獻皇太后臨政巳巳歲冬至上欲率百僚為夀詔下草儀注搢紳失色相視雖切切口語而畏憚無一敢論者上又專欲躬孝德以勵天下而未遑餘恤公獨抗疏曰人主北面是首顧居下矧為后族强逼之階不可以為法或宫中用是為家人禮權而卒於正斯亦庶乎其可也疏奏遂罷上夀儀然后頗不懌尋出為河中府通判轉殿中丞謀葬吳國再請通判陳州遷太常博士聞京師多不關有司而署官賞者訪焉出於中㫖乃附驛奏疏甚懇至願以上官賀婁事為戒明年章獻后棄長樂擢為右司諫屬朝廷用章后遺令䇿太妃楊氏為皇太后與政制出都下訩訩公上疏極諫古者立太后所以尊親也不容冀幸於其間武武相躡一二而數况復稱制以取惑天下耶臣恐後世有以窺之者上悟第於后泣號而止公殫𥙷闕失無所阿忌貴幸仄目不欲久留諫職因江淮飢以才命公體量安撫雖别領走外亦懇懇不忘憂國途中上時弊十事皆政教之大者纍月還朝適議廢郭后上書曰后者君稱以天子之配至尊故稱后后所以長飬隂教而母万國也故繫如此之重未宜以過失輕廢立且人孰無過陛下當靣諭后失放之别館㨂妃嬪之老而仁者朝夕勸導俟其悔而復其宮則上有常尊而下無輕議矣書奏不納明日又率其屬及群御史伏閣門論列如前日語上遣中貴人揮之令詣中書省宰相窘取漢唐廢后事為解時吕夷簡為相公曰陛下天資如堯舜公宜因而輔成之奈何欲以前世弊法纍盛德耶中丞孔道輔名骨鯁亦扶公議論甚切直又明日晨率道輔將留百辟班揖宰相廷辨抵漏舍㑹降知睦州臺吏促上道在郡歲餘知蘇州朝廷知清議屬公就拜禮部貟外郎天章閣待制召還有入內都知閻文應者專恣不恪事多矯旨以付外執政知而不敢違公聞知而不食將入辨謂若不勝必不與之俱生即以家事屬長子明日盡條其罪惡聞於上上始知遽命竄文應嶺南尋死于道公自還闕論事益急宰相隂使人諷公待制主侍從非口舌任也公曰論思者正侍臣之事豫敢不勉宰相知不可誘乃命知開封府欲撓以劇煩而不暇他議亦幸其有失即罷去公處之罙月威斷如神吏縮手不敢侮其奸京邑肅然稱治于時官方無紀每對未嘗不為上力陳治亂之道皆由用人得失此實宰相之職也天子日擁万幾非所宜專然不可以不察因取職局官品以類選次至於超遷序進附見其下為圗以獻庶上易覽宰相益不恱嗾其黨短公於上前公亦連詆宰相坐是去閣職貶知饒州是日上封贈書論公以忠義獲譴極道所不可者皆當世英豪宰相指為朋黨相繼謫去治饒未久徙潤又徙越寶元初羌人壓境叛間歲悉衆寇延州大將戰沒關中警嚴於是還公舊職移知永興軍道授陜西都轉運使議者謂將漕之任不預戎事遂改充經略安撫副使仍遷龍圗閣直學士吏部貟外郎以寵之至部首按鄜延時延安始困兵火障戍掃地城外即寇壤巋然孤壘人心危恐廢食待竄凡朝廷遣守皆以事避免既遷延不時往公遂留不行騎奏願兼領延州事以待寇之復來上嘉而從之屬亡戰日久兵無紀律猝有外警蕩然不支公於是大閲州兵得萬八千析為六將分命禆佐訓飾不數月舉為精鋭士氣大振莫不思戰而寇知我有備即引去朝廷推其畫諸路皆以為法成青澗城復散亡屬羌萬餘帳開營田數千頃以收軍實人視邊塞其完固如山立不可動謂宜討賊不可坐守老吾師朝廷下其議將從之公執猶以為未無幾涇原師出敗于好水川天子由是益信公智謀過人逺甚前此賊以書署僣號遺公請和公不忍俾朝廷報賊乃自占答黜其僣署為陳逆順禍福立遣使者還未出境聞好水川敗始悟賊書譎而非誠益自信立報為是執政以公擅報罪當誅上知公其責止命削一官降知耀州幾月拜戶部郎中起知慶州尋遷左司郎中本路經略安撫招討使兼兵馬都部署有馬寨者素為賊衝然地與境相衝久不能城公至自領牙兵出不意駐柔逺寨别遣蕃將取其地得之先命長子入據以率衆公亦親往勞士有頃賊三萬騎叩城下公麾兵血戰則遽北戒諸將勿追已而果有伏兵夜遁城既立詔名大順徐又城細腰復胡盧等寨招明珠滅臧二强族各萬餘人及並環千餘帳內附自此環慶屬羌悉為吾用先是卒驕難使主將咸務姑息公築延慶諸城堡募民不足乃雜使禁旅蓋素服公威惠勞苦雖且死不怨久之涇原師再喪定川關轉復震而虞變生公知親率垓下兵連夜赴援且將邀賊歸路擊之㑹巳出塞遂班師因移其兵耀于關輔人心由是大定𥘉定川事聞上頗駭謂侍臣曰得范仲淹出援吾無憂矣數日公奏至上大喜懷其章示執政曰吾知范仲淹可用加樞密直學士右諫議大夫時朝廷以戍卒屢衄議黥鄉人懼甚竄匿不願黥公改命但刺其手非校戰請農于家後罷兵獨環慶路鄉軍得復為民民德公至于今不忘朝廷尋盡以西路委公置府於涇州授陜西四路經略安撫招討使方謀取橫山故地漸復靈夏然後可以誅賊賊知亡無日懼不克當因遣使講和明年春召公為樞密副使凡五讓不從乃拜之輿議謂公有經綸之才不宜局於兵府是秋改參知政事上倚公右於諸臣公亦務盡所藴以圗報然天下久安則政必有弊者三王所不能免公將劘以歲月而人不知為悠久之道也上方鋭於求治間數命公條當世急務求公始末奉詔每辭以事大不可忽致於是露熏降手詔再遣內臣就政事堂督取開龍圗閣給𥿄扎令立疏者各一日面詰者不可數退曰吾君求治如此之切其暇歲月待耶即以十䇿上之蓋取士課吏減任子更衛兵擇守宰謹勑令厚農桑之類者又先時别上法度之說甚多皆所以抑邪侫振紀綱扶道經世一一可行上覽奏褒納益信公忠耿不為身謀恤也遽下二府促行論者漸齟齬不合作謗害事公知之如不聞持之益堅明年秋邊奏疑若有警者公慮帥臣恃和而懈因懇請按邊即命河東陜西宣撫使麟州向者亦𬒳寇掠邈然在賊腹中本道帥病無供給奏欲棄之曰麟棄疆場日蹙不可請復廢障使民耕于鄙於是得不棄又代郡西四州軍附邊有廢地尤廣著令禁不得耕郡縣以敵嫌不敢正視前歐陽修來使盡籍其利害請弛禁許人耕以輸可代轉挽之勞以帥議不協罷公至於其利大且亡所嫌者屢奏如修議便後止耕岢嵐一境而塞粟已充矣公既度陜以西羌好難保而邊計尚缺疏手奏願解政事復領四路以捴護諸將即除授資政殿學士知邠州兼陜西四路安撫使以疾請鄧州遷給事中三年又請浙郡因得厝先人之墓移杭州加禮部侍郎祀明堂復遷戶部又移青州兼東路安撫使幾歲病疾又請頴肩輿至彭門遂不起年六十四公為學好明經術每道聖賢事業輒跂聳勉慕皆欲行之於己自始仕慨然有康濟之志凡所設施必本於仁義而將之以剛决未嘗為人屈撓歷𥙷外職以嚴明馭吏使不得欺於是民皆受其賜立朝益務徑雅事有不安者極意論辨不畏權幸不蹙憂患故屢亦見用然每用必黜之黜則欣然而去人未始見其有悔色或唁之公曰我道則然苟尚未遂棄假百用百黜亦不悔噫如公乃韓愈所謂信道䔍而自知明者也在陜西尤為宣力以儒者奉武事又邊備久廢忽而王師新敗剝喪破漏而莾乎無所取濟公周施安集坐可守禦畜鋭觀釁適圖進討㑹羌人復修貢朝廷始議息兵乃從其請於是不能成殄滅之功然其閲武練將可以震敵城要屬雜羌可以扼寇此後世能者未易其過也至於懇田阜財立法著信愛民全國體赫赫在人耳目皆可為破賊之地者又可道哉其歷二府才歲餘而罷若夫天下至重久安之弊至深而欲以一二歲臨之而望治雖愚者知其不可得况所奏議阻而不行者十八九行者又即改廢不用兹所以重主憂而生民未得安也宣撫之𥘉讒者乘間鋒起蓋以竒中造端飛語無所不及甚者必欲擠之以死而後巳賴上寬度明照知公無他始終保全獲歿牖下嗚呼道之難行也而至是乎憸人苟欲伸巳志而不志乎邦家此先民所以甘藜藿而蹈江海也公天性喜施與人有急必濟之不計家用有無既顯門中如賤貧時家人不識富貴之樂每撫邊賜金銀甚而悉以遺將佐在杭盡以餘俸買田於蘇州號義莊以聚踈屬而斂無新衣友人醵資以奉葬諸孤無所處官為假屋韓城以居之遺表不干私澤此益見其始卒志於道不為祿仕出也作文章猶以傳道名世不為空文有文集二十卷奏議十七卷兩府論事三卷娶李氏故參知政事昌齡之姪封金華縣君卒於鄱陽今舉而附焉四子純佑守將作監主簿少有氣節以疾廢于家純仁進士第光祿寺丞純禮太常寺太祝皆溫厚而文識者曰范氏有子矣三女長適殿中丞蔡交次適封丘主簿賈蕃諸孫三長正臣守將作監主簿一男純粹一女二孫幼銘曰公之世系源于陶唐晉㑹食范厥姓始彰睢痤蠡增滂寧雲質兹惟聞人間代而出或霸戓季所有何𫐠粵自得姓千五百年獨公挺生為天下賢涉聖之餘揭厲泗㳂道尊德雄事公日繁人獲一善巳謂其難公實百之如無有然遭時得君位亦顯焉罹此讒慝志莫究宣元元年艱噫嘻乎天
