body:
  text: 律詩睢陽學舍書懷白雲無賴帝鄉遙漢苑誰人奏洞簫多難未應歌鳳鳥薄才猶可賦鷦鷯瓢思顔子心還樂琴遇鍾君恨即銷但使斯文天未喪澗松何必怨山苗詠史五首陶唐氏純衣黃冕曆星辰白馬彤車一百春莫道茅茨無復見古今時有致堯人有虞氏成都成邑即天開終踐堯基詠起哉但得四門元凱至九韶何必鳯皇來夏后氏景命還將伯益傳九川功大若為遷謳歌終在吾君子豈是當時不讓賢商人履癸昆吾禍莫移應天重造帝王基子孫何事為炮烙不念嘻吁祝網時周人斧鉞為藩忍內侵商人塗炭奈何深不煩魚火明天意自有諸侯八百心次韻和劉夔判官對雪蔌蔌樓臺外新輝溢四遐雲中凋玉葉星際落榆花嶽色參差露松聲髣佛加風流裁賦苑淸苦讀書家霜女慙輕格蟾娥讓素華孤鴻迷鳥道萬馬憶龍沙淨拂王恭􅌁香滋陸羽茶載歌勞郢謝一奏待鍾牙幾處和梅賞何人為鬢嗟含毫看不足詩社好生涯河朔吟太平燕趙許間遊三十從知壯士羞敢話詩書為上將猶憐仁義對諸侯子房帷幄方無事李牧耕桑合有秋民得袴𥜗兵得帥禦戎何必問嚴尤和黃惣太博上知郡杜少卿萬石君賢再出麾猶龍川上五歌時九重執憲淸規在十鎮分憂白髮知環禁申威星拱極鈴齊舒嘯月侵帷金臺下客思何報願上中和樂職詩過太淸宫醜石危松半緑蘿函關真相玉嵯峨誰言仙道求難至自愧隂功積未多渺渺雲霞開絳節雍雍鸞鳳答空歌幾時身退瓊壇畔榮利匆匆奈老何寄餘杭全安石段少連二從事分携俱是佐高牙兩地光塵自等差榮事日趨丞相府道情時過老君家雙鴻得侶知風便一鶴思鳴對露華早晚相將雲漢外重為龍友免天涯送江南運使張傅度支刑措東南始詔回重分邦計命欽哉于公已積充閭慶蕭相還施富國才十郡甘棠歌未歇一方流馬路初開啓心知有嘉謨在足亂雲霓憶帝臺堯廟千古如天日巍巍與善功禹終平洚水舜亦致薰風江海生靈外乾坤揖讓中鄉人不知此簫鼓謝年豐西溪見牡丹陽和不擇地海角亦逢春憶得上林色相看如故人寄秦州幕明化基寺丞同時辟命新中道改絲綸滄海人歸楚淸風子在秦共居卿月下獨得將星鄰聳動軍前檄崢嶸席上珍烽煙邊信息金鼓武精神獵度天山雪歌逢隴樹春燕臺無限好西向自霑巾鵰鶚在秋天秋漢寥寥逈雄心肯木棲人間正搖落天外絶攀躋月兔精應喪陽烏影欲齊長河匹練小太華一拳玄下眄羣毛遁橫過百鳥睽乘風俊未巳空闊玉關西觀獵鷹犬一何驕霜明逺近郊鸞皇不觸網狐兔自充庖熠熠流鳴鏑紛紛過緑髾雄飛侵漢下殺氣與雲交翦棘爭探穴摧林競覆巢惟開三面者盛德播絃匏鸚鵡堂上每云云金籠久受恩思山誠有意對主忍無言性比孤鸞潔聲殊百舌繁雲林如一去應喜謝朱門歸鴈稻梁留不得一一起江天帶雪南離楚和春北入燕依依前伴侣歷歷舊山川木葉程猶遠梅花信可傳子規啼到曉鸚鵡鎖經年應羡冥冥者東風羽翼全靑郊青郊鳴錦雉緑水漾金鱗願得郢中客共歌臺上春射陽湖渺渺指平湖煙波極望初縱橫皆釣者何處得嘉魚舟中珠彩耀前川歸來一扣舷微風不起浪明月自隨船寄歐靜秀才君歸一水遙魂斷木蘭橈賴有南軒竹淸風慰寂寥和韓布殿丞三首泛湖中平湖萬頃碧謝客一開顔待得臨淸夜徘徊載月還琴酒絃上萬古意樽中千日醇淸心向流水醉貌發陽春漁父月色滿滄波吾生樂事多何人獨醒者試聽濯纓歌送識上人遊金山寺空半蔟樓臺紅塵安在哉山分江色破潮帶海聲來煙景諸鄰斷天光四望開疑師得仙去白日上蓬萊野色非煙亦非霧羃羃映樓臺白鳥忽點破夕陽還照開肯隨芳草歇疑逐遠帆來誰謂山公意登高醉始回雜詠四首一􅎚人一笑白雲鄉𣏌桂森森遇豫章聞道周公繩墨在天庭誰此遇明堂二有客藍田得意歸溪光冉冉白虹霓玉人豈忍言環珮留取天王尺二圭三鏗鏗千古嶧山桐金石聲來造化中誰道元和無復致為君堂上起薰風四嶺上英英向日開帝鄉情態自徘徊如何一施陽春雨依舊無心歸去來書事呈韓布殿丞南宫曾薦牧之文失足徒勞忽十春天上雲龍期際會山中猿鶴愧因循無功豈不孤黃石有道何堪憶紫蓴少壯由來須努力篆銘鍾鼎古何人西溪書事卑棲曾未託椅梧敢議雄心萬里途蒙叟自當齊黑白子牟何必怨江湖秋天響亮頻聞鶴夜海瞳朧每見珠一醉一吟踈懶甚溪人能信解嘲無得李四宗易書秋風海上憶神交江外書來慰寂寥松柏舊心當化石塤箎新韻似聞韶須期管鮑垂千古不學張陳負一朝三復荆州無限意王孫芳草路遙遙歐伯起相訪海涯牢落若為懷惟子相過未忍回徑草不隨風偃去孤桐何意鳳飛來鐏藏金醴遲遲進匣鎖雲和特特開萬古功名有天命浩然携手上春臺寄贈林逋處士唐虞重逸人束帛降何頻風俗因君厚文章至老淳玉田耕小隱金闕夢高真罷釣輪生蠹慵冠鑑積塵餌蓮攀鶴頂歌雪扣琴身墨妙靑囊祕丹靈緑髮新嶺霞明四望巖笋入諸鄰幾姪簮𥚑盛諸生禮樂循朝廷唯薦鶚鄉黨不傷麟吊古夫差國懷賢伍相津劇談來劒俠騰嘯駭山神有客瞻冥翼無端預薦紳未能忘帝力猶待補天均早晚功名外孤雲可得親酬滕子京同年謝家風雅若為酬散吏方耽海上遊踈懶幾忘傳筆夢寂寥仍有負薪憂欲歌蘭雪歸真隱敢向簮軒競急流如共茂先瞻氣象莫言神物在南州贈餘杭唐異處士名動公卿四十秋相逢仍作旅人遊靑山欲買難開囗白髮思歸易滿頭猒入市㕓如海燕可堪雲水屬江鷗故鄉知已方都督千樹春濃種橘休時胡侍郎守餘杭和沈書記同訪林處士山中宰相下巖扃靜接遊人笑傲行碧嶂淺深驕晚翠白雲舒卷看春晴煙潭共愛魚方樂樵㸑誰欺鴈不鳴莫道隱君同德少樽前長揖聖賢淸諸暨道中作林下提壷招客醉溪邊杜宇勸人歸可憐白酒靑山在不醉不歸多少非題翠峯院范蠡舊宅翠峯高與白雲間吾祖曾居水石間千載家風應未墜子孫還解愛靑山與人約訪林處士阻雨因寄間約諸公扣隱扃江天風雨忽飄零方憐春滿王孫草可忍雲遮處士星蕙帳未容登末席蘭舟無賴寄前汀湖山早晚逢晴霽重待尋仙入翠屏寄西湖林處士蕭索繞家雲淸歌獨隱淪巢由不願仕堯舜豈遺人一水無涯靜群峯滿眼春何當伴間逸嘗酒過諸鄰越上聞子規夜入翠煙啼晝尋芳樹飛春山無限好猶道不如歸送李紘殿院赴闕寂寥門巷每相過親近賢人所得多今日九重天上去濉陽孤客奈愁何霜露丘園不忍違三年月日速如飛金門乍入應垂淚因挂朝衣憶彩衣送邢昂處士南遊落落崆峒一大儒四方心逸憶江湖東南賴有林君復萬里清風去不孤送丁司理赴明州仙家枝葉令威孫南去司刑庇越民金闕道書微㫖在獄多隂德是真人道書謂升真者皆須曾為獄官送鄞江竇尉片帆飛去若輕鴻一霎春潮過浙東王謝江山久蕭索子真今為起淸風送常熟錢尉姑蘇臺下水如藍天賜仙鄉奉㫖甘梅淡柳黃春不淺王孫歸思滿江南試筆偶緣踈拙得天真豈問前途屈與伸車馬縱能欺倦客江山猶可助騷人懶如叔夜書盈几狂似淵明酒滿巾況有南窗姬易在此心郍更起纎塵送真元二上人歸吳中歸心不可奪千里故園春及見市朝事却思江海人煙波方得伴松月定為鄰願結虎溪社休休老此身寄題許州錢相公信美亭華搆高軒敞名湖一面分星辰居上相鼓吹燕中軍山色來嵩室風光徹汝墳杉篁涵晚翠蘭茞薦時薰坐嘯頻乘月歸懷幾望雲逈臨黃霸俗逺味仲宣文萬戶方開國三階復致君斯亭比棠樹千載頌淸芬送何白節推宰晉原二首盛府兼名邑榮歸指故林多年望鄉淚萬里倚門心江館春寒薄山程晚翠深板輿迎侍日桃李正芳隂又此行深惜别所喜是寧親祖帳千門曉鄉關錦國春鳥歌疑勸酒也態似迎人我絶南陔望因兄淚滿巾送刁紡户掾太常下第時為太常發解官精鑒本非深英僚暫此沉火炎方試玉沙密偶遺金豈纍靑雲器猶孤白雪音敢希蘇季子濳有激儀心憶杭州西湖長憶西湖勝鑑湖春波千頃緑如鋪吾皇不讓明皇美可賜踈狂賀老無寄林處士片心高與月徘徊豈為千鍾下釣臺猶笑白雲多事在等間為雨出山來依韻酬母湜推官聖門非入室文陳敢爭盟不意棲雲閣何才隸月卿珍群憐未至霄鶚引修程直舍有仙味祕庭無俗聲午隂宫樹緑宵刻禁鍾清奉制歌三秀稱觴聽六英恩輝孤易感交結淡難成新髮鑑中改舊山天際橫纓思漁父濯春伴隼旟行桃浪觀秦塞薰風省舜城幾多興廢跡重疊古今情進退思先覺蹉跎畏後生見詒如美衮欲報乏英瓊淨揖澄江練高窺擢露莖復驚聞正始終仰輔登閎好勵圖南志翶翔覽四瀛送石曼卿河光嶽色過秦關英氣飄飄酒滿顔賈誼書成動西漢謝安人笑起東山亨途去覺雲天近舊隱回思水石間此道聖朝如不墜疏封宜在立談間送河涉秀才蜀道歸來萬里身上堂嘉慶動諸鄰賢良詔下先生起休向成都問卜人八月十四夜月光華豈不盛賞宴尚遲遲天意將圓夜人心待滿時巳知千里共猶訝一分虧來夕如澄霽淸風不負期送吳安道學士知崇州一麾輕去奉蘭羞共惜淸賢豈易求筮易暗驚鳴鶴遠賦詩深望白駒留古來經緯心皆曉間處光隂髮半秋長孺之才同吏隱相寬頻上海邊樓時聶長孺倅通判謫守睦州作重父必重母正邦先正家一心回主意十囗向天涯銅虎恩猶厚鱸魚味復佳聖明何以報殁齒願無邪赴桐廬郡淮上遇風三首聖宋非強楚淸淮異汨羅平生仗忠信盡室任風波舟楫顚危甚蛟黿出沒多斜陽幸無事沽酒聽漁歌又妻子休相咎勞生險自多商人豈有罪同我在風波又一棹危於葉傍觀亦損神他時在平地無忽險中人送韓瀆殿院出守嶽陽仕宦自飄然君恩豈欲偏才歸劒門道忽上洞庭船墜絮傷春目春濤廢夜眠嶽陽樓上月清賞浩無邊出守桐廬道中十絶隴上帶經人金門齒諫臣雷霆日有犯始可報君親又君恩泰山重爾命鴻毛輕一意懼千古敢懷妻子榮又妻子屢牽衣出門投禍機寧知白日照猶得虎符歸又分符江外去人笑似騷人不道鱸魚美還堪養病身又有病甘長廢無機苦直言江山藏拙好何敢望天閽又天閽變化地所好必真龍軻意正迃闊悠然輕萬鍾又萬鍾誰不慕意氣滿堂金必若枉此道傷哉非素心又素心愛雲水此日東南行笑解塵纓處滄浪無限淸又滄浪清可愛白鳥鑑中飛不信有京洛風塵化客衣又風塵日巳逺郡枕子陵溪始見神龜樂優優尾在泥蕭灑桐廬郡十絶蕭灑桐廬郡烏龍山靄中史君無一事心共白雲空又蕭灑桐廬郡開軒即解顔勞生一何幸日日面靑山又蕭灑桐廬郡全家長道情不聞歌舞事繞舍石泉聲烏龍山泉實過公署又蕭灑桐廬郡公餘午睡濃人生安樂處誰復問千鍾又蕭灑桐廬郡家家竹隱泉令人思杜牧無處不潺湲又蕭灑桐廬郡春山半是茶新雷還好事驚起雨前芽又蕭灑桐廬郡千家起畫樓相呼採蓮去笑上木蘭舟又蕭灑桐廬郡淸潭百丈餘釣翁應有道所得是嘉魚此郡魚少而嘉又蕭灑桐廬郡身間性亦靈降真香一炷欲老悟黃庭又蕭灑桐廬郡嚴陵舊釣臺江山如不勝光武肯教來新定感興五首數仞黃堂上題名僅百賢孤高宋開府千載可拳拳又山水真名郡恩多𥙷諫官中間好田錫風月亦盤桓又風物皆堪喜民靈獨可哀稀逢賢太守多是謫官來又去國三千里風波豈不賖回思洞庭險無限勝長沙又江上多嘉客淸歌進白醪靈均良可笑終日著離騷遊烏龍山寺髙嵐指天近遠溜出山遲萬事不到處白雲無盡時異花啼鳥樂靈草隱人知信是棲真地林僧半雪眉江干間望江干日淸曠寓目一搘笻落葉信流水歸雲識舊峯蘭蓀誰共采鳬鴈自相從莫愛蘋風起波來千萬重和章岷推官同登承天寺竹閣僧閣倚寒竹幽襟聊一開淸風曾未足明月可重來晚意煙垂草秋姿露滴苔佳賔何以佇雲瑟與霞杯齊中偶書狂愚多苦囗幽遠獨甘心言路有餘責權門無去音忘憂曾扣易思古即援琴此意誰相和寥寥鶴在隂留題江秀才舊居結舍近滄洲江山不外求我來明月夜更得主人留依韻酬周騤太博同年孰敢先懷富貴圖良時須惜幾嗟吁衆心可致巍巍主上意思平兩兩符不稱內朝禆耳目多慙外𥙷救皮膚子陵灘畔觀漁釣無限殘陽媚緑蒲依韻答胡侍郎見寄千年風采逢明主一寸襟靈慕昔賢待看朝廷興禮讓天衢何敢鬪先鞭桐廬郡齊書事千峯秀處白雲驕吏隱雲邊豈待招數仞堂高誰富貴一枝巢隱自逍遙杯中好物間宜進林下幽人靜可邀莫道官淸無歲計滿山芝术長靈苗留題方干處士舊居風雅先生舊隱存子陵臺下白雲村唐朝三百年冠蓋誰聚詩書到逺孫時裔孫楷方登進士科范文正公集卷第三
