body:
  text: 桐廬郡嚴先生祠堂記先生漢光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆天下孰加焉惟先生以節高之既而動星象歸江湖得聖人之淸泥塗軒冕天下孰加焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯高尚其事先生以之在屯之初九陽德方亨而能以貴下賤大得民也光武以之蓋先生之心出乎日月之上光武之器包乎天地之外微先生不能成光武之大微光武豈能遂先生之高哉而使貪夫廉懦夫立是有大功於名教也某來守是邦始搆堂而奠焉乃復其為後者四家以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山高水長南京書院題名記皇宋闢天下建太平功揭日月澤注河漢金革塵積絃誦風布乃有睢陽先生贈禮部侍郎戚公同文以賁于丘園教育為樂門弟子由文行而進者自故兵部侍郎許公驤而下凡若干人先生之嗣故都官郎中維樞密直學士綸並純文浩學世濟其美清德素行貴而能貧祥符中鄉人曹氏請以金三百萬建學于先生之廬學士之子殿中丞舜賔時在私庭俾幹其𥙿故太原奉常博士瀆時舉賢良始掌其教故清河職方貟外郎吉甫時以管記以領其綱學士畫一而上真宗皇帝為之嘉嘆面可其奏今端明殿學士盛公侍郎度文其記前參預政事陳公侍郎堯佐題其榜由是風乎四方士也如狂望兮梁園歸歟魯堂章甫如星縫掖如雲講議乎經詠思乎文經以明道若太陽之御六合焉文以通理若四時之妙萬物焉誠以日至義以日精聚學為海則九河我吞百谷我尊淬詞為鋒則浮雲我決良玉我切然則文學之器天成不一或醇醇而古或郁郁於時或峻于層雲或深于重淵至於通易之神明得詩之風化洞春秋褒貶之法逹禮樂制作之情善言二帝三王之書博涉九流百家之說者蓋氐有人焉若夫廊廟其器有憂天下之心進可為卿大夫者天人其學能樂古人之道退可為鄉先生者亦不無矣觀夫二十年間相繼登科而魁甲英雄儀羽臺閣蓋翩翩焉未見其止宜觀名列以勸方來登斯綴者不負國家之樂育不孤師門之禮教不忘朋簪之善導孜孜仁義惟日不足庶幾乎刋金石而無愧也抑又使天下庠序視此而興濟濟羣髦咸底于道則皇家三五之風步武可到戚門之光亦無窮巳他日門人中絶德至行高尚不仕如睢陽先生者當又附此焉清白堂記會稽府署據臥龍山之南足北上有蓬萊閣閣之西有涼堂堂之西有巖焉巖之下有地方數丈密蔓深叢莾然就荒一日命役徒而闢之中獲廢井即呼工出其泥滓觀其好惡曰嘉泉擇高年吏問廢之由不知也乃扃而澄之三日而後汲視其泉清而白色味之甚甘淵然丈餘綆不可竭當大暑時飮之若餌白雪咀輕氷凛如也當嚴冬時若遇愛日得陽春溫如也其或雨作雲蒸醇醇而渾蓋山澤通氣應於名源矣又引嘉賔以建溪日注臥龍雲門之茗試之則甘液華滋說人襟靈觀夫大易之象初則井道未通泥而不食弗治也終則井道大成收而勿幕有功也其斯之謂乎又曰井德之地蓋言所守不遷矣井以辨義蓋言所施不私矣聖人畫井之象以明君子之道焉豫愛其清白而有德義為官師之規因署其堂曰清白堂又搆亭于其側曰清白亭庶幾居斯堂登斯亭而無忝其名哉寶元二年月日記嶽陽樓記慶曆四年春滕子京謫守巴陵郡越明年政通人和百廢具興乃重修嶽陽樓增其舊制刻唐賢今人詩賦于其上屬豫作文以記之豫觀夫巴陵勝狀在洞庭一湖銜遠山吞長江浩浩湯湯橫無際涯朝暉夕隂氣象萬千此則嶽陽樓之大觀也前人之述備矣然則北通巫峽南極瀟湘遷客騷人多會于此覽物之情得無異乎若夫霪雨霏霏連月不開隂風怒號濁浪排空日星隱耀山嶽濳形商旅不行檣傾楫摧薄暮冥冥虎嘯猿啼登斯樓也則有去國懷鄉憂讒畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦麟游泳岸芷汀蘭郁郁青青而或長煙一空皓月千里浮光躍金靜影沉璧漁歌牙答此樂何極登斯樓也則有心曠神怡寵辱偕忘把酒臨風其喜洋洋者矣嗟夫豫嘗求古仁人之心或異二者之為何哉不以物喜不以巳悲居廟堂之高則憂其民處江湖之遠則憂其君是進亦憂退亦憂然則何時而樂耶其必曰先天下之憂而憂後天下之樂而樂乎噫微斯人吾誰與歸時六年九月十五日邠州建學記國家之患莫大於乏人人曷嘗而乏哉天地靈粹賦于萬物非昔醇而今漓吾觀物有秀於類者曾不減於古豈人之秀而賢者獨下於古歟誠教有所未格器有所未就而然耶庠序可不興乎庠序者俊乂所由出焉三王有天下各數百年並用此道以長養人材材不乏而天下治天下治而王室安斯明著之效矣慶曆甲申歲豫參二國政親奉聖謀詔天下建郡縣之學俾歲貢群士一由此出明年春豫得請為豳城守署事之三日謁夫子廟通守太常王博士稷告豫曰奉詔建學其材出於諸生備矣今夫子廟隘甚群士無所安因議改卜于府之東南隅地為高明遂以建學并其廟遷焉以兵馬監押劉保節度推官楊承用共掌役事博士朝夕視之明年夏厥功告畢增其廟度重師禮也廣其學宮優生貟也談經於堂藏書於庫長廊四回室從而周㹅一百四十楹廣厦高軒處之顯明士人洋洋其來如歸且曰吾黨居后稷公劉之區𬒳二帝三王之風其吾君之大賜吾道之盛節歟敢不拳拳服膺以樹其德業哉豫既改南陽郡博士移書請為之記豫嘗觀易之大象在小畜曰君子以懿文德謂其道未通則畜乎文德俟時而行也在兊曰君子以朋友講習謂相說之道必利乎正莫大於講習也諸生其能知吾君建學聖人大易之㫖則庶幾乎故書之天竺山日觀大師塔記師錢塘人也姓仲氏名善升十歲出家十五通誦法華經十七落髮受具戒客京師三十年與儒者游好為唐律詩且有佛學天禧中詔下僧録簡長等注釋御製法音集師預選中書畢詔賜師名遂還故里公卿有詩送行師深於琴余嘗聽之愛其神端氣平安坐如石指不纎失微不少差遲速重輕一一而當故其音清而弗哀和而弗淫自不知其所以然精之至也豫嘗聞故諭德崔公之琴雅遠清靜當代無比如師則近之矣康定中入天竺山居日觀庵曰吾其止乎不下山者十餘年誦蓮經一萬過皇祐元年余至錢塘就山中見之康疆精明話言如舊一日遣侍者持書謝余曰吾願足矣將去人世必藏于浮圖之下願公記焉又一日侍者來告曰師化矣其門人中靄等葬師于塔復以師之言求為之銘銘曰山月亭亭兮師之心山泉冷冷兮師之琴真性存兮孰為古今聊志之兮天竺之岑奏上時務書天聖三年四月二十日文林郎守大理寺丞臣范仲淹謹詣閣門再拜死罪上書皇太后陛下皇帝陛下臣聞巧言者無犯而易進直言者有犯而難立然則直言之士千古謂之忠巧言之人千古謂之佞今臣勉思藥石切犯雷霆不遵易進之塗而居難立之地者欲傾臣節以報國恩耻佞人之名慕忠臣之節感激而發萬死無恨況臣之所言皆聖朝當行之事而未之行者諒有以也聖人之心豈不至此蓋當乎一日萬機未暇餘論大臣之心豈不至此蓋懼乎上疑下謗未克果行臣請言之以發聖慮臣聞國之文章應於風化風化厚薄見乎文章是故觀虞夏之書足以明帝王之道覽南朝之文足以知衰靡之化故聖人之理天下也文弊則救之以質質弊則救之以文質弊而不救則晦而不彰文弊而不救則華而將落前代之季不能自救以至于大亂乃有來者起而救之故文章之薄則為君子之憂風化其壞則為來者之資惟聖帝明王文質相救在乎巳不在乎人易曰窮則變變則通通則久亦此之謂也伏望聖慈與大臣議文章之道師虞夏之風況我聖朝千載而會惜乎不追三代之高而尚六朝之細然文章之列何代無人蓋時之所尚何能獨變大君有命孰不風從可敦諭詞臣興復古道更延博雅之士布於臺閣以救斯文之薄而厚其風化也天下幸甚臣又聞聖人之有天下也文經之武緯之此二道者天下之大柄也昔諸侯暴武之時孔子曰俎豆之事則嘗聞之此聖人救之文也及夾谷之會孔子則曰有文事者必有武備請設左右司馬此聖人濟之武也文武之道相濟而行不可斯須而去焉唐明皇之時太平日久人不知戰國不慮危大寇犯關勢如瓦解此失武之備也經曰禍兮福所倚福兮禍所伏又曰防之於未萌治之於未亂聖人當福而知禍在治而防亂故善安身者在康寧之時不謂終無疾病於是有節宣方藥之備焉善安國者當太平之時不謂終無危亂於是有教化經略之備焉我國家文經武緯天下大定自真宗皇帝之初猶有舊將舊兵多經戰敵四夷之患足以禦防今天下休兵餘二十載昔之戰者今已老矣今之少者未知戰事人不知戰國不慮危豈聖人之意哉而況守在四夷不可不慮古來和好鮮克始終唐陸贄議云犬羊同類狐鼠為心貪而多防狡而無耻威之不悟撫之不懷雖或時有盛衰大抵常為邉患屬方靖中夏未遑外虞因其乞盟遂許結好加恩降禮有欲無違而乃邀求浸多翻覆不定託因細事嘖有煩言猜矯多端其斯可驗此唐人之至論也今自京至邊並無關嶮其或恩信不守釁端忽作戎馬一縱信宿千里若邉少名將則懼而不守或守而不戰或戰而無功再扣澶淵豈必尋好未知果有幾將可代長城伏望聖慈鑒明皇之前轍察陸贄之讜議與大臣論武於朝以保天下先命大臣密舉忠義有謀之人授以方略委之邉任次命武臣密舉壯勇出群之士試以武事遷其等差壯士蒙知必懷報效列於邉塞足備非常其或自謂無虞不欲生事輕長世之䇿苟一時之安邉患忽來人情大駭自古兵不得帥魚肉無殊乃於倉卒戰鬭之間拔卒為將豺狼競進真僞交馳此五代之前鑒也至於塵埃之間豈無壯士宜復唐之武舉則英雄之輩願在彀中此聖人居安慮危之備備而無用國家之福也惟聖意詳之臣又聞先王建官共理天下必以賢俊授任不以爵祿為恩故百僚師師各揚其職上不輕授下無冒進此設官之大端也我國家纍聖求理而致太平大約紀綱法象唐室以臣觀之宜法唐興之時不宜法唐衰之後唐興之時特開館殿以待賢俊得學士十八人聲滿天下此文皇養將相之材以論道經邦而大化也暨之中興往往得人唐衰之後此選不盛我朝崇尚館殿目為清華輔相之材多由此選三館清密古謂登瀛近歲遷出內庭逼居坊陌非唐所謂集仙之館也又其間校讐之職或不由科第以恩而除限以歲年漸於清顯輕十八學士之選恐非文皇養將相之材之意也伏望聖慈與大臣議其可否重為制度以法唐興之時而延廊廟之器此國家之大美也惟聖意詳之又諫官御史耳目之司不諱之朝宜有賞勸自陛下臨政以來未聞旌一諫貟賞一御史若言而無補是選之不精言而有補豈賞之不行徒使犯顔者危緘口者安以進藥石為虛言以陳絲髮為供職三載之後進退雷同臣恐天下竊議朝廷言路未廣忠臣未勸將令諫官御史之徒尸素於朝非國家之福也惟聖意詳之臣又聞先王議重君臣賞延于世大勳之後立賢為嗣餘子則以才自調不使混淆而後大防一隳頽波千載凡居近位歲進子孫簪􅌧盈門冠蓋塞路賢與不肖例升京朝謂之賞延無乃太甚此必前代君危臣僣之際務相姑息因為典故以至於斯又百司之人本避鄉役不踰數歲例與出官莫非貪忍之徒絶異孝廉之舉使親民政其弊如何開此二途歲取百數無所不有實纍王風恐非任官惟賢之體也人避衆怨不敢上言遂令仕路紛紜祿位填委文武官吏待闕踰年貪者益勵其爪牙廉者悉困於寒餓徒於禮闈之內增其艱難壯士惜年數歲一舉乃為奔競至有訟爭而況修辭者不求大才明經者不問大㫖師道既廢文風益澆詔令雖繁何以戒勸士無廉讓職此之由其源未澄欲波之清臣未之信也儻國家不思改作因循其弊官亂於上風壞於下恐非國家之福也儻為長久之䇿則願與大臣特新其議澄清此源不以謗議為嫌當以治亂為意此國家之福也惟聖意詳之臣聞以德服人天下欣戴以力服人天下怨望堯舜以德則人愛君如父母秦以力則人視君如仇讐是故御天下者德可慿而力不可恃也伏惟皇太后陛下皇帝陛下日崇聖德以永服天下之心若夫敦好生之志推不忍之心薄於刑典厚於惻隱在物祝網於民泣辜常戒百官勿為苛酷示天下之慈也唯聖人能之耻珠玉之玩罷組繡之貢焚晉武之雉裘出文皇之宮人少度僧尼不興土木示天下之儉也唯聖人能之雞鳴而起孜孜聽政每有餘暇則召大臣講議文武訪問艱難此皇王之勤也唯聖人勉之貴賤親踈賞罰惟一有功者雖憎必賞有罪者雖愛必罰捨一心之私從萬人之望示天下之公也唯聖人行之自古帝王與佞臣治天下天下必亂與忠臣治天下天下必安然則忠臣骨鯁而易踈佞臣柔順而易親柔順似忠多為美言骨鯁似彊多所直諫美言者得進則佞人滿朝直諫者見踈則忠臣避世二者進退何以辨之但日聞美言則知佞人未去此國家之可憂也日聞直諫則知忠臣左右此國家之可喜也伏惟聖明不可不察自古王者外防夷狄內防姦邪夷狄侵國姦邪敗德國侵則害加黎庶德敗則禍起蕭墻乃知姦邪之凶甚於夷狄之患伏惟聖明常好正直以杜姦邪此至理之本也臣又聞聖人宅九重之深鎮萬國之望以靜制動以重為威如天之高如地之深使人不得容易而議也昨覩鑾駕順動稍頻恐非深居九重靜鎮萬國之意況進奏院報於天下天下聞之恐損威重先朝以御宇日深功成天下巡幸之費尚或諫止今繼明之始聖政方新宜加憂勤深防逸豫則人心大悅天道降康不比先帝功成之年未可輕為巡幸伏惟聖慈再三詳覽每有順動必循典禮以服天下之望臣又聞人主納遠大之謀久而成王道納淺末之議久而成亂政方今聖人在上賢人在側取捨之際豈有未至然而刑法之吏言絲髮之重輕錢榖之司舉錙銖之利病則往往謂之急務響應而行或有言政教之源流議風俗之厚薄陳聖賢之事業論文武之得失則往往謂之迂說廢而不行豈朝廷薄遠大之謀好淺末之議哉伏望聖慈納人之謀用人之議不以遠大為迂說不以淺末為急務則王道大成天下幸甚臣又聞聖人之至明也臨萬幾之事而不敢獨斷聖人之至聰也納羣臣之言而不敢偏聽獨斷則千慮或失偏聽則衆心必離人心離則社稷危而不扶聖慮失則政教差而彌遠故先王務公共設百官而不敢獨斷者懼一慮之失也開言路采羣議而不敢偏聽者懼衆心之離也今聖政方新動思公共委任兩地出入萬幾萬幾之繁能無得失乃許羣臣上言以𥙷其闕使上無蒙蔽下無壅塞有以見聖人之不獨斷也天下幸甚然而臣下上言密陳得失未可盡以為實亦當深䆒其宜或務窺人短長或欲希㫖上下動搖賞罰之柄離隔君臣之情似是而非言僞而辨雖聖鑒之下能無惑焉偶動宸衷無益王道似此密奏之類更望聖慈深加詳覽與大臣議論可否然後施行儻密奏之言便以為實內降處分一面施行則讒譛之人緣隙而進以訐為直以詐為忠使內外相疑政教不一非致理之本也古人有言曰為君難為臣不易者其在此乎伏惟聖明不可不察又自古親近小臣率多纎佞恃國恩寵為人階緣公議未行私請先至如此則人皆由徑政有多門伏望聖慈深為防慮以存至公之道也臣曲陋之人本無精識覽前王之得失䆒聖朝之取捨因敢罄而陳之伏望聖慈詳擇一二干犯天威臣無任戰汗激切屏營之至臣某昧死謹言范文正公集卷第七
