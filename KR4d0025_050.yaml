front:
  text: 褒賢祠記卷之二
  hash: sha256:4b383c078ea1974a44f3322276fc1ac03bb80bf60aba04404310c8f78ab318dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_050-1a}
body:
  text: 文正公祠堂記孟子之言氣曰至大至剛以直飬而無害則塞乎天地之間夫直之為言大公至正之道也以大公至正之道固守而力行之不為富貴貧賤威武之所搖奪雖乘田委吏之卑亦必盡吾誠充吾職卒而至於立國家定社稷安邊境服羌戎其功烈與日月爭光而精神折衝萬里之外謂之氣塞乎天地之間可也後世見古人功名之盛以為類出於偶然不知蚤正素定於胸申者未嘗無所從來而其銘鼎彛書竹帛者非一日之積也文正范公未第時巳慨然有天下之志不以死生禍福動其心逮遭明天子有為於時其立朝如史魚汲直其憂國如賈誼劉向其守邊如馬伏皮羊叔子雖庸人孺子莫不知之獨筮仕之𥘉有卓然大過人者國史失其傳故不得而不紀也公以進士釋褐為廣德軍司理參軍日抱具獄與太守爭是非守數以盛怒臨公公未嘗少撓歸必記其往復辨論之語于屏上比去至字無所容貧止一馬鬻馬徒步而歸非明於所養者能如是乎獄官有亭以公名之者舊矣公卒二十年而高郵孫覺莘老為廣德軍始以詩志公之事而刻之亭中又六十九年丹陽洪興祖慶善來守讀莘老之詩而慕之𥘉廣德人未知學公得名士三人為之師於是郡人之擢進士第者相繼于時慶善乃求公遺像繪而置之學宫使學者世祀之而屬豫記其事嗚呼公之盛德豈待文而後傳而藻亦豈記公者哉昔段秀實盡忠於唐世徒以為一時奮取功名之人而不知居官必有可書之事柳宗元為托其實上之史官今所以知段太尉逸事者宗元發之也秀實固不足以擬公而余幸從慶善得公之詳與夫徴夏無且畫工為無所愧安知後世不采此以𥙷史官之闕乎然慶善為政而首及公可謂知所本矣柔亦不茹剛亦不吐文正公有焉好賢如緇衣慶善有焉其可以不書紹興九年六月新安汪藻記重建文正范公祠記文正范公勳業在國史其祠於廣德則巳具見於內相浮溪汪公之記兹以祠宇久圯不修從弟鏞以嘉定二年為郡博士撤而新之求記於鑰語之曰文正公盛德絶識才兼文武非贊揚所能盡然大要在立志不苟而巳矣方在貧約則朝莫甘虀粟之味既巳富貴而子弟均布帳之清在海陵為一倉官而築海堤數百里在桐川為一獄掾而所立巳卓然如此一馬微矣居則鬻以飬士去又鬻之徒步而歸其跋乞米帖云顔魯公唐朝第一等人而饘粥不繼非所謂君子固窮者歟又有家書云老夫平生屢經風波惟能忍窮故能免禍公之所存類如此此其所以大過人者故曰志士不忘在溝壑勇士不忘喪其元公之自處直欲追古人而及之故其見於行事亦非今人所能及也學既奉公之祠則為士者無徒慕公之名位當求其所以致此者鑰既為推公之所以致此者而為之記又因以勉吾弟與同黨之士鑰雖老尚當相與思古人與稽之義云三年仲夏望日四明樓鑰記并書鏞篆額義田記錢公輔范文正公蘇人也平生好施與擇其親而貧疏而賢者咸施之方貴顯時於其里中買負郭常稔之田千畝號曰義田以飬濟群族族之人日有食歲有衣嫁娶凶葬皆有贍擇族之長而賢者一人主其計而時其出納焉日食人米一升歲衣人衣一縑嫁女者錢五十千娶婦者二十千再嫁者三十千再娶者十五千葬者如再嫁者之數葬幼者十千族之聚者九十口歲入粳稻八百斛以其所入給其所聚霈然有餘而無窮仕而家居俟代者預焉仕而之官者罷其給此其大較也𥘉公之未貴顯也嘗有志於是矣而力未之逮者二十年既而為西帥以至於參大政於是始有祿賜之入而終其志公既沒後世子孫至今修其業承其志如公存也公雖位充祿厚而貧終其身沒之日身無以為斂子無以為喪唯以施賢活族之仁遺其子而巳昔晏平仲敝車羸馬以朝陳桓子觴之日君位之上卿祿之百萬而敝車羸馬是隱君之賜也晏子曰自臣之貴父之族無不乘車者母之族無不足於衣食者妻之族無凍餒者齊國之士待臣而舉火者三百餘家如此為隱君之賜乎彰君之賜乎於是齊侯以晏子之觴而觴桓子豫嘗愛晏子好仁齊侯知賢而桓子服義也又愛晏子之仁有等級而言有次序也先父族次母族次妻族而後及踈遠之賢孟子曰親親而仁民仁民而愛物晏子為近之今觀文正公之義其與晏子比肩矣然晏子之仁止於生前而文正公之義垂於身後其規模遠舉又疑其過之嗚呼世之都三公位享萬鍾祿其邸第之雄輿馬之盛聲色之侈妻孥之富止乎一巳而族之人弗得其門而入者豈少哉况於施賢乎其下為卿為大夫為士而廪稍之充奉飬之厚足乎一巳而族之人操壺瓢為溝中瘠者又豈少哉况於賙人乎是皆文正公之罪人也公之忠義滿朝廷事業滿邊陲功名滿天下後必有良史書之者豫可無書也獨書其義田以警世云公諱某字希文昔逮事忠宣公親聞緒論嘗云先文正置義田非謂以斗米匹縑使能飽暖族人蓋有深意存焉時年尚少未甚領略綿歷三紀當宣和末避亂南渡紹興乙卯自嶺海𬒳召至行闕丙辰春出使至淮上始過平江時義宅已焚毀族星居村落間一旦㑹集于墳山散亡之餘尚二千指長幼聚拜慈顔恭睦皆若同居近屬以家譜考之自麗水府君下逮良字諸孫蓋十餘矣然後見文正之用心悟忠宣之知言也紹興巳巳十月辛未曽孫直方記范氏義莊申嚴規式記中奉大夫權尚書吏部侍郎兼權給事中兼侍講劉矩撰朝議大夫權尚書禮部侍郎兼中書舍人兼太子左諭德兼同修國史實録院同修撰兼國子祭酒曽從龍書并題蓋朝散郎左司諌兼侍講范之柔立石物夲天人夲祖閭閻之人有視其祖之子孫如路人相毀訾相并兼如仇敵者不知夲爾矩少讀文正范公遺事公平居語子弟曰吾吳中宗族甚衆於吾固有親踈然吾祖宗視之則均是子孫固無親踈也吾安得不恤其飢寒哉且自祖宗來積德百餘年始發於吾得至大官若貴富而不恤宗族何顔以入家廟矩斂袵歎曰公之行百世之標的公之言薄俗之針砭也吾鄉居家遇有不如人意事即因公言以自愧責不敢有一毫恚心官中都獲與公之孫左司諌公之柔遊見其處巳靜而眀際物莊而和雖姿禀之懿亦家法所自來一日於公几間得文正公與其兄推官帖問以遣女乏資共甘苦通有無不啻巳子使人歎玩不去手司諫公因言先祖所創義田今幾二百年聚族數千百指雖甚寠者賴以無離散之患義莊故址曩因兵火為居民侵據之柔與吾兄良器極力經理為屋以棲義􅮇餘以待族人之無家者浸還吾祖之舊惟是義莊規式歲月易墮請之朝屬之卿郡勒之堅珉俾世守而傳之無窮者吾猶不敢懈也幸備位諌垣當具本未奏陳乞申嚴行下庶不負文正公所以責望子孫之意暨得旨如請屬矩以記不容以不敏辭抑聞之士尚志志有小大功業利澤亦如之方文正未遇讀書長白山凍粟糜而食人不堪其憂而公貫通古今經濟之略巳具於此時及率言官叩閽爭事自請鎮靈夏迄破戎人之膽功烈焜耀則斂而惠宗族者抑餘事也忠宣公致身台輔忠賢是似想其捐所載麥歸亳時文正公巳心知其有子矣嗚呼有文正則有監簿忠宣左丞侍郎數賢子厥後不熾昌競爽尚得為有天理邪諫垣所以立身承家固巳無愧於乃祖願益以文正忠宣之弘猷大節自勉公之族人又當相與扶植以成諫垣之志則范氏之門益大義廪之儲益闢義居之族益貴逹富盛相望將不止如今之所見云嘉定四年三月一日矩謹記范氏復義宅記吳門范氏自唐柱國麗水府君居于靈芝坊今在雍熙寺之後五世孫文正公少長北地皇祐中守杭始至故鄉訪求宗族買田千畝作義莊以贍之宅有二松名堂以歲寒閣曰松風因廣其居以為義宅聚族其中義莊之收亦在焉中更兵燬族黨星散故基榛蕪編民豪據為居宇為場圃僦直無幾甚失遺意粟無所儲寓於天平山墳寺倍有往來給散之勞尋復圯廢改置城中反寄他舍病此久矣自公長子監簿而下又五世而至良器一日謂二弟曰先君奉議念此有年齎志而殁吾儕當有以振起之慨然自任思圖其新於是歷告居民盡除僦直約期而遣之不服者訴于郡于監司以至上逹臺省提刑臨川何公異太守四明鄭公若容咸義此舉力為主張由是悉得故地周一千四百四十八丈首捐私帑繚以垣墻創建一堂仍扁歲寒以祠文正結屋十楹以處貧族就立新倉寖復舊觀庀役於慶元二年之季夏中秋告成不愆於素觀者無不歎息親掌出納一年以為後式選族子之廉謹者二人繼之詳具要束以𥙷舊規揭于堂上田籍之傳逺者俱刻之石以為永久之計介弟之柔續世科於百二十有四載之後尤勇於義既力贊其兄謀之屬鑰為記始末鑰不佞先祖少師收恤宗族有意於此而歲不與伯父楊州始為之雖不及文正公之盛而寒宗之貧者賴以自給亦四十餘年于茲先工部欲附益之青貧終身猶未果也見范氏家法為之愧歎是舉也衍文正公纍世之遺澤伸先奉議九原之餘恨又以綿范氏無窮之休豈不偉哉嗚呼文正公奮身孤藐未嘗賴宗人毫髮之力既逹則闔族受解衣推食之恩天佑范氏三子鼎貴皆以宏才高誼上繼父風後人得維持馮藉以保其家良器一布衣而决意興起不惟義宅載新義莊亦復整飾剔蠧省費又為數世之利用心如此後其興乎嗚呼文正公𥘉立規矩止具給豫之目僅設預先支請之禁不數年忠宣公巳慮其廢壞故治平奏請聖旨違犯義莊規矩之人許令官司受理又與右丞侍郎自熙寧以至政和隨事立規關防益密今之規約又加密矣一門同姓為此義事其難如此况天下之大思所以為億万世之計者又可忽乎嗚呼衣冠之族不免飢寒者甚衆願如范氏之宗泒而不可得今坐享飽暖者幾人若人人如良器用心更相扶持以永其傳則善矣若曰是我所當得者而不思自力甚者反為蠧於其間則文正諸公實臨之其聞於有司曰公元者蓋今之族長云三年立秋顯謨閣直學士太中大夫提舉江州太平興國宫奉化驟開國男食邑三百戶樓鑰記并書文正公讀書堂記今名溪東書院范文正公讀書堂乃湖右常平使者兼澧守料院董侯所建也𥘉文正公少孤且貧從其母歸朱氏朱宰澧之安卿公侍母偕來嘗讀書于老氏之室曰興國觀者寒暑不倦學成而仕為時名卿邑之士咸知敬慕築堂祠之既燬于兵慶元𥘉憲使范公處義復創于觀側因陋就簡將頽圯矣侯謂問學精勤立大志於窮約者莫如范公名節不屈成大勳於顯用者亦莫如范公學者所宜宗師將徙書堂于近城庶使四邑之士仰其高風而景其遺行乃卜澧之陽惟東食彭山突兀其前諸峰環列左右旁挾兩水東西來朝氣象軒豁勝景畢露豈地靈顯晦自有時耶於是度材尤工分畫經始中建一堂旁列兩廡設四齊以育士植五間以為門後創一樓扁曰通經蓋取文正公讀書十年大通六經之㫖之意立文正公祠於堂之東偏外又闢一門繚以周垣克壯形勢棟宇華麗輪奐鼎新實一郡偉觀也斯堂之役郡博士鄭自得掌籍吳杰直學張轍實董之以底成績堂成士未有飬乃括沒官之田有數百畒拘而籍之二車馬公壬仲又助金千緡增鬻田為不朽計侯命友龍記之友龍嘗讀國史見文正之勳名事業鏗鍧宇宙蓋不特著見於參預大政之時而實根夲於窮居江湖之日其言先天下之憂而憂後天下之樂而樂此志巳定於素故能入贊萬機出破西賊而致我仁祖四十二年之盛治者公之力也噫以文正公之立身行巳視聖賢為無慊而建功立業又書之青史而不愧蓋其窮之飬即逹之施幼之學即壯之行猶火然泉逹有不容禦澧之士其可不知取則哉雖然鳶飛戾天魚躍于淵氣使然也士氣消長亦在居民上者有以感發之耳今文正公之遺躅懿範既為澧人所敬慕然非侯振揚而尊顯之其何以聳人心而激士氣俾强於為善以振文正之絶響乎哉侯之心亦勤矣士登斯堂苟䔍志好學切磋講貫紹文正之事業以副侯之所期則可以無負不然安坐而食既飽而嬉不能克志厲行追蹤前哲得無愧乎堂建於寶慶丙戌之秋成於是歲之冬費於公帑撙節之餘而無毫髮科斂之擾是皆可書故併記之以諗來者侯名與幾字叔存番易人明年丁亥上元日承直郎澧州軍事推官任友龍記朝奉郎通判澧州軍州事賜緋魚袋羅源書朝請郎大宗正丞兼金部郎官聶洙隸額吳郡建祠奉安郡守潜公講義咸淳十年平江府太守潜說友以公鄉郡建專祠為邦人式得地于公義莊義宅之傍祠宇數十楹以奉公祀奏請于朝撥田以供春秋二丁祭祀朝廷從其請奉安日潜公講魯穆叔答范宣子不朽之說太上有立德其次有立功其次有立言此謂之不朽春秋魯穆叔答范宣子不朽之說也亦嘗因不朽之義而遡古人之所自立者乎易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義人之所以與天地並而為三者以其能立於仁義故也天之立不根乎隂陽則聀覆若為而不息地之立不因乎剛柔則聀載若為而無疆人之立不夲乎仁義則盛德至善若為而民不能忘何則德以仁義而立則德為純德功以仁義而立則功為宗功言以仁義而立則言為格言固未有無所立而能不朽者亦未有外仁義而能卓然有立者是故本諸身證諸庶民建諸天地而不悖者仁義而巳矣富貴利逹不與焉夫子曰君子疾沒世而名不稱豈教人以好名哉謂其不知所以立而無善之可稱耳君子而能立萬世不可忘之德業則天下自有萬世不能忘之人心夫舜以孝禹以功皋陶以謨皆非有意於立而自爾立者其仁至義盡弗可尚矣後乎夷之清惠之和管仲之一正天下史佚周任之有言亦皆隨其所立傳於來世彼晉楚之富趙孟之貴非不自視哆然也往往於榮華之飄風不踰踵而莾為逰塵矣曽子曰彼以其富我以吾仁彼以其爵我以吾義夫仁義理也萬形皆有弊惟理獨不朽宣子乃以世祿為不朽不知物之至易朽者莫世祿若也故穆叔之對以立德為上立功次之立言又次之且證之曰臧文仲既沒矣其言立由是觀之則德也功也言也苟立其一亦可不朽而况三者俱立有如文正范公者乎公生我朝盛時實種天地間氣光明俊偉二三百年後猶使人竦然起敬况當時乎考亭朱子論本朝人物或歎其𥘉或議其小獨於公而稱其傑出之才夫才而謂之傑出則必有參天地之化關盛衰之運者矣蓋公之於仁義如飢渴之於飲食須臾不置其見於修身齊家處宗族待閭里居官行事愛民利物浩如也此非富公所謂道大德具者乎我是以知公之德之立皆仁義之所充拓陳宫壺之戒弭朝廷之憂腹中甲兵西賊破膽而天章一疏實將振起我宋一代之治若使盡見施行則後來者無所用其紛更而國家蒙福莫之與京矣此非韓公所謂大忠偉節者乎我是以知公之功之立皆仁義之所成就公在天聖中遺宰相書無慮萬言經濟規模大抵略見其後為牧守為將帥為執政平生所為無出於此蓋言之必可行也雄文大冊小篇短章靡不燦然一出於正此非蘇子所謂有德有言者乎哉我是以知公之言之立皆仁義之布濩流衍天地付公以不群之資而公能自立其與天地相為不朽之事而富貴利逹固不足為公輕重也嗟夫孰不為德而立德難若存若亡德烏乎立孰不為功而立功難倐成倐墮功烏乎立孰不為言而立言難可無可有言烏乎立惟立始能不朽惟不朽始可言立若公則言非徒言而功皆酬其言功非徒功而功皆本於德無他仁義以為之主也德立則功與言俱立矣是又合穆叔之所謂三者而一之此之謂不朽信乎其為朽也彼皇皇汲汲於富貴利逹而不知可大可久者之為何事卒於下同衆人泯滅澌盡者何可勝紀其視公之所立果何如哉凡公宦轍所至皆祠而奉之吳父母國也乃無專祠以慰里人不朽之思說友景行高風久矣濫兹分牧亦且踰朞始克肇新斯堂儼設公像以補此邦之闕典是伇也上而朝廷中而士大夫下而閭巷之耄倪莫不謂宜然則公之所以深服乎人心而莫間於今古者只是就仁義上立腳做了天地間第一等人而巳做好官易做好人難誰謂華高企其齊而敢因穆叔不朽之說試從諸君評之庶相與立乎其大者幕官廬陵劉坦陪講孟子曰聖人百世之師也伯夷柳下惠是也故聞伯夷之風者頑夫廉懦夫有立志聞柳下惠之風者薄夫敦鄙夫寬奮乎百世之上百世之下聞者莫不興起也非聖人而能若是乎而况於親炙之者乎蓋謂公兼此夷淸惠和聖人之德而可為百世之師也文正范公祠記中奉大夫江南浙西道肅政廉訪使徐琰撰朝列大夫治書侍御史行御史臺事李處巽書并篆額至元壬辰豫奉命廉訪浙西蒞吳中是為文正范公之鄉尊賢勵俗政所當先既仰慕其餘烈奬進其後人仲秋次丁有司以故事告將舍采于公祠豫肅然起敬日至當偕僚吏拜祠下與觀盛典是日成禮訪義莊登歲寒堂家園之碑巋然獨存祠正在其左門堂寢室嚴整合度蓋宋郡守潜公說友所建牲牢器幣則撥田以給之俾公子孫世守而歲祠焉薦奠儀文皆當時所定乃甲戌建祠旋𬒳兵意有所增廣而不遂亦未暇有所記也一日主祠邦瑞踵豫門求記且曰祠雖建於前代禮實存於今日有一言而可以母底荒墜者繄我公之靈實永賴之余固辭弗獲辭移治錢塘凡再歲徴踐言益勤謹按釋奠必有合也有國故則否說者謂如唐虞有䕫伯夷周有周公魯有孔子則各自奠之近世則通祀孔子向微通祀公獨非故有之䕫夷乎而石守道慶曆之詩固巳指公輩為蘷卨矣又按鄉先生殁而祭于社社稷民以生先師民所以生師法公獨不祭於鄉乎矧公為政所去見思慶鄧數州之民往往生祠畫像既殁後祠于長白于海堰干睢陽干廣德于鄱陽公蘇人也郡學以建學祠公天平山先壟僧寺舊有祠然稽協古典必專祠于此而後愜於人心夫亦何為而然耶致君之志動物之誠放諸四海而凖百世而下聞者莫不興起也是豈區區富貴利逹以衒耀於須臾者可同言而語哉昔宋人定五代軍鎮之亂以儒立國儒而見用者何限以公而不得相其君展其憂天下致太平之略彼一時也非可為之時乎自其入館閣為諫官諌則必黜黜而益諫陳善閉邪寧以身蹈不測而不悔非直以言語侍從為職也故雖當路不容委之邊鎖才兼文武適受主知正巳而不求人相與解仇戮力卒臣夏人以安中土為所當為一以自信其屢為守帥又豈尋常多議論少事功者哉晚參大政請倣周官六職分任輔相漸復古制開陳未終權幸惎間不得安于朝廷之上雖其國家盛衰由此而分而君子小人迭為勝負常使人躊躇鍳戒而未已也嗚呼尚論其世不知其人可乎或以為王佐或以為傑出要其平生則以為有德者又公光明俊偉之本原歟留心聖賢弘毅力行漢唐人材鮮克進於是矣𥘉公買田以贍族而族滋大立孰以教其人而子孫類份份焉遭聖朝仁恕恤其科徭祭前古忠烈比有事於公源深流長天佑善人於公蓋無爽者昔朝仲約之𣢾賊完城公不肯加誅文忠富公服其絶識蔡確詩獄公之子忠宣公謂責之太重元祐諸賢亦以自悔即其存至公全大體世之研幾成務不當如是耶人有古今道有顯晦贍相儀形是豈一家一鄉所得私者逺惟耇成人宅心知訓而豫也曽何足以發之至元三十一年正月草日記義學記前朝奉大夫牟巘撰集賢直學士朝列大夫前江浙等處儒學提舉趙孟俯書并篆額古者二十五家為閭閭左右各設孰鄉先生為之師褒衣博帶晨坐閭門教其民之出入田畒者有教有飬誠為良法自井田廢閭左發古制蕩除漢以來或為講堂為精舍而飬則未之聞也范文正公嘗建義宅置義田義莊以收其宗族又設義學以教教飬咸備意最近古夷考厥初宋時天下有四書院應天府書院為首先是郡人戚同文聚徒講授士不逺千里而至文正公亦依之以學同文為人質直尚信義宗族貧乏則賙給之喪則賑恤之不積財不營居室或勉之輒曰人生以行義為貴安用是義之一字實與公意合暨公登苐立朝為守為帥以至大用名位日盛祿賜日厚遂成義莊義學為其宗族者宅於斯學於斯所耕者義田所由者義路何適不宜嘉遺後人可謂䔍至繼繼承承亦惟成規是守粵乙亥兵戈俶擾未遑兹事至元丁丑主祭邦瑞提管士貴共議興學卜地于吳縣三讓里距祖塋二里所涓日庀工為屋三十楹祀文正公於其中㑹講之堂扁曰清白東齊曰知本西齊曰敬身外闢室為教諭偃息之處庖湢廪廥𬞞茹之圃咸在外為周垣扁其大門曰義學清溪松竹之間昉聞弦誦聲是役也義莊掌計之勞為多提管又撙節助濟浮用增田山僅百畒備師資束修之禮子弟筆札之費一有以勸大德戍戍朝旨以義莊義學有補世教申飾攸司禁治煩擾常加優恤無復千吾藩者可肆志於學矣至大戊申提管馳書來霅俾為之記昔錢公輔嘗記義田巘也何敢與斯文竊聞文正公早歲就學應天時夜以繼旦冬月憊甚以水沃靣食糜度日人不堪其憂其苦心勞形者如此博通六經尤長於易學者從之叩質樂與往復無微弗究其難疑答問者又如此用力何啻十倍今人耶咨爾來學書爾佩襟盍亦追思先志俯焉孳孳母以寒暑而為作輟庶幾他日業精行成式克有立得名為儒以應選用以副二范君惓惓興學之意其年七月旦日記忠烈廟記前朝奉大夫牟巘撰集賢直學士朝列大夫前行江浙等處儒學提舉趙孟俯書中奉大夫浙東道宣慰使都元帥李果篆額文正范公忠烈廟今在姑蘇三讓里天平山公自睦移守鄉郡再省三世松楸不但漢人過家上冢之榮而巳嘗即白雲菴奉香火洎登政府得追封三世置墳寺始奏改菴為白雲寺祀徐國公唐國公周國公蓋慶曆時也猶未有忠烈廟之名先是元昊據靈武納旌節僣位號威脅諸羌肆為邊患朝議舉兵攻討遂以邊事付公首用种世衡築青澗城扼衝要大營屯田聽民互市鄜延乃異時西夏貢路但嚴備不出以示招納又築大順城以捍環慶築細腰胡盧十二寨以制明珠滅臧二族元昊勢漸折乃命公及諸號知兵者分領要害為持久計以待其弊巳而昊卒納欵如公言而公在廟堂以議論不同均佚南陽既遂謝事矣公外剛內和恩威迭用當時邊人相語此小范老子胸中有數萬甲兵不比大范老子大范指雍也或又以龍圖老子稱之其為人所畏愛如此邠慶諸郡與屬羌皆立生祠繪像以事其終也屬羌酋數百舉哀僧舍哭之如父三日乃去宣和間慶帥宇文虗中以郡人思公不忘祠事甚謹奏賜額忠烈廟他有舊額皆易新榜紹興失秦隴慶陽廟貌邈在他方始改奉於天平山每歲上巳三司率僚屬郡博士率前序偕來致祭廟久頽毀至元乙酉主祭邦瑞提管士貴共議重建取義學餘米歸之義莊為土木費司計邦翰宗遜等佐之其年四月既望新廟成丙戌二月既望率族奉安前設文正公神像內設三國公神儀廟凡十楹黝堊丹􅃮備極壯麗供具皆完好大德甲辰行省聞于朝禁治煩擾崇奉尤嚴於是士貴以書抵巘俾記厥成謭焉末學固辭弗獲惟昔文正公在朝聞延州危急自請代張存直欲委身不測之地人以為難巘竊謂未若公上百官圖詆宰相為張禹雖觸盛怒坐以越職曽不少沮為尤難蓋不顧其一身之利害禍福故能內肅朝綱外亢方靣諡曰文正廟號忠烈如是之偉也夫士大夫則知尊祖矣尊之者何銘其德善也是宜作為銘詩刻石列廡下其辭曰南陽諸葛蜀漢再造志决身殱民哭陌道乃廟沔陽成都䕫子號曰忠武西人悲喜相傳尚記馘雙誅郃於惟文正異世同轍雖老益壯雖死不忘精忠盛烈夏日秋霜昔討靈武皇威逺加聲勢震燀摧其角牙忠烈有廟參錯西土公像在堂莫豫敢侮天平之山白雲之泉公歸自西廟貌宛然誰實新之偉矣柱石上公之服揚休山立內祀先公爰備廟制維垣啓宇光榮三世式濟世美忠宣弟昆粵至斯今代有賢孫乃厚義廩乃廣義學同志合慮新廟攸作潔我牲醪率我宗黨揭䖍妥靈默通肸蠁公在帝旁玉虬既駕神逰委迤馭風來下佑我後人俾熾而昌廟祐是保千載奉常有際天人之學斯可以服天下之望有擴宇宙之量斯可以成天下之務有堅金石之操斯可以任天下之重隆然曄然震耀于世者則文正范公其人也夫大聖大賢必矌世而一見天之降材不偶然也唐虞之盛邈矣孔孟之聖而不能得時以行其道三代以來唯伊尹周公之道能施於用下此則子房之於漢祖不屑盡其用孔明之於漢室不克盡其用魏鄭公裴晉公之於唐粗見於用而公於宋慶曆皇祐之間雖用之猶未究也然而公之精忠大節正言直氣固巳昭三光而徹兩儀亘千萬年凛然猶生非學際天人量擴宇宙操堅金石者其曷能與於此公諱仲淹字希文范氏世為蘇州人蚤歲讀書長白山祠于山之醴泉寺舊矣惟公功業在世名聲在人與天壤為不朽固無待乎祠而存而祠之屢壞屢葺閲歷如一日有以驗人之慕公之深而其來遊來歌者慨其風烈有以興起則是祠也於名教風厲甚大尚論公之平昔俾來者有所法公服勤茹淡䔍行力學堅彊刻礪壁立初載信道不屈守職敢言屢貶屢復謇謇益勵絶迹凡近宅心高明窮逹無間始終一致其操其學為如何書條政務至萬餘言逮其得位舉見於用立朝奏陳皆可垂憲崇化厚俗敦尚風義救荒惠貧所部晏然出帥西師夷夏聳服熟羌來歸卒臣元昊及參大政請明黜陟抑僥幸精貢舉擇守宰均公田厚農桑修武備减徭役蠲逋負重命令更䕃補之法嚴監司之選皆經國逺圖嘗自誦曰士當先天下之憂而憂後天下之樂而樂其自任以天下之重而力於成天下之務者為如何公輕財好施尤厚宗族恩例俸賜常均及之置義田宅聚族以給在邊恩賚皆以上意分賜諸將坐呂相貶至其再起歡然相約戮力平賊其量為如何民饗公利以范為姓公所履歷民多立祠中國外夷莫不喜稱公之姓字而樂道其善夏師之擾關輔搖動聞其出鎮人心遂安夏人謂公腹中自有甲兵數萬至有破膽之謡仁宗聞其往援定川喜曰吾固知范某可用也及登政府一以太平責之降手詔開天章閣賜坐趣條具天下事天下之人視其去留以驗治否其所以繫天下之望者又何如哉蓋嘗論之公生于宋仕于宋而其人品器量風節則偉然三代之臣也宋儒言夲朝人材以公為第一蓋確論之不可易者起巖齊西晚生東瞻長白不逺五舍徑拜祠下愓然興懷既件其蹟復繫以辭俾歌以祠公其辭曰繄真材之間出兮羌兩儀之效靈在地則為山嶽兮在天則為列星膺半千之名世兮必興運之是丁開一王之盛治兮示四海之儀刑復隆古之泰道兮措羣生于敉寧惟公之生允無愧于是兮固已揭日月而奮雷霆蹟效著于人心兮劇金石之勒銘威於外夷兮忠赤簡于大廷不希世以詭隨兮唯大猷之是經上方軌于三代兮下垂譽于千齡沒面凛乎不亡兮功烈賁乎汗青復元氣於太虗兮佐玄造於冥冥尚斂福以錫民兮驅疫癘而殄蝗螟眷故山之陳迹兮鑒醴泉之清冷俯岫幌兮欵巖扄息風馬兮駐雲軿薦松醪之醲郁兮擷野䔩之芳馨仰精爽之來下兮庶肅然之一聆警鄙頑與貪懦兮將如寤而如醒恍神逰之無方兮眄荒祠而涕零耿英靈之如在兮齊長白之亭亭范公慶州祠堂碑隂記范公之名與其施設天下之人無智愚稚耄皆所以想聞而懼一不得知者垂四十年既薨則墓銘神道表記公終始尤得其詳今龍圗閣直學士汝南周公因慶民之思又為作祠堂命屬僚書其實于廡下然公之惠愛及民之多有不士大夫之聞者文亦不克究日月之光猶或晦焉昔西事初慶以賊羌臣屬日久忽於儲備一旦重兵宿壄亡所取濟鳳翔府天興令持監司符檄來攝州事以芻糧數百萬計暴加於民促圗巳功沸若羔鼎至有力不堪弊群竄他邦甚者斷吭絶脰死以期免公是時方經略四路請留延安民聞之亟相提挈馳告麾下公即日走符檄放天興令者還任凡百苛斂一切罷去未幾公即受命專本路之師竄者還危者安里巷相保卒如平時之樂及朝廷欲驅邊人而戰先墨以著軍籍獨公所部之衆改涅其手非講習攻鬪各聽處田壄故上不糜廪食而得其用下不失為良農此略從三代之法較之他路歡戚斯可計矣先是賊豔狂熾日虞竊增屯士馬殆十數倍民坊佛廟皆得而止之公恤其非便乃圜視內外得州之北隅拓城樹宇分列營挍工興之日有畚鍤發及枯骸者詢之即昔之廢壠焉公命索其所餘以俸金賈近阜民田聚而葬之喪具祭品必親視而後給是歲久旱已而復雨僉謂公之隂德故天報之郡以處高艱於井飲舊矣公至乃以地勢迹之命匠氏直城之西北鑿及甘泉凡百餘井人無一金之費日用以足前此戍守多關輔之卒往往三數歲不能得其歸公謂人久勞則怨且惰將何以固衆心而取完力也自爾更相戍役止一歲為限推此五事實公始未至與既至而所為者雖體有小大蓋不獨善士所恱若庸夫悍兵皆骨髓其賜迄今無忘公嘗出使江淮守七州歷四帥為開封內史以至參預大政柄率皆除大害興大利由一方訖四海父荷子戴固縷縷有條目或薦紳先生暨太史氏未能盡其傳諒亦然也汝南公方將博采遺烈以盡力祠之意㑹郡進士劉頌件右來獻且曰此而不書大懼舌語所傳不足以信後世因爾次其說請刻于碑之隂時嘉祐五年五月十一日文林郎試祕書省校書郎權儀州軍事判官監環州折博務蹇周輔記內殿承制慶州兵馬都監兼在城巡檢雷周輔書并題額龍圖閣直學士朝散大夫尚書兵部郎中環慶路馬步軍都部署經略安撫使兼知慶州軍州事及管內勸農使護軍永安縣開國伯食邑八百戶賜紫金魚袋同沆義渠荔菲彬刋文正書院記吳郡祀范文正公舊矣自公貴顯時置義田義學以淑其族之人公歿而子孫世守之不廢然而未有專祠也咸淳甲戌郡守潜公說友始請建祠而割田以供祀事公之子孫亦世守之不廢然而未有書院也至正丙戌郡守吳公秉彛建議請以書院易祠僉憲趙公承僖按行吳中是其議遂得請于行省行省上之中書中書議以兹事有關世道且不設教官而以其子孫之居嫡者世主之於事便乃下從其請公八世孫文英適主祠事竱力殫慮改制增擴亦既宋且逺矣祁時佐領江浙儒學以公事來謁祠下式睹其成衆謂不可以無紀而祁也幸際其㑹宜為文辭既不獲則取其家傳而徵之公之生當宋端拱已丑其歿也以皇祐壬辰至潜公為守時二百二十年天下郡縣凡公之所至蒙其澤而聞其風者率為公立祠而於吳獨為缺典至吳公為守時又七十年他郡縣且有以祠為書院者矣而於吳尚仍舊規蓋吳為公父母之邦公之父祖墳墓在焉子孫居焉族之人比屋而群處焉所以表異而褒崇之者宜有加於他郡而反若不及者是宜賢郡守之有請也是宜廟堂之上之從之也昔公以正大之學卓冠群賢以忠義之氣振厲天下其功之𬒳當時而澤後世者固不可遍舉獨舉其切而近者則公於所在開設學校以教育多士至吳郡則以巳地建學規制崇廣逮公之子恭獻公復割曰以成公之志當是時天下郡縣未嘗皆置學也而學校之遍天下自公始若其察泰山孫氏於貧窶中使得以究其業延安定胡公入太學為學者師卒之泰山以經術大鳴于時安定之門人才輩出而河南程叔子尤遇賞拔公之造就人才巳如此其後橫渠張子以盛氣自負公復折之以儒者名教且授之以中庸卒之關陕之教與伊洛相表裏蓋自六經晦蝕聖人之道不傳為治者不知所尊尚寥寥以至于公而後開學校隆師儒誘掖勸奬以成就天下之士且以開萬世道統之傳則公之有功名教夫豈少哉夫以公之有功名教如此則後世之宗而祀之為學校以廣之固宜與夫子之道相為無窮蓋夫子之道與天地為無窮而公之功則與夫子之道為無窮也此書院之所以立也雖然祠則改矣書院則既立矣凡范氏之子弟與夫四方之來者宜何如亦曰誦其詩讀其書為其人之為而巳公之為夫人之所能為也以公為不可為而不為者自棄也為之而弗力者自畫也高山仰止遺貌凛然必有寤寐我公於千百載之上者承務郎江浙等處儒學副提舉李祁撰嘉議大夫中書禮部尚書郡人干文傳書翰林侍讀學士中奉大夫知制誥同修國史泰不華篆額至正十年八月日立
