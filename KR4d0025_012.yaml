  text: 范文正公集卷第十二
  hash: sha256:66de5cb97c69e3d616b0c7726faa88306aaf4d9e58405b0c88e3e2bda0ed0820
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_012-1a}
body:
  text: 贈戶部郎中許公墓志銘公諱衮字公儀世為燕人皇考諱某王考諱某並隱君子也避五代之難不榮以祿考諱某汶陽之廬令纍贈光祿少卿妣清河張氏贈河內縣太君皆積德深長慶著來嗣公英秀而文與時會亨開寶八年太宗之尹開封也龍德日彰髦傑之士其嚮如雲是歲秋賦公卿送名者比比焉及試藝公為之首覆䇿于庭復在髙等時登甲乙科者必更州縣有唐之遺風釋褐除江寧府獄曹掾本路八使言聽決詳明上既御大器北伐太原促召至行在曰我姑試之除均州防禦判官郡將表其能狀乃拜太子右贊善大夫通判姑蘇郡事時二浙之地始歸朝廷宿政如繩公善解之就進殿中丞俄拜奉常博士領曹南郡樹善屏惡新民耳目以前均榷浙右坐聮職之纍降品一等領饒陽錢監未幾辦之移倅弋陽郡復官曲臺在郡七陳諌章上愛其忠就遷本郡守受代至闕下復上䇿議并所著文四十卷翌日召試禁庭上覽而嘉之曰南府才冠吾不失人即以本官直昭文館賜服五品判登聞鼓院由是四方之訟清而不壅以奉安先塋請理覃懷郡出奉公家入敦孝事河內人歌焉又西陲文州扼其戎險命公往刺遠人便之真宗即位一日謂執政曰人君之言行也動乎天地不可以誣命公修注記以先君之諱固請不獲須正人也公在館三進秩至于職方貟外郎因論邊事慷慨動上心靣改兵部方將圖任遘疾求解不得去以景德二年四月二十九日終于京師武成坊之私第享年五十七娶朱氏封永城縣君有子四人伯曰珂祁州深澤尉仲曰琰有文與行擢進士第今為太常博士奉朝請叔曰琦恭謹有立今為右侍禁衛州兵馬監押季曰頊早亡一女適進士張濤朝廷贈公尚書戶部郎中進封夫人河南縣太君子登朝也以某年月日歸葬于懷之河南縣某鄉某里銘曰燕趙之英邦家之寶親逢聖神首冠俊造翹翹入彀郁郁登瀛榮滯六曹淹恤百城晚歸內朝端立右史直道始行怒飛爰止嗚呼遇豈不竒進豈不時賢者弗逹天乎可疑葬于善地兮保以令嗣兮亦公之意兮滕公夫人刁氏墓志銘序曰葬者藏也欲人不得而見之也君子之思也遠故復卜于山坎于泉又刻名與行從而祕之意百代之下治亂之變觀其銘思其人而不敢廢其墓斯孝子之心取諸大過初夫人之長子今祠部外郎宗諒作諫官以抗章黜知玉山郡再貶蒞池陽之榷酤俄而起倅江寧府事常謂池之九華山上凌紫霄下盤洪流千巖白雲萬壑清風草木多靈民人一熙書契巳降不知干戈居者得其壽藏者得其朽乃歎曰是可隱志焉是可宅先焉即奉先公太博之靈葬于此山之金雞原斯又大過之意至矣哉時景祐之三載明年夫人無疾而終春秋七十有二閏四月舉而祔之禮也夫人姓刁氏其先譜史存焉皇考諱晃後唐天平軍節度判官王考諱傑梁泰寧軍節度判官考諱允成皇朝贈太子右贊善大夫夫人歸滕氏服勤婦道自先太博之遺世也二子尚幼夫人夙夜誨導內惟節儉外豐禮於賔客俾令人是親以就厥文行而祠部君克承善志鴻軒鳯翥有風采于朝廷夫人纍封渤海縣太君次子宗元就飬于家未登祿仕二女適名族稱其禮範夫人之性柔而明端而慈曉文翰通名理事長如不克撫下如不及居大族餘五十載門中無間言及子以言貶顛沛於江湖間夫人從之未嘗出憂語知事君之然也難哉故生享德於慶閭沒反真於福地某於祠部同年之執也嘗入拜于堂上知夫人之賢而敢述焉其銘曰九江之上九華之中孝子宅親厥思無窮茫茫萬年髙岸可遷尚有人焉來此拳拳曰賢哉滕公夫人之墓再拜而去都官貟外郎元公墓志銘公諱奉宗字知禮其先臨川大姓危氏也皇考諱仔倡唐信州刺史避楊渥之亂東依錢氏時朝廷命討淮南未行而終因家於餘杭王考諱德照為吳越王相僅三十年賜姓元氏纍贈太保考諱秀文典吳越書命纍贈太僕少卿妣陳氏贈馮翊縣太君少卿子五人曰興宗象宗宜宗道宗公即幼子也三人事忠懿王有儒術皆補為郎象宗忠懿之胥也從而還朝以文召試拜光祿寺丞公精於詞律景德中天子臨軒試天下士公中甲科初命歙州績溪縣事再命常州武進令皆以廉愛稱遷漳州從事故鎮牧錢公惟濟洎數朝賢交章保任除忠正軍掌書記俄改淮南幕本道按刑使采公理行以聞擢拜太子中允領淝川榷酤朝廷以西蜀天下之富昔者吏饞民膏怨所由生階之為亂宜清舉者往焉公例改知蜀州晉原縣今上即位遷太常丞賜服五品還知通州海門縣遷博士入拜尚書屯田外郎有監郡之行公以思事松楸願得餘杭一間局蒞之詔從其請再朞求分務南都尋告老歸姑蘇郡朝廷恤之補一子官又以籍田之慶進都官外郎景祐戊寅歲十月丙戌考終于永定里第之寢享年七十有八始娶吳氏再娶李氏封壽安縣君公三子昞曄􅌔皆舉進士昞從其補今為歙縣簿曄􅌔並策名曄不赴調􅌔解官俱就飬左右及公之喪勺水不入口者三日公孝悌之性不避禍難初江浙始下關譏甚嚴衣冠之族咸促赴闕下無敢私歸公聞太夫人之憂晝匿夜馳以及於葬兄道宗有才名不就世祿舉天府進士為搢紳先生所推諾公友事之如在膝下易衣并食不改其樂有兄子翼幼依於公愛之如傷教之若不及以至于成宗黨稱焉相國潁川公曩司浙漕公在武進諸郡有難獄多命公决之在海門日患斥鹵之澤民無甘飲及卜良地鑿大池廣方百步積泉袤丈自是雖甚旱暵人常賴之又邑有大瀆亘數十里堙而不治公抗議籍力導至于海人咸利焉公退十餘年創竹亭花圃遊遙其間多素食清居非有道者不接晚年制斂服葬器而命諸子曰吾死之日必歸我于父兄之側魂如有知得事親於地下諸子如其教以其年十二月甲申葬于錢塘履孝鄉峴陀嶺之先塋禮也某以公年德嘗修鄉丈之禮而敢銘焉榮華之衢奔者無極公乎何心却焉而息孝友之風樹者無幾公乎何心沒焉不巳遷惠于民抱道于身于嗟君子吾不知夫古人贈兵部尚書田公墓志銘公諱錫字表聖世為京兆人唐德之衰徙家于蜀昔武王封舜之後於陳春秋時公子完如齊子孫遂大食菜於田而命氏焉厥後將有穰苴相有千秋斯可謂之著矣大王父易直王父成皆隱君子也文而不耀父懿因公之貴纍贈尚書左司郎中善教于家嘗命公曰汝讀聖人之書而學其道愼無速為期二十年可以從政矣公服其訓拳拳然博通群書東遊長安昌黎韓丕復居驪山白鹿觀數年器志大成拔王府薦有聲于京師太宗皇帝親䇿天下進士擢公第二人時太平興國三年秋也釋褐除將作監丞通判宣城郡召還改著作佐郎俄拜右拾遺直史館賜五品服出為河北轉運使改知相州就除左補闕移桐廬郡遷起居舍人還判登聞鼓院尋以本官知制誥進兵部貟外郎充職以直言改戶部郎中出守淮陽以留獄之謗左降海州團練副使起為工部貟外郎直集賢院復戶部郎中真宗皇帝即位遷吏部郎中判審官院兼通進銀臺封駮司賜金紫求出典海陵郡還臺兼御史知雜拜右諌議大夫史館修撰以咸平六年十二月十一日終于私第享年六十四公自白衣巳有意於風化上書闕下請復鄉飲禮又請修籍田禮及在朝廷知無不言太宗初既取太原范陽未下帝怒不賞平晉之功中外嚚然而莫敢言者獨公上書論諫理意深切帝感窹璽書褒答賜內帑錢五十萬僚友謂公曰今日之事鮮矣宜少晦以遠讒忌公曰事君之誠惟恐不竭矧天植其性豈一賞之奪耶在河朔暨相州纍章論邊事至桐廬郡以吳越之邦歸朝廷未久人阻禮教邈如也公下車建孔子廟教之詩書天子賜九經以佑之自是睦人舉孝秀登搢紳者比比焉在郡聞禁中火拜章極言上嘉之及還眷遇愈隆㑹乾明節館閣多進詩歌帝獨喜公之辭乃依韻和賜令宰相宣付公又上封禪書謂五代之亂人如豺虎不圗復見太平宜崇檢玉之禮以答天意公在西掖㑹京畿太旱禱祠無應遂抗言切於時政故有宛丘之行咸平初出使秦隴回上三章言陜西數十州苦于靈夏之役朝廷為之戚然出海陵之初以星文示變拜疏請降詔責躬上奉天誡真宗皇帝嘉其意屢召對便殿及行降中使撫安仍加寵賚爰有翰林學士承旨宋公白舉公賢良方正以副天下之望一日召對久之且曰陛下以皇王之道為心臣請采經史中切於治體者上資聖覽帝深然之乃具草以進手詔答曰卿能演皇王清淨之風述理亂興亡之本備觀鑒戒朕心渙然所撰三十篇皆隱其目公奉事兩朝由遺補歷御史至諫議大夫前後章疏凡五十有二嘗謂諸子曰吾每言國家事天子聽納則人臣之幸不然禍且至矣亦吾之分也及終有遺表陳邦國安不忘危之意其家弗預焉天子怛然命中使賵之有制痛悼贈工部侍郎二子改大理評事持喪中並給月俸哀榮之禮可謂至矣後以二子登朝纍贈兵部尚書寶元幾年某月某日與夫人合葬于泗州臨淮縣某鄉之某原禮也公娶楊氏再娶奚氏封江陵縣君能循法度以配君子二子長曰慶遠今為駕部貟外郎次曰慶餘今為比部郎中並克奉堂搆有能政于四方女三人長適王氏次適龐氏季適張氏皆以婦道稱公動必以禮言必有法賢不肖咸憚伏之出處二十年未嘗趨權貴之門在貶廢中樂得其正晏如也著文章成五十卷目之曰咸平集行於世論者曰在大禹時臯陶矢厥謨在湯武時伊尹周公為之訓誥故教化紀綱莫盛於三代而子孫有天下皆數百年秦滅詩書其風丕紹至西漢得賈誼董仲舒其言可以追先王之烈而弗克施使後世王者無復起三代之心由漢始也聖宋定天下太宗鋭意太平真宗之初復親擢俊乂如田公之徒並見奬用惜乎不終其才豈皇天之意特厚於古歟某幼聞髙風未嘗遊於其門今駕部書先君之履業索文於江外某敢約而修之又采舊老之言而作銘云嗚呼田公天下之正人也言甚危命甚竒盡心而弗疑終身而無違嗚呼賢哉吾不得而見之兵部侍郎致仕胡公墓志銘寶元二年六月十八日尚書兵部侍郎致仕胡公薨于餘杭郡之私第明年二月十有一日葬于杭之錢塘縣南山履泰鄉龍井源以夫人潁川郡君陳氏祔焉禮也孤子楷泣血言于友人范某禮經謂稱揚先祖之美以明著於後世此孝子孝孫之心也然而言之不文行而不遠處喪之言烏乎能文今得浙東簽書寺丞俞君狀先人之事而敢請志焉某曰孔子見齊衰者必作重其孝於親也敢不唯命公諱則字子正婺之永康人也昔虞舜之後有胡公武王封於陳蓋族望之來遠矣皇考諱彭王考諱瀔皆隱於唐季其道不顯考諱承師在鄉閭間以積善稱因公而貴官至尚書比部貟外郎贈吏部郎中妣應氏封永樂縣太君贈普寧郡太君公少而倜儻負氣格錢氏為國百年士用補廕不設貢舉吳越間儒風幾息公能購經史屬文辭及歸皇朝端拱二年御前登進士第釋褐為許州許田尉以幹自聞補蘄州廣濟宰又補憲州録曹以本道計使諫大夫索公湘之舉改祕書省著作佐郎簽署貝州節度觀察判官公事升本省丞知潯州拜太常博士提舉二浙榷茶事兼知桐廬郡丁太夫人憂服除以本官知永嘉郡遷屯田貟外郎提舉江南路銀銅場鑄錢監擢任江淮制置發運使轉户部貟外郎入為三司度支副使賜金紫除禮部郎中京西轉運使又移廣南西路轉運使以户部郎中充江淮制置發運使轉吏部郎中改太常少卿丁先君憂終制知玉山郡移福唐郡拜右諫議大夫知杭州入判流內銓以舉官纍責授少常知池州未行復諌議大夫知永興軍領河北都轉運使給事中入權三司使拜工部侍郎集賢院學士知陳州進刑部再牧餘杭郡踐更中外凡四十七年得請加兵部侍郎致仕朝廷命長子通判錢塘以就飬又六年而終享齡七十有七天子聞而悼之進一子官初至道中公在憲州時西寇梗邊朝廷命師五路入討詔具三十日糧以從之索公方引公督隨軍糧草事公曰為百日計猶或不支奈何索公乃遣公入奏召對逾刻公陳邊事如指之掌上顧左右曰州縣中有如此人遂可其奏且示甄拔之意後大帥李繼隆果與寇遇十旬不解索公曰微子幾敗吾事一日其帥移文曰兵將深入糧可繼乎公曰師老矣矯問我糧為歸師之名耳請以有備報之索從其議彼即自還無以咎我其先見如此及索公主河北計又奏辟之遂以貝州之行朝廷遣賜省天下冗役就命公行河北道凡去籍者僅十萬數民用休息在潯州人有虎患公齊戒禱城隍神翌朝得死虎于廟中其誠之效歟按池州永豐監得匿銅數萬斤吏懼當死公思之曰昔馬伏波哀重囚而縱之前史義焉今銅尚在吾忍重其貨而輕數人之生耶咸以羡餘籍之不復為坐在江淮制置日㑹真宗皇帝奉祀景毫公實主其供億千乘萬騎至于禮成無一毫之闕帝深愛其才靣加奬勞遂進秩登于計相之二在廣南西路有大舶困風于遠海食匱資竭久不能進夷人告窮于公公命瓊州出公帑錢三百萬以貸之吏曰夷本亡信又海舶乘風無所不之公曰遠人之來不恤其窮豈國家之意耶後夷人卒至輸上之貨十倍其貸朝廷省奏而嘉焉又宜州繫重辟十九人時有大水公不慮患而特往辨之活者九人焉在福唐有官田數百頃民輸租食利舊矣至是計臣上言請就鬻之責其估二十萬貫民不勝弊公奏之未報章三上且曰百姓疾苦刺史當言之而弗從刺史可廢矣乃有俞詔減其直之半而民始安公領三司使寬於財利不以刻下為功時上方以兩京陜西官鹽歲久民鮮得食而日以犯法命通商有司重其改作公首請奉詔其事遂行公性至孝自曲臺丁太夫人憂廬于墓側以終喪紀有草木之祥本郡表之及京西之行以家君朱紱為請上曰胡某為孝雖非其例與以明勸也搢紳先生榮之又天禧中尚居郎署朝廷擬公諌議大夫知廣州公以家君八十歲懇辭于政府乃復有制置之行尋以哀去職得盡心於喪葬公富宇量篤風義往往臨事得文法外意人或譏之公亦無悔焉其輕財尚施不為私積士大夫又稱之福唐前郡將𬒳訟去官嘗延蜀儒龍昌期與郡人講易率錢十萬遺之以歸事在訟中及公下車昌期自益部械至公曰斯何罪耶遽命釋之見以賔禮法當償其所遺公代以俸金仍厚遣而還又濟陽丁公為舉子時與孫漢公客許田公待之甚厚及其執政而雅故之情不絶若休戚士人而未嘗預暨丁有朱崖之行昔之賔客無敢顧其家公實𬒳議出玉山郡尚屢遣介夫不遠萬里而往遺焉此又人之難矣及退居西湖乘畫船擊清波深樽雅絃左子右孫與交親笑歌於時歲之間浩如也人不謂之賢乎夫人潁川郡君有慈和之德先以壽終令子四人長曰楷都官貟外郎前知睦州祥符七年秋登服勤詞學科所至政能有先君風度次曰湘好學有志識朋友多之次曰桂俊異居喪而亡次曰淮孝謹有成人風二女長適泉州德化縣尉蘇璠次適御史臺主簿華參而亡其閨門之範見其潁川之志某非特為重齊衰之情嘗倅宛丘郡㑹公為二千石以國士見遇且與都官布素之遊誠可代孝子而言焉銘曰進以功退以壽義可書石不朽百年之為兮千載後胡公夫人陳氏墓志銘詩稱采繁夫人不失職也夫人之職莫先乎舅姑甘旨以事居蘋蘩以事往故可以配君子正家道也夫人姓陳氏金華郡之令族曾祖諱晦祖諱資父諱文諭皆樂善于家不從仕䆠夫人幼賢父母篤愛擇公而妻之及公中科第纍調遠方二親樂閭里與姻族遊夫人願侍左右不從公行凡二十年縫衣㸑飱必躬親之至舅姑之終與公執喪三年然後就公官所此夫人大節無愧天下之為人婦者有聲詩之義焉又性好禮自少至老對公如賔客加以純儉而仁笄服之餘皆均于親之貧者夫人自公登朝封上黨縣君公為諫議大夫進封本郡君寶元元年秋九月寢疾乃齊沐易衣怡怡而終享年七十有九以三年二月十一日與公合葬于履泰鄉龍并源禮也子四人長曰楷都官貟外郎次曰湘曰桂曰淮並太常寺太祝二女習夫人之教柔淑有禮宗黨稱焉長適蘇氏次適華氏銘曰惟孝惟禮作配君子伊夫人兮至矣寧海軍節度掌書記沈君墓志銘吳興郡太守滕侯下車求故同年沈兄之家得諸孤問其墳墓曰貧未之葬滕侯傷之乃謀于僚屬卜善地㨂良日其禮悉備以寶元三年二月某日葬于德清縣之永和鄉大壯嶺君諱嚴字叔寬世為本郡人其先食邑於邥後子孫失國而為沈氏漢晉而下代有其人曾祖諱規祖諱廷誨父諱延岫皆隱而不仕叔寬幼負器識服親之教宗經屬文有聲于江表大中祥符七年秋郡國敦遣首送千禮部明年春禮部較天下之才奏叔寬第四人天子命試于庭中甲科除南康軍判官三載有善績改宣城節度掌書記國家興山澤之利主計等薦君洪州武寧之茗局外臺上請兼領本邑事朝延從之既而吏畏其廉民愛其慈君子謂之善政餘杭郡榷酤歲金二十萬貫為諸郡之劇主計又奏君尸之三年而還㑹故參政蔡公居守南都以同年之遊惜其沉俊辟為留守推官其年秋七月以疾終于官所享年五十叔寬孝悌于家事其親未嘗違顔色視兄之孤必先於巳子與人交篤於義信善人君子無不樂見之及聞其亡皆相弔云天與其才也又賦其行也而不及其顯以壽也悲夫三子曰祁曰邰曰郁並從儒學必有立者二女長適前進士陳經次女未笄長女之嫁蔡公不遠千里命齎金以送之及君之葬又滕侯極意以營之有以見叔寬感人之深也如此某同年之列最相知心故書之銘曰叔寬叔寬生兮可愛殁兮可傷友朋之望兮子孫其昌戶部侍郎贈兵部尚書蔡公墓志銘寶元二年歲次巳卯四月前參知政事戶部侍郎蔡公薨天子悼之卿大夫憂之國人傷之上命三公舉行典禮贈兵部尚書諡曰文忠以康定二年歲次辛巳十一月某日葬于許州陽翟之某山公諱齊字子思其先周之子孫纍封於蔡因以著姓秦漢以降代生偉人曾祖綰贈太保洛陽人也嘗宰萊之膠水居官九年民愛以深遂家焉祖諱鄰贈太傅隱居丘園以墳素為樂考諱夢臣纍贈中書令博通經史善時筆與宗族居鄉黨稱其孝友娶楚國太夫人張氏而生公教之親仁賔來如歸公幼而神秀眉目廣聳見者異之嘗依外舅劉氏學于彭城今相國隴西公迪時為監郡得公詩語嘆曰渠有大志宜善視之大中祥符八年春真宗皇帝臨軒以文考天下之士公中第一及引對文陛堂堂英偉進退有法上大恱顧謂寇萊公曰得人矣特下詔俾金吾給七人清道自公始也釋褐除將作監丞通守兖海郡移北海郡召還以大著直集賢院主判三司開拆司賜服五品今上即位拜右司諌同修起居注改禮部貟外郎兼侍御史知雜事賜金紫歷戶部度支二副使遷起居舍人知制誥同知審官院既而召入翰林為學士兼侍讀學士轉禮部郎中龍圖閣學士守西京以便親求為髙密郡徙南京入除左諫議大夫權御史中丞尋改給事中復充龍圗閣學士權三司使拜樞密副使進禮部侍郎參知政事以戶部侍郎罷終于汝隂郡享年若干楚國在堂君子哀之公之弟祕書丞禀甥著作佐郎寇平幹公襄事中山郡夫人劉氏哭泣三年至于疾廢二子尚幼曰延慶太常寺太祝曰延嗣祕書省正字長女適試將作監主簿劉庠次女在室而某自布素從公之逰見公出處語默無一不善門中奉親日視其親色諸公昆弟愛之如傷先朝采拔以輔相器之當遺弓之初公懷哀慕不能食者數日家人視其衾衣涕泗霑濕公病汝隂聞拓拔僣稱嘻吁感槩教弟禀言西事甚詳蓋忠孝之性發之天也公於親舊間雖死生不易彼有孤遺則必為之備嫁娶又好學無倦未嘗不以名教為急孔子之後世襲文宣公嘗宰曲阜乾興中四十九代孫承祐卒遂廢十餘年公聞承祐有母弟在抗章請復其嗣有詔從之其立朝也能清其心髙其行未嘗取於人明肅太后時用事中貴人董修景德寺時公在翰林詔為之記中人求公善辭許以不次公遲之不進故被誣而出至髙密㑹歲飢公請蠲諸州稅又力請放海利以救東人于今賴之公兩居憲臺方嚴不動百辟畏其風權戚有過則彈劾不隱未嘗求其下也明肅之終莊惠復立閣門促百僚賀公毅然正色目臺吏不得追班前白執政遂罷自是莊惠損抑禮數有力焉在樞密院海南奏交趾八百餘人避本國之虐以歸我議者謂不如還之恐生邊患公曰當內之荆湖間活以間田奈何求生而來委之兕虎蠻亦人也義必不還苟散為民盜從而戮之酷又甚焉爭之不能得後果為亂捕之歲餘宜桂以西皆警朝廷患之公猶有愧色在政府浩然示至公於中外以進賢為樂以天下為憂見佞色則嫉聞善言必謝孜孜論道以致君堯舜為心與大臣居和而不倚正而不訐無親踈之間有方大之量朝廷為之重刑賞為之平及其出也未踰歲時而天子思之公遽不起嗚呼公之生也天有意也公之亡也天無意乎使在位而壽則道德功名非竹帛之可勝矣銘曰泰山之東齊魯同風厥生我公我公堂堂觀國之光亨于真皇真皇上仙隕血漣漣欲報昊天今上聖神乃眷正人參于國鈞純德坦坦平心浩浩進退惟道恕以待物誠以報國仁人之德天乎天乎豈不有心奪此令人我懷憂深箕山峩峩潁川悠悠山為陂兮川為丘公之名兮與日月留范文正公集卷第十二
