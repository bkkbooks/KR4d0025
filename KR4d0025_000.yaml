front:
  text: 范文正公集叙慶曆三年軾始緫角入鄕校士有自京師來者以魯人石守道所作慶曆聖德詩示鄕先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何爲其不可先生竒軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則巳私識之矣嘉祐二年始舉進士至京師則范公没旣塟而墓碑出讀之至流涕曰吾得其爲人蓋十有五年而不一見其靣豈非命也歟是歳登第始見知于歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相尭夫又六年始見其叔彛叟京師又十一年遂與其季德孺同僚于徐皆一見如舊且以公之遺藁見屬爲叙又十三年乃克爲之嗚呼公之功德蓋不待文而顯其文亦不待叙而傳然不敢辭者自以八歲知敬愛公今四十七年矣彼三傑者皆得從之㳺而公獨不識以爲平生之恨若獲挂名其文字中以自託於門下士之末豈非疇昔之願也哉古之君子知伊尹太公管仲樂毅之流其王覇之畧皆定於畎畆中非仕而後學者也淮隂侯見高皇帝于漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主筞曹操孫權䂓取劉璋因蜀之資以争天下終身不易其言此豈囗傳耳受嘗試爲之而僥倖其或成者哉公在天聖中居大夫人憂巳有憂天下致太平之意故爲萬言書以遺宰相天下傳誦至用爲將擢爲執政考其平生所爲無出此書者今其集二十卷爲詩賦二百六十八爲文一百六十五其於仁義禮樂忠信孝悌蓋如飢渇之於飲食欲湏臾忘而不可得如火之熱如水之濕蓋其天性有不得不然者雖弄翰戯語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非有言也德之發於囗者也又曰我戰則克祭則受福非能戰也德之見於怒者也元祐四年四月二十一日龍圖閣學士朝奉郎新知杭州軍州事蘇軾叙范文正公集目録
