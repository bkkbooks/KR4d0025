body:
  text: 後學時兆文校正後學黃姬水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校第一卷古賦明堂賦秋香亭賦靈烏賦古詩謝黃惣太慱見示文集四民詩寄題孫氏碧鮮亭贈張先生明月謡上漢謡清風謡書海陵滕從事文㑹堂上都行送張伯玉鳴琴駲鷗詠古鑑贈樊秀才贈碁者歲寒堂三題贈都下隱者第二卷古詩和人遊嵩山十二題聽真上人琴歌和僧長吉湖居五題酬葉道卿學士見寄和章岷從事鬪茶歌和葛閎寺丞接花歌天平山白雲泉留題常熟頂山僧居江上漁者送蔡挺代父之蜀鄱陽酬泉州曹使君見寄和謝希深學士見寄廬山瀑布滕子京魏介之二同年相訪丹陽郡送劉牧推官之兖州和楊畋孤琴詠絳州園池晉祠泉訪陜郊魏踈處士中元夜百花洲作覽秀亭詩祠風師酬提刑趙學士見貽依韻和安陸孫司諫見寄依韻鄉尉黃通依韻和襄陽王源叔龍圖見寄依韻答賈黯監丞賀雪依韻答提刑張太博嘗新醖寄題峴山羊公祠堂送河東提刑張太博依韻和提刑太博嘉雪送謝景初延評宰餘姚閲古堂詩第三卷律詩睢陽學舍書懷詠史五首次韻和劉䕫判官對雪河朔吟和黃揔太博上知郡杜少卿過太清宫寄餘杭全安石假少連二從事送江南運使張傳度支堯廟西溪見牡丹寄秦州幕明化基寺丞鵰鶚在秋天觀獵鸚鵡歸鴈青郊射陽湖舟中寄歐靜秀才和韓布殿丞三首送識上人逰金山寺野色雜詠四首書事呈韓布殿丞西溪書事得李四宗易書歐伯起相訪寄贈林逋處士酬滕子京同年贈餘杭唐異處士和沈書記同訪林處士諸暨道中作題翠峯院與人約訪林處士阻雨因寄寄西湖林處士越上聞子規送李紘殿院赴闕送邢昻處士南逰送丁司理赴明州送鄞江竇尉送常熟錢尉試筆送真元二上人歸吳中寄題許州錢相公信美亭送何白節推宰晉原二首送刁紡戶掾太常下第憶杭州西湖寄林處士依韻酬母湜推官送石曼卿送何涉秀才八月十四夜月送吳安道學士知崇州謫守睦州作赴桐廬郡淮上遇風三首送韓瀆殿院出守嶽陽出守桐廬道中十絶蕭灑桐廬郡十絶新定感興五首遊烏龍山寺江干間望和章岷推官同登承天寺竹閣齊中偶書留題江秀才舊居依韻酬周騤太博同年依韻答胡侍郎見寄桐廬郡齊書事留題方干處士舊居第四卷律詩依韻酬章推官見贈蘇州十詠依韻奉酬晏尚書見贈又用前韻謝晏尚書以近著示及陳質殿丞挽歌詞送僧文光依韻酬府判龎醇之見贈依韻酬吳安道學士見贈依韻吳春卿二首應制賞花釣魚過餘杭白塔寺西湖筵上贈胡侍郎江城對月送向綜國博通判桂州芝山寺升上人碧雲軒郡齊即事同年魏介之㑹上作依韻酬黃灝秀才贈鍾道士道士程用之為余傳神因題送魏介之江西提點遊廬山作瀑布贈廣宣大師移丹陽郡先遊茅山作贈茅山張道者京囗即事懷慶朔堂依韻酬葉道卿中秋對月二首贈葉少卿依韻答梁堅運判見寄城大順回道中作依韻和延安龐龍圖桞湖和延安龐龍圖寄嶽陽滕同年與張燾太博行欣代間因話江山作過長安醉别資政鄭侍郎依韻酬光化李簡夫屯田依韻酬太傅張相公見贈依韻酬益利鈐轄馬端左藏依韻酬邠州通判王稷太博依韻酬李光化見寄寄安素高處士酬李光化見寄二首依韻酬李光化叙懷和李光化秋詠四首送黃灝員外和並州大資政鄭侍郎秋晚書事和提刑趙學士探梅三絶和太傅鄧公歸遊武當見寄即席呈太傅相公紀送太傅相公歸闕依韻和提刑張太傅寄梅又和賞梅依韻答王源叔憶百花洲見寄獻百花洲圖上陳州晏相公依韻答青州冨資政見寄依韻答并州鄭大資見寄過陳州上晏相公和運使舍人觀潮二首依韻和蘇州蔣密學依韻和孫之翰對雪依韻和并州鄭宣徽見寄二首依韻答蔣密學見寄依韻和同年朱兵部王賔客交贈之什登表海樓石子澗二首依韻答韓侍御謝栁太博惠鶴知府孫學士見示和終南監宮太保道懷五首贈方秀才楷依韻和龎殿院見示二首前一集巳有一首第五卷義易論帝王好尚論選任賢能論近名論推委臣下論議上攻守二䇿狀議攻議守答竊議讃楊文公寫真讃第六卷頌皇儲資聖頌泰州張侯祠堂頌述南京府學生朱從道名述序太淸宮九詠序朝賢選定惠大師詩序太子賔客謝公夢讀史詩序刻唐祖先生墓志於賀監祠堂序述夢詩序尹師魯河南集序唐異詩序四德說說春秋序第七卷記桐廬郡嚴先生祠堂記南京書院題名記清白堂記嶽陽樓記邠州建學記天竺山日觀大師塔記書奏上時務書第八卷書上張右丞書上執政書上資政晏侍郎書第九卷書上時相議制舉書與歐靜書與周騤推官書與唐處士書答趙元昊書答安撫王內翰書上吕相公書三首上樞密尚書書與省主葉內翰書上吕中丞書第十卷祭文祭謝賔客文祭胡侍郎文祭蔡侍郎文祭石學士文祭吳龍圖文祭吕相公文祭陳相公文祭韓少傅文祭知環州种染院文祭陜府王待制文祭謝舍人文祭同年滕待制文祭龍圖楊給事文祭尹師魯舍人文祭故相太傅李侍中文祭葉翰林文祭杜待制文祭英烈王文第十一卷碑唐狄梁公碑宋故乾州刺史張公神道碑銘宋故衛尉少卿分司西京胡公神道碑宋故太子賔客分司西京謝公神道碑宋故同州觀察使李公神道碑第十二卷墓志贈戶部郎中許公墓志銘滕公夫人刁氏墓志銘都官員外郎元公墓志銘贈兵部尚書田公墓志銘兵部侍郎致仕胡公墓志銘胡公夫人陳氏墓志銘寧海軍節度掌書記沈君墓志銘戶部侍郎贈兵部尚書蔡公墓志銘第十三卷墓志天章閣待制王公墓志銘太常少卿賈公墓志銘太子右衛率府率田公墓志銘忠獻范公墓志銘東染院使种君墓志銘天章閣待制滕君墓志銘試祕書省校書郎知耀州華原縣事張君墓志銘太子中舍致仕上官君墓志銘太子中舍致仕范府君墓志銘第十四卷墓表太府少卿知處州事孫公墓志表鄠郊友人王君墓表龍圖閣直學士工部郎中假君墓表贈大理寺丞蔡君墓表權三司鹽鐡判官尚書兵部貟外郎王君墓表書碑隂書環州馬嶺鎮夫子廟碑隂第十五卷表代胡侍郎乞朝見表睦州謝上表蘇州謝就除禮部員外郎充天章閣待制表饒州謝上表潤州謝上表延州謝上表謝降官知耀州表耀州謝上表乞小郡表代胡侍郎奏乞餘杭州學名額表第十六卷表讓觀察使三表謝許讓觀察使表謝傳宣表讓樞密直學士諫議大夫表謝授知邠州表邠州謝上表遺表第十七卷表謝轉給事中移知鄧州表謝在中書日行遣公事不當放罪表鄧州謝上表謝依所乞依舊知鄧州表杭州謝上表謝賜鳯茶表謝轉禮部侍郎表乞召杜衍等備明堂老更表青州謝上表第十八卷狀代人奏乞王洙充南京講書狀求追贈考妣狀奏致仕分司官乞與折支全俸狀舉歐陽修充經略掌書記狀舉張方平充經略掌書記狀舉彭乘自代狀舉許渤簽署陜府判官事狀舉滕宗諒狀舉丘良孫應制科狀舉張升自代狀舉張伯玉應制科狀舉張問孫復狀讓除樞密副使召赴闕五狀賀胡侍郎致政狀第十九卷狀陳乞邠州狀陳乞鄧州狀舉李宗易向約堪任清要狀舉張諷李厚充青州職官狀薦李覯并録進禮論等狀進故朱宷所撰春秋文字及乞推恩與弟置狀陳乞潁亳一郡狀劄子論西京事冝劄子論復併縣劄子乞修京城劄子二道乞召還王洙及就遷職任事劄子第二十卷賦老人星賦老子猶龍賦䝉以飬正賦禮義為器賦今樂猶古樂賦省試自誠而明謂之性賦金在鎔賦臨川羡魚賦水車賦用天下心為心賦范文正公集目録終
