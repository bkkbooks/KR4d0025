front:
  text: 范文正公集卷第十七
  hash: sha256:be86662e45b6002cf7a6778f861e2429aa55c1bd73533b985d4c0876127ec910
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_017-1a}
body:
  text: 謝轉給事中移知鄧州表臣某言伏蒙聖恩特授臣給事中依前資政殿學士知鄧州者㳺進榮階徃臨善壤允爲兊渥彌集震驚臣中謝竊念臣立跡本孤逢辰甚盛以芻言罔避擢登侍從之班以睿奨素隆選預弼諧之列乏增君之善道寡措國之令謀無補當時自安何地遽上借麾之懇實畏在梁之譏俄奉明恩曲加異數假職名於祕殿領使範於邊藩由朝廷之威靈屬羗戎之欵順方露便安之請忽頒霶霈之私青瑣是登朱􅙲載啓臣績未著合陳三讓之封君命巳行懼致再言之黷進退惶惑不知所裁此蓋伏蒙皇帝陛下天造曲成皇暉乆照敦川澤并包之量法山雷善飬之經憫其勤勞致諸安逸示中外之一體保君臣之至懽臣敢不寅奉朝經躬脩民政孜孜共理少望於前賢蹇蹇一心無忘於大節臣巳一靣起發赴任次無任云云謝在中書日行遣公事不當放罪表臣某言近准中書劄子伏蒙聖慈以臣等在中書日行遣李曇男公事不當特放罪者具位之材早虧於國論大明之照終示於天慈爰霽震霆允爲渙汗臣中謝向以昩陋叅于幾㣲心則首公智非周物日視四方之奏類多庶獄之疑而有告訐以言情僞未究妖兇旣斃證左弗完上開三靣之仁在刑惟恤僉重一成之議至失不經多歷歳時尚騰牒訴伏蒙皇帝陛下川澤廣納日月委臨察其無他恕兹不及天地之私至大丘山之戴何勝敢不再省前尤一心後效少贖失中之咎用敷報上之誠臣無任感恩荷聖激切屏營之至鄧州謝上表臣某言伏奉制命授臣給事中依前資政殿學士知鄧州軍州事巳禮上訖瑣闈清品穰都善地處之甚重惴然若驚臣中謝竊念臣志意本㣲才力素寡始干及親之禄俄有得君之遇啓沃無隱出處惟命持一節以自信歷三黜而無悔頃以氐羗犯塞朝廷旰食起臣思過之地授臣禦戎之策徃罄死力敢圖生還夙夜一心首尾四載僅免輿尸之禍終無克敵之勲一旦召還五章陳讓惟求守塞不敢入朝再煩詔音促登樞右改叅大政俾竭㣲才革姑息之風則謀身者切齒尚循黙之體則愛國者寒心退孤上恩進歛羣怨誠難處於要路復請行於邊鄙方陳豫備之䇿俄覩綏懷之事廼宣霈澤以安黎元臣以患肺乆深每秋必發求去冱寒之地以就便安之所庻近醫藥存飬晚年伏蒙皇帝陛下天覆地生雲濡雨濯進以清近之秩付以偃息之藩風俗舊淳政事絶簡心方少泰病宜有瘳實繄寛大之朝将幸康寧之福敢不孜孜于善戰戰厥心求民疾於一方分國憂於千里上酬聖造少罄臣誠臣云云謝依所乞依舊知鄧州表臣某言奉勑就知荆南府續准中書劄子奉聖㫖允所乞依舊知鄧州者明命巳行輙希改易危誠旣露俄遂便安臣志獲宣天慈何報臣中謝臣渉道素淺立身最孤早由睿哲之知荐更繁劇之任頃升近弼思副上心以道直前雖危不避竭肝膂以論事犯雷霆而進忠未酬天地之恩巳掇風波之議尙䝉聖渥俾守善藩忽此就遷實隆倚任臣以本朝盛德優禮近臣多處京輔之間以存國體之重而又子有疾恙日常憂虞復困道塗仍遠醫藥遂至再三之瀆庻通萬一之情伏蒙皇帝陛下曲軫洪私特回中㫖許留舊治免渉長川蓋推體貌之恩曷副照臨之意敢不拳拳民政戰戰官箴誓堅介石之心仰荅髙穹之造臣云云杭州謝上表臣某言昨奉勑就差知杭州軍州事巳到任禮上訖江海上㳺東南巨屏所寄至重爲榮極深臣中謝竊念臣生禀迂踈親逢明盛居常苦節動必危言踐揚諫諍之曹傾盡諮詢之地至於徃司戎事屬當元帥之權入奉聖謀爰厠大臣之列有致君之素志乏代天之懿功魏相之數陳便宜頗䝉納用汲黯之多犯顔色敢憚見踈雖遼隔於明天亦荐分於善壤共理吳㑹之域奉揚唐虞之風跡雖遠而獲安年巳髙而就逸此蓋皇帝陛下天施廣育海務兼包寵優舊臣恩全晚歳臣敢不抱公忠之節始終弗囘體旰􅉴之憂遠邇咸一乂兹方靣副于宸心臣云云謝賜鳯茶表臣某言入内西頭供奉官麥知㣲至傳宣㫖撫問臣賜臣鳯茶一合者乆離帝右曷測天衷異恩一臨群疑盡決臣中謝竊念臣至誠許國孤立事君屢觸雷霆之威數蹈風波之險一心自信三黜寧逃方安江海之情敢覬雲天之問伏蒙皇帝陛下仁存舊物澤𬒳遠臣聖訓丁寧皇慈委曲念犬馬之㣲志錫龍鳯之上珍馨掩靈芝味滋甘醴濯五神之精爽祛百疾之㝠煩允彰仁壽之恩特出聖神之眷謹當餌爲良藥飲代凝冰思苦口以進言勵清心而守道上酬君父旁質神明臣云云謝轉禮部侍郎表臣某言伏蒙聖慈特授臣尚書禮部侍郎依前充職者渙渥自天震惶無地循牆弗獲致㓂是虞臣中謝伏念臣布素寒姿斗筲㣲噐初縻下士之禄忽塵上聖之知歷升近班嘗預大政深自感激詎爲因循仰祖宗之謀請行故事懷社稷之計動發危言雖欲必盡其心奚能乆安於位遽彰無狀誠合有誅而聖意始終天慈曠蕩尚寘名於祕殿復蒙幸於善藩大拙云藏人言用息莫聞課最敢覬龍光伏蒙皇帝陛下雷霆霽威日月還照未忘圖舊不次推恩擢登宗伯之曹上應文昌之緯職命如故爵數甚隆徒執讓以弗諧止服榮而爲懼臣敢不夕惕三省寅恭一心進則盡憂國憂民之誠退則處樂天樂道之分上酬聖遇用竭愚衷臣云云乞召杜衍等備明堂老更表臣某言伏覩朝廷行明堂宗祀之禮誕告天下臣守在遠方不獲榮觀大慶思有𥙷益輙兹狂易臣中謝臣聞易曰大觀在上言天下所觀在國家之爲也自古國家興行風教使天下觀之必先乎廟周人祀文王於明堂以配上帝所以示天下尊親之道漢顯宗永平二年春正月祀光武於明堂其年冬十月飬三老五更於辟雍三老五更以二千石禄飬終厥身前史紀之爲令王之盛節伏惟皇帝陛下稽古奉先行明堂大禮尊奉三聖配帝而饗普天率土咸知舞抃至於三老五更之典最爲盛德宜可兼而行之如前兩府老臣惟太子太保杜衍太子少傅任布在焉衍直清忠藎勤勞弼亮布㢘㓗不渝止足知退皆可備三老五更之選儻朝廷以禮大數煩難於並舉亦可召至俾陪觀大禮及覃慶之際特加恩奨是亦兼行飬老之典也臣又覩工部侍郎致仕郎簡執節清素處心雅尙優㳺泉石樂於吟詠今八十三歳精明不衰月俸之餘不治生業此則臣所目見之也而歸老十餘年不曾遷改亦無錫賜况天下似此近上老臣甚少不難旌奨如郎簡則去京遥遠難行召命可遥均三老五更之慶伏望聖慈稽考舊章特加恩禮自餘致仕官亦乞朝廷别賜推恩寔當尊親之朝兼行飬老之典足以表大禮之盛彰上聖之仁興天下之孝悌光搢紳之耆舊史官書之爲陛下之至德曄曄于千古干冒天威臣不任大願戰汗云云青州謝上表臣某言奉勑就差臣知青州充青淄等州軍安撫使巳到任交割勾當者海岱之區地望攸重岳牧之任邦選甚隆拜命以還戴榮而懼臣某中謝竊念臣賦才寡薄抱節孤危㑹遇不倫進擢無狀發言多忤非輕去明主之恩觸事爲憂所重在太平之業㳙塵未𥙷覆載何酬尚玷鴻私屢加優寄漸兹衰朽期以退藏伏䝉皇帝陛下天量庇全聖衷收采改此劇藩之守謹諸連帥之權臣敢不逾勵夙宵䖍分旰􅉴體九重之深造安千里之含生上副聖求少圖忠効臣云云范文正公集卷十七
