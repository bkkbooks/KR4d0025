front:
  text: 建立義莊規矩范忠宣公奏知開封府襄邑縣范純仁切念臣父仲淹先任資政殿學士日於蘇州吳長兩縣置田十餘頃其所得租米逺祖而下諸房宗族計其口數供給衣食及婚嫁喪葬之用謂之義莊見於諸房選擇子弟一名管勾亦逐旋立㝎規矩令諸房遵守今諸房子弟有不遵規矩之人州縣既無勑條本家難為伸理五七年間漸至廢壞遂使飢寒無依伏望朝廷特降指揮下蘇州應係諸房子弟有違犯規矩之人許令官司受理伏候勑旨右奉聖旨宜令蘇州依所奏施行
  hash: sha256:94dc301aefff829cd69cc063714d0a7c7c8909380ab66a9976ee2606797c297c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_044-1a}
body:
  text: 劄付蘇州準此治平元年四月十一日押文正位勘會先文正公於平江府興置義莊賙給宗族德澤至厚其始㝎規矩雖有版榜不足久傳及有治平元年所得朝旨亦未揭示族人兼有後來接續指置可為永式者未曽刋定深慮歲久漸至隳廢今盡以編類刻石置于天平山白雲寺先公祠堂之側子子孫孫遵承勿替今具如後文正公𥘉定規矩一逐房計口給米每口一升並支白米如支糙米即臨時加折支糙米每斗折白八升逐月實支每口白米三斗一男女五歲以上入數一女使有兒女在家及十五年年五十歲以上聽給米一冬衣每口一匹十歲以下五歲以上各半匹一每房許給奴婢米一口即不支衣一有吉凶增減口數畫時上簿一逐房各置請米曆子一道每月末於掌管人處批請不得預先隔跨月分支請掌管人亦置簿拘轄簿頭録諸房口數為額掌管人自行破用或探支與人許諸房覺察勒陪填一嫁女支錢三十貫七十七陌下並準此再嫁二十貫一娶婦支錢二十貫再娶不支一子弟出官人每還家待闕守選丁憂或任川廣福建官留家鄉里者並依諸房例給米絹并吉凶錢數雖近官實有故留家者亦依此例支給一逐房喪葬尊長有喪先支一十貫至葬事又支一十五貫次長五貫葬事支十貫卑幼十九歲以下喪葬通支七貫十五歲以下支三貫十歲以下支二貫七歲以下及婢僕皆不支一鄉旦外姻親戚如貧窘中非次急難或遇年飢不能度日諸房同共相度詣實即於義田米內量行濟助一所管逐年米斛自皇祐二年十月支給逐月餱糧并冬衣絹約自皇祐三年以後每一年豐熟樁留二年之糧若遇凶荒除給餱糧外一切不支或二年糧外有餘却先支喪葬次及嫁娶如更有餘方支冬衣或所餘不多即凶吉等事衆議分數均勻支給或又不給即先凶後吉或凶事同時即先尊口後卑口如尊卑又同即以所亡所葬先後支給如支上件餱糧吉凶事外更有餘羡數目不得糶貨椿充三年以上糧儲或慮陳損即至秋成日方得糶貨回換新米椿管右仰諸房院依此同共遵守皇祐二年十月日資政殿學士尚書禮部侍郎知杭州事范押續㝎規矩一諸位子弟得大比試者每人支錢一十貫文七十七陌下皆準此再貢者減半並須實赴大比試乃給即巳給而無故不試者追納一諸位子弟縱人採取近墳竹木掌管人申官理斷一諸位子弟內選曽得解或預貢有士行者二人充諸位教授月給糙米五石若遇米價每石及一貫以上即每石即支錢一貫文雖不曽得解預貢而文行為衆所知者亦聽選仍諸位共議夲位無子弟入學者不得與議若生徒不及六人止給三石及八人給四石及十人全給諸房量力出錢以助束修者聽右三項以熙寧六年六月日二相公指揮修定一掌管人侵欺及諸位輒假貸義莊錢斛之類並申官理斷償納不得以月給米折除一族人不得租佃義田詐立名字同一掌管子弟若年終當年諸位月給米不闕支糙米二十石雖闕而能支及半年以上無侵隱者給一半巳上並令諸位保明後支若不可保明各具不可保明實狀申文正位一義莊勾當人催租米不足隨所欠分數尅除請受謂如欠米及一分即只支九分請受之類至納米足日全給巳尅數更不支有情弊者申官決斷右四項以元豐六年七月十九日二相公指揮修定一身不在平江府者其米絹錢並勿給一兄弟同居雖衆其奴婢月米通不得纍過五人謂如七人或八人同居止共支奴婢米五人之類一未娶不給奴婢米雖未娶而有女使生子在家及十五年年五十歲以上者自依規給米一義莊不得典買族人田土右四項以紹聖二年二月初八日二相公指揮修定一義莊費用雖闕不得取有利債負一義莊事惟聽掌管人依規處置其族人雖是尊長不得侵擾干預違者許掌管人申官理斷即掌管人有欺弊者聽諸位具實狀同申文正位右三項以紹聖二年四月二十九日二相公指揮修定一義倉內族人不得占居會聚非出納勿開一因出外住支月米者其歸在初五日以前取諸位保明詣實聽給當月米一義宅有踈漏惟聽居者自修完即拆移舍屋者禁之違者掌管人申官理斷若義宅地內自添修者聽之夲位實貧乏無力修完而屋舍踈漏實不可居者聽諸位同相視保明詣實申文正位量支錢完輔即不得乞添展舍屋一諸位請米曆子各令諸位簽字圓備方許給給訖請人親書交領即去失曆子者住給勒令根尋侯及一年許諸位及掌管人保明申文正位候得報别給曆頭起支一積留月米併請者勿給一諸位不得於規矩外妄乞特支雖得文正位指揮與支亦仰諸位及掌管人執守勿給一義莊人力船車器用之類諸位不得借用一諸位子弟官巳升朝願不請米絹錢助贍衆者聽一諸位生男女限兩月其母或所生母姓氏及男女行第小名報義莊義莊限當日再取諸位保明訖注籍即過限不報後雖年長不理為口數給米一遇有規矩所載不盡事理掌管人與諸位共議定保明同申文正位本位有妨嫌者不同申雖巳申而未得文正位報不得止憑諸位文字施行右十項以元符元年六月日二相公三右丞五侍郎指揮參定一諸位關報義莊事雖尊長並於文書內著名仍不得竹𥿄及色箋違者義莊勿受右一項以元符二年正月十七日三右丞指揮修定一義莊遇有人贖田其價錢不得支費限當月內以元錢典買田土輒將他用勒掌管人償納右一項以崇寧五年十月十二日五侍郎指揮修定一諸位輒取外姓以為巳子冒請月米者勿給許諸位覺察報義莊義莊不為受理許諸位徑申文正位公議移文平江府理斷其大觀元年七月以前巳收飬給米者不得追訟右以大觀元年七月𥘉十日五侍郎及二相公指揮參定一諸位子弟在外不撿生子冒請月米掌管人及諸位覺察勿給即不伏掌管人及諸位申文正位移文平江府理斷右以政和三年正月二十一日五侍郎指揮修定一族人不得以義宅舍屋私相兊賃質當右一項以政和五年正月二十九日五侍郎指揮修定右仰義莊及諸位遵守施行內文意前後相妨窒礙者從後規若有違犯仰掌管人或諸位備録治平元年中書劄子所坐聖旨申官理斷各令知委政和七年正月十三日朝散大夫充徽猷閣待制提舉亳州太清宮范續定規矩清憲公奏朝散郎左司諌兼侍講范之柔奏臣不避誅夷輒瀝誠悃仰干天聽伏念臣五世祖故參知政事諡文正臣仲淹奮身孤藐遭世休明深念保族之難欲為傳逺之計自慶曆皇祐以來節次於蘇州吳長兩縣置田畒立義莊贍同姓創定規矩刻之板榜以貽後人巳而臣高叔祖故尚書右㒒射諡忠宣臣純仁於治平元年知開封府裏邑縣日慮板榜不足久傳且諸房子弟有不遵規矩之人州縣既無勑條本家難為伸理必將漸致廢壞即嘗具奏乞降聖旨下本州許令官司受理繼蒙朝廷依所奏施行遂得慿藉保守伏自南渡之後雖田畒僅存而莊宅焚毀寄廪墳寺遷寓民舍蠧弊百出盡失初意慶元初臣與兄弟始協謀同力盡復故基漸還舊觀參定約束加備於前固嘗經本州鏤給板榜揭示義宅然非更得朝廷行下本州申明受理元降指揮恐無以善後懷此日久無路自伸今臣幸蒙公朝軫念故家擢綴班列若不於此時控告君父則何以副先人屬望子孫之意用敢冒昧以聞伏望聖慈俯鑒微衷特頒睿旨劄下平江府令將續添規約常切照應治平元年巳降指揮受理庶幾足以敕厲來者增固舊規臣與闔族實均戴天地施生之造所有治平元年指揮并慶元二年續添條約謹􅌳連在前瀆犯宸嚴臣無任惶懼俯伏俟命之至謹録奏聞伏候勑旨前連治平元年巳降規約指揮十一月五日奉聖旨依右併録連送范司諫嘉定三年十一月七日一文正公曾祖徐國公祖唐國公父周國公墳塋並在天平山坐落間有族人輒敢於上牧羊及偷斫林木柴薪近雖行下義莊專一責令墓客看守外今後如有違犯之人諸房覺察申文正位罰全房月米一年全房謂照本房請米曆內口數並行住罰下皆準此義莊輒令墓客充他役者罰掌莊子弟夲名月米一季一天平功德寺乃文正公奏請追福祖先之地為子孫者所當相與扶持不廢香火今則不然多有踈逺不肖子弟請過義米歸巳却返蠶食於寺中至有欺詐住持逼逐僧行獵借舟船役使人㒒亞托私酒偷伐林木柴薪強占常住田地布種或作園圃不還租米以致常住空虗住持數易日漸敗壞今後探聞有違犯之人罰全房月俸兩月欺詐住持及占種田地者罰全房月米一年詐過錢物經官乞行根究從條施行田地退還常住為業畢日申文正位候回報起支雖巳退業而故作阻障不容常住耕種者亦行前罰一義莊及白雲功德寺差役并應干非泛科敷並蒙官司蠲免近夾縣道胥吏多因乞覔不從故意搔擾今後如有似此之人許從本家經府陳理嚴行斷理一舊規諸房不得租種義莊田土詭名者同近來有恃強公然於租戶名下奪種者及有壩捺義莊田渭涇濱車漕種菱不容租戶車水上下者為害甚大今後探聞有違犯之人罰全房月米半年一義莊租戶所當優恤使之安業聞有無賴族人將物貨高價亞賣顯屬不便今後輒有違犯罰全房月米兩月仍經官陳理一舊規義莊事務惟聽掌莊子弟自行處置雖是尊長不得侵擾干預緣違犯者未曽有罰是以近來多有族人專為貨賂不顧義莊利害或為攬戶兜納苗米必要多增貼耗或主張不逞之徒充應腳力及墓客之類甚至鼓誘外郡族人挾長前來擅開倉厫妄用米斛恣行侵擾意在破壞今後如有違犯許掌莊指實申文正位自行體訪知覺罰全房月米一年外仍經官乞行根究徴治內有乞覔過錢物之人即合從條施行一舊規掌莊子弟侵欺徑行申官理斷勒令陪填近自移建倉宇遴選主計此弊稍革深慮日久玩習合行關諸房今後掌莊子弟如有違犯許諸房覺察申文正位委請公當子弟對衆點算取見實侵數目以全房月米填還足日起支仍控告官府乞行徴治以為掌莊侵欺者之戒諸房子弟即不得專擅興詞紊煩官府一諸房聞有不肖子弟因犯私罪聽贖者罰本名月米一年再犯者除籍永不支米姦盜賭賵鬪毆陪涉及欺騙善良之類若戶門不測者非除籍之後長惡不悛為宗族鄉黨善良之害者諸房具申文正位當斟酌情理控告官府乞與移鄉以為子弟玷辱門戶者之戒一舊規諸位輒取異姓以為巳子冒請月米者勿給今乃有將巳子與人破蕩他人家業却欲歸宗請米如有似此之人仰掌莊申文正位不得支行一義宅地基久為外人占據今來復業甚為艱難宜體文正公之意專為聚族之地即不許族人占造私宅等用如有違罰全房月米一年仍勒還元地一舊規諸房子弟得貢大比者義莊支裹足錢十千今物價翔貴難拘此數如有子弟得解赴省義莊支官會一伯千其錢於諸房月米內依時直均尅其免舉人及補入太學者支官會五十千庶使諸房子弟知讀書之美有以激勸一歲寒堂除科舉年分諸位子弟暫請隸業餘時不得於內飲宴安泊如違罰全房月米一月義莊規矩終
