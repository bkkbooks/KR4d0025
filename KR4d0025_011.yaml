  text: 范文正公集卷第十一
  hash: sha256:d413fb60c82c25d0e2105999b240726a609b1c2c24078c5f2fa11cf8df841f6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_011-1a}
body:
  text: 唐狄梁公碑天地閉孰將闢焉日月蝕孰將廓焉大厦仆孰將起焉神器墜孰將舉焉巖巖乎克當其任者惟梁公之偉歟公諱仁傑字懷英太原人也祖宗高烈本傳在矣公為子極于孝為臣極于忠忠孝之外揭如日月者敢歌于廟中公嘗赴并州掾過太行山反瞻河陽見白雲孤飛曰吾親在其下久而不能去左右為之感動詩有陟岾陟屺傷君子于役弗忘其親之深于嗟乎孝之至也忠之所繇生乎公嘗以同府掾當使絶域其母老疾公謂之曰奈何重太夫人萬里之憂詣長史府請代行時長史司馬方眥睚不協感公之義歡如平生于嗟乎與人交而先其憂况君臣之際乎公為大理寺丞決諸道滯獄萬七千人天下服其平武衛將軍權善才坐伐昭陵柏高宗命戮之公抗奏不却上怒曰彼致我不孝左石築公令出公前曰陛下以一樹而殺一將軍張釋之所謂假有盜長陵一坯土則將何法以加之臣豈敢奉詔陷陛下於不道帝意解善才得恕死于嗟乎執法之官患在少恩公獨愛君以仁何所存之遠乎高宗幸汾陽宫道出妬女祠下彼俗謂盛服過者必有風雷之災并州發數萬人别開御道公為知頓使曰天子之行風伯清塵雨師灑道彼何害哉遽命罷其役又公為江南巡檢使奏毀淫祠千七百所所存惟夏禹太伯季子伍貟四廟曰安使無功血食以亂明哲之祠乎于嗟乎神猶正之而况於人乎公為寧州刺史能撫戎夏郡人紀之碑及遷豫州會越王亂後緣坐七百人籍沒者五千口有使促行刑公緩之密表以聞曰臣言似理逆人不言則辜陛下好生之意表成復毁意不能定彼咸非本心唯陛下矜焉勑貸之流于九原郡道出寧州舊治父老迎而勞之曰我狄史君活汝輩耶相攜哭于碑下齋三日而去于嗟乎古謂民之父母如公則過焉斯人也死而生之豈父母之能乎時宰相張光輔率師平越王之亂將士貪暴公拒之不應光輔怒曰州將忽元帥耶對曰公以三十萬衆除一亂臣彼脅從輩聞王師來乘城而降者萬計公縱暴兵殺降以為功使無辜之人肝腦塗地如得尚方斬馬劒加於君頸雖死無恨光輔不能屈奏公不遜左遷復州刺史于嗟乎孟軻有言威武不能挫是為大丈夫其公之謂乎為地官侍郎同鳯閣鸞臺平章事為來俊臣誣御名下獄公曰大周革命萬物惟新唐朝舊臣甘從誅戮因家人告變得免死貶彭澤令獄吏嘗抑公誣引楊執柔公曰天乎吾何能為以首觸柱流血𬒳靣彼懼而謝焉于嗟乎陷穽之中不義不為况廟堂之上乎契丹陷冀州起公為魏州刺史以禦焉時河朔震動咸驅民保郛郭公至下令曰百姓復爾業寇來吾自當之狄聞風而退魏人為之立碑未幾入相請罷戍疏勒等四鎮以肥中國又請罷安東以息江南之饋輸識者韙之北狄再寇趙定間出公為河北道元帥狄退就命公為安撫大使前為突厥所脅從者咸逃散山谷公請曲赦河北諸州以安反側朝廷從之于嗟乎四方之事知無不為豈虛尚清談而巳乎公在相日中宗幽房陵則天欲立武三思為儲嗣一日問群臣可否衆皆稱賀公退而不答則天曰無乃有異議乎對曰有之一昨陛下命三思募武士歲時之間數百人及命廬陵王代之數日之間應者十倍臣知人心未厭唐德則天怒令䇿出又一日則天謂公曰我夢雙陸不勝者何對曰雙陸不勝官中無子也復命䇿出又一日則天有疾公入問閣中則天曰我夢鸚鵡雙翅折者何對曰武者陛下之姓相王廬陵王則陛下之羽翼也是可折乎時三思在側怒發赤色則天以公屢言不奪一旦感悟遣中使密召廬陵王矯衣而入人無知者乃召公坐于簾外而問曰我欲立三思群臣無不可者惟俟公一言從之則與卿長保冨貴不從則無復得與卿相見矣公從容對曰太子天下之本本一搖而天下動陛下以一心之欲輕天下之動哉太宗百戰取天下授之子孫三思何與焉昔高宗寢疾令陛下權親軍國陛下奄有神器數十年又將以三思為後如天下何且姑與母孰親子與姪孰近立廬陵王則陛下萬歲後享唐之血食立三思則宗廟無祔姑之禮臣不敢愛死以奉制陛下其圗焉則天感泣命褰簾使廬陵王拜公曰今日國老與汝天子公哭于地則天命左右起之拊公背曰豈朕之臣社稷之臣耶巳而奏曰還宫無儀孰為太子復置廬陵王於龍門備禮以迎中外大恱于嗟乎定天下之業斷天下之疑其至誠如神雷霆之威不得而變乎則天嘗命公擇人公曰欲何為曰可將相者公曰如求文章則今宰相李嶠蘇味道足矣豈文士齷齪思得竒才以成天下之務乎荆州長史張柬之真宰相才誠老矣一朝用之尚能竭其心乃召拜洛州司馬他日又問人於公對曰臣前言張柬之雖遷洛州猶未用焉改秋官侍郎及召為相果能誅張易之輩返正中宗復則天為皇太后于嗟乎薄文華重才實其知人之深乎公之勳德不可殫言有論議數十萬言李雍載之别傳論者謂松柏不夭金石不柔受於天焉公為大理丞抗天子而不屈在豫州日拒元帥而不下及居相位而能復廢主以正天下之本豈非剛正之氣出乎誠性見于事業當時優遊薦紳之中顛而不扶危而不持者亦何以哉某貶守鄱陽移丹徒郡道過彭澤謁公之祠而述焉又系之云商有三仁弗救其滅漢有四皓正於未奪嗚呼武暴如火李寒如灰何心不隨何力可回我公哀傷拯天之亡逆長風而孤騫訴大川以獨航金可革公不可革孰為乎剛地可動公不可動孰為乎方一朝感通群隂披攘天子既臣而皇天下既周而唐七世發靈萬年垂光噫非天下之至誠其孰能當宋故乾州刺史張公神道碑舜天下知其德也惟歷試諸難禹天下知其功也惟盡力溝洫聖人率天下以勤故能成其務逮夫王道缺漓坐飾話言六代之風亡實而落君子弗觀也我朝用舜禹之道平成萬邦風化天下於諸使莫敢不勞而有清河張公之最焉天貽厥心則明則粹拳拳四方老於王􅐭為舜禹之臣至矣公諱綸字昌言其先因職命氏源流蓋遠孝友之基自仲而大五世食韓並為正卿厥生帝師首造大漢唐失公謹文皇以慟暨安史亂華衣冠喪緒降及五代不可以祿幽芳密照需于遠郊今為汝隂人也皇考諱震王考諱元皆含仁竦義映于一鄉考諱煦纍贈尚書都官郎中太夫人翟氏纍對高平縣太君都官端修有大識謂時否之傾家可起也與夫人諄諄蚤暮篤子以文公刻景煆志鏗然有就既而慷慨與人語方略郡國異之以造秀再送于春官所尚弗合退居于易時太祖既定大業太宗乃輯群瑞經營天下使旌交路復署士三班以走命于四方公曰抱關蹶張昔賢或為之部以名聞首充其選自兹周旋至于光大其進秩也四命至東頭供奉官閣門祗候歷崇班承制于內殿改禮賔六宅副使遷文思使昭州刺史荐拜西上東上閣門使除乾州刺史其更任也淳化中主榷酤于大名之屬邑及王鈞亂蜀方行天討公使于軍中賊平監慶州兵馬西戎方豪我摧其鋒遷益簡路都巡檢使真宗皇帝思清天下之刑命按荆湖諸州獄還乃刺舉畿赤制權右振綱目也俄以邊略典辰溪郡又平涼鎮戎二城西陲之機鍵公歷專之南夷再亂持節安撫辰鼎澧三州溪洞事定朝廷以東南諸路鹽鐵饋運之重命使孔艱及公而諧六年有大績遷領天水郡實提重兵以壓庶羌蓋西諸侯之長焉及朝廷有均勞之議徙橫海軍又徙瀛州髙陽關兵馬鈐轄重北門也歲餘請老不獲命復蒞清池郡巳而露章至于再三今上念功不廢詔以本郡寵之爵命如故時景祐紀號之二載也明年孟春庚寅啓手足于正寢享年七十有五上聞而悼之舉延世之典命二子進級即以仲月庚申葬于汝隂縣之懷音鄉從先域也公初娶冨春孫氏再娶彭城劉氏生子曰孝竭與夫人皆亡今夫人江夏黃氏出大夫之宗能循法度封本邑君生子曰孝標孝孫皆早世曰紹宗今為侍禁曰紹先為殿直並幼公位登二千石權嘗亞大揔管階至先祿爵為郡公考終于鄉邦國人榮之君子謂不充其器初蜀師之役中軍雲侯有終辟公以行如左右手平定坤維公有力焉時降寇八百人叛據巖險中軍督公追斬戒無遺類公往視之日此窮寇也急之生患乃諭其向背寇莫不誠聽束手歸公以見中軍而全活焉詩云正直是與神之聽之而况於人乎公再至益簡屬寇戎之後民求息肩新軍復驕且敢肆暴公曰兵猶火也將不可嚮邇磔數輩麾下其衆乃戢蜀人賴之詩云民亦勞止汔可小休式遏寇虐無俾民憂公之典辰溪也彼夷人中彭姓一族稱其疆黠溪洞數州署兄弟以為守國家因其請焉後乃驕叛邊鄙既襲城邑朝廷患之公至築蓬山館理新興柵以要其夷道且省戍兵條舉十事不及四五而有平涼之行夷又侵我帝復召公曰僉謂彼可殱焉朕惟弗忍汝往圖之公再拜稽首曰惡草雖微天地不能絶其類先王驅之無猾夏爾帝曰俞惟康厥民居公馳傳以臨謂彼夷者不威不懲不見利不勸乃以諜夫駭其族曰天家使且至方檄兵四道焚若山林毁若巢穴弗滅弗巳夷乃大懼請命公曰納爾爵秩歸我老孺天子聖且仁吾為君請夷如其教乃疾置以聞詔原之後其命數貢賜如平日生齒之還者對以刀布作石柱刻夷人之誓揭于疆首自兹威懷迄今將二十年蔑復為患詩云式固爾猷淮夷卒獲翩彼飛鶚集于泮林食我桑黮懷我好音謂夷如惡禽亦感而化然公之使東南也鹺利方剝議者咸峻文重禁以籠其民公曰天與之我取之又可戕乎奏通泰楚三州亭民除其宿逋佑以熬波之具貨入于縣官而增與之直民力遂振復創杭秀海三郡鹽亭自是鹽算大充于諸路信乎百姓足君孰與不足時江東大水民胥艱食公請治五渠以泄于海議者謂澤國下流江海與平彼潮者通夜不息沙從而塞欲導焉而何極公曰不然江海善下故能為百谷王彼日之潮有損與盈三分其時損居二焉衆川乘其損而趨之曾莫禦哉彼沙者歲月而積闢以農隙豈安于災而吝乎力僉從我謀而蘇秀蒙其利又淮南漕河界湖之東偏歲時決溢汨我農畝涸我糧道公請增長堤二百里旁錮巨石為十闥以疏其橫流舍役伍于堤上不力一民而日廣月高復樹以美木今山陽郡東歷高郵抵廣陵塗無畏日南北人歌焉詩云蔽芾甘棠勿剪勿伐召伯所苃謂思其人愛其樹也又海陵郡有古堰亘百有五十里厥廢曠久秋濤為患公請修復議者難之謂將有蓄潦之憂公曰濤之患歲十而九潦之災歲十而一護九而亡一不亦可乎且請自為郡而圖焉詔以本使兼領之堰成復逋戶二千有六百郡民建生祠以報公于今祠之詩云樂只君子民之父母樂只君子德音不巳謂利及生民則樹無窮之名焉公嘗使于夏臺時納欵惟初見公之儀知朝廷禮樂始盡其心焉復三使于北疆聽公之言知天子神聖永懷其好焉詩云四國于蕃四方于宣謂夷狄為患則往蕃屏之恩澤弗暨則往宣暢之其公之謂乎逮于二膳之年聖倚彌重歷雄武河間橫海三大鎮時天下無事公謹其法制安以清淨如叔子之在襄陽仁信著于疆外公長七尺氣勇過人昔在西北歷戰十二大弓長甲操擐自若諸將伏其疆力公性剛不遠仁故無暴明不深物故無怨孝親之心皓首如孤時言必涕下感動左右復常好施與宗族同其有亡中外孤藐一養于家雖享祿不薄屢膺蕃庶之賞徹樂之日門中索然舊淮汴間運卒凍殍歲常比比及公為使每冬以俸泉市絮𥜗千數衣其不自存者且飼而休之使得卒歲曰此有司之過那使僵仆道途以纍上仁其愛君勤人如此而深也今文武班有考績之制率當自表公曰國家廉讓之風未衰則吾豈敢終身不為言其階于通顯並天子疇其勳異不得而謝焉公祗事三朝幾五十年無一銖之罰又景德而降權寄不絶保任官材僅三百人一無纍者其明哲於人如此而博也公發身如班定遠事邊如馬伏波修水利如邵南陽議食貨如耿大農有一于茲名聳後世公實兼之宜其𬒳金石而不朽矣將終召掾曹沛國朱寀草理命於牀下且謂某嘗從事于使部僅知所存在甲令五品而上立神道碑如不得巳宜為我請孝子致其詞某不敢讓惟公雄謀偉行布于四方非耳目可涯又多隂德於人無能名焉敢言其略以顯我國家君子之休其銘曰天生張侯維潁之濵星萃于上炳為哲人儀兹聖辰維侯之德柔文剛武弗無矜寡弗有疆禦猶仲山甫維侯之言乃宣聖謨于彼西北西北有孚邦家之樞維侯之功克顯克大攘彼戎寇禦彼災害吾民是賴我生既勤我年斯臻乃懷故園乃謀嘉賔鼓缶而嬉以休厥身帝錫我侯歸牧于鄉錦裘煌煌鸞衡鏘鏘故老飲歌吾閭之光我侯為何四方是力誠加于物心竭于國始終一德侯斯往焉帝用惻然遺烈在人史其舍旃垂千萬年宋故衛尉少卿分司西京胡公神道銘公諱令儀字某開封陳留人也曾祖瑜祖紹屬唐季五代之否嘉遁不顯父弼纍贈尚書刑部侍郎妣某氏贈滎陽縣太君初侍郎覯皇家之興乃以儒行教子曰可仕矣公夙夜簡編絶而復續雍熙中以明經中第解褐涇州長原尉丁太夫人憂服除補頴川郡法掾又居侍郎之喪皆哀毀過人鄉閭志之既練朝廷以前公在潁川辨析冤獄嘗活人於死特令陛見拜大理評事知泰州海陵縣時江淮內屬未久吏姦民嚚凌弱暴寡視宰政如兒戲公至則先令後刑必行無回人皆凛然憚之始服事于官上蓋有西門豹之風焉遷光祿丞充刑部詳覆官閲天下案牘駮議無隱一切以正真宗嗣位改大理丞會三門發運判官以不職聞朝廷銓其材以公代之秩滿守巴漢郡賜五品服天子升岱宗慶均內外遷太子贊善大夫歸朝進殿中丞領高密郡徙治定襄遷國子博士拜虞部貟外郎典歷城郡郡數萬戶多用豪力二千石鮮不受侮公正色直心視之無難會河決白馬為朝廷憂詔發數十州兵民塞之科賦暴急後期者官更有不測之咎諸道皆奔走民負𫾣撲公於部中擇其挾貴人勢力州縣不敢動者一二家薄責于庭衆皆大懼曰是家不可緩况吾屬耶咸輦其薪晝夜以西比諸州率先以濟由是民不𬒳楚吏不坐責其幹力如此徙隴城郡歷比駕二部外郎在郡未幾破姦發伏有神明之號朝廷諒其公命提點河北諸州刑獄事諸州望風以畏莫有冤者拜主客郎中充淮南轉運使賜服三品改陜西轉運使且許入覲進金部郎中西陲宿兵食貨為大公視民豐儉斂收以時邊廪始充焉除河北轉運使未踰月朝廷以河東方窘財用改河東轉運使公請借民飛挽以實邊郡人或媒孽以為非便朝廷惑其説徙守回中郡既而代公者復行前議公得辨改知鳯翔府且有錫勞部中每歲造舟六百艘供大河饋運必借民操篙沿渭而下以逹于河凡有覆溺破産而償吏私諸豪專擾下戶公重為立法使得均一于今民道之明道初旱蝗西飛關中被其害獨不入岐下人咸異之寮屬請以上聞公曰昔劉琨為郡而虎渡河及帝問之琨曰偶然爾此劉公所不敢當於吾何有聞者謂公質厚有古人之心焉遷司勳郎中亟召還臺公歎曰吾年七十有五精力猶疆恩奬未衰豈不自知其止耶遂告老于朝有詔嘉之拜衛尉少卿分司西京公既退即家于長安聚書數千卷教子孫樂林泉每誦白傅歌詩以怡性情凡十二年而終實某年某月也享年八十有七以某年某月歸葬于開封之某鄉某里附先侍郎之塋公少尚嚴毅老益精明斥惡與善始終一節古所謂老成人者歟夫人張氏封內鄉縣君先公而亡有三子長曰遠大理寺丞次曰規耀州王原主簿次曰拱辰成州團練推官女七人長適進士蘇贄次早亡次適閣門祗侯陳惟一次適臨濮主簿劉淑次適太子中舍邢保雍次適大理評事韓仁哲次適將作監主簿趙士安孫男七人並登仕籍初天聖中余掌泰州西溪之鹽局日秋潮之患浸淫于海陵興化二邑間五榖不能生百姓餒而逋者三千餘戶舊有太防廢而不治余乃白制置發運使張侯綸張侯表余知興化縣以復厥防會雨雪大至潮洶洶驚人而兵夫散走旋濘而死者百餘人道路飛語謂死者數千而防不可復朝廷遣中使按視將有中罷之議遽命公為淮南轉運使以究其可否公急馳而至觀厥民相厥地歎曰昔余為海陵宰知茲邑之田特為膏腴春耕秋獲笑歌滿野民多富實往往重門擊柝擬於公府今葭葦蒼茫無復遺民良可哀耶乃抗章請必行前議張侯亦請兼領海陵郡朝廷從之仍與張侯共董其役始成大防亘一百五十里潮不能害而二邑逋民悉復其業余始謀之以母憂去職二公實成之今二十餘載防果不壞非公之同心豈及於民哉其子以余知公所存懇請為銘而不讓辭曰胡公之生皇朝之始覯文斯興執經以起自邇而遐幹于王家法以持姦政以塞邪七守列藩四當外計曰勤曰恭克威克惠告老于君以休吾身鼓缶而歌十有二春子子孫孫詵詵濟濟九十其幾手足云啓福歟壽歟有終有𥘉豐碑巖巖我得而書宋故太子賔客分司西京謝公神道碑銘皇家起五代之季破大昏削群雄廓視四表周被萬國乃建禮立法與天下畫一而億兆之心帖然承之弗暴弗悖無復鬪兵于中原者登九十載蓋祖宗遠算善樹於前纍聖求賢多得循良廉讓之士布于中外而致兹善俗歟如陳留謝公可謂循良廉讓之君子矣公諱濤字濟之幼而竒敏十四歲講左氏春秋先生咸器之及冠居姑蘇郡時翰林王公禹稱拾遺羅君處約並宰蘇之屬邑二人相謂曰與濟之揚榷天人蓋吾曹敵也自兹名重於時淳化三年春擢進士第除梓州榷鹽院判官會盜據成都發其徒攻郡縣公白二千石曰梓大而近彼畏我梗必先圖得我則小於梓者可傳呼而下願急為之防近郊多林木可先伐之以置樓櫓且備樵㸑為久守之具二千石從之寇果圍我我備既堅十旬弗破賊沮而留勢未大克以及王師之來遂用撲滅事平就遷梓州觀察推官賜器幣外臺遣權知益之華陽縣時寇亂之餘民多散亡未復厥居上言者請募人占田可倍其租朝廷從之於是有力者得并其田公曰奪民世産以資富人復將召其怨辭豈朝廷之意耶乃盡取其田以歸于民還拜著作佐郎太宗靣詔通判大藩得壽春郡後移高安郡改知興國軍就除太常博士真宗即位鋭意任人一日中出朝士姓名有治狀者凡二十四人付中書門下令驛召至闕公在召中得對于長春殿上説賜五品服即呼通事舍人送試學士院明日邊有急奏上議北征又京東有疆寇驚郡縣而曹南闕守朝廷慮之遂命公往改屯田貟外郎至郡稱治寇不敢犯有凶人趙諌者冒鄉薦名與諸弟出入都下交權勢結豪俠務乘人之弊用以告訐或任威詐而大致富疆人畏如豺虎公即圖之患僚佐不一其力俄會故御史中丞李公及始來倅曹李公時之端人也與公協心發其家盡得凶狀奏之朝廷命御史府案覆諫之兄弟皆斬于都市乃下詔曰凡民非干巳事無得告言遂著于令自是天下訟息而刑清矣朝廷以西蜀僅寧細民猶或搖之俾公安撫兩川用天子恩意諭其父老皆從而按堵復命之日舉兩川能吏三十餘人執政疑其多公請連坐事遂行後皆至臺省又别詔委公與益牧張公詠議造大鐡錢乃窮其利害使盜鑄息而物估平蜀人于今便之歷三司度支判官出守海陵新安二郡就遷度支司封貟外郎公在三司日嘗舉榷茶官至是坐所舉不職免尋以度支貟外郎起倅河南府馮魏公薦公文行真宗簡在既久即命召試除兵部貟外郎直史館判三司理欠慿由司出為兩浙轉運使公大雅之器耻尚文法雖任在按察而誠意坦然且曰吾欲吏樂其職民安其俗爾士人黑白豈不明乎安用伺於毫髮使惴惴如虺蜴然取詩人之譏耶還臺進禮部郎中判司農寺拜以本官兼侍御史知雜事清靜端介百辟望其風采乾興初進戶部郎中先帝大行有司治靈駕象物其制高大請自京至陵凡郭門民舍有妨其往者毁之公上言曰先帝封泰山祀汾睢儀衛至盛不聞有所毁去今遺詔丁寧正如漢文帝專務儉薄豈以攸司奪先帝意願陛下裁損搢紳韙之俄求東歸除吏部郎中直昭文館知會稽郡還拜太常少卿判登聞檢院又得請權西京留守司御史臺就拜祕書監遂分務洛下朝廷嘉其恬退遷太子賔客嗣子迎侍于京師以景祐元年十月三十日薨享年七十有五以明年八月二十一日歸葬于富陽寶元元年贈禮部尚書謝氏之先出黃帝後始為十姓謝居一焉三代以還不顯其大至晉宋乃為盛族公之七世祖汾居河南之緱氏五世祖希圖卒于衢州刺史時唐季喪亂乃葬于江東嘉興郡子孫三世祿于吳越曾祖諱廷徽處州麗水縣主簿祖諱懿文杭州鹽官縣令葬于富陽遂為富陽人父諱崇禮從錢氏歸朝為泰寧軍節度掌書記檢校左散騎常侍纍贈尚書戶部侍郎毋崔氏贈博陵縣太君公之弟四人曰炎有文於時與盧積齊名時人謂之盧謝國史有傳終于公安令鎬為某官果從方外學號安隱師坦為某官公娶夫人許氏先公而終生男三人長曰絳至兵部貟外郎知制誥後公幾年而亡次曰約將作監主簿以敏才稱次曰綺太廟齋郎俱早世女四人長適前進士周盤次適殿中丞梅堯臣次適太常博士傅瑩次適大理寺丞楊士彥孫四人景𥘉大理評事宰越之餘姚縣景溫太常寺太祝宰越之會稽縣景平將作監主簿景回尚幼公姿格竦異不事修飾天然有雅遠之範未嘗阿於貴勢見賤士必溫禮接之知人之善稱道弗舍聞人之過懼弗克掩故終身不聞怨言公始以文學中進士上第而長子長孫世踐其科又父子更直館殿出處僅二十年皆衣冠之盛事厥孫以公善狀請文于碑某於公有家世之舊又與舍人為同年交愛公治有循良之狀退得廉讓之體足以佑風化而厚禮俗致拳拳以銘云巍巍我宋宅天而君恢遠以威革暴以文濟濟吾儒多良大夫中外共治休寧八區猗哉謝公周旋其中在梓禦寇至曹除凶天子念蜀猖狂始復命公撫之鼓歌其俗偃仰藩屏雅和其政徊翔臺閣清修其行人尚刻明我質而平厥民以寧人必夸競我休而靜其道乃勝于嗟乎壽以仁至名繇德全有子與孫相繼而賢誠乎誠乎聖人積善之誨不吾欺焉宋故同州觀察使李公神道碑銘聖王之教萬民也資天地之生以為食籍山海之出以為貨食均于上下貨通于遠邇則可以供郊廟廪卿士聚兵以征伐振民於災害然非得絶代能臣持變通之數於天下則孰與成當世之務哉故夷吾作輕重之權以霸齊桑羊行均輸之法以助漢近則隋有高潁唐有劉晏皇朝有左丞陳公恕是皆善天下之計者也爾後朝廷雖重此任而常難其才天禧三年七月甲戌制曰樞密直學士刑部侍郎士衡可三司使告謝之日天子靣褒其能屬以大計賜內帑錢二百萬緡以助經費復親製寬財利論以賜之公當職五年間天子有事于南郊又御端門既今上即位並大賚天下至于真宗山陵再塞夫河之決其供億不可勝紀公皆優遊以辦霈然有餘力蓋周知天下之利使流而不竭中外服其通焉公字天均隴西成紀人也曾祖渙贈尚書屯田郎中祖徹贈左諫議大夫父益贈吏部尚書尚書娶惠氏贈扶風郡太君生子五人公居其仲幼負氣節從鄉先生學即有聲于西州太平興國八年春天子親策天下士第釋褐為京兆鄠縣主簿府知其才俾權領獄掾咸陽縣有民殺人具辭以送府父子五人皆伏加功之坐公告于尹曰嘗試辨之蓋殺人者一餘四人掩其骸爾安可盡辟乎尹覆之卒從公議即謂公曰是四人者非子之明則冤于地下矣子有隂施後當貴乎移知眉州彭山縣就除大理評事以父憂去職服除由寇萊公薦領京兆渭橋輦運改司農丞除著作佐郎通判邠州真宗即位遷祕書丞知劒州咸平三年春益州兵亂推王均為首既破漢州急來趨劒欲絶王師之路公告于衆曰賊來方鋭孰可與鬪吾城無守具而有芻糧之積使賊能得之非徒肉吾一州必據險以阻大兵則兩川諸城無援以守盡下於賊矣不如焚其儲蓄擁州民輦庫帛退守劒門與劒門之兵合以拒戰賊可圖焉衆從之既而賊至得吾空壘無資與糧險不可據遂大沮其謀公知其窮手署榜以示寇曰爾等得無父母妻子之愛蓋脅從而來何不歸我復為王人得降卒千有九百乃與劒門鈐轄裴臻併兵擊賊斬首數千級敗走保成都公即馳驛入奏自引棄城守關之咎且言平賊利害帝深加奬歎擢拜度支貟外郎賜五品服俄而大兵得出劒門兩川諸城聞王師來無復搖動均賊遂平如公始謀焉會帥臣言公不當棄城朝廷方任帥不得已謫監虔州關征尋召還判三司鹽鐵勾院時度支使梁鼎上言陜西舊制許人入粟塞下率高其估以池鹽償之人得賈于邊市今請借民力轉粟以備塞復轉鹽于邊官自鬻之歲得緡錢三十萬以給西兵朝廷可其奏命鼎為陜西制置使公上言非便復與執政諍於帝前曰邊路阻險舟車不能通每歲轉粟與鹽民力可支乎徒能奪農時沮商利異日農商失業財力俱屈後復變法人將安信又官自鬻鹽則價重價重則邊人市虜中青鹽食之虜為利矣臣請通鹽商如前使人入粟塞下則農不奪時商不易業外不為虜利苟能寬民力沮虜計雖緡錢不足陛下以諸路之羡助之有何不可帝然之公謝以忠憤而言不覺切直帝曰為臣當如此宜無改焉鼎至陜西果無效而罷卒如公言領荆湖北路轉運使歲餘徙陜西進司封貟外郎賜金紫即保任能吏數十分掌榷酤獲遺利蓋億計乃奏朝廷助邊錢帛歲三十萬天子朝陵幸西洛進兵糧五十萬石京西路乏粟又進三十萬石助之入拜祠部郎中度支副使朝廷以兩河屯兵之計擇使為難輟公以司封郎中領河北轉運使建言民乏泉貨每春取絹直於豪力其息必倍本道歲給諸軍帛七十萬匹不足則市於民請使民預受其直則公私交濟制從之今行于諸道天子東封詔公駐澶州同幹供億事慶成擢拜右諫議大夫領使如故及祀汾隂又以公提舉京西陜西轉運使司事車駕既行以長安為關輔之要命公鎮安之祀事畢召還進給事中朝廷謂坤維之奧冝得巨人拜樞密直學士知益州期月詔還有圖任意會河朔闕須帝曰河朔未可無卿除都轉運使恩數廪祿加常制一等公再至兩河夙夜其職積榖郡邑率如京坻議者謂所積太廣必將腐敗朝廷遣使視之公奏曰豈不為九年之意耶帝悟遽命罷其使明年大蝗民多阻飢公悉發倉廪以振之仍輦濟京西路君子謂公知政矣大河決于無棣將圯其城時以數州丁力晝夜營護役死者相枕藉而水不降公奏曰是不可以州矣請亟遷以避患朝廷從之後數月大水出舊城丈餘民不為魚公之力也就遷工部侍郎相州繫囚十四人盜瓜傷其主吏以極法論公曰餓夫何至此皆貸死以聞朝廷閲其奏即日下密詔民有歲凶為盜長吏得屈法以全之公兩使河朔凡數年天子封泰山祀汾隂幸毫社進緡錢繒纊糧芻巨萬數又請罷內帑錢帛歲百萬屢詔褒之魏人飢命公知天雄軍又東齊大歉盜寇充斥進刑部侍郎知青州盜有聚山林出為郡邑之患者先是係其妻子棘環于通衢公至遽出之戒曰虐爾何贖爾惟從賊所之俟其自新則復爾閭井賊聞之少懈又下教曰賊輩為魁所制爾能伺而梟之吾將以功論旬浹間盜有梟二魁之首獻者餘皆散亡或來請命公録之如教齊人遂安天子遣中使奬勞之及為三司使陜西舊科吏人采木送京師度三門之險破散者太半又每歲市羊亦遣吏送而羊多斃于道二者吏皆破産以償西人苦茲五十年矣公請募商旅送木于京師如入粟法售以池鹽又請許其吏私市羊以副之免關征算得輔其亡失自是西人鮮復破産視天下之弊如此比者日更月除不可殫書矣遷吏部侍郎以足疾求罷優詔不允而許五日一至便殿奏事拜則以通事舍人掖之今上即位拜尚書左丞復求解職朝廷優寵老成遂得請除同州觀察使知陳州時大水侵城人有言水入城以誑衆者公命立斬之人心始寧乃築大防以完其州改潁州復蒞陳州會曹襄悼公得罪公以親纍授左龍武軍大將軍分司西京未幾進左衛大將軍還長安故居後二年遘疾以天聖十年五月二十六日薨享年七十四以其年八月二十七日葬于京兆萬年縣白鹿鄉之原景祐元年其子詣闕理公有勞於國非意左遷天子憫然降制追復同州觀察使娶太原王氏封平晉縣君早亡又娶馮翊雷氏封延安郡君後公十六年而終男六人丕顯不仕丕績同學究出身並早世丕諒太常博士集賢校理由方略改崇儀使邠寧環慶路兵馬鈐轄後公十一年而亡丕緒尚書水部郎中丕遠殿中丞丕旦國子博士女三人長適益州郫縣主簿宋肩遠次適曹襄悼公利用次適定國軍節度觀察留後曹琮孫男若干人公性慷慨善辨論明於知人凡保任才吏數百貟嘗力薦吕文靖公陳文惠公又嘗薦太傅張鄧公公服官五十二載專尚寬恕政刑之下活人多矣自古能臣言邦國之利鮮不斂怨於下而傷其手者公則疏通利源取而不奪允所謂善天下之計者也銘曰舜歌南風兮阜時之財何以聚人兮易不云哉冨國強兵兮孰謂霸才弗冨弗強兮王基其摧巍巍先帝兮法道法天大烹之盛兮包羅俊賢拔公之才兮屬諸利權公之感遇兮惟力是宣封乎泰山兮祀于汾睢千乘萬騎兮雲駕波馳公常景從兮朝詢夕咨供億何算兮無一不宜入司邦賦兮帝曰汝通屢行大賚兮如泉不窮太上繼明兮遇之愈隆公則請老兮命以觀風久於貨
