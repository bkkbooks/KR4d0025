body:
  text: 堯舜率天下以仁賦堯舜仁化天下從矣穆穆虞舜巍巍帝堯伊二聖之仁化致四海之富饒協和萬邦蓋安人而為理肆覲羣后但復禮以居朝當其如天者堯繼堯者舜守位而時既相接行仁而性亦相近內睦九族善鄰之志咸和外黜四凶有勇之風遐振聰明作聖濬哲如神一則命羲和而欽曆象一則舉稷契而演絲綸孰謂各行其道但見同致於仁謗木設時惻隱之情旁逹薰絃奏處生成之惠皆臻民保淳和政無譎詐實博施而可大亦無為而多暇茅茨何耻方不富以為心璿璣有倫惟罕言而自化故得兆民就日萬國慕羶誠同心而同德又何後而何先水沴久憂曷三月而違也朝綱歷試非一日而用焉然則帝者民之宗焉仁者教之大也帝居大於域內仁為表於天下咨詢四嶽何異樂山之情統御八元允謂長人之者美夫五帝之最百王之宗物無不遂賢無不從于以見昭德於文思于以見播美於溫恭殊途同歸皆得其垂衣而治上行下效終聞乎比屋可封大哉光宅無私文明由巳稽陶唐之道法有虞之理是則萬彚熙熙咸頌聲而作矣君以民為體賦君育黎庶如彼身體聖人居域中之大為天下之君育黎庶而是切喻肌體而可分正四民而似正四支每防怠墮調百姓而如調百脉何患紏紛先哲格言明王佩服愛民則因其根本為體則厚其飬育勝殘去殺見遠害而在斯勸農勉人戒不勤而是速善喻非遠嘉猷可稽謂民之愛也莫先乎四體謂國之保也莫大乎羣黎使必以時豈有嗟於盡瘁治當未亂寧有悔於噬臍莫不𬒳以仁慈躋於富庶教禮讓而表其修飾立刑政而防其逸豫蒸人有罪諒責巳之情深慶澤無私訝潤身之德著豈不以君也者舒慘自我體也者屈伸在豫心和則其體儼若君惠則其民晏如永賀休戈攸若息肩之際乍聞擊壤樂如鼓腹之初彼以芻狗可方草芥為比一則強名於老氏一則見議於孟子曷若我如屬辭而比事終去此而取彼觀其可設猶指掌以何疑視之如傷豈髮膚而敢毀大哉一人飬民四海咸賔求瘼而膏肓曷有采善而股肱必臻修兆人之紀綱何殊修巳觀萬民之風俗豈異觀身今我后化洽風行道光天啓每視民而如子復使臣而以禮故能以六合而為家齊萬物於一體六官賦分職無曠王道行矣伊六官之設也所以經綸庶政輔弼大君治四方而公共宅百揆而職分克勤于邦同致皇王之道各揚其職以成社稷之勳王者富有八絃君臨萬國何以致熙熙之化何以崇巍巍之德欲行其教必舉賢而援能將致其功故列官而分職乃立冢宰爰命司徒一則執揄衡之柄一則掌土地之圖總其庶官位定而上下皆正敷于五教民成而怨惡曾無至若宗伯執事而惟和司馬論功而無曠典三禮而稽古統六師而安上爼豆之事登降而不失其宜軍旅之容征伐而無有不當又若司寇之治可畏司空之政惟常主憲綱而有典有則勸農功而無怠無荒御百姓於五刑罔敢作亂宅兆人於九土孰不來王惟茲六官邦國是保叶贊王業恢張聖造所以均天地之化所以全君臣之道軒皇六相稽其義而弗違舜帝五臣比其功而可考夫如是則六官之任也司二儀之理法四時之名于以平天下之政于以安天下之情得其人則聖政咸若失其人則王化不行雖乃武而乃文各從其理體亦同心而同德共輔於文明今國家博采遺賢陟明多士將五帝以齊邁命六官而共理有以見萬國一家頌聲作矣鑄劒戟為農器賦天下無事兵器銷偃兵者凶器食惟民天出劒㦸而鑄矣為稼穡之用焉我武不施當四海和平之後公田盡闢啓兆民富庶之先蓋以理定區中文經天下知無用於利器俾改作於良治以謂前王鋒鏑不得巳而用之此日鎡錤有以多為貴者於是施巨槖發洪爐索矛盾斂千殳鏌耶之鋒冰銷於倐忽轅門之器金鑠於斯須露頴者惟變所適餘刃者復歸於無務材訓農假工人之鼓鑄備物致用取田畯之規模不知我者謂我前功偕棄故知我者謂我欲善其事繇是星陳畎畝之具日新錢鎛之類好戰者隨之而挫鋭力穡者因之而受賜器非求舊委六師征伐之資日用不知增百姓耕耘之利足使上敦淳朴下無戰爭三農以之勸萬國以之平去故從新茂百榖而寧同百戰深耕易耨闢五土而何愧五兵况乎清淨是崇聲教遐𬒳任甲胄於忠信施干櫓於禮義去彼取此息南征北伐之勞小往大來變東作西成之器是知偃武者除其禍亂勸農者臻乎庶饒五野之豐登時至四方之戰鬪聲銷與世作程鄙黃帝弦弧之智去惡務本笑夏王鑄鼎之朝大哉聖政惟新文德來遠務三時而倉箱日益却十德而華夷草偃有以見我后易俗移風敦天下之大本者也任官惟賢材賦分職求理當任賢者官也者名器所守賢也者才謀不羣當建官而公共惟任賢而職分大則論道經邦帝賚之猷允著小則陳力就列家食之嘆無聞王者臨萬邦之民列百揆之職將政理而有截故掄材而不􅑯示以好爵惟皇之士攸臻致于周行命世之才盡得始其精選不二明揚勿休察其言之所謂觀其行之所修苟進者不可不愼待用者豫取豫求勸農勉人咸委循良之德處煩理劇悉咨濬哲之謀豈不以官者一人之股肱兆民之綱紀厥用也雖各司其局厥功也蓋同歸于理非其人則貽民之憂得其人則致君之美是故每孜孜於仄席憂在進焉俾濟濟以盈庭野無遺矣蓋以非賢不乂得士則昌度其才而後用授其政而必當上以見知人之道下以見稱職之方亦如大厦搆興惟美材而是取良工制作得利器而允臧自然讒邪知禁惟君子之是任政教昭宣致王業之不愆庶績咸若羣方晏然其或未精黜陟弗辨媸妍素餐之誚必作嘉魚之詠莫傳曷若我命以鈞衡乃負鼎之明哲升乎諫諍必及霤之忠賢大哉考古典之訓謨觀前王之取捨巍巍堯帝得五臣而洽域中赫赫軒皇用六相而光天下故我后法二帝之垂衣舉多賢者從諫如流賦王者從諫如彼流水聖人以治歷乾綱思邁前王從忠諌而弗逆觀流水以堪方每行補過之言曾無凝滯或得興邦之議寧昧激揚矧夫內守宗社外臨華夏臣不興諫則君道有虧君不從諫則臣心莫寫所以遵啓沃之致理若汪洋之就下設樽以進似使其押而玩之折檻弗誅寧見其蹈而死者豈不以君之德也貴納諌而溫恭水之性也美隨流而順從故周旋而納善如蕩漾而朝宗詢彼芻蕘豈愧束薪之詠聽諸藥石更疑浮磬之容莫不洞逹四聰旁求五諫上既資於獻替下寧生於謗訕聞善必信不爭之勢何殊擇善以從就濕之情無間于以見萬乘之主納賢以虗七人之職竭節而居又何煩於斷鞅豈有悔於觀魚由是忠讜咸臻信智者之所樂俊賢是效見臣心之亦如又何必博聞取規從繩為軌但見弗違於啓乃自可偕行於沔彼所以明虗受之功所以得上善之旨及霤之士雖濡首而何傷𥙷衮之臣思浣衣而可美夫如是則咸聞不諱但見寡尤上下莫聞於闕政大小皆罄於嘉謀威王之三賞屢行恩波下施晏子之一言見用德澤旁流我后光被群方柔懷多士陳謗木而聽政建善旌而求理所以彰從諫之心率疏通而如水聖人大寶曰位賦仁德之守光大君位聖人以正兹盛位御彼兆民故稱之於大寶實守之於至仁保于域中既永綏於南靣貴乎天下自可象於北辰當其穆穆承乾巍巍立極必先安之於位然後崇之以德闡兹神化既天啓於一人固此鴻基方君臨於萬國念兹在兹高而不危于以見大人之造于以見王化之基是謂國之寶也故得人皆仰之九五之尊求忠信而為助億兆之上與慈儉以同施故能上配三無下安九有且無反以無側誠可大而可久愼終如始若難得以為思持盈守成契不貪而是守則知禀其聖者於焉位昌寶其位者於焉化光斯位也既首出於庶物其化也乃日聞於四方亦如位於高明者天故生成而莫極位於博厚者地則飬育於無疆夫如是則遐邇具瞻上下交泰言其寶則非常之寶謂其大則強名之大寧慙希代間千載以居尊豈止連城鎮萬邦而攸賴大哉君以守位位以居君能辨方而是處則行教而有聞聖域旁連想善鄰而是比皇圖斯啓覩王度以爰分我后執契嗣文垂衣有位並光華於日月齊長久於天地赫赫鴻猷萬斯年兮光被賢不家食賦尊尚賢者寧有家食國家廣闢四門推賢可尊俾進身於祿位寧退食於丘園出仕文明萬鍾之榮自足不居側陋一簞之樂奚論當其王道勃興聖人在上納忠良而罔怠庶弼諧而無曠敦三接而何善不臻逹四聰而無遠弗訪思舉之士效明試於勳庸崇德之人耻素飱而高尚莫不濯纓交進束帶相先上既諧於輔聖下絶見於遺賢克勤于邦自重茵而列鼎不出其位寧鑿井而耕田遂使獻替無虧經綸是假外兼濟於黔首內盡忠於王者行爵出祿但見其聖人飬賢論道經邦詎聞乎君子在野豈不以天下之政也惟賢是經天下之情也得賢而寧所以宅兹百揆所以康彼萬靈靡吟皎皎之駒巳縻好爵宜誼􅊯􅊯之鹿盡宴明庭彼茹藜而隱者亦士之醜飲泉而居者何樂之有曷若我美祿是干良時是偶如蛟龍兮得雲雨異鱗鳯兮在郊藪是以子牙就聘求魚豈戀於水濆伊尹逢時執來寧思於田畝美夫聖主斯在明賢不遐咸簪纓而奉國豈菲薄而在家端冕之前既協鹽梅之用衡茅之下誰興葵藿之嗟士有學禀素風運逢皇極方勵入官之業獲訟飬賢之德幸奏藝於堯階庶無慙於家食窮神知化賦窮彼神道然後知化惟神也感而遂通惟化也變在其中究明神而未昧知至化而無窮通幽洞微極萬物盛衰之變鈎深致遠明二儀生育之功大易格言先聖微旨神則不知不識化則無終無始在乎窮之於此得之於彼苟精義而入焉如至誠而感矣原其不測識隂陽舒慘之權察彼無方得寒暑往來之理莫不廣生之謂化妙用之謂神視其體則歸於無物得其理則謂之聖人必先賾其真宰然後識其鴻鈞載審聰明見日居月諸之象寧迷肹蠁合春生夏長之仁仰止天倪探諸神造扣寂之情斯至觀妙之言可考不疾而速思左旋右動之機不怒而威悟福善禍淫之道豈不以化之布也無黨無遍神之理也自然而然亦猶究彼靈蓍審萬象而無失推茲妙律測四時而罔愆若然則眇覿虗無遐觀妙有知微妙而斯在欲擬議而何後所以虞舜運璇璣之日不爽昭回仲尼窮易象之年自明休咎念兹在兹不可不知稽惡盈而是則將應變以何疑以此觀天通乾道而明矣以斯設教助人文而用之是以聖人德合乾坤道通晝夜法至神而有要臻大道而多暇有以見秉堯智以無為而民自化乾為金賦剛健純粹其象金也大哉乾陽禀乎至剛統於天而不息取諸金而可方外著元亨想有英而可覩中含變化知從革之靡常原夫聖人之作易也八卦成文百代為憲索隱而神道可極取象而物形何遁立夫乾也所以體乎高明為彼金焉所以尚乎剛健觀其爻繫斯著擬議有倫此則端四德而成象彼則列五行而效珍非同體於煥耀實比德於貞純晝而成三三品之容可玩統而用九九牧之貢斯陳况乎運太始之極履至陽之位冠三才而中正秉一氣而純粹萬物自我而資始四時自我而下施其動也直誰觀躍冶之姿其靜也專更想藏山之義豈不以乾之德也至健於斯金之性也純剛在兹察之則宛若配之則宜其我道易知喻披沙而既得我功不拔如在礪以焉虧則知為氷未良喻馬安仰一則消釋而可待一則老瘠而何往曷若我取難得之寶匹始亨之象乾之運矣蓋造物而罔愆金之鑄焉亦制器而不爽有以見確然成務昭乎若金首萬化而道廣方百鍊而旨深始終不雜於隂爻寧虞衆口上下皆禀於剛德若遇同心美矣哉易之取捨有如此者仰運行之在上荷生成之親下故我后法乾元而居尊致王度之如也王者無外賦王者天下何外之有穆穆皇皇為天下王宅六合而化何有外育兆民而道本無疆廣若乾坤曷有能踰之者明借日月曾無不照之方當其保安宗社混同夷夏運德車而無不至焉闢義路而何其遠也普天率土盡關宵旰之憂九夷八蠻無非臣妾之者其仁蕩蕩其道平平視之不見尋之無邊誠厚載之象地亦洪覆之配天令出惟行寧分乎遠者近者德廣所及但見乎無黨無偏若然則包括八紘牢籠九野惟善守於域內乃化成於天下萬邦同式孰謂乎限蠻隔夷四海為家莫聞其彼衆我寡故得五兵不試四國是訛于以見上下交泰于以見遠近咸和九霄之皇澤下施無遠弗廟萬國之黔黎受賜其樂如何故知覃及鬼方守在海外書同文而車同軌地為輿而天為蓋如春之德廣育而萬物咸亨若海之容處下而百川交㑹大矣哉自南自北覆之育之見兆民咸賴信一人不遺五霸何知據山河而一戰三王有道流聲教於四夷今我后寅奉三無光宅九有播皇風於無際守鴻圖而可久夫如是四海九州咸獻無疆之壽范文正公别集卷第二
