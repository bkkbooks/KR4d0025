  text: 范文正公集卷第十四
  hash: sha256:7462a4df51b09425c09ddeffd0dcd1eb9a60a7e66c497bec87dc6224780dfdd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0025_SBCK_014-1a}
body:
  text: 後學時兆文校正後學黃姫水校正後學李鳯翔校正十五世孫啓乂同校十六世孫惟元同校太府少卿知處州事孫公墓表論者日春秋無賢臣罪其不尊王室也噫春秋二百四十年天地五行之秀生生不息何甞無賢乎當東周之㣲不能用賢以復張文武之功故四方英才皆見屈於諸侯覇者之爲而王道不興與無賢同故論者傷之甚矣公諱鶚字齊賢冨春人也按舊誌公以竒文遠筞見吳武肅王署越州大都督府文學歷郡縣幕府改臺憲爲郎官判鹽鐵院持禮入貢授少監終于太府少監領縉雲郡享年八十葬于㑹稽之南山今山陽守沔即公之㑹孫也在御史府無所廻避有聲朝廷近過閭里掃墳墓求故老索遺文得太府之清芬訪余郡齋以道之旣而歎曰唐季海内支裂卿材國士不爲時王之用者民鮮得而稱焉皇朝以來士君子工一詞明一經無遠近直趨天王之庭爲邦家光吾搢紳生宜樂斯時寳斯時則深於春秋者無所譏焉因追惜太府公竒文遠筞而終於覇臣丁彼時也豈徒一人而巳乎故弔而表之鄠郊友人王君墓表五行之秀見乎人有清而賢有蔽而愚五行之數著乎命或修而壽或速而夭顔子其猶病諸吾友人王君賢而夭之其不幸矣夫君諱鎬字周翰其先澶淵人也曾祖鼎邢臺之督郵祖楷尚書兵部貟外郎考衮太子右賛善大夫妣秦氏封太原縣君賛善公慷慨有英氣善爲唐律詩歷著作佐郎通判彭州㑹太守不法憤而辱之失官居長安中與豪士遊縱飲浩歌有嵇阮之風人特駭之公不安其高復起家就禄得請監終南山上清太平宫從吏隠也時祥符紀號之初載某薄遊至止及公之門因與君交執復得二道士汝南周德寳臨海屈元應者蚤暮過從周精於篆屈深於易且皆善琴君常戴小冠衣白紵跨白驢相與嘯傲於鄠杜之間開樽鳴絃或醉或歌未甞有榮利之語一日㑹君之别墅當圭峯之下山姿秀整雲意閑暇紫翠萬疊横絶天表及月高露下群動一息有笛聲自西南依山而起上拂寥漢下滿林壑清風自發長煙不生時也天地人物洒然在冰壺之中客大異之君曰此一書生旣老且貧毎風月之夕則操長笛奏數曲而罷凡四十年矣嗟乎隱君子之樂也豈待乎外哉曁予東歸長白山以親之故就禄養者僅十五秋君猶隱而未出今殿中丞致仕母君隨居鄠郊善談名理見君之賢而語之曰子美田百頃枕琴藉書釀醇酒養靈藥優游雲泉踰二十年人生此世中安得獨善自樂如此之久耶不若俯就郷老書少勞于人間又長安秀造皆推引之君不得巳天聖四年秋起冠京兆之薦明年春官氏較天下之士第君于甲等忽焉搆疾以三月九日不起于京師之建隆觀時周道士在焉親視藥食而至于終乃齎其柩行哭道中歸于鄠郊又數年予倅河中府因王事至長安傳舎中㑹周道士夜話平昔及君之始末道士涕泗交下終夕不止君善與人交也如此又十年予經畧西事遇君之長子以葬期來告嗚呼君㓜而竒敏能歌詩筆札有聲于關中長安人惟呼小秀才長而有文著書樂道不願榮禄有肥遁之節後感母君之言僶俛一進遽以不壽妻譙氏生子五人長曰規謹厚克家奉父母之䘮藏于鄠縣某山某原禮也次曰慨景祐元年登明經第除臨晉主簿而亡次曰覽曰覲曰觀尚㓜俱嗣其業二女適孫周道早卒噫予與君别三十七載風波南北區區百狀今兹方靣賔客滿坐鍾鼔在廷白髪憂邊對酒鮮樂豈如圭峯月下倚髙松聴長笛忘天下萬物之際乎追念故人乃揭石而表之書曰有君子焉生兮雲山葬兮雲山始終不垢兮其清而賢龍圖閣直學士工部郎中段君墓表皇祐二年春某月日葬故龍圗閣直學士段君于陳州某縣某郷之原君諱少連字希逸開封人也曾祖諱知遇祖諱驤隱于五代父諱子昻端拱中登進士第終于陳州録事叅軍累贈吏部郎中母夫人樂氏追封福昌縣太君君㓜孤好學大中祥符七年秋登服勤詞學科釋褐試秘書省校書郎知鄂州崇陽縣有治狀改權杭州觀察判官時樞密直學士李公及領餘杭郡當世清德於人少許可大愛君之才與本道轉運使薦之改著作佐郎知亳州蒙城縣移雅州名山縣還改秘書丞知㜈州金華縣未行除審刑院詳議官執法至平搢紳多之張文懿罷相知江寧府辟君通判府事還授御史臺推直官改太常博士時章獻太后聽朝君與知雜御史曹修古等上言外戚劉從德家恩幸太過臺隷輩皆得禄仕責授秘書丞監漣水軍酒稅務復太常博士通判天雄軍上臨軒親政擢拜殿中侍御史尋除開封府判官改刑部貟外郎直集賢院充三司度支判官使契丹國還爲兩浙轉運使君以二浙財賦爲天下之最孜孜利病無弊不革朝廷奨之進兵部貟外郎充職改淮南轉運使兼發運司事移陜西轉運使奏劾判陜府駙馬都尉同平章事柴崇慶不法朝議直之俄命以本官兼御史知雜踰月除三司度支副使定襄地震壞閭舎壓人盈萬數天子怵然命君爲河東安撫使君恤殘民無一不至遷工部郎中充天章閣待制知廣州康定初西戎叛兵交塞下近塞藩牧實難其任朝廷以君爲龍圖閣直學士知涇州未行感疾以寳元二年八月初四日終于廣州之黃堂年四十六娶樂氏封京兆郡君生三男俱㓜亡五女長適張氏次適孫氏次適譚氏次適明氏次適張氏君風神秀特人皆望而欽之臨事無大小無難易决發如流明而不苛和而不隨在御史府無所廻避謫去踰年及還又與孔中丞道輔等伏間論事見端人之風焉三爲轉運使特有風采善人君子皆得信用而推擢之小人則畏而少過君在南海予方經略陜西嘗薦君可仕邊要朝廷纔有涇州之命而君不起搢紳先生咸嗟惜焉予知君之深者故表其墓云希逸之生神粹而明朝端正色天下公聲顔子非壽清德自久伯道何嗣令名爲後表墓以文希逸不朽贈大理寺丞蔡君墓表經曰君子之道闇然而日章嘗試觀之士果有文與行不必據高享大而後顯雖林壑之幽逝而不泯者蓋有稱焉君諱元卿字某其先洛陽人祖諱某爲萊之膠水令有惠愛君官九載不得去旣終邑人留葬之子孫遂家焉父諱某克已好學以疾不仕君㓜不爲戲長而好學一日嘆曰男子生而有四方之志吾從事於文豈跼身環堵而能通天下之志乎乃軒然遠㳺至江西胡氏之義學與群士居非禮不由非道不談君子願交焉五年業成復歸于齊郷老請薦之時方尚雕蟲技君以好古不合于有司退居淄州郡之北郊有田數十頃而衣食之以貧爲樂未嘗屈于人有豪士至門願輸錢五十萬請爲陶朱之事以肥其家君謝之曰吾伏臘之餘尚可爲酒醴詠歌之音足以悅情性吾之仁義不得施于生民忍以貨殖而取之乎豪士慙而引去君退於斯終於斯享年四十七君體貌魁梧偉其衣冠人皆望而畏之而性本慈孝故叅知政事文忠公視君諸父也君親愛之過于巳子每得文忠所著則喜盈顔靣示于識者曰起吾家者耶君娶故駕部貟外郎王允已之女贈某縣君以孝和聞生四子曰奕曰禀曰亶曰交皆由文忠廕𥙷報君之德也奕早終于乾寧主簿禀旣仕而學再舉進士出身夙夜刻志冨于學問甞應賢良方正科雖失于有司以是著聞於時至監察御史而終君與夫人因禀叙郊祀恩俱𬒳贈告亶與交今並爲大理寺丞克孝于親奉君與夫人之䘮以某年月日合葬于青州某縣某原禮也子孫㳺宦誠南北之人也故表而譏之云君屈其身不屈其道愛及文忠文忠以報子孫廼昌相與爲孝墓而表之如立廟貌權三司鹽鐵判官尚書兵部貟外郎王君墓表君諱絲字敦素㑹稽人也晉右將軍逸少之後世居蕭山曾祖諱慶祖諱安皆不仕父諱扆有郷曲之行好施與而里人喜之曰厥後其昌娶沈氏夫人而生君及君登朝累贈尚書屯田貟外郎夫人追封德清縣太君後夫人謝氏追封㑹稽縣太君君㓜禀親訓未嘗釋卷復游學京師大中祥符八年春擢進士第釋褐除興國軍司理叅軍精意獄事無不得其情前後劾重辟而昭雪者凡十一人郡中稱之神明秩滿除台州軍事判官州城據山病其少井君白州長一舎之外有泉焉請陶土爲筒導入于城復五里一穴以濟行路之渇于今人頼之移潮州軍事判官秩滿權杭州觀察推官丁父母憂服除赴集吏部選充關封府兵曹叅軍歲餘太理寺舉爲詳斷官改本寺丞凡奏獄之疑者必持寛典全活甚衆改殿中丞故龍圖段學士少連時爲兩浙轉運使舉君撥發本路漕船廼革其弊本大增上供之數以考績聞改太常博士通判衢州州人子弟多習詩書而未有學校士望缺然而君募郡中髙貲始建學舎其堂室僅百楹朝廷賜州學額又營資糧之具最於諸郡時金華郡守闕外臺假君領之衢之父老遮道于境上謂婺民曰我州一鑑何奪之爲有詣外臺乞還者婺人薛惟簡先有冤狀父徒子黥君雪除之其家德君以紫檀肖其象而祠之故翰林聶學士冠卿應詔舉知深州不就改屯田貟外郎通判袁州故翰林葉學士清臣舉拜殿中侍御史慶曆中湖南蠻人亂攻刼郡縣言事者或請夷滅或議招納歲時未决生民甚苦之朝廷選御史徃䆒其事以君爲湖南安撫至則察訪利病而前之主者立重賞以誅蠻人一級萬錢士卒貪之徃徃害樵餉之人以爲功君下令曰得賊之首者必指其鬪地以爲質其可擒者當生致之自是無枉戮者君居軍中凡十月戎服葛屨與士卒同惟石硋鈴景二洞聚黨數千君促官軍力破之斬首數百級招安三千人餘皆竄匿英連韶間自是衰息朝廷奨君之勞遷侍御史賜金紫充廣南東路轉運按察使兼本路安撫提舉市舶司凡蕃貨之來十稅其一必擇諸精者夷人苦之公令精麤兼取夷人大恱謂之曰金珠御史意貴之也時交趾有變朝廷命君經度而廣州當交趾之衝無城守備君議陶塼爲城造大艦十數日習水戰以待其來彼不復動歲餘君以瘴疾求領小郡遷兵部貟外郎知通州通人歲苦海潮流亡者衆君作長堤以捍之復民田業量其肥瘠奏免五年至十年之租朝廷召權三司鹽鐵判官以皇祐元年四月疾終于京師享年六十一二年三月十日歸葬于蕭山之先域禮也君娶裴氏生一女再娶杜氏生四男一女其子霽登進士第震試秘書省校書郎露三班借職需修進士業女文慧適泉州永春主簿陸琪文淑適皇祐元年進士第一人馮京予於君同年之交也見君苦志清節不渝於素稱薦者皆當世名臣朝廷一用之而克樹風績惜哉位未大道未顯而終焉其命矣夫故表其墓云稽山之隂右軍之後生此淑人終身無咎旣及于民復歸於神葬之家山雲氣氤氲宜昌乎子孫書碑隂書環州馬嶺鎭夫子廟碑隂慶暦二年春正月予領環慶之師出按邊部過馬嶺鎮四望族落皆鎭之屬羗而戍城之中有夫子廟貌觀其記石乃故兵馬監押殿直贈某官張公藴之所建也巳而思之昔咸平二年冬契丹以舉國之衆入髙陽關縱横大掠南至于河乗冰之堅侵于淄齊時河南州郡未甞治城且無戰卒四郊之民驅戮向盡城中大懼公方監押與刺史議其事刺史暨官屬州人咸欲棄城奔于南山公按劒作色曰柰何去城隍委府庫大衆一潰更相勦奪彼狄未至吾民巳殘矣刺史果出我當殺之以徇繇是衆無敢動公乃呼民登城夙夜以守數日狄退而州人相賀曰向非張公英識獨斷則我輩父母妻子魚肉於人矣朝廷賞不及公人咸嗟咨公生二子長曰揆今爲度支貟外郎直史舘荆王府記室叅軍次曰掞今爲秘書丞通判京兆府事並以文學節行自樹風采搢紳先生稱之議者謂公有隂德於人宜其有後焉予㓜居淄川郡又與記室爲同年生稔聞公之事及觀馬嶺之跡雖極塞窮壘猶復立聖人之祠以尚風教乃知張公信道有素固能訓子義方昌厥世而大其門蓋未可量也豈止隂德之助哉故書之范文正公集卷第十四
